<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>類似構文検索</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">
<style>
/* :root, reset, body, .page, .nav, .btn-back, .breadcrumb → tokens.css / layout.css */
.page { max-width: 720px; } /* override layout.css default 680px */

/* ══════════════════════════════════════════
   発見カード
══════════════════════════════════════════ */
.disc-card {
    background: var(--bg-panel);
    border-radius: var(--radius-m);
    padding: 18px 20px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
}
.disc-card-title {
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-hint); margin-bottom: 8px;
}
.disc-card-label {
    font-size: 1.1rem; font-weight: 700; color: var(--text);
    margin-bottom: 4px;
}
.disc-card-sublabel {
    font-size: 0.78rem; color: var(--text-sub);
}
.disc-card-count {
    display: inline-block; margin-top: 8px;
    font-size: 0.82rem; font-weight: 700; color: var(--accent);
    background: var(--accent-light); border: 1px solid var(--accent-mid);
    border-radius: 20px; padding: 2px 10px;
}

/* ══════════════════════════════════════════
   フィルタパネル
══════════════════════════════════════════ */
.filter-panel {
    margin-bottom: 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius-m);
    overflow: hidden;
}
.filter-panel summary {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px;
    font-size: 0.78rem; font-weight: 700; color: var(--text-sub);
    cursor: pointer; user-select: none;
    background: var(--bg-inset);
    list-style: none;
}
.filter-panel summary::-webkit-details-marker { display: none; }
.filter-panel summary::before { content: '▶'; font-size: 0.6rem; transition: transform 0.15s; }
.filter-panel[open] summary::before { transform: rotate(90deg); }
.filter-body { padding: 14px 16px; border-top: 1px solid var(--border); }
.filter-row { margin-bottom: 12px; }
.filter-row:last-child { margin-bottom: 0; }
.filter-label { font-size: 0.72rem; font-weight: 700; color: var(--text-hint); letter-spacing: 0.08em; margin-bottom: 8px; }

/* 書物グループチップ */
.book-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.book-chip {
    padding: 3px 10px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 600; cursor: pointer; user-select: none;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text-sub); transition: all 0.12s;
}
.book-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ソートボタン */
.sort-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.sort-btn {
    padding: 4px 12px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 600; cursor: pointer; user-select: none;
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text-sub); transition: all 0.12s; font-family: inherit;
}
.sort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* confidence スライダー */
.conf-row { display: flex; align-items: center; gap: 10px; }
.conf-slider { flex: 1; accent-color: var(--accent); }
.conf-value { font-size: 0.75rem; font-weight: 700; color: var(--accent); min-width: 36px; }

/* stub トグル */
.stub-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.78rem; color: var(--text-sub); }
.stub-toggle input { accent-color: var(--accent); }

/* ══════════════════════════════════════════
   結果リスト
══════════════════════════════════════════ */
.results-wrap { position: relative; }
.results-status {
    font-size: 0.78rem; color: var(--text-hint);
    margin-bottom: 14px; min-height: 20px;
}

/* 書物見出し（sticky） */
.book-heading {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0 4px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    margin-bottom: 6px;
    margin-top: 18px;
}
.book-heading:first-child { margin-top: 0; }
.book-heading-name {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--accent);
}
.book-heading-count {
    font-size: 0.68rem; padding: 1px 7px; border-radius: 10px;
    background: var(--accent-light); color: var(--accent);
    font-weight: 700;
}

/* .app-card, .app-card-head, .app-card-ref, .app-card-word, .app-card-meta,
   .app-card-arrow, .app-card-body → components.css */

/* Confidence coloring (page-specific, inside .app-card-meta) */
.result-conf {
    font-size: 0.65rem; font-weight: 700; flex-shrink: 0;
}
.result-conf.high   { color: #4a7a5a; }
.result-conf.medium { color: #a09050; }
.result-conf.low    { color: #b05050; }
.result-lemma {
    font-size: 0.72rem; color: var(--text-hint); margin-bottom: 6px; padding-top: 8px;
}
.result-ja {
    font-size: 0.8rem; color: var(--text-sub); line-height: 1.7;
    padding: 6px 10px; background: var(--bg-panel);
    border-radius: var(--radius-s); border-left: 2px solid var(--border);
    margin-bottom: 8px;
}
.result-ja-empty { font-style: italic; color: var(--text-hint); }

/* contextSnippet */
.context-snippet {
    display: flex; flex-wrap: wrap; gap: 4px 8px;
    font-family: 'Gentium Plus', serif;
    font-size: 1.0rem; margin-bottom: 6px; padding: 8px 0;
}
.snippet-token { color: var(--text-sub); }
.snippet-token.hit {
    color: var(--accent); font-weight: 700;
    background: var(--accent-light);
    border-radius: 4px; padding: 0 3px;
}
.ctx-loading { font-size: 0.75rem; color: var(--text-hint); padding: 6px 0; }

/* empty / error */
.results-empty {
    text-align: center; padding: 40px 20px;
    font-size: 0.88rem; color: var(--text-hint);
    background: var(--bg-panel); border-radius: var(--radius-m);
}
.results-empty-icon { font-size: 2rem; margin-bottom: 8px; }

/* ロード中 */
.loading-msg {
    text-align: center; padding: 40px;
    font-size: 0.88rem; color: var(--text-hint);
}

/* もっと見る */
.load-more-btn {
    display: flex; align-items: center; justify-content: center;
    width: 100%; padding: 12px; margin-top: 10px;
    font-size: 0.82rem; color: var(--accent); font-family: inherit;
    background: var(--bg-inset); border: 1px solid var(--border);
    border-radius: var(--radius-s); cursor: pointer;
    transition: background 0.1s; min-height: 44px;
}
.load-more-btn:hover { background: var(--accent-light); }

/* @keyframes fadeUp, .fade-up, .app-footer, .footer-links, .section-divider → layout.css */

/* ══════════════════════════════════════════
   モバイル（480px以下）
══════════════════════════════════════════ */
@media (max-width: 480px) {
    .result-ref { min-width: 60px; font-size: 0.72rem; }
    .result-word { font-size: 0.95rem; }
    .disc-card { padding: 14px 16px; }
}
</style>
</head>
<body>
<div class="page">

    <!-- Nav -->
    <nav class="nav">
        <a class="btn-back" href="javascript:history.back()">← 戻る</a>
        <div class="breadcrumb">
            <span class="crumb" id="bc-syntax-id">—</span>
        </div>
    </nav>

    <!-- 発見カード -->
    <div class="disc-card fade-up" id="disc-card">
        <div class="disc-card-title">類似構文検索</div>
        <div class="disc-card-label" id="disc-label">—</div>
        <div class="disc-card-sublabel" id="disc-sublabel"></div>
        <div class="disc-card-count" id="disc-count" style="display:none;">—</div>
    </div>

    <hr class="section-divider">

    <!-- フィルタパネル -->
    <details class="filter-panel" id="filter-panel">
        <summary>フィルタ・並び替え</summary>
        <div class="filter-body">
            <div class="filter-row">
                <div class="filter-label">並び替え</div>
                <div class="sort-btns">
                    <button class="sort-btn active" data-sort="canonical" onclick="setSort('canonical',this)">正典順</button>
                    <button class="sort-btn" data-sort="confidence_desc" onclick="setSort('confidence_desc',this)">確信度順</button>
                    <button class="sort-btn" data-sort="book_frequency" onclick="setSort('book_frequency',this)">書物頻度順</button>
                </div>
            </div>
            <div class="filter-row">
                <div class="filter-label">最低確信度</div>
                <div class="conf-row">
                    <input type="range" class="conf-slider" id="conf-slider" min="0" max="90" step="5" value="30" oninput="onConfSlider(this)">
                    <span class="conf-value" id="conf-value-label">30%</span>
                </div>
            </div>
            <div class="filter-row">
                <div class="filter-label">書物グループ</div>
                <div class="book-chips" id="book-chips"></div>
            </div>
            <div class="filter-row">
                <label class="stub-toggle">
                    <input type="checkbox" id="stub-toggle" onchange="applyFilters()">
                    stub 候補を含める（参考値のみ）
                </label>
            </div>
        </div>
    </details>

    <!-- 結果 -->
    <div class="results-wrap">
        <div class="results-status" id="results-status"></div>
        <div id="results-list"></div>
        <button class="load-more-btn" id="load-more-btn" style="display:none;" onclick="loadMore()">さらに表示</button>
    </div>

</div>

<footer class="app-footer">
    <div class="footer-links"><a href="index.html">ホーム</a></div>
</footer>

<script>
/* ══════════════════════════════════════════
   定数・データ
══════════════════════════════════════════ */
const BOOK_JP = {
    MAT:'マタイ',MRK:'マルコ',LUK:'ルカ',JHN:'ヨハネ',ACT:'使徒',
    ROM:'ローマ','1CO':'Ⅰコリント','2CO':'Ⅱコリント',
    GAL:'ガラテヤ',EPH:'エペソ',PHP:'ピリピ',COL:'コロサイ',
    '1TH':'Ⅰテサロニケ','2TH':'Ⅱテサロニケ',
    '1TI':'Ⅰテモテ','2TI':'Ⅱテモテ',TIT:'テトス',PHM:'ピレモン',
    HEB:'ヘブル',JAS:'ヤコブ','1PE':'Ⅰペテロ','2PE':'Ⅱペテロ',
    '1JN':'Ⅰヨハネ','2JN':'Ⅱヨハネ','3JN':'Ⅲヨハネ',JUD:'ユダ',REV:'黙示録',
    GEN:'創世記',EXO:'出エジプト記',LEV:'レビ記',NUM:'民数記',DEU:'申命記',
    JOS:'ヨシュア記',JDG:'士師記','1SA':'サムエル記上','2SA':'サムエル記下',
    '1KI':'列王記上','2KI':'列王記下',
    ISA:'イザヤ書',JER:'エレミヤ書',EZE:'エゼキエル書',DAN:'ダニエル書',
    HOS:'ホセア書',JOL:'ヨエル書',AMO:'アモス書',OBA:'オバデヤ書',
    JON:'ヨナ書',MIC:'ミカ書',NAH:'ナホム書',HAB:'ハバクク書',
    ZEP:'ゼパニヤ書',HAG:'ハガイ書',ZEC:'ゼカリヤ書',MAL:'マラキ書',
    PSA:'詩篇',PRO:'箴言',JOB:'ヨブ記',SNG:'雅歌',RUT:'ルツ記',
    LAM:'哀歌',ECC:'コヘレト',EST:'エステル記',EZR:'エズラ記',
    NEH:'ネヘミヤ記','1CH':'歴代誌上','2CH':'歴代誌下',
};

const BOOK_GROUPS = [
    { key:'gospel',       label:'福音書',           books:['MAT','MRK','LUK','JHN'] },
    { key:'acts',         label:'使徒言行録',       books:['ACT'] },
    { key:'pauline',      label:'パウロ書簡',       books:['ROM','1CO','2CO','GAL','1TH','2TH'] },
    { key:'prison',       label:'獄中書簡',         books:['EPH','PHP','COL','PHM'] },
    { key:'pastoral',     label:'牧会書簡',         books:['1TI','2TI','TIT'] },
    { key:'general',      label:'一般書簡',         books:['HEB','JAS','1PE','2PE','1JN','2JN','3JN','JUD'] },
    { key:'rev',          label:'黙示録',           books:['REV'] },
    { key:'lxx_torah',    label:'モーセ五書',       books:['GEN','EXO','LEV','NUM','DEU'] },
    { key:'lxx_forprop',  label:'前預言書',         books:['JOS','JDG','1SA','2SA','1KI','2KI'] },
    { key:'lxx_latprop',  label:'後預言書',         books:['ISA','JER','EZE','DAN','HOS','JOL','AMO','OBA','JON','MIC','NAH','HAB','ZEP','HAG','ZEC','MAL'] },
    { key:'lxx_writings', label:'諸書',             books:['PSA','PRO','JOB','SNG','RUT','LAM','ECC','EST','EZR','NEH','1CH','2CH'] },
];

const NT_BOOKS = new Set([
    'MAT','MRK','LUK','JHN','ACT','ROM','1CO','2CO','GAL','EPH',
    'PHP','COL','1TH','2TH','1TI','2TI','TIT','PHM','HEB','JAS',
    '1PE','2PE','1JN','2JN','3JN','JUD','REV'
]);


const JA_FOLDER = 'bible_jp';
const PAGE_SIZE  = 50;

/* ══════════════════════════════════════════
   URL パラメータ
══════════════════════════════════════════ */
const params = Object.fromEntries(new URLSearchParams(location.search));
const SYNTAX_ID = params.syntax_id || '';

/* ══════════════════════════════════════════
   状態
══════════════════════════════════════════ */
let _allHits      = [];   // 全 TokenRef[]（インデックスから）
let _filtered     = [];   // フィルタ・ソート後
let _displayed    = 0;    // 現在表示済み件数
let _sortOrder    = 'canonical';
let _confMin      = 0.30;
let _includeStub  = false;
let _enabledGroups = new Set(BOOK_GROUPS.map(g => g.key));
let _jaMap        = new Map();   // ref → 日本語訳
let _verseCache   = new Map();   // "BOOK-ch" → tokens[]
let _registryData = null;

/* ══════════════════════════════════════════
   SyntaxIndexCache
══════════════════════════════════════════ */
class SyntaxIndexCache {
    #cache = new Map();
    #loading = new Map();

    async get(syntaxId) {
        if (this.#cache.has(syntaxId)) return this.#cache.get(syntaxId);
        if (this.#loading.has(syntaxId)) return this.#loading.get(syntaxId);

        const promise = fetch(`./syntax-index/${syntaxId}.json`)
            .then(r => r.ok ? r.json() : [])
            .catch(() => [])
            .then(hits => {
                this.#cache.set(syntaxId, hits);
                this.#loading.delete(syntaxId);
                return hits;
            });

        this.#loading.set(syntaxId, promise);
        return promise;
    }
}
const _cache = new SyntaxIndexCache();

/* ══════════════════════════════════════════
   ユーティリティ
══════════════════════════════════════════ */
function buildRefLabel(bookKey, chapter, verse) {
    return `${BOOK_JP[bookKey] || bookKey} ${chapter}:${verse}`;
}

function cleanText(entry) {
    return (entry.word || entry.normalized || entry.text || '').replace(/[.,:;·⸀⸁⸂⸃⌈⌉]/g, '').trim();
}

function confClass(c) {
    return c >= 0.75 ? 'high' : c >= 0.55 ? 'medium' : 'low';
}

function bibleDataPath(bookKey, ch) {
    const sub = NT_BOOKS.has(bookKey) ? 'nt' : 'lxx';
    return `./bible_data/${sub}/${bookKey}/${ch}.json`;
}

function resolveEnabledBooks() {
    const books = new Set();
    for (const g of BOOK_GROUPS) {
        if (_enabledGroups.has(g.key)) g.books.forEach(b => books.add(b));
    }
    return books;
}

/* ══════════════════════════════════════════
   フィルタ・ソート
══════════════════════════════════════════ */
function applyFilters() {
    const enabledBooks = resolveEnabledBooks();
    _includeStub = document.getElementById('stub-toggle').checked;
    _confMin = parseFloat(document.getElementById('conf-slider').value) / 100;

    _filtered = _allHits.filter(h =>
        h.confidence >= _confMin &&
        (_includeStub || h.status === 'active') &&
        enabledBooks.has(h.bookKey)
    );

    _filtered = sortHits(_filtered, _sortOrder);
    _displayed = 0;
    renderResults(true);
}

function sortHits(hits, order) {
    if (order === 'confidence_desc') {
        return [...hits].sort((a, b) => b.confidence - a.confidence);
    }
    if (order === 'book_frequency') {
        const freq = {};
        hits.forEach(h => { freq[h.bookKey] = (freq[h.bookKey] || 0) + 1; });
        return [...hits].sort((a, b) =>
            (freq[b.bookKey] - freq[a.bookKey]) || (a.sortKey - b.sortKey)
        );
    }
    // canonical（デフォルト）: sortKey 昇順
    return [...hits].sort((a, b) => a.sortKey - b.sortKey);
}

function setSort(order, btn) {
    _sortOrder = order;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
}

function onConfSlider(el) {
    document.getElementById('conf-value-label').textContent = `${el.value}%`;
    applyFilters();
}

function toggleGroup(key) {
    if (_enabledGroups.has(key)) {
        if (_enabledGroups.size <= 1) return; // 最低1グループ
        _enabledGroups.delete(key);
    } else {
        _enabledGroups.add(key);
    }
    // チップ更新
    document.querySelectorAll('.book-chip').forEach(chip => {
        chip.classList.toggle('active', _enabledGroups.has(chip.dataset.group));
    });
    applyFilters();
}

/* ══════════════════════════════════════════
   結果描画
══════════════════════════════════════════ */
function renderResults(reset) {
    const list  = document.getElementById('results-list');
    const status = document.getElementById('results-status');
    const moreBtn = document.getElementById('load-more-btn');

    if (reset) {
        list.innerHTML = '';
        _displayed = 0;
    }

    if (_filtered.length === 0) {
        list.innerHTML = `<div class="results-empty">
            <div class="results-empty-icon">🔍</div>
            <div>結果が見つかりません</div>
            <div style="font-size:0.75rem;margin-top:4px;color:var(--text-hint);">フィルタ条件を変更してください</div>
        </div>`;
        moreBtn.style.display = 'none';
        status.textContent = '0 件';
        updateDiscCount(0);
        return;
    }

    const page    = _filtered.slice(_displayed, _displayed + PAGE_SIZE);
    const hasMore = _displayed + PAGE_SIZE < _filtered.length;

    if (reset && _sortOrder === 'canonical') {
        // 書物グループ単位で描画
        renderByBook(list, page);
    } else if (reset) {
        renderFlat(list, page);
    } else {
        // 追加表示：書物見出しのマージが複雑になるためフラット追加
        appendFlat(list, page);
    }

    _displayed += page.length;
    status.textContent = `${_filtered.length} 件中 ${_displayed} 件表示`;
    moreBtn.style.display = hasMore ? 'flex' : 'none';
    updateDiscCount(_filtered.length);
}

function renderByBook(container, page) {
    // 書物単位でグルーピング
    const groups = [];
    let cur = null;
    for (const hit of page) {
        if (!cur || cur.bookKey !== hit.bookKey) {
            cur = { bookKey: hit.bookKey, hits: [] };
            groups.push(cur);
        }
        cur.hits.push(hit);
    }
    for (const g of groups) {
        const heading = document.createElement('div');
        heading.className = 'book-heading';
        heading.innerHTML = `<span class="book-heading-name">${BOOK_JP[g.bookKey] || g.bookKey}</span>
            <span class="book-heading-count">${g.hits.length}</span>`;
        container.appendChild(heading);
        for (const hit of g.hits) container.appendChild(buildResultCard(hit));
    }
}

function renderFlat(container, page) {
    for (const hit of page) container.appendChild(buildResultCard(hit));
}

function appendFlat(container, page) {
    for (const hit of page) container.appendChild(buildResultCard(hit));
}

function loadMore() {
    const page = _filtered.slice(_displayed, _displayed + PAGE_SIZE);
    appendFlat(document.getElementById('results-list'), page);
    _displayed += page.length;
    const moreBtn = document.getElementById('load-more-btn');
    const hasMore = _displayed < _filtered.length;
    moreBtn.style.display = hasMore ? 'flex' : 'none';
    document.getElementById('results-status').textContent =
        `${_filtered.length} 件中 ${_displayed} 件表示`;
}

/* ══════════════════════════════════════════
   結果カード
══════════════════════════════════════════ */
function buildResultCard(hit) {
    const card = document.createElement('div');
    card.className = 'app-card';
    card.dataset.bookKey = hit.bookKey;
    card.dataset.chapter = hit.chapter;
    card.dataset.verse   = hit.verse;
    card.dataset.tokenIdx = hit.tokenIdx;
    card.dataset.word    = hit.word;

    const refLabel  = buildRefLabel(hit.bookKey, hit.chapter, hit.verse);
    const confPct   = Math.round(hit.confidence * 100);
    const cls       = confClass(hit.confidence);

    card.innerHTML = `
        <div class="app-card-head" onclick="toggleResultCard(this.parentElement)">
            <span class="app-card-ref">${refLabel}</span>
            <span class="app-card-word">${escHtml(hit.word)}</span>
            <span class="app-card-meta"><span class="result-conf ${cls}">${confPct}%</span></span>
            <span class="app-card-arrow">›</span>
        </div>
        <div class="app-card-body">
            <div class="result-lemma">レンマ: <span style="font-family:'Gentium Plus',serif;">${escHtml(hit.lemma)}</span></div>
            <div class="ctx-loading" id="ctx-${hit.bookKey}-${hit.chapter}-${hit.verse}-${hit.tokenIdx}">展開中…</div>
        </div>`;

    return card;
}

function toggleResultCard(card) {
    const isOpen = card.classList.contains('open');
    card.classList.toggle('open');
    if (!isOpen) {
        // 展開時に contextSnippet を取得
        loadContextSnippet(card);
    }
}

async function loadContextSnippet(card) {
    const bookKey  = card.dataset.bookKey;
    const chapter  = parseInt(card.dataset.chapter);
    const verse    = parseInt(card.dataset.verse);
    const tokenIdx = parseInt(card.dataset.tokenIdx);
    const hitWord  = card.dataset.word;

    const ctxId = `ctx-${bookKey}-${chapter}-${verse}-${tokenIdx}`;
    const ctxEl = document.getElementById(ctxId);
    if (!ctxEl) return;
    if (ctxEl.dataset.loaded) return; // 既にロード済み

    const cacheKey = `${bookKey}-${chapter}`;
    let tokens = _verseCache.get(cacheKey);
    if (!tokens) {
        try {
            const data = await fetch(bibleDataPath(bookKey, chapter))
                .then(r => r.ok ? r.json() : [])
                .catch(() => []);
            tokens = Array.isArray(data) ? data : [];
            _verseCache.set(cacheKey, tokens);
        } catch {
            tokens = [];
        }
    }

    // 節内トークンを絞り込む
    const verseTokens = tokens.filter(t => {
        const r = String(t.ref || '');
        return r.endsWith(`:${verse}`);
    });

    // 日本語訳
    const jaText = _jaMap.get(`${bookKey}${String(chapter).padStart(2,'0')}${String(verse).padStart(2,'0')}`) || '';

    let html = '';
    if (jaText) {
        html += `<div class="result-ja">${escHtml(jaText)}</div>`;
    }

    if (verseTokens.length > 0) {
        const snippetHtml = verseTokens.map((t, i) => {
            const w = cleanText(t);
            const isHit = i === tokenIdx || w === hitWord;
            return `<span class="snippet-token${isHit ? ' hit' : ''}">${escHtml(w)}</span>`;
        }).join('');
        html += `<div class="context-snippet">${snippetHtml}</div>`;
    } else {
        html += `<div class="result-ja result-ja-empty">（節データ未取得）</div>`;
    }

    ctxEl.outerHTML = html;
    // loaded フラグは DOM 要素が変わるため不要（outerHTML 置換）
}

/* ══════════════════════════════════════════
   発見カード更新
══════════════════════════════════════════ */
function updateDiscCount(count) {
    const el = document.getElementById('disc-count');
    el.textContent = `${count} 件`;
    el.style.display = count > 0 ? 'inline-block' : 'none';
}

/* ══════════════════════════════════════════
   書物グループチップ描画
══════════════════════════════════════════ */
function renderBookChips() {
    const wrap = document.getElementById('book-chips');
    wrap.innerHTML = BOOK_GROUPS.map(g =>
        `<div class="book-chip active" data-group="${g.key}" onclick="toggleGroup('${g.key}')">${g.label}</div>`
    ).join('');
}

/* ══════════════════════════════════════════
   Registry からラベル取得
══════════════════════════════════════════ */
async function loadRegistry() {
    try {
        _registryData = await fetch('./syntax-registry.json').then(r => r.ok ? r.json() : null).catch(() => null);
    } catch { _registryData = null; }
}

function getTypeDefFromRegistry(syntaxId) {
    if (!_registryData) return null;
    const cats = _registryData.categories || {};
    for (const [, catVal] of Object.entries(cats)) {
        const subcats = catVal.subcategories || [];
        for (const sc of subcats) {
            for (const t of (sc.types || [])) {
                if (t.id === syntaxId) return t;
            }
        }
    }
    return null;
}

/* ══════════════════════════════════════════
   エスケープ
══════════════════════════════════════════ */
function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escId(s) {
    return String(s || '').replace(/[^a-zA-Z0-9]/g, '_');
}

/* ══════════════════════════════════════════
   メイン初期化
══════════════════════════════════════════ */
(async function init() {
    // 書物グループチップ描画
    renderBookChips();

    // syntax_id が空の場合
    if (!SYNTAX_ID) {
        document.getElementById('disc-label').textContent = '構文IDが指定されていません';
        document.getElementById('bc-syntax-id').textContent = '—';
        document.getElementById('results-list').innerHTML =
            `<div class="results-empty"><div class="results-empty-icon">⚠</div><div>URL に syntax_id パラメータを指定してください</div></div>`;
        return;
    }

    document.getElementById('bc-syntax-id').textContent = SYNTAX_ID;
    document.getElementById('disc-label').textContent = SYNTAX_ID;
    document.getElementById('results-list').innerHTML = '<div class="loading-msg">読み込み中…</div>';

    // Registry・インデックスを並行取得
    const [, hits] = await Promise.all([
        loadRegistry(),
        _cache.get(SYNTAX_ID),
    ]);

    _allHits = Array.isArray(hits) ? hits : [];

    // Registry からラベルを補完
    const typeDef = getTypeDefFromRegistry(SYNTAX_ID);
    if (typeDef) {
        document.getElementById('disc-label').textContent = typeDef.label_ja || SYNTAX_ID;
        document.getElementById('disc-sublabel').textContent = typeDef.label_en || '';
        document.getElementById('bc-syntax-id').textContent = typeDef.label_ja || SYNTAX_ID;
    }

    if (_allHits.length === 0) {
        document.getElementById('results-list').innerHTML =
            `<div class="results-empty"><div class="results-empty-icon">🔍</div><div>結果が見つかりません</div>
            <div style="font-size:0.75rem;margin-top:4px;color:var(--text-hint);">syntax-index/${escHtml(SYNTAX_ID)}.json が存在しないか、ヒットがありません</div></div>`;
        document.getElementById('results-status').textContent = '0 件';
        return;
    }

    applyFilters();
})();
</script>
