/* ══════════════════════════════════════════
   Semantic layer injection
   LN Layer / Cluster Layer / Concordance
   ══════════════════════════════════════════ */

/**
 * SSOT (Single Source of Truth):
 * index.html is the only authoritative source for data ACCESS.
 *
 * - getTokens()     : sole getter for the token array (ALL_TOKENS)
 * - getLemmaIndex() : sole getter for the lemma index (window.lemmaIndex)
 *
 * search.html role  : DATA INGESTION ONLY
 *   - Builds ALL_TOKENS via _indexChapter()
 *   - Builds window.lemmaIndex / window.morphIndex
 *   - Does NOT define getTokens() or getLemmaIndex()
 *   - Does NOT call these getters
 *
 * All Layers (LN / Cluster / Graph / Concordance) access data
 * exclusively through the two getters defined below.
 */

/* ──────────────────────────────────────────────────────────────
   Data accessors — defined here, used everywhere (index.html only)
   ────────────────────────────────────────────────────────────── */

/** Returns the full token array built by search.html. */
function getTokens() {
    return typeof ALL_TOKENS !== 'undefined' ? ALL_TOKENS : [];
}
/** Returns the current lemmaIndex built by search.html, or null. */
function getLemmaIndex() { return window.lemmaIndex || null; }

/* ──────────────────────────────────────────
   Shared lemmaIndex lookup helper
   Single access point for lemmaIndex.
   Used by Basic Concordance and Graph views.
   Graph / Fusion MUST go through this;
   they must never bypass Basic source rules.
   ────────────────────────────────────────── */

/**
 * _giListFromLemmaIndex(id)
 *
 * Returns the globalIdx array for a lemmaId by looking up its headword
 * via getLemmaIndex() (with NFD-normalised fallback).
 * This is the ONLY authorised access point for lemmaIndex lookups.
 * All concordance lookups — Basic and derived — must use this function.
 *
 * @param {string} id – lemmaId
 * @returns {number[]} array of globalIdx values (empty array if not found)
 */
function _giListFromLemmaIndex(id) {
    const idx = getLemmaIndex();
    if (!idx) return [];
    const entry  = _lexiconData[id];
    const hw     = entry?.headword || '';
    if (!hw) return [];
    const direct = idx.get(hw);
    if (direct && direct.length) return direct;
    const norm = hw.normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[⸀⸁⸂⸃⌈⌉.,;:·]/g, '').replace(/ς/g, 'σ').toLowerCase().trim();
    return idx.get(norm) || [];
}

/**
 * _jaGlossFromLemmaId(id)
 * Returns a Japanese gloss for a lemma by looking up the first token occurrence.
 * Falls back to the English gloss from lexicon if no Japanese is found.
 */
function _jaGlossFromLemmaId(id) {
    const giList = _giListFromLemmaIndex(id);
    for (const gi of giList.slice(0, 5)) {
        const ja = getTokens()[gi]?.japanese;
        if (ja && ja !== '-' && ja !== '—') return ja;
    }
    return '';
}

/* ══════════════════════════════════════════════════════════════
   StudyPanel injection — orchestrator  [STABLE / DO NOT EXTEND]

   Fixed layer order (UI structure must not change):
     ① Identity          — word chip / gloss / ref
     ② Cluster Layer     — co-occurrence cluster display (auxiliary)
     ③ Basic Concordance — FACT LAYER (canonical / lemmaIndex only)
     ④ Semantic Graph    — graph view (auxiliary, derived from Basic)
     ⑤ Further View      — Morphology / Syntax / Abbott-Smith

   Data flow (enforced):
     window.lemmaIndex  →  _giListFromLemmaIndex()  →  Basic Concordance only
     domainCodes        →  _buildClusterLayerHTML() →  Cluster Layer only

   Invariants:
     • Basic Concordance result is identical for a given lemmaId regardless
       of whether Graph or Cluster data are present.
     • All lemmaIndex access goes through _giListFromLemmaIndex().
   ══════════════════════════════════════════════════════════════ */

/* ══════════════════════════════════════════════════════════════════
   Semantic Domain / Cluster / Raw Code — 設計境界
   詳細: docs/semantic-domain.md

   ■ Raw Domain Code   clusterIndex のキー。ゼロ埋め有無で別エントリが存在する。
                       clusterIndex アクセスは必ず生コードで行うこと。
   ■ Normalized Code   ラベル辞書（semantic-domain-labels.json）用のキー。
                       clusterIndex のキーとして使用してはいけない。
   ■ Semantic Domain   Louw-Nida 意味領域。ユーザー向け表示分類。
   ■ Cluster           Semantic Domain 内の語群。1ドメインに複数存在しうる。
   ══════════════════════════════════════════════════════════════════ */

/**
 * UI ラベル取得専用。clusterIndex のアクセスには使用禁止。
 *
 * Raw Domain Code → Normalized Domain Code へ変換する。
 * 正規化後のコードは semantic-domain-labels.json のキーとして使用する。
 * domains-cluster-index.json (_clusterIndexData) のキーとして使ってはいけない。
 *
 * 変換規則: メジャードメイン部分（末尾3桁を除く全桁）の先頭ゼロを除去。
 * Examples: '033029' → '33029', '008002' → '8002', '064' → '64', '49' → '49'
 *
 * 根拠: ゼロ埋め有無で cluster は別エントリ（内容が異なる）。
 *       '013001'(19語) と '13001'(71語) は異なるクラスター。正規化して
 *       clusterIndex を引くと誤ったクラスターを参照する。docs/semantic-domain.md 参照。
 */
function _normalizeDomainCode(code) {
    const s = String(code).replace(/^0+/, '') || '0';
    if (s.length >= 4) {
        return String(parseInt(s.slice(0, -3), 10)) + s.slice(-3);
    }
    return s;
}

/**
 * Raw Code を受け取り、表示用ラベルのみ返す。
 *
 * clusterIndex へのアクセスは行わない。ラベル辞書 (_semanticDomainLabels) のみ参照。
 * 同じ Semantic Domain に属する複数の Raw Code（'013001' / '13001' 等）は
 * 正規化後に同一ラベルを返す — これは意図した動作（意味カテゴリーは同一のため）。
 *
 * Lookup order:
 *   1. subdomains[normalized]   specific subdomain label
 *   2. majorDomains[majorNum]   major domain fallback
 *   3. '分類 <code>'            final fallback — never returns empty
 */
function _getDomainLabel(code) {
    if (!_semanticDomainLabels) return `分類 ${code}`;
    const normalized = _normalizeDomainCode(code);

    const sub = _semanticDomainLabels.subdomains?.[normalized];
    if (sub?.title) return sub.title;

    let majorNum;
    if (normalized.length >= 4) {
        majorNum = String(parseInt(normalized.slice(0, -3), 10));
    } else {
        majorNum = normalized;
    }
    const major = _semanticDomainLabels.majorDomains?.[majorNum];
    if (major?.title) return major.title;

    return `分類 ${code}`;
}

/**
 * Semantic Domain オブジェクトを返す公開 API。
 *
 * Raw Domain Code を受け取り、ラベル辞書から解決した意味領域情報を返す。
 * 検索・フィルター・意味領域ブラウザ・関連語表示など、将来の機能で共通利用できる。
 *
 * clusterIndex へのアクセスは行わない。ラベル辞書 (_semanticDomainLabels) のみ参照。
 * 呼び出し前に _ensureSemanticData() が完了している必要がある。
 *
 * @param  {string} code  Raw Domain Code（例: '33029', '013001', '016'）
 * @returns {{
 *   rawCode:        string,   // 入力された生コードそのまま
 *   normalizedCode: string,   // 正規化コード（ラベル辞書キー）
 *   majorCode:      string,   // メジャードメイン番号（例: '33'）
 *   title:          string,   // 日本語タイトル（サブ or メジャー or フォールバック）
 *   titleEn:        string,   // 英語タイトル（存在する場合のみ）
 *   description:    string,   // 説明文（存在する場合のみ）
 * }}
 */
function _getSemanticDomain(code) {
    const rawCode        = String(code);
    const normalizedCode = _normalizeDomainCode(rawCode);
    const majorCode      = normalizedCode.length >= 4
        ? String(parseInt(normalizedCode.slice(0, -3), 10))
        : normalizedCode;

    if (!_semanticDomainLabels) {
        return { rawCode, normalizedCode, majorCode, title: `分類 ${rawCode}`, titleEn: '', description: '' };
    }

    const sub   = _semanticDomainLabels.subdomains?.[normalizedCode]  || {};
    const major = _semanticDomainLabels.majorDomains?.[majorCode]     || {};

    const title       = sub.title       || major.title       || `分類 ${rawCode}`;
    const titleEn     = sub.titleEn     || major.titleEn     || '';
    const description = sub.description || major.description || '';

    return { rawCode, normalizedCode, majorCode, title, titleEn, description };
}

/**
 * Cluster を描画する関数。Semantic Domain そのものを描画しているわけではない。
 *
 * 1つの Semantic Domain に複数の Cluster が存在するため、domainCodes に複数コードが
 * 含まれる場合は同じ「意味グループ」見出しのセクションが複数並ぶ。これは仕様であり
 * バグではない（例: κλητός の '33029' と '33030' は同一ドメイン内の別クラスター）。
 *
 * clusterIndex アクセスは生コード (code) そのままで行う。正規化コードで引いてはいけない。
 * domainCodes は lexicon-lite の domains[] フィールドから取得した Raw Domain Code の配列。
 */
function _buildClusterLayerHTML(domainCodes, currentLemmaId, currentWord) {
    const sections = [];

    for (const code of domainCodes.slice(0, 2)) {
        const entry = _clusterIndexData[code];
        if (!entry || !entry.lemmas) continue;

        const siblings = entry.lemmas
            .map(id => {
                const e = _lexiconData[id];
                if (!e) return null;
                return {
                    id,
                    headword: e.headword || '',
                    gloss: e.gloss_ja || _jaGlossFromLemmaId(id) || '',
                    count: e.count || 0,
                    isCurrent: id === currentLemmaId,
                };
            })
            .filter(Boolean)
            // 比較しやすさを優先し、意味グループ内は新約聖書での出現頻度順に表示する。
            .sort((a, b) => b.count - a.count);

        // UX方針: 初期表示は最小限にし、必要な場合のみ全件を表示する。
        const CHIP_SHOW = 5;
        const CHIP_MIN_OVER = 3;
        const useLimit = siblings.length > CHIP_SHOW + CHIP_MIN_OVER - 1;

        const chips = siblings.map((s, i) => {
            const hidden = useLimit && !s.isCurrent && i >= CHIP_SHOW;
            return `
            <span class="rn-sibling-chip${s.isCurrent ? ' current' : ''}${hidden ? ' rn-chip-hidden' : ''}" data-lemma-id="${s.id}" data-headword="${s.headword.replace(/"/g,'&quot;')}" data-cluster-id="${code}" title="${s.gloss}">
                <span class="rn-sibling-gr">${s.headword}</span>
                ${s.gloss ? `<span class="rn-sibling-ja">${s.gloss}</span>` : ''}

                ${s.isCurrent
                    ? `<span class="rn-sibling-badge">基準語</span>`
                    : `<span class="rn-sibling-action">用例を探す →</span>`}
            </span>`;
        }).join('');

        const hiddenCount = useLimit
            ? siblings.filter((s, i) => !s.isCurrent && i >= CHIP_SHOW).length
            : 0;
        const moreBtn = hiddenCount > 0
            ? `<button class="rn-chip-more">関連語をすべて表示</button>`
            : '';

        const domainTitle  = _getDomainLabel(code);
        sections.push(`
            <div class="rn-ln-domain-label">
                <span class="rn-ln-domain-category">意味グループ</span>
                <span class="rn-ln-domain-title">${domainTitle}</span>
            </div>
            <div class="rn-sibling-chips">${chips}</div>
            ${moreBtn}
        `);
    }

    if (!sections.length) return '';

    return `
    <div class="rn-cluster-section">
        <button class="rn-layer-toggle" data-target="rn-cluster-body">
            <span>意味が近い語を見る</span>
            <span class="rn-layer-toggle-icon icon">${icon('chevronRight')}</span>
        </button>
        <div class="rn-layer-body" id="rn-cluster-body">
            ${sections.join('')}
        </div>
    </div>`;
}


/**
 * TODO: _buildConcordanceHTML は未接続（_injectStudyPanelContent から呼ばれていない）。
 * 「さらに学ぶ」セクションへの用例一覧注入を将来実装する場合に使用する。
 * 実装するまでは削除せず保持する。接続する際は _injectStudyPanelContent を修正すること。
 *
 * Basic Concordance builder — canonical source of truth (fact layer).
 *
 * This is the ONLY authoritative concordance. It is strictly lemmaId-based,
 * driven by window.lemmaIndex, and preserves natural occurrence order.
 * No scoring or reranking is applied.
 *
 * @param {string} resolvedId  – lemmaId of the focused word (canonical source)
 * @param {string} word        – surface form (for Basic fallback lookup only)
 */
function _buildConcordanceHTML(resolvedId, word) {
    /*
     * Basic Concordance — canonical fact layer.
     * Builds HTML for actual verse occurrences of resolvedId.
     * Source: window.lemmaIndex via _giListFromLemmaIndex().
     * No scoring. No reordering. No fusion input.
     */
    if (!getLemmaIndex()) return '';

    const byVerse   = new Map();   // verseKey → { gi, tok }
    const VERSE_CAP = 60;

    /* Primary lookup: resolvedId via shared lemmaIndex helper */
    if (resolvedId) {
        for (const gi of _giListFromLemmaIndex(resolvedId)) {
            if (byVerse.size >= VERSE_CAP) break;
            const tok = getTokens()[gi];
            if (!tok) continue;
            const vk = `${tok.bookKey}:${tok.ch}:${tok.verse}`;
            if (!byVerse.has(vk)) byVerse.set(vk, { gi, tok });
        }
    }

    /* Fallback: surface form lookup — lemmaIndex only, no fusion */
    if (!byVerse.size) {
        const fallbackList = (word ? getLemmaIndex().get(word) : null) || [];
        for (const gi of fallbackList) {
            if (byVerse.size >= VERSE_CAP) break;
            const tok = getTokens()[gi];
            if (!tok) continue;
            const vk = `${tok.bookKey}:${tok.ch}:${tok.verse}`;
            if (!byVerse.has(vk)) byVerse.set(vk, { gi, tok });
        }
    }

    if (!byVerse.size) return '';

    const SHOW    = 30;
    const allRows = [...byVerse.values()];
    const rows    = allRows.slice(0, SHOW).map(({ gi, tok }) => {
        const start   = Math.max(0, gi - 3);
        const end     = Math.min(getTokens().length - 1, gi + 3);
        const snippet = getTokens().slice(start, end + 1).map((t, li) => {
            const isAnchor = start + li === gi;
            const txt = (t.text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
            return isAnchor ? `<span class="rn-concord-hl">${txt}</span>` : txt;
        }).join(' ');
        const refLabel = _rnFmtRef(tok);
        const href     = tok.bookKey && tok.ch
            ? `index.html?book=${tok.bookKey}&ch=${tok.ch}`
            : '#';
        return `<div class="rn-concord-row" onclick="window.open('${href}','_blank')">
            <div class="rn-concord-ref">${refLabel}</div>
            <div class="rn-concord-text">${snippet}</div>
        </div>`;
    }).join('');

    const moreNote = byVerse.size > SHOW
        ? `<div class="rn-concord-more">他 ${byVerse.size - SHOW} 節…</div>`
        : '';

    return `
    <div class="rn-concord-section">
        <button class="rn-layer-toggle" data-target="rn-concord-body">
            <span>用例一覧（${byVerse.size}節）</span>
            <span class="rn-layer-toggle-icon icon">${icon('chevronRight')}</span>
        </button>
        <div class="rn-layer-body" id="rn-concord-body">
            <div class="rn-concord-list">
                ${rows}
                ${moreNote}
            </div>
        </div>
    </div>`;
}

/* ══════════════════════════════════════════
   Semantic Graph View — 未接続（TODO）
   buildSemanticGraph は定義済みだが _injectStudyPanelContent から呼ばれていない。
   グラフ表示 UI を実装する際に接続すること。
   削除禁止: 将来の意味グラフ機能のために保持する。
   ══════════════════════════════════════════ */

/**
 * buildSemanticGraph(lemmaId)
 *
 * Structure assembler — builds a weighted node list centered on lemmaId.
 * Signal collection rules:
 *   LN membership      → lnSignal     (semantic category signal)
 *   Cluster membership → clusterSignal (relational proximity signal)
 *   Co-verse occurrence → coocHits    (contextual signal)
 *
 * Weight for each node is delegated entirely to scoreEngine.evaluate().
 * This function does NOT perform scoring; it only collects signals and
 * assembles the resulting structure.
 *
 * Returns { centerId, centerEntry, nodes } where nodes is sorted by
 * weight descending and capped at 20.
 */
function buildSemanticGraph(lemmaId) {
    const centerEntry = _lexiconData[lemmaId] || null;
    if (!centerEntry) return { centerId: lemmaId, centerEntry: null, nodes: [] };

    const lnCodes     = centerEntry.ln      || [];
    const domainCodes = centerEntry.domains || [];

    /* Step 1: Collect signals per candidate lemmaId — no scoring here */
    const candidateMap = new Map(); // lemmaId → { lnHit, clusterHit, coocHits[] }

    function _register(id, asLn, asCluster) {
        if (id === lemmaId) return;
        if (!candidateMap.has(id)) {
            candidateMap.set(id, { lnHit: false, clusterHit: false, coocHits: [] });
        }
        const c = candidateMap.get(id);
        if (asLn)      c.lnHit      = true;
        if (asCluster) c.clusterHit = true;
    }

    /* LN neighbors — semantic category signal */
    for (const ln of lnCodes.slice(0, 3)) {
        for (const id of (_lnIndexData[ln]?.lemmas || [])) _register(id, true, false);
    }

    /* Cluster neighbors — relational proximity signal */
    for (const code of domainCodes.slice(0, 3)) {
        for (const id of (_clusterIndexData[code]?.lemmas || [])) _register(id, false, true);
    }

    /* Co-verse occurrence — contextual signal (sample first 200 verses of center word) */
    /* Uses shared _giListFromLemmaIndex — same Basic source lookup rules */
    if (getLemmaIndex()) {
        const giList = _giListFromLemmaIndex(lemmaId);
        const SAMPLE_VERSES = 200;
        const WINDOW        = 5;
        let sampled = 0;
        for (const gi of giList) {
            if (sampled++ >= SAMPLE_VERSES) break;
            const start = Math.max(0, gi - WINDOW);
            const end   = Math.min(getTokens().length - 1, gi + WINDOW);
            for (let j = start; j <= end; j++) {
                if (j === gi) continue;
                const t = getTokens()[j];
                if (!t || !t.lemmaId || t.lemmaId === lemmaId) continue;
                if (!candidateMap.has(t.lemmaId)) {
                    candidateMap.set(t.lemmaId, { lnHit: false, clusterHit: false, coocHits: [] });
                }
                candidateMap.get(t.lemmaId).coocHits.push(t.text || '');
            }
        }
    }

    /* Step 2: Delegate scoring to scoreEngine — structure assembler does not score */
    const nodes = [];
    for (const [id, signals] of candidateMap) {
        const freq = _lexiconData[id]?.count || 0;
        const result = scoreEngine.evaluate({
            semantics: {
                baseScore:     Math.round(Math.log(freq + 1) * 10),
                lnSignal:      signals.lnHit,
                clusterSignal: signals.clusterHit,
                coocHits:      signals.coocHits,
            }
        });
        nodes.push({
            lemmaId: id,
            weight:  result.score,
            headword: _lexiconData[id]?.headword || id,
            gloss:    _jaGlossFromLemmaId(id),
        });
    }

    /* Step 3: Sort and cap — assembler responsibility */
    nodes.sort((a, b) => b.weight - a.weight);
    nodes.splice(20);

    return { centerId: lemmaId, centerEntry, nodes };
}

/* ══════════════════════════════════════════
   _injectStudyPanelContent
   Level 3（さらに学ぶ）のセマンティックレイヤーを非同期注入。
   _renderReadingNotes から呼ばれる。
   ══════════════════════════════════════════ */
async function _injectStudyPanelContent(semContainer, strong, lemmaId, word) {
    if (!semContainer) return;
    await _ensureSemanticData();

    const resolvedId  = lemmaId || _resolveLemmaId(strong);
    const lexEntry    = resolvedId ? _lexiconData[resolvedId] : null;
    const domainCodes = lexEntry?.domains || [];

    /*
     * Cluster Layer — 設計注意点
     *
     * 1つの Semantic Domain（意味領域）に複数の Cluster が存在するため、
     * domainCodes に含まれる複数の Raw Code が同一ドメインを指すことがある。
     * _buildClusterLayerHTML は先頭2コードをそれぞれ別セクションとして描画するため、
     * 「意味グループ」の見出しが同じタイトルで2行並ぶケースは仕様（バグではない）。
     *
     * 例: κλητός の domainCodes = ['33029', '33030']
     *   → 両方とも Semantic Domain 33（コミュニケーション）内の別 Cluster。
     *   → UI には「召す・呼び出す（261回）」と「招く・呼び寄せる（312回）」が並ぶ。
     *
     * 詳細: docs/semantic-domain.md
     */
    if (domainCodes.length > 0) {
        const clHTML = _buildClusterLayerHTML(domainCodes, resolvedId, word);
        if (clHTML) semContainer.insertAdjacentHTML('beforeend', clHTML);
    }

    /* アコーディオン構造の決定：item数に応じて分岐 */
    const toggleSections = semContainer.querySelectorAll('.rn-cluster-section, .rn-concord-section');

    if (toggleSections.length === 1) {
        /* 単一項目：トグルを除去してフラット展開 */
        const toggle = toggleSections[0].querySelector('.rn-layer-toggle');
        const body   = toggleSections[0].querySelector('.rn-layer-body');
        if (toggle) toggle.remove();
        if (body)   body.classList.add('visible');
        toggleSections[0].classList.add('rn-flat');

    } else if (toggleSections.length > 1) {
        /* 複数項目：従来通りトグルを配線 */
        semContainer.querySelectorAll('.rn-layer-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const bodyId = btn.dataset.target;
                const body   = document.getElementById(bodyId);
                if (!body) return;
                const isOpen = body.classList.contains('visible');
                body.classList.toggle('visible', !isOpen);
                btn.classList.toggle('open', !isOpen);
                const icon = btn.querySelector('.rn-layer-toggle-icon');
                if (icon) icon.style.transform = '';
            });
        });
    }

    /* Cluster chip → 共起検索へ遷移 */
    const clusterSection = semContainer.querySelector('.rn-cluster-section');
    if (clusterSection) {
        clusterSection.addEventListener('click', (e) => {
            const chip = e.target.closest('.rn-sibling-chip');
            if (!chip || chip.classList.contains('current')) return;
            e.stopPropagation();
            const hw = chip.dataset.headword || '';
            if (!hw) return;
            const p = new URLSearchParams();
            p.set('lemma', hw);
            const refLemmaId = AppState.inspect.data?.lemmaId;
            if (refLemmaId) p.set('ref_lemma', refLemmaId);
            const cmpLemmaId = chip.dataset.lemmaId;
            if (cmpLemmaId) p.set('cmp_lemma', cmpLemmaId);
            const clusterId = chip.dataset.clusterId;
            if (clusterId) p.set('cluster', clusterId);
            p.set('layers', 'lemma');
            window.open(`search-tool.html?${p.toString()}`, '_blank');
        });

        /* 「関連語をすべて表示」ボタン
           TODO: 現在は一括展開としている。
           将来的に段階的表示や別UIへの変更を検討する。 */
        clusterSection.querySelectorAll('.rn-chip-more').forEach(btn => {
            btn.addEventListener('click', () => {
                const chipsEl = btn.previousElementSibling;
                if (chipsEl) chipsEl.querySelectorAll('.rn-chip-hidden').forEach(c => c.classList.remove('rn-chip-hidden'));
                btn.remove();
            });
        });
    }
}

function _renderMorphTab(area, p) {

        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了', pluperfect:'大完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動', 'middle or passive':'中動/受動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法', imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },

    };

    const rows = [];
    if (p.pos)    rows.push({ k:'品詞',  v: JPN_FULL.pos[p.pos]    || p.pos,    core: true });
    if (p.tense)  rows.push({ k:'時制',  v: JPN_FULL.tense[p.tense]|| p.tense,  core: true });
    if (p.mood)   rows.push({ k:'法',    v: JPN_FULL.mood[p.mood]  || p.mood,   core: true });
    if (p.voice)  rows.push({ k:'態',    v: JPN_FULL.voice[p.voice]|| p.voice,  core: false });
    if (p.case)   rows.push({ k:'格',    v: JPN_FULL.case[p.case]  || p.case,   core: false });
    if (p.number) rows.push({ k:'数',    v: JPN_FULL.number[p.number]||p.number,core: false });
    if (p.gender) rows.push({ k:'性',    v: JPN_FULL.gender[p.gender]||p.gender,core: false });

        ? `<div class="ac-morph-grid">

    if (p.word) qs.set('word', p.word);
    if (lemma)  qs.set('lemma', lemma);
    if (p.pos)  qs.set('pos',   p.pos);
    if (p.tense) qs.set('tense', p.tense);
    if (p.mood)  qs.set('mood',  p.mood);
    if (p.voice) qs.set('voice', p.voice);
    if (p.gender) qs.set('gender', p.gender);
    if (p.number) qs.set('number', p.number);

    area.innerHTML = `

        </div>
        ${desc ? `<div class="ac-abbottsmith">${_escH(desc).replace(/\n/g,'<br>')}</div>` : ''}

/**
 * Flow タブ：「この語・この節が何をしているか」を読解補助として表示。
 * AIによるニュアンス補助（Anthropic API）。
 * データなし時はローカルルールベースフォールバックを表示。
 */
function _renderFlowTab(area, p) {
    const word   = p.word   || '-';
    const pos    = p.pos    || '';
    const mood   = p.mood   || '';
    const tense  = p.tense  || '';
    const voice  = p.voice  || '';
    const jaWord = (_inspectData && _inspectData.jaWord) || '';
    const ref    = p.ref    || '';

    /* ══════════════════════════════════════════
       ローカルフォールバック：9種 Flow signal
       「著者の流れ・強調・意図」を静かに補助する。
       チェックリスト化禁止。自然な文章として表示。
       ══════════════════════════════════════════ */
    const signals = [];
    // signal: { kind: CSS class suffix, kindLabel: 極小ラベル, text: 自然文 }

    /* ── #1 鍵となるフレーズ・単語（繰り返し・転換・強調） ── */
    if (pos === 'CONJ') {
        const CONJ_SIGNAL = {
            'γάρ':  { cls: 'sig-logic',    text: 'ここで理由が始まります。直前の主張の根拠として読むと、議論の構造が見えてきます。' },
            'ἀλλά': { cls: 'sig-turn',     text: '「しかし」による転換。ここで流れが変わります。' },
            'οὖν':  { cls: 'sig-logic',    text: 'ここで論理が結論へ進みます。前節の集約として読む箇所です。' },
            'δέ':   { cls: 'sig-turn',     text: '話が次の段階に進んでいます。微妙な展開・対比のサインです。' },
            'καί':  { cls: 'sig-emphasis', text: '内容が積み重なっています。強調の「そして」として機能する場合もあります。' },
            'ἵνα':  { cls: 'sig-logic',    text: '目的節。この語以降に「なぜそうするのか」という著者の意図が示されます。' },
            'ὅτι':  { cls: 'sig-logic',    text: '内容・理由節。以降が主張の根拠か内容補足になります。' },
            'εἰ':   { cls: 'sig-logic',    text: '条件節。仮定の前提の上で議論が展開されています。' },
            'ὥστε': { cls: 'sig-logic',    text: 'ここに議論の帰結があります。「その結果として」という流れです。' },
        };
        const s = CONJ_SIGNAL[word];
        if (s) signals.push({ cls: s.cls, kindLabel: '流れ', text: s.text });
        else   signals.push({ cls: 'sig-logic', kindLabel: '流れ', text: '接続詞。前後をつなぎ、議論の流れを形作っています。' });
    }

    /* ── #6 論理的展開（最重要：Flow の中心機能） ── */
    /* 動詞の法：命令・約束・宣言・論理を区別して表示 */
    if (pos === 'V') {
        /* #2 命令・勧め */
        if (mood === 'imperative') {
            signals.push({ cls: 'sig-exhort', kindLabel: '呼びかけ', text: 'ここは説明ではなく、行動への呼びかけです。' });
        }
        /* 接続法：目的・願望 */
        if (mood === 'subjunctive') {
            signals.push({ cls: 'sig-logic', kindLabel: '願い', text: '目的・条件・願望を表しています。断定ではなく「〜するために」「〜であれば」という含みです。' });
        }
        /* 不定詞：補足・目的 */
        if (mood === 'infinitive') {
            signals.push({ cls: 'sig-logic', kindLabel: '補足', text: '動作の目的か内容を補足する役割です。' });
        }
        /* 分詞：修飾・同時進行 */
        if (mood === 'participle') {
            signals.push({ cls: 'sig-logic', kindLabel: '背景', text: '主動詞の状況・背景を描写しています。' });
        }

        /* 時制による流れへの影響 */
        if (tense === 'aorist' && mood === 'indicative') {
            signals.push({ cls: 'sig-declare', kindLabel: '出来事', text: '「その出来事が起きた」という完結した事実の提示です。命令でも約束でもなく、宣言的な重みがあります。' });
        }
        if (tense === 'present' && mood === 'indicative') {
            signals.push({ cls: 'sig-logic', kindLabel: '継続', text: '継続・習慣・普遍的な事実として述べています。' });
        }
        if (tense === 'perfect') {
            signals.push({ cls: 'sig-promise', kindLabel: '今も続く', text: '過去の出来事の結果が今も有効です。単なる過去の話ではなく、現在の状態を含む表現です。' });
        }
        if (tense === 'future' && mood === 'indicative') {
            signals.push({ cls: 'sig-promise', kindLabel: '約束', text: 'これは命令というより、確かな約束・確約として機能していることがあります。' });
        }

        /* #7 語の選択：態のニュアンス */
        if (voice === 'passive') {
            signals.push({ cls: 'sig-word', kindLabel: '受けとめる', text: '主語は動作を受ける側に置かれています。神学的文脈では「神による行為」を暗示することがあります。' });
        }
        if (voice === 'middle' || voice === 'middle deponent') {
            signals.push({ cls: 'sig-word', kindLabel: '深く関わる', text: '主語が動作に深く関与しています。単なる能動でも受動でもない、自身が関わる動作です。' });
        }
    }

    /* ── 名詞系の格：論理的役割を「流れ」として表示 ── */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const CASE_SIGNAL = {
            nominative: { cls: 'sig-logic',   text: 'この語が文の中心にいます。主語または述語として機能しています。' },
            genitive:   { cls: 'sig-logic',   text: '「〜の」という関係を示します。所有・由来・特徴などのニュアンスがあります。' },
            dative:     { cls: 'sig-logic',   text: '動作の間接的な受け手・場所・手段を示します。' },
            accusative: { cls: 'sig-logic',   text: '動作の直接の対象です。' },
        };
        const caseSig = CASE_SIGNAL[p.case];
        if (caseSig) signals.push({ cls: caseSig.cls, kindLabel: '役割', text: caseSig.text });
    }

    /* ── #5 比喩表現：特定語の比喩的使用に注意を促す ── */
    const METAPHOR_WORDS = {
        'περιπατέω': '「歩む」は、ここでは文字通りの歩行ではなく、生き方・行動様式の比喩として使われています。',
        'περιπατεῖν': '「歩む」は、生き方の比喩として使われています。',
        'φωτί':      '「光」は比喩的な表現として機能していることが多く、知識・啓示・義などを指すことがあります。',
        'σκότος':    '「闇」は比喩的に罪・無知・神との断絶を示すことがあります。',
        'σταυρός':   '十字架は当時の読者にとって処刑の道具であると同時に、贖いの象徴として受け取られた語です。',
    };
    if (METAPHOR_WORDS[word]) {
        signals.push({ cls: 'sig-metaphor', kindLabel: '比喩', text: METAPHOR_WORDS[word] });
    }

    if (signals.length === 0) {
        signals.push({ cls: 'sig-default', kindLabel: '補足', text: 'この語の文脈的な役割は「含み」タブでさらに確認できます。' });
    }

    /* signals を prose として統合（列挙しない） */
    const localHTML = `<div class="flow-signal-text reading-prose">${signals.map(s => s.text).join('　')}</div>`;

    area.innerHTML = `
        <div class="flow-word-head">
            <span class="flow-greek greek-headword">${word}</span>${jaWord ? `<span class="flow-ja">　${jaWord}</span>` : ''}
        </div>
        ${ref ? `<div class="flow-ref">${ref}</div>` : ''}
        <div class="flow-hints reading-block" id="flow-hints-local">
            ${localHTML}
        </div>
    `;
}

/**
 * Meaning タブ：「この語が今この文脈でどう響くか」を読書補助として表示。
 * Abbott-Smith は Study → Semantics へ移動済み。
 * ここは辞書ではなく、tone / relational force / contextual nuance の層。
 */
function _renderMeaningTab(area, p) {
    const word   = p.word   || '-';
    const jaWord = (_inspectData && _inspectData.jaWord) || '-';
    const ref    = p.ref    || '';

    /* ローカルルールベースの Meaning signals */
    const meaningSignals = _buildMeaningSignals(p);
    const signalHTML = meaningSignals.length
        ? `<div class="flow-signal-text reading-prose">${meaningSignals.map(s => s.text).join('<br>')}</div>`
        : `<div class="flow-signal-text" style="color:var(--text-sub);">原語の詳細は「原語を見る」から確認できます。</div>`;

    area.innerHTML = `
        <div class="flow-word-head">
            <span class="flow-greek greek-headword">${word}</span><span class="flow-ja">　${jaWord}</span>
        </div>
        ${ref ? `<div class="flow-ref">${ref}</div>` : ''}
        <div class="flow-hints reading-block">
            ${signalHTML}
        </div>
    `;
}

/**
 * Meaning タブ用ローカルシグナル生成。
 * AIなし。形態論データからルールベースでシグナルを導出する。
 */
function _buildMeaningSignals(p) {
    const signals = [];
    const pos   = p.pos   || '';
    const mood  = p.mood  || '';
    const tense = p.tense || '';
    const voice = p.voice || '';
    const word  = p.word  || '';

    if (pos === 'V') {
        if (mood === 'imperative') {
            signals.push({ cls: 'sig-exhort', kindLabel: '行為', text: '命令形。説明ではなく、行動への直接の呼びかけとして機能しています。' });
        }
        if (mood === 'subjunctive') {
            signals.push({ cls: 'sig-logic', kindLabel: '態度', text: '接続法。断定ではなく、目的・願望・可能性の含みをもちます。' });
        }
        if (mood === 'participle') {
            signals.push({ cls: 'sig-logic', kindLabel: '修飾', text: '分詞。主動詞の状況・背景・手段として機能しています。' });
        }
        if (tense === 'perfect') {
            signals.push({ cls: 'sig-promise', kindLabel: '状態', text: '完了形。過去の出来事の結果が現在も有効であることを示します。' });
        }
        if (tense === 'aorist' && mood === 'indicative') {
            signals.push({ cls: 'sig-declare', kindLabel: '宣言', text: 'アオリスト直説法。完結した出来事の事実提示。宣言的な重みがあります。' });
        }
        if (tense === 'future') {
            signals.push({ cls: 'sig-promise', kindLabel: '約束', text: '未来形。確かな約束・確約として機能することがあります。' });
        }
        if (voice === 'passive') {
            signals.push({ cls: 'sig-word', kindLabel: '態', text: '受動態。神学的文脈では「神による行為」を暗示することがあります。' });
        }
        if (voice === 'middle' || voice === 'middle deponent') {
            signals.push({ cls: 'sig-word', kindLabel: '態', text: '中動態。主語が動作に深く関与しています。' });
        }
    }

    if (pos === 'CONJ') {
        const CONJ_MEANING = {
            'γάρ':  { cls: 'sig-logic',    kindLabel: '論理', text: '理由の接続詞。前の主張への根拠として読みます。' },
            'ἀλλά': { cls: 'sig-turn',     kindLabel: '転換', text: '強い対比・転換。ここで話の方向が変わります。' },
            'οὖν':  { cls: 'sig-logic',    kindLabel: '帰結', text: '論理的帰結。前節の議論をここで集約しています。' },
            'δέ':   { cls: 'sig-turn',     kindLabel: '展開', text: '微妙な転換・進展のサイン。' },
            'καί':  { cls: 'sig-emphasis', kindLabel: '付加', text: '並列・強調。内容が積み重なっています。' },
            'ἵνα':  { cls: 'sig-logic',    kindLabel: '目的', text: '目的節。著者の意図がこの語の後に示されます。' },
            'ὅτι':  { cls: 'sig-logic',    kindLabel: '内容', text: '内容・理由節。主張の根拠か内容補足になります。' },
        };
        const cs = CONJ_MEANING[word];
        if (cs) signals.push(cs);
        else signals.push({ cls: 'sig-logic', kindLabel: '接続', text: '接続詞。前後の節をつなぎ、議論の流れを形作っています。' });
    }

    if (signals.length === 0) {
        signals.push({ cls: 'sig-default', kindLabel: '補足', text: 'この語の特記すべき語用論的特徴はありません。' });
    }

    return signals;
}

/**
 * Study タブ：「なぜそう読める？」を支える根拠層。
 * 構造:
 *   Study
 *   ├ 語形・文法（Morphology）← open
 *   ├ 論理構造（Syntax）← AI読解説明 + ローカル構文関係 + 静かな構文ツリー
 *   ├ 意味論的根拠（Semantics）← Abbott-Smith
 *   └ 詳細検索
 *
 * Flow → Meaning → Study の思想維持。Study が主役に戻らない。
 * Syntax は「構文分析」ではなく「著者の論理構造を理解する補助」。
 */
function _renderStudyTab(area, p) {
    const JPN_FULL = {
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞', ADV:'副詞', PREP:'前置詞', CONJ:'接続詞', PRT:'添語' },
        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了', pluperfect:'大完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動', 'middle or passive':'中動/受動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法', imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },
        person: { '1':'1人称', '2':'2人称', '3':'3人称' },
    };

    /* ── Morphology ── */
    const rows = [];
    if (p.pos)    rows.push({ k:'品詞',  v: JPN_FULL.pos[p.pos]    || p.pos,    core: true });
    if (p.tense)  rows.push({ k:'時制',  v: JPN_FULL.tense[p.tense]|| p.tense,  core: true });
    if (p.mood)   rows.push({ k:'法',    v: JPN_FULL.mood[p.mood]  || p.mood,   core: true });
    if (p.voice)  rows.push({ k:'態',    v: JPN_FULL.voice[p.voice]|| p.voice,  core: false });
    if (p.case)   rows.push({ k:'格',    v: JPN_FULL.case[p.case]  || p.case,   core: false });
    if (p.number) rows.push({ k:'数',    v: JPN_FULL.number[p.number]||p.number,core: false });
    if (p.gender) rows.push({ k:'性',    v: JPN_FULL.gender[p.gender]||p.gender,core: false });

    const coreRows  = rows.filter(r => r.core);
    const extraRows = rows.filter(r => !r.core);

    const _morphRowsHTML = (rr) => rr.map(r => `
        <span class="ac-morph-key">${r.k}</span>
        <span class="ac-morph-val${r.core ? ' core' : ''}">${r.v}</span>
    `).join('');

    const morphGridHTML = rows.length
        ? `<div class="ac-morph-grid">
            ${_morphRowsHTML(coreRows)}
           </div>${extraRows.length ? `
           <div class="morph-grid-expand">
               <button class="morph-grid-expand-btn" onclick="(function(btn){var el=btn.closest('.study-details-body').querySelector('.morph-grid-extra');el.classList.toggle('visible');btn.innerHTML=el.classList.contains('visible')?(icon('chevronUp')+' 閉じる'):(icon('chevronDown')+' 態・格・数・性を見る');})(this)">${icon('chevronDown')} 態・格・数・性を見る</button>
               <div class="morph-grid-extra">
                   <div class="ac-morph-grid" style="margin-top: var(--space-xs);">
                       ${_morphRowsHTML(extraRows)}
                   </div>
               </div>
           </div>` : ''}`
        : `<p class="ac-no-data">語形データがありません</p>`;

    const jaWord = (_inspectData && _inspectData.jaWord) || '-';
    const desc   = (_inspectData && _inspectData.desc)   || '';
    const strong = (_inspectData && _inspectData.strong)  || '';
    const ref    = p.ref || '';
    const lemma  = p.lemma || '';

    /* ── URL ── */
    const qsMorph = new URLSearchParams();
    if (ref)      qsMorph.set('ref',   ref);
    if (p.word)   qsMorph.set('word',  p.word);
    if (lemma)    qsMorph.set('lemma', lemma);
    if (p.pos)    qsMorph.set('pos',   p.pos);
    if (p.tense)  qsMorph.set('tense', p.tense);
    if (p.mood)   qsMorph.set('mood',  p.mood);
    if (p.voice)  qsMorph.set('voice', p.voice);
    if (p.gender) qsMorph.set('gender',p.gender);
    if (p.number) qsMorph.set('number',p.number);
    if (p.case)   qsMorph.set('case',  p.case);
    if (jaWord && jaWord !== '-') qsMorph.set('jword', jaWord);
    const qsMorphM2 = new URLSearchParams(qsMorph); qsMorphM2.set('tool', 'morph');
    const qsMorphS2 = new URLSearchParams(qsMorph); qsMorphS2.set('tool', 'syntax');
    const morphSearchURL = `morph-search.html?${qsMorphM2.toString()}`;
    const syntaxURL      = `syntax-search.html?${qsMorphS2.toString()}`;
    const qsSem = new URLSearchParams();
    if (ref)    qsSem.set('ref',   ref);
    if (p.word) qsSem.set('word',  p.word);
    if (lemma)  qsSem.set('lemma', lemma);
    if (p.pos)  qsSem.set('pos',   p.pos);
    const semanticsURL = `semantic-search.html?${qsSem.toString()}`;

    /* ── Semantics: Abbott-Smith ── */
    const abbottBody = desc
        ? `<div class="semantics-abbott">${_escH(desc).replace(/\n/g,'<br>')}</div>`
        : `<p class="ac-no-data" style="padding: var(--space-sm) 0;">辞書データが見つかりません</p>`;
    const semanticsSectionHTML = `
        <details class="study-details">
            <summary class="study-summary"><span class="study-summary-inner"><span>語の意味</span><span class="study-summary-sub">Semantics · 辞書・意味論</span></span></summary>
            <div class="study-details-body">
                ${strong ? `<div class="semantics-note">
                    <span class="semantics-note-label">Abbott-Smith Lexicon · ${strong}</span>
                    ${abbottBody}
                </div>` : abbottBody}
            </div>
        </details>`;

    /* ── Syntax: ローカルルールベース構文関係 ── */
    /* 読解上の意味 → 構文根拠 → 詳細構造 の順で表示する */
    const synRelations = _buildSyntaxRelations(p, JPN_FULL);
    const synTreeHTML  = _buildSyntaxTree(p, JPN_FULL, jaWord);

    const syntaxSectionHTML = `
        <details class="study-details">
            <summary class="study-summary"><span class="study-summary-inner"><span>文の構造</span><span class="study-summary-sub">Syntax · 統語・構文関係</span></span></summary>
            <div class="study-details-body">
                <!-- 構文関係（ローカルルール） -->
                ${synRelations.length ? `
                <div class="syntax-relations" id="syntax-relations">
                    ${synRelations.map(r => `
                    <div class="syntax-rel-row">
                        <span class="syntax-rel-kind">${r.kind}</span>
                        <span class="syntax-rel-text">${r.text}</span>
                    </div>`).join('')}
                </div>` : ''}

                <!-- 構文構造（折りたたみ内に収める） -->
                ${synTreeHTML ? `
                <details class="study-details" style="margin-top: var(--space-xs);border-top:1px solid rgba(0,0,0,0.04);">
                    <summary class="study-summary" style="font-size: var(--text-caption);">構文構造を見る</summary>
                    <div class="study-details-body" style="padding-top: var(--space-xs);">
                        <div class="syntax-tree">${synTreeHTML}</div>
                    </div>
                </details>` : ''}
            </div>
        </details>`;

    area.innerHTML = `
        <div class="flow-word-head">
            <span class="flow-greek greek-headword">${p.word || '-'}</span><span class="flow-ja">　${jaWord}</span>
        </div>
        ${ref ? `<div class="flow-ref">${ref}</div>` : ''}

        <!-- 語形・文法（Morphology）: デフォルト open -->
        <details class="study-details" open>
            <summary class="study-summary"><span class="study-summary-inner"><span>語形・文法</span><span class="study-summary-sub">Morphology · 品詞・時制・法</span></span></summary>
            <div class="study-details-body">
                ${morphGridHTML}
            </div>
        </details>

        <!-- 論理構造（Syntax）-->
        ${syntaxSectionHTML}

        <!-- 意味論的根拠（Semantics）-->
        ${semanticsSectionHTML}

        <!-- 詳細検索 -->
        <details class="study-details">
            <summary class="study-summary"><span class="study-summary-inner"><span>詳細検索</span><span class="study-summary-sub">Research · 同語形・構文・意味で探す</span></span></summary>
            <div class="study-details-body">
                <div class="ac-morph-search-row">
                    <a href="${morphSearchURL}" class="morph-search-btn">同語形を探す →</a>
                    <a href="${syntaxURL}"      class="morph-search-btn">構文で探す →</a>
                    <a href="${semanticsURL}"   class="morph-search-btn">意味で探す →</a>
                </div>
            </div>
        </details>

        <!-- Research Tools（折りたたみ。初期状態は閉じている） -->
        <div class="rt-section" id="rt-section">
            <button class="rt-open-btn" id="rt-open-btn" onclick="_rtToggle()">
                <span class="rt-open-btn-icon" data-icon="chevronRight"></span>研究ツールを開く
            </button>
            <div class="rt-body" id="rt-body">
                <!-- Research Tools 内タブ: 語形検索 / 構文検索 / 意味検索 -->
                <div class="rt-tabs">
                    <button class="rt-tab active" id="rt-tab-morph"   onclick="_rtSwitchTab('morph')">語形検索</button>
                    <button class="rt-tab"        id="rt-tab-syntax"  onclick="_rtSwitchTab('syntax')">構文検索</button>
                    <button class="rt-tab"        id="rt-tab-sem"     onclick="_rtSwitchTab('sem')">意味検索</button>
                </div>

                <!-- 語形検索 -->

/**
 * ローカルルールベースで「構文関係」テキストを生成。
 * 品詞・法・時制・格から「この語が論理上何をしているか」を読解補助として記述。
 * linguistics用語の羅列禁止。自然な読解文として書く。
 *
 * @returns Array<{kind:string, text:string}>
 */
function _buildSyntaxRelations(p, JPN) {
    const rels = [];
    const pos   = p.pos   || '';
    const mood  = p.mood  || '';
    const tense = p.tense || '';
    const voice = p.voice || '';

    /* 接続詞：節の論理関係 */
    if (pos === 'CONJ') {
        const CONJ_LOGIC = {
            'γάρ':  { kind: '理由節',  text: 'この語以降が直前の主張の根拠節として機能しています。' },
            'ἀλλά': { kind: '対比節',  text: '前節との対比・反転を示す節境界です。' },
            'οὖν':  { kind: '結論節',  text: '前節の議論を受けた結論節が始まります。' },
            'δέ':   { kind: '展開',    text: '前節に続く展開または対比の接続点です。' },
            'καί':  { kind: '並列',    text: '前節と並列関係にある節が続きます。' },
            'ἵνα':  { kind: '目的節',  text: 'この語以降が目的節：「〜するために」という従属節です。' },
            'ὅτι':  { kind: '補足節',  text: '内容節または理由節として前節を補足しています。' },
            'εἰ':   { kind: '条件節',  text: '条件節：「〜ならば」という仮定の節を導きます。' },
            'ὥστε': { kind: '結果節',  text: '結果節：前節の帰結として「〜になった」を示します。' },
        };
        const word = p.word || '';
        const r = CONJ_LOGIC[word];
        if (r) rels.push(r);
        else   rels.push({ kind: '接続',  text: '前後の節をつなぐ論理的接点です。' });
    }

    /* 動詞：節内の役割 */
    if (pos === 'V') {
        /* 法による節の機能 */
        if (mood === 'imperative') {
            rels.push({ kind: '主節',   text: 'この動詞が節の中心命令を担っています。要求・指示の主語述語構造です。' });
        } else if (mood === 'subjunctive') {
            rels.push({ kind: '従属節', text: '接続法として従属節内に位置し、目的・条件・願望を支えています。' });
        } else if (mood === 'infinitive') {
            rels.push({ kind: '補語',   text: '不定詞として主動詞の補語または目的語の役割を担っています。' });
        } else if (mood === 'participle') {
            rels.push({ kind: '修飾',   text: '分詞として主節の主語または動作の状況・背景を修飾しています。' });
        } else if (mood === 'indicative') {
            rels.push({ kind: '主節',   text: '直説法として節の主動詞に位置しています。' });
        }

        /* 時制による時間軸上の位置 */
        if (tense === 'aorist' && mood === 'indicative') {
            rels.push({ kind: '時制軸', text: '時制上、完結した出来事として主節に先行するか同時点に置かれています。' });
        } else if (tense === 'perfect') {
            rels.push({ kind: '時制軸', text: '完了形として、過去の出来事の結果が今も有効であるという論理的含意を持ちます。' });
        } else if (tense === 'present' && mood === 'indicative') {
            rels.push({ kind: '時制軸', text: '現在時制として、論理上の普遍命題または継続する状態として機能しています。' });
        }

        /* 態による動作構造 */
        if (voice === 'passive') {
            rels.push({ kind: '動作構造', text: '受動態。主語は動作の受け手として節内に配置されています。' });
        } else if (voice === 'middle' || voice === 'middle deponent') {
            rels.push({ kind: '動作構造', text: '中動態。主語が動作に深く関与する自動詞的構造です。' });
        }
    }

    /* 名詞・代名詞：節内の格役割 */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const CASE_ROLE = {
            nominative: { kind: '格役割', text: '主格として、この節の主語または述語主格の位置にあります。' },
            genitive:   { kind: '格役割', text: '属格として、修飾語または「〜の」という関係を節内で担っています。' },
            dative:     { kind: '格役割', text: '与格として、動作の間接目的・場所・手段の位置にあります。' },
            accusative: { kind: '格役割', text: '対格として、動詞の直接目的語または動作の到達点に配置されています。' },
            vocative:   { kind: '格役割', text: '呼格として、節の主述関係の外に位置する呼びかけです。' },
        };
        const r = CASE_ROLE[p.case];
        if (r) rels.push(r);
    }

    return rels;
}

/**
 * 「静かな構文ツリー」HTML を生成。
 * ROOT / NP / VP / CP のような学術ラベル禁止。
 * 読解補助として「誰が」「何を」「どういう関係で」を示す。
 * モバイルで横スクロール地獄にならないよう幅を抑える。
 *
 * @returns HTML string（構文ツリー行群）
 */
function _buildSyntaxTree(p, JPN, jaWord) {
    const pos   = p.pos   || '';
    const mood  = p.mood  || '';
    const tense = p.tense || '';
    const voice = p.voice || '';
    const word  = p.word  || '-';
    const rows  = [];

    /* ヘルパー：インデントと接続文字を組み合わせた1行を生成 */
        const treeRow = (indent, isLast, role, content, note = '', rawMorphForRow = '') => {
        const dpCls = rawMorphForRow ? buildDepthGrammarClasses(rawMorphForRow).join(' ') : '';
        const contentHtml = dpCls
            ? `<span class="${dpCls}">${content}</span>`
            : content;
        return `<div class="syntax-tree-row">` +
        `${'<span class="syntax-tree-indent">  </span>'.repeat(indent)}` +
        `<span class="syntax-tree-connector">${isLast ? '└' : '├'}</span>` +
        `<span class="syntax-tree-role">${role}</span>` +
        `<span class="syntax-tree-content">${contentHtml}</span>` +
        `${note ? `<span class="syntax-tree-note">${note}</span>` : ''}` +
        `</div>`;
    };

    /* 動詞中心の構造 */
    if (pos === 'V') {
        const moodLabel  = JPN.mood[mood]   || mood  || '';
        const tenseLabel = JPN.tense[tense] || tense || '';
        const voiceLabel = JPN.voice[voice] || voice || '';

        /* ルート：動詞節 */
        rows.push(`<div class="syntax-tree-row"><span class="syntax-tree-role" style="font-size: var(--text-caption);opacity: var(--opacity-tertiary);">節</span><span class="syntax-tree-content" style="opacity: var(--opacity-secondary);">述語構造</span></div>`);

        if (mood === 'participle') {
                    rows.push(treeRow(0, false, '述語分詞', word, `${tenseLabel}・${voiceLabel}`, rawMorph));
        rows.push(treeRow(1, false, '機能', '主節の動作を修飾', ''));
        rows.push(treeRow(1, true,  '法',   moodLabel, ''));
    } else if (mood === 'infinitive') {
        rows.push(treeRow(0, false, '動詞', word, `${tenseLabel}`, rawMorph));
        rows.push(treeRow(1, false, '機能', '主動詞の補語', ''));
        rows.push(treeRow(1, true,  '法',   moodLabel, ''));
    } else {
        rows.push(treeRow(0, false, '述語', word, `${moodLabel}・${tenseLabel}${voiceLabel ? '・' + voiceLabel : ''}`, rawMorph));
            if (mood === 'imperative') {
                rows.push(treeRow(1, false, '節種', '命令節（主節）', ''));
                rows.push(treeRow(1, true,  '主語', '（2人称：省略）', ''));
            } else if (mood === 'subjunctive') {
                rows.push(treeRow(1, true, '節種', '従属節（接続法）', ''));
            } else if (mood === 'indicative') {
                rows.push(treeRow(1, true, '節種', '主節（直説法）', ''));
            }
        }
    }

    /* 名詞・代名詞・冠詞系 */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const caseLabel   = JPN.case[p.case]     || p.case   || '';
        const numberLabel = JPN.number[p.number] || p.number || '';
        const genderLabel = JPN.gender[p.gender] || p.gender || '';
        const posLabel    = JPN.pos[pos]          || pos;

        rows.push(`<div class="syntax-tree-row"><span class="syntax-tree-role" style="font-size: var(--text-caption);opacity: var(--opacity-tertiary);">句</span><span class="syntax-tree-content" style="opacity: var(--opacity-secondary);">名詞句</span></div>`);
        rows.push(treeRow(0, false, posLabel, word, `${caseLabel}${numberLabel ? '・'+numberLabel : ''}${genderLabel ? '・'+genderLabel : ''}`));

        const CASE_FUNC = {
            nominative: '主語または述語主格',
            genitive:   '修飾語（〜の）',
            dative:     '間接目的語・場所・手段',
            accusative: '直接目的語',
            vocative:   '呼びかけ（独立）',
        };
        const func = CASE_FUNC[p.case];
        if (func) rows.push(treeRow(1, true, '節内機能', func, ''));
    }

    /* 接続詞 */
    if (pos === 'CONJ') {
        rows.push(`<div class="syntax-tree-row"><span class="syntax-tree-role" style="font-size: var(--text-caption);opacity: var(--opacity-tertiary);">接続</span><span class="syntax-tree-content" style="opacity: var(--opacity-secondary);">節境界</span></div>`);
        rows.push(treeRow(0, false, '接続詞', word, ''));
        rows.push(treeRow(1, false, '先行節', '（前節）', ''));
        rows.push(treeRow(1, true,  '後続節', '（後節）', ''));
    }

    return rows.join('');
}

/* ══════════════════════════════════════════
   Research Tools - Study タブ内の静かな探索補助
   ══════════════════════════════════════════

   責務分離:
     _rtToggle()          … Research Tools の開閉
     _rtSwitchTab(name)   … Morph / Syntax / Sem タブ切り替え
     _rtInitSemChips()    … Semantic チップのクリック制御初期化
     _rtRunMorphSearch()  … Morph Search 実行（ローカルフォールバック）
     _rtRunSyntaxSearch() … Syntax Search 実行（ローカルフォールバック）
     _rtRunSemSearch()    … Semantic Search 実行（ローカルフォールバック）
     _rtCallAI(prompt, loadingId, resultsId, parser)
                          … 将来の拡張用スタブ

   設計方針:
     - AIは「読解補助」に限定：用例説明・ニュアンス解説のみ
     - 長文講義・神学断定・辞書dump禁止
     - エラー時は静かに失敗（読書UXを壊さない）
   ══════════════════════════════════════════ */

/** Research Tools の開閉トグル */
function _rtToggle() {
    const btn  = document.getElementById('rt-open-btn');
    const body = document.getElementById('rt-body');
    if (!btn || !body) return;
    const isOpen = body.classList.contains('visible');
    body.classList.toggle('visible', !isOpen);
    btn.classList.toggle('expanded', !isOpen);
    /* ラベルも切り替え */
    const label = btn.childNodes[1];
    if (label) label.textContent = isOpen ? '研究ツールを開く' : '研究ツールを閉じる';
}

/** Research Tools 内タブ切り替え（morph / syntax / sem） */
function _rtSwitchTab(name) {
    ['morph','syntax','sem'].forEach(t => {
        const tab = document.getElementById(`rt-tab-${t}`);
        const cnt = document.getElementById(`rt-content-${t}`);
        if (tab) tab.classList.toggle('active', t === name);
        if (cnt) cnt.classList.toggle('visible', t === name);
    });
}

/** Semantic Search チップの単一選択制御を初期化 */
function _rtInitSemChips() {
    const chips = document.querySelectorAll('.rt-concept-chip');
    chips.forEach(chip => {
        chip.addEventListener('click', () => {
            const wasSelected = chip.classList.contains('selected');
            chips.forEach(c => c.classList.remove('selected'));
            if (!wasSelected) chip.classList.add('selected');
        });
    });
}

/**
 * API 共通呼び出し（廃止：AIなし設計に移行）
 */
async function _rtCallAI(prompt, loadingId, resultsId, renderer) {
    const loadingEl = document.getElementById(loadingId);
    const resultsEl = document.getElementById(resultsId);
    if (loadingEl) loadingEl.classList.remove('visible');
    if (resultsEl) resultsEl.innerHTML = `<div class="rt-no-result">現在この機能はご利用できません。</div>`;
}

/**
 * 結果テキストを rt-result-block 群に変換して描画。
 * AIには「---」区切りで複数結果を返すよう指示する。
 * 各ブロックは「種別: / 内容: / 参照:」の3行構成（なければ省略）。
 */
function _rtRenderResults(text, resultsEl) {
    if (!text) {
        resultsEl.innerHTML = `<div class="rt-no-result">該当する用例が見つかりませんでした。</div>`;
        return;
    }
    /* ブロック分割（--- 区切り）*/
    const blocks = text.split(/---+/).map(b => b.trim()).filter(Boolean);
    if (blocks.length === 0) {
        resultsEl.innerHTML = `<div class="rt-result-block"><span class="rt-result-text">${_escH(text).replace(/\n/g,'<br>')}</span></div>`;
        return;
    }
    resultsEl.innerHTML = blocks.map(block => {
        /* 各ブロックからラベル・本文・参照を抽出 */
        const kindMatch = block.match(/^種別[:：]\s*(.+)/m);
        const textMatch = block.match(/^内容[:：]\s*([\s\S]+?)(?=参照[:：]|$)/m);
        const refMatch  = block.match(/^参照[:：]\s*(.+)/m);
        const kind   = kindMatch ? kindMatch[1].trim() : '';
        const body   = textMatch ? textMatch[1].trim() : block.replace(/^種別.+\n?/m,'').trim();
        const ref    = refMatch  ? refMatch[1].trim()  : '';
        return `<div class="rt-result-block">
            ${kind ? `<span class="rt-result-kind">${kind}</span>` : ''}
            <span class="rt-result-text">${_escH(body).replace(/\n/g,'<br>')}</span>
            ${ref  ? `<span class="rt-result-ref">${icon('pin')} ${_escH(ref)}</span>` : ''}
        </div>`;
    }).join('');
}

        pos:    {V:'動詞',N:'名詞',A:'形容詞',P:'人称代名詞',R:'関係代名詞',T:'冠詞',CONJ:'接続詞',PREP:'前置詞'},
        tense:  {present:'現在',imperfect:'未完了',aorist:'アオリスト',perfect:'完了',future:'未来'},
        mood:   {indicative:'直説法',imperative:'命令法',subjunctive:'接続法',participle:'分詞',infinitive:'不定詞'},
        voice:  {active:'能動',middle:'中動',passive:'受動'},

        number: {singular:'単数',plural:'複数'},

    const moodV = moodEl.value;   if (moodV)   conditions.push(`法：${JPN.mood[moodV]    || moodV}`);

    const numV  = numberEl.value; if (numV)    conditions.push(`数：${JPN.number[numV]   || numV}`);

内容: [この用例が読解上どのように機能しているか、読者が理解できる自然な文で（1〜2文。150字以内）]

/* ══════════════════════════════════════════
   buildDepthGrammarClasses
   Depth Panel 限定の文法装飾クラスを合成して返す。
   原文文字列は一切変更しない。
   ══════════════════════════════════════════ */
function buildDepthGrammarClasses(rawMorph) {
    const classes = ['dp-word'];
    if (!rawMorph) return classes;

    const parts = rawMorph.split('-');
    const pos   = parts[0] || '';

    if (pos === 'V' && parts[1]) {
        const off      = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenCode  = parts[1][off]     || '';
        const voiCode  = parts[1][off + 1] || '';
        const moodCode = parts[1][off + 2] || '';

        /* 法 */
        if (moodCode === 'M') classes.push('dp-mood-imperative');
        else if (moodCode === 'I') classes.push('dp-mood-indicative');

        /* 時制 */
        if (tenCode === 'P')      classes.push('dp-tense-present');
        else if (tenCode === 'A') classes.push('dp-tense-aorist');
        else if (tenCode === 'X') classes.push('dp-tense-perfect');

        /* 態 */
        if (voiCode === 'M' || voiCode === 'D') classes.push('dp-voice-middle');
        else if (voiCode === 'P')               classes.push('dp-voice-passive');
    }

    return classes;
}

function parseMorphForSearch(rawMorph) {
    const parts = rawMorph.split('-');
    const pos = parts[0];
    const result = { pos };

    if (pos === 'V' && parts[1]) {
        const off = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off + 0];
        const voiceCode = parts[1][off + 1];
        const moodCode  = parts[1][off + 2];

        const TENSE_MAP = { P:'present', I:'imperfect', F:'future', A:'aorist', X:'perfect' };
        const VOICE_MAP = { A:'active', M:'middle', P:'passive', D:'middle deponent' };
        const MOOD_MAP  = { I:'indicative', S:'subjunctive', O:'optative',
                            M:'imperative', N:'infinitive', P:'participle' };

        if (tenseCode) result.tense = TENSE_MAP[tenseCode] || '';
        if (voiceCode) result.voice = VOICE_MAP[voiceCode] || '';
        if (moodCode)  result.mood  = MOOD_MAP[moodCode]   || '';

        if (moodCode === 'P' && parts[2]) {
            const CASE_MAP   = { N:'nominative', G:'genitive', D:'dative', A:'accusative', V:'vocative' };
            const NUMBER_MAP = { S:'singular', P:'plural' };
            const GENDER_MAP = { M:'masculine', F:'feminine', N:'neuter' };
            result.case   = CASE_MAP[parts[2][0]]   || '';
            result.number = NUMBER_MAP[parts[2][1]] || '';
            result.gender = GENDER_MAP[parts[2][2]] || '';
        }
    } else if (['N','A','R','P','T','D'].includes(pos) && parts[1]) {
        const CASE_MAP   = { N:'nominative', G:'genitive', D:'dative', A:'accusative', V:'vocative' };
        const NUMBER_MAP = { S:'singular', P:'plural' };
        const GENDER_MAP = { M:'masculine', F:'feminine', N:'neuter' };
        const base = ['1','2','3'].includes(parts[1][0]) ? parts[1].slice(1) : parts[1];
        result.case   = CASE_MAP[base[0]]   || '';
        result.number = NUMBER_MAP[base[1]] || '';
        result.gender = GENDER_MAP[base[2]] || '';
    }
    return result;
}

function buildMorphTagsHTML(rawMorph) {
    const m = parseMorphForSearch(rawMorph);
    const JPN = {
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞' },
        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法',
                  imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },
    };

    const tags = [];
    if (m.pos)    tags.push({ label: JPN.pos[m.pos]    || m.pos,    core: true });
    if (m.tense)  tags.push({ label: JPN.tense[m.tense]|| m.tense,  core: true });
    if (m.voice)  tags.push({ label: JPN.voice[m.voice]|| m.voice,  core: false });
    if (m.mood)   tags.push({ label: JPN.mood[m.mood]  || m.mood,   core: true });
    if (m.gender) tags.push({ label: JPN.gender[m.gender]|| m.gender, core: false });
    if (m.number) tags.push({ label: JPN.number[m.number]|| m.number, core: false });
    if (m.case)   tags.push({ label: JPN.case[m.case]  || m.case,   core: false });

    if (tags.length === 0) return '';
    return `<div class="morph-tag-row">
        ${tags.map(t => `<span class="morph-tag-pill${t.core ? ' core' : ''}">${t.label}</span>`).join('')}
    </div>`;
}

function _bookChapterLabel(loc) {
    if (!loc.book || loc.chapter === null) return '本文';
    const short = BOOK_SHORT[loc.book.key] || loc.book.name;
    return short + loc.chapter + '章';
}
function _rnFmtRef(tok) {
    const r = tok.ref || '';
    const m = r.match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
    if (m) return (BOOK_SHORT[m[1]] || m[1]) + m[2] + '章' + m[3] + '節';
    const bk = BOOK_SHORT[tok.bookKey || ''] || tok.bookKey || '';
    const ch = tok.ch != null ? tok.ch : '';
    const v  = tok.verse != null ? tok.verse : '';
    return bk + (ch !== '' ? ch + '章' : '') + (v !== '' ? v + '節' : '');
}

let sbSection  = 'nt';
let sbBookKey  = null;
let sbBookName = '';
let sbMaxCh    = 1;

function sbGoTo(layer, section) {
    document.querySelectorAll('.sb-layer').forEach(l => l.classList.remove('active'));
    document.getElementById('sb-layer' + layer).classList.add('active');

    /* Layer 0: sb-nt-row / sb-ot-row のアクティブ表示 */
    if (layer === 0) {
        document.getElementById('sb-nt-row').classList.toggle('active', sbSection === 'nt');
        document.getElementById('sb-ot-row').classList.toggle('active', sbSection === 'ot');
    }

    /* Layer 1: 書物一覧を描画 */
    if (layer === 1) {
        if (section) sbSection = section;
        _sbSyncNavHeaders();
        document.getElementById('sb-nt-row').classList.toggle('active', sbSection === 'nt');
        document.getElementById('sb-ot-row').classList.toggle('active', sbSection === 'ot');
        sbRenderBooks();
    }

    /* Layer 2: 章グリッドを描画 */
    if (layer === 2) {
        _sbSyncNavHeaders();
        document.getElementById('sb-l2-title').textContent = sbBookName;
        sbRenderChapters();
    }
}

/* Layer 1/2 のナビヘッダーのアクティブ状態を同期 */
function _sbSyncNavHeaders() {
    const isNt = sbSection === 'nt';
    ['sb-nav-nt', 'sb-nav-nt-l2'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('active', isNt);
    });
    ['sb-nav-ot', 'sb-nav-ot-l2'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('active', !isNt);
    });
}

function sbGoBack(layer) { sbGoTo(layer); }

function sbRenderBooks() {
    const list = document.getElementById('sb-book-list');
    list.innerHTML = '';
    SB_BOOKS[sbSection].forEach(b => {
        const div = document.createElement('div');
        div.className = 'sb-row' + (b.key === sbBookKey ? ' active' : '');
        const hasGreek = GREEK_BOOKS.has(b.key);
        div.innerHTML = `<span>${b.name}</span><span class="sb-row-arrow">›</span>`;
        if (!hasGreek) {
            div.title = '日本語訳のみ';
            div.querySelector('span').style.color = 'var(--text-sub)';
        }
        div.onclick = () => {
            sbBookKey  = b.key;
            sbBookName = b.name;
            sbMaxCh    = b.ch;
            sbGoTo(2);
        };
        list.appendChild(div);
    });
}

function sbRenderChapters() {
    const urlParams = Router.parse();
    const currentCh = parseInt(urlParams.chapter || '1');
    const currentBook = urlParams.book || 'ROM';

    const grid = document.getElementById('sb-ch-grid');
    grid.innerHTML = '';
    for (let i = 1; i <= sbMaxCh; i++) {
        const btn = document.createElement('div');
        btn.className = 'sb-ch-btn' + (sbBookKey === currentBook && i === currentCh ? ' active' : '');
        btn.textContent = i;
        btn.onclick = () => {
            _navTo(sbBookKey, i);
        };
        grid.appendChild(btn);
    }
}

function sbInitState(bookKey, ch) {
    const inNt = SB_BOOKS.nt.some(b => b.key === bookKey);
    sbSection = inNt ? 'nt' : 'ot';
    const books = SB_BOOKS[sbSection];
    const found = books.find(b => b.key === bookKey);
    if (found) {
        sbBookKey  = found.key;
        sbBookName = found.name;
        sbMaxCh    = found.ch;
    }
    /* 起動時: Layer 0 を表示（トップメニューから始める） */
    sbGoTo(0);
}

/* ブックマーク/メモ/最近読んだ箇所/最近見た単語、4ページ共通のカードUIヘルパー。
   ★ HTML安全性: entry系データと同様、ここを通る title/sub/meta は信頼できない値として
   _escH() で必ずエスケープする（生のテンプレートリテラル結合は禁止）。
   href が無い（構造化フィールドが欠けている＝旧データ等）場合はクリック不可カードにする。 */
function _escH(s) {
    return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function _listMetaDate(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const now = new Date();
    const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const dStart     = new Date(d.getFullYear(),   d.getMonth(),   d.getDate());
    const diffDays   = Math.round((todayStart - dStart) / 86400000);
    if (diffDays === 0) return '今日';
    if (diffDays === 1) return '昨日';
    if (diffDays >= 2 && diffDays <= 6) return diffDays + '日前';
    if (diffDays === 7) return '1週間前';
    const DAY_JA = ['日', '月', '火', '水', '木', '金', '土'];
    return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日（' + DAY_JA[d.getDay()] + '）';
}

/* opts.actions はボタンHTML（呼び出し側が組み立てた定数テンプレート文字列）を想定し、
   ここでは追加のエスケープは行わない。カード全体のonclick（href遷移）とボタン操作が
   競合しないよう、actionsラッパーで event.stopPropagation() する。 */
function _listItemCard(opts) {
    const titleHtml = `<div class="list-item-title">${_escH(opts.title || '')}</div>`;
    const subHtml = opts.sub ? `<div class="list-item-sub">${_escH(opts.sub)}</div>` : '';
    const metaHtml = opts.meta ? `<div class="list-item-meta">${_escH(opts.meta)}</div>` : '';
    const onclickAttr = opts.href ? ` onclick="location.href='${opts.href}'"` : '';
    const actionsHtml = opts.actions ? `<div class="list-item-actions" onclick="event.stopPropagation()">${opts.actions}</div>` : '';
    return `<div class="list-item-card"${onclickAttr}><div class="list-item-main">${titleHtml}${subHtml}</div>${metaHtml}${actionsHtml}</div>`;
}

/* ブックマーク一覧画面。showAppInfo()/showMameKnowledge()と同じ .static-page 差し替え方式。
   bookmarks は recentVerses と同じ構造化フィールド（bookKey/chapter/verse）を持つため、
   一覧→節移動のリンク生成は構造化フィールドのみを使用する（ref文字列の解析は一切行わない）。 */
function showBookmarks() {
    closeMobileSidebar();

    const app = document.getElementById('bible-text-area');

    document.getElementById('main-reading-area').classList.add('single-mode');
    document.getElementById('main-reading-area').classList.add('static-view');
    document.getElementById('main-reading-area').scrollTop = 0;

    AppState.ui.view = 'bookmarks';
    syncUIFromState();

    const bookmarks = window.App.storage ? window.App.storage.getBookmarks() : [];

    const rowsHtml = bookmarks.length
        ? bookmarks.map(b => {
            const href = (b.bookKey && b.chapter != null && b.verse != null)
                ? `index.html?book=${encodeURIComponent(b.bookKey)}&ch=${encodeURIComponent(b.chapter)}&verse=${encodeURIComponent(b.verse)}&panel=study`
                : '';
            const bTitle = (b.bookKey && b.chapter != null && b.verse != null)
                ? `${BOOK_SHORT[b.bookKey] || b.bookKey}${b.chapter}章${b.verse}節`
                : (b.ref || '');
            return _listItemCard({ title: bTitle, meta: _listMetaDate(b.createdAt), href });
        }).join('')
        : `<p class="list-item-empty">ブックマークはまだありません。</p>`;
