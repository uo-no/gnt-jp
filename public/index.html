/* メモ一覧画面。showBookmarks()/showRecentVerses()/showRecentWords()と同じ .static-page 差し替え方式。
   notes構造には bookKey/chapter/verse が存在しない（notes構造変更禁止のため今回も追加しない）ので、
   ref解析は一切行わず、構造化フィールドが無い場合はクリック不可表示にする。
   content はユーザー入力の自由記述のため、_listItemCard() 内の _escH() でエスケープしてから表示する。 */
function showNotes() {
    closeMobileSidebar();

    const app = document.getElementById('bible-text-area');

    document.getElementById('main-reading-area').classList.add('single-mode');
    document.getElementById('main-reading-area').classList.add('static-view');
    document.getElementById('main-reading-area').scrollTop = 0;

    AppState.ui.view = 'notes';
    syncUIFromState();

    const notes = window.App.storage ? window.App.storage.getNotes() : [];
    const sorted = notes.slice().sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

    const rowsHtml = sorted.length
        ? sorted.map(n => {
            const raw = n.content || '';
            const truncated = raw.length > 100 ? raw.slice(0, 100) + '…' : raw;
            const href = (n.bookKey && n.chapter != null && n.verse != null)
                ? `index.html?book=${encodeURIComponent(n.bookKey)}&ch=${encodeURIComponent(n.chapter)}&verse=${encodeURIComponent(n.verse)}&panel=study`
                : '';
            const nTitle = (n.bookKey && n.chapter != null && n.verse != null)
                ? `${BOOK_SHORT[n.bookKey] || n.bookKey}${n.chapter}章${n.verse}節`
                : (n.ref || '');
            const actions = `<button class="list-item-action-btn danger" onclick="_deleteNoteAndRefresh('${encodeURIComponent(n.ref)}')" title="削除（ゴミ箱へ移動）">${icon('trash')}</button>`;
            return _listItemCard({ title: nTitle, sub: truncated, meta: _listMetaDate(n.updatedAt), href, actions });
        }).join('')
        : `<p class="list-item-empty">メモはまだありません。</p>`;

    const html = `
        <div class="static-page list-page">
            <div class="list-page-header">
                <span></span>
                <span class="list-page-header-link" onclick="showNotesTrash()">ゴミ箱を見る</span>
            </div>
            <section>
                ${rowsHtml}
            </section>
        </div>
    `;
    app.innerHTML = html;
}

/* メモ削除（soft delete）。物理削除はせず status を 'deleted' にするのみ（app-storage.js の deleteNote() 参照）。
   一覧はその場で再描画する。 */
function _deleteNoteAndRefresh(refEncoded) {
    if (!window.App.storage) return;
    window.App.storage.deleteNote(decodeURIComponent(refEncoded));
    showNotes();
}

/* メモのゴミ箱画面。showNotes()と同じ .static-page 差し替え方式。
   status === 'deleted' のメモのみを表示し、復元 / 完全削除の操作を提供する。
   完全削除はここでのみ呼び出し可能（通常一覧UIからは呼ばない）。 */
function showNotesTrash() {
    closeMobileSidebar();

    const app = document.getElementById('bible-text-area');

    document.getElementById('main-reading-area').classList.add('single-mode');
    document.getElementById('main-reading-area').classList.add('static-view');
    document.getElementById('main-reading-area').scrollTop = 0;

    AppState.ui.view = 'notesTrash';
    updateHeader('notesTrash');
    updateBreadcrumb('notesTrash');
    updateSidebarActive('notes');

    const notes = window.App.storage ? window.App.storage.getDeletedNotes() : [];
    const sorted = notes.slice().sort((a, b) => (b.deletedAt || 0) - (a.deletedAt || 0));

    const rowsHtml = sorted.length
        ? sorted.map(n => {
            const raw = n.content || '';
            const truncated = raw.length > 100 ? raw.slice(0, 100) + '…' : raw;
            const nTitle = (n.bookKey && n.chapter != null && n.verse != null)
                ? `${BOOK_SHORT[n.bookKey] || n.bookKey}${n.chapter}章${n.verse}節`
                : (n.ref || '');
            const refEnc = encodeURIComponent(n.ref);
            const actions = `
                <button class="list-item-action-btn" onclick="_restoreNoteAndRefresh('${refEnc}')" title="復元">${icon('restore')}</button>
                <button class="list-item-action-btn danger" onclick="_purgeNoteAndRefresh('${refEnc}')" title="完全に削除">${icon('close')}</button>
            `;
            return _listItemCard({ title: nTitle, sub: truncated, meta: _listMetaDate(n.deletedAt), actions });
        }).join('')
        : `<p class="list-item-empty">ゴミ箱は空です。</p>`;

    const html = `
        <div class="static-page list-page">
            <div class="list-page-header">
                <span></span>
                <span class="list-page-header-link" onclick="showNotes()">メモ一覧へ戻る</span>
            </div>
            <section>
                ${rowsHtml}
            </section>
        </div>
    `;
    app.innerHTML = html;
}

function _restoreNoteAndRefresh(refEncoded) {
    if (!window.App.storage) return;
    window.App.storage.restoreNote(decodeURIComponent(refEncoded));
    showNotesTrash();
}

/* 完全削除（物理削除）。確認なしで実行されないよう confirm() を挟む。 */
function _purgeNoteAndRefresh(refEncoded) {
    if (!window.App.storage) return;
    if (!confirm('このメモを完全に削除します。元に戻せません。よろしいですか？')) return;
    window.App.storage.purgeNote(decodeURIComponent(refEncoded));
    showNotesTrash();
}

async function init() {
    /* アイコンレジストリから data-icon 要素へSVGを挿入する（☆🔗📝☰ 等の絵文字置き換え） */
    _renderStaticIcons();

    /* onboarding未完了なら、render/applyShareState/onPageRendered実行前に
       フラグを立てておく（onboarding.js の自動デモによるURL書き換えを防ぐ） */
    _syncOnboardingActiveFlag();

    const urlParams = Router.parse();
    const book = urlParams.book || 'ROM';
    const ch   = urlParams.chapter || '1';

    if (urlParams.transA) _transA = currentTranslation  = urlParams.transA;
    if (urlParams.mode) {
        _transMode = urlParams.mode;
    }
    if (_transMode === 'compare' && urlParams.transB) {
        _transB = currentTranslationB = urlParams.transB;
    }
    _applyTransMode(_transMode);
    
    const isNt = SB_BOOKS.nt.some(b => b.key === book);

    const allBooks = [...SB_BOOKS.nt, ...SB_BOOKS.ot];
    const found = allBooks.find(b => b.key === book);
    const chNum = parseInt(ch);

    /* AppState.location を設定 */
    AppState.location.testament = isNt ? 'nt' : 'ot';
    AppState.location.book      = found || null;
    AppState.location.chapter   = chNum;

    /* ヘッダー/パンくず/サイドバー選択状態は AppState.ui.view から一括同期する */
    AppState.ui.view = 'bible';
    syncUIFromState();

    syncUrlState();

    sbInitState(book, chNum);

    await loadDict();

    const hasGreek = GREEK_BOOKS.has(book);

    try {
        /* _transA が FLOW の場合は翻訳JSONをfetchしない */
        const jpData = _transA === 'FLOW'
            ? null
            : await _fetchTranslation(_transA, book, ch);
        if (_transA !== 'FLOW' && !jpData) throw new Error(`bible_jp not found: ${book}/${ch}`);

        let jpDataB = null;
        if (_transMode === 'compare' && _transB !== 'FLOW') {
            jpDataB = await _fetchTranslation(_transB, book, ch);
        }

        let elData = [];
        if (hasGreek) {
            try {
                const testament = SB_BOOKS.nt.some(b => b.key === book) ? 'nt' : 'lxx';
                const elRes = await fetch(`../bible_data/${testament}/${book}/${ch}.json`);
                if (elRes.ok) {
                    elData = await elRes.json();
                } else {
                    console.warn(`bible_data not found for ${book}/${ch} - Greek panel disabled`);
                }
            } catch (e) {
                console.warn(`bible_data fetch error for ${book}/${ch}:`, e);
            }
        }

        /* _transA === 'FLOW': elData から verse キーを組み立てて jpData の代わりに渡す */
        const resolvedJpData = (_transA === 'FLOW')
            ? _buildFlowJpData(elData)
            : jpData;
        if (!resolvedJpData) throw new Error(`bible_jp not found: ${book}/${ch}`);

        render(resolvedJpData, elData, hasGreek && elData.length > 0, jpDataB);
        requestAnimationFrame(() => requestAnimationFrame(() => {
            document.getElementById('bible-text-area').style.opacity = '1';
        }));

        /* 冒頭の urlParams を再利用する（syncUrlState() が既に history を
           verse/panel/word なしの状態に書き換えているため、ここで
           Router.parse() を再実行すると消えてしまう） */
        applyShareState(urlParams);

            if (window.App.onboarding && !window.App.onboarding.getState().onboardingComplete) {
                document.querySelectorAll('[data-onboarding-anchor="true"]').forEach(function(el) {
                    el.removeAttribute('data-onboarding-anchor');
                });
                const ANCHOR_WORDS = ['γάρ', 'ἠγάπησεν', 'οὕτως'];
                let anchorEl = null;
                for (var aw = 0; aw < ANCHOR_WORDS.length; aw++) {
                    anchorEl = document.querySelector('.wlv-chip[data-greek="' + ANCHOR_WORDS[aw] + '"], .word-card[data-greek="' + ANCHOR_WORDS[aw] + '"]');
                    if (anchorEl) break;
                }
                if (!anchorEl) anchorEl = document.querySelector('.verse-block, .verse-pair-left');
                if (anchorEl) anchorEl.setAttribute('data-onboarding-anchor', 'true');
                window.App.onboarding.onPageRendered();
                _syncOnboardingActiveFlag();
        }

    } catch (err) {
        console.error(err);
        const errArea = document.getElementById('bible-text-area');
        errArea.innerHTML = `<p style="color:red">データが見つかりません（${_escH(book)} ${_escH(ch)}章）</p>`;
        requestAnimationFrame(() => requestAnimationFrame(() => { errArea.style.opacity = '1'; }));
    }
}

function render(jpData, elData, hasGreek, jpDataB) {
    const app          = document.getElementById('bible-text-area');
    const parallel     = document.getElementById('parallel-text-area');
    const mainArea     = document.getElementById('main-reading-area');

    /* 翻訳ヘッダー */
    const headerA = document.getElementById('trans-col-header-a');
    const headerB = document.getElementById('trans-col-header-b');
    headerA.textContent = (TRANSLATIONS[_transA] || {}).label || _transA;

    // 右列ヘッダーラベルを更新
    const gfTransLblEarly = document.getElementById('gf-trans-label');
    if (mainArea.classList.contains('compare-mode')) {
        if (gfTransLblEarly) gfTransLblEarly.textContent = (TRANSLATIONS[_transB] || {}).label || _transB;
    } else {
        if (gfTransLblEarly) gfTransLblEarly.textContent = '';
    }

    // ── Study panel を閉じて Reading 状態に戻す ──
    closeStudyPanel();
    /* 章が変わった場合は AppState を完全リセット（study.params も破棄） */
    AppState.mode                = 'reading';
    AppState.selectedVerse       = { vNum: null, elWords: [] };
    AppState.inspect.data        = null;
    AppState.study.params        = null;
    AppState.study.tab           = 'flow';
    AppState.scrollTop           = 0;
    AppState.clearDepth();
app.innerHTML = '';
    parallel.innerHTML = '';
    /* compare モードで mainArea に直接追加した verse-pair をクリア */
    mainArea.querySelectorAll('.verse-pair').forEach(el => el.remove());

    const elByVerse = {};
    if (elData && elData.length > 0) {
        elData.forEach(w => {
            // ★ verse番号は w.verse（構造フィールド）から取得。w.ref のパース禁止。
            const v = w.verse != null ? String(w.verse) : null;
            if (v) { if (!elByVerse[v]) elByVerse[v] = []; elByVerse[v].push(w); }
        });
    }

    const openBtn = document.getElementById('open-panel-btn');
    if (!hasGreek) {
        document.getElementById('bottom-depth-panel').style.display = 'none';
        openBtn.style.display = 'none';
    }

    const useVersePair = mainArea.classList.contains('compare-mode');

    Object.entries(jpData.verses).forEach(([vNum, text]) => {
        // 左：聖書本文 or 読解フロー（_transA === 'FLOW'）
        const block = document.createElement('div');
        block.className = useVersePair ? 'verse-block verse-pair-left' : 'verse-block';

        if (_transA === 'FLOW') {
            const words = elByVerse[vNum] || [];
            if (words.length === 0) {
                block.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text" style="color:var(--text-sub);font-size: var(--text-caption);opacity: var(--opacity-secondary);">原語データなし</div></div>`;
            } else {
                // ★ SSOT: bookKey / ch を _wordToFlowChip に渡す（ref パース禁止）
                const _chipBookKey = AppState.location.book ? AppState.location.book.key : '';
                const _chipCh = AppState.location.chapter != null ? AppState.location.chapter : null;
                const chips = words.map((w, i) => _wordToFlowChip(w, i, _chipBookKey, _chipCh));
                /* 複数節が同時に描画されるため、idx は節内でのみ有効。
                   block 単位でchipデータを保持し、_wlvChipClick から節を跨いだ取り違えなく参照できるようにする。 */
                block._flowChips = chips;
                /* Layer 2 Inspect: ReadingFormatterのclause解析には生トークン配列が
                   必要なため、chipデータと並べて words もそのまま保持しておく。 */
                block._flowWords = words;
                /* 修正B: ヨハネ3:16の先頭chip（index=0）にオンボーディングアンカーを付与 */
                const _obBook = AppState.location.book ? AppState.location.book.key : '';
                const _obChapter = AppState.location.chapter;
                const isAnchorVerse = _obBook === 'JHN' && _obChapter === 3
                    && String(vNum) === '16';
                const chipsHTML = chips.map((c, i) => {
                    const sep = c.phraseBreakBefore ? `<span class="wlv-phrase-sep"></span>` : '';
                    const anchorAttr = (isAnchorVerse && i === 0)
                        ? ' data-onboarding-anchor="true" data-greek="' + c.greek + '"'
                        : '';
                    return `${sep}<span class="wlv-chip ${c.roleClass}" data-idx="${i}"${anchorAttr} onclick="event.stopPropagation();_wlvChipClick(this,${i})" title="${c.greek}"><span class="wlv-chip-ja"><span class="${c.dpGrammarClasses}">${c.gloss}</span></span></span>`;
                }).join('');
                block.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text" style="font-size: var(--text-body);line-height:2.4;"><div class="wlv-flow-stream" style="flex-wrap:wrap;display:flex;gap:var(--rhythm-micro);align-items:baseline;">${chipsHTML}</div></div></div>`;
                block.onclick = () => {
                    mainArea.querySelectorAll('.verse-block').forEach(b => b.classList.remove('selected'));
                    block.classList.add('selected');
                    document.getElementById('active-v').innerText = `${vNum} 節`;
                    AppState.toBrowsing(vNum, words);
                    openWordListInStudyPanel(vNum, words);
                    notifyAppStateChange();
                };
            }
        } else {
            block.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text">${text}</div></div>`;
        }

        // 右：並列訳 or 読解フロー
        const pBlock = document.createElement('div');
        pBlock.className = 'verse-block verse-pair-right';
        pBlock.dataset.vnum = vNum;

        if (_transB === 'FLOW') {
            // _setRightMode('flow') が gf-verse-block を差し込むので
            // ここでは空コンテナのみ用意する（二重描画防止）
            pBlock.innerHTML = '';
        } else if (!useVersePair && _transA === 'FLOW') {
            // single-mode + transA=FLOW: 右列は不要
            pBlock.innerHTML = '';
        } else {
            const rightText = (jpDataB && jpDataB.verses && jpDataB.verses[vNum]) ? jpDataB.verses[vNum] : (jpData.verses[vNum] || '');
            pBlock.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text">${rightText}</div></div>`;
            if (hasGreek) {
                pBlock.onclick = () => {
                    document.querySelectorAll('.verse-block').forEach(b => b.classList.remove('selected'));
                    block.classList.add('selected');
                    pBlock.classList.add('selected');
                    document.getElementById('active-v').innerText = `${vNum} 節`;
                    AppState.toBrowsing(vNum, elByVerse[vNum] || []);
                    openWordListInStudyPanel(vNum, elByVerse[vNum] || []);
                    notifyAppStateChange();
                };
            }
        }

        if (hasGreek && _transA !== 'FLOW') {
            block.onclick = () => {
                mainArea.querySelectorAll('.verse-block').forEach(b => b.classList.remove('selected'));
                block.classList.add('selected');
                pBlock.classList.add('selected');
                document.getElementById('active-v').innerText = `${vNum} 節`;
                AppState.toBrowsing(vNum, elByVerse[vNum] || []);
                openWordListInStudyPanel(vNum, elByVerse[vNum] || []);
                notifyAppStateChange();
            };
        }

        if (useVersePair && window.innerWidth <= 768) {
            /* モバイル比較モード：節ごとにA訳→区切り→B訳を縦に積む */
            const verseGroup = document.createElement('div');
            verseGroup.className = 'mobile-verse-group';
            verseGroup.dataset.vnum = vNum;

            /* 節番号バッジ */
            const vBadge = document.createElement('div');
            vBadge.className = 'mobile-vnum-badge';
            vBadge.textContent = vNum;
            verseGroup.appendChild(vBadge);

            /* A訳ブロック */
            const aWrap = document.createElement('div');
            aWrap.className = 'mobile-trans-block mobile-trans-a';
            const aLabel = document.createElement('div');
            aLabel.className = 'mobile-trans-label';
            aLabel.textContent = (TRANSLATIONS[_transA] || {}).label || _transA;
            aWrap.appendChild(aLabel);
            aWrap.appendChild(block);
            verseGroup.appendChild(aWrap);

            /* 区切り線 */
            const sep = document.createElement('div');
            sep.className = 'mobile-verse-sep';
            verseGroup.appendChild(sep);

            /* B訳ブロック */
            const bWrap = document.createElement('div');
            bWrap.className = 'mobile-trans-block mobile-trans-b';
            const bLabel = document.createElement('div');
            bLabel.className = 'mobile-trans-label';
            bLabel.textContent = (TRANSLATIONS[_transB] || {}).label || _transB;
            bWrap.appendChild(bLabel);
            bWrap.appendChild(pBlock);
            verseGroup.appendChild(bWrap);

            app.appendChild(verseGroup);
        } else if (useVersePair) {
            const pairEl = document.createElement('div');
            pairEl.className = 'verse-pair';
            pairEl.appendChild(block);
            pairEl.appendChild(pBlock);
            mainArea.appendChild(pairEl);
        } else {
            app.appendChild(block);
            parallel.appendChild(pBlock);
        }
    });

_proximityTokens = (elData || []).map(w => ({ text: w.text || '', lemma: w.lemma || w.text || '' }));

    /* Greek Flow View: キャッシュ保存 */
    _cachedElByVerse = elByVerse;
    _cachedJpDataB   = jpDataB || null;

    /* 右列ヘッダーラベルを更新 */
    const gfTransLbl  = document.getElementById('gf-trans-label');
    /* 右列ヘッダーラベルを常に transBの翻訳名で更新 */
    if (gfTransLbl) {
        gfTransLbl.textContent = mainArea.classList.contains('compare-mode')
            ? ((TRANSLATIONS[_transB] || {}).label || _transB)
            : '';
    }

    /* flowモードが残っている場合はリセット（章移動時の整合性）
       ただし activateFlowCompare が呼ぶ renderCurrentPage の場合は除外 */
    if (_transB === 'FLOW') {
        /* transB=FLOW が選ばれているときは常にflowモードを起動 */
        const gfTabBar = document.getElementById('gf-tab-bar');

/* ═════════════════════════════════════════════════════════════════
 * 節全体の読書メモ — ReadingFormatter 駆動版
 *
 * 旧 _buildPassageNote（CONJ_FEEL辞書 / imperatives・perfects・
 * passives・participles ヒューリスティック / METAPHOR辞書 / 呼格判定 /
 * 「原語の語順と品詞の流れは、上の原語の順序から確認できます。」を
 * 含む独自フォールバック文）は完全に削除した。
 *
 * UI生成の唯一ソースは clause-analyzer.js の ReadingFormatter.format()。
 * 本ブロックの役割は「SyntaxAnalyzer→PhraseAnalyzer→ClauseAnalyzer の
 * パイプラインを実行し、検出された節ごとに ReadingFormatter へ渡す」
 * という配線のみで、文章そのものは一切生成しない。
 *
 * フォールバックルール:
 *   - words が空 → null（節を組まない）
 *   - パイプライン未初期化 / 初期化失敗 → null（代替文で埋めない）
 *   - 節が1つも検出されない → null（多くの平叙文がこれに該当する。
 *     旧実装はここで汎用フォールバック文を出していたが、今回はそれを
 *     廃止し、読書メモという「言うことがある時だけ話す」静寂優先の
 *     設計にする）
 *   - 検出された節がいずれも discourse.type を持たない → null
 *
 * discourse.type / clause.type / marker / confidence は、
 * ReadingFormatter.format() の戻り値（{title, summary, hint,
 * confidenceText}）にしか触れないため、本ブロックのコードには
 * そもそも一切登場しない（Guard Rule は ReadingFormatter 側で
 * assertReadingTextSafe() により多重に保証済み）。
 * ═════════════════════════════════════════════════════════════════ */

let _wallacePipeline       = null;  // { sa, pa, ca, rf } キャッシュ（初回のみ registry を fetch）
let _wallacePipelineFailed = false; // 初期化に失敗した場合は再試行せず静かに諦める
let _wallacePassageNoteGen = 0;     // 古い非同期結果の注入を防ぐ世代カウンタ

async function _ensureWallacePipeline() {
    if (_wallacePipeline || _wallacePipelineFailed) return _wallacePipeline;
    try {
        const [syntaxRegistry, phraseRegistry, clauseRegistry, readingPolicy] = await Promise.all([
            fetch('../assets/data/syntax-registry.json').then(r => r.json()),
            fetch('../assets/data/phrase-registry.json').then(r => r.json()),
            fetch('../assets/data/clause-registry.json').then(r => r.json()),
            fetch('../assets/data/reading-policy.json').then(r => r.json()),
        ]);
        const SyntaxAnalyzerCls = window.SyntaxAnalyzer || window.App?.syntax?.Analyzer;
        const PhraseAnalyzerCls = window.PhraseAnalyzer || window.App?.syntax?.PhraseAnalyzer;
        const ClauseAnalyzerCls = window.App?.syntax?.ClauseAnalyzer;
        const ReadingFormatterCls = window.App?.syntax?.ReadingFormatter;
        if (!SyntaxAnalyzerCls || !PhraseAnalyzerCls || !ClauseAnalyzerCls || !ReadingFormatterCls) {
            throw new Error('required analyzer classes not loaded');
        }
        /* Reading Policy（唯一の機械可読定義源）: 現象単位の scope / priority /
           verse_source を id 引きの索引にする。scope・priority をコードに書くことは
           禁止 — 変更は必ず assets/data/reading-policy.json で行う。 */
        const policyById = {};
        for (const ph of (readingPolicy.phenomena || [])) {
            for (const id of (ph.ids || [])) policyById[id] = ph;
        }
        _wallacePipeline = {
            sa: new SyntaxAnalyzerCls(syntaxRegistry),
            pa: new PhraseAnalyzerCls(phraseRegistry),
            ca: new ClauseAnalyzerCls(clauseRegistry),
            rf: new ReadingFormatterCls(),
            policy: { rules: readingPolicy.display_rules || {}, byId: policyById },
        };
    } catch (e) {
        console.warn('[Wallace] pipeline init failed:', e);
        _wallacePipelineFailed = true;
        _wallacePipeline = null;
    }
    return _wallacePipeline;
}

/* clauseResults キャッシュ（直近に解析した verse の words 参照をキーにする）。
   節レイヤー（passage note）と単語レイヤー（resonance）が同じ解析結果を
   共有するための唯一の場所 — 「レイヤーごとの別ロジック」を作らない。 */
let _wallaceClauseCache = null; // { words, clauseResults }

/**
 * words（節の生トークン配列）に対する ClauseAnalyzer の解析結果を返す。
 * 同じ words 参照に対しては再解析せずキャッシュを返す（節レイヤー・
 * 単語レイヤーの両方から呼ばれるため）。
 * @returns {Promise<Array|null>}
 */
async function _getWallaceClauseAnalysis(words) {
    if (!words || words.length === 0) return null;
    if (_wallaceClauseCache && _wallaceClauseCache.words === words) {
        return _wallaceClauseCache.clauseResults;
    }
    const pipeline = await _ensureWallacePipeline();
    if (!pipeline) return null;
    const { sa, pa, ca } = pipeline;
    try {
        const all = sa.analyzeAll(words);
        const syntaxResults = all.results.map(r => r.output);
        const phraseResults = pa.analyze({ tokens: words, syntaxResults });
        const clauseResults = ca.analyze({ tokens: words, syntaxResults, phraseResults });

        /* Phase 24: Reading Support Projection を並列生成（additive・読み取り専用）。
           失敗しても projection = null になるだけで、既存の表示・戻り値は一切変わらない。 */
        let projection = null;
        try {
            const RSP = window.App?.syntax?.ReadingSupportProjection;
            const CB  = window.App?.syntax?.ContextBuilder;
            if (RSP) {
                projection = RSP.build({
                    tokens: words, syntaxResults, clauseResults,
                    contextBuilder: CB, registry: sa.registry,
                });
            }
        } catch (_) { projection = null; }

        _wallaceClauseCache = { words, clauseResults, projection };
        return clauseResults;
    } catch (e) {
        console.warn('[Wallace] analysis failed:', e);
        return null;
    }
}

/* __PHRASE_READING_BEGIN__
   Phase 25B-2: Phrase Reading（かたまりの読書メモ）— 二層構成
   構造層: Q3「どこまでが一まとまりか」への回答（Mapping §3.2）。
   意味層 (v1.1): そのまとまりをどう読むか（docs/phrase-reading.md が設計正典。
   現象 → Reading Intent → 文章。解釈・文法用語・翻訳は出さない）。
   ReadingSupportProjection の phrases / genitivePhrases / words だけを読む。
   内部構造（種別・位置）は言い回しの選択にのみ使い、
   画面には本文の引用と日本語の一文しか出さない。
   静寂条件: Projection null / 語がどの まとまり にも属さない / 1 語のみ /
   長すぎる まとまり（引用が読書を止める）→ null（既存表示のみ）。 */

/* 言い回し選択の内部キー（画面には出さない）と引用長の上限 */
const _PHRASE_READING_PRIORITY = { NP: 0, PP: 1, PtcP: 2 };
const _PHRASE_READING_MAX_SPAN = 7;

/* ── PhraseRenderer v0.1: 前置詞句（PP）の日本語化 ──────────────────
   PP のみ語順を組み替え「modifier + head + 前置詞訳」で自然な日本語を生成。
   その他の句種はトークンの w.japanese → w.text を連結する（フォールバック）。 */
const _PP_TRANS_JP = {
    'ἐν':  ()  => 'の中で',
    'εἰς': ()  => 'へ',
    'ἐκ':  ()  => 'から',
    'ἀπό': ()  => 'から',
    'διά': (c) => c === 'genitive' ? 'によって' : 'を通して',
    'μετά':(c) => c === 'genitive' ? 'とともに' : 'の後で',
    'κατά':()  => 'に従って',
};

function _buildPhraseContext(p, end, words) {
    const jaOf   = w => _escH((w && (w.japanese || w.text)) || '');
    const tokens = words.slice(p.start, end + 1);

    let prep      = null;
    let head      = null;
    const modifiers = [];

    if (p.type === 'PP') {
        const prepWord  = words[p.start];
        const prepLemma = (prepWord && prepWord.lemma) || (prepWord && prepWord.text) || '';
        if (prepWord) prep = { lemma: prepLemma, ja: jaOf(prepWord) };

        const headIdx  = (p.head != null && p.head <= end) ? p.head : end;
        const headWord = words[headIdx];
        if (headWord) head = { ja: jaOf(headWord) };

        for (let k = p.start + 1; k < headIdx; k++) {
            const t = jaOf(words[k]);
            if (t) modifiers.push({ ja: t });
        }
    } else if (p.type === 'NP' || p.type === 'PtcP') {
        // NP : head = 最後の N（p.head）、modifiers = 先行する T/A
        // PtcP: head = 分詞（p.end）、  modifiers = 先行冠詞（あれば）
        const headIdx  = (p.head != null && p.head <= end) ? p.head : end;
        const headWord = words[headIdx];
        if (headWord) head = { ja: jaOf(headWord) };

        for (let k = p.start; k < headIdx; k++) {
            const t = jaOf(words[k]);
            if (t) modifiers.push({ ja: t });
        }
    }

    return { type: p.type, tokens, prep, head, modifiers,
             start: p.start, end, case: p.case || '' };
}

function _renderDefault(ctx) {
    return ctx.tokens
        .map(w => _escH((w && (w.japanese || w.text)) || ''))
        .filter(Boolean).join('');
}

function _renderPP(ctx) {
    const modJa    = ctx.modifiers.map(m => m.ja).join('');
    const headJa   = ctx.head ? ctx.head.ja : '';
    const suffixFn = ctx.prep ? _PP_TRANS_JP[ctx.prep.lemma] : null;
    const suffix   = suffixFn ? suffixFn(ctx.case) : (ctx.prep ? ctx.prep.ja : '');
    return modJa + headJa + suffix;
}

function _renderNP(ctx) {
    const modJa  = ctx.modifiers.map(m => m.ja).filter(Boolean).join('');
    const headJa = ctx.head ? ctx.head.ja : '';
    return modJa + headJa;
}

function _renderParticipial(ctx) {
    const modJa  = ctx.modifiers.map(m => m.ja).filter(Boolean).join('');
    const headJa = ctx.head ? ctx.head.ja : '';
    return modJa + headJa;
}

const _PHRASE_RENDERERS = {
    PP:   _renderPP,
    NP:   _renderNP,
    PtcP: _renderParticipial,
};

function renderPhraseJP(p, end, words) {
    const ctx    = _buildPhraseContext(p, end, words);
    const render = _PHRASE_RENDERERS[ctx.type] || _renderDefault;
    return render(ctx);
}

function _phraseReadingSentence(kind, quoted) {
    switch (kind) {
        case 'PP':   return `「${quoted}」は、ひとつづきのまとまりです。`;
        case 'PtcP': return `「${quoted}」は、ここまでをまとめて読むと意味がつながります。`;
        default:     return `「${quoted}」は、ここまでで一つの内容です。`;
    }
}

/* ── Phrase Reading 意味層（v1.1・docs/phrase-reading.md）─────────────
   生成の型は「現象 → Reading Intent → 文章」。本テーブルは Intent → 2文
   （1文目=役割、2文目=読むコツ）のみを持ち、現象名・scope・priority は

   Intent キーは内部専用で画面には出さない。文言の正典は

const _PHRASE_INTENT_TEXT = {

               '違いを並べて読むと流れがはっきりします。'],

                  'どの語を説明しているかを意識すると読みやすくなります。'],

                     '同じ人やものを思い浮かべながら読むとつながりが見えます。'],

                  '展開の変わり目として読むと流れが追いやすくなります。'],

                    '分けずにひとまとめで読むと意味が入りやすくなります。'],

/* 意味層の選択（1句1現象の原則・docs/phrase-reading.md Phase E）:
   対象語の categories から「phrase scope × phrase_reading の priority ×
   confidence ≥ min_confidence × intent 定義済み」の現象を探し、
   priority（phrase_reading.priorities の並び順）→ confidence で
   ただ1つの Intent を選ぶ。該当なしは空配列（静寂）。 */
function _phraseIntentLines(proj, idx) {
    const w = proj && proj.words ? proj.words[idx] : null;
    if (!w || !w.categories) return [];
    const policy = _wallacePipeline?.policy;
    const rule   = policy?.rules?.phrase_reading;
    if (!policy || !rule) return [];
    const minConf = policy.rules?.min_confidence ?? 0.40;
    const prios   = rule.priorities || [];
    let best = null;
    for (const c of Object.values(w.categories)) {
        if (!c || c.confidence < minConf) continue;
        const ph = policy.byId[c.id];
        if (!ph || !ph.intent || !_PHRASE_INTENT_TEXT[ph.intent]) continue;
        if (!_policyScopes(ph).includes('phrase')) continue;
        const rank = prios.indexOf(ph.priority);
        if (rank < 0) continue;
        if (!best || rank < best.rank ||
            (rank === best.rank && c.confidence > best.confidence)) {
            best = { rank, confidence: c.confidence, intent: ph.intent };
        }
    }
    return best ? _PHRASE_INTENT_TEXT[best.intent].slice(0, 2) : [];
}

/* ── v1.2 対象語引用型（docs/phrase-reading.md Phase H → v1.2）──────────
   構造層（NP/PP/PtcP）の引用が成立しない語でも、意味層候補があれば
   対象語を引用して案内する。構造層が検出しない不定詞句・無冠詞の
   副詞的分詞句（属格絶対・迂言法・目的/結果不定詞・理由/条件/譲歩分詞）が
   これで表示に入る。文言は文テーブル（正典）から変えず、1文目の
   「このまとまりは、」を「「◯◯」のまとまりは、」に置き換えるだけ。 */
const _PHRASE_INTENT_LEAD = 'このまとまりは、';
function _phraseIntentStandaloneHTML(words, idx, proj) {
    try {
        const intentLines = _phraseIntentLines(proj, idx);
        if (intentLines.length === 0) return null;
        const quoted = _escH((words[idx] && (words[idx].japanese || words[idx].text)) || '');
        if (!quoted) return null;
        const first = intentLines[0].startsWith(_PHRASE_INTENT_LEAD)
            ? `「${quoted}」のまとまりは、` + intentLines[0].slice(_PHRASE_INTENT_LEAD.length)
            : intentLines[0];
        const shown = [first, ...intentLines.slice(1)];
        return `<div class="rn-prose reading-block">${
            shown.map(l => `<p class="rn-prose-text reading-prose">${l}</p>`).join('')
        }</div>`;
    } catch (_) {
        return null;   // Failure Mode: 静寂
    }
}

/* 引用品質ガード（Phase 26 編集）: 句検出は句読点・格の変わり目を跨ぐことが
   あるため、引用時にのみ範囲を安全側へ縮める（判定・Projection は不変）。
   1) 途中に句読点（. · ; ,）があればそこまで
   2) 途中で格が変わったら（『〜の』のかたちは透過）その手前まで
   3) 中心語のあとに、冠詞を伴わない普通名詞が続いたらその手前まで
      （Σίμων Πέτρος のような呼び名の並びは残す） */
function _trimPhraseEnd(words, p) {
    let end = p.end;
    for (let k = p.start; k < end; k++) {
        if (/[.\u00b7;,\u037e]/.test(String(words[k]?.after ?? ''))) { end = k; break; }
    }
    if (p.type === 'NP') {
        let baseCase = null, baseNum = null, nounSeen = false;
        for (let k = p.start; k <= end; k++) {
            const w = words[k] || {};
            const c = w.case || '';
            if (!c) continue;
            if (c === 'genitive' && baseCase && baseCase !== 'genitive') continue;
            if (baseCase === null) { baseCase = c; baseNum = w.number || ''; }
            else if (c !== baseCase || (w.number || '') !== baseNum) { end = k - 1; break; }
            if (w.class === 'noun') {
                if (nounSeen) {
                    const prevIsArt = (words[k - 1] || {}).class === 'det';
                    const isProper = /^[\u0391-\u03a9\u1f08-\u1fbc]/.test(String(w.lemma ?? w.text ?? ''));
                    if (!prevIsArt && !isProper) { end = k - 1; break; }
                }
                nounSeen = true;
            }
        }
    }
    return end;
}

async function _buildPhraseReadingHTML(words, idx) {
    const proj = await _getReadingSupportProjection(words);
    if (!proj) return null;

    /* 対象語を含む 2 語以上・上限以内の まとまり（NP / PP / PtcP のみ。
       『〜の』の連なりは単独では出さず、下の関係文にのみ使う） */
    const containing = (proj.phrases ?? []).filter(p =>
        p && (p.end - p.start) >= 1 && (p.end - p.start) < _PHRASE_READING_MAX_SPAN &&
        idx >= p.start && idx <= p.end &&
        (p.type in _PHRASE_READING_PRIORITY));
    if (containing.length === 0) return _phraseIntentStandaloneHTML(words, idx, proj);
    containing.sort((a, b) =>
        (_PHRASE_READING_PRIORITY[a.type] ?? 9) - (_PHRASE_READING_PRIORITY[b.type] ?? 9) ||
        (a.end - a.start) - (b.end - b.start));

    const quoteOf = (s, e) => words.slice(s, e + 1)
        .map(w => _escH((w && (w.japanese || w.text)) || '')).filter(Boolean).join('');

    const seen = new Set();
    const lines = [];
    for (const p of containing) {
        const key = `${p.start}-${p.end}`;
        if (seen.has(key)) continue;
        seen.add(key);
        const trimmedEnd = _trimPhraseEnd(words, p);
        if (trimmedEnd - p.start < 1 || idx > trimmedEnd) continue;   // 縮めて成立しなければ沈黙
        const quoted = renderPhraseJP(p, trimmedEnd, words);
        if (!quoted) continue;
        lines.push(_phraseReadingSentence(p.type, quoted));

        /* 『〜の』の関係文: まとまり の中心となる語の後に『〜の』の連なりが
           続く場合のみ、「どれがどれを説明しているか」を一文で示す */
        if (p.type === 'NP') {
            let headIdx = -1;
            for (let k = p.start; k <= trimmedEnd; k++) {
                if (words[k]?.class === 'noun' && words[k]?.case !== 'genitive') {
                    headIdx = k; break;
                }
            }
            const inner = (proj.genitivePhrases ?? []).find(g =>
                headIdx >= 0 && g.start > headIdx && g.end <= trimmedEnd);
            if (inner && headIdx >= 0) {
                const genQ = quoteOf(inner.start, inner.end);
                const headW = _escH(words[headIdx]?.japanese || words[headIdx]?.text || '');
                if (genQ && headW) lines.push(`「${genQ}」が「${headW}」を説明しています。`);
            }
        }
        if (lines.length >= 2) break;
    }
    if (lines.length === 0) return _phraseIntentStandaloneHTML(words, idx, proj);

    /* 意味層（v1.1・docs/phrase-reading.md Phase E）: 最大2文（役割＋読むコツ）。
       構造層が成立した語では構造層第1文＋意味層2文（最大3文）。
       構造層が沈黙した語は上の対象語引用型（v1.2）が担当する。
       意味層該当なしは従来表示のまま。 */
    let shown = lines.slice(0, 2);
    try {
        const intentLines = _phraseIntentLines(proj, idx);
        if (intentLines.length > 0) shown = [lines[0], ...intentLines];
    } catch (_) { /* 意味層の失敗は静寂（構造層はそのまま） */ }

    return `<div class="rn-prose reading-block">${
        shown.map(l => `<p class="rn-prose-text reading-prose">${l}</p>`).join('')
    }</div>`;
}
/* __PHRASE_READING_END__ */

/* __OBSERVATION_BEGIN__
   Phase 25B-3: Observation（本文のどこを見ると読みやすくなるかの指さし）
   目的は Q2「なぜこのように読めるのか」への入口を一文で示すことのみ。
   ReadingSupportProjection の words[idx].categories だけを読み、
   流れをつくる語（理由・結論・転換・目的・条件・対 など）を本文の引用で指す。
   一文だけ。内部の判定情報は言い回しの選択にのみ使い、画面には出さない。
   静寂条件: Projection null / 候補なし / 弱い判定 / 指させる語でない /
   既存の文と同内容 → null（既存表示のみ・フォールバック禁止）。 */

/* 言い回しの選択表（キーは内部専用・画面に出さない） */
const _OBSERVATION_SENTENCES = {
    'clause.purpose_hina':                q => `この「${q}」から、『〜するために』という目的が始まります。`,
    'conjunction.subordinating_purpose':  q => `この「${q}」から、『〜するために』という目的が始まります。`,
    'clause.substantival_hoti':           q => `この「${q}」から、その中身が語られます。`,
    'conjunction.subordinating_content':  q => `この「${q}」から、その中身が語られます。`,
    'clause.causal_hoti':                 q => `この「${q}」から、その理由が語られます。`,
    'clause.result_hoste':                q => `この「${q}」から、その結果が語られます。`,
    'conjunction.subordinating_result':   q => `この「${q}」から、その結果が語られます。`,
    /* clause.conditional_first_class / second_class は Phase 2 で multiple 化し
       _WORD_ROLE_TEXT（conditional_assumed_true / conditional_counterfactual）へ移動。 */
    'clause.conditional_third_class':     q => `この「${q}」から、『もし〜なら』の話に入ります。`,
    'conjunction.subordinating_conditional': q => `この「${q}」から、『もし〜なら』の話に入ります。`,
    'clause.temporal_hotan':              q => `この「${q}」から、いつのことかが語られます。`,
    'clause.temporal_hote':               q => `この「${q}」から、いつのことかが語られます。`,
    'conjunction.subordinating_temporal': q => `この「${q}」から、いつのことかが語られます。`,
    'clause.comparative_kathos':          q => `この「${q}」から、『〜のように』というたとえが始まります。`,
    'conjunction.subordinating_comparative': q => `この「${q}」から、『〜のように』というたとえが始まります。`,
    'conjunction.coordinating_explanatory': q => `この「${q}」が、前の内容の理由を語り始めます。`,
    'particle.explanatory_gar':           q => `この「${q}」が、前の内容の理由を語り始めます。`,
    'conjunction.coordinating_inferential': q => `この「${q}」が、前の内容を受けて、だから、と話を進めます。`,
    'particle.inferential_oun':           q => `この「${q}」が、前の内容を受けて、だから、と話を進めます。`,
    'conjunction.coordinating_adversative': q => `この「${q}」で、話の向きが変わります。`,
    'conjunction.coordinating_transition': q => `この「${q}」で、話が次へ進みます。`,
    /* particle.correlative_men / correlative_de は Phase 2 で men_de_contrast に
       統合（reading-policy.json）。役割文は _WORD_ROLE_TEXT が担当。 */
    /* particle.emphatic_negative / particle.double_negative は節レベル現象
       negative_emphasis へ移動（reading-policy.json / _VERSE_NOTE_TEXT）。
       単語を選択しなくても Passage Note に表示される。 */
    'particle.particle_an':               q => `この「${q}」が、実際にはそうならなかった、という響きを添えます。`,
    'particle.rhetorical_particle':       q => `この「${q}」が、断じて、と強く退けます。`,
};

/* multiple スコープ現象の単語役割文（Phase 1: negative_emphasis のみ）。
   節文（_VERSE_NOTE_TEXT）の再利用ではなく「その単語が現象の中で何を
   しているか」を語る（役割の分担: 節=意味、語=役割）。
   表示可否は Reading Policy（正規化スコープに word を含む現象）が決める。
   現象を増やすときは reading-policy.json の scope を配列にし、
   ここに「現象名 → (token) => 一文」を1件足すだけでよい。 */
const _WORD_ROLE_TEXT = {
    /* 原語表記の原則（reading-policy.md §12）: 日本語を入口とし、
       クリックした語と対になる「まだ選択されていない語」を本文から
       探させる時だけ、括弧内にギリシャ語を添える（指さし）。
       ギリシャ語を文の主語・目的語にしない。 */
    negative_emphasis: (token) => {
        const lm = (token && token.lemma) || '';
        if (['οὐ', 'οὐκ', 'οὐχ'].includes(lm)) {
            return 'ふだんは「〜ない」を表すことばですが、ここではあとに来るもう一つの打ち消し（μή）と重なり、『決して〜ない』という強い言い方を作っています。';
        }
        if (lm === 'μή') {
            return 'すぐ前の打ち消し（οὐ）と重なることで、単独のときより強い『決して〜ない』という意味になります。';
        }
        return '二重の打ち消し（οὐ μή）を受けることばで、『決して〜しない』という最も強い言い方で否定されています。';
    },
    men_de_contrast: (token) => {
        const lm = (token && token.lemma) || '';
        if (lm === 'μέν') return '『一方では』と対比の前半を開くことばです。あとに来る『他方では』の合図（δέ）と対になります。';
        if (lm === 'δέ')  return '『他方では』と対比の後半を受けることばです。前にある『一方では』の合図（μέν）と対になります。';
        return '『一方では…他方では』という対（μέν…δέ）の一部として、二つのことを対比して示しています。';
    },
    parenthesis: (token) => {
        const lm = (token && token.lemma) || '';
        if (lm === 'εἰμί') return '『つまり』と言いかえる合図で、ここから補足の説明がはさまれます。';
        if (['λέγω', 'φημί', 'οἶμαι'].includes(lm)) {
            return '語り手が本筋をいったん止めて、ひとこと差しはさむ合図です。';
        }
        return 'この語から、話の途中に説明がはさまれます。';
    },
    /* v1.0監査: 語文は「その単語の役割」だけを言う（節文の言い換え禁止） */
    nominative_pendens: () =>
        'この語が、この文の主題です。',
    conditional_counterfactual: () =>
        'この『もし』は、実際にはそうならなかったことを仮定する入口です。',
    conditional_assumed_true: () =>
        'この『もし』は疑いではなく、事実を前提にしています。',
};

async function _buildObservationHTML(words, idx, existingTexts) {
    const proj = await _getReadingSupportProjection(words);
    const w = proj && proj.words ? proj.words[idx] : null;
    if (!w || !w.categories) return null;

    /* 指させる語か: 節 → 打ち消し・対 → 接続 → 動詞 → 談話 → 主格の順で判定を探す。
       （discourse は挿入句、nominative は懸垂主格の役割文のためにのみ走査 —
       これらのカテゴリで文を持つのは _WORD_ROLE_TEXT の現象だけ）
       表示可否は Reading Policy（正規化スコープに word を含む × priority ≥ normal ×
       confidence ≥ min_confidence）が決める。verse 専用スコープの現象は
       Passage Note が担当するためここでは出さない（二重表示の禁止）。
       multiple（verse+word）の現象は _WORD_ROLE_TEXT の役割文を優先する。 */
    const _obPolicy  = _wallacePipeline?.policy;
    const _obRule    = _obPolicy?.rules?.observation || {};
    const _obMinConf = _obPolicy?.rules?.min_confidence ?? 0.40;
    const _obAllowed = (id) => {
        const ph = _obPolicy?.byId?.[id];
        if (!ph) return true;   // ポリシー未定義IDは従来どおり（保守的に許可）
        const scopes = _policyScopes(ph);
        return (_obRule.scopes || []).some(s => scopes.includes(s)) &&
               (_obRule.priorities || []).includes(ph.priority);
    };
    let make = null;
    for (const cat of ['clause', 'particle', 'conjunction', 'verb', 'discourse', 'nominative']) {
        const c = w.categories[cat];
        if (!c || c.confidence < _obMinConf || !_obAllowed(c.id)) continue;
        const ph = _obPolicy?.byId?.[c.id];
        if (ph && _WORD_ROLE_TEXT[ph.phenomenon]) {
            make = () => _WORD_ROLE_TEXT[ph.phenomenon](words[idx]);
            break;
        }
        if (_OBSERVATION_SENTENCES[c.id]) {
            make = _OBSERVATION_SENTENCES[c.id];
            break;
        }
    }
    if (!make) return null;

    const quoted = _escH((words[idx] && (words[idx].japanese || words[idx].text)) || '');
    if (!quoted) return null;
    const line = make(quoted);

    /* 重複禁止: 既に出ている文（この節の読書メモ・かたまり）と同内容なら沈黙 */
    if ((existingTexts || []).some(t => t && String(t).includes(line))) return null;
    /* 言い換え禁止（Phase 26 編集）: 節の読書メモが同じことを別の言い方で
       述べている場合も沈黙する（役割の重複を避ける） */
    const rnText = String((existingTexts || [])[0] ?? '');
    const OVERLAP = [
        [/なぜ成立|理由/, /理由/],
        [/対比|転換/, /向きが変わ|次へ進み/],
        [/内容が具体的/, /中身/],
        [/目的として何が/, /目的が始まり/],
    ];
    if (rnText && OVERLAP.some(([rn, ob]) => rn.test(rnText) && ob.test(line))) return null;

    return `<div class="rn-prose reading-block"><p class="rn-prose-text reading-prose">${line}</p></div>`;
}
/* __OBSERVATION_END__ */

/**
 * Phase 24: words に対する Reading Support Projection を返す（読み取り専用）。
 * StudyPanel 側は必要な時だけこれを読む（Phase 25 以降の消費者向け API）。
 * Projection が無い場合は null — 呼び出し側は現状表示のままでよい。
 * @returns {Promise<Object|null>}
 */
async function _getReadingSupportProjection(words) {
    if (!words || words.length === 0) return null;
    await _getWallaceClauseAnalysis(words);
    return (_wallaceClauseCache && _wallaceClauseCache.words === words)
        ? (_wallaceClauseCache.projection ?? null)
        : null;
}

/* __VERSE_NOTE_BEGIN__
   節レベル読書メモ（Passage Note の Projection 走査）— Reading Policy 駆動

   どの id をどこに表示するか（scope / priority / 現象グループ / verse_source）は
   assets/data/reading-policy.json（唯一の機械可読定義源）が決める。
   本テーブルは「現象 → 一文」の文言のみを持つ（IDは一切書かない）。
   検出は従来どおり SyntaxAnalyzer / ReadingSupportProjection（変更しない）。

   現象を追加する手順:
     1. reading-policy.json に phenomenon（scope/priority/ids）を1件追加
     2. verse スコープなら本テーブルに「現象名 → 一文」を1行追加
   コード側のロジック変更は不要。 */
const _VERSE_NOTE_TEXT = {
    /* 原語表記の原則（reading-policy.md §12）: 節文は語が未選択の場面なので、
       本文から探させたい語にだけ 日本語（ギリシャ語）の指さしを添える。 */
    negative_emphasis:
        'ここでは打ち消しのことば（οὐ μή）を二つ重ねて、『決して〜ない』と強く断言しています。',
    conditional_counterfactual:
        'ここでは、実際にはそうならなかった『もし〜だったなら』という仮定で語られています。',
    conditional_assumed_true:
        'ここでは、『もし〜なら』の条件が、事実として受け止められて話が進みます。',
    men_de_contrast:
        'ここでは、二つのことが対（μέν…δέ）に置かれて語られています。',
    emphasis_word_order:
        'ここでは、ことばの順序によって、あることばが際立たされています。',
    parenthesis:
        'ここでは、話の途中に説明の一言がはさまれています。',
    nominative_pendens:
        'ここでは、まず主題が示され、あとからそれを受け直して話が続きます。',
};

/* 現象の scope を原子スコープの配列に正規化する。
   文字列（'verse'等）・配列（['verse','word']）の両形式を受け、
   'multiple' は ['verse','word'] の別名として展開する（reading-policy.json
   の scope_note と対応）。 */
function _policyScopes(ph) {
    const s = ph?.scope;
    if (Array.isArray(s)) return s;
    if (s === 'multiple') return ['verse', 'word'];
    return s ? [s] : [];
}

/* Projection の全語 × 全カテゴリを走査し、Reading Policy の passage_note 規則
   （正規化スコープが verse を含む × priority ∈ {critical, high} × verse_source =
   'projection' × confidence ≥ min_confidence）を満たす現象の文を
   出現順・重複なしで返す。規則の値はすべて policy から読む。 */
function _collectVerseNoteSentences(proj, policy) {
    if (!proj || !Array.isArray(proj.words) || !policy) return [];
    const rule    = policy.rules?.passage_note || {};
    const minConf = policy.rules?.min_confidence ?? 0.40;
    const lines = [];
    for (const w of proj.words) {
        if (!w || !w.categories) continue;
        for (const c of Object.values(w.categories)) {
            if (!c || c.confidence < minConf) continue;
            const ph = policy.byId[c.id];
            if (!ph) continue;
            if (ph.verse_source !== 'projection') continue;
            const scopes = _policyScopes(ph);
            if (!(rule.scopes || []).some(s => scopes.includes(s))) continue;
            if (!(rule.priorities || []).includes(ph.priority)) continue;
            const line = _VERSE_NOTE_TEXT[ph.phenomenon];
            if (line && !lines.includes(line)) lines.push(line);
        }
    }
    return lines;
}
/* __VERSE_NOTE_END__ */

/**
 * words（節の生トークン配列）から ReadingFormatter による読書メモHTMLを
 * 組み立てる。文章は一切自前で生成しない — ReadingFormatter.format()の
 * title/summary と _VERSE_NOTE_TEXT の固定文のみを使う。
 *
 * 情報源は2系統（検出と表示の分離）:
 *   1) ClauseAnalyzer の discourse 分類 → ReadingFormatter.format/combine
 *   2) ReadingSupportProjection の節全体走査 → _collectVerseNoteSentences
 * 節が1つも検出されなくても、節レベル現象（οὐ μή 等）があれば表示する。
 * @returns {Promise<string|null>} 表示すべき内容が無ければ null
 */
async function _buildWallacePassageNoteHTML(words) {
    if (!words || words.length === 0) return null;

    const clauseResults = await _getWallaceClauseAnalysis(words);

    const pipeline = await _ensureWallacePipeline();
    if (!pipeline) return null;
    const { ca, rf } = pipeline;

    const seen = new Set();
    const sentences = [];
    for (const clause of (clauseResults || [])) {
        const discourse = ca.classifyDiscourseRelation(words, clause);
        /* UNCLASSIFIED は discourse 関係が判定されなかった節（= 言うべきことがない）
           を意味するため、汎用フォールバック文を出さずスキップする。 */
        if (!discourse?.type || discourse.type === 'UNCLASSIFIED') continue;
        const formatted  = rf.format({ discourse, type: clause.type });
        const sentence   = formatted && formatted.summary;
        if (sentence && !seen.has(sentence)) {
            seen.add(sentence);
            sentences.push(sentence);
        }
    }

    /* 複数節が検出された場合、節ごとに「ここでは、」を繰り返さず
       ReadingFormatter.combine() で1つの自然文に統合する
       （単一節の場合は combine() がそのまま元の文を返す）。 */
    const combined = sentences.length > 0 ? rf.combine(sentences) : null;

    /* 節レベル現象は combine() の「ここでは、」統合形式に合わないため、
       別段落として discourse 文の後に併記する。対象の選別は Reading Policy。 */
    const proj = await _getReadingSupportProjection(words);
    const verseLines = _collectVerseNoteSentences(proj, pipeline.policy);

    const paras = [];
    if (combined) paras.push(combined);
    for (const line of verseLines) {
        if (!paras.includes(line)) paras.push(line);
    }
    if (paras.length === 0) return null;

    return `
        <section class="wlv-reading-passage-note">
            <span class="wlv-pn-label">この節の読書メモ</span>
            <div class="wlv-pn-prose">
                ${paras.map(t => `<p>${t}</p>`).join('')}
            </div>
        </section>`;
}

/**
 * #wlv-passage-note-slot を ReadingFormatter の結果で非同期に埋める。
 * 表示すべき内容が無ければ何も注入しない（説明文で埋めない＝静寂優先）。
 * ユーザーが別の節へ素早く移動した場合に古い結果を誤注入しないよう、
 * 世代カウンタで自分が最新の呼び出しかを確認してから反映する。
 */
async function _fillWallacePassageNote(words, container) {
    const myGen = ++_wallacePassageNoteGen;
    const html = await _buildWallacePassageNoteHTML(words);
    if (myGen !== _wallacePassageNoteGen) return;       // 既に次の節に移動済み
    if (!html) return;                                   // 静寂優先：空スロットのまま
    const slot = container && container.querySelector('#wlv-passage-note-slot');
    if (slot) slot.outerHTML = html;
    /* 語ドロワーと同一文なら非表示（_fillWlvResonance より後に完了した場合の再チェック） */
    const ddReso = document.getElementById('wlv-dd-resonance');
    _syncWlvPassageNoteVisibility((ddReso?.textContent || '').trim());
}

/**
 * 語ドロワーの resonance テキストと「この節の読書メモ」を比較し、
 * 同一文の場合は読書メモを非表示にする。
 * @param {string} resoText - #wlv-dd-resonance の現在のテキスト（trim済み）
 */
function _syncWlvPassageNoteVisibility(resoText) {
    const pnEl = document.querySelector('.wlv-reading-passage-note');
    if (!pnEl) return;
    /* 全段落を結合して比較する。節レベル現象の段落を含む場合は語ドロワーと
       全体一致しない（= 読書メモにしかない情報がある）ため隠さない。 */
    const pnText = Array.from(pnEl.querySelectorAll('.wlv-pn-prose p'))
        .map(p => (p.textContent || '').trim()).filter(Boolean).join('');
    pnEl.style.display = (resoText && pnText && resoText === pnText) ? 'none' : '';
}

/* ═════════════════════════════════════════════════════════════════
 * 単語クリック時の表示（Wordレイヤー）— ReadingFormatter 統一版
 *
 * 旧 _buildResonanceText（pos/tense/voice/mood ごとの独自ヒューリス
 * ティック文と、resonance専用の CONJ_FEEL辞書）は完全に削除した。
 *
 * Word レイヤーは新規の文章を一切生成しない。クリックされた語が
 * 属する節（あれば、最も範囲の狭い節）を ClauseAnalyzer の結果から
 * 特定し、その節の discourse 判定結果を wordContext.clauseContext と
 * して ReadingFormatter.format(wordContext) に渡すだけ — 「節の意味の
 * 一部として単語を見る」という Wallace 思想のとおり、単語自体の
 * 文法（reason/purpose 等の分析語、grammarタグ、confidence）は
 * 一切表示しない。
 *
 * 意味のある clauseContext が見つからない場合（語がどの節にも
 * 属さない、または解析自体が行えない）は null を返し、呼び出し側で
 * 完全に非表示にする（説明文で埋めない＝静寂優先）。
 * ═════════════════════════════════════════════════════════════════ */

/**
 * words 配列中の idx 番目の語が属する節（あれば最も範囲の狭い節）を返す。
 */
function _findEnclosingClause(clauseResults, idx) {
    let best = null;
    for (const c of clauseResults) {
        if (c.start <= idx && idx <= c.end) {
            if (!best || (c.end - c.start) < (best.end - best.start)) best = c;
        }
    }
    return best;
}

/**
 * 1語（words[idx]）について、その語が属する節の ReadingFormatter 文を
 * 返す。単語レベルの独立解釈は一切行わない。
 * @returns {Promise<string|null>} 意味のある clauseContext が無ければ null
 */
async function _buildWordResonanceText(words, idx) {
    if (!words || words.length === 0 || idx == null || !words[idx]) return null;

    const clauseResults = await _getWallaceClauseAnalysis(words);
    if (!clauseResults || clauseResults.length === 0) return null;

    const clause = _findEnclosingClause(clauseResults, idx);
    if (!clause) return null; // ⑤ 意味のある clauseContext が無い → 完全非表示

    const pipeline = await _ensureWallacePipeline();
    if (!pipeline) return null;
    const { ca, rf } = pipeline;

    const w = words[idx];
    const discourse = ca.classifyDiscourseRelation(words, clause);
    const wordContext = {
        type:          w.lemma || w.morph || '',
        text:          w.text  || '',
        verseContext:  w.verse != null ? String(w.verse) : '',
        clauseContext: { discourse, type: clause.type },
    };
    const formatted = rf.format(wordContext);
    const clauseSentence = (formatted && formatted.summary) || null;

    /* Phase 25B-1: Reading Support Projection の top.id をテンプレート選択キー
       としてのみ利用し、語粒度の 1 文を節の文に「加える」（Mapping §3.1）。
       - 帯C（confidence < 0.40）・候補なし・テンプレ未整備・既存文と重複・
         Projection null では従来どおり節の文のみ（静寂条件 = Phase 25A §5）。
       - 文の生成は従来どおり ReadingFormatter.format/combine のみが行う。 */
    let wordSentence = null;
    try {
        const proj = await _getReadingSupportProjection(words);   // キャッシュ再利用のみ
        const pw = proj && proj.words ? proj.words[idx] : null;
        if (pw && pw.top && pw.top.confidence >= 0.40) {
            const unclassified = rf.format({}).summary;           // 未整備判定の基準文
            const f2 = rf.format({ type: pw.top.id });
            const s2 = (f2 && f2.summary) || null;
            if (s2 && s2 !== unclassified && s2 !== clauseSentence) wordSentence = s2;
        }
    } catch (_) { wordSentence = null; }

    if (clauseSentence && wordSentence) {
        const combined = rf.combine([clauseSentence, wordSentence]);
        return combined || clauseSentence;
    }
    return clauseSentence || null;
}

let _wlvResonanceGen = 0; // 古い非同期結果の誤注入を防ぐ世代カウンタ

/**
 * #wlv-dd-resonance を ReadingFormatter の結果で非同期に埋める。
 * 表示すべき内容が無ければ空のまま（静寂優先）。
 */
async function _fillWlvResonance(ddReso, words, idx) {
    if (!ddReso) return;
    const myGen = ++_wlvResonanceGen;
    ddReso.textContent = '';
    const sentence = await _buildWordResonanceText(words, idx);
    if (myGen !== _wlvResonanceGen) return; // 既に別の語に移動済み
    if (sentence) ddReso.textContent = sentence;
    /* 節全体の読書メモと同一文なら非表示 */
    _syncWlvPassageNoteVisibility((sentence || '').trim());
}


/**
 * 1語のデータを flow chip 表示用オブジェクトに変換する。
 *
 * @param {Object} w   word data（text, morph, lemma, japanese/gloss, ref, strong）
 * @param {number} i   index
 * @returns {{ greek, gloss, roleClass, phraseBreakBefore, signals, morphText, jaWord, rawMorph, lemma, ref, strong }}
 */
/**
 * @param {Object} w       - 語トークン（生JSON）
 * @param {number} i       - 節内インデックス
 * @param {string} [_bookKey] - 書物キー（呼び出し元が持つ構造フィールド）
 * @param {number} [_ch]      - 章番号（呼び出し元が持つ構造フィールド）
 */
function _wordToFlowChip(w, i, _bookKey, _ch) {
    const greek    = w.text   || '-';
    const rawMorph = w.morph  || '';
    const lemma    = w.lemma  || '';
    // ★ ref は表示専用。ナビゲーション/ロジックには bookKey / ch / verse を使う。
    const ref      = w.ref    || '';
    // ★ SSOT: 書物キー・章番号は構造フィールドから取得（ref パース禁止）
    // 生データのフィールド名は book / chapter（bookKey / ch ではない）なのでフォールバック追加
    const bookKey  = w.bookKey  || w.book    || _bookKey || '';
    const ch       = w.ch      != null ? w.ch
                   : w.chapter != null ? w.chapter
                   : _ch       != null ? _ch
                   : null;
    const verse    = w.verse    != null ? w.verse    : null;
    const strong   = normalizeStrong(w.strong);
    // 表示言語の優先順位: gloss → lemma → '—'
    // 表示変更したい場合はここを w.japanese || w.gloss || w.lemma || '—' などに変更する
    const jaWord   = w.japanese || '—';

    const parts    = rawMorph.split('-');
    const pos      = parts[0] || '';

    /* ── グロス自然化 ── */
    let gloss = jaWord;

    /* 動詞の法・時制に応じた接尾調整 */
    if (pos === 'V' && parts[1]) {
        const off       = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off]     || '';
        const voiceCode = parts[1][off + 1] || '';
        const moodCode  = parts[1][off + 2] || '';

        /* 分詞：「〜ながら」「〜した（上で）」など */
        if (moodCode === 'P') {
            if (tenseCode === 'P') gloss = _naturalize(jaWord, 'part-pres');
            else if (tenseCode === 'A') gloss = _naturalize(jaWord, 'part-aor');
            else if (tenseCode === 'X') gloss = _naturalize(jaWord, 'part-perf');
        }
        /* 不定詞 */
        else if (moodCode === 'N') {
            gloss = _naturalize(jaWord, 'inf');
        }
        /* 命令法 */
        else if (moodCode === 'M') {
            gloss = _naturalize(jaWord, 'imp');
        }
        /* 受動態 */
        if (voiceCode === 'P') {
            gloss = _naturalize(gloss, 'pass');
        }
    }

    /* 冠詞：gloss/lemma をそのまま使う（他の品詞と統一） */

    /* roleClass：chip dot の色付けと signal 生成 */
    const dpGrammarClasses = buildDepthGrammarClasses(rawMorph).join(' ');
    
    let roleClass = 'role-other';
    const signals = [];

    if (pos === 'V') {
        roleClass = 'role-verb';
        const off      = /^[0-9]/.test(parts[1] || '') ? 1 : 0;
        const moodCode = (parts[1] || '')[off + 2] || '';
        const tenCode  = (parts[1] || '')[off]     || '';
        const voiCode  = (parts[1] || '')[off + 1] || '';

        /* 法（Mood）シグナル - 読書感覚の言葉で */
        if (moodCode === 'M') signals.push({ label: '強く勧めている', cls: 'sig-exhort' });
        else if (moodCode === 'P') signals.push({ label: '背景を描いている', cls: 'sig-logic' });
        else if (moodCode === 'N') signals.push({ label: '目的を示している', cls: 'sig-logic' });
        else if (moodCode === 'S') signals.push({ label: '願いを込めている', cls: 'sig-logic' });

        /* 時制シグナル - 読書感覚の言葉で */
        if (tenCode === 'X') signals.push({ label: '今も続いている', cls: 'sig-promise' });
        else if (tenCode === 'A' && moodCode === 'I') signals.push({ label: '一つの出来事として語っている', cls: 'sig-declare' });
        else if (tenCode === 'F' && moodCode === 'I') signals.push({ label: '確かに起きると語っている', cls: 'sig-promise' });

        /* 態シグナル */
        if (voiCode === 'P') signals.push({ label: '受けとめる側に立っている', cls: 'sig-word' });
        else if (voiCode === 'M' || voiCode === 'D') signals.push({ label: '深く関わりながら動いている', cls: 'sig-word' });
    }
    else if (pos === 'N')    {
        roleClass = 'role-noun';
        const caseParts = parts[1] || '';
        const base = ['1','2','3'].includes(caseParts[0]) ? caseParts.slice(1) : caseParts;
        const CASE_SIG = {
            N: { label: '中心にいる', cls: 'sig-logic' },
            G: { label: '結びついている', cls: 'sig-logic' },
            D: { label: '関わりを受けている', cls: 'sig-logic' },
            A: { label: '動作の向かう先', cls: 'sig-logic' },
            V: { label: '呼びかけられている', cls: 'sig-logic' }
        };
        const cs = CASE_SIG[base[0]];
        if (cs) signals.push(cs);
        const NUM_SIG = { P: { label: '複数で語られている', cls: 'sig-logic' } };
        const ns = NUM_SIG[base[1]];
        if (ns) signals.push(ns);
    }
    else if (pos === 'A')    {
        roleClass = 'role-adj';
        const caseParts = parts[1] || '';
        const base = ['1','2','3'].includes(caseParts[0]) ? caseParts.slice(1) : caseParts;
        const CASE_SIG = {
            N: { label: '特徴を示している', cls: 'sig-logic' },
            G: { label: '性質を結びつけている', cls: 'sig-logic' },
            D: { label: '関わる対象を彩っている', cls: 'sig-logic' },
            A: { label: '対象の様子を語っている', cls: 'sig-logic' }
        };
        const cs = CASE_SIG[base[0]];
        if (cs) signals.push(cs);
    }
    else if (pos === 'CONJ') {
        roleClass = 'role-conj';
        const CONJ_SIG = {
            'γάρ':  { label: 'なぜなら、と理由へ進む', cls: 'sig-logic' },
            'ἀλλά': { label: 'しかし、と流れが変わる', cls: 'sig-turn' },
            'οὖν':  { label: 'だから、と結論へ向かう', cls: 'sig-logic' },
            'δέ':   { label: '話が次の段階へ進む', cls: 'sig-turn' },
            'καί':  { label: 'さらに、と積み重なる', cls: 'sig-emphasis' },
            'ἵνα':  { label: '〜のために、と目的が示される', cls: 'sig-logic' },
            'ὅτι':  { label: '〜ということ、と内容が続く', cls: 'sig-logic' },
            'εἰ':   { label: 'もし〜なら、と仮定の話に入る', cls: 'sig-logic' },
            'ὥστε': { label: 'その結果として、と帰結が来る', cls: 'sig-logic' },
        };
        const cs = CONJ_SIG[w.text];
        if (cs) signals.push(cs);
        else signals.push({ label: '前後をつないでいる', cls: 'sig-logic' });
    }
    else if (pos === 'PREP') { roleClass = 'role-prep'; signals.push({ label: '関係の方向を示している', cls: 'sig-logic' }); }
    else if (pos === 'T')    { roleClass = 'role-art'; /* 冠詞はsignalなし。静かに */ }
    else if (['P','R','D'].includes(pos)) {
        roleClass = 'role-pron';
        const caseParts = parts[1] || '';
        const base = ['1','2','3'].includes(caseParts[0]) ? caseParts.slice(1) : caseParts;
        const CASE_SIG = {
            N: { label: '誰の話かを示している', cls: 'sig-logic' },
            G: { label: '誰に関わるかを示している', cls: 'sig-logic' },
            D: { label: '関わりを受けている人を指す', cls: 'sig-logic' },
            A: { label: '動作の向かう人を指す', cls: 'sig-logic' }
        };
        const cs = CASE_SIG[base[0]];
        if (cs) signals.push(cs);
    }

    /* 句区切りの判定：接続詞・前置詞の前で区切る */
    const phraseBreakBefore = (pos === 'CONJ' && i > 0) || (pos === 'PREP' && i > 0);

    /* morphText：ドロワーに表示する人が読める文法メモ */
    const morphText = _buildMorphText(rawMorph, pos, parts);

    // ★ SSOT: bookKey / ch / verse を chip に持たせる。
    //          openStudyPanel 等のロジックはこれらを使い、ref 文字列に依存しない。
    const language = w.language  || 'grc';
    const corpusId = w.corpusId  || '';
    const lemmaId  = w.lemmaId   != null ? w.lemmaId : null;
    return { greek, gloss, roleClass, phraseBreakBefore, signals, morphText, jaWord, rawMorph, lemma, ref, strong, dpGrammarClasses, bookKey, ch, verse, language, corpusId, lemmaId };
}

/**
 * 日本語グロスを品詞・法に応じて自然化する。
 * グロスの末尾をルールベースで変換する。複雑な形態素分析は行わない。
 * 変換できなければ元の gloss をそのまま返す。
 */
function _naturalize(gloss, kind) {
    /* 動詞語幹の末尾を変換するルールテーブル */
    const RULES = {
        'part-pres': [ /* 現在分詞：〜ながら / 〜つつ → 〜ながら */
            [/する$/, 'しながら'], [/する$/, 'しながら'],
            [/いる$/, 'いながら'], [/える$/, 'えながら'],
            [/くる$/, 'きながら'], [/ある$/, 'ありながら'],
            [/([^ん])る$/, '$1ながら'],
            [/つ$/, 'ちながら'],   [/ぬ$/, 'にながら'],
            [/む$/, 'みながら'],   [/ぶ$/, 'びながら'],
            [/う$/, 'いながら'],   [/く$/, 'きながら'],
            [/す$/, 'しながら'],   [/ぐ$/, 'ぎながら'],
        ],
        'part-aor': [ /* アオリスト分詞：〜した（後で） */
            [/する$/, 'した'],     [/いる$/, 'いた'],
            [/える$/, 'えた'],     [/くる$/, 'きた'],
            [/([^ん])る$/, '$1た'],
            [/つ$/, 'った'],       [/ぬ$/, 'んだ'],
            [/む$/, 'んだ'],       [/ぶ$/, 'んだ'],
            [/う$/, 'った'],       [/く$/, 'いた'],
            [/す$/, 'した'],       [/ぐ$/, 'いだ'],
        ],
        'part-perf': [ /* 完了分詞：〜した（状態） */
            [/する$/, 'してきた'], [/いる$/, 'いてきた'],
            [/([^ん])る$/, '$1てきた'],
            [/つ$/, 'ってきた'],   [/む$/, 'んできた'],
        ],
        'inf': [ /* 不定詞：〜すること */
            [/する$/, 'すること'], [/いる$/, 'いること'],
            [/える$/, 'えること'], [/くる$/, 'くること'],
            [/([^ん])る$/, '$1ること'],
            [/つ$/, 'つこと'],    [/ぬ$/, 'ぬこと'],
            [/む$/, 'むこと'],    [/ぶ$/, 'ぶこと'],
            [/う$/, 'うこと'],    [/く$/, 'くこと'],
            [/す$/, 'すこと'],
        ],
        'imp': [ /* 命令法：そのまま（「〜せよ」は重い）*/
            [/する$/, 'せよ'],    [/([^ん])る$/, '$1よ'],
        ],
        'pass': [ /* 受動：〜される */
            [/する$/, 'される'],  [/いる$/, 'いられる'],
            [/([^ん])る$/, '$1られる'],
            [/つ$/, 'たれる'],    [/む$/, 'まれる'],
            [/ぶ$/, 'ばれる'],    [/く$/, 'かれる'],
            [/す$/, 'される'],
        ],
    };

    const rules = RULES[kind] || [];
    for (const [pattern, replacement] of rules) {
        if (pattern.test(gloss)) {
            return gloss.replace(pattern, replacement);
        }
    }
    return gloss; /* 変換できなければ元のまま */
}

/**
 * rawMorph から読書感覚の補助メモ（1行）を生成する。
 * ドロワーに表示するだけなので学術ラベルは使わない。
 * Study タブでは別途詳細が表示される。
 */
function _buildMorphText(rawMorph, pos, parts) {
    if (pos === 'V' && parts[1]) {
        const off  = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const moodCode  = parts[1][off + 2] || '';
        const tenCode   = parts[1][off]     || '';
        const voiCode   = parts[1][off + 1] || '';

        const ptcNote = tenCode === 'A' ? '先行する副詞的動作（先行状況）'
                      : tenCode === 'P' ? '副詞的・形容詞的に同時の状況を描き添えている'
                      : '副詞的・実体的に状況を補っている';
        const MOOD_NOTE = {
            'M': '行動への呼びかけ',
            'P': ptcNote,
            'N': '目的や内容を補っている',
            'S': '願いや目的を含んでいる',
            'I': '事実として語っている',
            'O': '望みを込めた表現',
        };
        const TEN_NOTE = {
            'X': '過去から今も続く状態',
            'A': 'ある出来事として',
            'F': '確かに起きること',
            'P': '今・継続して',
            'I': '続いていた状態',
        };
        const VOI_NOTE = {
            'P': '受けとめる側に',
            'M': '深く関わりながら',
            'D': '深く関わりながら',
        };

        const notes = [];
        if (MOOD_NOTE[moodCode]) notes.push(MOOD_NOTE[moodCode]);
        if (TEN_NOTE[tenCode] && moodCode !== 'N' && moodCode !== 'P') notes.push(TEN_NOTE[tenCode]);
        if (VOI_NOTE[voiCode]) notes.push(VOI_NOTE[voiCode]);
        return notes.join('・') || '動詞';
    } else if (['N','A'].includes(pos) && parts[1]) {
        const base = ['1','2','3'].includes(parts[1][0]) ? parts[1].slice(1) : parts[1];
        const CASE_NOTE = {
            'N': '文の中心にいる', 'G': '〜の、と結びつく',
            'D': '関わりを受ける', 'A': '動作の向かう先', 'V': '呼びかけ'
        };
        const NUM_NOTE = { 'S': '単数', 'P': '複数' };
        const notes = [];
        if (CASE_NOTE[base[0]]) notes.push(CASE_NOTE[base[0]]);
        if (NUM_NOTE[base[1]] === '複数') notes.push('複数で語られている');
        return notes.join('・') || (pos === 'N' ? '名詞' : '形容詞');
    } else if (pos === 'CONJ') {
        return '前後をつなぐことば';
    } else if (pos === 'PREP') {
        return '関係の方向を示す';
    } else if (pos === 'T') {
        return '指し示すことば（冠詞）';
    } else if (['P','R','D'].includes(pos)) {
        return '誰かを指し示している';
    }
    return '';
}

function _wlvChipClick(chipEl, idx) {
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {

        console.log('[Onboarding]', step);

    chips.forEach(c => c.classList.remove('active'));

    /* 本文中（読書フロー）の chip は節ブロックに紐づくローカルキャッシュから取得。
       複数節が同時に描画されるため、グローバルな _wlvWordCache（idx基準）は節を跨いで取り違える。
       パネル内の流れタブ（節ブロックの外）では従来どおり _wlvWordCache を使う。 */
    const verseBlock = chipEl.closest('.verse-block');
    const chip = (verseBlock && verseBlock._flowChips) ? verseBlock._flowChips[idx] : _wlvGetChipData(idx);
    if (!chip) return;

    /* AppState の inspect を更新
       ★ SSOT: ref は表示専用として保持。ロジックには bookKey / ch / verse を使う。 */
    AppState.inspect.data = {
        greek:    chip.greek,
        strong:   chip.strong,
        jpMorph:  chip.morphText,
        rawMorph: chip.rawMorph,
        lemma:    chip.lemma,
        jaWord:   chip.jaWord,
        desc:     (abbottSmithDict && abbottSmithDict[chip.strong.slice(1)]?.description) || '',
        ref:      chip.ref,      // 表示専用（ラベル・URL クエリ文字列のみ）
        bookKey:  chip.bookKey  || '',

        verse:    chip.verse    != null ? chip.verse  : null,
        language: chip.language || 'grc',
        corpusId: chip.corpusId || '',
        lemmaId:  chip.lemmaId  != null ? chip.lemmaId : null,
    };

    if (window.App.storage && chip.strong) {
        window.App.storage.addRecentWord({
            lemma: chip.lemma,
            strong: chip.strong,
            bookKey: chip.bookKey || '',
            chapter: chip.ch != null ? Number(chip.ch) : null,
            verse: chip.verse != null ? Number(chip.verse) : null,
        });
    }

    if (verseBlock) {
        /* 本文を読んでいる最中の chip タップ：StudyPanel に直接表示する。 */
        openStudyPanel(chip.greek, chip.rawMorph, chip.ref, chip.lemma);
        window.App.onboarding?.onWordClicked(chipEl);
        _syncOnboardingActiveFlag();
        return;
    }

    /* パネル内（流れタブ）の chip タップ：ドロワーで軽く確認する。
       Study panel へ進むかどうかは「詳しく見る」ボタン（_wlvStudyBtnClick）に委ねる。 */
    const drawer = document.getElementById('wlv-detail-drawer');
    if (drawer) {
        const ddGreek = document.getElementById('wlv-dd-greek');
        const ddJa    = document.getElementById('wlv-dd-ja');
        const ddReso  = document.getElementById('wlv-dd-resonance');
        if (ddGreek) ddGreek.textContent = chip.greek || '-';
        if (ddJa)    ddJa.textContent    = chip.jaWord || chip.gloss || '-';
        /* ReadingFormatter駆動・非同期（静寂優先：意味のある節文脈が無ければ何も表示しない） */
        _fillWlvResonance(ddReso, _wlvWordCache, idx);
        drawer.classList.add('visible');
    }

    /* onboarding hook（クリックされたchip要素を渡す） */
    window.App.onboarding?.onWordClicked(chipEl);
    _syncOnboardingActiveFlag();
}

 */
let _wlvWordCache = [];

/* ══════════════════════════════════════════
   パネルリサイズ（縦方向ドラッグ - bottom-depth-panel）
   設計原則：
   - pointerdown / pointermove / pointerup / pointercancel のみ（mouse/touch分岐禁止）
   - setPointerCapture で捕捉 → pointerup/cancel で必ず releasePointerCapture
   - ドラッグ中は window/document 依存なし（capture で完結）
   - 高さは常に clamp で処理（状態依存でイベントを止めない）
   - isDragging / height は StudyPanelState で一元管理（height が SSOT）
   - DOM 反映は requestAnimationFrame で 1 フレーム 1 回にまとめる
   - offsetHeight の read-after-write 禁止（計算済みの値だけを書く）
   - 離した位置で停止する（スナップ・慣性なし）。次回 open も同じ高さ
   ══════════════════════════════════════════ */
(function() {
    const handle = document.getElementById('panel-resize-handle');
    const panel  = document.getElementById('bottom-depth-panel');
    if (!handle || !panel) return;

    let startY = 0, startH = 0;
    let pendingH = null;   /* rAF 反映待ちの高さ（null = なし） */
    let rafId    = 0;

    /* 計算済みの高さ h を DOM へ反映する（読み取りなし・書き込みのみ）。
       本文 padding も同じ h で直接同期し、offsetHeight の強制レイアウトを避ける */
    function _applyHeight(h) {
        if (window.innerWidth <= 768) return;   /* 全画面は CSS top/bottom 管理 */
        if (_isMobile()) {
            /* 769–900px：!important でドラッグ中の高さを反映 */
            panel.style.setProperty('height', h + 'px', 'important');
        } else {
            panel.style.height = h + 'px';
        }
        const area = document.getElementById('main-reading-area');
        if (area) area.style.paddingBottom = h + 'px';
    }

    function _flush() {
        rafId = 0;
        if (pendingH == null) return;
        const h = pendingH;
        pendingH = null;
        _applyHeight(h);
    }

    handle.addEventListener('pointerdown', (e) => {
        /* 768px以下は全画面モードのためリサイズ不要 */
        if (window.innerWidth <= 768) return;
        StudyPanelState.isDragging = true;
        startY = e.clientY;
        startH = panel.offsetHeight;
        handle.classList.add('dragging');
        /* captureにより、指がハンドル外に出ても pointermove を継続受信する */
        handle.setPointerCapture(e.pointerId);
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });

    handle.addEventListener('pointermove', (e) => {
        if (!StudyPanelState.isDragging) return;
        /* min/max は Geometry SSOT（CSS カスタムプロパティ）から取得。
           従来どおり move 毎に評価する（ドラッグ中のウィンドウリサイズ・
           帯域跨ぎでも旧実装と同じ振る舞いを保つ） */
        const { minH, maxH } = _panelGeomLimits(panel);
        /* clamp：max/min 状態でも反対方向にドラッグすれば必ず動く */
        const nh = Math.min(maxH, Math.max(minH, startH + (startY - e.clientY)));
        StudyPanelState.height = nh;   /* SSOT: 次回 open もこの高さで復元される */
        pendingH = nh;
        if (!rafId) rafId = requestAnimationFrame(_flush);
    });

    function _finishDrag(e) {
        if (!StudyPanelState.isDragging) return;
        StudyPanelState.isDragging = false;
        handle.classList.remove('dragging');
        document.body.style.userSelect = '';
        /* capture を必ず解放する（pointerup/cancel 両方から呼ばれる） */
        try { handle.releasePointerCapture(e.pointerId); } catch (_) {}
        /* スナップ廃止（UX監査による）: 離した位置でそのまま停止する。
           rAF 待ちの高さがあれば即時反映して確定する */
        if (rafId) { cancelAnimationFrame(rafId); rafId = 0; }
        if (pendingH != null) { const h = pendingH; pendingH = null; _applyHeight(h); }
        _syncReadingPanelPadding();   /* 終了時に1回だけ実測で最終同期 */
    }

    function _cancelDrag(e) {
        /* 着信・OSジェスチャーなどでキャンセルされた場合。高さはその場のまま */
        _finishDrag(e);
    }

    handle.addEventListener('pointerup',     _finishDrag);
    handle.addEventListener('pointercancel', _cancelDrag);
})();


/* ══════════════════════════════════════════
   openStudyPanel - 正規実装（唯一の定義）
   責務:
     - word-list-view を消去してiframe/インライン分析に切り替える
     - AppState.saveScroll() で scroll 位置を保存
     - AppState.toStudy() で状態を Study モードへ遷移
     - study.tab を引き継いで前回開いていたタブを復元

/* ══════════════════════════════════════════
   openStudyPanel - 読書メモ版
   タブを廃止し、単一スクロールの読書メモパネルに表示する。
   ══════════════════════════════════════════ */
function openStudyPanel(greek, rawMorph, ref, lemma, options = {}) {
    closeMobileSidebar();
    /* 高さの一律リセットは廃止 — StudyPanelState.height（SSOT）を
       下の _applyPanelHeightFromState() が適用する */
    const listEl = document.getElementById('word-list-view');
    /* 節Panel（Level 2）から来た場合のみ、破棄する直前のスクロール位置を保存しておく
       （panelGoBack() で Level 2 に戻った時に復元する。スクロール保持のための唯一の保存箇所）。 */
    _versePanelScrollTop = (_panelContentMode === 'verse' && listEl) ? listEl.scrollTop : null;
    if (listEl) listEl.remove();

    const m = parseMorphForSearch(rawMorph);
    const params = {
        ref,
        word:      greek,
        lemma:     lemma || '',
        pos:       m.pos    || '',
        _rawMorph: rawMorph,
        tense:     m.tense  || '',
        mood:      m.mood   || '',
        voice:     m.voice  || '',
        gender:    m.gender || '',
        number:    m.number || '',
        case:      m.case   || '',
    };

    /* 読書位置の保存: 閉→開の遷移時のみ。節Panel（Level 2）から単語詳細へ
       進む時に保存すると「パネルを開く前の位置」が open 中の位置で
       上書きされ、close 時に開く前へ戻れなくなる。 */
    if (!document.getElementById('bottom-depth-panel').classList.contains('open')) {
        AppState.saveScroll();
    }
    AppState.toStudy(params, 'notes');

    /* depth stack に追加（重複しないよう、top が同じなら追加しない） */
    const stack = AppState.depth.stack;
    const topEntry = stack[stack.length - 1];
    const isAlreadyDeep = topEntry && topEntry.type === 'deep-reading' && topEntry.strong === String(AppState.inspect.data?.strong || '');
    if (!options.skipDepthPush && !isAlreadyDeep) {
        pushDepth({
            type:   'deep-reading',
            label:  '深く読む',
            strong: String(AppState.inspect.data?.strong || ''),
        });
    }

    const sidePanel    = document.getElementById('bottom-depth-panel');
    const wasOpen = sidePanel.classList.contains('open');
    _panelContentMode = 'word';
    /* 高さの SSOT: Level 2⇄3 遷移でもユーザー調整高さを維持する
       （word モードの上限 80vh へは適用時のみ clamp。state は保持） */
    _applyPanelHeightFromState(sidePanel);
    sidePanel.classList.add('open');
    _syncReadingPanelPadding();
const activeVEl = document.getElementById('active-v');
    if (activeVEl && greek) activeVEl.textContent = greek;

    document.getElementById('open-panel-btn').style.display = 'none';

    /* rcb-container: 語形のみ表示 */
    const rcb = document.getElementById('rcb-container');
    const rcbWord  = document.getElementById('rcb-main-word');
    const rcbGloss = document.getElementById('rcb-main-gloss');
    if (rcbWord)  rcbWord.textContent  = greek || '-';
    if (rcbGloss) rcbGloss.textContent = (AppState.inspect.data?.jaWord) || '';
    if (rcb) rcb.classList.add('visible');

    /* 読書メモエリアを表示 */
    const notesWrap = document.getElementById('reading-notes-wrap');
    if (notesWrap) notesWrap.style.display = 'flex';

    _renderReadingNotes(params);

    /* スクロール位置の復元（close直前に StudyPanelState.scrollTop へ保存した位置を再適用）。
       _renderReadingNotes は async で DOM を置換するため、2段 rAF で確実に render 後に適用する。
       1段目：レイアウト計算開始を待つ。2段目：paint サイクル後に scrollTop を確定する。 */
    {
        const _savedScroll = StudyPanelState.scrollTop;
        StudyPanelState.scrollTop = 0;
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                const nw = document.getElementById('reading-notes-wrap');
                if (nw) nw.scrollTop = _savedScroll;
            });
        });
    }

    /* 節ごとのメモ欄を読み込む（既存の読書メモエリアとは別要素。追記のみ） */
    _loadNoteUI('rn');

    /* ── オンボーディング：アンカー語（ἠγάπησεν）初回タップ時に発見テキストを先頭注入 ── */
    (function _injectObDiscovery() {
        const obState = window.App.onboarding?.getState();
        if (!obState || obState.onboardingComplete) return;
        if (obState.wordClicked) return; /* 2語目以降は出さない */
        if (greek !== 'ἠγάπησεν') return;

        const area = document.getElementById('reading-notes-area');
        if (!area) return;

        const disc = document.createElement('div');
        disc.id = 'ob-discovery-banner';
        disc.style.cssText = [
            'margin:0 0 18px 0',
            'padding:13px 16px',
            'background:var(--accent-light)',
            'border-left:3px solid rgba(90,110,130,0.55)',
            'border-radius:0 var(--radius-s) var(--radius-s) 0',
            'font-family:\'Noto Serif JP\',Georgia,serif',
            'font-size:var(--text-caption)',
            'line-height:1.8',
            'color:rgba(29,29,31,0.82)',
            'letter-spacing:0.01em',
        ].join(';');
        disc.textContent = 'この語は文の先頭に置かれています。ギリシャ語では動詞が最初に来るとき、その行為が強調される読み方があります。日本語訳では見えにくい語順の意図が、原語には残っています。';

        area.insertBefore(disc, area.firstChild);
    })();
    /* ─────────────────────────────────────────────────────── */

    _mobileOpenPanel(greek || '語を読む', wasOpen);
    updatePanelBackButton();
    _adjustReadingAreaForPanel(wasOpen);

    /* onboarding hook */
    if (window.App.onboarding) {
        window.App.onboarding.onStudyPanelOpened(window.innerWidth <= 900, AppState.selectedVerse?.vNum);
    }
    _syncOnboardingActiveFlag();

    notifyAppStateChange();
}
