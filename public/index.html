    /* :root → tokens.css (aliases: --bg-paper, --bg-panel, --bg-sidebar, --bg-card, --text-main, --highlight, --border-soft) */

.ui-label {

    font-weight: 600;
    letter-spacing: 0.08em;

    opacity: var(--opacity-secondary);
}
.greek-headword {

    color: var(--text-main);
}
.reading-prose {
    font-family: 'Noto Serif JP', serif;
    color: var(--text-main);
    line-height: 1.9;
    letter-spacing: 0.01em;
}
.reading-block {
    padding-left: var(--space-md);
    border-left: 2px solid var(--accent-mid);
}

.ui-section-label {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text-hint, #8e8e93);
}
.ui-caption {
    font-size: var(--text-caption);
    color: var(--text-hint, #8e8e93);
}
[data-xsc-arrow] { display: inline-flex; align-items: center; }
[data-xsc-arrow] svg { width: 11px; height: 11px; display: block; }
.ui-card {
    border: 1px solid var(--border, rgba(0,0,0,.07));

    padding: var(--space-sm) var(--space-md);
    background: var(--bg, #fff);
    margin-bottom: var(--space-sm);
}
.ui-panel {
    margin-top: var(--space-sm);
    border: 1px solid var(--border, rgba(0,0,0,.07));

    overflow: hidden;

}
.ui-panel-header {
    display: flex;
    align-items: center;

    background: var(--bg-panel, #f5f5f7);
    cursor: pointer;
    user-select: none;
}
.ui-panel-body {
    display: none;
    padding: var(--space-sm) var(--space-sm) var(--space-sm);
    border-top: 1px solid var(--border, rgba(0,0,0,.07));
}

html {
overflow: hidden;
width: 100%;
height: 100%;
}
body {
font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
line-height: 2.0;
background: var(--bg-paper);
color: var(--text-main);

overflow: hidden;
width: 100%;
height: 100%;

}

.main-layout { display: flex; height: 100%; width: 100%; overflow: hidden; --app-header-h: 60px; background: var(--bg-panel); }

.nav-sidebar {
position: fixed;
top: 0;
left: 0;
height: 100dvh;
width: 280px;
background: var(--bg-panel);
display: flex;
flex-direction: column;
overflow: hidden;
z-index: 5;
opacity: 0;
pointer-events: none;
transition: opacity var(--transition-fast);
}
.nav-sidebar.open {
opacity: 1;
pointer-events: auto;
}
.sidebar-top { padding: var(--space-lg) var(--space-md) var(--space-md); display: flex; align-items: center; gap: var(--space-sm); }
.sidebar-logo { font-weight: 700; font-size: var(--text-body); white-space: nowrap; letter-spacing: -0.01em; color: var(--text-main); }

/* ── Panel Geometry SSOT（デスクトップ既定値） ──
   パネル高さの数値定義は、この規則と ≤900px メディア内の上書きだけ。
   JS は _panelGeomLimits() が getComputedStyle で読む — JS 側に vh/px の
   値を直接書くことは禁止（CSS/JS 二重定義の再発防止）。
   drag-min / expanded / word-max はドラッグと高さ復元の clamp 用
   （デスクトップは拡張なし＝ max と同じ値）。
   ※ この定義はメディアブロックより前に置くこと（カスケード順で
      ≤900px の上書きが勝つため）。 */
#bottom-depth-panel {
    --panel-default-h:  46vh;
    --panel-min-h:      220px;
    --panel-max-h:      70vh;
    --panel-drag-min-h: 220px;
    --panel-expanded-h: 70vh;
    --panel-word-max-h: 70vh;
}

@media (max-width: 900px) {
    .app-header { position: relative; }
    #mobile-menu-btn {
        display: flex;
    }

    #app {
        position: relative;
        overflow: hidden;
    }

    /* モバイル Bottom Sheet：見た目・高さを共通ルールから上書き。
       CSS 変数でサイズを差し替えるため !important 不要。
       位置・表示・transform 制御はすべて共通ルール（#bottom-depth-panel）で管理する。 */
    #bottom-depth-panel {
        --panel-default-h:  40vh;
        --panel-min-h:      0px;
        --panel-max-h:      98vh;
        /* Geometry SSOT（769–900px帯）: ドラッグ/復元の clamp 値 */
        --panel-drag-min-h: 40vh;
        --panel-expanded-h: 98vh;
        --panel-word-max-h: 80vh;
        border-top: none;
        padding-bottom: env(safe-area-inset-bottom, 0px);
        background: var(--bg-paper);
        border-radius: var(--radius-l) var(--radius-l) 0 0;
    }
    #bottom-depth-panel.open {
        box-shadow: 0 -8px 40px rgba(0,0,0,0.10);
    }

    /* compare-mode を強制シングル表示に（769px〜900px：縦積み未満の中間サイズ） */
    #main-reading-area.compare-mode {
        grid-template-columns: 1fr !important;
        display: flex;
        flex-direction: column;
    }
    #main-reading-area.compare-mode #parallel-text-area,
    #main-reading-area.compare-mode .verse-pair-right,
    #main-reading-area.compare-mode .verse-grid-spacer-right,
    #main-reading-area.compare-mode .verse-grid-footer-right {
        display: none !important;
    }

    #mobile-nav-bar {
        display: flex !important;
        align-items: center;
        justify-content: space-between;
        gap: 0;
        height: 52px;
        padding: 0 var(--space-sm) 0 var(--space-xs);
        background: var(--bg-panel);
        border-bottom: 1px solid var(--border-soft);
        flex-shrink: 0;
        position: relative;
    }

    #mobile-panel-back {
        display: flex !important;
        align-items: center;
        padding: var(--space-sm) var(--space-sm) var(--space-sm) var(--space-sm);
        font-size: var(--text-body-lg);
        font-weight: 400;
        color: var(--highlight);
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        letter-spacing: 0.01em;
        flex-shrink: 0;
        min-width: 44px;
        min-height: 44px;
        justify-content: flex-start;
        -webkit-tap-highlight-color: transparent;
        transition: opacity var(--transition-fast);
    }
    #mobile-panel-back:active { opacity: var(--opacity-secondary); }

    #mobile-panel-back-chevron {
        font-size: var(--text-title);
        line-height: 1;
        font-weight: 300;
        opacity: var(--opacity-primary);
    }
    #mobile-nav-title {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: var(--text-body);
        font-weight: 600;
        color: var(--text-main);
        letter-spacing: -0.01em;
        pointer-events: none;
        white-space: nowrap;
        max-width: 200px;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    /* Bottom Sheetの可動性を示すグリップとしてモバイルでも表示する（PC用実装をそのまま流用） */
    #panel-resize-handle {
        display: flex;
    }
    /* 開いた直後（＝必ず40vh）だけグリップを軽く持ち上げ、「引き上げ可能」であることを示す（任意の演出） */
    @keyframes panel-handle-hint-lift {
        0%, 100% { transform: translateY(0); }
        35% { transform: translateY(-6px); }
        60% { transform: translateY(0); }
    }
    #bottom-depth-panel.open #panel-resize-handle::after {
        animation: panel-handle-hint-lift var(--duration-slow) var(--ease-out) 0.45s 1;
    }

    /* パネルヘッダー（既存）はナビバーに置き換えるため非表示 */
    #bottom-depth-panel .panel-header {
        display: none;
    }

    .rcb-container {
        border-top: none;
        padding-top: var(--space-sm);
    }

    #reading-notes-wrap {
        padding-top: 0;
    }
}

/* ── 768px以下：比較モードを縦積み＋1節表示に ── */
@media (max-width: 768px) {
    #main-reading-area.compare-mode {
        display: flex !important;
        flex-direction: column !important;
        grid-template-columns: unset !important;
        overflow-y: auto;
    }
    #main-reading-area.compare-mode #bible-text-area {
        width: 100%;
        max-width: 100%;
        background: #fff;
        padding-bottom: var(--space-sm);
    }
    #main-reading-area.compare-mode .verse-pair-left {
        padding: var(--space-xs) var(--space-md) var(--space-xs) var(--space-md);
    }
    #main-reading-area.compare-mode #bible-text-area::after {
        content: '';
        display: block;
        height: 1px;
        background: var(--border-soft);
        margin: 0 var(--space-md);
    }
    #main-reading-area.compare-mode #parallel-text-area {
        display: block !important;
        width: 100%;
        max-width: 100%;
        border-left: none;
        border-top: none;
        background: var(--bg-inset);
        padding-bottom: 40px;
    }
    #main-reading-area.compare-mode .verse-pair-right {
        display: block !important;
        padding: var(--space-xs) var(--space-md) var(--space-xs) var(--space-md);
    }
    #main-reading-area.compare-mode .verse-grid-spacer-right,
    #main-reading-area.compare-mode .verse-grid-footer-right {
        display: block !important;
    }

    #mobile-verse-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-sm) var(--space-md);
        background: var(--bg-paper);
        border-bottom: 1px solid var(--border-soft);
        flex-shrink: 0;
        gap: var(--space-sm);
    }
    #mobile-verse-nav .mvn-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-s);
        background: var(--bg-paper);
        color: var(--text-sub);
        font-size: var(--text-body-lg);
        cursor: pointer;
        flex-shrink: 0;
        -webkit-tap-highlight-color: transparent;
        transition: background var(--transition-fast);
    }
    #mobile-verse-nav .mvn-btn:disabled { opacity: var(--opacity-tertiary); cursor: default; }
    #mobile-verse-nav .mvn-label {
        font-size: var(--text-caption);
        color: var(--text-sub);
        text-align: center;
        flex: 1;
        letter-spacing: 0.02em;
    }
    #mobile-verse-nav .mvn-label strong {
        color: var(--text-main);
        font-size: var(--text-body-lg);
    }
    #main-reading-area.compare-mode .verse-block[data-hidden-verse] {
        display: none !important;
    }

    .mobile-verse-group {
        padding: var(--space-md) 0 0;
        border-bottom: 2px solid var(--border-soft);
    }
    .mobile-vnum-badge {
        display: none;
    }
    .mobile-trans-block {
        padding: 0;
    }
    .mobile-trans-a { background: #fff; }
    .mobile-trans-b { background: var(--bg-inset); }
    .mobile-trans-label {
        font-size: var(--text-caption);
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--text-sub);
        padding: var(--space-xs) var(--space-md) var(--space-xs);
        opacity: var(--opacity-secondary);
    }
    .mobile-verse-sep {
        height: 1px;
        background: var(--border-soft);
        margin: 0 var(--space-md);
    }
    #main-reading-area.compare-mode .trans-col-header,
    #main-reading-area.compare-mode #parallel-text-area {
        display: none !important;
    }

    /* ── StudyPanel 全画面オーバーレイ（768px以下） ── */
    /* top:100%/0 で開閉、top:0+bottom:0+height:auto でビューポート全高を確保
       （dvh/vh/ビューポート単位に依存せず、JS の style.height も不要） */
    #bottom-depth-panel {
        top: 100%;       /* closed: パネル上端 = ビューポート下端 → 画面外 */
        bottom: auto;    /* closed: open 時に bottom:0 で上書きする */
        left: 0;
        right: 0;
        height: auto;    /* base の height:40vh を解除；open 時は top+bottom で確定 */
        max-height: none;
        min-height: 0;
        border-radius: 0;
        border-top: none;
        transform: none;
        transition: top var(--transition-slow);
    }
    #bottom-depth-panel.open {
        top: 0;
        bottom: 0;       /* top:0 + bottom:0 + height:auto = containing block 全高 */
        transform: none;
    }
    /* リサイズバー非表示（ドラッグ不要） */
    #panel-resize-handle {
        display: none !important;
    }
    /* パネル表示中は背面スクロールを無効化 */
    #app.mobile-study-open #main-reading-area {
        overflow-y: hidden;
    }
}

@media (min-width: 901px) {
    #mobile-menu-btn { display: flex; }
    #mobile-nav-bar  { display: none !important; }
    #mobile-panel-back { display: none !important; }
    #bottom-depth-panel {
        border: 1px solid var(--border-soft);
        border-bottom: none;
        border-radius: var(--radius-l) var(--radius-l) 0 0;
    }
    #bottom-depth-panel.open {
        box-shadow: var(--shadow-card);
    }
}

/* sidebar/menu: 全項目を medium（縦8px/横16px）ベースで統一し、グルーピングのみ macro（24px）を使う。 */
.sidebar-menu { flex: 1; padding: var(--rhythm-medium-y) var(--rhythm-medium-y); overflow-y: auto; }
.sidebar-section { margin-bottom: var(--rhythm-macro-min); }
.section-label { font-size: var(--text-caption); font-weight: 600; color: var(--text-sub); padding-left: var(--rhythm-medium-y); margin-bottom: var(--rhythm-medium-y); letter-spacing: 0.10em; }

.menu-item {
padding: var(--rhythm-medium-y) var(--rhythm-medium-x);
border-radius: var(--radius-s);
display: flex;
align-items: center;
gap: var(--rhythm-medium-y);
cursor: pointer;
transition: background var(--transition-fast);
white-space: nowrap;
font-size: var(--text-body);
/* Layer 4: 非アクティブ項目は --text-sub にして本文との序列を明確にする */
color: var(--text-sub);
}
.menu-item:hover { background: rgba(0,0,0,0.04); }
.menu-item.active { background: var(--accent-light); color: var(--highlight); }

.sb-layer { display: none; }
.sb-layer.active { display: block; }
.sb-layer-header {
display: flex; align-items: center; gap: var(--rhythm-medium-y);
padding: var(--rhythm-medium-y) var(--rhythm-medium-x); cursor: pointer; border-radius: var(--radius-s); margin-bottom: var(--space-xs);
transition: background var(--transition-fast);
}
.sb-layer-header:hover { background: rgba(0,0,0,0.04); }
.sb-back-arrow { font-size: var(--text-caption); color: var(--highlight); font-weight: 700; }
.sb-layer-title { font-size: var(--text-caption); font-weight: 600; color: var(--accent); letter-spacing: 0.08em; }
.sb-row {
padding: 6px 12px; font-size: var(--text-body); color: var(--text-main);
cursor: pointer; display: flex; align-items: center; justify-content: space-between;
border-radius: var(--radius-s); margin-bottom: var(--space-xs); transition: background var(--transition-fast);
}
.sb-row:hover { background: rgba(0,0,0,0.04); }
.sb-row.active { background: var(--highlight-light); color: var(--highlight); }
.sb-row-arrow { font-size: var(--text-caption); color: var(--text-hint); }
.sb-row.active .sb-row-arrow { color: var(--highlight); }

/* ── サイドバー底部 Information ─────────────── */
.sidebar-bottom {
    flex-shrink: 0;
    border-top: 1px solid var(--border-soft);
}
.sb-info-footer {
    padding: var(--space-sm) var(--space-md);
    display: flex;
    align-items: center;
}
#sb-info-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: none;
    border: 1px solid var(--border-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-sub);
    padding: 0;
    transition: background var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
    -webkit-tap-highlight-color: transparent;
}
#sb-info-btn:hover { background: var(--highlight-light); color: var(--highlight); }
#sb-info-btn:active { transform: scale(0.93); }
#info-overlay-card {
    position: fixed;
    width: 210px;
    background: var(--bg-paper);
    border: 1px solid var(--border-soft);
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.05);
    z-index: 500;
    overflow: hidden;
    opacity: 0;
    transform: translateY(6px) scale(0.98);
    pointer-events: none;
    transition: opacity var(--transition-fast),
                transform var(--transition-fast);
}
#info-overlay-card.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
}
.info-card-items { padding: var(--space-xs) 0; }
.info-card-item {
    width: 100%; display: flex; align-items: center; gap: var(--space-sm);
    padding: 10px var(--space-md); background: none; border: none;
    cursor: pointer; font-size: var(--text-body); color: var(--text-main);
    font-family: inherit; text-align: left;
    transition: background var(--transition-fast);
    -webkit-tap-highlight-color: transparent;
}
.info-card-item:hover { background: var(--bg-panel); }
.info-card-item svg { flex-shrink: 0; color: var(--text-sub); }
.info-beta-badge {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--accent);
    background: var(--accent-light);
    border-radius: var(--radius-s);
    padding: 1px 5px;
    margin-left: auto;
    line-height: 1.4;
    flex-shrink: 0;
}
.sb-ch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--rhythm-micro); padding: var(--rhythm-medium-y) var(--rhythm-medium-x) var(--rhythm-medium-x); }
.sb-ch-btn {
aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
font-size: var(--text-caption); font-weight: 500; color: var(--text-sub);
background: #fff; border: 1px solid var(--border-soft);
border-radius: var(--radius-s); cursor: pointer; transition: all var(--transition-fast);
}
.sb-ch-btn:hover { background: var(--highlight-light); border-color: var(--highlight); color: var(--highlight); }
.sb-ch-btn.active { background: var(--highlight); color: #fff; border-color: var(--highlight); }

.sb-nav-header {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: var(--space-xs);
    padding: var(--rhythm-medium-y) var(--rhythm-medium-x);
    border-bottom: 1px solid rgba(0,0,0,0.06);
}
.sb-nav-item {
    background: none;
    border: none;
    padding: 0 var(--space-xs);
    font-size: var(--text-caption);
    font-weight: 700;
    font-family: inherit;
    letter-spacing: 0.03em;
    color: var(--text-sub);
    opacity: var(--opacity-tertiary);
    cursor: pointer;
    transition: opacity var(--transition-fast);
    line-height: 1.6;
}
.sb-nav-item:hover { opacity: var(--opacity-secondary); }
.sb-nav-item.active {
    color: var(--text-main);
    opacity: var(--opacity-primary);
    cursor: default;
}
.sb-nav-sep {
    font-size: var(--text-caption);
    color: var(--text-sub);
    opacity: var(--opacity-disabled);
    user-select: none;
    padding: 0 var(--space-xs);
}
.sb-nav-sep-book {
    opacity: var(--opacity-disabled);
}
.sb-nav-book {
    font-size: var(--text-caption);
    font-weight: 600;
    color: var(--text-main);
    opacity: var(--opacity-primary);
    letter-spacing: 0.01em;
    line-height: 1.6;
}

/* main = 最前面のカード (z-index:10)。sidebar (z-index:5) は常に背面。
   sidebar が開くと main が自発的に退き、背後のレイヤーが見える構造。 */
.container {
    flex: 1; min-width: 0; min-height: 0;
    display: flex; flex-direction: column;
    background: var(--bg-paper);
    overflow: hidden;
    height: 100%;
    position: relative;
    z-index: 10;
    transform-origin: center center;
    transition:
        transform      var(--transition-slow),
        border-radius  var(--transition-slow),
        box-shadow     var(--transition-slow);
}
.nav-sidebar.open ~ .container {
    transform: translateX(280px);
    border-radius: 16px;
    box-shadow: -10px 0 30px rgba(0,0,0,0.12);
}
.app-header { padding: 18px 40px; border-bottom: 1px solid var(--border-soft); background: var(--bg-paper); flex-shrink: 0; position: sticky; top: 0; z-index: 20; }
.header-content { display: flex; align-items: center; justify-content: space-between; }
#global-breadcrumb {
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
}
.gbc-item {
    font-family: 'Noto Serif JP', serif;
    font-size: var(--text-caption);
    color: var(--text-sub);
    cursor: pointer;
    padding: var(--space-xs) 0;
    letter-spacing: 0.01em;
    border-bottom: 1px solid transparent;
    transition: color var(--transition-fast), border-color var(--transition-fast);
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'Noto Serif JP', serif;
}
.gbc-item:not(.current)::after {
    content: '▾';
    font-size: 0.7em;
    margin-left: 2px;
    opacity: 0.45;
    vertical-align: middle;
}
.gbc-item:hover {
    color: var(--text-main);
    border-bottom-color: rgba(0,0,0,0.15);
}
.gbc-item.current {
    color: var(--text-main);
    font-weight: 600;
    cursor: default;
    border-bottom-color: transparent;
}
.gbc-sep {
    color: var(--text-hint);
    font-size: var(--text-caption);
    padding: 0 var(--space-xs);
    user-select: none;
}
.gbc-chapter-nav {
    display: flex;
    align-items: center;
    gap: 2px;
}
.gbc-ch-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2px 6px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.6em;
    line-height: 1;
    color: var(--text-sub);
    border-radius: var(--radius-s);
    transition: background var(--transition-fast), color var(--transition-fast);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}
@media (max-width: 768px) {
    .gbc-ch-arrow { min-width: 36px; min-height: 36px; padding: 4px 6px; }
}
.gbc-ch-arrow:hover:not(:disabled) {
    background: rgba(0,0,0,0.06);
    color: var(--text-main);
}
.gbc-ch-arrow:active:not(:disabled) {
    background: rgba(0,0,0,0.10);
}
.gbc-ch-arrow:disabled {
    opacity: 0.2;
    cursor: default;
}
.gbc-ch-label {
    background: none;
    border: none;
    cursor: default;
    font-family: 'Noto Serif JP', serif;
    font-size: var(--text-caption);
    font-weight: 600;
    line-height: 1;
    color: var(--text-main);
    letter-spacing: 0.01em;
    padding: 0 2px;
}

#panel-back-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    padding: 0;
    color: var(--text-sub);
    font-family: inherit;
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.02em;
    transition: color var(--transition-fast);
    flex-shrink: 0;
    width: auto;
}
#panel-back-btn:hover { color: var(--text-main); }
.panel-back-arrow {
    opacity: var(--opacity-secondary);
    flex-shrink: 0;
}

.breadcrumb { display: flex; align-items: center; gap: var(--space-sm); color: var(--text-sub); font-size: var(--text-body); }
.breadcrumb h1 { font-size: var(--text-body-lg); margin: 0; color: var(--text-main); font-weight: 700; letter-spacing: -0.02em; }
.separator { color: var(--text-sub); opacity: var(--opacity-tertiary); }

#app {
flex: 1;
min-height: 0;
display: flex;
flex-direction: column;
overflow: hidden;
}

/* ══════════════════════════════════════════
Reading / Study レイアウト
Reading: side-panel 非表示 → 本文全幅
Study:   side-panel 表示  → 本文縮小
bottom-word-panel は廃止（Inspectに統合）
══════════════════════════════════════════ */
#main-reading-area {
flex: 1;
display: grid;
grid-template-columns: 1fr 42%;
min-height: 0;
overflow-y: auto;
}
#bible-text-area {
overflow: visible;
padding: 0;
min-width: 0;
max-width: 44em;
opacity: 0;
transition: opacity var(--transition-slow);
}
#parallel-text-area {
overflow: visible;
padding: 0;
background: var(--bg-inset);
border-left: 1px solid rgba(0,0,0,0.08);
font-size: var(--text-body);
color: var(--text-sub);
line-height: 2.0;
}
.verse-pair { display: contents; }
.verse-pair-left {
padding: 2px 32px 2px 52px;
background: #fff;
}
.verse-pair-right {
padding: var(--space-xs) var(--space-lg) var(--space-xs) var(--space-xl);
background: var(--bg-inset);
align-self: stretch;
}
.verse-grid-spacer-left  { height: 32px; background: #fff; }
.verse-grid-spacer-right { height: 32px; background: var(--bg-inset); }
.verse-grid-footer-left  { height: 40px; background: #fff; }
.verse-grid-footer-right { height: 40px; background: var(--bg-inset); }
#main-reading-area.panel-open {
    grid-template-columns: 1fr 0;
}
#main-reading-area.panel-open #parallel-text-area,
#main-reading-area.panel-open .verse-pair-right,
#main-reading-area.panel-open .verse-grid-spacer-right,
#main-reading-area.panel-open .verse-grid-footer-right {
    display: none;
}


/* bottom-word-panel: 廃止。高さ0で残骸を隠す */
#bottom-word-panel {
display: none;
}
#panel-content { display: none; }
#word-detail-view { display: none; }

/* Layer 4 クロム: フッターも #fafafa にして本文エリアとクロムを分離する */
.app-footer {
border-top: 1px solid var(--border-soft);
padding: 12px 48px;
display: flex;
align-items: center;
justify-content: space-between;
flex-shrink: 0;
background: var(--bg-inset);
}
.footer-copy {
font-size: var(--text-caption);
color: var(--text-sub);
letter-spacing: 0.01em;
}
.footer-links {
display: flex;
gap: var(--space-md);
}
.footer-links button {
font-size: var(--text-caption);
color: var(--text-sub);
background: none;
border: none;
border-bottom: 1px solid rgba(0,0,0,0.12);
cursor: pointer;
padding-bottom: var(--space-xs);
font-family: inherit;
transition: color var(--transition-fast);
}
.footer-links button:hover { color: var(--text-main); }

#open-panel-btn {
background: transparent; border: none; padding: 0 var(--space-sm); cursor: pointer; color: var(--highlight);
font-size: var(--text-title); transition: transform var(--transition-base), opacity var(--transition-base); line-height: 1;
}
#open-panel-btn:hover { opacity: var(--opacity-secondary); transform: scale(1.1); }

/* ★ Apple風カードUI（StudyPanel）。
   高さは既存の46vh/220px/70vh＋ドラッグハンドルによるユーザー操作の
   レンジをそのまま維持する（これは「コンテンツ量による自動伸長」では
   なくユーザーの明示的な操作であり、今回の「固定高さ」要件が禁止する
   対象ではないと判断した — もし完全に固定値・リサイズ不可にしたい
   場合は別途指示が必要）。今回の核心の修正は overflow: visible →
   hidden。中身（#reading-notes-wrap / 動的生成される #word-list-view）は
   どちらも flex:1; min-height:0; overflow-y:auto 済みのため、コンテナ
   側さえ hidden にすればコンテンツ量に関わらずパネル自体は伸びず、
   スクロールは内部のみで完結する。 */
/* 方向軸分離：panel は常に position:fixed で Y 軸専有。
   sidebar（X 軸）と空間を共有しない。display:none による状態制御は禁止。
   モバイルではCSS変数（--panel-default-h 等）で高さを差し替える。 */
#bottom-depth-panel {
/* 高さの数値定義は Panel Geometry SSOT（スタイルシート前方の
   #bottom-depth-panel 定義と ≤900px メディアの上書き）にある。
   ここでは var() で参照するだけ（値の直書き禁止）。 */
position: fixed;
bottom: 0;
left: 0;
right: 0;
width: 100%;
height: var(--panel-default-h);
min-height: var(--panel-min-h);
max-height: var(--panel-max-h);
background: var(--bg-panel);
border-top: 1px solid var(--border-soft);
padding: 0;
display: flex;
flex-direction: column;
flex-shrink: 0;
box-sizing: border-box;
overflow: hidden;
z-index: 150;
transform: translateY(100%);
transition: transform var(--transition-slow);
will-change: transform;
pointer-events: none;
}
#bottom-depth-panel.open {
transform: translateY(0);
pointer-events: auto;
}

/* ★ top を -4px ではなく 0 にする：親 #bottom-depth-panel が
   overflow:hidden になったため、パネル境界の外（負のオフセット）に
   はみ出す部分はクリップされてしまう。掴み領域の高さは変えず、
   パネル内側に完全に収める。 */
#panel-resize-handle {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 8px;
cursor: row-resize;
z-index: 100;
display: flex;
justify-content: center;
align-items: flex-end;
touch-action: none;
}
#panel-resize-handle::after {
content: '';
display: block;
height: 3px;
width: 40px;
border-radius: var(--radius-s);
background: var(--border-soft);
transition: background var(--transition-fast), width var(--transition-fast);
margin-bottom: var(--space-xs);
}
#panel-resize-handle:hover::after,
#panel-resize-handle.dragging::after {
background: var(--highlight);
width: 60px;
}
/* ★ Apple風カードUI: 既存デザイントークンの余白（16/24px）を使用。
   header は flex-shrink:0 で常に固定表示、スクロールするのは
   #reading-notes-wrap / #word-list-view 側のみ。 */
.panel-header {
font-weight: 700;
font-size: var(--text-body-lg);
line-height: 1.4;
letter-spacing: -0.01em;
padding: var(--space-md) var(--space-lg) var(--space-sm);
display: flex;
justify-content: space-between;
align-items: center;
color: var(--accent-dark);
flex-shrink: 0;
}
/* タイトル領域（戻るボタン＋現在地ラベル）とアクション領域（☆🔗📝）を明確に分離する。
   .panel-header の space-between はこの2グループの間にだけ働かせ、
   ボタン同士の間隔はグループ内の gap のみで決める（margin-left:auto の力技は使わない）。 */
.panel-header-title {
display: flex;
align-items: center;
gap: var(--space-sm);
min-width: 0;
overflow: hidden;
}
.panel-header-actions {
display: flex;
align-items: center;
gap: var(--space-sm);
flex-shrink: 0;
}

.share-url-btn {
background: none;
border: none;
cursor: pointer;
font-size: var(--text-body);
padding: var(--space-xs) var(--space-xs);
border-radius: var(--radius-s);
opacity: var(--opacity-secondary);
display: inline-flex;
align-items: center;
justify-content: center;
}
.share-url-btn:hover { opacity: var(--opacity-primary); background: rgba(0,0,0,0.05); }
/* 絵文字（OS依存）の代わりに線画SVGアイコンを使用する。サイズはpx固定ではなく
   .share-url-btn自身のfont-size（var(--text-body)）基準のemにして、周囲のテキストと
   スケールが連動するようにする。 */
.share-url-btn svg { width: 1.1em; height: 1.1em; display: block; }
/* ブックマーク済みは塗りつぶしで表現（☆→★ の代替） */
.bookmark-btn svg { fill: none; }
.bookmark-btn.is-saved svg { fill: currentColor; }
/* メモボタン：アイコン横の小ドットで保存済みを表現 */
.note-btn { gap: var(--space-xs); }
.note-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--highlight);
    opacity: 0;
    transition: opacity var(--transition-fast);
}
.note-btn.has-note .note-dot { opacity: var(--opacity-primary); }
/* メモ用textarea（'wlv'/'rn'いずれのidSuffixも reading-note-textarea- で始まる）に
   フォーカス時の視覚フィードバックを追加する。サイズ・padding・border-radius・色トークンは
   既存のインラインstyleのまま変更せず、フォーカス時の枠色とリングのみを既存トークンで追加する。
   border-color のみ !important が必要：要素のインラインstyleに border:1px solid var(--border-soft)
   が指定されており、インラインstyleの詳細度には通常のスタイルシート規則では勝てないため。 */
textarea[id^="reading-note-textarea-"]:focus-visible {
    border-color: var(--highlight) !important;
    box-shadow: 0 0 0 3px var(--highlight-light);
    outline: none;
}
#mobile-menu-btn svg { width: 19px; height: 19px; display: block; }
#mobile-menu-btn { align-items: center; justify-content: center; }

.share-toast {
position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(8px);
background: var(--accent-dark, #333); color: #fff; padding: var(--space-sm) var(--space-md); border-radius: var(--radius-s);
font-size: var(--text-caption); opacity: 0; pointer-events: none; transition: opacity var(--transition-base), transform var(--transition-base); z-index: 9999;
}
.share-toast.visible { opacity: var(--opacity-primary); transform: translateX(-50%) translateY(0); }


/* タブなし・単一スクロール・annotation feel */
#reading-notes-wrap {
display: flex;
flex-direction: column;
/* スクロールバー出現による横幅変化（chips再ラップ・カラムずれ）を防ぐ。
   both-edges で左右対称に予約し、中心軸を真中心に保つ */
scrollbar-gutter: stable both-edges;
}
#reading-notes-area {
padding: 0 var(--rhythm-macro-min) 60px;
width: 100%;
max-width: 44em;
box-sizing: border-box;
/* Level 2（#word-list-view）と同じ中央カラムに揃える。
   これが無いと Level 2⇄3 遷移で視線の中心軸が跳ぶ（UX監査 実測287px） */
margin-left: auto;
margin-right: auto;
}

.rn-word-head {
padding: var(--rhythm-macro-min) 0 var(--rhythm-medium-y);
margin-bottom: 0;
}
.rn-greek {
font-size: var(--text-headline);
display: block;
margin-bottom: var(--space-xs);
}
.rn-ja {
font-size: var(--text-body);
color: var(--text-sub);
font-weight: 400;
display: block;
margin-bottom: var(--space-xs);
}
.rn-dict-table {
border-collapse: collapse;
width: 100%;
}
.rn-dict-table td {
padding: var(--space-xs) 0;
vertical-align: baseline;
line-height: 1.6;
}
.rn-dict-key {
font-size: var(--text-caption);
font-weight: 700;
letter-spacing: 0.06em;
color: var(--text-sub);
white-space: nowrap;
padding-right: var(--space-md);
width: 4.5em;
}
.rn-dict-val {
font-size: var(--text-body);
color: var(--text-main);
}
.rn-dict-greek {
font-family: 'Gentium Plus', serif;
font-size: var(--text-body);
display: inline;
line-height: 1.6;
}
.rn-dict-comp {
font-size: var(--text-body);
color: var(--text-main);
}

.rn-notes {
margin-top: var(--rhythm-medium-y);
}

/* ══════════════════════════════════════════
   Depth reading system
   rn-prose → rn-deep（深く読む）の縦方向連続体
   「別パネル」ではなく「本文が深く続く」感覚

   Layer 1: rn-prose      - 表層の読書メモ
   Layer 2: rn-deep-prose - 橋：表現の深読み
   Layer 3: rn-grammar    - 最下層：grammar（折りたたみ）

   open時: rn-proseが後景へ静かに沈む
   ══════════════════════════════════════════ */

/* Layer 1: surface reading prose */
.rn-prose {
margin-top: var(--space-sm);
border-top: 1px solid rgba(0,0,0,0.05);
padding-top: var(--rhythm-medium-y);
padding-bottom: var(--space-xs);
margin-bottom: 0;
transition: opacity var(--transition-slow), transform var(--transition-slow);
}
.rn-prose-text {
font-size: var(--text-body);
}

/* rn-deep-section/toggle/body: 廃止済み（Layer 1/2 統合）互換のため定義のみ残す */
.reading-deep-active .rn-prose { opacity: var(--opacity-primary); transform: none; }
.rn-deep-section { display: none; }
.rn-deep-toggle  { display: none; }
.rn-deep-body    { display: none; }
@keyframes depthUnfold {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: var(--opacity-primary); transform: translateY(0); }
}

/* Layer 2: deep reading prose - 橋としての自然文 */
/* 直接 grammar ではなく、読書の延長として入る */
.rn-deep-prose {
padding: var(--space-sm) 0 var(--space-md) 0;
border-bottom: 1px solid rgba(0,0,0,0.04);
margin-bottom: var(--space-md);
}
.rn-deep-prose-text {
font-size: var(--text-body);
}

/* Layer 3: grammar section label - 最下層の静かなラベル */
.rn-grammar-label {
display: block;
margin-bottom: var(--space-sm);
}

/* grammar grid: 同温度・同余白 */
.rn-morph-grid {
display: grid;
grid-template-columns: auto 1fr;
gap: var(--space-xs) var(--space-md);
font-size: var(--text-caption);
margin-bottom: var(--space-sm);
}
.rn-morph-key {
color: var(--text-sub);
font-size: var(--text-caption);
font-weight: 400;
padding: var(--space-xs) 0;
border-bottom: 1px solid rgba(0,0,0,0.03);
white-space: nowrap;
opacity: var(--opacity-secondary);
}
.rn-morph-val {
color: var(--text-main);
font-weight: 400;
font-size: var(--text-caption);
padding: var(--space-xs) 0;
border-bottom: 1px solid rgba(0,0,0,0.03);
}
.rn-morph-val.core { font-weight: 600; }

.rn-lexicon {
font-size: var(--text-caption);
color: var(--text-sub);
line-height: 1.8;
padding: var(--space-sm) 0 var(--space-xs);
margin-top: var(--space-xs);
border-top: 1px solid rgba(0,0,0,0.04);
}
.rn-lexicon-label {
display: block;
margin-bottom: var(--space-xs);
cursor: help;
border-bottom: 1px dotted rgba(0,0,0,0.15);
}

/* ─── Layer 3: 「単語を調べる」reference layer ─── */
/* 読書から分離された最下層。折りたたみ。annotation feel。 */
.rn-ref-section {
    margin-top: var(--space-md);
}
.rn-ref-toggle {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    width: 100%;
    background: transparent;
    border: none;
    border-top: 1px solid var(--border);
    padding: var(--space-sm) 0;
    font-size: var(--text-body);
    font-weight: 500;
    letter-spacing: 0;
    color: var(--text-sub);
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    text-align: left;
    transition: color var(--transition-fast);
    opacity: 1;
}
.rn-ref-toggle:hover {
    color: var(--text-main);
}
.rn-ref-toggle.open {
    opacity: 1;
}
.rn-ref-body {
    display: none;
    margin-top: 0;
    padding-left: 0;              /* 幅統一: 追加インデントなし */
    padding-top: var(--space-sm);
    animation: depthUnfold var(--transition-base) both;
}
.rn-exp-labels {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-xs);
    margin: var(--space-sm) 0 var(--space-xs) 0;
}
.rn-exp-label {
    font-size: var(--text-caption);
    font-family: 'Noto Serif JP', serif;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    letter-spacing: 0.03em;
    padding: var(--space-xs) var(--space-sm);
    border: 0.5px solid var(--accent-mid);
    border-radius: var(--radius-m);
    background: var(--accent-light);
}
.rn-ref-body.visible { display: block; }

.rn-search-links {
display: flex;
flex-wrap: wrap;
gap: var(--space-xs);
margin-top: var(--space-md);
padding-top: var(--space-sm);
border-top: 1px solid rgba(0,0,0,0.04);
}
.rn-search-link {
font-size: var(--text-caption);
color: var(--text-sub);
background: none;
border: none;
padding: 0;
cursor: pointer;
text-decoration: underline;
text-underline-offset: 2px;
text-decoration-color: rgba(0,0,0,0.18);
font-family: inherit;
letter-spacing: 0.01em;
transition: color var(--transition-fast);
opacity: var(--opacity-secondary);
}
.rn-search-link:hover { color: var(--highlight); opacity: var(--opacity-primary); }

/* ── Semantic Layer Sections ── */
.rn-cluster-section, .rn-concord-section {
    margin-top: 0;
    border-radius: var(--radius-m);
    border: 1px solid var(--border);
    overflow: hidden;
    background: var(--bg-panel);
}

/* Wrapper to stack sections with consistent gap */
#rn-semantic-layers {
    display: flex;
    flex-direction: column;
    gap: var(--space-sm);
    margin-top: var(--space-md);
}

/* [A] 削除: "項目をクリックすると展開します" の ::before 擬似要素。
   1セクション時は JS がトグルを除去して自動展開するため、
   「クリックで展開」という案内が実態と矛盾するケースが生じる。
   クリック可能性はボタンの chevron アイコンで伝達する。 */


.rn-layer-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0;
    width: 100%;
    background: transparent;
    border: none;
    padding: var(--space-sm);
    font-size: var(--text-body);
    font-weight: 500;
    letter-spacing: 0;
    color: var(--text-sub);
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    text-align: left;
    transition: background var(--transition-fast), color var(--transition-fast);
    opacity: 1;
    position: relative;
}
.rn-layer-toggle:hover {
    background: var(--accent-light);
    color: var(--text-main);
}
.rn-layer-toggle.open {
    background: transparent;
    opacity: 1;
}

.rn-layer-toggle-icon {
    transition: transform var(--transition-base);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 12px;
    height: 12px;
    margin-left: auto;
    opacity: var(--opacity-secondary);
    flex-shrink: 0;
}
.rn-layer-toggle.open .rn-layer-toggle-icon {
    transform: rotate(90deg);
    opacity: var(--opacity-primary);
}

.rn-layer-body {
    display: none;
    padding: var(--space-sm) 0;   /* 水平 padding は #reading-notes-area が担保 */
    border-top: 1px solid var(--border);
    animation: rnLayerOpen var(--transition-base) both;
}
.rn-layer-body.visible { display: block; }
.rn-flat .rn-layer-body { border-top: none; padding-top: 0; }
.rn-layer-intro {
    font-size: var(--text-caption);
    color: var(--text-sub);
    line-height: 1.6;
    margin-bottom: var(--space-xs);
    padding-bottom: var(--space-xs);
    border-bottom: 1px solid rgba(0,0,0,0.06);
}
.rn-layer-intro-note {
    opacity: var(--opacity-secondary);
    font-size: 0.85em;
}

/* ── Cluster IA: グループ境界・補足情報の整理 ──
   説明文は DOM 順（チップ直前）を維持する。
   チップ表示順は変更しない。現在語は視覚強調のみで識別する。
   ──────────────────────────────────────────── */

/* 1. 出現回数を小さく・目立たなく */
/* 2. 第2グループの前にセパレーターを挿入（グループ境界の明示）
   chips の直後にmoreBtn が入る場合も考慮して両セレクターで指定する */
.rn-sibling-chips + .rn-ln-domain-label,
.rn-chip-more + .rn-ln-domain-label {
    margin-top: var(--space-md);
    padding-top: var(--space-sm);
    border-top: 1px solid var(--border);
}

@keyframes rnLayerOpen {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: var(--opacity-primary); transform: translateY(0); }
}

.rn-ln-domain-label {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: var(--space-sm);
    border-left: 2px solid var(--accent-mid);
    padding-left: 6px;
}
.rn-ln-domain-category {
    font-size: var(--text-caption);
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    text-transform: uppercase;
    font-family: 'Noto Sans JP', sans-serif;
    display: none;
}
.rn-ln-domain-title {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.07em;
    color: var(--text-sub);
    opacity: var(--opacity-primary);
}
.rn-ln-domain-title::before {
    content: '意味領域：';
    font-weight: 400;
    letter-spacing: 0;
    opacity: 0.6;
}
.rn-sibling-chips {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: var(--space-xs);
}
.rn-sibling-chip {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
    padding: var(--space-sm);
    border-radius: 0;
    border: none;
    border-top: 1px solid var(--accent-light);
    background: transparent;
    cursor: pointer;
    transition: background var(--transition-fast);
    font-size: var(--text-caption);
}
.rn-sibling-chip:first-child {
    border-top: none;
}
.rn-sibling-chip:hover {
    background: var(--accent-light);
}
.rn-sibling-chip.current {
    background: var(--accent-light);
    border-left: 3px solid rgba(90,110,130,0.55);
    font-weight: 700;
    cursor: default;
}
/* ▶ は U+00A0（ノーブレークスペース）で Greek 語との間隔を確保する。
   将来 CSS margin に移行する場合は content を '▶' のみにして
   .rn-sibling-gr::before に margin-right を追加すること。 */
.rn-sibling-chip.current .rn-sibling-gr::before {
    content: '▶\00a0';
    font-size: 0.65em;
    opacity: 0.55;
    font-family: sans-serif;
    vertical-align: 0.1em;
}
.rn-sibling-gr {
    font-family: 'Gentium Plus', serif;
    font-size: var(--text-body-lg);
    color: var(--text-main);
    line-height: 1.2;
}
.rn-sibling-ja {
    font-size: var(--text-caption);
    color: var(--text-sub);
    line-height: 1.2;
}
.rn-sibling-badge {
    font-size: var(--text-caption);
    letter-spacing: 0.04em;
    color: var(--text-sub);
    background: var(--accent-mid);
    border-radius: 3px;
    padding: 1px 5px;
    margin-top: 2px;
    font-family: 'Noto Sans JP', sans-serif;
    opacity: var(--opacity-primary);
}
.rn-sibling-action {
    font-size: var(--text-caption);
    color: var(--highlight);
    opacity: 0.55;
    margin-top: 2px;
    font-family: 'Noto Sans JP', sans-serif;
    transition: opacity var(--transition-fast);
}
.rn-sibling-chip:hover .rn-sibling-action {
    opacity: 0.9;
}
.rn-chip-hidden { display: none; }
.rn-chip-more {
    display: block;
    margin-top: 0;
    padding: var(--space-xs) var(--space-sm);
    background: none;
    border: none;
    border-top: 1px solid var(--accent-light);
    text-align: left;
    font-size: var(--text-caption);
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--highlight);
    cursor: pointer;
    opacity: 0.65;
    letter-spacing: 0.03em;
}
.rn-chip-more:hover { opacity: 1; }
.rn-concord-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-xs);
    max-height: 260px;
    overflow-y: auto;
}
.rn-concord-row {
    padding: var(--space-sm) var(--space-sm);
    border-radius: var(--radius-s);
    background: var(--accent-light);
    border: 1px solid var(--accent-light);
    cursor: pointer;
    transition: background var(--transition-fast);
}
.rn-concord-row:hover {
    background: var(--accent-light);
}
.rn-concord-ref {
    font-size: var(--text-caption);
    font-weight: 700;
    color: var(--highlight);
    letter-spacing: 0.04em;
    margin-bottom: var(--space-xs);
}
.rn-concord-text {
    font-family: 'Gentium Plus', serif;
    font-size: var(--text-body);
    line-height: 1.55;
    color: var(--text-main);
}
.rn-concord-text .rn-concord-hl {
    font-weight: 700;
    color: var(--highlight);
}
.rn-concord-more {
    font-size: var(--text-caption);
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    text-align: center;
    padding: var(--space-xs) 0 var(--space-xs);
}

/* 後方互換：分析タブバーは完全非表示 */
.analysis-tabs { display: none !important; }
#analysis-frame-wrap { display: none !important; }

/* 旧 iframe：非表示にして DOM に残す（外部参照の互換のため） */
#analysis-iframe {
display: none;
}
/* 新 インラインコンテンツエリア */
#analysis-content-area {
flex: 1;
overflow-y: auto;
padding: var(--space-md) var(--space-lg) var(--space-xl);
background: var(--bg-paper);
font-size: var(--text-body);
line-height: 1.9;
color: var(--text-main);
}
/* 分析コンテンツ内の共通スタイル */
.ac-section-label {
font-size: var(--text-caption);
font-weight: 600;
letter-spacing: 0.06em;
color: var(--text-sub);
margin-bottom: var(--space-sm);
display: block;
opacity: var(--opacity-secondary);
}
.ac-entry {
background: #fff;
border: 1px solid var(--border-soft);
border-radius: var(--radius-m);
padding: var(--space-md) var(--space-md);
margin-bottom: var(--space-sm);
}
.ac-entry-greek {
font-family: ‘Gentium Plus’, serif;
font-size: var(--text-headline);
line-height: 1.2;
color: var(--text-main);
margin-bottom: var(--space-xs);
}
.ac-entry-ja {
font-size: var(--text-caption);
font-weight: 400;
color: var(--text-sub);
margin-bottom: var(--space-xs);
}
.ac-entry-desc {
font-size: var(--text-caption);
color: var(--text-sub);
line-height: 1.75;
border-top: 1px solid var(--border-soft);
padding-top: var(--space-sm);
margin-top: var(--space-xs);
}
.ac-entry-strong {
font-size: var(--text-caption);
color: #9e9ea4;
font-family: monospace;
margin-top: var(--space-xs);
display: block;
}
.ac-table {
width: 100%;
border-collapse: collapse;
font-size: var(--text-caption);
margin-top: var(--space-sm);
}
.ac-table th {
text-align: left;
padding: var(--space-xs) var(--space-sm);
color: var(--text-sub);
font-size: var(--text-caption);
font-weight: 600;
letter-spacing: 0.06em;
border-bottom: 1px solid var(--border-soft);
}
.ac-table td {
padding: var(--space-xs) var(--space-sm);
border-bottom: 1px solid rgba(0,0,0,0.04);
color: var(--text-main);
vertical-align: baseline;
}
.ac-table tr:last-child td { border-bottom: none; }
.ac-table td.ac-td-greek {
font-family: ‘Gentium Plus’, serif;
font-size: var(--text-body-lg);
}
.ac-morph-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: var(--space-xs) var(--space-md);
margin-top: var(--space-sm);
font-size: var(--text-caption);
}
.ac-morph-row {
display: contents;
}
.ac-morph-key {
color: var(--text-sub);
font-size: var(--text-caption);
font-weight: 400;
letter-spacing: 0.04em;
padding: var(--space-xs) 0;
border-bottom: 1px solid rgba(0,0,0,0.04);
grid-column: 1;
}
.ac-morph-val {
color: var(--text-main);
font-weight: 500;
font-size: var(--text-caption);
padding: var(--space-xs) 0;
border-bottom: 1px solid rgba(0,0,0,0.04);
grid-column: 2;
}
.ac-morph-val.core {
color: var(--text-main);
font-weight: 700;
}
.ac-cite-ref {
    font-size: var(--text-caption);
    color: var(--text-sub);
    margin-top: var(--space-xs);
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
}
.ac-cite-ref--block { display: block; margin-top: var(--space-sm); }
.ac-cite-ref svg { width: 0.85em; height: 0.85em; display: block; flex-shrink: 0; }
.ac-no-data {
text-align: center;
color: var(--text-sub);
font-size: var(--text-caption);
padding: var(--space-xl) 0;
}
.ac-morph-search-row {
margin-top: var(--space-md);
display: flex;
gap: var(--space-sm);
flex-wrap: wrap;
}
/* semantics: Abbott-Smith 引用ブロック */
.ac-abbottsmith {
background: var(--accent-light);
border-left: 3px solid var(--highlight);
border-radius: 0 var(--radius-s) var(--radius-s) 0;
padding: var(--space-sm) var(--space-md);
margin-top: var(--space-sm);
font-size: var(--text-caption);
color: var(--text-sub);
line-height: 1.75;
}
/* syntax: 文脈節一覧ローディング */
.ac-loading {
font-size: var(--text-caption);
color: var(--text-sub);
padding: var(--space-md) 0;
text-align: center;
animation: ac-blink 1.2s ease-in-out infinite;
}
@keyframes ac-blink {
0%, 100% { opacity: var(--opacity-secondary); }
50% { opacity: var(--opacity-primary); }
}

.verse-block { transition: background var(--transition-fast); }
.verse-pair-left  { border-radius: var(--radius-s) 0 0 var(--radius-s); }
.verse-pair-right { border-radius: 0 var(--radius-s) var(--radius-s) 0; }
.verse-block.selected { background: var(--accent-light); }
.jp-section { padding: var(--space-xs) var(--space-sm); cursor: pointer; display: flex; align-items: baseline; border-radius: var(--radius-s); }
.jp-section:hover { background: rgba(0,0,0,0.03); }
.v-num { color: var(--text-hint, #8e8e93); margin-right: var(--space-md); font-size: var(--text-caption); font-weight: 400; min-width: 20px; text-align: right; letter-spacing: 0.02em; flex-shrink: 0; }
.jp-text { font-size: var(--text-body-lg); line-height: 2.1; color: var(--text-main); font-family: 'Noto Serif JP', serif; }

/* ── 静的ページ共通（まめ知識 / 出典・ポリシー） ── */
.static-page {
    max-width: 44em;
    margin: 0 auto;
    padding: 32px 52px 60px;
    font-size: var(--text-body);
    line-height: 1.8;
    color: var(--text-main);
}
/* ブックマーク/メモ/履歴系の一覧ページ用モディファイア。
   .static-page は #bible-text-area（single-mode時にmax-width:44em + 左右padding:24pxで
   聖書本文と同じ幅に揃えられている）の内側に差し込まれるため、ここで独自にmax-width/左右paddingを
   持たせると親の幅とズレる。横方向は完全に親に委ねることで聖書本文と同一幅にする。 */
.static-page.list-page {
    max-width: none;
    margin: 0;
    padding: 32px 0 60px;
}
/* ブックマーク/メモ/最近読んだ箇所/最近見た単語、4ページ共通のカードUI。
   タイトル(1行目)・補足情報(2行目)・右側メタ情報、という構造を共通クラスとして統一する。
   ページごとの違いは _listItemCard() に渡すデータ（title/sub/meta/href）だけに閉じる。 */
/* 枠線・背景boxではなく、左の細いインジケータのみで区切る（ボックス感を出さない）。
   アクション(削除等)はhoverまたはキーボードフォーカス時のみ表示する。 */
.list-item-card {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--rhythm-medium-x);
    padding: var(--rhythm-medium-y) var(--rhythm-medium-x);
    margin-bottom: var(--rhythm-medium-y);
    background: none;
    border: none;
    border-left: 2px solid transparent;
    cursor: pointer;
    transition: background var(--transition-fast), border-color var(--transition-fast);
}
.list-item-card:hover, .list-item-card:focus-within { background: var(--highlight-light); border-left-color: var(--highlight); }
.list-item-main { min-width: 0; flex: 1; }
.list-item-title {
    font-size: var(--text-body);
    font-weight: 600;
    color: var(--text-main);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.list-item-sub {
    margin-top: var(--space-xs);
    font-size: var(--text-caption);
    line-height: 1.5;
    color: var(--text-sub);
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
}
.list-item-meta {
    flex-shrink: 0;
    font-size: var(--text-caption);
    color: var(--text-sub);
    white-space: nowrap;
}
.list-item-empty { color: var(--text-sub); font-size: var(--text-body); }
.list-item-actions {
    flex-shrink: 0;
    display: flex;
    gap: var(--rhythm-micro);
    opacity: 0;
    transition: opacity var(--transition-fast);
}
.list-item-card:hover .list-item-actions,
.list-item-card:focus-within .list-item-actions { opacity: var(--opacity-primary); }
.list-item-action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    padding: 0;
    color: var(--text-sub);
    background: none;
    border: none;
    border-radius: var(--radius-s);
    cursor: pointer;
    transition: background var(--transition-fast), color var(--transition-fast);
}
.list-item-action-btn svg { width: 16px; height: 16px; }
.list-item-action-btn:hover { background: rgba(0,0,0,0.06); color: var(--text-main); }
.list-item-action-btn.danger:hover { color: #c0392b; }
.list-page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-md);
}
.list-page-header-link {
    font-size: var(--text-caption);
    color: var(--highlight);
    cursor: pointer;
    opacity: var(--opacity-secondary);
    transition: opacity var(--transition-fast);
}
.list-page-header-link:hover { opacity: var(--opacity-primary); }
.static-page h3 {
    font-size: var(--text-body);
    font-weight: 600;
    color: var(--text-main);
    margin: var(--space-lg) 0 var(--space-sm);
    padding-bottom: var(--space-xs);
    border-bottom: 1px solid var(--border-soft);
    letter-spacing: 0.02em;
}
.static-page section { margin-bottom: 40px; }
.static-page p { color: var(--text-sub); margin: var(--space-sm) 0; }
/* Changelog: 各リリースの「なぜ変えたか」を表す1行。区切り線は使わず余白のみで区切る。 */
.static-page p.changelog-story { font-size: var(--text-caption); }
/* Roadmap: イントロ文 */
.static-page p.roadmap-intro { color: var(--text-sub); margin-bottom: var(--space-lg); }
/* Roadmap: 各項目カード */
.static-page .roadmap-item {
    padding: var(--space-sm) 0;
    border-bottom: 1px solid var(--border-light, rgba(0,0,0,.06));
}
.static-page .roadmap-item:last-child { border-bottom: none; }
.static-page .roadmap-item-title { color: var(--text-main); font-size: var(--text-body); margin-bottom: 2px; }
.static-page .roadmap-item-detail { color: var(--text-sub); font-size: var(--text-caption); line-height: 1.6; }
.static-page ul { padding-left: var(--space-md); color: var(--text-sub); }
.static-page li { margin-bottom: var(--space-sm); }
.static-page strong { color: var(--text-main); }
.static-page aside {
    background: var(--highlight-light);
    border-left: 3px solid var(--highlight);
    border-radius: 0 var(--radius-s) var(--radius-s) 0;
    padding: var(--space-md) var(--space-md);
    margin-bottom: var(--space-md);
    color: var(--text-sub);
}
.static-page table {
    width: 100%;
    border-collapse: collapse;
    font-size: var(--text-body);
}
.static-page table th {
    text-align: left;
    padding: var(--space-sm) var(--space-sm);
    width: 30%;
    color: var(--text-sub);
    font-weight: 600;
    border-bottom: 1px solid var(--border-soft);
}
.static-page table td {
    padding: var(--space-sm) var(--space-sm);
    border-bottom: 1px solid var(--border-soft);
}
.static-page table tr:last-child th,
.static-page table tr:last-child td { border-bottom: none; }
.static-page .card {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-m);
    padding: var(--space-md) var(--space-md);
    margin-top: var(--space-sm);
}
.static-page .aspect-row {
    display: flex;
    align-items: baseline;
    gap: var(--space-md);
    padding: var(--space-sm) 0;
    border-bottom: 1px solid var(--border-soft);
}
.static-page .aspect-row:last-child { border-bottom: none; }
.static-page .aspect-label {
    flex-shrink: 0;
    min-width: 130px;
    font-weight: 700;
}
.static-page .aspect-desc { color: var(--text-sub); }
.static-page .aspect-read {
    display: block;
    margin-top: var(--space-xs);
    color: var(--highlight);
    font-size: var(--text-body);
}
.static-page .back-wrap {
    text-align: center;
    margin-top: 40px;
    padding-bottom: var(--space-md);
}
.static-page .back-btn {
    background: var(--highlight);
    color: white;
    border: none;
    padding: var(--space-sm) var(--space-lg);
    border-radius: var(--radius-s);
    cursor: pointer;
    font-weight: bold;
    font-size: var(--text-body);
    font-family: inherit;
    transition: opacity var(--transition-base);
}
.static-page .back-btn:hover { opacity: var(--opacity-primary); }
/* タブ（まめ知識） */
.static-page .tabs {
    display: flex;
    gap: var(--space-xs);
    margin-bottom: var(--space-md);
    border-bottom: 2px solid var(--border-soft);
    position: sticky;
    top: 0;
    background: var(--bg-paper);
    z-index: 100;
    padding-top: var(--space-sm);
    overflow-x: auto;
}
.static-page .tab-btn {
    padding: var(--space-sm) var(--space-md);
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text-sub);
    font-weight: 500;
    font-family: inherit;
    font-size: var(--text-body);
    border-bottom: 2px solid transparent;
    transition: color var(--transition-base), border-color var(--transition-base);
    white-space: nowrap;
}
.static-page .tab-btn.active {
    color: var(--highlight);
    border-bottom-color: var(--highlight);
}
.static-page .tab-content { display: none; }
.static-page .tab-content.active { display: block; animation: spFadeIn var(--transition-base); }
@keyframes spFadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: var(--opacity-primary); transform: translateY(0); } }
/* ── モバイル（768px以下）静的ページ余白最適化 ── */
@media (max-width: 768px) {
    /* 親コンテナの横 padding をゼロにして静的ページ側で制御 */
    #main-reading-area.static-view #bible-text-area {
        padding-left: 0;
        padding-right: 0;
    }
    /* 静的ページ本体：max-width を解除し、左右 14px 余白のみ */
    .static-page {
        max-width: none;
        padding-left: 14px;
        padding-right: 14px;
    }
    /* タブバーを画面幅いっぱいに広げる（sticky 背景も端まで届かせる） */
    .static-page .tabs {
        margin-left: -14px;
        margin-right: -14px;
        padding-left: 14px;
        padding-right: 14px;
    }
    /* Card の余分な左右余白を除去 */
    .static-page .card {
        margin-left: 0;
        margin-right: 0;
    }
}

/* - 語形リスト行（Study panel内の一覧用：既存互換のため残す） -
   箱型カードではなく、下線区切りのみのフラットな行にする（card乱立を避ける）。
   .list-item-card と同じ medium（8px/16px）の行リズムに揃える。 */
.word-card {
background: none;
padding: var(--rhythm-medium-y) var(--rhythm-medium-x);
display: flex;
justify-content: space-between;
align-items: baseline;
margin-bottom: 0;
border: none;
border-bottom: 1px solid var(--border-soft);
cursor: pointer;
transition: background var(--transition-fast);
}
.word-card:last-child { border-bottom: none; }
.word-card:hover { background: var(--highlight-light); }
.greek-word { font-family: 'Gentium Plus', serif; font-size: var(--text-headline); line-height: 1.3; }

.present-text { border-bottom: 2px solid var(--highlight); }
.aorist-text  { border-bottom: 2px dotted var(--highlight); }
.perfect-text { text-decoration: underline wavy var(--highlight); text-underline-offset: 4px; }
.future-text { border-bottom: 2px double var(--highlight); }
.indicative-text { background: var(--highlight-light); border-radius: var(--radius-s); padding: 0 var(--space-xs); }
.imperative-text { background: var(--highlight-light); border-radius: var(--radius-s); padding: 0 var(--space-xs); }

.grammar-legend { display: flex; flex-wrap: wrap; gap: var(--space-sm); margin-top: var(--space-sm); font-size: var(--text-caption); color: var(--text-sub); border-top: 1px solid var(--border-soft); padding-top: var(--space-xs); }
.tag-jp { color: var(--text-sub); font-size: var(--text-caption); margin-left: var(--space-xs); opacity: var(--opacity-secondary); }
.strong-num { font-size: var(--text-caption); color: #9e9ea4; font-family: monospace; }

.rn-save-btn {
display: flex; align-items: center; width: 100%;
padding: var(--space-sm) var(--space-md);
font-size: var(--text-caption); font-family: inherit; font-weight: 700;
color: #fff; background: var(--highlight);
border: none; border-radius: var(--radius-s);
cursor: pointer; letter-spacing: 0.02em;
transition: opacity var(--transition-fast);
}
.rn-save-btn:hover { opacity: var(--opacity-primary); }


/* -- morph-search-btn（近くの語を見るなど、Study panel内で継続使用） -- */
.morph-search-btn {
display: inline-flex;
align-items: center;
justify-content: center;
padding: var(--space-xs) var(--space-md);
font-size: var(--text-caption);
font-family: inherit;
font-weight: 600;
letter-spacing: 0.06em;
text-transform: uppercase;
color: var(--text-sub);
background: transparent;
border: 1px solid rgba(0,0,0,0.13);
border-radius: var(--radius-s);
cursor: pointer;
transition: color var(--transition-fast), border-color var(--transition-fast), background var(--transition-fast);
text-decoration: none;
white-space: nowrap;
}
.morph-search-btn:hover {
color: var(--highlight);
border-color: var(--highlight);
background: var(--highlight-light);
}
.morph-search-btn:active { opacity: var(--opacity-secondary); }
.morph-search-btn .btn-icon { display: none; }

.morph-tag-row {
display: flex;
flex-wrap: wrap;
gap: var(--space-xs);
margin: 0 0 var(--space-xs);
}
.morph-tag-pill {
font-size: var(--text-caption);
padding: var(--space-xs) var(--space-sm);
border-radius: var(--radius-l);
background: var(--bg-panel);
color: var(--text-sub);
border: 1px solid var(--border-soft);
letter-spacing: 0.01em;
}
.morph-tag-pill.core {
background: var(--accent-light);
color: var(--highlight);
border-color: var(--accent-mid);
font-weight: 600;
}

.rcb-container {
display: none;
align-items: baseline;
gap: var(--space-sm);
flex-wrap: wrap;
padding: var(--space-sm) var(--space-lg) var(--space-sm);
background: var(--bg-panel);
border-bottom: 1px solid var(--border-soft);
font-size: var(--text-caption);
flex-shrink: 0;
}
.rcb-container.visible { display: none; }
.rcb-chip-sm {
font-family: 'Gentium Plus', serif;
font-size: var(--text-body-lg);
color: var(--text-main);
font-weight: 400;
}
.rcb-label-sm {
font-size: var(--text-caption);
color: var(--text-sub);
font-weight: 400;
}
.rcb-sep-sm { color: var(--border-soft); font-size: var(--text-caption); }

.no-greek-badge {
display: inline-block;
font-size: var(--text-caption);
color: var(--text-sub);
background: var(--bg-panel);
border: 1px solid var(--border-soft);
border-radius: var(--radius-s);
padding: var(--space-xs) var(--space-sm);
margin-left: var(--space-sm);
vertical-align: middle;
letter-spacing: 0.04em;
}

@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: var(--opacity-primary); transform: translateY(0); } }

/* Study panel 閉じるボタン（廃止 → depth-history に置き換え済み） */
#study-close-btn {
display: none;
}

/* ══════════════════════════════════════════
   Flow / Meaning / Study タブ 共通スタイル
   ══════════════════════════════════════════ */

.flow-word-head {
    display: flex;
    align-items: baseline;
    gap: 0;
    margin-bottom: var(--space-xs);
    flex-wrap: wrap;
}
.flow-greek {
    font-size: var(--text-headline);
}
.flow-ja {
    font-size: var(--text-caption);
    color: var(--text-sub);
    font-weight: 400;
}
.flow-ref {
    font-size: var(--text-caption);
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    margin-bottom: var(--space-md);
    letter-spacing: 0.02em;
}

/* ── Flow タブ ── */
.flow-ai-area {
    margin-top: var(--space-sm);
    margin-bottom: var(--space-xs);
}
.flow-ai-content {
    font-size: var(--text-body);
    color: var(--text-main);
    line-height: 1.8;
    padding: var(--space-sm) var(--space-md);
    background: var(--accent-light);
    border-left: 2px solid var(--accent-mid);
    border-radius: 0 var(--radius-s) var(--radius-s) 0;
    margin-bottom: var(--space-xs);
}
.flow-ai-label {
    display: inline-block;
    font-size: var(--text-caption);
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    margin-right: var(--space-xs);
    vertical-align: middle;
}

/* ── Meaning タブ：「どう響くか」層 ── */
/* Abbott-Smith は不在。AIの contextual nuance が主役。静かなプロース。 */
.meaning-strong {
    font-size: var(--text-caption);
    color: #9e9ea4;
    font-family: monospace;
    margin-bottom: var(--space-sm);
}
/* Meaning AI 出力エリア：flow-ai-prose と共通の静かなスタイル */
.meaning-prose {
    font-size: var(--text-body);
    color: var(--text-main);
    line-height: 1.8;
    padding: var(--space-sm) 0 0 var(--space-sm);
    border-left: 2px solid var(--accent-light);
    margin-top: var(--space-xs);
}
.meaning-prose-label {
    display: inline-block;
    font-size: var(--text-caption);
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    margin-right: var(--space-xs);
    vertical-align: middle;
}

/* ── Semantics セクション（Study内）：quiet scholarly notes ── */
/* dense tables・giant lexicon UI 禁止。折りたたみで必要な時だけ確認する層。 */
.semantics-abbott {
    font-size: var(--text-caption);
    color: var(--text-sub);
    line-height: 1.8;
    padding: var(--space-sm) 0 var(--space-xs);
}
.semantics-note {
    font-size: var(--text-caption);
    color: var(--text-sub);
    line-height: 1.75;
    padding: var(--space-xs) 0 var(--space-xs);
    border-top: 1px solid rgba(0,0,0,0.04);
    margin-top: var(--space-xs);
}
.semantics-note-label {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    display: block;
    margin-bottom: var(--space-xs);
}

/* 種別ごとの細いボーダーは維持しつつ、カード感・行列感を除去 */
.flow-signal {
    padding: 0;
    border-bottom: none;
    border-left: none;
    line-height: 1.85;
}
.flow-signal:last-child { border-bottom: none; }

/* signal種別ボーダー：flow-hints全体の左ボーダーで統合。個別signal行には付けない */
.flow-signal.sig-logic     { }
.flow-signal.sig-emphasis  { }
.flow-signal.sig-turn      { }
.flow-signal.sig-exhort    { }
.flow-signal.sig-promise   { }
.flow-signal.sig-declare   { }
.flow-signal.sig-metaphor  { }
.flow-signal.sig-word      { }
.flow-signal.sig-caution   { }
.flow-signal.sig-culture   { }
.flow-signal.sig-default   { }

.flow-signal-text {
    font-size: var(--text-body);
}

.flow-hints {
    padding-top: var(--space-md);
    padding-bottom: var(--space-xs);
    margin-bottom: var(--space-sm);
}

.flow-signal-kind {
    display: none;
}

.flow-ai-prose {
    font-size: var(--text-body);
    color: var(--text-main);
    line-height: 1.8;
    padding: var(--space-sm) 0 0 var(--space-sm);
    border-left: 2px solid var(--accent-light);
    margin-top: var(--space-sm);
}
.flow-ai-prose-label {
    display: inline-block;
    margin-right: var(--space-xs);
    vertical-align: middle;
}

/* ══════════════════════════════════════════
   Syntax セクション（Study内）
   「論理の骨組み」を静かな読解補助として表示。
   linguistics software感・academic parser感禁止。
   ══════════════════════════════════════════ */

.syntax-reading {
    font-size: var(--text-body);
    color: var(--text-main);
    line-height: 1.8;
    padding: var(--space-sm) 0 var(--space-sm) 0;
    margin-bottom: var(--space-xs);
}
.syntax-reading-label {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    display: block;
    margin-bottom: var(--space-xs);
}

.syntax-relations {
    margin: var(--space-xs) 0 var(--space-xs);
}
.syntax-rel-row {
    display: flex;
    align-items: baseline;
    gap: var(--space-sm);
    padding: var(--space-xs) 0;
    border-bottom: 1px solid rgba(0,0,0,0.03);
    font-size: var(--text-caption);
    line-height: 1.65;
}
.syntax-rel-row:last-child { border-bottom: none; }
.syntax-rel-kind {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    flex-shrink: 0;
    min-width: 32px;
    padding-top: var(--space-xs);
}
.syntax-rel-text {
    color: var(--text-main);
    font-size: var(--text-caption);
    line-height: 1.65;
}

/* 構文構造（ツリー）：subtle indentation / light connectors / soft hierarchy */
/* 禁止：giant parser canvas / colorful linguistics graph / debug-like UI */
.syntax-tree {
    margin: var(--space-sm) 0 var(--space-xs) 0;
    font-size: var(--text-caption);
    line-height: 1.9;
    color: var(--text-sub);
    font-family: inherit;
}
.syntax-tree-row {
    display: flex;
    align-items: baseline;
    gap: 0;
    padding: var(--space-xs) 0;
}
.syntax-tree-indent {
    /* 階層ごとの静かなインデント。横スクロール地獄にならないよう幅を抑える */
    display: inline-block;
    width: 16px;
    flex-shrink: 0;
    color: rgba(0,0,0,0.12);
    font-size: var(--text-caption);
    line-height: 1.9;
    user-select: none;
}
.syntax-tree-connector {
    display: inline-block;
    width: 10px;
    flex-shrink: 0;
    color: rgba(0,0,0,0.15);
    font-size: var(--text-caption);
    line-height: 1.9;
    user-select: none;
}
.syntax-tree-role {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    margin-right: var(--space-xs);
    flex-shrink: 0;
}
.syntax-tree-content {
    color: var(--text-main);
    font-size: var(--text-caption);
    opacity: var(--opacity-primary);
}
.syntax-tree-note {
    font-size: var(--text-caption);
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    margin-left: var(--space-xs);
    font-style: italic;
}

/* Syntax AI補助エリア */
.syntax-ai-prose {
    font-size: var(--text-body);
    color: var(--text-main);
    line-height: 1.8;
    padding: var(--space-sm) 0 0 var(--space-sm);
    border-left: 2px solid var(--accent-light);
    margin-top: var(--space-xs);
    margin-bottom: var(--space-xs);
}
.syntax-ai-label {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    margin-right: var(--space-xs);
    vertical-align: middle;
}
/* セクション間は線ではなくspacingで区切る。
   study-details-body の下端padding(medium) + 本要素のmargin(medium) + 次のstudy-summaryの
   上端padding(medium) を合算して macro（24px）の section間隔になるよう設計する。 */
.study-details {
    border-bottom: none;
    margin-bottom: var(--rhythm-medium-y);
}
.study-details:last-of-type { margin-bottom: 0; }
.study-summary {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-sub);
    padding: var(--rhythm-medium-y) 0;
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: flex-start;
    gap: var(--space-xs);
    user-select: none;
    outline: none;
}
.study-summary-inner {
    display: flex;
    flex-direction: column;
    gap: var(--space-xs);
}
.study-summary-sub {
    font-size: var(--text-caption);
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    text-transform: uppercase;
}
.morph-grid-expand {
    margin-top: var(--rhythm-medium-y);
    padding-top: var(--rhythm-micro);
    border-top: 1px solid rgba(0,0,0,0.04);
}
.morph-grid-expand-btn {
    background: none;
    border: none;
    font-size: var(--text-caption);
    font-family: inherit;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    cursor: pointer;
    padding: 0;
    letter-spacing: 0.02em;
    transition: opacity var(--transition-fast);
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
}
.morph-grid-expand-btn svg { width: 12px; height: 12px; display: block; }
.morph-grid-expand-btn:hover { opacity: var(--opacity-primary); }
.morph-grid-extra {
    display: none;
    margin-top: var(--rhythm-micro);
}
.morph-grid-extra.visible { display: block; }
.study-summary::-webkit-details-marker { display: none; }
.study-summary::before {
    content: '›';
    font-size: var(--text-body);
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    transition: transform var(--transition-fast);
    display: inline-block;
    width: 10px;
    margin-top: var(--space-xs);
}
details[open] .study-summary::before {
    transform: rotate(90deg);
}
.study-details-body {
    padding: 0 0 var(--rhythm-medium-y) 0; /* 幅統一: 左インデントなし */
}

/* ══════════════════════════════════════════
   Research Tools - Study タブ内の静かな探索補助
   ══════════════════════════════════════════

   設計思想：
   - Reading Evidence（語形・論理構造・意味論的根拠）の下に配置
   - 初期状態は折りたたみ。「研究ツールを開く」で展開
   - card乱立禁止・dense search UI禁止・analytics感禁止
   - filter controls は compact・expandable
   - 読書空間を壊さない quiet な外観を維持
   ══════════════════════════════════════════ */

/* Research Tools 全体ラッパー。Reading Evidenceからの「思考の切り替え」なので macro 間隔を置く。 */
.rt-section {
    margin-top: var(--rhythm-macro-min);
    border-top: 1px solid rgba(0,0,0,0.06);
    padding-top: var(--rhythm-medium-y);
}
.rt-open-btn {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    width: 100%;
    background: none;
    border: none;
    padding: var(--space-sm) 0;
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-sub);
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: color var(--transition-fast);
}
.rt-open-btn:hover { color: var(--highlight); }
.rt-open-btn-icon {
    opacity: var(--opacity-secondary);
    transition: transform var(--transition-fast);
    display: inline-flex;
    align-items: center;
    width: 10px;
    height: 10px;
    flex-shrink: 0;
}
.rt-open-btn-icon svg { width: 100%; height: 100%; display: block; }
.rt-open-btn.expanded .rt-open-btn-icon { transform: rotate(90deg); }

/* Research Tools 本体 */
.rt-body {
    display: none;
}
.rt-body.visible { display: block; }

/* 各 Research Tool（Morph / Syntax / Semantic）の切り替えタブ */
.rt-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: var(--rhythm-medium-x);
}
.rt-tab {
    padding: var(--space-xs) var(--space-sm) var(--space-xs);
    font-size: var(--text-caption);
    font-weight: 600;
    font-family: inherit;
    color: var(--text-sub);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: color var(--transition-fast), border-color var(--transition-fast);
    letter-spacing: 0.02em;
    position: relative;
    bottom: -1px;
}
.rt-tab:hover { color: var(--highlight); }
.rt-tab.active {
    color: var(--highlight);
    border-bottom-color: var(--highlight);
}

/* 各 Research Tool のコンテンツエリア */
.rt-content { display: none; }
.rt-content.visible { display: block; }

/* フィルター行：label + control をコンパクトに並べる */
.rt-filter-group {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-xs) var(--space-sm);
    margin-bottom: var(--space-sm);
    align-items: baseline;
}
.rt-filter-label {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    min-width: 24px;
    flex-shrink: 0;
}
/* select コントロール：quiet & compact */
.rt-select {
    font-size: var(--text-caption);
    font-family: inherit;
    color: var(--text-main);
    background: var(--bg-panel);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-s);
    padding: var(--space-xs) var(--space-xs);
    cursor: pointer;
    outline: none;
    transition: border-color var(--transition-fast);
    max-width: 110px;
}
.rt-select:focus { border-color: rgba(90,110,130,0.4); }

/* 実行ボタン */
.rt-run-btn {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    padding: var(--space-xs) var(--space-md);
    font-size: var(--text-caption);
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.03em;
    color: var(--highlight);
    background: transparent;
    border: 1px solid var(--accent-mid);
    border-radius: var(--radius-s);
    cursor: pointer;
    transition: background var(--transition-fast), border-color var(--transition-fast);
    margin-top: var(--space-xs);
}
.rt-run-btn:hover {
    background: var(--highlight-light);
    border-color: rgba(90,110,130,0.4);
}
.rt-run-btn:active { opacity: var(--opacity-secondary); }

/* 検索結果エリア */
.rt-results {
    margin-top: var(--space-sm);
    min-height: 0;
}
/* ローディング（ac-loading と同じアニメーションを流用） */
.rt-loading {
    font-size: var(--text-caption);
    color: var(--text-sub);
    padding: var(--space-sm) 0;
    text-align: center;
    animation: ac-blink 1.2s ease-in-out infinite;
    display: none;
}
.rt-loading.visible { display: block; }

/* 結果ブロック：静かな paper-like カード。乱立禁止・1項目ずつ縦積み */
.rt-result-block {
    border-left: 2px solid var(--accent-mid);
    padding: var(--space-xs) 0 var(--space-xs) var(--space-sm);
    margin-bottom: var(--space-sm);
    font-size: var(--text-caption);
    color: var(--text-main);
    line-height: 1.75;
}
.rt-result-block:last-child { margin-bottom: 0; }
.rt-result-kind {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    display: block;
    margin-bottom: var(--space-xs);
}
.rt-result-text {
    font-size: var(--text-caption);
    color: var(--text-main);
    line-height: 1.75;
}
.rt-result-ref {
    font-size: var(--text-caption);
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    margin-top: var(--space-xs);
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
}
.rt-result-ref svg { width: 0.85em; height: 0.85em; display: block; flex-shrink: 0; }
/* 空結果メッセージ */
.rt-no-result {
    font-size: var(--text-caption);
    color: var(--text-sub);
    text-align: center;
    padding: var(--space-md) 0;
    opacity: var(--opacity-secondary);
}
/* Semantic Search：concept チップ選択 */
.rt-concept-grid {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-xs);
    margin-bottom: var(--space-sm);
}
.rt-concept-chip {
    font-size: var(--text-caption);
    padding: var(--space-xs) var(--space-sm);
    border-radius: var(--radius-l);
    background: var(--bg-panel);
    color: var(--text-sub);
    border: 1px solid var(--border-soft);
    cursor: pointer;
    transition: background var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
    letter-spacing: 0.01em;
    user-select: none;
}
.rt-concept-chip.selected {
    background: var(--highlight-light);
    color: var(--highlight);
    border-color: rgba(90,110,130,0.3);
    font-weight: 600;
}

/* ══════════════════════════════════════════
   Word List View - 節語形リスト
   Progressive Disclosure 段階展開型。
   タブバー廃止。「流れ」を唯一の基盤UIとし、
   chipクリックでインライン展開する。
   ══════════════════════════════════════════ */

/* 外枠（flex列で flow-stream + drawer を縦積み） */
#word-list-view {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    /* スクロールバー出現による横幅変化（chips再ラップ・カラムずれ）を防ぐ。
       both-edges で左右対称に予約し、中心軸を真中心に保つ */
    scrollbar-gutter: stable both-edges;
}

/* ── 流れUI：ギリシャ語順日本語chip列 ── */
/* 常時表示。タブで隠さない。読書の延長として機能する。 */
.wlv-flow-section {
    padding: var(--space-md) var(--space-md) 0;
    flex-shrink: 0;
}
.wlv-flow-label {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: var(--opacity-tertiary);
    display: block;
    margin-bottom: var(--space-sm);
}

.wlv-flow-stream {
    display: flex;
    flex-wrap: wrap;
    gap: var(--rhythm-micro);
    align-items: baseline;
    line-height: 2.6;
}

/* 各語のchip：軽量・ボーダー使わない */
.wlv-chip {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-xs);
    padding: var(--space-xs) var(--space-sm) var(--space-xs);
    border-radius: var(--radius-s);
    cursor: pointer;
    transition: background var(--transition-fast);
    position: relative;
    border: 1px solid transparent;
}
.wlv-chip:hover {
    background: var(--accent-light);
}
.wlv-chip.active {
    background: var(--accent-light);
    border-color: var(--accent-mid);
}

.wlv-chip-ja {
    font-size: var(--text-body-lg);
    font-family: 'Noto Serif JP', serif;
    color: var(--text-main);
    line-height: 1.3;
    letter-spacing: -0.01em;
}

.wlv-phrase-sep {
    display: inline-block;
    width: 1px;
    height: 16px;
    background: rgba(0,0,0,0.07);
    margin: 0 var(--space-xs);
    vertical-align: middle;
    flex-shrink: 0;
    align-self: center;
}

/* ── chip詳細ドロワー - "深く潜る" continuity design ── */
/* 別パネルではなく、chip streamの下に自然に続く深層として展開する */
.wlv-detail-drawer {
    margin: var(--space-sm) 0 0;
    padding: var(--space-md) var(--space-md) var(--space-md) var(--space-xl);
    display: none;
    border-left: 2px solid var(--accent-mid);
    background: transparent;
    position: relative;
}
/* 左線の上部に小さな点を打って「ここから潜る」感を出す */
.wlv-detail-drawer::before {
    content: '';
    position: absolute;
    left: -5px;
    top: 16px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-mid);
}
.wlv-detail-drawer.visible {
    display: block;
    animation: depthUnfold var(--transition-slow) both;
}
@keyframes wlvDrawerIn {
    from { opacity: 0; transform: translateY(-3px); }
    to   { opacity: var(--opacity-primary); transform: translateY(0); }
}

.wlv-detail-greek {
    font-family: 'Gentium Plus', serif;
    font-size: var(--text-title);
    color: var(--text-main);
    line-height: 1.2;
    margin-bottom: var(--space-xs);
    opacity: var(--opacity-primary);
}
.wlv-detail-ja {
    font-size: var(--text-caption);
    color: var(--text-sub);
    margin-bottom: var(--space-sm);
    opacity: var(--opacity-secondary);
}
/* ドロワー内：文法メモ（廃止：resonanceに統合） */
.wlv-detail-morph {
    display: none;
}
/* ドロワー内：signalタグ（廃止） */
.wlv-detail-signals {
    display: none;
}
.wlv-signal-tag {
    display: none;
}
/* ドロワー内：「深く読む」ボタン */
.wlv-detail-study-btn {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    font-size: var(--text-caption);
    font-weight: 400;
    font-family: 'Noto Serif JP', serif;
    color: var(--text-sub);
    background: transparent;
    border: none;
    padding: var(--space-sm) 0 0;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: color var(--transition-fast), opacity var(--transition-fast);
    opacity: var(--opacity-secondary);
}
.wlv-detail-study-btn:hover { color: var(--highlight); opacity: var(--opacity-primary); }

.wlv-flow-hint {
    padding: var(--space-sm) var(--space-md) var(--space-md);
    font-size: var(--text-caption);
