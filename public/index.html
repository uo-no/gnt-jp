/* ══════════════════════════════════════════
   検索ページへの文脈付き遷移
   ══════════════════════════════════════════ */
function goProximityPage() {
    const p = new URLSearchParams();

    const activeVEl   = document.getElementById('active-v');
    const activeVText = activeVEl ? activeVEl.innerText.replace(/\s*節\s*$/, '').trim() : '';

    const urlParams = Router.parse();
    const book = urlParams.book || '';
    const ch   = urlParams.chapter || '';

    /* AppState.inspect.data から語を取得（後方互換: _inspectData も同じ参照） */
    const inspData = AppState.inspect.data;
    if (inspData && inspData.greek) {
        p.set('word',  inspData.greek);
        if (inspData.lemma) p.set('lemma', inspData.lemma);
        const _gpm = parseMorphForSearch(inspData.rawMorph || '');
        console.info('[goProximityPage→search] 元トークン rawMorph:', inspData.rawMorph);
        console.info('[goProximityPage→search] parseMorphForSearch 入力:', inspData.rawMorph);
        console.info('[goProximityPage→search] parseMorphForSearch 出力:', _gpm);
        if (_gpm.pos)    p.set('pos',    _gpm.pos);
        if (_gpm.tense)  p.set('tense',  _gpm.tense);
        if (_gpm.mood)   p.set('mood',   _gpm.mood);
        if (_gpm.voice)  p.set('voice',  _gpm.voice);
        /* 動詞形（分詞含む）では格・数・性を送らない */
        if (_gpm.pos !== 'V') {
            if (_gpm.case)   p.set('case',   _gpm.case);
            if (_gpm.number) p.set('number', _gpm.number);
            if (_gpm.gender) p.set('gender', _gpm.gender);
        }
        p.set('layers', 'lemma,morph');
        console.info('[goProximityPage→search] URL パラメータ:', Object.fromEntries(p.entries()));
    }

    if (book && ch) {
        const ref = activeVText ? `${book}${ch}:${activeVText}` : `${book}${ch}`;
        p.set('ref', ref);
        if (activeVText) p.set('scope', 'verse');
    }

    const qs = p.toString();
    const url = qs ? `search-tool.html?${qs}` : 'search-tool.html';
    window.open(url, '_blank');
}

function switchTab(evt, tabName) {
    const tabContents = document.getElementsByClassName("tab-content");
    for (let i = 0; i < tabContents.length; i++) tabContents[i].classList.remove("active");
    const tabBtns = document.getElementsByClassName("tab-btn");
    for (let i = 0; i < tabBtns.length; i++) tabBtns[i].classList.remove("active");
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
    document.getElementById('main-reading-area').scrollTop = 0;
}

async function renderCurrentPage() {
    document.getElementById('main-reading-area').classList.remove('static-view');
    const urlParams = Router.parse();
    const book = urlParams.book || 'ROM';
    const ch   = urlParams.chapter || '1';

    const isNt = SB_BOOKS.nt.some(b => b.key === book);

    const allBooks = [...SB_BOOKS.nt, ...SB_BOOKS.ot];
    const found = allBooks.find(b => b.key === book);

    /* location 更新 */
    AppState.location.testament = isNt ? 'nt' : 'ot';
    AppState.location.book      = found || null;
    AppState.location.chapter   = parseInt(ch);

    /* ヘッダー/パンくず/サイドバー選択状態は AppState.ui.view から一括同期する */
    AppState.ui.view = 'bible';
    syncUIFromState();

    const hasGreek = GREEK_BOOKS.has(book);

    try {
        /* _transA が FLOW の場合は翻訳JSONをfetchしない */
        const jpData = _transA === 'FLOW'
            ? null
            : await _fetchTranslation(_transA, book, ch);

        let jpDataB = null;
        if (_transMode === 'compare' && _transB !== 'FLOW') {
            jpDataB = await _fetchTranslation(_transB, book, ch);
        }
        
        let elData = [];
        if (hasGreek) {
            try {
                const testament = SB_BOOKS.nt.some(b => b.key === book) ? 'nt' : 'lxx';
                const elRes = await fetch(`../bible_data/${testament}/${book}/${ch}.json`);
                if (elRes.ok) elData = await elRes.json();
            } catch(e) {}
        }

        /* _transA === 'FLOW': elData から verse キーを組み立てて jpData の代わりに渡す */
        const resolvedJpData = (_transA === 'FLOW')
            ? _buildFlowJpData(elData)
            : jpData;
        if (!resolvedJpData) throw new Error('Not found');

        render(resolvedJpData, elData, hasGreek && elData.length > 0, jpDataB);
        document.getElementById('active-v').innerText = "";
        syncUrlState();

// 本文レンダリング完了後

        // ── オンボーディング：アンカー語付与 ──────────────────
        // ヨハネ3:16表示中かつオンボーディング未完了の場合のみ実行。
        // word-card の data-greek から対象語を探し、最初の1枚に
        // data-onboarding-anchor="true" を付与する。
        // 対象語優先順: ἠγάπησεν → οὕτως → （先頭カード）
    } catch (err) {
        document.getElementById('bible-text-area').innerHTML = `<p style="color:red">データが見つかりません。</p>`;
    }
}

let _mobileVerseList = [];   // 章内の全節番号（文字列）の配列
let _mobileVerseIdx  = 0;    // 現在表示中のインデックス

function _mobileCompareSetup() {
    if (window.innerWidth > 768) return;
    const area = document.getElementById('main-reading-area');
    if (!area || !area.classList.contains('compare-mode')) return;

    // 節リストを mobile-verse-group から収集
    const groups = area.querySelectorAll('#bible-text-area .mobile-verse-group[data-vnum]');
    _mobileVerseList = Array.from(groups).map(g => g.dataset.vnum);
    if (_mobileVerseList.length === 0) return;

    _mobileVerseIdx = 0;
    _mobileVerseApply();

    const nav = document.getElementById('mobile-verse-nav');
    if (nav) nav.style.display = 'flex';
}

function _mobileVerseApply() {
    const area = document.getElementById('main-reading-area');
    if (!area) return;
    const cur = _mobileVerseList[_mobileVerseIdx];

    // mobile-verse-group を cur 以外を非表示
    area.querySelectorAll('#bible-text-area .mobile-verse-group[data-vnum]').forEach(g => {
        g.style.display = g.dataset.vnum === cur ? '' : 'none';
    });

    // ナビ表示を更新
    const numEl = document.getElementById('mvn-verse-num');
    if (numEl) numEl.textContent = cur;
    const prev = document.getElementById('mvn-prev');
    const next = document.getElementById('mvn-next');
    if (prev) prev.disabled = _mobileVerseIdx === 0;
    if (next) next.disabled = _mobileVerseIdx === _mobileVerseList.length - 1;

    // 先頭にスクロール
    const mainArea = document.getElementById('main-reading-area');
    if (mainArea) mainArea.scrollTop = 0;
}

function _mobileVerseNav(delta) {
    const next = _mobileVerseIdx + delta;
    if (next < 0 || next >= _mobileVerseList.length) return;
    _mobileVerseIdx = next;
    _mobileVerseApply();
}

function _mobileCompareTeardown() {
    const nav = document.getElementById('mobile-verse-nav');
    if (nav) nav.style.display = 'none';
    const area = document.getElementById('main-reading-area');
    if (area) area.querySelectorAll('#bible-text-area .mobile-verse-group').forEach(g => {
        g.style.display = '';
    });
    _mobileVerseList = [];
}

function _navigateVerse(delta) {
    /* 現在の章の次の節ブロックを探してスクロール */
    const selectedBlocks = document.querySelectorAll('.verse-block.selected');
    let currentVNum = null;
    if (selectedBlocks.length > 0) {
        const vNumEl = selectedBlocks[0].querySelector('.v-num');
        if (vNumEl) currentVNum = parseInt(vNumEl.textContent.trim());
    }

    const allBlocks = document.querySelectorAll('.verse-pair-left, .verse-block:not(.verse-pair-left):not(.verse-pair-right)');
    const blockArr = Array.from(allBlocks);

    if (currentVNum !== null) {
        /* 現在の節の次を探す */
        let found = false;
        for (let i = 0; i < blockArr.length; i++) {
            const vEl = blockArr[i].querySelector('.v-num');
            if (!vEl) continue;
            const v = parseInt(vEl.textContent.trim());
            if (v === currentVNum + delta) {
                blockArr[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                found = true;
                break;
            }
        }
        if (!found) {
            /* 章末 → 次章へ遷移 */
            const nextCh = (AppState.location.chapter || 1) + delta;
            const maxCh = AppState.location.book ? AppState.location.book.ch : 999;
            if (nextCh >= 1 && nextCh <= maxCh) {
                _navTo(AppState.location.book.key, nextCh);
            }
        }
    } else {
        /* 節未選択 → 3:17へスクロール */
        for (let i = 0; i < blockArr.length; i++) {
            const vEl = blockArr[i].querySelector('.v-num');
            if (vEl && parseInt(vEl.textContent.trim()) === 17) {
                blockArr[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                break;
            }
        }
    }
}

/* 翻訳マスター定義・変数はスクリプト先頭で宣言済み（TDZ対策） */

/*
 * transDataPath — 翻訳IDとbook/chからJSONパスを返す
 *   translations/{transId}/{book}/{ch}.json
 */
function transDataPath(transId, book, ch) {
    return `../translations/${transId}/${book}/${ch}.json`;
}

/*
 * _buildFlowJpData — _transA === 'FLOW' のとき elData から
 * jpData 互換オブジェクト { verses: { "1": "", ... } } を生成する。
 * text は空文字（FLOW チップが左列を担うため）。
 */
function _buildFlowJpData(elData) {
    if (!elData || elData.length === 0) return null;
    const verses = {};
    elData.forEach(w => {
        // ★ verse番号は w.verse（構造フィールド）から取得。w.ref のパース禁止。
        const v = w.verse != null ? String(w.verse) : null;
        if (v && !(v in verses)) verses[v] = '';
    });
    if (Object.keys(verses).length === 0) return null;
    return { verses };
}

/*
 *   loadBook(book, translation) のエイリアスとして機能する。
 *
 *   translations/{transId}/{book}/{ch}.json を fetch する。
 *   失敗した場合は null を返す。
 */
async function _fetchTranslation(transId, book, ch) {
    try {
        const res = await fetch(transDataPath(transId, book, ch));
        if (res.ok) return await res.json();
    } catch(e) {}

    return null;
}

/*
 * loadBook — 汎用ブック読み込み関数
 *   loadBook('JHN')                  … currentTranslation で読み込み
 *   loadBook('JHN', 'NKJ2017')       … 指定翻訳で読み込み
 *   loadBook('JHN', 'NKJ')           … 口語訳等を明示指定
 */
async function loadBook(book, translation = currentTranslation) {
    const ch = AppState.location.chapter || 1;
    return await _fetchTranslation(translation, book, String(ch));
}

function _applyTransMode(mode) {
    _transMode = mode;
    const area = document.getElementById('main-reading-area');
    if (mode === 'compare') {
        area.classList.remove('single-mode');
        area.classList.add('compare-mode');
    } else {
        area.classList.remove('compare-mode');
        area.classList.add('single-mode');
        /* Greek Flow View: 単一表示に戻ったとき、transB が FLOW でなければタブを隠す */
        const gfTabBar = document.getElementById('gf-tab-bar');
        if (gfTabBar && _transA !== 'FLOW' && _transB !== 'FLOW') {
            gfTabBar.style.display = 'none';
        }
        if (_rightMode === 'flow' && _transB !== 'FLOW') _setRightMode('trans');
    }
    _updateColHeaders();
}

function _updateColHeaders() {
    const hA = document.getElementById('trans-col-header-a');
    if (hA) hA.textContent = (TRANSLATIONS[_transA] || {}).label || _transA;
    const gfTransLbl = document.getElementById('gf-trans-label');

/* ── Greek Flow View: 右列表示モード切り替え ── */
function _setRightMode(mode) {
    _rightMode = mode;

    /* タブボタンの active 更新 */
    const tabTrans = document.getElementById('gf-tab-trans');
    const tabFlow  = document.getElementById('gf-tab-flow');
    if (tabTrans) tabTrans.classList.toggle('active', mode === 'trans');
    if (tabFlow)  tabFlow.classList.toggle('active',  mode === 'flow');

    /* flow タブ初回開封を onboarding へ通知 */
    if (mode === 'flow') {
        window.App.onboarding?.onFlowTabOpened();
        _syncOnboardingActiveFlag();
    }

    /* 全 verse-pair-right を切り替え */
    document.querySelectorAll('.verse-pair-right').forEach(block => {
        const vNum = block.dataset.vnum;
        block.classList.toggle('gf-mode', mode === 'flow');

        if (mode === 'flow') {
            /* gf-verse-block がまだなければ生成 */
            if (!block.querySelector('.gf-verse-block')) {
                const words = (_cachedElByVerse && vNum) ? (_cachedElByVerse[vNum] || []) : [];
                const gfEl = document.createElement('div');
                gfEl.className = 'gf-verse-block';
                gfEl.innerHTML = _buildGfVerseBlock(vNum, words);
                block.appendChild(gfEl);
            }
        }
    });
}

/* ── Greek Flow View: 1節分の右列HTML生成 ── */
function _buildGfVerseBlock(vNum, words) {
    if (!words || words.length === 0) {
        return `<p style="font-size: var(--text-caption);color:var(--text-sub);opacity: var(--opacity-secondary);padding: var(--space-sm) 0;">この節の原語データがありません</p>`;
    }
    /* 既存の Study Panel 用ロジックを再利用
       ★ SSOT: bookKey / ch を渡す（AppState.location 経由）*/
    const _gfBkKey = AppState.location.book ? AppState.location.book.key : '';
    const _gfBkCh  = AppState.location.chapter != null ? AppState.location.chapter : null;
    const chips = words.map((w, i) => _wordToFlowChip(w, i, _gfBkKey, _gfBkCh));
    const chipsHTML = chips.map((c, i) => {
        const sepBefore = c.phraseBreakBefore ? `<span class="wlv-phrase-sep"></span>` : '';
        return `${sepBefore}<span class="wlv-chip ${c.roleClass}"
            data-idx="${i}"
            onclick="_wlvChipClick(this,${i})"
            title="${c.greek}">
            <span class="wlv-chip-ja"><span class="${c.dpGrammarClasses}">${c.gloss}</span></span>
        </span>`;
    }).join('');

    return `
    <div style="display:flex;align-items:baseline;gap: var(--space-sm);padding: var(--space-xs) 0;">
        <span class="v-num">${vNum}</span>
        <div style="flex:1;font-size: var(--text-body);line-height:2.4;display:flex;flex-wrap:wrap;gap: var(--space-xs) var(--space-xs);align-items:baseline;">${chipsHTML}</div>
    </div>`;
}

function _updateBibleLabel() {
    const el = document.getElementById('sb-bible-label-text');
    if (!el) return;
    const labelA = (TRANSLATIONS[_transA] || {}).label || _transA;
    if (_transMode === 'compare') {
        const labelB = (TRANSLATIONS[_transB] || {}).label || _transB;
        el.textContent = labelA + ' / ' + labelB;
    } else {
        el.textContent = labelA;
    }
}

}

function _bpRenderCompare() {
    /* 左列：全翻訳（FLOW含む）を選択可能 */
    document.getElementById('bp-col-a').innerHTML = TRANS_LIST.map(t =>
        `<div class="bp-compare-opt${t.id === _bpSelA ? ' active' : ''}" onclick="bpSelectA('${t.id}')">
            <span class="bp-compare-opt-dot"></span>
            <span class="bp-compare-opt-name">${t.name}</span>
        </div>`
    ).join('');
    /* 右列：左と同じものは除外。左がFLOWのとき右にFLOWは選べない（同一不可） */
    document.getElementById('bp-col-b').innerHTML = TRANS_LIST.filter(t => t.id !== _bpSelA).map(t =>
        `<div class="bp-compare-opt${t.id === _bpSelB ? ' active' : ''}" onclick="bpSelectB('${t.id}')">
            <span class="bp-compare-opt-dot"></span>
            <span class="bp-compare-opt-name">${t.name}</span>
        </div>`
    ).join('');
}

function bpSelectA(id) {
    _bpSelA = id;
    if (_bpSelB === id) {
        const fallback = TRANS_LIST.find(t => t.id !== id);
        _bpSelB = fallback ? fallback.id : '';
    }
    _bpRenderSingle();
    _bpRenderCompare();
}

function bpSelectB(id) {
    _bpSelB = id;
    _bpRenderCompare();
}

function bpConfirm() {
    _transA = _bpSelA;
    _transB = _bpSelB;
    currentTranslation  = _transA;
    currentTranslationB = _transB;
    _applyTransMode(_bpMode);
    closeBiblePicker();

    syncUrlState();

    renderCurrentPage();
}

/* ══════════════════════════════════════════
   モバイル：スワイプジェスチャー（右スワイプで戻る）
   Study Panel 上の端からスワイプすると本文に戻れる
   ══════════════════════════════════════════ */
function _mobileSwipeBack() {
    panelGoBack();
}
    
(function _initSwipeBack() {
    let touchStartX = 0;
    let touchStartY = 0;
    let isDragging  = false;
    const EDGE_THRESHOLD = 32;  /* 画面左端から何pxのスワイプを検知するか */
    const SWIPE_THRESHOLD = 80; /* 何px右にスワイプしたら戻るとみなすか */

    const panel = document.getElementById('bottom-depth-panel');
    if (!panel) return;

    panel.addEventListener('touchstart', (e) => {
        if (window.innerWidth > 900) return;
        if (!panel.classList.contains('open')) return;

        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        /* isDragging はまだ確定しない。touchmove で方向確認後に決める */
        isDragging  = touchStartX < EDGE_THRESHOLD ? null : false;
    }, { passive: true });

    panel.addEventListener('touchmove', (e) => {
        if (window.innerWidth > 900) return;
        if (isDragging === false) return;

        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;

        /* isDragging が未確定（null）の場合：最初の8px移動で方向を判定 */
        if (isDragging === null) {
            if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return; /* まだ判定しない */
            /* 縦スクロールが主体 or 左スワイプ → 無効化 */
            if (Math.abs(dy) > Math.abs(dx) * 1.2 || dx < 0) {
                isDragging = false;
                return;
            }
            /* 右スワイプ確定 */
            isDragging = true;
        }

        /* 縦スクロールが主体なら無視 */
        if (Math.abs(dy) > Math.abs(dx) * 1.5) {
            isDragging = false;
            panel.style.transform = '';
            const mainArea = document.getElementById('main-reading-area');
            if (mainArea) { mainArea.style.transform = ''; mainArea.style.opacity = ''; }
            return;
        }

        if (dx > 0) {
            /* パネルを指の動きに追従（rubber band感） */
            panel.style.transition = 'none';
            panel.style.transform  = `translateX(${Math.min(dx, window.innerWidth)}px)`;
            /* 本文を逆方向に少し動かして奥行き感を出す */
            const mainArea = document.getElementById('main-reading-area');
            if (mainArea) {
                const ratio = dx / window.innerWidth;
                const offsetX = -24 + (24 * ratio);
                const opacityVal = 0.6 + (0.4 * ratio);
                mainArea.style.transition = 'none';
                mainArea.style.transform  = `translateX(${offsetX}px)`;
                mainArea.style.opacity    = opacityVal;
            }
        }
    }, { passive: true });

    panel.addEventListener('touchend', (e) => {
        if (window.innerWidth > 900) return;
        const wasTracking = isDragging === true || isDragging === null;
        isDragging = false;

        /* transform が動いていない場合は何もしない */
        if (!wasTracking) return;

        const dx = e.changedTouches[0].clientX - touchStartX;

        /* トランジションを戻す */
        panel.style.transition = '';
        const mainArea = document.getElementById('main-reading-area');
        if (mainArea) mainArea.style.transition = '';

        if (dx > SWIPE_THRESHOLD && panel.classList.contains('open')) {
            /* 閾値を超えた → 戻る */
            _mobileSwipeBack();
        } else {
            /* 閾値未満 or パネル未open → 元に戻す */
            panel.style.transform = '';
            if (mainArea) {
                mainArea.style.transform = '';
                mainArea.style.opacity   = '';
            }
        }
    }, { passive: true });
})();

    /* ── オンボーディング初期化 ── */
    /* ── オンボーディング用ブリッジ ──────────────────────────
       onboarding.js は 'use strict' IIFE のため index.html の
       let 変数に直接アクセスできない。window 経由で公開する。
    ─────────────────────────────────────────────────── */
    /* ── STEP8: App Namespace 初期化 ── */
    window.App = window.App || {};

    window.App.bridge = {
    activateFlowCompare: async function() {
        _transB = currentTranslationB = 'FLOW';
        _applyTransMode('compare');
        await renderCurrentPage();
        _setRightMode('flow');
    },
    activateCompare: async function(transBId) {
        _transB = currentTranslationB = transBId || 'BUN';
        _applyTransMode('compare');
        await renderCurrentPage();
    },
    openFlowTab: async function() {
        /* モバイル：StudyPanelを閉じてFLOWモードで本文を再描画 */
        if (_isMobile()) {
            closeStudyPanel();
        }
        _transA = currentTranslation = 'FLOW';
        _applyTransMode('single');
        await renderCurrentPage();
        if (window.App.onboarding && typeof window.App.onboarding.onFlowTabOpened === 'function') {
            window.App.onboarding.onFlowTabOpened();
        }
        _syncOnboardingActiveFlag();
    },
    closeStudyPanel: function() {
        closeStudyPanel();
    },
    /* 読み取り専用ブリッジ: AppState の公開が必要な値のみ返す */
    getAppState: function() {
        return {
            mode:          AppState.mode,
            selectedVerse: { vNum: AppState.selectedVerse.vNum },
            location:      { book: AppState.location.book },
        };
    },
    };

    /* 互換エイリアス（既存参照を壊さない） */
    window.AppBridge = window.App.bridge;

    document.addEventListener('DOMContentLoaded', function () {
        if (window.App.onboarding) window.App.onboarding.init();
        _syncOnboardingActiveFlag();
        init();
        _ensureSemanticData().catch(function(){});

        /* 語源要素タップ → Abbott-Smith ポップアップ（イベントデリゲーション） */
        document.addEventListener('click', function(e) {
            const part = e.target.closest('.rn-etym-part');
            if (!part) return;
            _openEtymPopup(part.dataset.lexemeId);
        });

        /* ESC キーで語源ポップアップを閉じる */
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('rn-etym-backdrop')?.classList.remove('open');
            }
        });
    });
    
</script>
