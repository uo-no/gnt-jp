    color: var(--text-sub);
    opacity: var(--opacity-tertiary);
    letter-spacing: 0.02em;
    flex-shrink: 0;
}

/* ── 旧タブ関連：完全廃止。CSS定義を残すが使われない ── */
/* wlv-tabs / wlv-tab / wlv-content は削除（JS側で生成しなくなる） */
.wlv-normal-hint {
    font-size: var(--text-caption);
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    text-align: center;
    margin-top: var(--space-md);
    padding-top: var(--space-sm);
    border-top: 1px solid var(--border-soft);
}

/* ══════════════════════════════════════════
   節全体の読書メモ - passage note
   word-list-view の下に配置する。
   「読書の余白に書かれたメモ」として機能する。
   commentary・exegesis・sermon noteではない。
   軽い読書補助。静かな prose。
   ══════════════════════════════════════════ */
.wlv-reading-passage-note {
    padding: var(--rhythm-macro-min) var(--rhythm-macro-min) var(--rhythm-macro-min);
    border-top: 1px solid rgba(0,0,0,0.06);
    margin-top: var(--space-xs);
    flex-shrink: 0;
}

.wlv-pn-label {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text-sub);
    opacity: var(--opacity-tertiary);
    display: block;
    margin-bottom: var(--rhythm-medium-y);
}

.wlv-pn-prose {
    padding-left: var(--rhythm-medium-x);
    border-left: 2px solid var(--accent-mid);
}

.wlv-pn-prose p {
    font-family: 'Noto Serif JP', serif;
    font-size: var(--text-body);
    color: var(--text-main);
    line-height: 2.1;
    letter-spacing: 0.01em;
    margin: 0 0 var(--space-sm) 0;
}
.wlv-pn-prose p:last-child {
    margin-bottom: 0;
}

.wlv-flow-section-compact {
    padding: var(--rhythm-macro-min) var(--rhythm-macro-min) 0;
    flex-shrink: 0;
}

.wlv-flow-label-compact {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #a0a0a6;
    display: block;
    margin-bottom: var(--rhythm-medium-y);
}

/* chip stream: 補助モードではグロスを少し小さく */
.wlv-flow-section-compact .wlv-chip-ja {
    font-size: var(--text-body);
}

/* ドロワー内：「この節での響き」prose - 同読書温度で */
.wlv-detail-resonance {
    font-family: 'Noto Serif JP', serif;
    font-size: var(--text-body);
    color: var(--text-main);
    line-height: 1.95;
    padding: 0 0 var(--space-sm) 0;
    margin-bottom: 0;
    letter-spacing: 0.01em;
    opacity: var(--opacity-primary);
}

/* ══════════════════════════════════════════
   翻訳モード
   ══════════════════════════════════════════ */
#main-reading-area.single-mode {
    grid-template-columns: 1fr 0;
}
#main-reading-area.single-mode #bible-text-area {
    /* grid item は width:auto だとコンテンツ量に応じてshrink-to-fitされてしまうため、
       width:100%で明示的にグリッド列いっぱいに広げる（その上でmax-width:44emが上限を決める）。
       本文は元々文章量が多くshrink-to-fitでも44emに達していたため見た目は変わらないが、
       ブックマーク等のコンテンツが少ない一覧ページでは本文より狭くなっていた。 */
    width: 100%;
    margin-left: auto;
    margin-right: auto;
    padding-left: var(--space-lg);
    padding-right: var(--space-lg);
    box-sizing: border-box;
}
#main-reading-area.static-view .trans-col-header { display: none; }
/* static-view では trans-col-header が display:none になり1行目グリッド行が空になるが、
   align-content の初期値（normal=stretch相当）だと空行がコンテナの余り高さを吸い込んでしまい、
   ヘッダー直下に隙間ができる（一覧/空状態メッセージがヘッダーから離れて見える）。
   start にして余白を末尾に逃がし、コンテンツがヘッダー直下から始まるようにする。 */
#main-reading-area.static-view { align-content: start; }
/* single-mode（通常の聖書章表示）でも同様に stretch を抑制する。
   flex:1 により #main-reading-area がビューポート全高を占有するが、
   align-content: normal（初期値=stretch）だと grid 行が余剰高さを吸収して
   #bible-text-area が節本文より大きく引き伸ばされ、本文直下に巨大な白領域が生じる。
   compare-mode は single-mode と排他（_applyTransMode で single-mode を remove）のため
   このルールは compare-mode には適用されない。 */
#main-reading-area.single-mode { align-content: start; }

/* single-mode ではヘッダーも本文と同じ幅・位置に揃える */
#main-reading-area.single-mode .trans-col-header {
    max-width: 44em;
    margin-left: auto;
    margin-right: auto;
    padding-top: var(--space-sm);
    padding-bottom: var(--space-xs);
    padding-left: var(--space-xl);
    padding-right: var(--space-lg);
    box-sizing: border-box;
}
#main-reading-area.single-mode #parallel-text-area,
#main-reading-area.single-mode .verse-pair-right {
    display: none;
}
#main-reading-area.compare-mode {
    grid-template-columns: 1fr 1fr;
}
#main-reading-area.compare-mode #parallel-text-area {
    display: block;
}
#main-reading-area.compare-mode.panel-open {
    grid-template-columns: 1fr 0;
}
/* カラムヘッダー（左列は常時表示、右列は比較時のみ） */
.trans-col-header {
    display: block;
    grid-column: 1;
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    padding: 10px 32px 4px 52px;
    background: #fff;
}
.trans-col-header.right {
    display: none;
    grid-column: 2;
    padding: var(--space-sm) var(--space-lg) var(--space-xs) var(--space-xl);
    background: var(--bg-inset);
}
#main-reading-area.compare-mode .trans-col-header {
    display: block;
}
#bible-text-area {
    grid-column: 1;
    grid-row: 2;
}
#parallel-text-area {
    grid-column: 2;
    grid-row: 2;
}
.verse-pair-right .jp-text {
    font-size: var(--text-body-lg);
    line-height: 2.1;
    color: var(--text-main);
    font-family: 'Noto Serif JP', serif;
}
.gf-tab-bar {
    display: flex;
    gap: 0;
    padding: var(--space-xs) var(--space-lg) 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    background: var(--bg-inset);
}
.gf-tab-btn {
    font-size: var(--text-caption);
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: var(--space-xs) var(--space-sm) var(--space-xs);
    cursor: pointer;
    opacity: var(--opacity-secondary);
    transition: opacity var(--transition-fast), border-color var(--transition-fast);
}
.gf-tab-btn.active {
    opacity: var(--opacity-primary);
    border-bottom-color: var(--highlight);
}
.gf-tab-btn:hover { opacity: var(--opacity-secondary); }

.gf-verse-block {
    padding: var(--space-md) var(--space-lg) var(--space-sm);
}
/* flowモード時は jp-text の代わりにchipを表示するため jp-text を隠す */
.verse-pair-right.gf-mode .jp-text {
    display: none;
}
.verse-pair-right.gf-mode .gf-verse-block {
    display: block;
}
.verse-pair-right:not(.gf-mode) .gf-verse-block {
    display: none;
}
/* flowモードのchip streamはStudy Panel版より余白を抑える */
.gf-verse-block .wlv-flow-section-compact {
    padding: 0 0 var(--space-sm);
}

.sb-bible-label {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    cursor: pointer;
    transition: opacity var(--transition-fast);
    user-select: none;
}
.sb-bible-label:hover { opacity: var(--opacity-secondary); }
.sb-bible-label-arrow {
    font-size: var(--text-caption);
    opacity: var(--opacity-tertiary);
}

.sb-bible-back {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    padding: var(--space-sm) var(--space-md) var(--space-xs);
    background: none;
    border: none;
    font-family: inherit;
    font-size: var(--text-caption);
    font-weight: 600;
    color: var(--highlight);
    cursor: pointer;
    letter-spacing: 0.02em;
    opacity: var(--opacity-secondary);
    transition: opacity var(--transition-fast);
    text-align: left;
    width: 100%;
}
.sb-bible-back:hover { opacity: var(--opacity-primary); }
.sb-bible-back-chevron {
    font-size: var(--text-caption);
    font-weight: 400;
    opacity: var(--opacity-primary);
    line-height: 1;
}

/* ══════════════════════════════════════════
   Bible Picker Popup
   ══════════════════════════════════════════ */
#bible-picker-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: rgba(255,255,255,0.55);
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity var(--transition-base);
}
#bible-picker-backdrop.bp-open {
    display: flex;
    opacity: var(--opacity-primary);
}
#bible-picker-popup {
    width: 420px;
    max-width: calc(100vw - 32px);
    border-radius: var(--radius-l);
    background: rgba(250,250,248,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow:
        0 10px 40px rgba(0,0,0,0.08),
        0 2px 10px rgba(0,0,0,0.04);
    overflow: hidden;
    transform: scale(0.96) translateY(6px);
    opacity: 0;
    transition: transform var(--transition-base), opacity var(--transition-base);
}
#bible-picker-backdrop.bp-open #bible-picker-popup {
    transform: scale(1) translateY(0);
    opacity: var(--opacity-primary);
}
.bp-header {
    padding: var(--space-lg) var(--space-lg) var(--space-md);
    border-bottom: 1px solid rgba(0,0,0,0.06);
}
.bp-title {
    font-family: 'Noto Serif JP', serif;
    font-size: var(--text-body-lg);
    font-weight: 600;
    color: var(--text-main);
    letter-spacing: -0.01em;
    margin-bottom: var(--space-xs);
}
.bp-subtitle {
    font-size: var(--text-caption);
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    letter-spacing: 0.02em;
}
.bp-segment-wrap {
    padding: var(--space-md) var(--space-lg) var(--space-sm);
    border-bottom: 1px solid rgba(0,0,0,0.05);
}
.bp-segment {
    display: inline-flex;
    background: rgba(0,0,0,0.06);
    border-radius: var(--radius-l);
    padding: var(--space-xs);
}
.bp-seg-btn {
    padding: var(--space-xs) var(--space-md);
    font-size: var(--text-caption);
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.01em;
    color: var(--text-sub);
    background: transparent;
    border: none;
    border-radius: var(--radius-l);
    cursor: pointer;
    transition: background var(--transition-base), color var(--transition-base), box-shadow var(--transition-base);
    white-space: nowrap;
}
.bp-seg-btn.active {
    background: rgba(255,255,255,0.92);
    color: var(--text-main);
    box-shadow: 0 1px 4px rgba(0,0,0,0.10);
}
.bp-seg-btn:not(.active):hover { color: var(--text-main); }
.bp-body {
    padding: var(--space-sm) var(--space-md) var(--space-md);
    max-height: 300px;
    overflow-y: auto;
}
.bp-trans-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-sm) var(--space-md);
    border-radius: var(--radius-m);
    cursor: pointer;
    transition: background var(--transition-fast);
}
.bp-trans-item:hover { background: rgba(0,0,0,0.04); }
.bp-trans-item.active .bp-trans-name {
    font-weight: 700;
    color: var(--highlight);
}
.bp-trans-item.active .bp-trans-check { opacity: var(--opacity-primary); }
.bp-trans-name {
    font-family: 'Noto Serif JP', serif;
    font-size: var(--text-body);
    color: var(--text-main);
    line-height: 1.4;
}
.bp-trans-code {
    font-size: var(--text-caption);
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    margin-top: var(--space-xs);
    letter-spacing: 0.04em;
    display: block;
}
.bp-trans-check {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--highlight);
    opacity: 0;
    transition: opacity var(--transition-fast);
    flex-shrink: 0;
}
.bp-compare-body {
    padding: var(--space-md) var(--space-md) var(--space-md);
}
.bp-compare-pair {
    background: rgba(0,0,0,0.025);
    border-radius: var(--radius-m);
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.05);
    display: flex;
    flex-direction: row;
}
.bp-compare-col { padding: var(--space-sm) var(--space-md); flex: 1; min-width: 0; }
.bp-compare-col + .bp-compare-col {
    border-top: none;
    border-left: 1px solid rgba(0,0,0,0.06);
}
.bp-compare-side-label {
    font-size: var(--text-caption);

/* ══════════════════════════════════════════
   Depth Panel 文法装飾 namespace
   Depth Panel（#bottom-depth-panel = StudyPanel）限定。
   本文（Reading層: 左ペインFLOW表示・gf-verse-block）には適用しない。
   ★ Phase: Reading/Inspect/StudyPanel 3層分離。
   旧実装はこのコメントの意図どおりにスコープされておらず、
   _wordToFlowChip() が dpGrammarClasses を本文側のチップにも
   付与していたため、grep上は同じクラス名でも本文側に色・下線が
   漏れて適用されていた。ここで実際に #bottom-depth-panel 配下のみに
   限定する（JS側のチップ生成ロジックは変更せず、CSS側のスコープのみ
   修正— クラス自体は本文チップにも付くが、StudyPanel外では
   何の見た目の効果も持たなくなる）。
   ══════════════════════════════════════════ */
#bottom-depth-panel .dp-word {
    display: inline;
}
#bottom-depth-panel .dp-mood-imperative {
    background: var(--accent-light);
    border-radius: var(--radius-s);
    padding: 0 var(--space-xs);
}
#bottom-depth-panel .dp-mood-indicative {
    background: rgba(0,0,0,0.05);
    border-radius: var(--radius-s);
    padding: 0 var(--space-xs);
}

    text-decoration: underline;
    text-decoration-style: solid;
    text-underline-offset: 3px;
}
#bottom-depth-panel .dp-tense-aorist {
    text-decoration-line: underline;
    text-decoration-style: dotted;
    text-underline-offset: 3px;
}
#bottom-depth-panel .dp-tense-perfect {
    text-decoration-line: underline;
    text-decoration-style: wavy;
    text-underline-offset: 3px;
}
#bottom-depth-panel .dp-voice-middle::after,
#bottom-depth-panel .dp-voice-passive::after {

    margin-left: var(--space-xs);
    vertical-align: super;
}

.dp-legend {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-xs) var(--space-sm);
    padding: var(--space-sm) var(--space-md) var(--space-xs);
    font-size: var(--text-caption);
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    border-top: 1px solid rgba(0,0,0,0.05);
    margin-top: var(--space-sm);
    flex-shrink: 0;
}
.dp-legend-item {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    white-space: nowrap;
}
.dp-legend-label {
    font-size: var(--text-caption);
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    letter-spacing: 0.02em;

.dp-sample {

    font-size: var(--text-caption);

/* ═══════════════════════════════════════════════════════
   StudyPanel 4-level structure
   ═══════════════════════════════════════════════════════ */
.rn-level-section {
    margin-top: var(--space-sm);
    border-top: 1px solid var(--border);
}
.rn-level-section > summary {
    font-size: var(--text-body);

    color: var(--text-sub);
    cursor: pointer;
    padding: 10px 0;
    list-style: none;

}
.rn-level-section > summary:hover { color: var(--text-main); }
.rn-level-section[open] > summary { opacity: 1; }
.rn-level-section > summary::-webkit-details-marker { display: none; }
.rn-level-arrow {
    display: inline-flex;
    margin-right: var(--space-xs);

    flex-shrink: 0;
}
.rn-level-arrow svg { width: 0.65em; height: 0.65em; display: block; }
.rn-level-section[open] > summary .rn-level-arrow {
    transform: rotate(90deg);
}
.rn-level-body {
    padding-top: var(--space-xs);
    padding-left: var(--space-xs);
    padding-bottom: var(--space-md);
}
.rn-level-body #rn-semantic-layers { margin-top: 0; }

.rn-dict-label {
    display: block;
    margin-bottom: var(--space-xs);
}

/* Level 1: Usage trends */
.rn-usage-trends {
    margin-top: var(--space-md);
    padding-top: var(--space-sm);
    border-top: 1px solid var(--border);
}
.rn-usage-label {
    display: block;
    margin-bottom: var(--space-sm);
}
.rn-usage-group {
    margin-bottom: var(--space-sm);
}
.rn-usage-group-label {
    font-size: var(--text-caption);
    font-family: 'Noto Serif JP', serif;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    margin-bottom: var(--space-xs);
}
.rn-usage-list {
    margin: 0;
    padding: 0 0 0 var(--space-md);
    font-size: var(--text-caption);
    color: var(--text-main);
    line-height: 1.9;
}

/* Level 2: Etymology */
.rn-etymology {
    font-size: var(--text-caption);
    color: var(--text-sub);
    margin: var(--space-sm) 0 var(--space-xs);
    opacity: var(--opacity-primary);
}
.rn-etymology-parts {
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text-main);
}
/* result-query と同じ interaction パターンを踏襲（dotted underline + hover color） */
.rn-etym-part {
    display: inline;

    border-bottom: 2px dotted var(--border-soft);
    transition: border-color var(--transition-fast), color var(--transition-fast);
}
.rn-etym-part:hover {
    border-bottom-color: var(--highlight);

}
.rn-etym-sep {
    opacity: var(--opacity-secondary);

}
/* 語源ポップアップモーダル（search-tool の #as-modal と同構造） */
#rn-etym-backdrop {

}

}
#rn-etym-modal-head {

}
#rn-etym-modal-label { flex: 1; display: flex; flex-direction: column; gap: 3px; }
#rn-etym-modal-gr {

}
#rn-etym-modal-ja {
    font-size: var(--text-caption); color: var(--text-sub);
}
#rn-etym-modal-close {

    background: var(--bg-sub); cursor: pointer; font-size: 1rem;
    color: var(--text-sub); display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
}
#rn-etym-modal-close:hover { background: var(--border-soft); }
#rn-etym-modal-body {
    padding: 16px 20px; overflow-y: auto; flex: 1;
    font-size: 0.82rem; line-height: 1.75; color: var(--text-main);

}
.rn-etym-as-label {
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-sub);

    font-family: 'Noto Sans JP', sans-serif;
}
.rn-etym-empty { color: var(--text-sub); font-style: italic; }

/* Level 2: Full dictionary */
.rn-dict-full-section {
    margin-top: var(--space-sm);
    padding-top: var(--space-sm);
    border-top: 1px solid rgba(0,0,0,0.04);
}
.rn-dict-full-text {
    font-size: var(--text-caption);
    color: var(--text-sub);
    line-height: 1.8;
    margin-top: var(--space-xs);
}

/* Level 4: Research item header */
.rn-research-item-label {
    font-size: var(--text-caption);
    font-family: 'Noto Serif JP', serif;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    margin-bottom: var(--space-xs);
}

/* Level 4: External search links */
.rn-research-links {
    display: flex;
    flex-direction: column;
    gap: var(--space-xs);
    margin-top: var(--space-sm);
    padding-top: var(--space-sm);
    border-top: 1px solid var(--border);
}
.rn-research-link {
    font-size: var(--text-caption);
    color: var(--accent);
    text-decoration: none;
    font-family: 'Noto Serif JP', serif;
    opacity: 1;
    transition: color var(--transition-fast);
    display: block;
}
.rn-research-link:hover { color: var(--text-main); text-decoration: underline; }
.rn-research-link-title { display: block; }
.rn-research-link-desc {
    display: block;
    font-size: var(--text-caption);
    font-weight: 400;
    color: var(--text-sub);
    opacity: var(--opacity-secondary);
    margin-top: var(--space-xs);
    font-family: 'Noto Sans JP', sans-serif;
    text-decoration: none;
}

<script>
let abbottSmithDict = null;
let _proximityTokens = [];

/* decodeMorph / cleanText — bible_data tokens have direct case/mood/tense/voice fields */
function decodeMorph(e) {
    if (!e || typeof e !== 'object') return {};
    return {
        pos:    e.pos || (e.class ? String(e.class).slice(0, 1).toUpperCase() : ''),
        tense:  e.tense  || '',
        voice:  e.voice  || '',
        mood:   e.mood   || '',
        case:   e.case   || '',
        number: e.number || '',
        gender: e.gender || '',
        person: e.person || '',
    };
}
function cleanText(e) {
    const s = (e && typeof e === 'object') ? (e.text || e.normalized || '') : String(e || '');
    return s.replace(/[.,;:!?·—'··]+$/g, '').trim();
}

/* ══════════════════════════════════════════
   Semantic layer data — LN / Cluster / Lexicon / Domain Labels
   ══════════════════════════════════════════ */
let _lexiconData           = null;
let _lnIndexData           = null;
let _clusterIndexData      = null;
let _compositionData       = null;
let _semanticDomainLabels  = null;
let _lexiconLoading        = false;

async function _ensureSemanticData() {
    if (_lexiconData && _lnIndexData && _clusterIndexData && _compositionData && _semanticDomainLabels) return;
    if (_lexiconLoading) {
        await new Promise(res => {
            const t = setInterval(() => {
                if (_lexiconData && _lnIndexData && _clusterIndexData && _compositionData && _semanticDomainLabels) { clearInterval(t); res(); }
            }, 60);
        });
        return;
    }
    _lexiconLoading = true;
    try {
        const [lexRes, lnRes, clRes, compRes, sdlRes] = await Promise.all([
            fetch('../assets/data/lexicon/lexicon-lite.json'),
            fetch('../assets/data/index/domains-ln-index.json'),
            fetch('../assets/data/index/domains-cluster-index.json'),
            fetch('../assets/data/lexicon/lexicon-composition.json'),
            fetch('../assets/data/index/semantic-domain-labels.json'),
        ]);
        _lexiconData          = lexRes.ok   ? await lexRes.json()   : {};
        _lnIndexData          = lnRes.ok    ? await lnRes.json()    : {};
        _clusterIndexData     = clRes.ok    ? await clRes.json()    : {};
        _compositionData      = compRes.ok  ? await compRes.json()  : {};
        _semanticDomainLabels = sdlRes.ok   ? await sdlRes.json()   : {};
    } catch(e) {
        console.warn('[SemanticData] load failed:', e);
        _lexiconData = _lnIndexData = _clusterIndexData = _compositionData = {};
        _semanticDomainLabels = {};
    }
}

/* lexicon エントリの表示文字列を解決する唯一の関数。
   優先順位: gloss_ja（日本語）→ headword（正規表記）→ lexemeId（最終保証）
   UI はこの関数のみを経由し、直接の条件分岐・フォールバック記述は禁止。 */
function resolveDisplay(entry, lexemeId) {
    return (entry && entry.gloss_ja) || (entry && entry.headword) || lexemeId;
}

/* lemmaId に対応する語構成要素配列を返す。
   @returns {Array<{lexemeId:string}>|null}
   各要素は lexemeId（lexicon の主キー）のみを持つ。文字列一致は使用しない。 */
function getWordComposition(lemmaId) {
    if (!_compositionData || !lemmaId) return null;
    const entry = _compositionData[lemmaId];
    if (entry === null) return null;          // 明示的な単純語マーカー
    if (!entry) return null;                  // エントリなし（未整備）
    return Array.isArray(entry.components) && entry.components.length > 0
        ? entry.components
        : null;
}

/* 語源パーツ HTML を生成（日本語表示・クリック可能）
   parts: Array<{lexemeId:string}>
   UI の責務: lexicon 参照 → resolveDisplay 呼び出し → 描画。ロジックは持たない。 */
function _buildEtymPartsHTML(parts) {
    return parts.map(({ lexemeId }) => {
        const entry   = _lexiconData?.[lexemeId];
        const display = resolveDisplay(entry, lexemeId);
        return `<span class="rn-etym-part" data-lexeme-id="${_escH(lexemeId)}">${_escH(display)}</span>`;
    }).join('<span class="rn-etym-sep"> ＋ </span>');
}

/* Abbott-Smith ポップアップを開く。
   lexemeId で _lexiconData を直接引く。headword 文字列検索は行わない。 */
function _openEtymPopup(lexemeId) {
    const entry = _lexiconData?.[lexemeId];
    const form  = entry?.headword || '';
    const gloss = entry?.gloss_ja || '';
    let   desc  = entry?.abbottSmith || '';
    if (!desc && lexemeId) {
        const digits = lexemeId.replace(/^grc:G/i, '');
        desc = abbottSmithDict?.[digits]?.description || '';
    }
    const bd = document.getElementById('rn-etym-backdrop');
    if (!bd) return;
    document.getElementById('rn-etym-modal-gr').textContent = form;
    document.getElementById('rn-etym-modal-ja').textContent = gloss;
    const bodyEl = document.getElementById('rn-etym-modal-body');
    bodyEl.innerHTML = desc
        ? `<div class="rn-etym-as-label">Abbott-Smith</div>${_escH(desc).replace(/\n/g, '<br>')}`
        : '<span class="rn-etym-empty">Abbott-Smithデータなし</span>';
    bd.classList.add('open');
}

function _resolveLemmaId(strong) {
    const normStrong = normalizeStrong(strong);
    const candidate = 'grc:' + normStrong;
    return (_lexiconData && _lexiconData[candidate]) ? candidate : null;
}

/**
 * Strong番号を正規化して "G\d+" 形式に統一する。
 *   "3972"  → "G3972"
 *   "g3972" → "G3972"
 *   "G3972" → "G3972"
 * 数字部分が取れない場合は空文字を返す。
 */
function normalizeStrong(value) {
    const digits = String(value || '').replace(/[^0-9]/g, '');
    return digits ? 'G' + digits : '';
}

/* ══════════════════════════════════════════
   翻訳マスター定義（TDZ対策：先頭で宣言）
   ══════════════════════════════════════════ */
const TRANSLATIONS = {
    'JA1955': { label: '口語訳（1955）',     code: 'JA1955' },
    'BUN':    { label: '文語訳',             code: 'BUN'    },
/*  'KAI17':  { label: '新改訳2017',         code: 'KAI17'  },
    'KYO':    { label: '聖書協会共同訳',     code: 'KYO'    },*/
    'FLOW':   { label: '読解フロー',         code: 'FLOW'   },
};
const TRANS_LIST   = Object.entries(TRANSLATIONS).map(([id, t]) => ({ id, name: t.label, code: t.code }));
const TRANS_LABELS = Object.fromEntries(Object.entries(TRANSLATIONS).map(([id, t]) => [id, t.label]));

/* アクティブ翻訳（A = メイン / B = 比較列） */
let currentTranslation  = 'JA1955';
let currentTranslationB = 'BUN';

/* _transA / _transB は currentTranslation* と同期して動かす（後方互換エイリアス） */
let _transMode   = 'single';
let _transA      = currentTranslation;
let _transB      = currentTranslationB;
let _rightMode   = 'trans'; // 'trans' | 'flow'
let _cachedElByVerse = {};
let _cachedJpDataB   = null;
    
/* ══════════════════════════════════════════
   AppState - UI状態の一元管理
   ══════════════════════════════════════════
   設計方針:
     - グローバル状態はすべてここに集約する
     - DOM操作（display切替など）はこのオブジェクトに触れない
       → 実際のDOM操作は各関数が行う
     - 状態を「読む」ことで現在モードを判定できる
     - scroll位置は「Reading に戻る」ときに復元する

   状態遷移:
     reading  → 節クリック  → browsing
     browsing → 語カードクリック → popover表示（modeは browsing のまま）
     browsing → 「詳しく見る」 → study
     study    → 「テキストに戻る」 → reading（scroll復元）
     study    → 「分析に戻る」 → study（params保持・tab記憶）
   ══════════════════════════════════════════ */
const AppState = {
    /* 現在のモード: 'reading' | 'browsing' | 'study' */
    mode: 'reading',

    /* 選択中の節 */
    selectedVerse: {
        vNum:     null,   /* string: 節番号 e.g. "3" */
        elWords:  [],     /* Array: 節内の語形データ */
    },

    /* Inspect スナップショット（選択中の語） */
    inspect: {
        data: null,       /* { greek, strong, jpMorph, rawMorph, lemma, jaWord, desc, ref } */
    },

    /* Study 情報（タブ・params）*/
    study: {
        params: null,     /* _currentAnalysisParams と同内容 */
        tab:    'flow',   /* 最後に表示していたタブ。Study閉じても保持。 */
    },

    /* 空間階層（聖書全体の"場所"） */
    location: {
        testament: null,  /* 'nt' | 'ot' */
        book:      null,  /* e.g. { key:'1CO', name:'コリント人への手紙 第一', ch:16 } */
        chapter:   null,  /* number */
    },

    /* 読書深度スタック */
    depth: {
        stack: [],        /* [ { type, label, verse?, strong? }, ... ] */
    },

    /* 本文スクロール位置（Study閉じたとき復元する） */
    scrollTop: 0,

    /* UI状態（ヘッダー/パンくず/サイドバーの選択表示の唯一のソース）。
       'bible' | 'bookmarks' | 'notes' | 'recentVerses' | 'recentWords' | 'sourcePolicy' | 'knowledge' | 'roadmap' | 'changelog' */
    ui: {
        view: 'bible',
    },

    /* ── ヘルパー ── */

    /* Reading 状態にリセット（scroll保持・study.tab保持） */
    toReading() {
        this.mode = 'reading';
        this.selectedVerse = { vNum: null, elWords: [] };
        this.inspect.data  = null;
        /* study.params / study.tab はあえて保持する（再開ボタンのため） */
    },

    /* Browsing 状態に移行（節選択後） */
    toBrowsing(vNum, elWords) {
        this.mode = 'browsing';
        this.selectedVerse = { vNum, elWords: elWords || [] };
        this.inspect.data  = null;

        /* 読書位置（節）の永続化：selectedVerse が確定する唯一の地点（SSOT）。
           ref・構造化フィールドはすべて AppState.location / vNum から組み立てる（ref パース禁止のSSOT原則） */
        if (window.App.storage) {
            const bookKey = this.location.book ? this.location.book.key : '';
            const ch = this.location.chapter != null ? this.location.chapter : '';
            if (bookKey && ch !== '' && vNum != null) {
                window.App.storage.addRecentVerse({
                    ref: `${bookKey} ${ch}:${vNum}`,
                    bookKey: bookKey,
                    chapter: ch,
                    verse: Number(vNum),
                });
            }
        }
    },

    /* Study 状態に移行 */
    toStudy(params, tab) {
        this.mode = 'study';
        this.study.params = params;
        if (tab) this.study.tab = tab;
    },

    /* スクロール位置を保存 */
    saveScroll() {
        const el = document.getElementById('main-reading-area');
        if (el) this.scrollTop = el.scrollTop;
    },

/* スクロール位置を復元 */
    restoreScroll() {
        const el = document.getElementById('main-reading-area');
        if (el) el.scrollTop = this.scrollTop;
    },

    /* Study が再開できる状態か */
    canReopen() {
        return !!(this.study.params);
    },

    /* depth stack に追加 */
    pushDepth(entry) {
        this.depth.stack.push(entry);
    },

    /* depth stack をクリア */
    clearDepth() {
        this.depth.stack = [];
    },
};

/* ══════════════════════════════════════════
   URL共有機能: ShareURLService / Router / getShareState / applyShareState
   責務分離:
     ShareURLService.generate … state → URL（唯一の生成箇所）
     Router.parse             … URL → state（唯一の解析箇所、副作用なし）
     getShareState            … 現在のAppState → state（URL生成時は必ずここを経由）
     applyShareState          … state → UI反映（URL/Routerを参照しない）
   ══════════════════════════════════════════ */
const ShareURLService = {
    generate(state) {
        const url = new URL(window.location.href);
        url.search = '';
        if (state.book)    url.searchParams.set('book', state.book);
        if (state.chapter) url.searchParams.set('ch', state.chapter);
        if (state.verse)   url.searchParams.set('verse', state.verse);
        if (state.panel)   url.searchParams.set('panel', state.panel);
        if (state.word)    url.searchParams.set('word', state.word);
        if (state.transA)  url.searchParams.set('transA', state.transA);
        if (state.transB)  url.searchParams.set('transB', state.transB);
        if (state.mode)    url.searchParams.set('mode', state.mode);
        return url;
    }
};

const Router = {
    parse(location = window.location) {
        const p = new URLSearchParams(location.search);
        return {
            book: p.get('book'),
            chapter: p.get('ch'),
            verse: p.get('verse'),
            panel: p.get('panel'),
            word: p.get('word'),
            transA: p.get('transA'),
            transB: p.get('transB'),
            mode: p.get('mode')
        };
    }
};

function getShareState() {
    const panelOpen = AppState.depth?.stack?.length > 0;

    return {
        book: AppState.location?.book?.key || '',
        chapter: AppState.location?.chapter || '',
        verse: AppState.selectedVerse?.vNum || '',
        panel: panelOpen ? 'study' : '',
        word: (panelOpen && AppState.inspect?.data?.strong)
            ? String(AppState.inspect.data.strong).replace(/^G/, '')
            : '',
        transA: typeof _transA !== 'undefined' ? _transA : '',
        transB: typeof _transB !== 'undefined' ? _transB : '',
        mode: typeof _transMode !== 'undefined' ? _transMode : ''
    };
}

/* onboarding（初回デモ）実行中はURL同期を止めるためのフラグ。
   onboarding.js 自体は変更しないため、index.html 側の既存onboardingフック
   呼び出し箇所（_syncOnboardingActiveFlag 参照）から getState().onboardingComplete
   の「状態遷移（false→true）」を検知して更新する。 */
window.__onboardingActive = false;
window.__onboardingPrevState = null;

/* 前回値との比較による遷移検知。false→trueのエッジを検知した瞬間にのみ
   onboardingActiveをfalseへ戻し、最終状態を1回だけURLに反映する。 */
function _syncOnboardingActiveFlag() {
    if (!window.App.onboarding) return;
    const current = window.App?.onboarding?.getState?.()?.onboardingComplete;

    if (window.__onboardingPrevState === null) {
        window.__onboardingPrevState = current;
        window.__onboardingActive = !current;
        return;
    }

    if (window.__onboardingPrevState !== current) {
        window.__onboardingPrevState = current;

        if (current === true) {
            window.__onboardingActive = false;

            // onboarding完了直後に必ず1回URL同期
            syncUrlState();
        } else {
            window.__onboardingActive = true;
        }
    }
}

function syncUrlState() {
    if (window.__onboardingActive) return;

    const url = ShareURLService.generate(getShareState());
    history.replaceState(null, '', url);
}

function notifyAppStateChange() {
    syncUrlState();
}

/* 現在表示中のURLをそのままクリップボードへコピーする（URL生成ロジックは呼ばない）。 */
async function copyShareUrl() {
    const url = location.href;
    try {
        await navigator.clipboard.writeText(url);
        _showShareToast();
    } catch (e) {
        try {
            const ta = document.createElement('textarea');
            ta.value = url;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            _showShareToast();
        } catch (e2) {
            console.warn('copyShareUrl: コピーに失敗しました', e2);
        }
    }
}
function _showShareToast() {
    const t = document.getElementById('share-toast');
    if (!t) return;
    t.textContent = 'URLをコピーしました';
    t.classList.add('visible');
    clearTimeout(t._hideTimer);
    t._hideTimer = setTimeout(() => t.classList.remove('visible'), 2000);
}

/* 現在開いている節の ref を構造フィールド（bookKey/ch/verse）から組み立てる（ref パース禁止のSSOT原則に従う） */
function _currentVerseRef() {
    const bookKey = AppState.location.book ? AppState.location.book.key : '';
    const ch = AppState.location.chapter != null ? AppState.location.chapter : '';
    const vNum = AppState.selectedVerse.vNum;
    if (!bookKey || ch === '' || vNum == null) return null;
    return `${bookKey} ${ch}:${vNum}`;
}

/* StudyPanel内の☆ボタン：未保存→addBookmark、保存済み→removeBookmark（toggle）
   構造化フィールドは AppState.location / AppState.selectedVerse から直接組み立てる（ref パース禁止） */
function toggleBookmark() {
    if (!window.App.storage) return;
    const ref = _currentVerseRef();
    if (!ref) return;
    const saved = window.App.storage.getBookmarks().some(b => b.ref === ref);
    if (saved) {
        window.App.storage.removeBookmark(ref);
    } else {
        const bookKey = AppState.location.book ? AppState.location.book.key : '';
        const chapter = AppState.location.chapter != null ? AppState.location.chapter : null;
        const verse = AppState.selectedVerse.vNum != null ? Number(AppState.selectedVerse.vNum) : null;
        window.App.storage.addBookmark({ ref, bookKey, chapter, verse });
    }
    _syncBookmarkButtons(ref);
}

/* ブックマークボタンの見た目を現在の保存状態に同期する（SVGの塗りつぶしで表現） */
function _syncBookmarkButtons(ref) {
    if (!window.App.storage) return;
    const r = ref || _currentVerseRef();
    const saved = !!(r && window.App.storage.getBookmarks().some(b => b.ref === r));
    document.querySelectorAll('.bookmark-btn').forEach(btn => {
        btn.classList.toggle('is-saved', saved);
    });
}

/* 📝ボタン：開いている方のメモブロック（'wlv'=節一覧 / 'rn'=深く読む。同時に存在するのは
   片方のみ）を開閉する。読書の主役は本文なので、メモは既定では折りたたんでおき、
   ここでのクリック時のみ展開する。 */
function _toggleNoteUI() {
    const block = document.getElementById('reading-note-block-wlv') || document.getElementById('reading-note-block-rn');
    if (!block) return;
    block.style.display = (block.style.display === 'block') ? 'none' : 'block';
}

/* メモボタンの見た目を保存済みメモの有無に同期する（アイコン横の小ドットで表現） */
function _syncNoteButtons(ref) {
    if (!window.App.storage) return;
    const r = ref || _currentVerseRef();
    const existing = r ? window.App.storage.getNotes().find(n => n.ref === r) : null;
    const hasNote = !!(existing && existing.content && existing.content.trim().length > 0);
    document.querySelectorAll('.note-btn').forEach(btn => {
        btn.classList.toggle('has-note', hasNote);
    });
}

/* 節ごとのメモ（1節=1メモ）UI。Study Panelには「節一覧」（#word-list-view）と
   「語の詳しく見る」（#reading-notes-area）の2つの表示モードがあり、それぞれ
   innerHTMLを丸ごと書き換えるため、メモブロックはそのどちらの管理下にも置かず、
   idSuffixで区別した独立要素として追記する（既存UIには一切触れない）。
   保存は保存ボタン押下時のみ。自動保存・input/blur保存は行わない。 */
function _noteBlockHtml(idSuffix) {
    return `
        <div id="reading-note-block-${idSuffix}" style="display:none;padding: var(--space-md) var(--space-lg) var(--space-lg);border-top:1px solid var(--border-soft);">
            <h3 style="font-size: var(--text-caption);font-weight:700;color:var(--text-main);margin: 0 0 var(--space-sm);">メモ</h3>
            <textarea id="reading-note-textarea-${idSuffix}" style="width:100%;min-height:90px;padding: var(--space-sm);font-family:inherit;font-size: var(--text-body);color:var(--text-main);border:1px solid var(--border-soft);border-radius: var(--radius-s);resize:vertical;box-sizing:border-box;"></textarea>
            <button class="rn-save-btn" style="margin-top: var(--space-sm);" onclick="_saveCurrentNote('${idSuffix}')">保存</button>
            <span id="reading-note-status-${idSuffix}" style="display:block;margin-top: var(--space-xs);font-size: var(--text-caption);color:var(--text-sub);"></span>
        </div>`;
}

/* 現在の節のrefに紐づくメモを textarea へ読み込む（既存の getNotes() のみ使用）。
   メモは読書の主役ではないため、節を開いた直後は常に折りたたんだ状態にする
   （📝ボタンで _toggleNoteUI() から展開する）。 */
function _loadNoteUI(idSuffix) {
    const block = document.getElementById('reading-note-block-' + idSuffix);
    const textarea = document.getElementById('reading-note-textarea-' + idSuffix);
    const statusEl = document.getElementById('reading-note-status-' + idSuffix);
    if (!block || !textarea) return;
    if (statusEl) statusEl.textContent = '';
    block.style.display = 'none';

    const ref = _currentVerseRef();
    if (!ref || !window.App.storage) {
        textarea.value = '';
        _syncNoteButtons(ref);
        return;
    }
    const notes = window.App.storage.getNotes();
    const existing = notes.find(n => n.ref === ref);
    textarea.value = existing ? existing.content : '';
    _syncNoteButtons(ref);
}

/* 保存ボタン押下時のみ呼ばれる。saveNote(ref, content) のみ使用、localStorage直接アクセスなし。 */
function _saveCurrentNote(idSuffix) {
    const statusEl = document.getElementById('reading-note-status-' + idSuffix);
    const ref = _currentVerseRef();
    if (!ref || !window.App.storage) {
        if (statusEl) statusEl.textContent = '保存できませんでした';
        return;
    }
    /* 構造化フィールドは AppState.location / AppState.selectedVerse から直接組み立てる（ref パース禁止） */
    const bookKey = AppState.location.book ? AppState.location.book.key : '';
    const chapter = AppState.location.chapter != null ? AppState.location.chapter : null;
    const verse = AppState.selectedVerse.vNum != null ? Number(AppState.selectedVerse.vNum) : null;
    const textarea = document.getElementById('reading-note-textarea-' + idSuffix);
    const ok = window.App.storage.saveNote(ref, textarea ? textarea.value : '', bookKey, chapter, verse);
    if (statusEl) statusEl.textContent = ok ? '保存しました' : '保存できませんでした';
    _syncNoteButtons(ref);
}

function applyShareState(state) {
    if (!state.verse) return;   /* verse なし → 従来どおり章の先頭表示 */

    /* 1. verse復元 = 「本文をタップした場合と同じコードパス」に委譲する。
       可視の節ブロック（左カラム。旧実装の [data-vnum] は非表示の右カラム
       しか拾えなかった）を _findVisibleVerseBlock で特定し、その onclick を
       そのまま実行する。selected クラス・active-v 表示・AppState.toBrowsing・
       StudyPanel オープン・notifyAppStateChange（URL書き戻し）のすべてが
       通常の節タップ処理側で行われる — 検索専用の状態・分岐は持たない。
       スクロールは節を中央へ置き、パネル表示後の重なりは既存の
       _adjustReadingAreaForPanel（openStudyPanel 系の通常処理）が最小調整する。 */
    const words = _cachedElByVerse[state.verse] || [];
    const target = _findVisibleVerseBlock(state.verse);

    if (!target) {
        console.warn('applyShareState: verse not found:', state.verse);
        return;
    }

    target.scrollIntoView({ block: 'center' });

    if (typeof target.onclick === 'function') {
        target.click();   /* ← ユーザーの節タップと同一経路 */

        /* 位置の微調整: パネルが開いた後、節を「パネル上端より上の可視領域」の
           中央へ置き、節と StudyPanel を同時に読める位置にする。調整後の位置を
           既存の AppState.saveScroll() で保存し直すことで、パネルを閉じた時も
           この読書位置へ戻る（既存のスクロール復元機構をそのまま利用）。 */
        requestAnimationFrame(() => {
            const area  = document.getElementById('main-reading-area');
            const panel = document.getElementById('bottom-depth-panel');
            if (!area || !panel) return;
            const aRect = area.getBoundingClientRect();
            const vRect = target.getBoundingClientRect();
            /* パネルはスライドイン中（transform 遷移）で getBoundingClientRect が
               まだ画面外を指すため、transform の影響を受けない offsetHeight から
               最終位置（ビューポート下端 − パネル高さ）を計算する */
            const visibleBottom = panel.classList.contains('open')
                ? Math.max(aRect.top + 40, window.innerHeight - panel.offsetHeight)
                : aRect.bottom;
            const desiredCenter = (aRect.top + visibleBottom) / 2;
            const delta = (vRect.top + vRect.height / 2) - desiredCenter;
            if (Math.abs(delta) > 1) area.scrollTop += delta;
            AppState.saveScroll();
        });
    } else {
        /* ギリシャ語データの無い本文などタップ不可の節: 従来どおり選択状態のみ
           復元する（タップしても何も起きない節でパネルを無理に開かない） */
        AppState.toBrowsing(state.verse, words);
        notifyAppStateChange();
        return;
    }

    /* 2. word復元（StudyPanel描画後に1フレーム遅延・従来どおり panel=study 時のみ）
       注: StudyPanelの語一覧は .word-card ではなく .wlv-chip（data-idx属性）で
       構成されている（実機検証で確認済み）。既存の _wlvChipClick / _wlvStudyBtnClick
       経路（「詳しく見る」ボタンと同じ処理）を再利用する。 */
    if (state.panel !== 'study' || !state.word) return;
    requestAnimationFrame(() => {
        const idx = words.findIndex(w => normalizeStrong(w.strong) === 'G' + state.word);
        if (idx === -1) {
            console.warn('applyShareState: word not found:', state.word);
            return;
        }
        const chipEl = document.querySelector('#word-list-view .wlv-chip[data-idx="' + idx + '"]');
        if (!chipEl) {
            console.warn('applyShareState: word chip not found:', state.word);
            return;
        }
        _wlvChipClick(chipEl, idx);
        _wlvStudyBtnClick();
    });
}

/* ══════════════════════════════════════════
   グローバル breadcrumb（空間ナビゲーション）
   ══════════════════════════════════════════ */
function renderGlobalBreadcrumb() {
    const el = document.getElementById('global-breadcrumb');
    if (!el) return;

    const loc = AppState.location;
    if (!loc.testament) {
        el.innerHTML = '<span class="gbc-item current" style="font-family:\'Noto Serif JP\',serif;">聖書</span>';
        return;
    }

    const testamentLabel = loc.testament === 'nt' ? '新約聖書' : '旧約聖書';
    const items = [];

    /* 聖書全体（testament）- クリックで書物一覧へ */
    items.push(`<button class="gbc-item" onclick="_gbcGoTestament()">${testamentLabel}</button>`);

    if (loc.book) {
        items.push(`<span class="gbc-sep">›</span>`);
        /* 書物 - クリックで章一覧へ（BOOK_SHORT 経由の略称を使用） */
        items.push(`<button class="gbc-item" onclick="_gbcGoBook()">${_bookShortTitle(loc.book)}</button>`);
    }

    if (loc.chapter !== null) {
        const _maxCh = loc.book ? loc.book.ch : 1;
        const _ch    = loc.chapter;
        items.push(`<span class="gbc-sep">›</span>`);
        /* 章 - 左右矢印で前後章へ、中央クリックで現在章を再表示 */
        items.push(
            `<span class="gbc-item current gbc-chapter-nav">` +
            `<button class="gbc-ch-arrow" onclick="event.stopPropagation();_gbcPrevChapter()" aria-label="前の章"${_ch <= 1 ? ' disabled' : ''}>◀</button>` +
            `<button class="gbc-ch-label" onclick="_gbcGoChapter()">${_ch}章</button>` +
            `<button class="gbc-ch-arrow" onclick="event.stopPropagation();_gbcNextChapter()" aria-label="次の章"${_ch >= _maxCh ? ' disabled' : ''}>▶</button>` +
            `</span>`
        );
    }

    el.innerHTML = items.join('');
}

function _gbcGoTestament() {
    const loc = AppState.location;
    if (loc && loc.testament) sbSection = loc.testament;
    if (!_isSidebarOpen()) _openSidebar();
    sbGoTo(1, sbSection);
    AppState.clearDepth();
    renderDepthHistory();
}

function _gbcGoBook() {
    const loc = AppState.location;
    if (loc && loc.book) {
        const inNt = SB_BOOKS.nt.some(b => b.key === loc.book.key);
        sbSection  = inNt ? 'nt' : 'ot';
        sbBookKey  = loc.book.key;
        sbBookName = loc.book.name;
        sbMaxCh    = loc.book.ch;
    }
    if (!_isSidebarOpen()) _openSidebar();
    sbGoTo(2);
    AppState.clearDepth();
    renderDepthHistory();
}

/* ══════════════════════════════════════════
   UI同期: AppState.ui.view を唯一のソースとして
   ヘッダー（document.title）/ パンくず（#global-breadcrumb）/
   サイドバーの選択状態（ツール・履歴の active クラス）をまとめて再描画する。
   showBookmarks() などの各ビュー関数は AppState.ui.view を設定して
   syncUIFromState() を呼ぶだけにし、ヘッダーやパンくずを個別にDOM操作しない。
   ══════════════════════════════════════════ */
const VIEW_LABELS = {
    bookmarks:    'ブックマーク',
    notes:        'メモ',
    notesTrash:   'メモのゴミ箱',
    recentVerses: '最近読んだ箇所',
    recentWords:  '最近見た単語',
    sourcePolicy: '出典・ポリシー',
    knowledge:    'まめ知識',
    changelog:    '更新情報',
};

const SIDEBAR_VIEW_NAV_IDS = {
    bookmarks:    'nav-bookmarks',
    notes:        'nav-notes',
    recentVerses: 'nav-recent-verses',
    recentWords:  'nav-recent-words',
};

/* 書物の短縮名（ウィンドウタブ表示用）。
   優先順位: book.shortTitle（将来 books.json に個別指定が追加された場合の
   フック。現状は全書物未設定で常にフォールバックする）
   → BOOK_SHORT[key]（既存。パンくず・最近見た節/単語・ブックマーク・
   メモ一覧など7箇所以上で既に使われている短縮表記。「出エジプト記」→
   「出エジプト」のように「記」「上/下」等を落とした形。books.json の
   book.name（フルタイトル）自体は変更しない）
   → book.name（既存のBOOK_SHORTに無い場合のみ、フルタイトルそのまま）。 */
function _bookShortTitle(book) {
    if (!book) return '';
    return book.shortTitle || BOOK_SHORT[book.key] || book.name;
}

/* タブ表示用の安全な最終フォールバック（rule③のtruncate相当）。
   現行データでは実際には発動しない長さだが、将来の書物追加・
   表示名変更に備えた保険として残す。 */
function _truncateTabLabel(s, max = 20) {
    if (!s) return s;
    return s.length > max ? s.slice(0, max - 1) + '…' : s;
}

function _bibleHeaderLabel() {
    const loc = AppState.location;
    if (!loc.testament) return '聖書';
    if (!loc.book) return loc.testament === 'nt' ? '新約聖書' : '旧約聖書';
    const shortName = _bookShortTitle(loc.book);
    return loc.chapter != null ? `${shortName} ${loc.chapter}章` : shortName;
}

function updateHeader(view) {
    const label = view === 'bible' ? _bibleHeaderLabel() : (VIEW_LABELS[view] || '');
    const tabLabel = _truncateTabLabel(label, 20);
    document.title = tabLabel ? `${tabLabel}｜聖書アプリ` : '聖書アプリ';
    /* view-title は互換のため維持（該当要素が無い環境でも安全な no-op）。
       将来復活した場合に備え、こちらは短縮前のフルlabelを使う
       （フルタイトルは変更しない、という原則のため）。 */
    const titleEl = document.getElementById('view-title');
    if (titleEl) titleEl.innerText = label;
}

function updateBreadcrumb(view) {
    if (view === 'bible') {
        renderGlobalBreadcrumb();
        return;
    }
    const el = document.getElementById('global-breadcrumb');
    if (!el) return;
    /* 聖書の testament/book/chapter 固定表示を残さない：非bibleビューでは
       現在のビュー名のみを表示する単純なパンくずに切り替える。
       VIEW_LABELS の値はすべて本ファイル内の定数（ユーザー入力やentry.*データではない）。 */
    const label = VIEW_LABELS[view] || '';
    el.innerHTML = `<span class="gbc-item current" style="font-family:'Noto Serif JP',serif;">${label}</span>`;
}

function updateSidebarActive(view) {
    Object.values(SIDEBAR_VIEW_NAV_IDS).forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('active');
    });
    const activeId = SIDEBAR_VIEW_NAV_IDS[view];
    if (activeId) {
        const el = document.getElementById(activeId);
        if (el) el.classList.add('active');
    }
}

function syncUIFromState() {
    updateHeader(AppState.ui.view);
    updateBreadcrumb(AppState.ui.view);
    updateSidebarActive(AppState.ui.view);
}

/* ══════════════════════════════════════════
   ナビゲーションヘルパー
   翻訳選択（transA/transB/mode）を保持したまま遷移する
   ══════════════════════════════════════════ */
function _navTo(book, ch) {
    const p = new URLSearchParams();
    p.set('book', book);
    p.set('ch',   String(ch));
    p.set('transA', _transA);
    p.set('transB', _transB);
    p.set('mode',   _transMode);
    const area = document.getElementById('bible-text-area');
    if (area) area.style.opacity = '0';
    setTimeout(() => { window.location.href = '?' + p.toString(); }, 150);
}

function _gbcGoChapter() {
    /* 現在の章を再表示 */
    if (AppState.location.book && AppState.location.chapter !== null) {
        _navTo(AppState.location.book.key, AppState.location.chapter);
    }
}

function _gbcPrevChapter() {
    const loc = AppState.location;
    if (!loc.book || loc.chapter === null) return;
    const prev = loc.chapter - 1;
    if (prev >= 1) _navTo(loc.book.key, prev);
}

function _gbcNextChapter() {
    const loc = AppState.location;
    if (!loc.book || loc.chapter === null) return;
    const next = loc.chapter + 1;
    if (next <= loc.book.ch) _navTo(loc.book.key, next);
}

/* ══════════════════════════════════════════
   読書深度スタック（読書の潜水履歴）
   ══════════════════════════════════════════ */

/**
 * depth stack にエントリを追加し、履歴を再描画する。
 * @param {Object} entry - { type, label, verse?, strong? }
 */
function pushDepth(entry) {
    AppState.depth.stack.push(entry);
    renderDepthHistory();
}

/**
 * 戻るボタンの表示内容（アイコン＋ラベル）。「履歴のどこへ戻るか」ではなく
 * 「今閉じようとしているレイヤーは何か」を表す。HIGに寄せて、階層を1段
 * 戻る場合はchevron「‹」、Panelそのものを閉じる場合は close「×」を使い分ける。
 * 現在の _panelContentMode（'word' = 単語詳細 / それ以外 = 節Panel）だけを見て、
 * 履歴（depth stack の中身）は一切参照しない。
 * renderDepthHistory() と _mobileOpenPanel() の両方から呼ばれる唯一の定義。
 */
function _panelBackState() {
    return (_panelContentMode === 'word') ? '‹' : '×';
}

/**
 * 戻るボタンのアイコン・ラベルをデスクトップ・モバイル両方に反映する。
 * 表示/非表示の制御は renderDepthHistory() が担う。
 * _panelContentMode だけを参照し、depth stack は一切見ない。
 */
function updatePanelBackButton() {
    const icon = _panelBackState();

    const btnIcon = document.getElementById('panel-back-icon');
    const btn     = document.getElementById('panel-back-btn');
    if (btnIcon) btnIcon.textContent = icon;
    if (btn)     btn.style.display   = 'flex';

    const mobileIcon = document.getElementById('mobile-panel-back-chevron');
    if (mobileIcon) mobileIcon.textContent = icon;
}

/**
 * 戻るボタンの表示/非表示とアイコン・ラベルを再描画する。
 * Level 1（Panel非表示）ではボタンを隠す。Level 2/3 では updatePanelBackButton() に委譲する。
 */
function renderDepthHistory() {
    const btn = document.getElementById('panel-back-btn');
    if (!btn) return;

    const stack = AppState.depth.stack;
    if (stack.length <= 1) {
        btn.style.display = 'none';
        return;
    }

    updatePanelBackButton();
}

/**
 * StudyPanel の戻るボタン（デスクトップ #panel-back-btn / モバイル #mobile-panel-back /
 * モバイルスワイプ _mobileSwipeBack 共通）。
 *
 * 履歴（depth stack）は復元しない。Panelは常に3階層として扱い、現在開いている
 * レイヤーだけを判定して閉じる：
 *   Level 3（単語詳細 / _panelContentMode === 'word'） → Level 2（節Panel）へ戻る
 *   Level 2（節Panel  / _panelContentMode === 'verse'） → Panel自体を閉じる（本文は変更しない）
 * Level 1（Panel非表示）ではボタン自体が表示されないため、本関数は呼ばれない。
 */
function panelGoBack() {
    if (_panelContentMode === 'word') {
        /* Level 3 → Level 2: 単語詳細のみ閉じ、現在の節のPanelへ戻る */
        _openWordListInternal(AppState.selectedVerse.vNum, AppState.selectedVerse.elWords);
        /* #word-list-view は _openWordListInternal() 内で再生成されるため、
           Level 3 へ進む直前に保存しておいたスクロール位置をここで読み戻す。 */
        if (_versePanelScrollTop != null) {
            const listEl = document.getElementById('word-list-view');
            if (listEl) listEl.scrollTop = _versePanelScrollTop;
            _versePanelScrollTop = null;
        }
        renderDepthHistory();
    } else {
        /* Level 2 → Panelを閉じる。本文表示（章/節）は変更しない */
        closeStudyPanel();
    }
}

/* 内部: パネルを閉じてReadingへ（depth stackは変えない） */
function _syncReadingPanelPadding() {
    /* 全画面モードではパネルが背面を覆うため padding 補正は不要 */
    if (window.innerWidth <= 768) return;
    const area  = document.getElementById('main-reading-area');
    const panel = document.getElementById('bottom-depth-panel');
    if (!area || !panel) return;
    area.style.paddingBottom = panel.classList.contains('open') ? panel.offsetHeight + 'px' : '';
}

function _closeStudyPanelInternal() {
    const sidePanel    = document.getElementById('bottom-depth-panel');
    sidePanel.classList.remove('open');
    _syncReadingPanelPadding();

    const notesWrap = document.getElementById('reading-notes-wrap');
    /* close直前にスクロール位置を StudyPanelState へ保存（open後の2段rAFで復元する） */
    if (notesWrap) StudyPanelState.scrollTop = notesWrap.scrollTop;
    /* display:none で隠す。innerHTML破棄は禁止（DOMを維持して次のopenで位置を復元する） */
    if (notesWrap) { notesWrap.style.display = 'none'; }
    const notesArea = document.getElementById('reading-notes-area');
    /* クラスのみリセット。innerHTML = '' は禁止（_renderReadingNotes が全量置換するため不要） */
    if (notesArea) { notesArea.classList.remove('reading-deep-active'); }

    StudyPanelState.isOpen = false;

    document.getElementById('open-panel-btn').style.display =
        AppState.canReopen() ? 'block' : 'none';

    const rcb = document.getElementById('rcb-container');
    if (rcb) rcb.classList.remove('visible');

    const listEl = document.getElementById('word-list-view');
    if (listEl) listEl.remove();

    document.querySelectorAll('.verse-block').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('.verse-pair-right').forEach(b => b.classList.remove('selected'));
    document.getElementById('active-v').innerText = '';

    document.getElementById('app').classList.remove('mobile-study-open');

    const panelEl = document.getElementById('bottom-depth-panel');
    if (panelEl) {
        panelEl.style.transform = '';
        panelEl.style.transition = '';
        /* inline height は消すが、ユーザー調整高さは StudyPanelState.height（SSOT）に
           保持されており、次回 open 時に _applyPanelHeightFromState() が復元する */
        panelEl.style.height = '';
    }

    if (window.App.onboarding) window.App.onboarding.onStudyPanelClosed();
    AppState.toReading();
    AppState.restoreScroll();
}

/* ── モバイル専用：フルスクリーン切り替えヘルパー ── */
function _isMobile() {
    return window.innerWidth <= 900;
}

/* Study Panel（Bottom Sheet）の現在のコンテンツ種別。ドラッグ時の拡張上限を決めるためだけに使う。
   'verse' = 節全体の研究モード（_openWordListInternal）→ 拡張上限 --panel-expanded-h
   'word'  = 単語詳細（openStudyPanel）                  → 拡張上限 --panel-word-max-h */
let _panelContentMode = 'verse';

/* ── Panel Geometry SSOT ──
   高さの数値定義は CSS（#bottom-depth-panel のカスタムプロパティ）が唯一の真実。
   JS は本関数で getComputedStyle から読むだけで、vh/px の値を直接書かない。
   ドラッグ・高さ復元の clamp（min/max）はすべてここを通す。 */
function _panelGeomLimits(panel) {
    const cs = getComputedStyle(panel);
    const px = (v) => {
        v = String(v).trim();
        if (v.endsWith('vh')) return window.innerHeight * parseFloat(v) / 100;
        return parseFloat(v) || 0;
    };
    const maxProp = _panelContentMode === 'word'
        ? '--panel-word-max-h' : '--panel-expanded-h';
    return {
        minH: px(cs.getPropertyValue('--panel-drag-min-h')),
        maxH: px(cs.getPropertyValue(maxProp)),
    };
}

/* Level 2（節Panel）→ Level 3（単語詳細）へ進む直前の #word-list-view のスクロール位置。
   #word-list-view は Level 3 に入ると破棄されるため、panelGoBack() で Level 2 に
   戻った際にここへ保存しておいた値を読み戻すことでスクロール位置を復元する。
   null は「復元すべき位置が無い」を意味する（新しい節を開いた場合等）。 */
let _versePanelScrollTop = null;

/* StudyPanel UI状態の一元管理オブジェクト。
   UIロジック（open/close/drag）はこのオブジェクトを通じて状態を読み書きし、
   DOM状態・AppState・スクロール位置と混在させない。
   scrollTop: close直前に保存し、次のopen後に2段rAFで復元する。
   isDragging: pointer capture 中のみ true。pointerup/cancel で必ず false に戻す。 */
const StudyPanelState = {
    isOpen:    false,
    height:    0,   /* ユーザーが調整したパネル高さ（px）。0 = 未調整（CSS既定）。SSOT */
    scrollTop: 0,
    isDragging: false,
};

/* StudyPanelState.height（SSOT）を open 時にパネルへ適用する。
   - 0（未調整）なら inline height を消して CSS 既定に任せる
   - ≤768px は全画面モード（CSS top/bottom 管理）のため height を書かない
   - 適用時のみ現在の帯域の min/max へ clamp する（state の値は上書きしない —
     Level 3 の上限 80vh で縮んでも、Level 2 へ戻れば元の高さに復元される） */
function _applyPanelHeightFromState(panel) {
    if (!panel) return;
    if (window.innerWidth <= 768) { panel.style.height = ''; return; }
    const h = StudyPanelState.height;
    if (!h) { panel.style.height = ''; return; }
    const isMobile = _isMobile();
    const { minH, maxH } = _panelGeomLimits(panel);   /* Geometry SSOT（CSS）から取得 */
    const nh = Math.min(maxH, Math.max(minH, h));
    if (isMobile) panel.style.setProperty('height', nh + 'px', 'important');
    else panel.style.height = nh + 'px';
}

/* 本文（左カラム）の節要素を節番号から特定する。
   注意：左カラムの .verse-block には data-vnum 属性が付与されない（data-vnumがあるのは
   並列訳の右カラム .verse-pair-right のみで、しかも単一表示モードでは display:none）。
   そのため節番号は描画済みの .v-num のテキストで照合する（ref文字列の解析は行わない）。 */
function _findVisibleVerseBlock(vNum) {
    if (vNum == null) return null;
    const target = String(vNum);
    const blocks = document.querySelectorAll('#bible-text-area .verse-block:not(.verse-pair-right)');
    for (const b of blocks) {
        const numEl = b.querySelector('.v-num');
        if (numEl && numEl.textContent.trim() === target) return b;
    }
    return null;
}

/**
 * StudyPanel を開いた直後に呼ぶ。
 * 選択節の底辺が読書エリアの底辺より下にある場合のみ、差分だけ scrollBy する（最小限）。
 * scrollIntoView 禁止 / 固定px禁止 / wasOpen=true（Level間遷移）では何もしない。
 * ※ モバイルでの読書エリア収縮（padding でなく flex-basis の高さ計算）は CSS 側が担う。
 */
function _adjustReadingAreaForPanel(wasOpen) {
    if (wasOpen) return;
    /* 全画面モードではパネルが画面全体を覆うため位置調整不要 */
    if (window.innerWidth <= 768) return;

    const mainArea = document.getElementById('main-reading-area');
    if (!mainArea) return;

    /* 選択節が読書エリアの可視底辺を超えている場合のみ最小限スクロール。
       モバイル・デスクトップ共に containerRect.bottom = 読書エリアの実効下端（パネル補正不要）。 */
    const vNum    = AppState.selectedVerse?.vNum ?? AppState.inspect.data?.verse;
    const verseEl = _findVisibleVerseBlock(vNum);
    if (!verseEl) return;

    const containerRect   = mainArea.getBoundingClientRect();
    const verseBottom     = verseEl.getBoundingClientRect().bottom;

    if (verseBottom > containerRect.bottom) {
        const MARGIN = 16;
        mainArea.scrollBy({ top: verseBottom - containerRect.bottom + MARGIN, behavior: 'smooth' });
    }
}

/* Study Panel を開くとき、モバイルではBottom Sheetのスライドイン遷移を起動 */
function _mobileOpenPanel(titleText, wasAlreadyOpen) {
    if (_isMobile()) {
        document.getElementById('app').classList.add('mobile-study-open');
        const navTitle = document.getElementById('mobile-nav-title');
        if (navTitle) navTitle.textContent = titleText || '語を読む';
    }
    /* 768px以下：CSS の top/bottom が環境によって効かない場合に備え
       window.innerHeight で高さを確定する（dvh/auto の非依存フォールバック） */
    if (window.innerWidth <= 768) {
        const panel = document.getElementById('bottom-depth-panel');
        if (panel) panel.style.height = window.innerHeight + 'px';
    }
}

/* 内部: 語形一覧を開く（depth stackは変えない） */
function _openWordListInternal(vNum, words) {
    closeMobileSidebar();
    _wlvWordCache = words || [];
    const sidePanel    = document.getElementById('bottom-depth-panel');
    const wasOpen = sidePanel.classList.contains('open');
    /* 読書位置の保存: 閉→開の遷移時のみ。close 時の AppState.restoreScroll() は
       ここで保存した位置へ戻す。保存しないと初期値 0（＝最上部）や古い位置が
       復元されてしまう。Level間遷移（wasOpen=true）では保存しない —
       「パネルを開く前の位置」を上書きしないため。 */
    if (!wasOpen) AppState.saveScroll();
    _panelContentMode = 'verse';
    /* 高さの SSOT: ユーザーが調整した高さ（StudyPanelState.height）を尊重する。
       未調整なら CSS 既定。従来の style.height='' 一律リセットは廃止 */
    _applyPanelHeightFromState(sidePanel);
    sidePanel.classList.add('open');
    _syncReadingPanelPadding();
    document.getElementById('open-panel-btn').style.display = 'none';

    const notesWrap = document.getElementById('reading-notes-wrap');
    if (notesWrap) notesWrap.style.display = 'none';
    /* notesArea は display:none で隠すのみ。innerHTML = '' 禁止（DOMを維持する） */

    const rcb = document.getElementById('rcb-container');
    if (rcb) rcb.classList.remove('visible');
    const activeVEl = document.getElementById('active-v');
    if (activeVEl) activeVEl.textContent = vNum ? `${vNum}節` : '';
    _currentAnalysisParams = null;

    const existing = document.getElementById('word-list-view');
    if (existing) existing.remove();

    const listEl = document.createElement('div');
    listEl.id = 'word-list-view';
    listEl.style.cssText = 'flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0;';

    if (!words.length) {
        listEl.innerHTML = `<p style="color:var(--text-sub);font-size: var(--text-caption);text-align:center;padding: var(--space-xl) var(--space-md);">この節では語形表示はまだ利用できません</p>`;
        listEl.insertAdjacentHTML('beforeend', _noteBlockHtml('wlv'));
        sidePanel.appendChild(listEl);
        _loadNoteUI('wlv');
        /* モバイルナビバー・戻るボタン・スクロール調整 */
        _mobileOpenPanel('語形一覧', wasOpen);
        updatePanelBackButton();
        _adjustReadingAreaForPanel(wasOpen);
        return;
    }

    listEl.innerHTML = _buildFlowTabHTML(words);
    listEl.insertAdjacentHTML('beforeend', _noteBlockHtml('wlv'));
    sidePanel.appendChild(listEl);
    _loadNoteUI('wlv');
    /* 節全体の読書メモ（ReadingFormatter駆動）を非同期に注入。
       表示すべき内容が無ければ何も起きない（静寂優先）。 */
    _fillWallacePassageNote(words, listEl);

    /* モバイルナビバー・戻るボタン・スクロール調整 */
    const chapterLabel = vNum ? vNum + '節' : '';
    _mobileOpenPanel(chapterLabel || '語形一覧', wasOpen);
    updatePanelBackButton();
    _adjustReadingAreaForPanel(wasOpen);
}

const JPN_MAP = {
    pos: { 'V': '動詞', 'N': '名詞', 'A': '形容詞', 'R': '関係代名詞', 'P': '人称代名詞', 'D': '指示代名詞', 'T': '冠詞', 'ADV': '副詞', 'PREP': '前置詞', 'CONJ': '接続詞', 'PRT': '添語' },
    tense: { 'P': '現在', 'I': '未完了', 'F': '未来', 'A': 'アオリスト', 'X': '完了' },
    voice: { 'A': '能動', 'M': '中動', 'P': '受動', 'D': '能動的受動' },
    mood: { 'I': '直説', 'S': '接続', 'O': '希求', 'M': '命令', 'N': '不定', 'P': '分詞' },
    case: { 'N': '主格', 'G': '属格', 'D': '与格', 'A': '対格', 'V': '呼格' },
    gender: { 'M': '男性', 'F': '女性', 'N': '中性' },
    number: { 'S': '単数', 'P': '複数' },
    person: { '1': '1人称', '2': '2人称', '3': '3人称' }
};

async function loadDict() {
    try {
        abbottSmithDict = {};
        const resAbbott = await fetch('../assets/data/abbott-smith.tsv');
        if (!resAbbott.ok) return;
        const textAbbott = await resAbbott.text();
        textAbbott.split(/\r?\n/).forEach(row => {
            const cols = row.split('\t');
            const strong = String(cols[0]).trim();
            if (strong) {
                abbottSmithDict[strong] = { description: cols[4]?.trim() || "" };
            }
        });
    } catch (e) { console.error("Dict Error:", e); }
}

function decorate(wordText, wordData) {
    const m = wordData;
    const morph = m.morph || "";
    const parts = morph.split('-');
    const pos = parts[0]; 
    let jpMorph = "";
    let styleClass = "";
    let middleStar = "";

    if (pos === 'V' && parts[1]) {
        const off = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off + 0];
        const voiceCode = parts[1][off + 1];
        const moodCode  = parts[1][off + 2];

        if (['M', 'P', 'D'].includes(voiceCode)) {
            middleStar = '<span style="color:var(--highlight); margin-left: var(--space-xs);">*</span>';
        }

        const t  = JPN_MAP.tense[tenseCode] || "";
        const v  = JPN_MAP.voice[voiceCode]  || "";
        const md = JPN_MAP.mood[moodCode]    || "";

        if (moodCode === 'P') {
            const cng = parts[2]
                ? (JPN_MAP.case[parts[2][0]]   || "") +
                  (JPN_MAP.number[parts[2][1]] || "") +
                  (JPN_MAP.gender[parts[2][2]] || "")
                : "";
            jpMorph = `動詞:分詞${t}${v}${cng ? "(" + cng + ")" : ""}`;
        } else if (moodCode === 'I' || moodCode === 'M') {
            if (tenseCode === 'P') styleClass = "present-text";
            else if (tenseCode === 'A') styleClass = "aorist-text";
            else if (tenseCode === 'X') styleClass = "perfect-text";
            else if (tenseCode === 'F') styleClass = "future-text";
            if (moodCode === 'I') styleClass += " indicative-text";
            else if (moodCode === 'M') styleClass += " imperative-text";
            const person = parts[1].length >= (off + 4) ? (JPN_MAP.person[parts[1][off + 3]] || "") : "";
            const number = parts[1].length >= (off + 5) ? (JPN_MAP.number[parts[1][off + 4]] || "") : "";
            jpMorph = `動詞:${md}${t}${v}${person}${number}`;
        } else {
            const person = parts[1].length >= (off + 4) ? (JPN_MAP.person[parts[1][off + 3]] || "") : "";
            const number = parts[1].length >= (off + 5) ? (JPN_MAP.number[parts[1][off + 4]] || "") : "";
            jpMorph = `動詞:${md}${t}${v}${person}${number}`;
        }
    } else if (['N', 'A', 'R', 'P', 'T', 'D'].includes(pos) && parts[1]) {
        const label = JPN_MAP.pos[pos] || pos;
        let p = "", c = "", n = "", g = "";
        if (['1', '2', '3'].includes(parts[1][0])) {
            p = parts[1][0] + "人称";
            c = JPN_MAP.case[parts[1][1]]   || "";
            n = JPN_MAP.number[parts[1][2]] || "";
        } else {
            c = JPN_MAP.case[parts[1][0]]   || "";
            n = JPN_MAP.number[parts[1][1]] || "";
            g = JPN_MAP.gender[parts[1][2]] || "";
        }
        jpMorph = `${label}:${p}${c}${n}${g}`;
    } else {
        jpMorph = JPN_MAP.pos[pos] || morph;
    }

    const strong = normalizeStrong(m.strong);
    const strongDigits = strong.slice(1); // abbottSmithDict キー用（数字のみ）
    const jaWord  = m.japanese || "-";
    const desc    = m.description || (abbottSmithDict && abbottSmithDict[strongDigits]?.description) || "解説なし";
    const lemma   = String(m.lemma || "").replace(/'/g, "\\'");
    const jaWordE = jaWord.replace(/'/g, "\\'");
    const descE   = desc.replace(/'/g, "\\'").replace(/\n/g, '\\n');
    const ref = m.ref || '';

    // ── Inspect用データをdata属性に持たせる。onclick は showInspect へ ──
    return `<div class="word-card"
                data-greek="${wordText.replace(/"/g,'&quot;')}"
                data-strong="${strong}"
                data-jpmorph="${jpMorph.replace(/"/g,'&quot;')}"
                data-morph="${(m.morph||'').replace(/"/g,'&quot;')}"
                data-lemma="${lemma.replace(/"/g,'&quot;')}"
                data-ja="${jaWordE.replace(/"/g,'&quot;')}"
                data-desc="${descE.replace(/"/g,'&quot;')}"
                data-ref="${ref}"
                onclick="onWordCardClick(this, event)">
                <div>
                    <span class="greek-word ${styleClass}">${wordText}</span>${middleStar}
                    <span style="color:var(--text-sub);font-weight:400;margin-left: var(--space-xs);font-size: var(--text-caption);">［${jaWord}］</span>
                    <span class="tag-jp">${jpMorph}</span>
                </div>
                <span class="strong-num">${strong}</span>
            </div>`;
}

/* ══════════════════════════════════════════
   _renderReadingNotes
   4階層構造: 聖書読者 → 学習者 → 研究者

   reading_prose（語レベル読書メモ）は ReadingFormatter 統一版（2026-06-30）。
   旧 Wallace準拠 reading_prose（WALLACE_*_MAP / WALLACE_*_TEMPLATES /
   wallaceGrammarAdapter / generateWallaceReadingProse）と registry-based
   fallback（_ensureRnAnalyzer / _rnGetType / _getRegistryProse）は完全に削除した。
   自然文生成は ReadingFormatter（clause-analyzer.js）のみが行う。
   本関数は _buildWordResonanceText() 経由で ReadingFormatter.format() の
   結果を受け取り、そのまま描画するだけ（新規の文章生成は行わない）。
   ══════════════════════════════════════════ */
async function _renderReadingNotes(p) {
    const area = document.getElementById('reading-notes-area');
    if (!area) return;
    area.scrollTop = 0;

    const word   = p.word   || '-';
    const pos    = p.pos    || '';
    const mood   = p.mood   || '';
    const tense  = p.tense  || '';
    const voice  = p.voice  || '';
    const ref    = p.ref    || '';
    const lemma  = p.lemma  || '';
    const jaWord = (AppState.inspect.data?.jaWord) || '';
    const strong = normalizeStrong(AppState.inspect.data?.strong);
    const w      = jaWord ? `「${jaWord}」` : 'この語';

    /* ═══════════════════════════════════════════════════════
       Reading prose — ReadingFormatter 統一版
       本関数は文章生成を一切行わない。words配列中の対象語idxを
       _buildWordResonanceText()（wlv-detail-resonance/wlv-pn-proseと同じ
       関数）へ渡し、ReadingFormatter.format()の戻り値をそのまま描画する。
       表示すべき内容が無ければ null のまま → 固定文字列で埋めない（静寂優先）。
       ═══════════════════════════════════════════════════════ */
    let wordProseText = null;
    let phraseReadingHTML = '';
    let observationHTML = '';
    if (ref && Array.isArray(_wlvWordCache)) {
        const targetIdx = _wlvWordCache.findIndex(t => t.ref === ref);
        if (targetIdx !== -1) {
            wordProseText = await _buildWordResonanceText(_wlvWordCache, targetIdx);
            /* Phase 25B-2: Phrase Reading（かたまりの読書メモ）。
               失敗・該当なしは '' = 既存表示のみ（Failure Mode 現状維持）。 */
            try {
                phraseReadingHTML =
                    (await _buildPhraseReadingHTML(_wlvWordCache, targetIdx)) || '';

            /* Phase 25B-3: Observation（どこを見ると読みやすいかの一文）。

    /* ── Morph grid (Level 2) ── */

    if (p.mood)   morphRows.push({ k:'法',   v: JPN_FULL.mood[p.mood]     || p.mood,   core:true  });
    if (p.voice)  morphRows.push({ k:'態',   v: JPN_FULL.voice[p.voice]   || p.voice,  core:false });
    if (p.case)   morphRows.push({ k:'格',   v: JPN_FULL.case[p.case]     || p.case,   core:false });
    if (p.number) morphRows.push({ k:'数',   v: JPN_FULL.number[p.number] || p.number, core:false });

    const morphGridHTML = morphRows.length

    /* ── Usage trends (Level 1) ── */

    /* ── Experienced reader labels ── */
    let expLabelHTML = '';
    if (window.App.onboarding?.getState()?.experiencedReader && pos === 'V') {
        const labels = [];
        if (typeof classifyMiddleVoice === 'function') {
            const mvc = classifyMiddleVoice(lemma, voice);
            if (mvc) labels.push('中動態として読むこともできます');
        }
        if (typeof detectDivinePassive === 'function' && typeof decodeMorph === 'function') {
            const tokenForDP  = { word, lemma, morph: p._rawMorph };
            const verseTokens = [];
            const dp = detectDivinePassive(tokenForDP, verseTokens, decodeMorph);
            if (dp && dp.isDivinePassive) labels.push('行為者が暗示されています');

        if (['indicative','subjunctive','imperative'].includes(mood) && pos === 'V') {

    /* ── Abbott-Smith full text (Level 2) ── */
    const abbottFullHTML = abbottSmithText
        ? `<div class="rn-dict-full-section">
               <span class="rn-dict-label ui-label">辞書全文</span>
               <div class="rn-dict-full-text">${_escH(abbottSmithText).replace(/\n/g,'<br>')}</div>
           </div>`
        : '';

    /* ═══════════════════════════════════════════════════════
       HTML 出力 — 4階層構造
       ═══════════════════════════════════════════════════════ */
    area.innerHTML = `
        <!-- LEVEL 1: まず聖書を読む（常時表示） -->
        <div class="rn-word-head">
            <span class="rn-greek greek-headword">${word}</span>

        </div>

        ${proseHTML}
        ${phraseReadingHTML}

        <!-- LEVEL 2: 単語を詳しく調べる（折りたたみ） -->
        <details class="rn-level-section" id="rn-level2-details">
            <summary><span class="rn-level-arrow">${icon('chevronRight')}</span>単語を詳しく調べる</summary>
            <div class="rn-level-body">

                ${etymologyHTML}

        <details class="rn-level-section">
            <summary><span class="rn-level-arrow">${icon('chevronRight')}</span>意味が近い語と比べる</summary>
            <div class="rn-level-body">
                <div id="rn-semantic-layers"></div>
            </div>
        </details>

        <!-- さらに調べる：検索ツールへのナビゲーション（常時表示・折りたたみなし） -->
        <div class="rn-research-links">
            <span class="rn-research-item-label">さらに調べる</span>
            <a href="${concordURL}" class="rn-research-link" target="_blank">
                <span class="rn-research-link-title">この語の用例を見る →</span>
                <span class="rn-research-link-desc">聖書のどこで使われているか調べる</span>
            </a>
            <a href="${morphSearchURL}" class="rn-research-link" target="_blank">
                <span class="rn-research-link-title">この語形を探す →</span>
                <span class="rn-research-link-desc">同じ語形が現れる箇所を探す</span>
            </a>
            <a href="${syntaxURL}" class="rn-research-link" target="_blank">
                <span class="rn-research-link-title">同じ構文を探す →</span>
                <span class="rn-research-link-desc">同じ文法パターンを探す</span>

    `;

    /* セマンティックレイヤーを非同期注入 */
    _injectStudyPanelContent(
        document.getElementById('rn-semantic-layers'),

    );
