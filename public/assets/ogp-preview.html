<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>OGP Image Preview</title>
<style>
  body { margin: 0; background: #888; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 40px; font-family: sans-serif; }
  h2 { color: #fff; margin: 0; }
  p  { color: #ddd; margin: 4px 0 0; font-size: 13px; }
  .frame { box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
  .small { transform: scale(0.42); transform-origin: top left; }
  .small-wrap { width: 504px; height: 265px; overflow: hidden; }
</style>
</head>
<body>
  <div>
    <h2>Full size — 1200 × 630</h2>
    <p>Facebook / X シェア時の表示</p>
  </div>
  <img src="ogp-source.svg" width="1200" height="630" class="frame">

  <div>
    <h2>Thumbnail — 504 × 265 (42%)</h2>
    <p>Facebook フィード上の縮小表示イメージ</p>
  </div>
  <div class="small-wrap frame">
    <div class="small">
      <img src="ogp-source.svg" width="1200" height="630">
    </div>
  </div>
</body>
</html>
