<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FEFAF0"/>
      <stop offset="100%" stop-color="#EDF5FF"/>
    </linearGradient>
    <linearGradient id="pageFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFEFB"/>
      <stop offset="100%" stop-color="#FEF8EE"/>
    </linearGradient>
    <radialGradient id="wordGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFD700" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <filter id="pageShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#A09070" flood-opacity="0.15"/>
    </filter>
    <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#808080" flood-opacity="0.22"/>
    </filter>
    <filter id="glowBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Warm ambient glow right-center -->
  <ellipse cx="940" cy="340" rx="400" ry="310" fill="#FFF6D8" opacity="0.30"/>
  <!-- Cool top-left accent -->
  <ellipse cx="80"  cy="48"  rx="230" ry="130" fill="#DCF0FF" opacity="0.28"/>
  <!-- Bottom-right soft -->
  <circle  cx="1168" cy="606" r="140" fill="#E8F4FF" opacity="0.26"/>


  <!-- LEFT: TEXT CONTENT  (x=72 ... ~628) -->

  <!-- Brand URL -->
  <circle cx="62" cy="72" r="4" fill="#78A8D0"/>
  <text x="76" y="77"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="17" fill="#78A8D0" letter-spacing="0.5">bible-text.pages.dev</text>

  <!-- Headline 1 -->
  <text x="72" y="192"
    font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', Georgia, serif"
    font-size="56" font-weight="bold" fill="#1A2E42" letter-spacing="-1">気になっていた、</text>

  <!-- Headline 2 -->
  <text x="72" y="262"
    font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', Georgia, serif"
    font-size="56" font-weight="bold" fill="#1A2E42" letter-spacing="-1">ことばの奥が見えた。</text>

  <!-- Warm amber underline -->
  <rect x="72" y="280" width="68" height="4" rx="2" fill="#F0A828"/>

  <!-- Sub copy -->
  <text x="72" y="332"
    font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', Arial, sans-serif"
    font-size="22" fill="#3A5A7A">日本語と原語を並べて読む、新しい聖書体験。</text>

  <!-- Reassurance (small) -->
  <text x="74" y="374"
    font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', Arial, sans-serif"
    font-size="18" fill="#7A9AB8">原語の知識がなくても、すぐ使えます。</text>


  <!-- RIGHT: WORD DISCOVERY MOMENT  (x=658 ... 1152) -->

  <!-- Page (warm paper card) -->
  <rect x="658" y="108" width="488" height="430" rx="16" fill="url(#pageFill)" filter="url(#pageShadow)"/>

  <!-- Column divider -->
  <line x1="904" y1="126" x2="904" y2="520" stroke="#E8DDD0" stroke-width="1.5"/>

  <!-- Column labels -->
  <text x="780" y="144"
    text-anchor="middle"
    font-family="'Hiragino Kaku Gothic ProN', Arial, sans-serif"
    font-size="11" fill="#C0B0A0" letter-spacing="1">日本語訳</text>
  <text x="1024" y="144"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="11" fill="#A8BED4" letter-spacing="1">原語（ギリシャ語）</text>

  <!-- JAPANESE COLUMN: faded text lines -->
  <rect x="678" y="160" width="196" height="5" rx="2.5" fill="#C8B8A0" opacity="0.60"/>
  <rect x="678" y="180" width="178" height="5" rx="2.5" fill="#C8B8A0" opacity="0.60"/>
  <rect x="678" y="200" width="190" height="5" rx="2.5" fill="#C8B8A0" opacity="0.60"/>

  <!-- THE MOMENT: highlighted Japanese word -->
  <ellipse cx="730" cy="232" rx="70" ry="22" fill="url(#wordGlow)" filter="url(#glowBlur)"/>
  <rect x="678" y="219" width="112" height="28" rx="6" fill="#FFE86A"/>
  <text x="734" y="238"
    text-anchor="middle"
    font-family="'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', Georgia, serif"
    font-size="16" fill="#7A5000" font-weight="bold">初めに</text>
  <rect x="804" y="227" width="78" height="5" rx="2.5" fill="#C8B8A0" opacity="0.60"/>

  <!-- More Japanese lines (fading as they go down) -->
  <rect x="678" y="262" width="188" height="5" rx="2.5" fill="#C8B8A0" opacity="0.50"/>
  <rect x="678" y="282" width="170" height="5" rx="2.5" fill="#C8B8A0" opacity="0.50"/>
  <rect x="678" y="302" width="180" height="5" rx="2.5" fill="#C8B8A0" opacity="0.50"/>
  <rect x="678" y="330" width="188" height="5" rx="2.5" fill="#C8B8A0" opacity="0.38"/>
  <rect x="678" y="350" width="172" height="5" rx="2.5" fill="#C8B8A0" opacity="0.38"/>
  <rect x="678" y="370" width="182" height="5" rx="2.5" fill="#C8B8A0" opacity="0.38"/>
  <rect x="678" y="398" width="188" height="5" rx="2.5" fill="#C8B8A0" opacity="0.26"/>
  <rect x="678" y="418" width="168" height="5" rx="2.5" fill="#C8B8A0" opacity="0.26"/>
  <rect x="678" y="438" width="178" height="5" rx="2.5" fill="#C8B8A0" opacity="0.26"/>
  <rect x="678" y="466" width="188" height="5" rx="2.5" fill="#C8B8A0" opacity="0.16"/>
  <rect x="678" y="486" width="162" height="5" rx="2.5" fill="#C8B8A0" opacity="0.16"/>

  <!-- GREEK COLUMN: faded text lines -->
  <rect x="922" y="160" width="196" height="5" rx="2.5" fill="#A8C0D8" opacity="0.60"/>
  <rect x="922" y="180" width="180" height="5" rx="2.5" fill="#A8C0D8" opacity="0.60"/>
  <rect x="922" y="200" width="192" height="5" rx="2.5" fill="#A8C0D8" opacity="0.60"/>

  <!-- Corresponding Greek word (light blue highlight) -->
  <rect x="922" y="219" width="122" height="28" rx="6" fill="#D6ECFF"/>
  <text x="983" y="238"
    text-anchor="middle"
    font-family="'Gentium Plus', 'Palatino Linotype', Palatino, Georgia, serif"
    font-size="19" fill="#1A4E88" font-weight="bold" letter-spacing="1">ἀρχή</text>
  <rect x="1058" y="227" width="74" height="5" rx="2.5" fill="#A8C0D8" opacity="0.60"/>

  <!-- More Greek lines -->
  <rect x="922" y="262" width="192" height="5" rx="2.5" fill="#A8C0D8" opacity="0.50"/>
  <rect x="922" y="282" width="176" height="5" rx="2.5" fill="#A8C0D8" opacity="0.50"/>
  <rect x="922" y="302" width="186" height="5" rx="2.5" fill="#A8C0D8" opacity="0.50"/>
  <rect x="922" y="330" width="192" height="5" rx="2.5" fill="#A8C0D8" opacity="0.38"/>
  <rect x="922" y="350" width="174" height="5" rx="2.5" fill="#A8C0D8" opacity="0.38"/>
  <rect x="922" y="370" width="184" height="5" rx="2.5" fill="#A8C0D8" opacity="0.38"/>
  <rect x="922" y="398" width="192" height="5" rx="2.5" fill="#A8C0D8" opacity="0.26"/>
  <rect x="922" y="418" width="172" height="5" rx="2.5" fill="#A8C0D8" opacity="0.26"/>
  <rect x="922" y="438" width="180" height="5" rx="2.5" fill="#A8C0D8" opacity="0.26"/>
  <rect x="922" y="466" width="192" height="5" rx="2.5" fill="#A8C0D8" opacity="0.16"/>
  <rect x="922" y="486" width="164" height="5" rx="2.5" fill="#A8C0D8" opacity="0.16"/>

  <!-- POPUP CARD: the "aha moment" -->
  <rect x="656" y="18" width="318" height="108" rx="10" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <!-- Amber accent bar at top of card -->
  <rect x="656" y="18" width="318" height="4" rx="2" fill="#F0A828"/>
  <!-- Connector: dashed amber line from card to highlighted word -->
  <line x1="734" y1="126" x2="734" y2="219"
    stroke="#F0A828" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.70"/>
  <circle cx="734" cy="126" r="4" fill="#F0A828" opacity="0.80"/>
  <circle cx="734" cy="219" r="4" fill="#F0A828" opacity="0.80"/>

  <!-- Card content -->
  <text x="676" y="54"
    font-family="'Gentium Plus', 'Palatino Linotype', Palatino, Georgia, serif"
    font-size="28" fill="#1A4E88" font-weight="bold" letter-spacing="1">ἀρχή</text>
  <text x="718" y="54"
    font-family="'Hiragino Kaku Gothic ProN', Arial, sans-serif"
    font-size="14" fill="#999"> — アルケー</text>

  <line x1="674" y1="64" x2="966" y2="64" stroke="#F0EAD8" stroke-width="1"/>

  <text x="676" y="86"
    font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', Arial, sans-serif"
    font-size="17" fill="#2A3A4A">起源・始まり・根本原理</text>
  <text x="676" y="110"
    font-family="'Hiragino Kaku Gothic ProN', Arial, sans-serif"
    font-size="13" fill="#B0B0B0">名詞・女性・主格・単数　ヨハネ 1:1</text>


  <!-- beta badge -->
  <rect x="1130" y="24" width="48" height="26" rx="5" fill="#EBF2F8"/>
  <text x="1154" y="42" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="15" fill="#80A8CC" font-weight="bold">β</text>

</svg>
