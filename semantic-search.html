<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>意味論検索 — コトバト</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   Design tokens（他画面と共通）
   ══════════════════════════════════════════ */
:root {
    --bg:           #ffffff;
    --bg-panel:     #f5f5f7;
    --bg-inset:     #fafafa;
    --text:         #1d1d1f;
    --text-sub:     #6e6e73;
    --text-hint:    #aeaeb2;
    --accent:       #5a6e82;
    --accent-light: rgba(90,110,130,0.09);
    --accent-mid:   rgba(90,110,130,0.20);
    --border:       rgba(0,0,0,0.07);
    --radius-s: 8px;
    --radius-m: 12px;
    --radius-l: 16px;

/* 意味論専用 — 有力度カラー */
--c-top:     #2d6a4f;
--c-top-bg:  rgba(45,106,79,0.07);
--c-top-mid: rgba(45,106,79,0.20);
--c-mid:     #5a6e82;
--c-mid-bg:  rgba(90,110,130,0.07);
--c-low:     #aeaeb2;
--c-low-bg:  rgba(174,174,178,0.06);

/* スコアバー */
--bar-h: 3px;

}

* { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
  font-family: ‘Noto Sans JP’, -apple-system, sans-serif;
  background: var(––bg);
  color: var(––text);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  }

/* ══════════════════════════════════════════
Layout
══════════════════════════════════════════ */
.page { max-width: 720px; margin: 0 auto; padding: 32px 24px 100px; }

/* ── Nav ── */
.nav { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
.btn-back {
display: inline-flex; align-items: center; gap: 4px;
padding: 5px 13px; font-size: 0.78rem; font-family: inherit;
border: 1px solid var(––border); border-radius: 20px;
background: transparent; cursor: pointer; color: var(––text-sub);
transition: background 0.12s;
}
.btn-back:hover { background: var(––bg-panel); }
.breadcrumb {
display: flex; align-items: center; gap: 5px;
font-size: 0.75rem; color: var(––text-hint);
flex: 1; overflow: hidden;
}
.breadcrumb .crumb { color: var(––accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
.breadcrumb .sep { opacity: 0.35; flex-shrink: 0; }

/* Section label */
.sec-label {
font-size: 0.58rem; font-weight: 700; letter-spacing: 0.14em;
text-transform: uppercase; color: var(––text-hint);
margin-bottom: 12px;
}

/* ══════════════════════════════════════════
① 文脈表示ブロック
══════════════════════════════════════════ */
.context-block {
margin-bottom: 32px;
padding-bottom: 32px;
border-bottom: 1px solid var(––border);
}
.sentence-ref {
font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
color: var(––accent); text-transform: uppercase; margin-bottom: 12px;
display: flex; align-items: center; gap: 8px;
}
.sentence-ref-badge {
background: var(––accent-light); border: 1px solid var(––accent-mid);
border-radius: 6px; padding: 2px 8px;
font-size: 0.6rem; color: var(––accent);
}

/* ギリシャ語全文 */
.token-line {
font-family: ‘Gentium Plus’, serif;
font-size: 1.45rem; line-height: 2.2;
display: flex; flex-wrap: wrap; gap: 4px 10px;
margin-bottom: 10px;
}
.token {
cursor: default;
border-radius: 6px;
padding: 0 4px;
transition: background 0.1s;
position: relative;
}
/* 対象語ハイライト */
.token.target {
color: var(––c-top);
background: var(––c-top-bg);
font-weight: 700;
outline: 1.5px solid var(––c-top-mid);
outline-offset: 1px;
}
/* その他の語はクリッカブルに */
.token.other {
cursor: pointer;
color: var(––text);
}
.token.other:hover { background: var(––bg-panel); }

/* 日本語訳 */
.sentence-ja {
font-size: 0.8rem; color: var(––text-hint);
line-height: 1.7; padding: 8px 12px;
background: var(––bg-panel);
border-radius: var(––radius-s);
border-left: 2px solid var(––border);
}
.sentence-ja .target-ja {
color: var(––c-top);
font-weight: 500;
}

/* ══════════════════════════════════════════
② 意味候補リスト（最重要セクション）
══════════════════════════════════════════ */
.candidates-block {
margin-bottom: 32px;
padding-bottom: 32px;
border-bottom: 1px solid var(––border);
}

.candidates-list {
display: flex;
flex-direction: column;
gap: 8px;
}

/* 候補カード */
.cand-card {
border: 1px solid var(––border);
border-radius: var(––radius-m);
overflow: hidden;
cursor: pointer;
transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
animation: fadeUp 0.2s ease both;
}
.cand-card:hover {
border-color: rgba(0,0,0,0.14);
transform: translateY(-1px);
}

/* 最有力カード */
.cand-card.rank-1 {
border-color: var(––c-top-mid);
box-shadow: 0 0 0 0 transparent;
}
.cand-card.rank-1:hover {
box-shadow: 0 2px 12px rgba(45,106,79,0.10);
border-color: rgba(45,106,79,0.35);
}
.cand-card.active {
box-shadow: 0 0 0 2px var(––c-top-mid);
border-color: transparent;
}
.cand-card.rank-1.active {
box-shadow: 0 0 0 2px rgba(45,106,79,0.30);
}

/* カード内レイアウト */
.cand-bar-accent {
height: 3px;
width: 100%;
transition: width 0.4s ease;
}
.rank-1 .cand-bar-accent { background: var(––c-top); }
.rank-2 .cand-bar-accent { background: var(––c-mid); opacity: 0.5; }
.rank-3 .cand-bar-accent, .rank-4 .cand-bar-accent, .rank-5 .cand-bar-accent { background: var(––c-low); }

.cand-body {
padding: 12px 16px 14px;
background: var(––bg);
transition: background 0.1s;
}
.cand-card:hover .cand-body { background: var(––bg-panel); }
.cand-card.active .cand-body { background: var(––bg-inset); }

.cand-top {
display: flex; align-items: baseline;
justify-content: space-between; gap: 8px;
margin-bottom: 8px;
}

.cand-rank {
font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em;
flex-shrink: 0;
width: 22px;
text-align: right;
padding-right: 6px;
}
.rank-1 .cand-rank { color: var(––c-top); }
.rank-2 .cand-rank { color: var(––c-mid); }
.rank-3 .cand-rank, .rank-4 .cand-rank, .rank-5 .cand-rank { color: var(––c-low); }

.cand-meaning {
font-size: 1.05rem; font-weight: 600;
color: var(––text); flex: 1; line-height: 1.4;
}
.rank-1 .cand-meaning { color: var(––c-top); }

.cand-meaning-sub {
font-size: 0.72rem; color: var(––text-sub);
font-weight: 400; margin-left: 6px;
}

/* スコアバー（控えめ） */
.cand-score-row {
display: flex; align-items: center; gap: 8px;
}
.cand-score-track {
flex: 1; height: var(––bar-h);
background: var(––bg-panel);
border-radius: 2px; overflow: hidden;
}
.cand-score-fill {
height: 100%; border-radius: 2px;
transition: width 0.5s ease 0.1s;
}
.rank-1 .cand-score-fill { background: var(––c-top); }
.rank-2 .cand-score-fill { background: var(––c-mid); opacity: 0.6; }
.rank-3 .cand-score-fill, .rank-4 .cand-score-fill, .rank-5 .cand-score-fill { background: var(––c-low); }

.cand-score-pct {
font-size: 0.65rem; color: var(––text-hint);
font-variant-numeric: tabular-nums;
width: 32px; text-align: right; flex-shrink: 0;
}
.rank-1 .cand-score-pct { color: var(––c-top); opacity: 0.7; }

/* 最有力バッジ */
.top-badge {
display: inline-flex; align-items: center; gap: 4px;
padding: 2px 8px; border-radius: 20px;
font-size: 0.58rem; font-weight: 700; letter-spacing: 0.06em;
background: var(––c-top-bg); border: 1px solid var(––c-top-mid);
color: var(––c-top); flex-shrink: 0;
}

/* reason-block: removed */

/* guide-block: removed */

/* translation-block: removed */

/* ══════════════════════════════════════════
⑦ 比較用例（オプション）
══════════════════════════════════════════ */
.examples-block {
margin-bottom: 32px;
padding-bottom: 32px;
border-bottom: 1px solid var(––border);
}
.examples-list {
display: flex; flex-direction: column; gap: 8px;
}
.example-item {
padding: 10px 14px;
background: var(––bg-panel);
border-radius: var(––radius-s);
border: 1px solid var(––border);
cursor: pointer;
transition: background 0.1s, border-color 0.1s;
}
.example-item:hover {
background: var(––accent-light);
border-color: var(––accent-mid);
}
.example-greek {
font-family: ‘Gentium Plus’, serif;
font-size: 0.95rem; color: var(––text);
margin-bottom: 2px;
}
.example-greek .ex-target {
color: var(––c-top); font-weight: 700;
}
.example-ref {
font-size: 0.65rem; color: var(––text-hint);
letter-spacing: 0.04em;
margin-bottom: 3px;
}
.example-ja {
font-size: 0.75rem; color: var(––text-sub);
line-height: 1.6;
}
.example-nuance {
margin-top: 4px; font-size: 0.68rem;
color: var(––accent);
padding: 2px 8px; background: var(––accent-light);
border-radius: 20px; display: inline-block;
}

/* ══════════════════════════════════════════
⑧ ナビゲーション
══════════════════════════════════════════ */
.nav-tools {
display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
margin-bottom: 32px;
}
.nav-tool-btn {
display: flex; align-items: center; justify-content: space-between;
padding: 14px 16px;
background: var(––bg-inset); border: 1px solid var(––border);
border-radius: var(––radius-m); cursor: pointer;
text-decoration: none; color: var(––text);
transition: background 0.12s, border-color 0.12s, transform 0.1s;
}
.nav-tool-btn:hover {
background: var(––accent-light); border-color: var(––accent-mid);
transform: translateY(-1px);
}
.nav-tool-icon { font-size: 1.1rem; line-height: 1; margin-bottom: 4px; }
.nav-tool-main { font-size: 0.82rem; font-weight: 700; color: var(––text); margin-bottom: 2px; }
.nav-tool-sub  { font-size: 0.68rem; color: var(––text-sub); }
.nav-tool-arrow { font-size: 0.85rem; color: var(––text-hint); flex-shrink: 0; margin-left: 8px; align-self: center; }

/* ══════════════════════════════════════════
Loading
══════════════════════════════════════════ */
.loading {
text-align: center; padding: 64px 16px; color: var(––text-hint);
}
.loading-greek {
font-family: ‘Gentium Plus’, serif;
font-size: 2rem; color: #d8d8dc; margin-bottom: 16px;
}
.loading-bar-wrap {
width: 200px; margin: 0 auto 10px;
height: 2px; background: var(––bg-panel);
border-radius: 2px; overflow: hidden;
}
.loading-bar { height: 100%; background: var(––accent); transition: width 0.3s; border-radius: 2px; }
.loading-text { font-size: 0.72rem; }

@keyframes pulse { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }
.dot { display: inline-block; animation: pulse 1.4s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.25s ease forwards; }

/* Footer */
.app-footer {
margin-top: 48px; padding-top: 16px;
border-top: 1px solid var(––border);
display: flex; align-items: center; justify-content: space-between;
font-size: 0.68rem; color: var(––text-hint);
}
.footer-links { display: flex; gap: 16px; }
.footer-links a { color: var(––text-hint); text-decoration: none; border-bottom: 1px solid var(––border); padding-bottom: 1px; }
.footer-links a:hover { color: var(––text-sub); }

/* Responsive */
@media (max-width: 520px) {
.page { padding: 24px 16px 80px; }
.token-line { font-size: 1.2rem; gap: 3px 7px; }
.nav-tools { grid-template-columns: 1fr; }
}

/* Semantic Beginner Mode: removed */

/* ══════════════════════════════════════════
Semantic Field バッジ（推定パス専用）
══════════════════════════════════════════ */
.field-badge {
display: inline-flex; align-items: center; gap: 4px;
padding: 2px 8px; border-radius: 20px;
font-size: 0.62rem; font-weight: 600; letter-spacing: 0.04em;
border: 1px solid currentColor;
opacity: 0.85;
background: transparent;
}

/* ══════════════════════════════════════════
推定エンジン稼働バナー
══════════════════════════════════════════ */
.infer-banner {
display: flex; align-items: flex-start; gap: 10px;
padding: 10px 14px;
background: rgba(90,110,130,0.06);
border: 1px solid rgba(90,110,130,0.18);
border-left: 3px solid var(––accent);
border-radius: var(––radius-m);
margin-bottom: 14px;
animation: fadeUp 0.2s ease;
}
.infer-icon {
font-size: 1rem; line-height: 1.4;
color: var(––accent); flex-shrink: 0;
}
.infer-text {
display: flex; flex-direction: column; gap: 2px;
}
.infer-title {
font-size: 0.72rem; font-weight: 700;
color: var(––accent); letter-spacing: 0.04em;
}
.infer-sub {
font-size: 0.67rem; color: var(––text-sub); line-height: 1.5;
}

.xsc-panel {
border: 1px solid var(––border);
border-radius: var(––radius-s);
overflow: hidden;
font-size: 0.78rem;
}
.xsc-head {
display: flex; align-items: center; justify-content: space-between;
padding: 6px 10px 5px;
background: var(––bg-panel);
cursor: pointer; user-select: none;
transition: background 0.12s;
}
.xsc-head:hover { background: rgba(45,106,79,0.08); }
.xsc-head-label {
font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
text-transform: uppercase; color: var(––text-hint);
}
.xsc-head-right { display: flex; align-items: center; gap: 8px; }
.xsc-conf { font-size: 0.7rem; font-weight: 700; }
.xsc-arrow { font-size: 0.65rem; color: var(––text-hint); transition: transform 0.15s; }
.xsc-panel.open .xsc-arrow { transform: rotate(180deg); }
.xsc-body {
display: none; padding: 8px 10px 10px;
border-top: 1px solid var(––border);
animation: fadeUp 0.18s ease;
}
.xsc-panel.open .xsc-body { display: block; }
.xsc-rows { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; }
.xsc-row  { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; }
.xsc-delta {
font-size: 0.67rem; font-weight: 700; min-width: 28px;
text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums;
}
.xsc-delta.pos { color: #2d6a4f; }
.xsc-delta.neg { color: #b05050; }
.xsc-bar-wrap  { width: 50px; height: 3px; background: #eee; border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.xsc-bar       { height: 100%; border-radius: 2px; }
.xsc-row-label { flex: 1; color: var(––text); line-height: 1.4; }

/* ══════════════════════════════════════════
Semantic Context — 共起語中心表示
══════════════════════════════════════════ */
.sem-ctx-target {
display: inline-flex; align-items: center; gap: 6px;
padding: 6px 12px;
background: var(––c-top-bg);
border: 1px solid var(––c-top-mid);
border-radius: var(––radius-m);
margin-bottom: 8px;
}
.sem-ctx-target-word {
font-family: ‘Gentium Plus’, serif;
font-size: 1.3rem; color: var(––c-top); font-weight: 700;
}
.sem-ctx-target-label {
font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
text-transform: uppercase; color: var(––c-top); opacity: 0.7;
}
.sem-cooc-section { margin-bottom: 4px; }
.sem-cooc-label {
font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em;
text-transform: uppercase; color: var(––text-hint);
margin-bottom: 5px;
}
.sem-cooc-chips {
display: flex; flex-wrap: wrap; gap: 5px;
}
.sem-cooc-chip {
display: inline-flex; align-items: center; gap: 4px;
padding: 3px 9px;
border-radius: 20px;
font-size: 0.72rem;
border: 1px solid var(––border);
background: var(––bg-panel);
color: var(––text-sub);
font-family: ‘Gentium Plus’, serif;
}
.sem-cooc-chip.semantic-neighbor {
background: rgba(45,106,79,0.06);
border-color: rgba(45,106,79,0.2);
color: #2d6a4f;
}
.sem-cooc-chip .chip-role {
font-size: 0.55rem; font-weight: 700;
text-transform: uppercase; letter-spacing: 0.06em;
opacity: 0.6;
font-family: ‘Noto Sans JP’, sans-serif;
}
.sem-ja-note {
font-size: 0.72rem; color: var(––text-hint);
padding: 5px 10px;
background: var(––bg-panel);
border-radius: var(––radius-s);
border-left: 2px solid var(––border);
line-height: 1.6;
}

/* ══════════════════════════════════════════
iframe compact mode — side-panel 最適化
standalone では完全無効（body.in-iframe のみ適用）
══════════════════════════════════════════ */
body.in-iframe .nav,
body.in-iframe .btn-back,
body.in-iframe .breadcrumb,
body.in-iframe .app-footer,
body.in-iframe .footer-links {
display: none !important;
}

/* 次のステップ導線も不要 */
body.in-iframe .nav-tools,
body.in-iframe .morph-nav {
display: none !important;
}

/* section-divider: nav-tools 後・最終を非表示 */
body.in-iframe .nav-tools + .section-divider,
body.in-iframe .section-divider:last-of-type {
display: none !important;
}

/* コンパクト padding */
body.in-iframe .page {
padding: 12px 16px 40px;
max-width: 100%;
}

/* セクション間余白削減 */
body.in-iframe .context-block,
body.in-iframe .candidates-block,
body.in-iframe .examples-block {
margin-bottom: 20px;
padding-bottom: 20px;
}

/* 候補スコアバーの高さ調整（密度向上） */
body.in-iframe .cand-body {
padding: 8px 12px 10px;
}

/* syntax / semantic nav margin 削減 */
body.in-iframe .nav { margin-bottom: 0; }

/* ══════════════════════════════════════════
iframe mode: fixed/sticky 完全無効化
position:fixed は iframe viewport 基準になるため
analysis-tabs との二重ヘッダー化を防ぐ
══════════════════════════════════════════ */
body.in-iframe #meaning-sticky,
body.in-iframe .meaning-sticky,
body.in-iframe .sticky-bar,
body.in-iframe .sticky-header,
body.in-iframe [style*=“position: fixed”],
body.in-iframe [style*=“position:fixed”] {
position: static !important;
top: auto !important;
left: auto !important;
right: auto !important;
bottom: auto !important;
width: auto !important;
z-index: auto !important;
box-shadow: none !important;
backdrop-filter: none !important;
-webkit-backdrop-filter: none !important;
display: none !important; /* sticky bar は iframe 内で非表示 */
}

/* ══════════════════════════════════════════
共有フィルターバー（Morph引継ぎ）
══════════════════════════════════════════ */
.shared-filter-bar {
display: flex; align-items: center; gap: 6px;
flex-wrap: wrap;
padding: 8px 12px;
background: var(––bg-inset);
border: 1px solid var(––accent-mid);
border-radius: var(––radius-m);
margin-bottom: 20px;
animation: fadeUp 0.2s ease;
}
.shared-filter-bar.hidden { display: none; }
.shared-filter-label {
font-size: 0.58rem; font-weight: 700; letter-spacing: 0.12em;
text-transform: uppercase; color: var(––text-hint);
flex-shrink: 0; margin-right: 2px;
}
.filter-chip {
display: inline-flex; align-items: center; gap: 4px;
padding: 3px 10px; border-radius: 20px; font-size: 0.73rem;
transition: all 0.12s; cursor: default;
}
.filter-chip-active {
background: var(––accent-light); border: 1px solid var(––accent-mid);
color: var(––accent); font-weight: 600;
}
.filter-chip-toggle {
background: var(––bg-panel); border: 1px solid var(––border);
color: var(––text-sub); cursor: pointer;
}
.filter-chip-toggle.on {
background: var(––accent-light); border-color: var(––accent-mid);
color: var(––accent); font-weight: 600;
}
.filter-chip-toggle.off {
background: var(––bg); border-color: var(––border);
color: var(––text-hint);
}
.filter-chip-dot {
width: 12px; height: 12px; border-radius: 50%;
border: 1.5px solid currentColor;
display: flex; align-items: center; justify-content: center;
font-size: 7px; flex-shrink: 0;
}
.filter-chip-toggle.on .filter-chip-dot { background: var(––accent); border-color: var(––accent); color: #fff; }
.filter-chip-toggle.off .filter-chip-dot { background: transparent; color: #ccc; }

.book-filter-panel { margin-bottom: 20px; }
.book-filter-toggle-btn {
display: inline-flex; align-items: center; gap: 5px;
font-size: 0.7rem; font-family: inherit;
padding: 4px 12px; border-radius: 20px;
border: 1px solid var(––border); background: transparent;

    /* NT */

    { key:'acts',     label:'使徒言行録',         books:['ACT'] },
    { key:'pauline',  label:'パウロ書簡',         books:['ROM','1CO','2CO','GAL','1TH','2TH'] },
    { key:'prison',   label:'獄中書簡',           books:['EPH','PHP','COL','PHM'] },
    { key:'pastoral', label:'牧会書簡',           books:['1TI','2TI','TIT'] },
    { key:'general',  label:'一般書簡',           books:['HEB','JAS','1PE','2PE','1JN','2JN','3JN','JUD'] },
    { key:'rev',      label:'黙示録',             books:['REV'] },
    /* LXX */
    { key:'lxx_torah',    label:'モーセ五書（LXX）',   books:['GEN','EXO','LEV','NUM','DEU'] },
    { key:'lxx_forprop',  label:'前預言書（LXX）',     books:['JOS','JDG','1SA','2SA','1KI','2KI'] },
    { key:'lxx_latprop',  label:'後預言書（LXX）',     books:['ISA','JER','EZE','DAN','HOS','JOL','AMO','OBA','JON','MIC','NAH','HAB','ZEP','HAG','ZEC','MAL'] },
    { key:'lxx_writings', label:'諸書（LXX）',         books:['PSA','PRO','JOB','SNG','RUT','LAM','ECC','EST','EZR','NEH','1CH','2CH'] },
];

let bookFilterState = BOOK_GROUPS.map(g => {
    let enabled = true;
    if (params.scope) {
        enabled = (g.key === params.scope);
    } else if (params.books) {
        const booksSet = new Set(params.books.split(',').filter(Boolean));
        enabled = g.books.some(b => booksSet.has(b));
    }
    return { ...g, enabled };
});

function notifyFilterChanged() {
    const enabledBooks = bookFilterState.filter(g => g.enabled).flatMap(g => g.books);
    const enabledGroups = bookFilterState.filter(g => g.enabled).map(g => g.key);
    const msg = {
        type: 'FILTER_CHANGED',
        filters: {
            books: enabledBooks,
            groups: enabledGroups,
            scope: enabledGroups.length === 1 ? enabledGroups[0] : '',
        }
    };
    if (window.parent && window.parent !== window) window.parent.postMessage(msg, '*');
    else if (window.opener && !window.opener.closed) window.opener.postMessage(msg, '*');
}

function renderSharedFilterBar() {
    const bar = document.getElementById('shared-filter-bar');
    const chipsEl = document.getElementById('shared-filter-chips');
    const activeGroups = bookFilterState.filter(g => g.enabled);
    const allOn = bookFilterState.every(g => g.enabled);
    const allOff = bookFilterState.every(g => !g.enabled);
    if (allOn || allOff) { bar.classList.add('hidden'); return; }
    bar.classList.remove('hidden');
    chipsEl.innerHTML = activeGroups.map(g =>
        `<div class="filter-chip filter-chip-active" title="${g.books.join('・')}">${g.label}</div>`
    ).join('');
}

function renderBookFilterChips() {
    const el = document.getElementById('book-filter-chips');
    const LXX_KEYS = new Set(['lxx_torah','lxx_forprop','lxx_latprop','lxx_writings']);
    const makeChips = groups => groups.map(g => {
        const i = bookFilterState.indexOf(g);
        return `<div class="filter-chip filter-chip-toggle ${g.enabled ? 'on' : 'off'}"
             onclick="toggleBookGroup(${i})">
            <div class="filter-chip-dot">${g.enabled ? '✓' : ''}</div>
            <span>${g.label}</span>
        </div>`;
    }).join('');
    const ntGroups  = bookFilterState.filter(g => !LXX_KEYS.has(g.key));
    const lxxGroups = bookFilterState.filter(g =>  LXX_KEYS.has(g.key));
    el.innerHTML =
        makeChips(ntGroups) +
        (lxxGroups.length ? `<div class="book-section-sep">LXX</div>` + makeChips(lxxGroups) : '');
    const btn = document.getElementById('book-filter-toggle-btn');
    const activeCount = bookFilterState.filter(g => g.enabled).length;
    const allOn = activeCount === bookFilterState.length;
    const countLabel = allOn ? '全書物' : `${activeCount} グループ選択中`;
    btn.childNodes[0].textContent = `📚 書物範囲（${countLabel}） `;
}

function toggleBookGroup(i) {
    bookFilterState[i].enabled = !bookFilterState[i].enabled;
    renderBookFilterChips();
    renderSharedFilterBar();
    notifyFilterChanged();
}

function toggleBookFilterPanel() {
    const panel = document.getElementById('book-filter-chips');
    const btn   = document.getElementById('book-filter-toggle-btn');
    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
}

renderBookFilterChips();
renderSharedFilterBar();

function buildRefLabel(ref) {
    const r = String(ref||'');
    const m = r.match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
    if (m) return `${BOOK_JP[m[1]]||m[1]} ${m[2]}:${m[3]}`;
    if (r.length===6 && /^\d+$/.test(r)) {
        const bk = BOOK_MAP[r.slice(0,2)];
        return `${(bk&&BOOK_JP[bk])||bk||r.slice(0,2)} ${parseInt(r.slice(2,4))}:${parseInt(r.slice(4,6))}`;
    }
    return r;
}

function cleanText(entry) {
    return entry.word || entry.normalized || entry.text || '';
}

/* ══════════════════════════════════════════
   日本語訳マップ
   ══════════════════════════════════════════ */
const _jaMap = new Map();
const _japaneseMap = new Map();

const _refToJaKey = (() => {
    const KEY_TO_CODE = {};
    Object.entries(BOOK_MAP).forEach(([code,key])=>{KEY_TO_CODE[key]=code;});
    return function(ref) {
        const m = String(ref||'').match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
        if (!m) return null;
        const code = KEY_TO_CODE[m[1]];
        if (!code) return null;
        return `${code}${String(m[2]).padStart(2,'0')}${String(m[3]).padStart(2,'0')}`;
    };
})();

function getJaVerse(entry) {
    const key = _refToJaKey(entry.ref);
    if (key && _jaMap.has(key)) return _jaMap.get(key);
    return entry.gloss || entry.english || '';
}

/* ══════════════════════════════════════════
   形態論デコード（他画面と共通）
   ══════════════════════════════════════════ */
function decodeMorph(entry) {
    const raw = entry.morph || entry.morphology || '';
    const m   = {};
    // UGNT: e.g. "V-PAI-3S"
    const vMatch = raw.match(/^V-([PA])([AI])([I-SOPN])-(\d)([SP])/);
    if (vMatch) {
        m.pos   = 'verb';
        m.tense = {P:'現在',A:'アオリスト',I:'未完了',F:'未来',2:'第二アオリスト',R:'完了'}[vMatch[1]]||vMatch[1];
        m.voice = {A:'能動',M:'中動',P:'受動'}[vMatch[2]]||vMatch[2];
        m.mood  = {I:'直説法',S:'接続法',O:'希求法',P:'分詞',N:'不定詞',M:'命令法'}[vMatch[3]]||vMatch[3];
        m.person = vMatch[4]; m.number = vMatch[5]==='S'?'単数':'複数';
        return m;
    }
    // Noun/Adj: "N-NSM" "A-ASN"
    const nMatch = raw.match(/^[NA]-([NGDA])([SP])([MFN])/);
    if (nMatch) {
        m.pos  = raw[0]==='N'?'noun':'adj';
        m.case = {N:'主格',G:'属格',D:'与格',A:'対格'}[nMatch[1]]||nMatch[1];
        m.number = nMatch[2]==='S'?'単数':'複数';
        m.gender = {M:'男性',F:'女性',N:'中性'}[nMatch[3]]||nMatch[3];
        return m;
    }
    m.raw = raw;
    return m;
}

function entryPosCode(entry) {
    const pos = (entry.pos||'').toUpperCase().replace(/-$/,'');
    return pos || decodeMorph(entry).pos || '';
}

/* ─── Layer 2: 形態論推定で候補生成 ────────────────────────── */
function inferSemanticCandidates(entry) {
    const lemma = (entry.lemma || entry.word || '').trim();
    const pos   = entryPosCode(entry) || (entry.pos || '');

    // フィールド → 最大スコア で集計
    const fieldMap = {};

    function addField(field, score, reason) {
        if (!fieldMap[field]) fieldMap[field] = { score: 0, reasons: [] };
        if (score > fieldMap[field].score) fieldMap[field].score = score;
        fieldMap[field].reasons.push(reason);
    }

    // 語幹・接辞ルールを適用
    for (const rule of MORPHO_RULES) {
        if (rule.test(lemma)) {
            addField(rule.field, rule.score, rule.reason);
        }
    }

    // 品詞デフォルト（既にフィールドが付与されていれば低優先）
    const posKey = pos.toLowerCase().replace(/^v$/,'verb').replace(/^n$/,'noun').replace(/^a$/,'adj');
    const defaults = POS_DEFAULT_FIELDS[posKey] || POS_DEFAULT_FIELDS['noun'];
    for (const d of defaults) {
        if (!fieldMap[d.field] || fieldMap[d.field].score < d.score) {
            addField(d.field, d.score, d.reason);
        }
    }

    // フィールドが全くなければ存在・状態をデフォルト
    if (Object.keys(fieldMap).length === 0) {
        addField('存在・状態', 20, 'デフォルト：語の分類が特定できない場合');
    }

    return fieldMap;
}

/* ─── Layer 3: 文脈補正をフィールドマップに適用 ─────────────── */
function applyContextualBoosts(fieldMap, tokens) {
    const verseLemmas = tokens.map(t => (t.lemma||'').trim());
    const verseTexts  = tokens.map(t => cleanText(t));
    const contextBoosts = []; // { field, value, reason }

    for (const rule of CONTEXT_RULES) {
        const input = rule.useTexts ? verseTexts : verseLemmas;
        if (rule.test(input)) {
            for (const [field, bonus] of Object.entries(rule.boosts)) {
                if (!fieldMap[field]) fieldMap[field] = { score: 0, reasons: [] };
                fieldMap[field].score += bonus;
                fieldMap[field].reasons.push(`文脈補正：${rule.reason}`);
                contextBoosts.push({ field, value: bonus, reason: rule.name });
            }
        }
    }
    return contextBoosts;
}

/* ─── フィールドマップを候補配列に変換 ─────────────────────── */
function fieldMapToCandidates(fieldMap, lemma, pos, contextBoosts, morphoDeltas) {
    const entries = Object.entries(fieldMap).map(([field, data]) => ({
        field,
        rawScore: data.score,
        reasons:  data.reasons.slice(0, 4),
    }));

    entries.sort((a, b) => b.rawScore - a.rawScore);
    const top = entries.slice(0, 5);

    const maxRaw = Math.max(...top.map(e => e.rawScore), 1);

    return top.map((e, i) => {
        const fieldInfo = SEMANTIC_FIELDS[e.field] || { color:'#6e6e73', icon:'◈' };

        // デルタ内訳を構築
        const deltas = [];

        // 形態論由来のデルタ（このフィールドに貢献したmorphoルール）
        for (const d of morphoDeltas) {
            if (d.field === e.field) {
                deltas.push({ label: d.reason, value: d.baseScore });
            }
        }

        // 文脈補正デルタ（このフィールドへの補正）
        for (const cb of contextBoosts) {
            if (cb.field === e.field) {
                deltas.push({ label: cb.reason, value: cb.value });
            }
        }

        // 品詞ベース
        const posBonus = 10;
        deltas.unshift({ label: `品詞推定（${pos || '未特定'}）`, value: posBonus });

        // スコア正規化
        const score = Math.round((e.rawScore / maxRaw) * 100);

        // 意味ラベルと翻訳候補を生成
        const { meaning, sub, translation } = buildMeaningLabel(e.field, lemma, pos);

        return {
            meaning,
            sub,
            translation,
            base:     Math.min(e.rawScore, 60),
            coocKeys: [],
            objType:  'any',
            subjType: 'any',
            score,
            rawScore: e.rawScore,
            deltas,
            reasons:  e.reasons,
            semanticField: e.field,
            fieldColor:    fieldInfo.color,
            fieldIcon:     fieldInfo.icon,
            isInferred:    true,
        };
    });
}

/* ─── 正規化スコア ──────────────────────────────────────────── */
function normalizeSemanticScores(candidates) {
    if (!candidates.length) return candidates;
    const max = Math.max(...candidates.map(c => c.rawScore), 1);
    return candidates.map(c => ({ ...c, score: Math.round((c.rawScore / max) * 100) }));
}

/* ══════════════════════════════════════════
   統合スコア計算（Layer 1 → 2 → 3）
   ══════════════════════════════════════════ */
function computeScores(lemma, tokens, targetWord) {
    // ── Layer 1: curated DB lookup ──
    const curatedCandidates = SEMANTIC_DB[lemma];
    if (curatedCandidates && curatedCandidates.length) {
        return computeScoresFromDB(curatedCandidates, tokens, lemma);
    }

    // ── Layer 2 + 3: dynamic inference ──
    // 対象 entry を tokens から探す
    const targetEntry = tokens.find(t =>
        cleanText(t) === targetWord ||
        (t.lemma && t.lemma === lemma)
    ) || { lemma, word: targetWord, pos: params.pos };

    return computeScoresInferred(targetEntry, tokens, lemma);
}

/* ─── Layer 1 由来（既存ロジックを強化） ────────────────────── */
function computeScoresFromDB(candidates, tokens, lemma) {
    const verseLemmas = tokens.map(t => (t.lemma||'').trim());
    const verseTexts  = tokens.map(t => cleanText(t));

    const hasPersonObj = verseLemmas.some(l =>
        ['θεός','κύριος','Ἰησοῦς','χριστός','ἄνθρωπος','αὐτός','ἡμεῖς','σύ'].includes(l));
    const hasAbstractObj = verseLemmas.some(l =>
        ['ζωή','λόγος','ἀλήθεια','πίστις','χάρις','ἐλπίς','νόμος','θέλημα'].includes(l));
    const hasGodSubj = verseLemmas.some(l =>
        ['θεός','κύριος','Ἰησοῦς','χριστός','πατήρ'].includes(l));

    const scored = candidates.map(c => {
        const deltas = [];
        let s = c.base;
        deltas.push({ label: '新約使用頻度（ベース）', value: c.base });

        const coocHits = c.coocKeys.filter(k =>
            verseLemmas.includes(k) || verseTexts.some(t => t.includes(k))
        );
        if (coocHits.length > 0) {
            const bonus = coocHits.length * 8;
            s += bonus;
            deltas.push({ label: `共起語一致（${coocHits.slice(0,2).join('・')}）`, value: bonus });
        }

        if (c.objType === 'person' && hasPersonObj) {
            s += 10;
            deltas.push({ label: '人称目的語あり（期待値と一致）', value: +10 });
        } else if (c.objType === 'abstract' && hasAbstractObj) {
            s += 8;
            deltas.push({ label: '抽象名詞目的語あり（期待値と一致）', value: +8 });
        } else if (c.objType === 'any') {
            s += 4;
            deltas.push({ label: '目的語タイプ：制限なし', value: +4 });
        }

        if (c.subjType === 'god' && hasGodSubj) {
            s += 8;
            deltas.push({ label: '神・キリストが主語（神学的文脈）', value: +8 });
        } else if (c.subjType === 'person' && !hasGodSubj) {
            s += 5;
            deltas.push({ label: '人称主語あり（期待値と一致）', value: +5 });
        } else if (c.subjType === 'any') {
            s += 2;
            deltas.push({ label: '主語タイプ：制限なし', value: +2 });
        }

        return { ...c, rawScore: Math.min(s, 100), deltas, isInferred: false };
    });

    const max = Math.max(...scored.map(x => x.rawScore), 1);
    const out = scored.map(x => ({
        ...x,
        score: Math.round((x.rawScore / max) * 100),
    }));
    out.sort((a, b) => b.score - a.score);
    return out.slice(0, 5);
}

/* ─── Layer 2 + 3 由来（推定パス） ──────────────────────────── */
function computeScoresInferred(entry, tokens, lemma) {
    const fieldMap = inferSemanticCandidates(entry);

    // 形態論由来デルタ収集
    const morphoDeltas = [];
    for (const rule of MORPHO_RULES) {
        if (rule.test(lemma)) {
            morphoDeltas.push({ field: rule.field, baseScore: rule.score, reason: rule.reason });
        }
    }

    const contextBoosts = applyContextualBoosts(fieldMap, tokens);
    const pos = entryPosCode(entry) || (entry.pos || '');
    const candidates = fieldMapToCandidates(fieldMap, lemma, pos, contextBoosts, morphoDeltas);

    return candidates;
}

/* ══════════════════════════════════════════
   Semantic XSC パネル生成ユーティリティ
   ══════════════════════════════════════════ */
function buildSemanticXscPanel(cand, panelId) {
    const deltas = cand.deltas || [];
    if (!deltas.length) return '';

    // ベーススコアを除いた加算要因のみをデルタ表示（ベースは別枠）
    const effectiveDeltas = deltas.filter(d => d.label !== '新約使用頻度（ベース）');
    if (!effectiveDeltas.length) return '';

    const maxAbs = Math.max(...effectiveDeltas.map(d => Math.abs(d.value)), 1);

    const rows = effectiveDeltas.map(d => {
        const cls  = d.value > 0 ? 'pos' : d.value < 0 ? 'neg' : '';
        const sign = d.value > 0 ? '+' : '';
        const barW = Math.round(Math.abs(d.value) / maxAbs * 100);
        const barColor = d.value > 0 ? 'rgba(45,106,79,0.55)' : 'rgba(176,80,80,0.45)';
        return `<div class="xsc-row">
            <span class="xsc-delta ${cls}">${sign}${d.value}</span>
            <div class="xsc-bar-wrap"><div class="xsc-bar" style="width:${barW}%;background:${barColor};"></div></div>
            <span class="xsc-row-label">${d.label}</span>
        </div>`;
    }).join('');

    return `<div class="xsc-panel" id="${panelId}" style="margin-top:6px;">
        <div class="xsc-head" onclick="event.stopPropagation();toggleXsc('${panelId}')">
            <span class="xsc-head-label">なぜこのスコア？</span>
            <span class="xsc-arrow">▾</span>
        </div>
        <div class="xsc-body">
            <div style="font-size:0.58rem;font-weight:700;color:var(--text-hint);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;">加算要因の内訳</div>
            <div class="xsc-rows">${rows}</div>
            <div style="font-size:0.65rem;color:var(--text-hint);margin-top:5px;border-top:1px solid var(--border);padding-top:5px;">
                ベース頻度スコア: ${cand.base} + 文脈加算 → 正規化後 ${cand.score}%
            </div>
        </div>
    </div>`;
}

function toggleXsc(panelId) {
    const panel = document.getElementById(panelId);
    if (panel) panel.classList.toggle('open');
}

/* ══════════════════════════════════════════
   適合理由テキスト生成
   ══════════════════════════════════════════ */
function buildReasons(cand, tokens, lemma) {
    // 推定パス（Layer 2/3）の場合は専用理由を生成
    if (cand.isInferred) {
        return buildInferredReasons(cand, tokens, lemma);
    }

    const verseLemmas = tokens.map(t => (t.lemma||'').trim());
    const reasons = [];

    // 共起語が見つかった場合
    const hits = cand.coocKeys.filter(k => verseLemmas.includes(k));
    if (hits.length > 0) {
        const hitWords = hits.slice(0, 2).join('・');
        reasons.push({
            icon: '◎',
            text: `文中に <strong>${hitWords}</strong> という語があり、「${cand.meaning}」との共起が新約で多い`,
        });
    }

    const hasPersonObj = verseLemmas.some(l =>
        ['θεός','κύριος','Ἰησοῦς','χριστός','ἄνθρωπος','αὐτός'].includes(l));
    const hasAbstractObj = verseLemmas.some(l =>
        ['ζωή','λόγος','ἀλήθεια','πίστις','χάρις','ἐλπίς','νόμος'].includes(l));

    if (cand.objType === 'person' && hasPersonObj) {
        reasons.push({ icon: '◎', text: '動詞の目的語または対象が<strong>人称語</strong>（人・神）であり、「' + cand.meaning + '」が自然' });
    }
    if (cand.objType === 'abstract' && hasAbstractObj) {
        reasons.push({ icon: '◎', text: '目的語・補語が<strong>抽象名詞</strong>（言葉・真理など）であり、「' + cand.meaning + '」の用法と一致' });
    }

    if (cand.base >= 55) {
        reasons.push({ icon: '📖', text: '新約聖書でのこの意味での使用頻度が<strong>最も高い</strong>' });
    } else if (cand.base >= 35) {
        reasons.push({ icon: '📖', text: '新約聖書でのこの意味での使用例が<strong>複数</strong>確認できる' });
    }

    const hasGodSubj = verseLemmas.some(l =>
        ['θεός','κύριος','Ἰησοῦς','χριστός','πατήρ'].includes(l));
    if (cand.subjType === 'god' && hasGodSubj) {
        reasons.push({ icon: '◎', text: '文の主語または主体が<strong>神・キリスト</strong>であり、この意味と整合する' });
    }

    if (reasons.length === 0) {
        reasons.push({ icon: '○', text: '文脈の品詞・格構造からみてこの意味が成立する' });
    }

    return reasons.slice(0, 3);
}

/* ── 推定パス専用理由生成 ── */
function buildInferredReasons(cand, tokens, lemma) {
    const reasons = [];
    const fieldIcon = cand.fieldIcon || '◈';
    const fieldName = cand.semanticField || cand.meaning;

    // 形態論由来の理由
    const morphoReasons = (cand.reasons || []).filter(r => !r.startsWith('文脈補正'));
    const contextReasons = (cand.reasons || []).filter(r => r.startsWith('文脈補正'));

    if (morphoReasons.length > 0) {
        reasons.push({
            icon: fieldIcon,
            text: `<strong>形態論推定</strong>：${morphoReasons[0]}`,
        });
    }
    if (morphoReasons.length > 1) {
        reasons.push({
            icon: '◈',
            text: morphoReasons[1],
        });
    }

    if (contextReasons.length > 0) {
        const ctx = contextReasons[0].replace('文脈補正：', '');
        reasons.push({
            icon: '⟳',
            text: `<strong>文脈補正</strong>：${ctx}`,
        });
    }

    // 意味フィールド説明
    if (reasons.length < 2) {
        reasons.push({
            icon: '○',
            text: `意味フィールド「<strong>${fieldName}</strong>」に属する語として推定`,
        });
    }

    return reasons.slice(0, 3);
}

    const SEMANTIC_POS = new Set(['N','V','A','D','R','P']);
    const PREP_LEMMAS  = new Set(['εἰς','ἐν','ἐκ','ἀπό','πρός','ὑπό','διά','κατά','περί','ἐπί','μετά','παρά','σύν','ἀντί','ἀνά']);

    const neighbors = tokens.filter(t => {
        const w = cleanText(t);
        if (!w || w === targetWord) return false;
        const pos = (t.pos || '').toUpperCase().replace(/-$/, '');
        if (!SEMANTIC_POS.has(pos)) return false;
        // 前置詞の機能語は除外（意味語のみ残す）
        const lemma = (t.lemma || '').trim();
        if (PREP_LEMMAS.has(lemma)) return false;
        return true;
    }).slice(0, 8); // 最大8語

    // 対象語表示
    const targetHTML = `
        <div class="sem-ctx-target">
            <span class="sem-ctx-target-word">${targetWord}</span>
            <span class="sem-ctx-target-label">対象語</span>
        </div>`;

    // 共起語チップ
    const POS_ROLE = { V:'動詞', N:'名詞', A:'形容詞', D:'副詞', R:'関係', P:'代名詞' };
    const neighborChips = neighbors.length > 0
        ? `<div class="sem-cooc-section">
            <div class="sem-cooc-label">意味的共起語</div>
            <div class="sem-cooc-chips">
                ${neighbors.map(t => {
                    const w   = cleanText(t);
                    const pos = (t.pos || '').toUpperCase().replace(/-$/, '');
                    const role = POS_ROLE[pos] || '';
                    return `<span class="sem-cooc-chip semantic-neighbor">
                        <span class="chip-role">${role}</span>${w}
                    </span>`;
                }).join('')}
            </div>
          </div>`
        : '';

    // 日本語訳（短縮版）
    const jaShort = jaVerse ? `<div class="sem-ja-note">${jaVerse}</div>` : '';

    container.innerHTML = targetHTML + neighborChips + jaShort;
}

/* ── ② 候補リスト描画 ── */
function renderCandidates(candidates) {
    const container = document.getElementById('candidates-list');
    if (!candidates.length) {
        container.innerHTML = `<div style="padding:20px;color:var(--text-hint);font-size:0.82rem;text-align:center;">候補が見つかりませんでした</div>`;
        return;
    }

    // 推定パスかどうかをチェック
    const hasInferred = candidates.some(c => c.isInferred);
    if (hasInferred) {
        const banner = document.getElementById('infer-banner');
        if (banner) banner.style.display = 'flex';
    }

    container.innerHTML = candidates.map((c, i) => {
        const rank    = i + 1;
        const rankCls = `rank-${rank}`;
        const isTop   = rank === 1;
        const delay   = i * 40;
        const panelId = `xsc-sem-${i}`;

        const fieldBadge = c.isInferred && c.semanticField
            ? `<span class="field-badge" style="color:${c.fieldColor||'var(--accent)'};border-color:${c.fieldColor||'var(--accent)'}33;">${c.fieldIcon||'◈'} ${c.semanticField}</span>`
            : '';

        const barStyle = c.isInferred && c.fieldColor ? `background:${c.fieldColor};` : '';
        const fillStyle = c.isInferred && c.fieldColor ? `background:${c.fieldColor};width:${c.score}%` : `width:${c.score}%`;

        const xscHTML = buildSemanticXscPanel(c, panelId);

        return `
        <div class="cand-card ${rankCls} ${isTop ? 'active' : ''}"
             style="animation-delay:${delay}ms"
             onclick="selectCandidate(${i})">
            <div class="cand-bar-accent" style="${barStyle}"></div>
            <div class="cand-body">
                <div class="cand-top">
                    <span class="cand-rank">${rank}</span>
                    <span class="cand-meaning">
                        ${c.meaning}
                        ${c.sub ? `<span class="cand-meaning-sub">${c.sub}</span>` : ''}
                    </span>
                    ${isTop ? `<span class="top-badge" style="background:var(--c-top-bg);border-color:var(--c-top-mid);color:var(--c-top);">#1</span>` : ''}
                </div>
                ${fieldBadge ? `<div style="margin-bottom:6px;">${fieldBadge}</div>` : ''}
                <div class="cand-score-row">
                    <div class="cand-score-track">
                        <div class="cand-score-fill" style="${fillStyle}"></div>
                    </div>
                    <span class="cand-score-pct">${c.score}%</span>
                </div>
                ${xscHTML}
            </div>
        </div>`;
    }).join('');
}

/* renderReasons, renderGuide, renderTranslation: removed (analysis tool — no AI interpretation) */

/* ── ⑦ 比較用例描画 ── */
function renderExamples(lemma) {
    const examples = EXAMPLE_DB[lemma];
    const block    = document.getElementById('examples-block');
    const list     = document.getElementById('examples-list');
    if (!examples || !examples.length) {
        block.style.display = 'none';
        return;
    }
    block.style.display = '';
    list.innerHTML = examples.map(ex => `
        <div class="example-item">
            <div class="example-ref">${ex.ref}</div>
            <div class="example-greek">${ex.greek.replace(ex.target, `<span class="ex-target">${ex.target}</span>`)}</div>
            <div class="example-ja">${ex.ja}</div>
            ${ex.nuance ? `<div><span class="example-nuance">${ex.nuance}</span></div>` : ''}
        </div>
    `).join('');
}

/* ── 候補選択 ── */
function selectCandidate(idx) {
    _activeIdx = idx;
    document.querySelectorAll('.cand-card').forEach((el, i) => {
        el.classList.toggle('active', i === idx);
    });
}

/* ── 全体初期化 ── */
function renderAll(tokens, targetWord, jaVerse) {
    _tokens = tokens;

    const targetEntry = tokens.find(t =>
        cleanText(t) === targetWord ||
        (t.lemma && cleanText(t).startsWith(targetWord.slice(0,3)))
    );
    _lemma = targetEntry?.lemma || params.lemma || targetWord;

    // ① 意味的文脈表示（共起語中心）
    renderSemanticContext(tokens, targetWord, jaVerse);

    if (jaVerse) {
        const jaEl = document.getElementById('sentence-ja');
        if (jaEl) { jaEl.dataset.raw = jaVerse; }
    }

    // スコア計算
    _candidates = computeScores(_lemma, tokens, targetWord);

    // ② 候補リスト（比較UI）
    renderCandidates(_candidates);

    // ⑦ 用例
    renderExamples(_lemma);
}

/* ══════════════════════════════════════════
   ナビゲーション
   ══════════════════════════════════════════ */
function navTo(target, e) {
    e.preventDefault();
    const enabledGroups = bookFilterState.filter(g => g.enabled).map(g => g.key);
    const enabledBooks  = bookFilterState.filter(g => g.enabled).flatMap(g => g.books);
    const allOn = bookFilterState.every(g => g.enabled);
    const filters = allOn ? null : {
        books:  enabledBooks,
        groups: enabledGroups,
        scope:  enabledGroups.length === 1 ? enabledGroups[0] : '',
    };
    const msgData = { type: `NAV_TO_${target.toUpperCase()}`, ref: params.ref, word: params.word, filters };
    if (window.parent && window.parent !== window) {
        window.parent.postMessage(msgData, '*');
    } else if (window.opener && !window.opener.closed) {
        window.opener.postMessage(msgData, '*');
    } else {
        const msg = target === 'morph' ? '形態論ツール' : '統語論ツール';
        alert(`${msg}への導線は、メインアプリ経由でご利用ください。`);
    }
}

/* ══════════════════════════════════════════
   親からのフィルター同期受信
   ══════════════════════════════════════════ */
window.addEventListener('message', function(e) {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type === 'FILTER_CHANGED' && e.data.filters) {
        const f = e.data.filters;
        if (f.groups && Array.isArray(f.groups)) {
            const groupSet = new Set(f.groups);
            bookFilterState = bookFilterState.map(g => ({
                ...g,
                enabled: f.groups.length === 0 ? true : groupSet.has(g.key)
            }));
            renderBookFilterChips();
            renderSharedFilterBar();
        }
    }
});

/* ══════════════════════════════════════════
   データ取得（他画面と共通ロジック）
   ══════════════════════════════════════════ */
const JA_FOLDER = 'bible_jp';
const ALL_BOOKS = [
    {key:'ROM',ch:16},{key:'1CO',ch:16},{key:'2CO',ch:13},{key:'GAL',ch:6},
    {key:'EPH',ch:6},{key:'PHP',ch:4},{key:'COL',ch:4},{key:'1TH',ch:5},
    {key:'2TH',ch:3},{key:'1TI',ch:6},{key:'2TI',ch:4},{key:'TIT',ch:3},
    {key:'PHM',ch:1},
];

function buildAllChapterPaths() {
    const p = [];
    for (const b of ALL_BOOKS) for (let c = 1; c <= b.ch; c++)
        p.push({ key: b.key, ch: c, path: `./bible_data/${b.key}/${c}.json` });
    return p;
}

async function fetchInBatches(tasks, sz, onProg) {
    let all = [];
    for (let i = 0; i < tasks.length; i += sz) {
        const results = await Promise.allSettled(
            tasks.slice(i, i + sz).map(t =>
                fetch(t.path).then(r => r.ok ? r.json() : null).catch(() => null)
                .then(data => {
                    if (!Array.isArray(data)) return null;
                    data.forEach(entry => { entry._bookKey = t.key; });
                    return data;
                })
            )
        );
        results.forEach(r => { if (r.status === 'fulfilled' && Array.isArray(r.value)) all = all.concat(r.value); });
        onProg(Math.min(i + sz, tasks.length), tasks.length);
    }
    return all;
}

async function fetchJaData(morphPaths) {
    const KEY_TO_CODE = {};
    Object.entries(BOOK_MAP).forEach(([code, key]) => { KEY_TO_CODE[key] = code; });
    return Promise.allSettled(
        morphPaths.map(t => ({ ...t, path: `./${JA_FOLDER}/${t.key}/${t.ch}.json` }))
        .map(t =>
            fetch(t.path).then(r => r.ok ? r.json() : null).catch(() => null)
            .then(data => {
                if (!data) return;
                const vers = data.verses; if (!vers || typeof vers !== 'object') return;
                const bc = KEY_TO_CODE[t.key]; if (!bc) return;
                const cs = String(t.ch).padStart(2, '0');
                Object.entries(vers).forEach(([vn, tx]) => {
                    const vs = String(parseInt(vn)).padStart(2, '0');
                    _jaMap.set(`${bc}${cs}${vs}`, String(tx));
                });
            })
        )
    );
}

async function fetchJapaneseTSV() {
    try {
        const res = await fetch('./macula-greek-SBLGNT.tsv');
        if (!res.ok) return;
        const text  = await res.text();
        const lines = text.split('\n');
        for (let i = 1; i < lines.length; i++) {
            const c = lines[i].split('\t');
            if (c.length < 12) continue;
            const norm = (c[11] || '').trim(), ja = (c[6] || '').trim();
            if (norm && ja && !_japaneseMap.has(norm)) _japaneseMap.set(norm, ja);
        }
    } catch(e) { console.warn('TSV読み込み失敗:', e); }
}

function getVerseTokens(allData, ref) {
    const prefix = String(ref).replace(/!.*$/, '').trim();
    return allData.filter(e => String(e.ref || '').replace(/!.*$/, '').trim() === prefix);
}

/* ══════════════════════════════════════════
   初期化
   ══════════════════════════════════════════ */
document.getElementById('bc-ref').textContent  = buildRefLabel(params.ref) || params.ref || '—';
document.getElementById('bc-word').textContent = params.word || '—';

(async function() {
    const paths = buildAllChapterPaths();

    const allData = await fetchInBatches(paths, 20, (done, ttl) => {
        const pct = Math.round(done / ttl * 100);
        const bar = document.getElementById('load-bar');
        const txt = document.getElementById('load-text');
        if (bar) bar.style.width = pct + '%';
        if (txt) txt.textContent = `読み込み中 ${done} / ${ttl}`;
    });

    if (!allData.length) {
        document.getElementById('main-loading').innerHTML =
            `<p style="color:#c00;font-size:0.82rem;">データが見つかりませんでした。<code>bible_data/ROM/1.json</code> の形式で配置してください。</p>`;
        return;
    }

    const txt = document.getElementById('load-text');
    if (txt) txt.textContent = '訳文を読み込み中…';
    await fetchJaData(paths);
    await fetchJapaneseTSV();

    window._morphData = allData;

    const ref    = params.ref;
    const tokens = getVerseTokens(allData, ref);

    if (!tokens.length) {
        document.getElementById('main-loading').innerHTML =
            `<p style="color:#888;font-size:0.82rem;">節「${ref}」のデータが見つかりませんでした。</p>`;
        return;
    }

    // 参照ラベル
    const refLabel = buildRefLabel(ref);
    document.getElementById('sent-ref-badge').textContent = refLabel || ref;
    document.getElementById('bc-ref').textContent = refLabel || ref;

    // 日本語訳
    const jaVerse = getJaVerse(tokens[0]);

    // 表示
    document.getElementById('main-loading').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';

    renderAll(tokens, params.word, jaVerse);
})();
</script>
