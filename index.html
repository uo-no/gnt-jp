<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNT Study Explorer - Library Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    :root {
        --bg-paper: #f4f1ea;
        --bg-panel: #ebe7de;
        --bg-sidebar: #f7f6f3;
        --bg-card: #f9f7f2;
        --text-main: #2c2c2c;
        --text-sub: #8e8e8e;
        --accent-dark: #3d3d3d;
        --highlight: #b2bec3;
        --border-soft: rgba(0,0,0,0.06);
    }

    body { 
        font-family: 'Inter', 'Noto Serif JP', serif; 
        line-height: 1.8; 
        background: var(--bg-paper); 
        color: var(--text-main); 
        margin: 0; padding: 0;
        overflow: hidden;
    }

    .main-layout { display: flex; height: 100vh; width: 100vw; }

    /* --- 左サイドメニュー --- */
    .nav-sidebar {
        width: 240px;
        background: var(--bg-sidebar);
        border-right: 1px solid var(--border-soft);
        display: flex;
        flex-direction: column;
        transition: width 0.3s ease;
        overflow: hidden;
        flex-shrink: 0;
    }
    .nav-sidebar.collapsed { width: 60px; }
    .sidebar-top { padding: 20px 15px; display: flex; align-items: center; gap: 12px; }
    .sidebar-toggle-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-sub); width: 30px; padding: 0; }
    .sidebar-logo { font-weight: bold; font-size: 0.9rem; white-space: nowrap; }

    .sidebar-menu { flex: 1; padding: 10px; overflow-y: auto; }
    .sidebar-section { margin-bottom: 25px; }
    .section-label { font-size: 0.7rem; font-weight: bold; color: var(--text-sub); padding-left: 12px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
    
    .menu-item {
        padding: 8px 12px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        transition: background 0.2s;
        white-space: nowrap;
    }
    .menu-item:hover { background: rgba(0,0,0,0.05); }
    .menu-item.active { background: rgba(0,0,0,0.08); font-weight: bold; }
    .collapsed .menu-text, .collapsed .section-label { display: none; }

    .sidebar-select, .sidebar-input {
        background: transparent;
        border: 1px solid transparent;
        color: var(--text-main);
        width: 100%;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.9rem;
        outline: none;
    }
    .sidebar-input { width: 60px; border-bottom: 1px solid transparent; transition: border 0.2s; }
    .sidebar-input:focus { border-bottom-color: var(--highlight); cursor: text; }

    /* --- 中央メインエリア --- */
    .container { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--bg-paper); }
    .app-header { padding: 20px 40px; border-bottom: 1px solid var(--border-soft); background: var(--bg-paper); }
    .header-content { display: flex; align-items: center; justify-content: space-between; }
    .breadcrumb { display: flex; align-items: center; gap: 10px; color: var(--text-sub); font-size: 0.9rem; }
    .breadcrumb h1 { font-size: 1.2rem; margin: 0; color: var(--text-main); font-weight: 700; }
    .separator { opacity: 0.4; }

    #app { flex: 1; overflow-y: auto; padding: 20px 40px 60px 40px; }

    /* --- 右サイドパネル --- */
    #open-panel-btn {
        background: transparent; border: none; padding: 0 10px; cursor: pointer; color: var(--highlight); 
        font-size: 1.3rem; transition: transform 0.2s, opacity 0.2s; line-height: 1;
    }
    #open-panel-btn:hover { color: #636e72; transform: scale(1.1); }

    #side-panel { width: 380px; background: var(--bg-panel); border-left: 1px solid var(--border-soft); padding: 25px; display: flex; flex-direction: column; flex-shrink: 0; }
    .panel-header { font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border-soft); display: flex; justify-content: space-between; color: var(--accent-dark); }
    #panel-content { flex: 1; overflow-y: auto; }

    /* --- 装飾 --- */
    .verse-block { border-bottom: 1px solid var(--border-soft); transition: background 0.2s; }
    .jp-section { padding: 12px 15px; cursor: pointer; display: flex; align-items: baseline; }
    .jp-section:hover { background: rgba(0,0,0,0.02); }
    .v-num { color: #b2bec3; margin-right: 15px; font-size: 0.8rem; font-weight: bold; }
    .jp-text { font-size: 1.1rem; }

    .word-card { 
        background: var(--bg-card); padding: 10px 15px; border-radius: 6px; display: flex; justify-content: space-between; 
        align-items: baseline; margin-bottom: 10px; border: 1px solid var(--border-soft); cursor: pointer; transition: all 0.2s;
    }
    .word-card:hover { border-color: var(--highlight); transform: translateY(-1px); }
    .greek-word { font-family: 'Gentium Plus', serif; font-size: 1.5rem; line-height: 1.3; }
    
    #word-detail-view { background: var(--bg-card); border: 1px solid var(--highlight); border-radius: 8px; padding: 18px; display: none; margin-top: 15px; animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* 文法装飾クラス */
    .present-text { border-bottom: 2px solid var(--highlight); }
    .aorist-text  { border-bottom: 2px dotted var(--highlight); }
    .perfect-text { border-bottom: 2px double var(--highlight); }
    
    .indicative-text { background: rgba(211, 84, 0, 0.1); border-radius: 2px; padding: 0 4px; }
    .imperative-text { background: rgba(211, 84, 0, 0.1); border-radius: 2px; padding: 0 4px; }

    .grammar-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; font-size: 0.65rem; color: var(--text-sub); border-top: 1px solid var(--border-soft); padding-top: 5px; }
    .tag-jp { color: #5f6a6a; font-size: 0.8rem; margin-left: 10px; }
    .strong-num { font-size: 0.65rem; color: #b2babb; font-family: monospace; }
    </style>
</head>
<body>

<div class="main-layout">
    <nav id="nav-sidebar" class="nav-sidebar">
        <div class="sidebar-top">
            <button class="sidebar-toggle-btn" onclick="toggleSidebar()">☰</button>
            <span class="menu-text sidebar-logo">GNT Explorer</span>
        </div>
        
        <div class="sidebar-menu">
            <div class="sidebar-section">
                <div class="section-label">聖書</div>
                <div class="menu-item active">
                    <span class="icon">📖</span>
                    <select id="bookSelect" onchange="changePage()" class="sidebar-select menu-text">
                        <option value="ROM">ローマ</option>
                        <option value="1CO">第一コリント</option>
                        <option value="2CO">第二コリント</option>
                        <option value="GAL">ガラテヤ</option>
                    </select>
                </div>
                <div class="menu-item">
                    <span class="icon">#</span>
                    <input type="number" id="chInput" value="1" min="1" onchange="changePage()" class="sidebar-input menu-text">
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-label">索引設定</div>
                <div class="menu-item"><span class="icon">🔍</span> <span class="menu-text">検索</span></div>
                <div class="menu-item" onclick="showAppInfo()">
                        <span class="icon">📜</span> <span class="menu-text">出典・ポリシー</span>
                    </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <header class="app-header">
            <div class="header-content">
                <div class="breadcrumb">
                    <span class="root-name">新約聖書</span>
                    <span class="separator">/</span>
                    <h1 id="view-title">読み込み中...</h1>
                </div>
                <button id="open-panel-btn" onclick="toggleSidePanel()" style="display:none;" title="語形分解を表示">
                    <i class="fa-solid fa-circle-info"></i>
                </button>
            </div>
        </header>
        <div id="app"></div>
    </div>

    <aside id="side-panel">
        <div class="panel-header">
            <span>語形分解</span>
            <div style="display: flex; gap: 10px; align-items: center;">
                <span id="active-v" style="font-size: 0.8rem; color: var(--text-sub);"></span>
                <button onclick="toggleSidePanel()" style="background:none; border:none; cursor:pointer; color:var(--text-sub); font-size: 1.2rem;">&times;</button>
            </div>
        </div>
        <div id="panel-content"><p style="color: var(--text-sub); font-size: 0.85rem; font-style: italic;">節を選択して解析を表示</p></div>
        <div id="word-detail-view"></div>
    </aside>
</div>

<script>
let abbottSmithDict = null;
const BOOK_NAMES_JP = { 'ROM': 'ローマ人への手紙', '1CO': 'コリント人への手紙 第一', '2CO': 'コリント人への手紙 第二', 'GAL': 'ガラテヤ人への手紙' };
const BOOK_CHAPTERS = { 'ROM': 16, '1CO': 16, '2CO': 13, 'GAL': 6 };
const JPN_MAP = {
    pos: { 'V': '動詞', 'N': '名詞', 'A': '形容詞', 'R': '関係代名詞', 'P': '人称代名詞', 'D': '指示代名詞', 'T': '冠詞', 'ADV': '副詞', 'PREP': '前置詞', 'CONJ': '接続詞', 'PRT': '添語' },
    tense: { 'P': '現在', 'I': '未完了', 'F': '未来', 'A': 'アオリスト', 'X': '完了' },
    voice: { 'A': '能動', 'M': '中動', 'P': '受動', 'D': '能動的受動' },
    mood: { 'I': '直説', 'S': '接続', 'O': '希求', 'M': '命令', 'N': '不定', 'P': '分詞' },
    case: { 'N': '主格', 'G': '属格', 'D': '与格', 'A': '対格', 'V': '呼格' },
    gender: { 'M': '男性', 'F': '女性', 'N': '中性' },
    number: { 'S': '単数', 'P': '複数' },
    person: { '1': '1人称', '2': '2人称', '3': '3人称' }
};

async function loadDict() {
    try {
        abbottSmithDict = {};
        const resJp = await fetch('./macula-greek-japanese-SBLGNT.tsv');
        const textJp = await resJp.text();
        textJp.split(/\r?\n/).forEach((row, index) => {
            if (index === 0 || !row.trim()) return;
            const cols = row.split('\t');
            const strong = String(cols[12]).replace(/[^0-9]/g, "");
            if (strong) abbottSmithDict[strong] = { japanese: cols[6]?.trim() || "（未登録）", gloss: cols[5]?.trim() || "" };
        });
        const resAbbott = await fetch('./abbott-smith.tsv');
        const textAbbott = await resAbbott.text();
        textAbbott.split(/\r?\n/).forEach(row => {
            const cols = row.split('\t');
            const strong = String(cols[0]).trim();
            if (abbottSmithDict[strong]) abbottSmithDict[strong].description = cols[2]?.trim() || "";
        });
    } catch (e) { console.error("Dict Error:", e); }
}

function decorate(wordText, wordData) {
    const m = wordData;
    const morph = m.morph || "";
    const parts = morph.split('-');
    const pos = parts[0]; 
    let jpMorph = "";
    let styleClass = "";

    if (pos === 'V' && parts[1]) {
        const tenseCode = parts[1][0];
        const moodCode = parts[1][2];
        
        // 【修正：装飾判定】直接法(I)または命令法(M)の場合のみ styleClass を設定
        if (moodCode === 'I' || moodCode === 'M') {
            if (tenseCode === 'P') styleClass = "present-text";
            else if (tenseCode === 'A') styleClass = "aorist-text";
            else if (tenseCode === 'X') styleClass = "perfect-text";
            
            if (moodCode === 'I') styleClass += " indicative-text";
            else if (moodCode === 'M') styleClass += " imperative-text";
        } else {
            // それ以外（接続法、不定詞、分詞等）は強制的に空にする
            styleClass = "";
        }

        const t = JPN_MAP.tense[tenseCode] || "";
        const v = JPN_MAP.voice[parts[1][1]] || "";
        const md = JPN_MAP.mood[moodCode] || "";
        let detail = (moodCode === 'P' && parts[2]) ? `(${JPN_MAP.case[parts[2][0]] || ""}${JPN_MAP.number[parts[2][1]] || ""}${JPN_MAP.gender[parts[2][2]] || ""})` : (parts[1].length >= 5 ? (JPN_MAP.person[parts[1][3]] || "") + (JPN_MAP.number[parts[1][4]] || "") : "");
        jpMorph = `${t}${v}${md}${detail}`;
    } else if (['N', 'A', 'R', 'P', 'T', 'D'].includes(pos) && parts[1]) {
        const label = JPN_MAP.pos[pos] || pos;
        let p = "", c = "", n = "", g = "";
        if (['1', '2', '3'].includes(parts[1][0])) { p = parts[1][0] + "人称"; c = JPN_MAP.case[parts[1][1]] || ""; n = JPN_MAP.number[parts[1][2]] || ""; }
        else { c = JPN_MAP.case[parts[1][0]] || ""; n = JPN_MAP.number[parts[1][1]] || ""; g = JPN_MAP.gender[parts[1][2]] || ""; }
        jpMorph = `${label}:${p}${c}${n}${g}`;
    } else { jpMorph = JPN_MAP.pos[pos] || morph; }

    const strong = String(m.strong || "").replace(/[^0-9]/g, ""); 
    const info = abbottSmithDict ? abbottSmithDict[strong] : null;
    return `<div class="word-card" onclick="showDetail('${wordText}', '${strong}', '${jpMorph}', '${morph}')">
                <div><span class="greek-word ${styleClass}">${wordText}</span><span style="color:var(--highlight); font-weight:bold; margin-left:5px; font-size:0.9rem;">［${info?.japanese || "？"}］</span><span class="tag-jp">${jpMorph}</span></div>
                <span class="strong-num">G${strong}</span>
            </div>`;
}

function showDetail(greek, strong, jpMorph, rawMorph) {
    const view = document.getElementById('word-detail-view');
    view.style.display = 'block';
    const info = abbottSmithDict ? abbottSmithDict[strong] : null;
    let classes = [], legends = [];
    
    const parts = rawMorph.split('-');
    if (parts[0] === 'V' && parts[1]) {
        const tenseCode = parts[1][0];
        const moodCode = parts[1][2];

        // 【修正】詳細パネルでも、直接法(I)または命令法(M)の場合のみ装飾凡例を表示
        if (moodCode === 'I' || moodCode === 'M') {
            if (tenseCode === 'P') { classes.push("present-text"); legends.push(`<span class="present-text">実線:現在</span>`); }
            else if (tenseCode === 'A') { classes.push("aorist-text"); legends.push(`<span class="aorist-text">点線:アオリスト</span>`); }
            else if (tenseCode === 'X') { classes.push("perfect-text"); legends.push(`<span class="perfect-text">二重線:完了</span>`); }
            if (moodCode === 'I') { classes.push("indicative-text"); legends.push(`<span class="indicative-text">背景:直説</span>`); }
            else if (moodCode === 'M') { classes.push("imperative-text"); legends.push(`<span class="imperative-text">背景:命令</span>`); }
        }
    }
    
    view.innerHTML = `
        <div style="font-weight:bold; border-bottom:1px solid var(--border-soft); margin-bottom:12px; display:flex; justify-content:space-between; padding-bottom:10px; position: sticky; top:0; background:var(--bg-card);">
            <div><span style="font-family:'Gentium Plus'; font-size:2rem;" class="${classes.join(' ')}">${greek}</span><span style="color:var(--text-sub); font-size:0.8rem; margin-left:12px;">G${strong}</span></div>
            <button onclick="closeDetail()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--text-sub);">&times;</button>
        </div>
        <div class="detail-body">
            <div style="color:var(--highlight); font-weight:bold; font-size:0.85rem;">${jpMorph}</div>
            <div class="grammar-legend">${legends.join(" ")}</div>
            <div style="font-size:1.1rem; font-weight:bold; margin-top:12px;">${info?.japanese || "（未登録）"}</div>
            <p><strong>定義:</strong> ${info?.gloss || '---'}</p>
            <div style="background:rgba(0,0,0,0.03); padding:12px; border-radius:6px; white-space:pre-wrap;">${info?.description || "解説なし"}</div>
        </div>`;
}

function closeDetail() { document.getElementById('word-detail-view').style.display = 'none'; }
function toggleSidebar() { document.getElementById('nav-sidebar').classList.toggle('collapsed'); }
function toggleSidePanel() {
    const panel = document.getElementById('side-panel');
    const openBtn = document.getElementById('open-panel-btn');
    if (panel.style.display === 'none') { panel.style.display = 'flex'; openBtn.style.display = 'none'; }
    else { panel.style.display = 'none'; openBtn.style.display = 'block'; }
}

function changePage() {
    const book = document.getElementById('bookSelect').value;
    const input = document.getElementById('chInput');
    const maxCh = BOOK_CHAPTERS[book] || 150;
    let ch = parseInt(input.value);
    if (isNaN(ch) || ch < 1) ch = 1;
    else if (ch > maxCh) ch = maxCh;
    input.value = ch;
    window.location.href = `?book=${book}&ch=${ch}`;
}

function showAppInfo() {
    const app = document.getElementById('app');
    
    // 表示タイトルを更新
    document.getElementById('view-title').innerText = "出典・ポリシー";

    const infoHtml = `
        <div style="max-width: 850px; margin: 0 auto; padding: 40px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-soft); line-height: 1.8;">
            <h2 style="border-bottom: 2px solid var(--highlight); padding-bottom: 10px; margin-bottom: 30px;">
                <i class="fa-solid fa-scroll"></i> アプリについて
            </h2>
            
            <section style="margin-bottom: 40px;">
                <h3><i class="fa-solid fa-pen-nib"></i> 設計思想（記号選択の根拠）</h3>
                <p>本アプリでは、ギリシャ語の「アスペクト（動作態）」と「法的ニュアンス」を直感的に識別できるよう、以下のルールで視覚化しています。</p>
                
                <div style="background: rgba(0,0,0,0.02); padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                    <ul style="list-style: none; padding-left: 0;">
                        <li style="margin-bottom: 15px;">
                            <strong><span style="border-bottom: 2px solid var(--highlight);">── 実線（現在形）</span></strong><br>
                            <span style="font-size: 0.9rem; color: var(--text-sub);">「継続・反復」を表現。途切れない線により、動作が時間軸上で進行している状態を示します。</span>
                        </li>
                        <li style="margin-bottom: 15px;">
                            <strong><span style="border-bottom: 2px dotted var(--highlight);">・・・・ 点線（アオリスト）</span></strong><br>
                            <span style="font-size: 0.9rem; color: var(--text-sub);">「点的・生起」を表現。プロセスの記述ではなく、その事象が「起きた」という事実の点を集中して示します。</span>
                        </li>
                        <li style="margin-bottom: 15px;">
                            <strong><span style="text-decoration: underline wavy var(--highlight); text-underline-offset: 3px;">～～ 波線（完了形）</span></strong><br>
                            <span style="font-size: 0.9rem; color: var(--text-sub);">「過去の動作の結果が今も残っている状態」を表現。単なる事実の点ではなく、現在にまで及ぶ影響の「揺らぎ」を波線で示しています。</span>
                        </li>
                        <li>
                            <strong><span style="background: rgba(211, 84, 0, 0.1); padding: 0 4px; border-radius: 2px;">ハイライト（直接法・命令法）</span></strong><br>
                            <span style="font-size: 0.9rem; color: var(--text-sub);">「文の主軸」を表現。客観的事実（直接法）や強い意志（命令法）といった、文の骨格をなす要素を強調します。</span>
                        </li>
                    </ul>
                </div>

                <h4>【補足】接続法・分詞に装飾を行わない理由</h4>
                <p style="font-size: 0.95rem;">接続法、分詞、不定詞などは、多くの場合において「主動詞（直接法・命令法）」に付随する情報を補う役割を果たします。これらすべてに装飾を施すと視覚的なノイズが増え、**「その文で最も言わんとしていること（主動詞の法的ニュアンス）」**が埋もれてしまいます。読み手の注意を最も重要な宣言や命令に集中させるため、従属的な要素の装飾は意図的に排しています。</p>
            </section>

            <section style="margin-bottom: 40px;">
                <h3><i class="fa-solid fa-database"></i> 出典 (Sources)</h3>
                <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                    <tr style="border-bottom: 1px solid var(--border-soft);">
                        <th style="text-align: left; padding: 10px; width: 30%;">底本 (Greek Text)</th>
                        <td style="padding: 10px;">SBL Greek New Testament (SBLGNT)</td>
                    </tr>
                    <tr style="border-bottom: 1px solid var(--border-soft);">
                        <th style="text-align: left; padding: 10px;">形態論解析</th>
                        <td style="padding: 10px;">Macula Greek Project / MorphGNT</td>
                    </tr>
                    <tr style="border-bottom: 1px solid var(--border-soft);">
                        <th style="text-align: left; padding: 10px;">辞書データ</th>
                        <td style="padding: 10px;">Abbott-Smith A Manual Greek Lexicon of the NT</td>
                    </tr>
                    <tr>
                        <th style="text-align: left; padding: 10px;">日本語対応語</th>
                        <td style="padding: 10px;">Macula-Greek-Japanese Data</td>
                    </tr>
                </table>
            </section>

            <section style="margin-bottom: 30px;">
                <h3><i class="fa-solid fa-shield-halved"></i> 運営ポリシー</h3>
                <p><strong>学術的客観性の保持:</strong> 特定の教義に依存せず、公開された標準的な形態論データに忠実な解析を提供します。</p>
                <p><strong>オープンソースの尊重:</strong> 優れた学術リソースを開発された先達に敬意を表し、ライセンスを遵守してデータを活用します。</p>
            </section>

            <div style="text-align: center; margin-top: 40px;">
                <button onclick="location.reload()" style="background: var(--highlight); color: white; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer; font-weight: bold;">
                    本文に戻る
                </button>
            </div>
        </div>
    `;
    app.innerHTML = infoHtml;
}
    
async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || 'ROM';
    const ch = urlParams.get('ch') || '1';
    document.getElementById('view-title').innerText = `${BOOK_NAMES_JP[book] || book} ${ch}章`;
    document.getElementById('bookSelect').value = book;
    const chInput = document.getElementById('chInput');
    chInput.value = ch;
    chInput.max = BOOK_CHAPTERS[book] || 150;
    await loadDict();
    try {
        const [jpRes, elRes] = await Promise.all([ fetch(`./bible_jp/${book}/${ch}.json`), fetch(`./bible_data/${book}/${ch}.json`) ]);
        render(await jpRes.json(), await elRes.json());
    } catch (err) { document.getElementById('app').innerHTML = `<p style="color:red">Data not found.</p>`; }
}

function render(jpData, elData) {
    const app = document.getElementById('app');
    const panelContent = document.getElementById('panel-content');
    const vLabel = document.getElementById('active-v');
    app.innerHTML = '';
    const elByVerse = {};
    elData.forEach(w => {
        const v = w.ref.split(':')[1]?.split('!')[0];
        if (v) { if (!elByVerse[v]) elByVerse[v] = []; elByVerse[v].push(w); }
    });
    Object.entries(jpData.verses).forEach(([vNum, text]) => {
        const block = document.createElement('div');
        block.className = 'verse-block';
        block.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text">${text}</div></div>`;
        block.onclick = () => {
            if (document.getElementById('side-panel').style.display === 'none') toggleSidePanel();
            document.querySelectorAll('.verse-block').forEach(b => b.style.background = 'transparent');
            block.style.background = 'rgba(0,0,0,0.03)';
            vLabel.innerText = `${vNum} 節`;
            panelContent.innerHTML = ''; 
            if (elByVerse[vNum]) elByVerse[vNum].forEach(w => { panelContent.innerHTML += decorate(w.text, w); });
            closeDetail();
        };
        app.appendChild(block);
    });
}
init();
</script>
