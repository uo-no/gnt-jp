/* ══════════════════════════════════════════
   _renderReadingNotes
   タブなし・単一スクロール・読書メモ方式。
   flow signal → 読書感覚の自然文 → 原語深読み（折りたたみ）
   ══════════════════════════════════════════ */
function _renderReadingNotes(p) {
    const area = document.getElementById('reading-notes-area');
    if (!area) return;
    area.scrollTop = 0;

    const word   = p.word   || '-';
    const pos    = p.pos    || '';
    const mood   = p.mood   || '';
    const tense  = p.tense  || '';
    const voice  = p.voice  || '';
    const ref    = p.ref    || '';
    const lemma  = p.lemma  || '';
    const jaWord = (AppState.inspect.data?.jaWord) || '';
    const strong = String(AppState.inspect.data?.strong || '').replace(/[^0-9]/g,'');
    const desc   = (AppState.inspect.data?.desc) || (abbottSmithDict && abbottSmithDict[strong]?.description) || '';
    const w      = jaWord ? `「${jaWord}」` : 'この語';

    /* ═══════════════════════════════════════════════════════
       Reading prose - 唯一の層。
       grammar / lexical nuance / discourse motion を
       「文章の空気」として書く。
       説明しない。感じさせる。
       Layer 1 / Layer 2 の区別なし。一つの連続した文章。
       ═══════════════════════════════════════════════════════ */

    const prose = [];

    /* ── 接続詞：流れの転換を一文で ── */
    if (pos === 'CONJ') {
        const CONJ_AIR = {
            'γάρ':  `前の言葉を受けながら、${w}とともに理由の説明へと入っていきます。前の主張が宙に浮いていたとすれば、ここで地に足がつきます。`,
            'ἀλλά': `${w}がここに置かれることで、前の流れが切り替わります。対比として響き、調子がはっきりと変わる場所です。`,
            'οὖν':  `前の節で積み重ねられてきたものが、${w}とともに収束します。結論へ向かう動きが始まる場所です。`,
            'δέ':   `${w}とともに、話が次の段階へ自然に進んでいます。強い転換ではなく、静かな展開です。`,
            'καί':  `内容が積み重なりながら続いています。${w}が繰り返されるとき、強調の働きをすることもあります。`,
            'ἵνα':  `${w}の先に、著者がどこへ向かっているかが見えてきます。目的として語られる内容がここから始まります。`,
            'ὅτι':  `${w}から、前の言葉の内容か根拠が語られます。何が主張され、何がその理由かを読み分ける場所です。`,
            'εἰ':   `仮定の前提が始まります。「もし〜ならば」という条件の上で、議論が展開していきます。`,
            'ὥστε': `前に語られたことを受けて、その帰結が続きます。論理の流れが結果へと着地する場所です。`,
        };
        prose.push(CONJ_AIR[word] || `前後をつなぎながら、議論の流れを形作っています。`);
    }

    /* ── 動詞：法・時制・態を一つの読書感覚として ── */
    if (pos === 'V') {
        if (mood === 'imperative') {
            if (tense === 'present') {
                prose.push(`${w}という語が、続けていく姿勢として呼びかけています。一度だけではなく、繰り返し保ち続けるような響きがあります。`);
            } else {
                prose.push(`${w}という語が、説明や宣言ではなく、相手に向かって直接方向を指し示しています。`);
            }
        } else if (mood === 'subjunctive') {
            prose.push(`断言ではなく、願いや目的を込めた調子で${w}が置かれています。著者がどこへ向かっているかが、ここに見えてきます。`);
        } else if (mood === 'infinitive') {
            prose.push(`${w}は、前の動作の意味を補いながら、目的や内容として添えられています。「何のために」「何を」という方向がここで示されます。`);
        } else if (mood === 'participle') {
            if (tense === 'aorist') {
                prose.push(`${w}は、先行する出来事として背景に描かれています。主な動作より前に起きていることとして、静かに添えられています。`);
            } else if (tense === 'perfect') {
                prose.push(`すでに起きていることとして${w}が背景に置かれ、主な動作を支えています。完了の状態が土台になっています。`);
            } else {
                prose.push(`${w}は、主な動作と同時に進んでいる状況を描き添えています。「〜しながら」という情景が重なっています。`);
            }
        } else if (tense === 'perfect') {
            prose.push(`${w}という語は、かつて起きた出来事の効果が今も続いている、という重みで語られています。過去の出来事が、今この文の中に生きています。`);
        } else if (tense === 'aorist' && mood === 'indicative') {
            prose.push(`${w}という語は、ひとつの完結した出来事として静かに提示されています。時間の流れの中で点として刻まれた、宣言のような重みがあります。`);
        } else if (tense === 'future' && mood === 'indicative') {
            prose.push(`${w}は、確かに起きることとして語られています。命令ではなく、約束のような調子があります。`);
        } else if (tense === 'present' && mood === 'indicative') {
            if (voice === 'passive') {
                prose.push(`${w}は、主語が受けとめる側として置かれた形で、継続して語られています。`);
            } else if (voice === 'middle' || voice === 'middle deponent') {
                prose.push(`${w}は、主語が深く関わりながら動いていることが伝わる語です。続いている状態として語られています。`);
            } else {
                prose.push(`${w}という語は、続いている状態として落ち着いた調子で語られています。`);
            }
        } else {
            if (voice === 'passive') {
                prose.push(`${w}は、主語が受けとめる側として置かれています。神学的な文脈では、神による行為を指すことがあります。`);
            } else if (voice === 'middle' || voice === 'middle deponent') {
                prose.push(`${w}は、主語が深く関わりながら動いていることが伝わる語です。`);
            }
        }
    }

    /* ── 名詞・形容詞・代名詞：格を読書感覚として ── */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const CASE_AIR = {
            nominative: `${w}は、この節の中心として置かれています。`,
            genitive:   `${w}は「〜の」と結びつき、前後の語との関係を深く示しています。所有・性質・由来など、どのニュアンスかは文脈が決めます。`,
            dative:     `${w}は、動作が向かう間接的な関わり先として置かれています。`,
            accusative: `${w}は、動作が直接向かう対象として置かれています。`,
            vocative:   `${w}は、文の外から直接呼びかけられています。主述の構造の外に立っています。`,
        };
        if (p.case && CASE_AIR[p.case]) {
            prose.push(CASE_AIR[p.case]);
        } else if (['P','R','D'].includes(pos)) {
            prose.push(`${w}は、誰か・何かを指し示しながら、関係をつないでいます。`);
        }
    }

    /* ── 前置詞 ── */
    if (pos === 'PREP') {
        prose.push(`${w}が関係の方向や位置を示しています。次に来る語との結びつきが、この語の意味を決めます。`);
    }

    /* ── 比喩語：文章の空気として添える ── */
    const METAPHOR_AIR = {
        'περιπατέω':  '「歩む」という語が繰り返され、姿勢を保ち続けるような響きがあります。',
        'περιπατεῖν': '「歩む」という語は、生き方のあり方を指す比喩として響いています。',
        'φωτί':       '「光」は、知識・啓示・義などを指す比喩として機能しています。',
        'σκότος':     '「闇」が比喩として置かれています。罪や神との断絶を示しています。',
        'σταυρός':    '十字架は、当時の読者にとって処刑の道具でありながら、贖いの象徴として受け取られた語です。',
    };
    if (METAPHOR_AIR[word]) prose.push(METAPHOR_AIR[word]);

    /* デフォルト */
    if (prose.length === 0) {
        prose.push(`この語の文脈的な響きは、下の「単語を調べる」から確認できます。`);
    }

    /* ═══════════════════════════════════════════════════════
       Reference layer - 「単語を調べる」
       morph grid + Abbott-Smith。
       読書 prose から分離された最下層。
       折りたたみ。初期状態は閉じている。
       ═══════════════════════════════════════════════════════ */
    const JPN_FULL = {
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞', ADV:'副詞', PREP:'前置詞', CONJ:'接続詞', PRT:'添語' },
        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了', pluperfect:'大完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動', 'middle or passive':'中動/受動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法', imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },
    };
    const morphRows = [];
    if (p.pos)    morphRows.push({ k:'品詞', v: JPN_FULL.pos[p.pos]      || p.pos,    core:true  });
    if (p.tense)  morphRows.push({ k:'時制', v: JPN_FULL.tense[p.tense]  || p.tense,  core:true  });
    if (p.mood)   morphRows.push({ k:'法',   v: JPN_FULL.mood[p.mood]    || p.mood,   core:true  });
    if (p.voice)  morphRows.push({ k:'態',   v: JPN_FULL.voice[p.voice]  || p.voice,  core:false });
    if (p.case)   morphRows.push({ k:'格',   v: JPN_FULL.case[p.case]    || p.case,   core:false });
    if (p.number) morphRows.push({ k:'数',   v: JPN_FULL.number[p.number]|| p.number, core:false });
    if (p.gender) morphRows.push({ k:'性',   v: JPN_FULL.gender[p.gender]|| p.gender, core:false });

    const morphGridHTML = morphRows.length
        ? `<div class="rn-morph-grid">${morphRows.map(r =>
            `<span class="rn-morph-key">${r.k}</span><span class="rn-morph-val${r.core?' core':''}">${r.v}</span>`
          ).join('')}</div>`
        : '';

    const abbottHTML = desc
        ? `<div class="rn-lexicon">
               <span class="rn-lexicon-label">Abbott-Smith${strong ? ' · G'+strong : ''}</span>
               ${desc.replace(/\n/g,'<br>')}
           </div>`
        : '';

    const qsMorph = new URLSearchParams();
    if (ref)     qsMorph.set('ref',   ref);
    if (p.word)  qsMorph.set('word',  p.word);
    if (lemma)   qsMorph.set('lemma', lemma);
    if (p.pos)   qsMorph.set('pos',   p.pos);
    if (p.tense) qsMorph.set('tense', p.tense);
    if (p.mood)  qsMorph.set('mood',  p.mood);
    const morphSearchURL = `morph-search.html?${qsMorph.toString()}`;
    const syntaxURL      = `syntax-search.html?${qsMorph.toString()}`;
    const qsSem = new URLSearchParams();
    if (ref)    qsSem.set('ref',   ref);
    if (p.word) qsSem.set('word',  p.word);
    if (lemma)  qsSem.set('lemma', lemma);
    if (p.pos)  qsSem.set('pos',   p.pos);
    const semanticsURL = `semantic-search.html?${qsSem.toString()}`;

    const refHTML = `
        <div class="rn-ref-section">

/* 単語を調べる（reference layer）トグル */
function _rnToggleRef() {
    const btn  = document.getElementById('rn-ref-toggle');
    const body = document.getElementById('rn-ref-body');
    if (!btn || !body) return;
    const isOpen = body.classList.contains('visible');
    body.classList.toggle('visible', !isOpen);
    btn.classList.toggle('open', !isOpen);
    const icon = btn.querySelector('.rn-ref-toggle-icon');
    if (icon) icon.style.transform = isOpen ? '' : 'rotate(90deg)';
    btn.childNodes.forEach(n => {
        if (n.nodeType === 3) n.textContent = isOpen ? '単語を調べる' : '閉じる';
    });
}

function _renderMorphTab(area, p) {
    const JPN_FULL = {
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞', ADV:'副詞', PREP:'前置詞', CONJ:'接続詞', PRT:'添語' },
        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了', pluperfect:'大完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動', 'middle or passive':'中動/受動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法', imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },
        person: { '1':'1人称', '2':'2人称', '3':'3人称' },
    };

    const rows = [];
    if (p.pos)    rows.push({ k:'品詞',  v: JPN_FULL.pos[p.pos]    || p.pos,    core: true });
    if (p.tense)  rows.push({ k:'時制',  v: JPN_FULL.tense[p.tense]|| p.tense,  core: true });
    if (p.mood)   rows.push({ k:'法',    v: JPN_FULL.mood[p.mood]  || p.mood,   core: true });
    if (p.voice)  rows.push({ k:'態',    v: JPN_FULL.voice[p.voice]|| p.voice,  core: false });
    if (p.case)   rows.push({ k:'格',    v: JPN_FULL.case[p.case]  || p.case,   core: false });
    if (p.number) rows.push({ k:'数',    v: JPN_FULL.number[p.number]||p.number,core: false });
    if (p.gender) rows.push({ k:'性',    v: JPN_FULL.gender[p.gender]||p.gender,core: false });

    const morphGridHTML = rows.length
        ? `<div class="ac-morph-grid">
            ${rows.map(r => `
                <span class="ac-morph-key">${r.k}</span>
                <span class="ac-morph-val${r.core ? ' core' : ''}">${r.v}</span>
            `).join('')}
           </div>`
        : `<p class="ac-no-data">形態論データがありません</p>`;

    const jaWord = (_inspectData && _inspectData.jaWord) || '-';
    const desc   = (_inspectData && _inspectData.desc)   || '';
    const strong = (_inspectData && _inspectData.strong)  || '';
    const ref    = p.ref || '';
    const lemma  = p.lemma || '';

    // 近くの語を見るリンク（morph-search.html へ URL遷移）
    const qs = new URLSearchParams();
    if (ref)   qs.set('ref',   ref);
    if (p.word) qs.set('word', p.word);
    if (lemma)  qs.set('lemma', lemma);
    if (p.pos)  qs.set('pos',   p.pos);
    if (p.tense) qs.set('tense', p.tense);
    if (p.mood)  qs.set('mood',  p.mood);
    if (p.voice) qs.set('voice', p.voice);
    if (p.gender) qs.set('gender', p.gender);
    if (p.number) qs.set('number', p.number);
    if (p.case)   qs.set('case',   p.case);
    const morphSearchURL = `morph-search.html?${qs.toString()}`;

    area.innerHTML = `
        <span class="ac-section-label">形態論</span>
        <div class="ac-entry">
            <div class="ac-entry-greek">${p.word || '-'}</div>
            <div class="ac-entry-ja">${jaWord}</div>
            ${strong ? `<span class="ac-entry-strong">G${strong}</span>` : ''}
            ${morphGridHTML}
            ${ref ? `<span class="ac-cite-ref">📍 ${ref}</span>` : ''}
        </div>
        ${desc ? `<div class="ac-abbottsmith">${desc.replace(/\n/g,'<br>')}</div>` : ''}
        <div class="ac-morph-search-row">
            <a href="${morphSearchURL}" class="morph-search-btn" title="この語形が現れる他の箇所を検索">
                近くの語を見る →
            </a>
        </div>
    `;
}

/* ══════════════════════════════════════════
   Flow / Meaning / Study タブ描画
   （読解支援を主役にした新タブ体系）
   ══════════════════════════════════════════ */

/**
 * Flow タブ：「この語・この節が何をしているか」を読解補助として表示。
 * AIによるニュアンス補助（Anthropic API）。
 * データなし時はローカルルールベースフォールバックを表示。
 */
function _renderFlowTab(area, p) {
    const word   = p.word   || '-';
    const pos    = p.pos    || '';
    const mood   = p.mood   || '';
    const tense  = p.tense  || '';
    const voice  = p.voice  || '';
    const jaWord = (_inspectData && _inspectData.jaWord) || '';
    const ref    = p.ref    || '';

    /* ══════════════════════════════════════════
       ローカルフォールバック：9種 Flow signal
       「著者の流れ・強調・意図」を静かに補助する。
       チェックリスト化禁止。自然な文章として表示。
       ══════════════════════════════════════════ */
    const signals = [];
    // signal: { kind: CSS class suffix, kindLabel: 極小ラベル, text: 自然文 }

    /* ── #1 鍵となるフレーズ・単語（繰り返し・転換・強調） ── */
    if (pos === 'CONJ') {
        const CONJ_SIGNAL = {
            'γάρ':  { cls: 'sig-logic',    text: 'ここで理由が始まります。直前の主張の根拠として読むと、議論の構造が見えてきます。' },
            'ἀλλά': { cls: 'sig-turn',     text: '「しかし」による転換。ここで流れが変わります。' },
            'οὖν':  { cls: 'sig-logic',    text: 'ここで論理が結論へ進みます。前節の集約として読む箇所です。' },
            'δέ':   { cls: 'sig-turn',     text: '話が次の段階に進んでいます。微妙な展開・対比のサインです。' },
            'καί':  { cls: 'sig-emphasis', text: '内容が積み重なっています。強調の「そして」として機能する場合もあります。' },
            'ἵνα':  { cls: 'sig-logic',    text: '目的節。この語以降に「なぜそうするのか」という著者の意図が示されます。' },
            'ὅτι':  { cls: 'sig-logic',    text: '内容・理由節。以降が主張の根拠か内容補足になります。' },
            'εἰ':   { cls: 'sig-logic',    text: '条件節。仮定の前提の上で議論が展開されています。' },
            'ὥστε': { cls: 'sig-logic',    text: 'ここに議論の帰結があります。「その結果として」という流れです。' },
        };
        const s = CONJ_SIGNAL[word];
        if (s) signals.push({ cls: s.cls, kindLabel: '流れ', text: s.text });
        else   signals.push({ cls: 'sig-logic', kindLabel: '流れ', text: '接続詞。前後をつなぎ、議論の流れを形作っています。' });
    }

    /* ── #6 論理的展開（最重要：Flow の中心機能） ── */
    /* 動詞の法：命令・約束・宣言・論理を区別して表示 */
    if (pos === 'V') {
        /* #2 命令・勧め */
        if (mood === 'imperative') {
            signals.push({ cls: 'sig-exhort', kindLabel: '呼びかけ', text: 'ここは説明ではなく、行動への呼びかけです。' });
        }
        /* 接続法：目的・願望 */
        if (mood === 'subjunctive') {
            signals.push({ cls: 'sig-logic', kindLabel: '願い', text: '目的・条件・願望を表しています。断定ではなく「〜するために」「〜であれば」という含みです。' });
        }
        /* 不定詞：補足・目的 */
        if (mood === 'infinitive') {
            signals.push({ cls: 'sig-logic', kindLabel: '補足', text: '動作の目的か内容を補足する役割です。' });
        }
        /* 分詞：修飾・同時進行 */
        if (mood === 'participle') {
            signals.push({ cls: 'sig-logic', kindLabel: '背景', text: '主動詞の状況・背景を描写しています。' });
        }

        /* 時制による流れへの影響 */
        if (tense === 'aorist' && mood === 'indicative') {
            signals.push({ cls: 'sig-declare', kindLabel: '出来事', text: '「その出来事が起きた」という完結した事実の提示です。命令でも約束でもなく、宣言的な重みがあります。' });
        }
        if (tense === 'present' && mood === 'indicative') {
            signals.push({ cls: 'sig-logic', kindLabel: '継続', text: '継続・習慣・普遍的な事実として述べています。' });
        }
        if (tense === 'perfect') {
            signals.push({ cls: 'sig-promise', kindLabel: '今も続く', text: '過去の出来事の結果が今も有効です。単なる過去の話ではなく、現在の状態を含む表現です。' });
        }
        if (tense === 'future' && mood === 'indicative') {
            signals.push({ cls: 'sig-promise', kindLabel: '約束', text: 'これは命令というより、確かな約束・確約として機能していることがあります。' });
        }

        /* #7 語の選択：態のニュアンス */
        if (voice === 'passive') {
            signals.push({ cls: 'sig-word', kindLabel: '受けとめる', text: '主語は動作を受ける側に置かれています。神学的文脈では「神による行為」を暗示することがあります。' });
        }
        if (voice === 'middle' || voice === 'middle deponent') {
            signals.push({ cls: 'sig-word', kindLabel: '深く関わる', text: '主語が動作に深く関与しています。単なる能動でも受動でもない、自身が関わる動作です。' });
        }
    }

    /* ── 名詞系の格：論理的役割を「流れ」として表示 ── */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const CASE_SIGNAL = {
            nominative: { cls: 'sig-logic',   text: 'この語が文の中心にいます。主語または述語として機能しています。' },
            genitive:   { cls: 'sig-logic',   text: '「〜の」という関係を示します。所有・由来・特徴などのニュアンスがあります。' },
            dative:     { cls: 'sig-logic',   text: '動作の間接的な受け手・場所・手段を示します。' },
            accusative: { cls: 'sig-logic',   text: '動作の直接の対象です。' },
        };
        const caseSig = CASE_SIGNAL[p.case];
        if (caseSig) signals.push({ cls: caseSig.cls, kindLabel: '役割', text: caseSig.text });
    }

    /* ── #5 比喩表現：特定語の比喩的使用に注意を促す ── */
    const METAPHOR_WORDS = {
        'περιπατέω': '「歩む」は、ここでは文字通りの歩行ではなく、生き方・行動様式の比喩として使われています。',
        'περιπατεῖν': '「歩む」は、生き方の比喩として使われています。',
        'φωτί':      '「光」は比喩的な表現として機能していることが多く、知識・啓示・義などを指すことがあります。',
        'σκότος':    '「闇」は比喩的に罪・無知・神との断絶を示すことがあります。',
        'σταυρός':   '十字架は当時の読者にとって処刑の道具であると同時に、贖いの象徴として受け取られた語です。',
    };
    if (METAPHOR_WORDS[word]) {
        signals.push({ cls: 'sig-metaphor', kindLabel: '比喩', text: METAPHOR_WORDS[word] });
    }

    if (signals.length === 0) {
        signals.push({ cls: 'sig-default', kindLabel: '補足', text: 'この語の文脈的な役割は「含み」タブでさらに確認できます。' });
    }

    /* signals を prose として統合（列挙しない） */
    const localHTML = `<div class="flow-signal-text">${signals.map(s => s.text).join('　')}</div>`;

    area.innerHTML = `
        <div class="flow-word-head">
            <span class="flow-greek">${word}</span>${jaWord ? `<span class="flow-ja">　${jaWord}</span>` : ''}
        </div>
        ${ref ? `<div class="flow-ref">${ref}</div>` : ''}
        <div class="flow-hints" id="flow-hints-local">
            ${localHTML}
        </div>
    `;
}

/**
 * Meaning タブ：「この語が今この文脈でどう響くか」を読書補助として表示。
 * Abbott-Smith は Study → Semantics へ移動済み。
 * ここは辞書ではなく、tone / relational force / contextual nuance の層。
 */
function _renderMeaningTab(area, p) {
    const word   = p.word   || '-';
    const jaWord = (_inspectData && _inspectData.jaWord) || '-';
    const ref    = p.ref    || '';

    const signalHTML = meaningSignals.length
        ? `<div class="flow-signal-text">${meaningSignals.map(s => s.text).join('<br>')}</div>`
        : `<div class="flow-signal-text" style="color:var(--text-sub);">原語の詳細は「原語を見る」から確認できます。</div>`;

    area.innerHTML = `
        <div class="flow-word-head">
            <span class="flow-greek">${word}</span><span class="flow-ja">　${jaWord}</span>
        </div>
        ${ref ? `<div class="flow-ref">${ref}</div>` : ''}
        <div class="flow-hints">
            ${signalHTML}
        </div>
    `;
}

/**
 * Meaning タブ用ローカルシグナル生成。
 * AIなし。形態論データからルールベースでシグナルを導出する。
 */
function _buildMeaningSignals(p) {
    const signals = [];
    const pos   = p.pos   || '';
    const mood  = p.mood  || '';
    const tense = p.tense || '';
    const voice = p.voice || '';
    const word  = p.word  || '';

    if (pos === 'V') {
        if (mood === 'imperative') {
            signals.push({ cls: 'sig-exhort', kindLabel: '行為', text: '命令形。説明ではなく、行動への直接の呼びかけとして機能しています。' });
        }
        if (mood === 'subjunctive') {
            signals.push({ cls: 'sig-logic', kindLabel: '態度', text: '接続法。断定ではなく、目的・願望・可能性の含みをもちます。' });
        }
        if (mood === 'participle') {
            signals.push({ cls: 'sig-logic', kindLabel: '修飾', text: '分詞。主動詞の状況・背景・手段として機能しています。' });
        }
        if (tense === 'perfect') {
            signals.push({ cls: 'sig-promise', kindLabel: '状態', text: '完了形。過去の出来事の結果が現在も有効であることを示します。' });
        }
        if (tense === 'aorist' && mood === 'indicative') {
            signals.push({ cls: 'sig-declare', kindLabel: '宣言', text: 'アオリスト直説法。完結した出来事の事実提示。宣言的な重みがあります。' });
        }
        if (tense === 'future') {
            signals.push({ cls: 'sig-promise', kindLabel: '約束', text: '未来形。確かな約束・確約として機能することがあります。' });
        }
        if (voice === 'passive') {
            signals.push({ cls: 'sig-word', kindLabel: '態', text: '受動態。神学的文脈では「神による行為」を暗示することがあります。' });
        }
        if (voice === 'middle' || voice === 'middle deponent') {
            signals.push({ cls: 'sig-word', kindLabel: '態', text: '中動態。主語が動作に深く関与しています。' });
        }
    }

    if (pos === 'CONJ') {
        const CONJ_MEANING = {
            'γάρ':  { cls: 'sig-logic',    kindLabel: '論理', text: '理由の接続詞。前の主張への根拠として読みます。' },
            'ἀλλά': { cls: 'sig-turn',     kindLabel: '転換', text: '強い対比・転換。ここで話の方向が変わります。' },
            'οὖν':  { cls: 'sig-logic',    kindLabel: '帰結', text: '論理的帰結。前節の議論をここで集約しています。' },
            'δέ':   { cls: 'sig-turn',     kindLabel: '展開', text: '微妙な転換・進展のサイン。' },
            'καί':  { cls: 'sig-emphasis', kindLabel: '付加', text: '並列・強調。内容が積み重なっています。' },
            'ἵνα':  { cls: 'sig-logic',    kindLabel: '目的', text: '目的節。著者の意図がこの語の後に示されます。' },
            'ὅτι':  { cls: 'sig-logic',    kindLabel: '内容', text: '内容・理由節。主張の根拠か内容補足になります。' },
        };
        const cs = CONJ_MEANING[word];
        if (cs) signals.push(cs);
        else signals.push({ cls: 'sig-logic', kindLabel: '接続', text: '接続詞。前後の節をつなぎ、議論の流れを形作っています。' });
    }

    if (signals.length === 0) {
        signals.push({ cls: 'sig-default', kindLabel: '補足', text: 'この語の特記すべき語用論的特徴はありません。' });
    }

    return signals;
}

/**
 * ローカルルールベースで「構文関係」テキストを生成。
 * 品詞・法・時制・格から「この語が論理上何をしているか」を読解補助として記述。
 * linguistics用語の羅列禁止。自然な読解文として書く。
 *
 * @returns Array<{kind:string, text:string}>
 */
function _buildSyntaxRelations(p, JPN) {
    const rels = [];
    const pos   = p.pos   || '';
    const mood  = p.mood  || '';
    const tense = p.tense || '';
    const voice = p.voice || '';

    /* 接続詞：節の論理関係 */
    if (pos === 'CONJ') {
        const CONJ_LOGIC = {
            'γάρ':  { kind: '理由節',  text: 'この語以降が直前の主張の根拠節として機能しています。' },
            'ἀλλά': { kind: '対比節',  text: '前節との対比・反転を示す節境界です。' },
            'οὖν':  { kind: '結論節',  text: '前節の議論を受けた結論節が始まります。' },
            'δέ':   { kind: '展開',    text: '前節に続く展開または対比の接続点です。' },
            'καί':  { kind: '並列',    text: '前節と並列関係にある節が続きます。' },
            'ἵνα':  { kind: '目的節',  text: 'この語以降が目的節：「〜するために」という従属節です。' },
            'ὅτι':  { kind: '補足節',  text: '内容節または理由節として前節を補足しています。' },
            'εἰ':   { kind: '条件節',  text: '条件節：「〜ならば」という仮定の節を導きます。' },
            'ὥστε': { kind: '結果節',  text: '結果節：前節の帰結として「〜になった」を示します。' },
        };
        const word = p.word || '';
        const r = CONJ_LOGIC[word];
        if (r) rels.push(r);
        else   rels.push({ kind: '接続',  text: '前後の節をつなぐ論理的接点です。' });
    }

    /* 動詞：節内の役割 */
    if (pos === 'V') {
        /* 法による節の機能 */
        if (mood === 'imperative') {
            rels.push({ kind: '主節',   text: 'この動詞が節の中心命令を担っています。要求・指示の主語述語構造です。' });
        } else if (mood === 'subjunctive') {
            rels.push({ kind: '従属節', text: '接続法として従属節内に位置し、目的・条件・願望を支えています。' });
        } else if (mood === 'infinitive') {
            rels.push({ kind: '補語',   text: '不定詞として主動詞の補語または目的語の役割を担っています。' });
        } else if (mood === 'participle') {
            rels.push({ kind: '修飾',   text: '分詞として主節の主語または動作の状況・背景を修飾しています。' });
        } else if (mood === 'indicative') {
            rels.push({ kind: '主節',   text: '直説法として節の主動詞に位置しています。' });
        }

        /* 時制による時間軸上の位置 */
        if (tense === 'aorist' && mood === 'indicative') {
            rels.push({ kind: '時制軸', text: '時制上、完結した出来事として主節に先行するか同時点に置かれています。' });
        } else if (tense === 'perfect') {
            rels.push({ kind: '時制軸', text: '完了形として、過去の出来事の結果が今も有効であるという論理的含意を持ちます。' });
        } else if (tense === 'present' && mood === 'indicative') {
            rels.push({ kind: '時制軸', text: '現在時制として、論理上の普遍命題または継続する状態として機能しています。' });
        }

        /* 態による動作構造 */
        if (voice === 'passive') {
            rels.push({ kind: '動作構造', text: '受動態。主語は動作の受け手として節内に配置されています。' });
        } else if (voice === 'middle' || voice === 'middle deponent') {
            rels.push({ kind: '動作構造', text: '中動態。主語が動作に深く関与する自動詞的構造です。' });
        }
    }

    /* 名詞・代名詞：節内の格役割 */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const CASE_ROLE = {
            nominative: { kind: '格役割', text: '主格として、この節の主語または述語主格の位置にあります。' },
            genitive:   { kind: '格役割', text: '属格として、修飾語または「〜の」という関係を節内で担っています。' },
            dative:     { kind: '格役割', text: '与格として、動作の間接目的・場所・手段の位置にあります。' },
            accusative: { kind: '格役割', text: '対格として、動詞の直接目的語または動作の到達点に配置されています。' },
            vocative:   { kind: '格役割', text: '呼格として、節の主述関係の外に位置する呼びかけです。' },
        };
        const r = CASE_ROLE[p.case];
        if (r) rels.push(r);
    }

    return rels;
}

/**
 * 「静かな構文ツリー」HTML を生成。
 * ROOT / NP / VP / CP のような学術ラベル禁止。
 * 読解補助として「誰が」「何を」「どういう関係で」を示す。
 * モバイルで横スクロール地獄にならないよう幅を抑える。
 *
 * @returns HTML string（構文ツリー行群）
 */
function _buildSyntaxTree(p, JPN, jaWord) {
    const pos   = p.pos   || '';
    const mood  = p.mood  || '';
    const tense = p.tense || '';
    const voice = p.voice || '';
    const word  = p.word  || '-';
    const rows  = [];

    /* ヘルパー：インデントと接続文字を組み合わせた1行を生成 */
    const treeRow = (indent, isLast, role, content, note = '') =>
        `<div class="syntax-tree-row">` +
        `${'<span class="syntax-tree-indent">  </span>'.repeat(indent)}` +
        `<span class="syntax-tree-connector">${isLast ? '└' : '├'}</span>` +
        `<span class="syntax-tree-role">${role}</span>` +
        `<span class="syntax-tree-content">${content}</span>` +
        `${note ? `<span class="syntax-tree-note">${note}</span>` : ''}` +
        `</div>`;

    /* 動詞中心の構造 */
    if (pos === 'V') {
        const moodLabel  = JPN.mood[mood]   || mood  || '';
        const tenseLabel = JPN.tense[tense] || tense || '';
        const voiceLabel = JPN.voice[voice] || voice || '';

        /* ルート：動詞節 */
        rows.push(`<div class="syntax-tree-row"><span class="syntax-tree-role" style="font-size:0.6rem;opacity:0.4;">節</span><span class="syntax-tree-content" style="opacity:0.5;">述語構造</span></div>`);

        if (mood === 'participle') {
            rows.push(treeRow(0, false, '述語分詞', word, `${tenseLabel}・${voiceLabel}`));
            rows.push(treeRow(1, false, '機能', '主節の動作を修飾', ''));
            rows.push(treeRow(1, true,  '法',   moodLabel, ''));
        } else if (mood === 'infinitive') {
            rows.push(treeRow(0, false, '動詞', word, `${tenseLabel}`));
            rows.push(treeRow(1, false, '機能', '主動詞の補語', ''));
            rows.push(treeRow(1, true,  '法',   moodLabel, ''));
        } else {
            rows.push(treeRow(0, false, '述語', word, `${moodLabel}・${tenseLabel}${voiceLabel ? '・' + voiceLabel : ''}`));
            if (mood === 'imperative') {
                rows.push(treeRow(1, false, '節種', '命令節（主節）', ''));
                rows.push(treeRow(1, true,  '主語', '（2人称：省略）', ''));
            } else if (mood === 'subjunctive') {
                rows.push(treeRow(1, true, '節種', '従属節（接続法）', ''));
            } else if (mood === 'indicative') {
                rows.push(treeRow(1, true, '節種', '主節（直説法）', ''));
            }
        }
    }

    /* 名詞・代名詞・冠詞系 */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const caseLabel   = JPN.case[p.case]     || p.case   || '';
        const numberLabel = JPN.number[p.number] || p.number || '';
        const genderLabel = JPN.gender[p.gender] || p.gender || '';
        const posLabel    = JPN.pos[pos]          || pos;

        rows.push(`<div class="syntax-tree-row"><span class="syntax-tree-role" style="font-size:0.6rem;opacity:0.4;">句</span><span class="syntax-tree-content" style="opacity:0.5;">名詞句</span></div>`);
        rows.push(treeRow(0, false, posLabel, word, `${caseLabel}${numberLabel ? '・'+numberLabel : ''}${genderLabel ? '・'+genderLabel : ''}`));

        const CASE_FUNC = {
            nominative: '主語または述語主格',
            genitive:   '修飾語（〜の）',
            dative:     '間接目的語・場所・手段',
            accusative: '直接目的語',
            vocative:   '呼びかけ（独立）',
        };
        const func = CASE_FUNC[p.case];
        if (func) rows.push(treeRow(1, true, '節内機能', func, ''));
    }

    /* 接続詞 */
    if (pos === 'CONJ') {
        rows.push(`<div class="syntax-tree-row"><span class="syntax-tree-role" style="font-size:0.6rem;opacity:0.4;">接続</span><span class="syntax-tree-content" style="opacity:0.5;">節境界</span></div>`);
        rows.push(treeRow(0, false, '接続詞', word, ''));
        rows.push(treeRow(1, false, '先行節', '（前節）', ''));
        rows.push(treeRow(1, true,  '後続節', '（後節）', ''));
    }

    return rows.join('');
}

/**
 * 結果テキストを rt-result-block 群に変換して描画。
 * AIには「---」区切りで複数結果を返すよう指示する。
 * 各ブロックは「種別: / 内容: / 参照:」の3行構成（なければ省略）。
 */
function _rtRenderResults(text, resultsEl) {
    if (!text) {
        resultsEl.innerHTML = `<div class="rt-no-result">該当する用例が見つかりませんでした。</div>`;
        return;
    }
    /* ブロック分割（--- 区切り）*/
    const blocks = text.split(/---+/).map(b => b.trim()).filter(Boolean);
    if (blocks.length === 0) {
        resultsEl.innerHTML = `<div class="rt-result-block"><span class="rt-result-text">${text.replace(/\n/g,'<br>')}</span></div>`;
        return;
    }
    resultsEl.innerHTML = blocks.map(block => {
        /* 各ブロックからラベル・本文・参照を抽出 */
        const kindMatch = block.match(/^種別[:：]\s*(.+)/m);
        const textMatch = block.match(/^内容[:：]\s*([\s\S]+?)(?=参照[:：]|$)/m);
        const refMatch  = block.match(/^参照[:：]\s*(.+)/m);
        const kind   = kindMatch ? kindMatch[1].trim() : '';
        const body   = textMatch ? textMatch[1].trim() : block.replace(/^種別.+\n?/m,'').trim();
        const ref    = refMatch  ? refMatch[1].trim()  : '';
        return `<div class="rt-result-block">
            ${kind ? `<span class="rt-result-kind">${kind}</span>` : ''}
            <span class="rt-result-text">${body.replace(/\n/g,'<br>')}</span>
            ${ref  ? `<span class="rt-result-ref">📍 ${ref}</span>` : ''}
        </div>`;
    }).join('');
}

function parseMorphForSearch(rawMorph) {
    const parts = rawMorph.split('-');
    const pos = parts[0];
    const result = { pos };

    if (pos === 'V' && parts[1]) {
        const off = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off + 0];
        const voiceCode = parts[1][off + 1];
        const moodCode  = parts[1][off + 2];

        const TENSE_MAP = { P:'present', I:'imperfect', F:'future', A:'aorist', X:'perfect' };
        const VOICE_MAP = { A:'active', M:'middle', P:'passive', D:'middle deponent' };
        const MOOD_MAP  = { I:'indicative', S:'subjunctive', O:'optative',
                            M:'imperative', N:'infinitive', P:'participle' };

        if (tenseCode) result.tense = TENSE_MAP[tenseCode] || '';
        if (voiceCode) result.voice = VOICE_MAP[voiceCode] || '';
        if (moodCode)  result.mood  = MOOD_MAP[moodCode]   || '';

        if (moodCode === 'P' && parts[2]) {
            const CASE_MAP   = { N:'nominative', G:'genitive', D:'dative', A:'accusative', V:'vocative' };
            const NUMBER_MAP = { S:'singular', P:'plural' };
            const GENDER_MAP = { M:'masculine', F:'feminine', N:'neuter' };
            result.case   = CASE_MAP[parts[2][0]]   || '';
            result.number = NUMBER_MAP[parts[2][1]] || '';
            result.gender = GENDER_MAP[parts[2][2]] || '';
        }
    } else if (['N','A','R','P','T','D'].includes(pos) && parts[1]) {
        const CASE_MAP   = { N:'nominative', G:'genitive', D:'dative', A:'accusative', V:'vocative' };
        const NUMBER_MAP = { S:'singular', P:'plural' };
        const GENDER_MAP = { M:'masculine', F:'feminine', N:'neuter' };
        const base = ['1','2','3'].includes(parts[1][0]) ? parts[1].slice(1) : parts[1];
        result.case   = CASE_MAP[base[0]]   || '';
        result.number = NUMBER_MAP[base[1]] || '';
        result.gender = GENDER_MAP[base[2]] || '';
    }
    return result;
}

function buildMorphTagsHTML(rawMorph) {
    const m = parseMorphForSearch(rawMorph);
    const JPN = {
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞' },
        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法',
                  imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },
    };

    const tags = [];
    if (m.pos)    tags.push({ label: JPN.pos[m.pos]    || m.pos,    core: true });
    if (m.tense)  tags.push({ label: JPN.tense[m.tense]|| m.tense,  core: true });
    if (m.voice)  tags.push({ label: JPN.voice[m.voice]|| m.voice,  core: false });
    if (m.mood)   tags.push({ label: JPN.mood[m.mood]  || m.mood,   core: true });
    if (m.gender) tags.push({ label: JPN.gender[m.gender]|| m.gender, core: false });
    if (m.number) tags.push({ label: JPN.number[m.number]|| m.number, core: false });
    if (m.case)   tags.push({ label: JPN.case[m.case]  || m.case,   core: false });

    if (tags.length === 0) return '';
    return `<div class="morph-tag-row">
        ${tags.map(t => `<span class="morph-tag-pill${t.core ? ' core' : ''}">${t.label}</span>`).join('')}
    </div>`;
}

window.addEventListener('message', (e) => {
    const d = e.data;
    if (!d || !d.type) return;

    /* iframeから参照更新が来た場合（後方互換）*/
    if (d.ref && AppState.study.params) {
        AppState.study.params = {
            ...AppState.study.params,
            ref:   d.ref,
            word:  d.word  || AppState.study.params.word,
            lemma: d.lemma || AppState.study.params.lemma,
        };
    }

    if (d.type === 'NAV_TO_MORPH')      switchAnalysisTab('morph');
    if (d.type === 'NAV_TO_SYNTAX')     switchAnalysisTab('syntax');
    if (d.type === 'NAV_TO_SEMANTICS')  switchAnalysisTab('semantics');

    if (d.type === 'GO_TO_REF' && d.ref) {
        const m = d.ref.match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
        if (m) window.location.href = `?book=${m[1]}&ch=${m[2]}`;
    }
});

let sbSection  = 'nt';

let sbBookName = '';
let sbMaxCh    = 1;

function sbGoTo(layer, section) {
    document.querySelectorAll('.sb-layer').forEach(l => l.classList.remove('active'));
    document.getElementById('sb-layer' + layer).classList.add('active');

    /* Layer 0: sb-nt-row / sb-ot-row のアクティブ表示 */
    if (layer === 0) {
        document.getElementById('sb-nt-row').classList.toggle('active', sbSection === 'nt');
        document.getElementById('sb-ot-row').classList.toggle('active', sbSection === 'ot');
    }

    /* Layer 1: 書物一覧を描画 */
    if (layer === 1) {
        if (section) sbSection = section;
        _sbSyncNavHeaders();
        document.getElementById('sb-nt-row').classList.toggle('active', sbSection === 'nt');
        document.getElementById('sb-ot-row').classList.toggle('active', sbSection === 'ot');
        sbRenderBooks();
    }

    /* Layer 2: 章グリッドを描画 */
    if (layer === 2) {
        _sbSyncNavHeaders();
        document.getElementById('sb-l2-title').textContent = sbBookName;
        sbRenderChapters();
    }
}

/* Layer 1/2 のナビヘッダーのアクティブ状態を同期 */
function _sbSyncNavHeaders() {
    const isNt = sbSection === 'nt';
    ['sb-nav-nt', 'sb-nav-nt-l2'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('active', isNt);
    });
    ['sb-nav-ot', 'sb-nav-ot-l2'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('active', !isNt);
    });
}

function sbGoBack(layer) { sbGoTo(layer); }

function sbRenderBooks() {
    const list = document.getElementById('sb-book-list');
    list.innerHTML = '';
    SB_BOOKS[sbSection].forEach(b => {
        const div = document.createElement('div');
        div.className = 'sb-row' + (b.key === sbBookKey ? ' active' : '');
        const hasGreek = GREEK_BOOKS.has(b.key);
        div.innerHTML = `<span>${b.name}</span><span class="sb-row-arrow">›</span>`;
        if (!hasGreek) {
            div.title = '日本語訳のみ';
            div.querySelector('span').style.color = 'var(--text-sub)';
        }
        div.onclick = () => {
            sbBookKey  = b.key;
            sbBookName = b.name;
            sbMaxCh    = b.ch;
            sbGoTo(2);
        };
        list.appendChild(div);
    });
}

function sbRenderChapters() {
    const urlParams = new URLSearchParams(window.location.search);
    const currentCh = parseInt(urlParams.get('ch') || '1');
    const currentBook = urlParams.get('book') || 'ROM';

    const grid = document.getElementById('sb-ch-grid');
    grid.innerHTML = '';
    for (let i = 1; i <= sbMaxCh; i++) {
        const btn = document.createElement('div');
        btn.className = 'sb-ch-btn' + (sbBookKey === currentBook && i === currentCh ? ' active' : '');
        btn.textContent = i;
        btn.onclick = () => {
            window.location.href = `?book=${sbBookKey}&ch=${i}`;
        };
        grid.appendChild(btn);
    }
}

function sbInitState(bookKey, ch) {
    const inNt = SB_BOOKS.nt.some(b => b.key === bookKey);
    sbSection = inNt ? 'nt' : 'ot';
    const books = SB_BOOKS[sbSection];
    const found = books.find(b => b.key === bookKey);
    if (found) {

        sbBookName = found.name;
        sbMaxCh    = found.ch;
    }
    /* 起動時: Layer 0 を表示（トップメニューから始める） */
    sbGoTo(0);
}

async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || 'ROM';
    const ch   = urlParams.get('ch')   || '1';

    const isNt = SB_BOOKS.nt.some(b => b.key === book);
    document.querySelector('.root-name') && (document.querySelector('.root-name').innerText = isNt ? '新約聖書' : '旧約聖書');

    const allBooks = [...SB_BOOKS.nt, ...SB_BOOKS.ot];
    const found = allBooks.find(b => b.key === book);
    const chNum = parseInt(ch);

    /* AppState.location を設定 */
    AppState.location.testament = isNt ? 'nt' : 'ot';
    AppState.location.book      = found || null;
    AppState.location.chapter   = chNum;

    /* view-title は互換のため維持 */
    const titleEl = document.getElementById('view-title');
    if (titleEl) titleEl.innerText = found ? `${found.name} ${ch}章` : `${book} ${ch}章`;

    /* グローバルbreadcrumb を描画 */
    renderGlobalBreadcrumb();

    sbInitState(book, chNum);

    await loadDict();

    const hasGreek = GREEK_BOOKS.has(book);

    try {
        const jpData = await _fetchTranslation(_transA, book, ch);
        if (!jpData) throw new Error(`bible_jp not found: ${book}/${ch}`);

        let jpDataB = null;
        if (_transMode === 'compare') {
            jpDataB = await _fetchTranslation(_transB, book, ch);
        }

        let elData = [];
        if (hasGreek) {
            try {
                const elRes = await fetch(`./bible_data/${book}/${ch}.json`);
                if (elRes.ok) {
                    elData = await elRes.json();
                } else {
                    console.warn(`bible_data not found for ${book}/${ch} - Greek panel disabled`);
                }
            } catch (e) {
                console.warn(`bible_data fetch error for ${book}/${ch}:`, e);
            }
        }

        render(jpData, elData, hasGreek && elData.length > 0, jpDataB);

    } catch (err) {
        console.error(err);
        document.getElementById('bible-text-area').innerHTML = `<p style="color:red">データが見つかりません（${book} ${ch}章）</p>`;
    }
}

function render(jpData, elData, hasGreek, jpDataB) {
    const app          = document.getElementById('bible-text-area');
    const parallel     = document.getElementById('parallel-text-area');
    const mainArea     = document.getElementById('main-reading-area');

    /* 翻訳ヘッダー */
    const headerA = document.getElementById('trans-col-header-a');
    const headerB = document.getElementById('trans-col-header-b');

    headerA.textContent = (TRANSLATIONS[_transA] || {}).label || _transA;

    if (mainArea.classList.contains('compare-mode')) {
        headerB.textContent = (TRANSLATIONS[_transB] || {}).label || _transB;
    } else {
        headerB.textContent = '';
    }

    // ── Study panel を閉じて Reading 状態に戻す ──
    closeStudyPanel();
    /* 章が変わった場合は AppState を完全リセット（study.params も破棄） */
    AppState.mode                = 'reading';
    AppState.selectedVerse       = { vNum: null, elWords: [] };
    AppState.inspect.data        = null;
    AppState.study.params        = null;
    AppState.study.tab           = 'flow';
    AppState.scrollTop           = 0;
    AppState.clearDepth();
    // reading-hint を保持（なければ再生成）
    let hintEl = document.getElementById('reading-hint');
    if (!hintEl) {
        hintEl = document.createElement('div');
        hintEl.id = 'reading-hint';
    }
    app.innerHTML = '';
    app.appendChild(hintEl);
    parallel.innerHTML = '';
    

    // Study panel 内の語形一覧はなくなったため、elByVerseは
    // word-cardのHTMLをverse-blockにインライン埋め込むのではなく、
    // 節クリックで bottom のhidden panelに格納して onWordCardClick から読む方式を維持。
    // ただし bottom-word-panel は display:none なので、代わりに
    // 節クリックで「語形ポップアップリスト」を side-panel 上部に表示する。
    // 今回の最小差分では: 節クリック → side-panel の panelContent に語形カードを描画し Study へ
    // という旧来の挙動を維持しつつ、
    // 語形カードクリック → Inspect popover（新規）の流れにする。

    const elByVerse = {};
    if (elData && elData.length > 0) {
        elData.forEach(w => {
            const v = w.ref.split(':')[1]?.split('!')[0];
            if (v) { if (!elByVerse[v]) elByVerse[v] = []; elByVerse[v].push(w); }
        });
    }

    const openBtn = document.getElementById('open-panel-btn');
    if (!hasGreek) {
        document.getElementById('bottom-depth-panel').style.display = 'none';
        openBtn.style.display = 'none';
    }

    Object.entries(jpData.verses).forEach(([vNum, text]) => {
        // 左：聖書本文
        const block = document.createElement('div');
        block.className = 'verse-block';
        block.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text">${text}</div></div>`;

        if (hasGreek) {
            block.onclick = () => {
                mainArea.querySelectorAll('.verse-block').forEach(b => b.classList.remove('selected'));
                block.classList.add('selected');
                document.getElementById('active-v').innerText = `${vNum} 節`;
                AppState.toBrowsing(vNum, elByVerse[vNum] || []);
                openWordListInStudyPanel(vNum, elByVerse[vNum] || []);
                hideInspectPopover();
            };
        }
        app.appendChild(block);

        // 右：並列訳（compare モード時に翻訳Bを表示）
        const pBlock = document.createElement('div');
        pBlock.className = 'verse-block verse-pair-right';
        const rightText = (jpDataB && jpDataB.verses && jpDataB.verses[vNum]) ? jpDataB.verses[vNum] : (jpData.verses[vNum] || '');
        pBlock.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text">${rightText}</div></div>`;
        parallel.appendChild(pBlock);
    });

    _proximityTokens = (elData || []).map(w => ({ text: w.text || '', lemma: w.lemma || w.text || '' }));

    // Reading hint: 語クリックで Inspect を開けることを静かに示す
    const hint = document.getElementById('reading-hint');
    if (hint) hint.classList.toggle('visible', hasGreek);
}

/**
 * 節クリック時に side-panel を開き、語形リストを3タブで表示する。
 *
 * タブ構成:
 *   流れ（デフォルト） … ギリシャ語順の日本語chip列。「読解UI」のメイン。
 *   通常               … 既存の word-card リスト。
 *   原語               … ギリシャ語テキスト + 簡易morph。
 *
 * 既存の AppState / openStudyPanel / Inspect popover との接続はそのまま。
 * word-card の onclick（onWordCardClick）も通常タブでは変わらず動作する。
 * 流れタブのchipクリックは _wlvChipClick() を経由して同じ AppState を更新する。
 */
function openWordListInStudyPanel(vNum, words) {
    /* words をキャッシュ（chip クリック時の詳細参照用） */
    _wlvWordCache = words || [];

    /* depth stack に verse-flow を追加（reading が先頭になければ追加） */
    const stack = AppState.depth.stack;
    if (stack.length === 0 || stack[0].type !== 'reading') {
        /* reading を先頭に置いてからverse-flowを追加 */
        AppState.clearDepth();
        pushDepth({ type: 'reading', label: '読書' });
    }
    /* verse-flow を追加（重複しないよう top を確認） */
    const top = stack[stack.length - 1];
    if (!top || top.type !== 'verse-flow' || String(top.verse) !== String(vNum)) {
        pushDepth({
            type:  'verse-flow',
            label: 'ことばの流れ',
            verse: vNum,
        });
    }

    _openWordListInternal(vNum, words);
}

/* ════════════════════════════════════════════════════════
   buildFlowTabHTML - 「流れ」タブのメイン描画
   ════════════════════════════════════════════════════════

   設計：
   ① ギリシャ語順を保持（並べ替えない）
   ② 日本語グロスを自然化（品詞・法・時制に応じて接尾語を変換）
   ③ 冠詞は「その」「この」のみ、接続詞は軽く句区切りを挿入
   ④ chip内 dot で品詞を静かに色付け（役割ラベルなし）
   ⑤ クリックで下部ドロワーに詳細を展開（初期非表示）
   ════════════════════════════════════════════════════════ */
function _buildFlowTabHTML(words) {
    /* 各語を「流れchip」データに変換 */
    const chips = words.map((w, i) => _wordToFlowChip(w, i));

    /* ── chip HTML（補助として小さく） ── */
    const chipsHTML = chips.map((c, i) => {
        const sepBefore = c.phraseBreakBefore
            ? `<span class="wlv-phrase-sep"></span>`
            : '';
        return `${sepBefore}<span class="wlv-chip ${c.roleClass}"
            id="wlv-chip-${i}"
            data-idx="${i}"
            onclick="_wlvChipClick(this, ${i})"
            title="${c.greek}">
            <span class="wlv-chip-ja">${c.gloss}</span>
            <span class="wlv-chip-dot"></span>
        </span>`;
    }).join('');

    /* ── 詳細ドロワー：prosecontinuity design ── */
    const drawerHTML = `
        <div class="wlv-detail-drawer" id="wlv-detail-drawer">
            <div class="wlv-detail-greek" id="wlv-dd-greek">-</div>
            <div class="wlv-detail-ja"    id="wlv-dd-ja">-</div>
            <div class="wlv-detail-resonance" id="wlv-dd-resonance"></div>
            <button class="wlv-detail-study-btn" id="wlv-dd-study-btn" onclick="_wlvStudyBtnClick()">
                詳しく見る →
            </button>
        </div>`;

    /* ── 節全体の読書メモ ── */
    const passageNoteHTML = _buildPassageNote(words);

    return `
        <div class="wlv-flow-section-compact">
            <span class="wlv-flow-label-compact">原語の順序</span>
            <div class="wlv-flow-stream" id="wlv-flow-stream">
                ${chipsHTML}
            </div>
            ${drawerHTML}
        </div>
        ${passageNoteHTML}`;
}

/**
 * 節全体の読書メモを生成する。
 * words 配列を解析し、節の「流れ・tone・discourse・emphasis」を
 * 自然な prose として表現する。
 *
 * 設計原則：
 * - signal 列挙しない。自然な文章として融合する。
 * - commentary / exegesis ではない。軽い読書補助。
 * - 情報を列挙するのではなく、文章の動きを感じさせる。
 */
function _buildPassageNote(words) {
    if (!words || words.length === 0) return '';

    /* ────────────────────────────────────────────────
       節全体の読書メモ。
       signal 列挙しない。自然な文として書く。
       文章の動きを感じさせる。commentary ではない。
       ──────────────────────────────────────────────── */

    /* 接続詞 */
    const conjWords = words.filter(w => (w.morph || '').split('-')[0] === 'CONJ').map(w => w.text || '');
    const CONJ_FEEL = {
        'γάρ':  '理由や根拠を示しながら',
        'ἀλλά': '前の内容と対比しながら',
        'οὖν':  '前の流れを受けて結論へ向かいながら',
        'δέ':   '話が次の段階へ進みながら',
        'ἵνα':  '目的を示しながら',
        'ὥστε': '前の内容の帰結として',
        'ὅτι':  '内容を補足しながら',
    };
    const conjHints = conjWords.map(c => CONJ_FEEL[c]).filter(Boolean);

    /* 動詞の法を読む */
    const verbs = words.filter(w => (w.morph || '').split('-')[0] === 'V');
    const imperatives = verbs.filter(w => {
        const p1 = (w.morph || '').split('-')[1] || '';
        const off = /^[0-9]/.test(p1) ? 1 : 0;
        return p1[off + 2] === 'M';
    });
    const perfects = verbs.filter(w => {
        const p1 = (w.morph || '').split('-')[1] || '';
        const off = /^[0-9]/.test(p1) ? 1 : 0;
        return p1[off] === 'X';
    });
    const passives = verbs.filter(w => {
        const p1 = (w.morph || '').split('-')[1] || '';
        const off = /^[0-9]/.test(p1) ? 1 : 0;
        return p1[off + 1] === 'P';
    });
    const participles = verbs.filter(w => {
        const p1 = (w.morph || '').split('-')[1] || '';
        const off = /^[0-9]/.test(p1) ? 1 : 0;
        return p1[off + 2] === 'P';
    });

    /* 比喩語 */
    const METAPHOR = { 'περιπατέω': '歩む', 'περιπατεῖν': '歩む', 'φωτί': '光', 'σκότος': '闇', 'σταυρός': '十字架' };
    const metaphorFound = words.find(w => METAPHOR[w.text] || METAPHOR[w.lemma]);

    /* 呼格 */
    const hasVocative = words.some(w => {
        const p1 = (w.morph || '').split('-')[1] || '';
        const base = ['1','2','3'].includes(p1[0]) ? p1.slice(1) : p1;
        return base[0] === 'V';
    });

    const parts = [];

    /* 第一段落：全体の流れと調子 */
    if (conjHints.length > 0) {
        const hint = conjHints[0];
        if (imperatives.length > 0)
            parts.push(`${hint}、行動への呼びかけが続いています。`);
        else if (perfects.length > 0)
            parts.push(`${hint}、かつての出来事が今も続いているという響きが感じられます。`);
        else
            parts.push(`${hint}、話が展開しています。`);
    } else if (imperatives.length >= 2) {
        parts.push(`呼びかけの調子が重なっています。同じ方向への言葉が繰り返されることで、強調の感触があります。`);
    } else if (imperatives.length === 1) {
        parts.push(`説明や叙述ではなく、行動への呼びかけとして語られています。`);
    } else if (perfects.length > 0) {
        parts.push(`過去に起きた出来事の効果が今も続いている、という完了の重みが感じられます。`);
    } else if (passives.length > 0) {
        parts.push(`主語が「受けとめる側」として置かれています。神学的な文脈では、神による行為を示すことがあります。`);
    }

    /* 第二段落：構造の特徴 */
    if (participles.length > 0 && imperatives.length > 0) {
        parts.push(`主な呼びかけに、分詞が添えられています。「〜しながら」という背景や状況を重ねています。`);
    } else if (participles.length > 1) {
        parts.push(`複数の分詞が連なり、主語の状況や動作の背景が丁寧に描かれています。`);
    }
    if (metaphorFound) {
        const mJa = METAPHOR[metaphorFound.text] || METAPHOR[metaphorFound.lemma] || '';
        if (mJa) parts.push(`「${mJa}」が比喩として使われています。文字通りの意味を超えて、生き方や状態を指している可能性があります。`);
    }
    if (hasVocative) {
        parts.push(`呼びかけの言葉が使われています。読者を直接名指しする調子があります。`);
    }

    /* デフォルト */
    if (parts.length === 0) {
        if (words.length <= 5)
            parts.push(`短い節です。一語一語が凝縮された意味を持って置かれています。`);
        else
            parts.push(`原語の語順と品詞の流れは、上の原語の順序から確認できます。`);
    }

    const proseParagraphs = parts.map(p2 => `<p>${p2}</p>`).join('');

    return `
        <section class="wlv-reading-passage-note">
            <span class="wlv-pn-label">この節の読書メモ</span>
            <div class="wlv-pn-prose">
                ${proseParagraphs}
            </div>
        </section>`;
}


/**
 * 1語のデータを flow chip 表示用オブジェクトに変換する。
 *
 * @param {Object} w   word data（text, morph, lemma, japanese/gloss, ref, strong）
 * @param {number} i   index
 * @returns {{ greek, gloss, roleClass, phraseBreakBefore, signals, morphText, jaWord, rawMorph, lemma, ref, strong }}
 */
function _wordToFlowChip(w, i) {
    const greek    = w.text   || '-';
    const rawMorph = w.morph  || '';
    const lemma    = w.lemma  || '';
    const ref      = w.ref    || '';
    const strong   = String(w.strong || '').replace(/[^0-9]/g, '');
    const jaWord   = w.japanese || w.gloss
        || (abbottSmithDict && abbottSmithDict[strong]?.japanese)
        || '？';

    const parts    = rawMorph.split('-');
    const pos      = parts[0] || '';

    /* ── グロス自然化 ── */
    let gloss = jaWord;

    /* 動詞の法・時制に応じた接尾調整 */
    if (pos === 'V' && parts[1]) {
        const off       = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off]     || '';
        const voiceCode = parts[1][off + 1] || '';
        const moodCode  = parts[1][off + 2] || '';

        /* 分詞：「〜ながら」「〜した（上で）」など */
        if (moodCode === 'P') {
            if (tenseCode === 'P') gloss = _naturalize(jaWord, 'part-pres');
            else if (tenseCode === 'A') gloss = _naturalize(jaWord, 'part-aor');
            else if (tenseCode === 'X') gloss = _naturalize(jaWord, 'part-perf');
        }
        /* 不定詞 */
        else if (moodCode === 'N') {
            gloss = _naturalize(jaWord, 'inf');
        }
        /* 命令法 */
        else if (moodCode === 'M') {
            gloss = _naturalize(jaWord, 'imp');
        }
        /* 受動態 */
        if (voiceCode === 'P') {
            gloss = _naturalize(gloss, 'pass');
        }
    }

    /* 冠詞：「その」「この」または非表示 */
    if (pos === 'T') {
        /* 冠詞は目に見える情報を最小化。「の」だけ示す */
        gloss = 'その';
    }

    /* roleClass：chip dot の色付けと signal 生成 */
    let roleClass = 'role-other';
    const signals = [];

    if (pos === 'V') {
        roleClass = 'role-verb';
        const off      = /^[0-9]/.test(parts[1] || '') ? 1 : 0;
        const moodCode = (parts[1] || '')[off + 2] || '';
        const tenCode  = (parts[1] || '')[off]     || '';
        const voiCode  = (parts[1] || '')[off + 1] || '';

        /* 法（Mood）シグナル - 読書感覚の言葉で */
        if (moodCode === 'M') signals.push({ label: '強く勧めている', cls: 'sig-exhort' });
        else if (moodCode === 'P') signals.push({ label: '背景を描いている', cls: 'sig-logic' });
        else if (moodCode === 'N') signals.push({ label: '目的を示している', cls: 'sig-logic' });
        else if (moodCode === 'S') signals.push({ label: '願いを込めている', cls: 'sig-logic' });

        /* 時制シグナル - 読書感覚の言葉で */
        if (tenCode === 'X') signals.push({ label: '今も続いている', cls: 'sig-promise' });
        else if (tenCode === 'A' && moodCode === 'I') signals.push({ label: '一つの出来事として語っている', cls: 'sig-declare' });
        else if (tenCode === 'F' && moodCode === 'I') signals.push({ label: '確かに起きると語っている', cls: 'sig-promise' });

        /* 態シグナル */
        if (voiCode === 'P') signals.push({ label: '受けとめる側に立っている', cls: 'sig-word' });
        else if (voiCode === 'M' || voiCode === 'D') signals.push({ label: '深く関わりながら動いている', cls: 'sig-word' });
    }
    else if (pos === 'N')    {
        roleClass = 'role-noun';
        const caseParts = parts[1] || '';
        const base = ['1','2','3'].includes(caseParts[0]) ? caseParts.slice(1) : caseParts;
        const CASE_SIG = {
            N: { label: '中心にいる', cls: 'sig-logic' },
            G: { label: '結びついている', cls: 'sig-logic' },
            D: { label: '関わりを受けている', cls: 'sig-logic' },
            A: { label: '動作の向かう先', cls: 'sig-logic' },
            V: { label: '呼びかけられている', cls: 'sig-logic' }
        };
        const cs = CASE_SIG[base[0]];
        if (cs) signals.push(cs);
        const NUM_SIG = { P: { label: '複数で語られている', cls: 'sig-logic' } };
        const ns = NUM_SIG[base[1]];
        if (ns) signals.push(ns);
    }
    else if (pos === 'A')    {
        roleClass = 'role-adj';
        const caseParts = parts[1] || '';
        const base = ['1','2','3'].includes(caseParts[0]) ? caseParts.slice(1) : caseParts;
        const CASE_SIG = {
            N: { label: '特徴を示している', cls: 'sig-logic' },
            G: { label: '性質を結びつけている', cls: 'sig-logic' },
            D: { label: '関わる対象を彩っている', cls: 'sig-logic' },
            A: { label: '対象の様子を語っている', cls: 'sig-logic' }
        };
        const cs = CASE_SIG[base[0]];
        if (cs) signals.push(cs);
    }
    else if (pos === 'CONJ') {
        roleClass = 'role-conj';
        const CONJ_SIG = {
            'γάρ':  { label: 'なぜなら、と理由へ進む', cls: 'sig-logic' },
            'ἀλλά': { label: 'しかし、と流れが変わる', cls: 'sig-turn' },
            'οὖν':  { label: 'だから、と結論へ向かう', cls: 'sig-logic' },
            'δέ':   { label: '話が次の段階へ進む', cls: 'sig-turn' },
            'καί':  { label: 'さらに、と積み重なる', cls: 'sig-emphasis' },
            'ἵνα':  { label: '〜のために、と目的が示される', cls: 'sig-logic' },
            'ὅτι':  { label: '〜ということ、と内容が続く', cls: 'sig-logic' },
            'εἰ':   { label: 'もし〜なら、と仮定の話に入る', cls: 'sig-logic' },
            'ὥστε': { label: 'その結果として、と帰結が来る', cls: 'sig-logic' },
        };
        const cs = CONJ_SIG[w.text];
        if (cs) signals.push(cs);
        else signals.push({ label: '前後をつないでいる', cls: 'sig-logic' });
    }
    else if (pos === 'PREP') { roleClass = 'role-prep'; signals.push({ label: '関係の方向を示している', cls: 'sig-logic' }); }
    else if (pos === 'T')    { roleClass = 'role-art'; /* 冠詞はsignalなし。静かに */ }
    else if (['P','R','D'].includes(pos)) {
        roleClass = 'role-pron';
        const caseParts = parts[1] || '';
        const base = ['1','2','3'].includes(caseParts[0]) ? caseParts.slice(1) : caseParts;
        const CASE_SIG = {
            N: { label: '誰の話かを示している', cls: 'sig-logic' },
            G: { label: '誰に関わるかを示している', cls: 'sig-logic' },
            D: { label: '関わりを受けている人を指す', cls: 'sig-logic' },
            A: { label: '動作の向かう人を指す', cls: 'sig-logic' }
        };
        const cs = CASE_SIG[base[0]];
        if (cs) signals.push(cs);
    }

    /* 句区切りの判定：接続詞・前置詞の前で区切る */
    const phraseBreakBefore = (pos === 'CONJ' && i > 0) || (pos === 'PREP' && i > 0);

    /* morphText：ドロワーに表示する人が読める文法メモ */
    const morphText = _buildMorphText(rawMorph, pos, parts);

    return { greek, gloss, roleClass, phraseBreakBefore, signals, morphText, jaWord, rawMorph, lemma, ref, strong };
}

/**
 * 日本語グロスを品詞・法に応じて自然化する。
 * グロスの末尾をルールベースで変換する。複雑な形態素分析は行わない。
 * 変換できなければ元の gloss をそのまま返す。
 */
function _naturalize(gloss, kind) {
    /* 動詞語幹の末尾を変換するルールテーブル */
    const RULES = {
        'part-pres': [ /* 現在分詞：〜ながら / 〜つつ → 〜ながら */
            [/する$/, 'しながら'], [/する$/, 'しながら'],
            [/いる$/, 'いながら'], [/える$/, 'えながら'],
            [/くる$/, 'きながら'], [/ある$/, 'ありながら'],
            [/([^ん])る$/, '$1ながら'],
            [/つ$/, 'ちながら'],   [/ぬ$/, 'にながら'],
            [/む$/, 'みながら'],   [/ぶ$/, 'びながら'],
            [/う$/, 'いながら'],   [/く$/, 'きながら'],
            [/す$/, 'しながら'],   [/ぐ$/, 'ぎながら'],
        ],
        'part-aor': [ /* アオリスト分詞：〜した（後で） */
            [/する$/, 'した'],     [/いる$/, 'いた'],
            [/える$/, 'えた'],     [/くる$/, 'きた'],
            [/([^ん])る$/, '$1た'],
            [/つ$/, 'った'],       [/ぬ$/, 'んだ'],
            [/む$/, 'んだ'],       [/ぶ$/, 'んだ'],
            [/う$/, 'った'],       [/く$/, 'いた'],
            [/す$/, 'した'],       [/ぐ$/, 'いだ'],
        ],
        'part-perf': [ /* 完了分詞：〜した（状態） */
            [/する$/, 'してきた'], [/いる$/, 'いてきた'],
            [/([^ん])る$/, '$1てきた'],
            [/つ$/, 'ってきた'],   [/む$/, 'んできた'],
        ],
        'inf': [ /* 不定詞：〜すること */
            [/する$/, 'すること'], [/いる$/, 'いること'],
            [/える$/, 'えること'], [/くる$/, 'くること'],
            [/([^ん])る$/, '$1ること'],
            [/つ$/, 'つこと'],    [/ぬ$/, 'ぬこと'],
            [/む$/, 'むこと'],    [/ぶ$/, 'ぶこと'],
            [/う$/, 'うこと'],    [/く$/, 'くこと'],
            [/す$/, 'すこと'],
        ],
        'imp': [ /* 命令法：そのまま（「〜せよ」は重い）*/
            [/する$/, 'せよ'],    [/([^ん])る$/, '$1よ'],
        ],
        'pass': [ /* 受動：〜される */
            [/する$/, 'される'],  [/いる$/, 'いられる'],
            [/([^ん])る$/, '$1られる'],
            [/つ$/, 'たれる'],    [/む$/, 'まれる'],
            [/ぶ$/, 'ばれる'],    [/く$/, 'かれる'],
            [/す$/, 'される'],
        ],
    };

    const rules = RULES[kind] || [];
    for (const [pattern, replacement] of rules) {
        if (pattern.test(gloss)) {
            return gloss.replace(pattern, replacement);
        }
    }
    return gloss; /* 変換できなければ元のまま */
}

/**
 * rawMorph から読書感覚の補助メモ（1行）を生成する。
 * ドロワーに表示するだけなので学術ラベルは使わない。
 * Study タブでは別途詳細が表示される。
 */
function _buildMorphText(rawMorph, pos, parts) {
    if (pos === 'V' && parts[1]) {
        const off  = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const moodCode  = parts[1][off + 2] || '';
        const tenCode   = parts[1][off]     || '';
        const voiCode   = parts[1][off + 1] || '';

        const MOOD_NOTE = {
            'M': '行動への呼びかけ',
            'P': '状況や背景を添えている',
            'N': '目的や内容を補っている',
            'S': '願いや目的を含んでいる',
            'I': '事実として語っている',
            'O': '望みを込めた表現',
        };
        const TEN_NOTE = {
            'X': '過去から今も続く状態',
            'A': 'ある出来事として',
            'F': '確かに起きること',
            'P': '今・継続して',
            'I': '続いていた状態',
        };
        const VOI_NOTE = {
            'P': '受けとめる側に',
            'M': '深く関わりながら',
            'D': '深く関わりながら',
        };

        const notes = [];
        if (MOOD_NOTE[moodCode]) notes.push(MOOD_NOTE[moodCode]);
        if (TEN_NOTE[tenCode] && moodCode !== 'N' && moodCode !== 'P') notes.push(TEN_NOTE[tenCode]);
        if (VOI_NOTE[voiCode]) notes.push(VOI_NOTE[voiCode]);
        return notes.join('・') || '動詞';
    } else if (['N','A'].includes(pos) && parts[1]) {
        const base = ['1','2','3'].includes(parts[1][0]) ? parts[1].slice(1) : parts[1];
        const CASE_NOTE = {
            'N': '文の中心にいる', 'G': '〜の、と結びつく',
            'D': '関わりを受ける', 'A': '動作の向かう先', 'V': '呼びかけ'
        };
        const NUM_NOTE = { 'S': '単数', 'P': '複数' };
        const notes = [];
        if (CASE_NOTE[base[0]]) notes.push(CASE_NOTE[base[0]]);
        if (NUM_NOTE[base[1]] === '複数') notes.push('複数で語られている');
        return notes.join('・') || (pos === 'N' ? '名詞' : '形容詞');
    } else if (pos === 'CONJ') {
        return '前後をつなぐことば';
    } else if (pos === 'PREP') {
        return '関係の方向を示す';
    } else if (pos === 'T') {
        return '指し示すことば（冠詞）';
    } else if (['P','R','D'].includes(pos)) {
        return '誰かを指し示している';
    }
    return '';
}

/**
 * 1語について「この節でどう響くか」を1〜2文のproseで返す。
 * signal tag列挙禁止。形態論タームを読書感覚の言葉に翻訳する。
 */
function _buildResonanceText(chip) {
    const rawMorph = chip.rawMorph || '';
    const parts    = rawMorph.split('-');
    const pos      = parts[0] || '';
    const p1       = parts[1] || '';
    const off      = /^[0-9]/.test(p1) ? 1 : 0;
    const jaWord   = chip.jaWord || '';
    const w        = jaWord ? `「${jaWord}」` : 'この語';

    /* 動詞 */
    if (pos === 'V') {
        const tenCode  = p1[off]     || '';
        const voiCode  = p1[off + 1] || '';
        const moodCode = p1[off + 2] || '';

        if (moodCode === 'M') {
            if (tenCode === 'P') return `${w}が繰り返し続けていく姿勢として、呼びかけています。`;
            return `説明ではなく、${w}として直接方向を示しています。`;
        }
        if (moodCode === 'P') {
            if (tenCode === 'A') return `先行する動作として背景に置かれ、主な出来事を支えています。`;
            return `主な動作と同時に進む状況を描き添えています。`;
        }
        if (moodCode === 'N') return `前の動作の目的や内容を補っています。`;
        if (moodCode === 'S') return `願いや目的の含みをもって響いています。`;
        if (tenCode === 'X') return `かつて起きた出来事の効果が、今この節でも続いています。`;
        if (tenCode === 'A' && moodCode === 'I') return `ひとつの完結した出来事として、静かに提示されています。`;
        if (tenCode === 'F') return `確かに起きることとして語られています。`;
        if (voiCode === 'P') return `主語が受けとめる側として置かれています。`;
        if (voiCode === 'M' || voiCode === 'D') return `主語が深く関わりながら動いています。`;
        return `この節の中心的な動作として響いています。`;
    }

    /* 接続詞 */
    if (pos === 'CONJ') {
        const CONJ_FEEL = {
            'γάρ':  '前の内容の根拠へと流れが向かっています。',
            'ἀλλά': 'ここで流れが転換し、対比が強まっています。',
            'οὖν':  '前の議論を受けて、結論へと向かっています。',
            'δέ':   '話が次の段階へ静かに進んでいます。',
            'καί':  '内容が積み重なりながら続いています。',
            'ἵνα':  '目的の内容がこの先に続きます。',
            'ὥστε': '前の内容を受けて、その帰結が語られています。',
            'ὅτι':  '内容や根拠の節が始まっています。',
        };
        return CONJ_FEEL[chip.greek] || '前後の節をつなぎ、流れを形作っています。';
    }

    /* 名詞・形容詞・代名詞 */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const base = ['1','2','3'].includes(p1[0]) ? p1.slice(1) : p1;
        const CASE_FEEL = {
            'N': `${w}が、この節の中心に置かれています。`,
            'G': `${w}が「〜の」として結びつき、関係を示しています。`,
            'D': `${w}が、動作の間接的な関わりとして響いています。`,
            'A': `${w}が、動作の向かう先として置かれています。`,
            'V': `${w}が、直接呼びかけられています。`,
        };
        return CASE_FEEL[base[0]] || '原語の詳細は「深く読む」から確認できます。';
    }

    if (pos === 'PREP') return '関係の方向や位置を示しています。';
    if (pos === 'T') return '後続の語を特定して指し示しています。';
    return '原語の詳細は「深く読む」から確認できます。';
}

/* ══════════════════════════════════════════
   パネルリサイズ（縦方向ドラッグ - bottom-depth-panel）
   ══════════════════════════════════════════ */
(function() {
    const handle = document.getElementById('panel-resize-handle');
    const panel  = document.getElementById('bottom-depth-panel');
    if (!handle || !panel) return;
    let dragging = false, startY = 0, startH = 0;

    handle.addEventListener('mousedown', (e) => {
        dragging = true;
        startY = e.clientY;
        startH = panel.offsetHeight;
        handle.classList.add('dragging');
        document.body.style.cursor = 'row-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const dy = startY - e.clientY;
        const nh = Math.max(220, Math.min(window.innerHeight * 0.70, startH + dy));
        panel.style.height = nh + 'px';
    });
    document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });
    handle.addEventListener('touchstart', (e) => {
        dragging = true;
        startY = e.touches[0].clientY;
        startH = panel.offsetHeight;
        e.preventDefault();
    }, { passive: false });
    document.addEventListener('touchmove', (e) => {
        if (!dragging) return;
        const dy = startY - e.touches[0].clientY;
        const nh = Math.max(220, Math.min(window.innerHeight * 0.70, startH + dy));
        panel.style.height = nh + 'px';
    }, { passive: false });
    document.addEventListener('touchend', () => { dragging = false; });
})();

     - AppState.saveScroll() で scroll 位置を保存

/* ══════════════════════════════════════════
   openStudyPanel - 読書メモ版
   タブを廃止し、単一スクロールの読書メモパネルに表示する。
   ══════════════════════════════════════════ */
function openStudyPanel(greek, rawMorph, ref, lemma) {
    // word-list-view を削除
    const listEl = document.getElementById('word-list-view');
    if (listEl) listEl.remove();

    const m = parseMorphForSearch(rawMorph);
    const params = {
        ref,
        word:      greek,
        lemma:     lemma || '',
        pos:       m.pos    || '',
        _rawMorph: rawMorph,
        tense:     m.tense  || '',
        mood:      m.mood   || '',
        voice:     m.voice  || '',
        gender:    m.gender || '',
        number:    m.number || '',
        case:      m.case   || '',
    };

    AppState.saveScroll();
    AppState.toStudy(params, 'notes');

    /* depth stack に追加（重複しないよう、top が同じなら追加しない） */
    const stack = AppState.depth.stack;
    const topEntry = stack[stack.length - 1];
    const isAlreadyDeep = topEntry && topEntry.type === 'deep-reading' && topEntry.strong === String(AppState.inspect.data?.strong || '');
    if (!isAlreadyDeep) {
        pushDepth({
            type:   'deep-reading',
            label:  '深く読む',
            strong: String(AppState.inspect.data?.strong || ''),
        });
    }

    const sidePanel    = document.getElementById('bottom-depth-panel');
    sidePanel.classList.add('open');
const activeVEl = document.getElementById('active-v');
    if (activeVEl && greek) activeVEl.textContent = greek;

    document.getElementById('open-panel-btn').style.display = 'none';

    /* rcb-container: 語形のみ表示 */
    const rcb = document.getElementById('rcb-container');
    const rcbWord  = document.getElementById('rcb-main-word');
    const rcbGloss = document.getElementById('rcb-main-gloss');
    if (rcbWord)  rcbWord.textContent  = greek || '-';
    if (rcbGloss) rcbGloss.textContent = (AppState.inspect.data?.jaWord) || '';
    if (rcb) rcb.classList.add('visible');

    /* 読書メモエリアを表示 */
    const notesWrap = document.getElementById('reading-notes-wrap');
    if (notesWrap) notesWrap.style.display = 'flex';

    _renderReadingNotes(params);
}

function goProximityPage() {
    const p = new URLSearchParams();

    const activeVEl   = document.getElementById('active-v');
    const activeVText = activeVEl ? activeVEl.innerText.replace(/\s*節\s*$/, '').trim() : '';

    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || '';
    const ch   = urlParams.get('ch')   || '';

    /* AppState.inspect.data から語を取得（後方互換: _inspectData も同じ参照） */
    const inspData = AppState.inspect.data;
    if (inspData && inspData.greek) {
        p.set('word1', inspData.greek);
    }

    if (book && ch) {
        const ref = activeVText ? `${book}${ch}:${activeVText}` : `${book}${ch}`;
        p.set('ref', ref);
        if (activeVText) p.set('scope', 'verse');

}

function switchTab(evt, tabName) {
    const tabContents = document.getElementsByClassName("tab-content");
    for (let i = 0; i < tabContents.length; i++) tabContents[i].classList.remove("active");
    const tabBtns = document.getElementsByClassName("tab-btn");
    for (let i = 0; i < tabBtns.length; i++) tabBtns[i].classList.remove("active");
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
    document.getElementById('main-reading-area').scrollTop = 0;
}

async function renderCurrentPage() {
    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || 'ROM';
    const ch   = urlParams.get('ch')   || '1';

    const isNt = SB_BOOKS.nt.some(b => b.key === book);
    document.querySelector('.root-name') && (document.querySelector('.root-name').innerText = isNt ? '新約聖書' : '旧約聖書');

    const allBooks = [...SB_BOOKS.nt, ...SB_BOOKS.ot];
    const found = allBooks.find(b => b.key === book);
    const titleEl = document.getElementById('view-title');
    if (titleEl) titleEl.innerText = found ? `${found.name} ${ch}章` : `${book} ${ch}章`;

    /* location 更新 */
    AppState.location.testament = isNt ? 'nt' : 'ot';
    AppState.location.book      = found || null;
    AppState.location.chapter   = parseInt(ch);
    renderGlobalBreadcrumb();

    const hasGreek = GREEK_BOOKS.has(book);

    try {
        const jpData = await _fetchTranslation(_transA, book, ch);
        if (!jpData) throw new Error('Not found');

        let jpDataB = null;
        if (_transMode === 'compare') {
            jpDataB = await _fetchTranslation(_transB, book, ch);
        }

        let elData = [];
        if (hasGreek) {
            try {
                const elRes = await fetch(`./bible_data/${book}/${ch}.json`);
                if (elRes.ok) elData = await elRes.json();
            } catch(e) {}
        }

        render(jpData, elData, hasGreek && elData.length > 0, jpDataB);
        document.getElementById('active-v').innerText = "";
    } catch (err) {
        document.getElementById('bible-text-area').innerHTML = `<p style="color:red">データが見つかりません。</p>`;
    }
}

<div class="knowledge-container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'kanji')">冠詞</button>
        <button class="tab-btn" onclick="switchTab(event, 'kaku')">格の特徴</button>
        <button class="tab-btn" onclick="switchTab(event, 'futei')">不定詞</button>
    </div>

    <div id="kanji" class="tab-content active">
        <div class="info-box">
            <h2>ギリシャ語の冠詞</h2>
            <aside>
                ギリシャ語の冠詞は英語の「the」とは異なり、「それが何であるか（正体）」を示す装置である。基本は次の対比で整理する。<br>
                <strong>冠詞あり</strong> → 正体が特定されている<br>
                <strong>冠詞なし</strong> → 性質・本質が強調されている
            </aside>
            <h3>①：基本機能（最重要）</h3>
            <p>冠詞は対象を特定し、読者に「これである」と指し示す働きを持つ。一方、無冠詞は対象の性質や特徴に焦点を当てる。</p>
            <h3>②：冠詞ありの主な用法</h3>
            <ul>
                <li>既出の対象：前に言及されたもの</li>
                <li>文脈上明らかな対象：周知のもの</li>
                <li>唯一の存在（神、太陽など）</li>
                <li>クラスを代表するもの</li>
            </ul>
            <h3>③：無冠詞名詞の主な用法</h3>
            <ul>
                <li>性質の強調（どのような存在か）</li>
                <li>不特定（ある一つの〜）</li>
                <li>文脈上は特定される（固有名詞など）</li>
            </ul>
            <h3>④：主語と述語主格（重要構文）</h3>
            <p>「AはBである」では、冠詞がある方が主語。動詞の前に置かれた述語主格は無冠詞になりやすく、性質が強調される。</p>
            <h3>⑤：重要な文法規則</h3>
            <ul>
                <li><strong>コルウェルの規則：</strong>動詞の前の述語主格は無冠詞になりうる。</li>
                <li><strong>グランヴィル・シャープの規則：</strong>「冠詞＋A＋και＋B」は同一人物。</li>
                <li><strong>アポロニウスの規則：</strong>関連する名詞ペアは冠詞の有無が一致しやすい。</li>
            </ul>
            <h3>⑥：実体化（名詞化）の機能</h3>
            <p>冠詞＋不定詞＝「〜すること」、冠詞＋分詞＝「〜する者」。</p>
            <h3>⑦：判断の手順</h3>
            <div class="step-list">
                1. 冠詞の有無確認 → 2. 正体か性質か判定 → 3. 特定可能か検討 → 4. 主語述語関係確認 → 5. 文法規則適用検討 → 6. 性質強調の可能性検討
            </div>
            <div class="back-button-container">
                <button class="back-btn" onclick="renderCurrentPage()">本文に戻る</button>
            </div>
        </div>
    </div>

    <div id="kaku" class="tab-content">
        <div class="info-box">
            <h2>格の特徴</h2>
            <aside>
                5格（主・属・与・対・呼）を「誰が・誰の・誰に・何を・呼びかけ」を軸に整理する。
            </aside>
            <h3>①：主格</h3>
            <p>コアイメージは「主体・同一性」。主語や述語主格に使われる。冠詞・代名詞・固有名詞の順に主語になりやすい。</p>
            <h3>②：属格</h3>
            <p>コアイメージは「制限・関係（〜の）」。所有、関係、性質、同格などのほか、「〜から（分離）」も表す。主格的／目的格的属格の判断が重要。</p>
            <h3>③：与格</h3>
            <p>コアイメージは「関わり・影響」。間接目的語、利益、場所（〜において）、手段（〜によって）などを表す。</p>
            <h3>④：対格</h3>
            <p>コアイメージは「動作の到達点・範囲」。直接目的語、時間の長さ、方向。<strong>不定詞の主語が対格になる</strong>点に注意。</p>
            <h3>⑤：呼格</h3>
            <p>コアイメージは「呼びかけ」。主格が代用される場合は、より強調されたニュアンスを持つ。</p>
            <div class="back-button-container">
                <button class="back-btn" onclick="renderCurrentPage()">本文に戻る</button>
            </div>
        </div>
    </div>

    <div id="futei" class="tab-content">
        <div class="info-box">
            <h2>不定詞</h2>
            <aside>
                動詞の性質（相）と名詞の性質（〜すること）をあわせ持つ「動詞的名詞」。
            </aside>
            <h3>①：相（アスペクト）</h3>
            <ul>
                <li>現在不定詞：進行・継続</li>
                <li>アオリスト不定詞：単純な出来事（過去ではない）</li>
                <li>完了不定詞：動作の結果の状態</li>
            </ul>
            <h3>②：名詞的／副詞的な使い方</h3>
            <p>主語や目的語として働くほか、理由・目的（〜するために）・結果などの副詞的機能も持つ。</p>
            <h3>④：前置詞＋不定詞（時間関係）</h3>
            <ul>
                <li>μετὰ + 不定詞：〜した後で</li>
                <li>ἐν + 不定詞：〜している最中に</li>
                <li>πρὸ + 不定詞：〜する前に</li>
            </ul>
            <h3>⑤：判断の手順</h3>
            <div class="step-list">
                1. 前の動詞確認 → 2. 前置詞確認 → 3. 「〜すること」代入 → 4. 理由・目的検討 → 5. 不定詞の主語（対格）確認
            </div>
            <div class="back-button-container">
                <button class="back-btn" onclick="renderCurrentPage()">本文に戻る</button>
            </div>
        </div>
    </div>
</div>
