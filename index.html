<!DOCTYPE html>

<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05141430｜聖書をギリシャ語で読むアプリ｜コトバト</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="shared-insight.js"></script>
    <style>
    :root {
        --bg-paper: #ffffff;
        --bg-panel: #f5f5f7;
        --bg-sidebar: #fafafa;
        --bg-card: #f5f5f7;
        --text-main: #1d1d1f;
        --text-sub: #6e6e73;
        --accent-dark: #1d1d1f;
        --highlight: #5a6e82;
        --highlight-light: rgba(90,110,130,0.10);
        --border-soft: rgba(0,0,0,0.08);
    }

body {
font-family: ‘Noto Sans JP’, -apple-system, BlinkMacSystemFont, ‘Helvetica Neue’, sans-serif;
line-height: 2.0;
background: var(–bg-paper);
color: var(–text-main);
margin: 0; padding: 0;
overflow: hidden;
-webkit-font-smoothing: antialiased;
}

.main-layout { display: flex; height: 100vh; width: 100vw; }

/* — 左サイドメニュー — */
.nav-sidebar {
width: 220px;
background: var(–bg-sidebar);
border-right: 1px solid var(–border-soft);
display: flex;
flex-direction: column;
transition: width 0.3s ease;
overflow: hidden;
flex-shrink: 0;
}
.nav-sidebar.collapsed { width: 56px; }
.sidebar-top { padding: 22px 16px 16px; display: flex; align-items: center; gap: 12px; }
.sidebar-toggle-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(–text-sub); width: 28px; padding: 0; }
.sidebar-logo { font-weight: 700; font-size: 1rem; white-space: nowrap; letter-spacing: -0.01em; color: var(–text-main); }

.sidebar-menu { flex: 1; padding: 8px 10px; overflow-y: auto; }
.sidebar-section { margin-bottom: 20px; }
.section-label { font-size: 0.65rem; font-weight: 700; color: var(–text-sub); padding-left: 10px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.12em; }

.menu-item {
padding: 7px 10px;
border-radius: 8px;
display: flex;
align-items: center;
gap: 10px;
cursor: pointer;
transition: background 0.15s;
white-space: nowrap;
font-size: 0.9rem;
}
.menu-item:hover { background: rgba(0,0,0,0.04); }
.menu-item.active { background: rgba(90,110,130,0.10); color: var(–highlight); font-weight: 700; }
.collapsed .menu-text, .collapsed .section-label { display: none; }

/* — サイドバー ドリルダウン — */
.sb-layer { display: none; }
.sb-layer.active { display: block; }
.sb-layer-header {
display: flex; align-items: center; gap: 6px;
padding: 8px 12px 6px; cursor: pointer; border-radius: 6px; margin: 0 4px 2px;
transition: background 0.12s;
}
.sb-layer-header:hover { background: rgba(0,0,0,0.04); }
.sb-back-arrow { font-size: 11px; color: var(–highlight); font-weight: 700; }
.sb-layer-title { font-size: 0.65rem; font-weight: 700; color: var(–highlight); letter-spacing: 0.1em; text-transform: uppercase; }
.sb-row {
padding: 7px 12px; font-size: 0.88rem; color: var(–text-main);
cursor: pointer; display: flex; align-items: center; justify-content: space-between;
border-radius: 8px; margin: 0 4px 1px; transition: background 0.12s;
}
.sb-row:hover { background: rgba(0,0,0,0.04); }
.sb-row.active { background: var(–highlight-light); color: var(–highlight); font-weight: 700; }
.sb-row-arrow { font-size: 10px; color: #ccc; }
.sb-row.active .sb-row-arrow { color: var(–highlight); }
.sb-ch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 6px 10px 10px; }
.sb-ch-btn {
aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
font-size: 0.8rem; font-weight: 500; color: var(–text-sub);
background: #fff; border: 1px solid var(–border-soft);
border-radius: 7px; cursor: pointer; transition: all 0.12s;
}
.sb-ch-btn:hover { background: var(–highlight-light); border-color: var(–highlight); color: var(–highlight); }
.sb-ch-btn.active { background: var(–highlight); color: #fff; border-color: var(–highlight); font-weight: 700; }

/* — 中央メインエリア — */
.container { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(–bg-paper); }
.app-header { padding: 18px 40px; border-bottom: 1px solid var(–border-soft); background: var(–bg-paper); }
.header-content { display: flex; align-items: center; justify-content: space-between; }
.breadcrumb { display: flex; align-items: center; gap: 8px; color: var(–text-sub); font-size: 0.85rem; }
.breadcrumb h1 { font-size: 1.05rem; margin: 0; color: var(–text-main); font-weight: 700; letter-spacing: -0.02em; }
.separator { color: var(–text-sub); opacity: 0.4; }

#app {
flex: 1;
display: flex;
flex-direction: column;
overflow: hidden;
}

/* ══════════════════════════════════════════
Reading / Study レイアウト
Reading: side-panel 非表示 → 本文全幅
Study:   side-panel 表示  → 本文縮小
bottom-word-panel は廃止（Inspectに統合）
══════════════════════════════════════════ */
#main-reading-area {
flex: 1;
display: flex;
min-height: 0;
}
/* 左：聖書本文 */
#bible-text-area {
flex: 1;
overflow-y: auto;
padding: 32px 32px 40px 52px;
}
/* 右：並列訳（Reading時のみ表示） */
#parallel-text-area {
width: 42%;
border-left: 1px solid var(–border-soft);
overflow-y: auto;
padding: 28px 24px 20px 48px;
background: #fafafa;
font-size: 0.92rem;
color: var(–text-sub);
line-height: 2.0;
}

/* bottom-word-panel: 廃止。高さ0で残骸を隠す */
#bottom-word-panel {
display: none;
}
#panel-content { display: none; }
#word-detail-view { display: none; }

/* — フッター — */
.app-footer {
border-top: 1px solid var(–border-soft);
padding: 12px 48px;
display: flex;
align-items: center;
justify-content: space-between;
flex-shrink: 0;
background: var(–bg-paper);
}
.footer-copy {
font-size: 0.7rem;
color: var(–text-sub);
letter-spacing: 0.01em;
}
.footer-links {
display: flex;
gap: 18px;
}
.footer-links button {
font-size: 0.7rem;
color: var(–text-sub);
background: none;
border: none;
border-bottom: 1px solid rgba(0,0,0,0.12);
cursor: pointer;
padding-bottom: 1px;
font-family: inherit;
transition: color 0.15s;
}
.footer-links button:hover { color: var(–text-main); }

/* — 右サイドパネル（Study モード） — */
#open-panel-btn {
background: transparent; border: none; padding: 0 10px; cursor: pointer; color: var(–highlight);
font-size: 1.2rem; transition: transform 0.2s, opacity 0.2s; line-height: 1;
}
#open-panel-btn:hover { opacity: 0.7; transform: scale(1.1); }

#side-panel {
width: 44%;
min-width: 280px;
max-width: 80%;
background: var(–bg-panel);
border-left: 1px solid var(–border-soft);
padding: 0;
display: none;   /* ← Reading時は非表示。Studyへの昇格時のみ表示 */
flex-direction: column;
flex-shrink: 0;
height: 100vh;
box-sizing: border-box;
position: relative;
}

/* リサイズハンドル */
#panel-resize-handle {
position: absolute;
left: -4px;
top: 0;
width: 8px;
height: 100%;
cursor: col-resize;
z-index: 100;
display: flex;
align-items: center;
justify-content: center;
}
#panel-resize-handle::after {
content: ‘’;
display: block;
width: 3px;
height: 40px;
border-radius: 2px;
background: var(–border-soft);
transition: background 0.15s, height 0.15s;
}
#panel-resize-handle:hover::after,
#panel-resize-handle.dragging::after {
background: var(–highlight);
height: 60px;
}
.panel-header {
font-weight: 700;
font-size: 0.95rem;
letter-spacing: -0.01em;
padding: 18px 22px 0;
display: flex;
justify-content: space-between;
align-items: center;
color: var(–accent-dark);
flex-shrink: 0;
}

/* — 分析タブバー — */
.analysis-tabs {
display: none;
align-items: flex-end;
gap: 0;
padding: 12px 22px 0;
border-bottom: 1px solid var(–border-soft);
flex-shrink: 0;
background: var(–bg-panel);
}
.analysis-tabs.visible { display: flex; }
.atab {
padding: 7px 16px 8px;
font-size: 0.78rem;
font-weight: 600;
font-family: inherit;
color: var(–text-sub);
background: transparent;
border: 1px solid transparent;
border-bottom: none;
border-radius: 8px 8px 0 0;
cursor: pointer;
transition: color 0.15s, background 0.15s;
letter-spacing: 0.01em;
position: relative;
bottom: -1px;
}
.atab:hover { color: var(–highlight); background: rgba(90,110,130,0.06); }
.atab.active {
color: var(–highlight);
background: var(–bg-paper);
border-color: var(–border-soft);
border-bottom-color: var(–bg-paper);
}
.atab .atab-dot {
display: inline-block;
width: 5px; height: 5px;
border-radius: 50%;
background: var(–highlight);
margin-right: 5px;
vertical-align: middle;
opacity: 0;
transition: opacity 0.15s;
}
.atab.active .atab-dot { opacity: 1; }

/* — 分析コンテンツエリア（iframeから置き換え） — */
#analysis-frame-wrap {
display: none;
flex: 1;
min-height: 0;
background: var(–bg-paper);
flex-direction: column;
overflow: hidden;
}
#analysis-frame-wrap.visible { display: flex; }
/* 旧 iframe：非表示にして DOM に残す（外部参照の互換のため） */
#analysis-iframe {
display: none;
}
/* 新 インラインコンテンツエリア */
#analysis-content-area {
flex: 1;
overflow-y: auto;
padding: 18px 22px 32px;
background: var(–bg-paper);
font-size: 0.9rem;
line-height: 1.9;
color: var(–text-main);
}
/* 分析コンテンツ内の共通スタイル */
.ac-section-label {
font-size: 0.62rem;
font-weight: 600;
letter-spacing: 0.06em;
color: var(–text-sub);
margin-bottom: 10px;
display: block;
opacity: 0.7;
}
.ac-entry {
background: #fff;
border: 1px solid var(–border-soft);
border-radius: 10px;
padding: 14px 16px;
margin-bottom: 10px;
}
.ac-entry-greek {
font-family: ‘Gentium Plus’, serif;
font-size: 1.65rem;
line-height: 1.2;
color: var(–text-main);
margin-bottom: 2px;
}
.ac-entry-ja {
font-size: 0.82rem;
font-weight: 400;
color: var(–text-sub);
margin-bottom: 6px;
}
.ac-entry-desc {
font-size: 0.82rem;
color: var(–text-sub);
line-height: 1.75;
border-top: 1px solid var(–border-soft);
padding-top: 8px;
margin-top: 4px;
}
.ac-entry-strong {
font-size: 0.6rem;
color: #c8c8ce;
font-family: monospace;
margin-top: 2px;
display: block;
}
.ac-table {
width: 100%;
border-collapse: collapse;
font-size: 0.82rem;
margin-top: 8px;
}
.ac-table th {
text-align: left;
padding: 5px 8px;
color: var(–text-sub);
font-size: 0.7rem;
font-weight: 700;
letter-spacing: 0.06em;
text-transform: uppercase;
border-bottom: 1px solid var(–border-soft);
}
.ac-table td {
padding: 6px 8px;
border-bottom: 1px solid rgba(0,0,0,0.04);
color: var(–text-main);
vertical-align: baseline;
}
.ac-table tr:last-child td { border-bottom: none; }
.ac-table td.ac-td-greek {
font-family: ‘Gentium Plus’, serif;
font-size: 1.1rem;
}
.ac-morph-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 6px 16px;
margin-top: 8px;
font-size: 0.82rem;
}
.ac-morph-row {
display: contents;
}
.ac-morph-key {
color: var(–text-sub);
font-size: 0.68rem;
font-weight: 400;
letter-spacing: 0.04em;
padding: 3px 0;
border-bottom: 1px solid rgba(0,0,0,0.04);
grid-column: 1;
}
.ac-morph-val {
color: var(–text-main);
font-weight: 500;
font-size: 0.82rem;
padding: 3px 0;
border-bottom: 1px solid rgba(0,0,0,0.04);
grid-column: 2;
}
.ac-morph-val.core {
color: var(–text-main);
font-weight: 700;
}
.ac-cite-ref {
font-size: 0.75rem;
color: var(–text-sub);
margin-top: 6px;
display: block;
}
.ac-no-data {
text-align: center;
color: var(–text-sub);
font-size: 0.82rem;
padding: 32px 0;
}
.ac-morph-search-row {
margin-top: 14px;
display: flex;
gap: 8px;
flex-wrap: wrap;
}
/* semantics: Abbott-Smith 引用ブロック */
.ac-abbottsmith {
background: rgba(90,110,130,0.05);
border-left: 3px solid var(–highlight);
border-radius: 0 8px 8px 0;
padding: 12px 14px;
margin-top: 10px;
font-size: 0.82rem;
color: var(–text-sub);
line-height: 1.75;
}
/* syntax: 文脈節一覧ローディング */
.ac-loading {
font-size: 0.78rem;
color: var(–text-sub);
padding: 16px 0;
text-align: center;
animation: ac-blink 1.2s ease-in-out infinite;
}
@keyframes ac-blink {
0%, 100% { opacity: 0.5; }
50% { opacity: 1; }
}

/* — 本文 — */
.verse-block { border-bottom: 0px solid var(–border-soft); transition: background 0.15s; border-radius: 6px; margin-bottom: 2px; }
.verse-block.selected { background: rgba(90,110,130,0.07); }
.jp-section { padding: 4px 8px; cursor: pointer; display: flex; align-items: baseline; border-radius: 6px; }
.jp-section:hover { background: rgba(0,0,0,0.03); }
.v-num { color: #a8a8af; margin-right: 16px; font-size: 0.7rem; font-weight: 400; min-width: 20px; text-align: right; letter-spacing: 0.02em; flex-shrink: 0; }
.jp-text { font-size: 1.1rem; line-height: 2.1; color: var(–text-main); font-family: ‘Noto Serif JP’, serif; }

/* — 語形カード（Study panel内の一覧用：既存互換のため残す） — */
.word-card {
background: #ffffff;
padding: 10px 14px;
border-radius: 10px;
display: flex;
justify-content: space-between;
align-items: baseline;
margin-bottom: 8px;
border: 1px solid var(–border-soft);
cursor: pointer;
transition: border-color 0.15s, background 0.15s;
}
.word-card:hover { border-color: rgba(90,110,130,0.3); background: rgba(90,110,130,0.04); }
.greek-word { font-family: ‘Gentium Plus’, serif; font-size: 1.45rem; line-height: 1.3; }

/* 文法装飾クラス */
.present-text { border-bottom: 2px solid var(–highlight); }
.aorist-text  { border-bottom: 2px dotted var(–highlight); }
.perfect-text { text-decoration: underline wavy var(–highlight); text-underline-offset: 4px; }
.future-text { border-bottom: 2px double var(–highlight); }
.indicative-text { border-bottom: 2px solid var(–highlight); }
.imperative-text { border-bottom: 2px solid var(–highlight); }

.grammar-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; font-size: 0.65rem; color: var(–text-sub); border-top: 1px solid var(–border-soft); padding-top: 6px; }
.tag-jp { color: var(–text-sub); font-size: 0.7rem; margin-left: 6px; opacity: 0.75; }
.strong-num { font-size: 0.6rem; color: #c8c8ce; font-family: monospace; }

/* ══════════════════════════════════════════
Inspect Popover
語クリックで本文上に浮かぶ軽量カード。
基本義・品詞タグ・「詳しく見る」だけ。
══════════════════════════════════════════ */
#inspect-popover {
position: fixed;
z-index: 200;
width: 220px;
background: #ffffff;
border: 1px solid var(–border-soft);
border-radius: 10px;
box-shadow: 0 4px 20px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
padding: 0;
display: none;
flex-direction: column;
overflow: hidden;
animation: popoverIn 0.15s ease;
}
#inspect-popover.visible { display: flex; }
@keyframes popoverIn {
from { opacity: 0; transform: translateY(4px) scale(0.98); }
to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* popoverの上部：語形 + 基本義 */
.inspect-head {
padding: 11px 14px 8px;
border-bottom: 1px solid var(–border-soft);
}
.inspect-greek {
font-family: ‘Gentium Plus’, serif;
font-size: 1.5rem;
line-height: 1.2;
color: var(–text-main);
margin-bottom: 3px;
}
.inspect-ja {
font-size: 0.8rem;
font-weight: 400;
color: var(–text-sub);
line-height: 1.4;
margin-bottom: 0;
}

/* popoverの中部：品詞タグ3つまで */
.inspect-tags {
padding: 6px 14px 8px;
display: flex;
flex-wrap: wrap;
gap: 4px;
border-bottom: 1px solid var(–border-soft);
}
.inspect-tag {
font-size: 0.65rem;
padding: 2px 7px;
border-radius: 20px;
background: var(–bg-panel);
color: var(–text-sub);
border: 1px solid var(–border-soft);
letter-spacing: 0.01em;
}
.inspect-tag.core {
background: rgba(90,110,130,0.10);
color: var(–highlight);
border-color: rgba(90,110,130,0.2);
font-weight: 600;
}

/* popoverのフッター：「詳しく見る」ボタン */
.inspect-footer {
padding: 0;
}
.inspect-study-btn {
display: flex;
align-items: center;
justify-content: space-between;
width: 100%;
padding: 9px 14px;
font-size: 0.75rem;
font-family: inherit;
font-weight: 600;
color: var(–highlight);
background: transparent;
border: none;
cursor: pointer;
letter-spacing: 0.02em;
transition: background 0.12s;
text-align: left;
}
.inspect-study-btn:hover {
background: var(–highlight-light);
}
.inspect-study-arrow {
font-size: 0.85rem;
opacity: 0.6;
}

/* –– morph-search-btn（近くの語を見るなど、Study panel内で継続使用） –– */
.morph-search-btn {
display: inline-flex;
align-items: center;
justify-content: center;
padding: 6px 16px;
font-size: 0.75rem;
font-family: inherit;
font-weight: 600;
letter-spacing: 0.06em;
text-transform: uppercase;
color: var(–text-sub);
background: transparent;
border: 1px solid rgba(0,0,0,0.13);
border-radius: 6px;
cursor: pointer;
transition: color 0.15s, border-color 0.15s, background 0.15s;
text-decoration: none;
white-space: nowrap;
}
.morph-search-btn:hover {
color: var(–highlight);
border-color: var(–highlight);
background: var(–highlight-light);
}
.morph-search-btn:active { opacity: 0.7; }
.morph-search-btn .btn-icon { display: none; }

/* 形態タグ一覧（Study panel内） */
.morph-tag-row {
display: flex;
flex-wrap: wrap;
gap: 5px;
margin: 0px 0 4px;
}
.morph-tag-pill {
font-size: 0.7rem;
padding: 2px 9px;
border-radius: 20px;
background: var(–bg-panel);
color: var(–text-sub);
border: 1px solid var(–border-soft);
letter-spacing: 0.01em;
}
.morph-tag-pill.core {
background: rgba(90,110,130,0.10);
color: var(–highlight);
border-color: rgba(90,110,130,0.2);
font-weight: 600;
}

/* reading-core-bar（side-panel ヘッダー固定） */
.rcb-container {
display: none;
align-items: center;
gap: 6px;
flex-wrap: wrap;
padding: 6px 22px 8px;
background: var(–bg-panel);
border-bottom: 1px solid var(–border-soft);
font-size: 0.7rem;
flex-shrink: 0;
}
.rcb-container.visible { display: flex; }
.rcb-chip-sm {
display: inline-flex; align-items: center;
padding: 2px 8px; border-radius: 20px;
font-size: 0.66rem;
background: var(–highlight-light);
border: 1px solid rgba(90,110,130,0.2);
color: var(–highlight); font-weight: 600;
}
.rcb-label-sm {
font-size: 0.56rem; font-weight: 700; letter-spacing: 0.1em;
text-transform: uppercase; color: var(–text-sub);
flex-shrink: 0;
}
.rcb-sep-sm { color: var(–border-soft); font-size: 0.75rem; }

/* ギリシャ語なしバッジ */
.no-greek-badge {
display: inline-block;
font-size: 0.65rem;
color: var(–text-sub);
background: var(–bg-panel);
border: 1px solid var(–border-soft);
border-radius: 4px;
padding: 1px 7px;
margin-left: 8px;
vertical-align: middle;
letter-spacing: 0.04em;
}

@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Study panel 閉じるボタン（「読書に戻る」） */
#study-close-btn {
background: none;
border: none;
cursor: pointer;
color: var(–text-sub);
font-size: 0.78rem;
font-family: inherit;
font-weight: 600;
letter-spacing: 0.02em;
padding: 0;
display: flex;
align-items: center;
gap: 4px;
transition: color 0.15s;
}
#study-close-btn:hover {
color: var(–highlight);
}
.study-close-label {
font-size: 0.75rem;
font-weight: 600;
}

/* 読書モード: 本文エリア下部のヒント */
#reading-hint {
position: sticky;
bottom: 0;
left: 0;
right: 0;
padding: 6px 52px;
background: linear-gradient(to top, var(–bg-paper) 70%, transparent);
font-size: 0.62rem;
color: var(–text-sub);
letter-spacing: 0.04em;
pointer-events: none;
opacity: 0.5;
display: none;
}
#reading-hint.visible { display: block; }

/* ══════════════════════════════════════════
   Flow / Meaning / Study タブ 共通スタイル
   ══════════════════════════════════════════ */

/* 語形ヘッダー（タブ上部に共通） */
.flow-word-head {
    display: flex;
    align-items: baseline;
    gap: 0;
    margin-bottom: 4px;
    flex-wrap: wrap;
}
.flow-greek {
    font-family: 'Gentium Plus', serif;
    font-size: 1.65rem;
    line-height: 1.2;
    color: var(--text-main);
}
.flow-ja {
    font-size: 0.82rem;
    color: var(--text-sub);
    font-weight: 400;
}
.flow-ref {
    font-size: 0.62rem;
    color: var(--text-sub);
    opacity: 0.6;
    margin-bottom: 14px;
    letter-spacing: 0.02em;
}

/* ── Flow タブ ── */
.flow-hints {
    margin-bottom: 12px;
}
.flow-hint-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
    line-height: 1.65;
}
.flow-hint-row:last-child { border-bottom: none; }
.flow-hint-icon {
    font-size: 0.75rem;
    color: var(--highlight);
    flex-shrink: 0;
    width: 14px;
    text-align: center;
    opacity: 0.7;
}
.flow-hint-text {
    font-size: 0.84rem;
    color: var(--text-main);
    line-height: 1.7;
}

/* ── AI補助共通エリア ── */
.flow-ai-area {
    margin-top: 10px;
    margin-bottom: 4px;
}
.flow-ai-content {
    font-size: 0.84rem;
    color: var(--text-main);
    line-height: 1.8;
    padding: 12px 14px;
    background: rgba(90,110,130,0.04);
    border-left: 2px solid rgba(90,110,130,0.2);
    border-radius: 0 6px 6px 0;
    margin-bottom: 4px;
}
.flow-ai-label {
    display: inline-block;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text-sub);
    opacity: 0.7;
    margin-right: 4px;
    vertical-align: middle;
}

/* ── Meaning タブ：「どう響くか」層 ── */
/* Abbott-Smith は不在。AIの contextual nuance が主役。静かなプロース。 */
.meaning-strong {
    font-size: 0.6rem;
    color: #c8c8ce;
    font-family: monospace;
    margin-bottom: 10px;
}
/* Meaning AI 出力エリア：flow-ai-prose と共通の静かなスタイル */
.meaning-prose {
    font-size: 0.84rem;
    color: var(--text-main);
    line-height: 1.8;
    padding: 10px 0 0 12px;
    border-left: 2px solid rgba(90,110,130,0.12);
    margin-top: 6px;
}
.meaning-prose-label {
    display: inline-block;
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: 0.5;
    margin-right: 5px;
    vertical-align: middle;
}

/* ── Semantics セクション（Study内）：quiet scholarly notes ── */
/* dense tables・giant lexicon UI 禁止。折りたたみで必要な時だけ確認する層。 */
.semantics-abbott {
    font-size: 0.81rem;
    color: var(--text-sub);
    line-height: 1.8;
    padding: 10px 0 4px;
}
.semantics-note {
    font-size: 0.78rem;
    color: var(--text-sub);
    line-height: 1.75;
    padding: 6px 0 2px;
    border-top: 1px solid rgba(0,0,0,0.04);
    margin-top: 6px;
}
.semantics-note-label {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text-sub);
    opacity: 0.5;
    text-transform: uppercase;
    display: block;
    margin-bottom: 2px;
}

/* ── Flow signal rows（進化版） ── */
/* signal種別ごとに細い左ボーダーで静かに区別する。カードや枠は使わない */
.flow-signal {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 8px 0 8px 12px;
    border-bottom: 1px solid rgba(0,0,0,0.03);
    border-left: 2px solid transparent;
    line-height: 1.7;
    transition: border-color 0.15s;
}
.flow-signal:last-child { border-bottom: none; }

/* signal 種別ごとのボーダー色（静かなトーン） */
.flow-signal.sig-logic     { border-left-color: #7a8fa6; }  /* 論理展開：メイン */
.flow-signal.sig-emphasis  { border-left-color: #a06060; }  /* 繰り返し・強調 */
.flow-signal.sig-turn      { border-left-color: #8a7a5a; }  /* 転換・対比 */
.flow-signal.sig-exhort    { border-left-color: #7a9a7a; }  /* 命令・勧め */
.flow-signal.sig-promise   { border-left-color: #7a8aaa; }  /* 約束 */
.flow-signal.sig-declare   { border-left-color: #9a7a9a; }  /* 宣言 */
.flow-signal.sig-metaphor  { border-left-color: #8a9a8a; }  /* 比喩 */
.flow-signal.sig-word      { border-left-color: #9a8a6a; }  /* 語の選択 */
.flow-signal.sig-caution   { border-left-color: #a09070; }  /* 読解上の注意 */
.flow-signal.sig-culture   { border-left-color: #7a9090; }  /* 文化背景 */
.flow-signal.sig-default   { border-left-color: rgba(90,110,130,0.2); }

.flow-signal-text {
    font-size: 0.84rem;
    color: var(--text-main);
    line-height: 1.75;
}

/* signal種別ラベル（極小・控えめ） */
.flow-signal-kind {
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-sub);
    opacity: 0.55;
    flex-shrink: 0;
    padding-top: 2px;
    min-width: 28px;
}

/* AI補助エリア：signal群の下に続く自然な流れとして */
.flow-ai-prose {
    font-size: 0.84rem;
    color: var(--text-main);
    line-height: 1.8;
    padding: 10px 0 0 12px;
    border-left: 2px solid rgba(90,110,130,0.12);
    margin-top: 10px;
}
.flow-ai-prose-label {
    display: inline-block;
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: 0.5;
    margin-right: 5px;
    vertical-align: middle;
}

/* ══════════════════════════════════════════
   Syntax セクション（Study内）
   「論理の骨組み」を静かな読解補助として表示。
   linguistics software感・academic parser感禁止。
   ══════════════════════════════════════════ */

/* 読解説明：構文の前に出る自然文 */
.syntax-reading {
    font-size: 0.84rem;
    color: var(--text-main);
    line-height: 1.8;
    padding: 8px 0 10px 12px;
    border-left: 2px solid rgba(90,110,130,0.15);
    margin-bottom: 2px;
}
.syntax-reading-label {
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: 0.5;
    display: block;
    margin-bottom: 3px;
    text-transform: uppercase;
}

/* 構文関係リスト：clause relation / modifier / logical role */
.syntax-relations {
    margin: 6px 0 2px;
}
.syntax-rel-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(0,0,0,0.03);
    font-size: 0.82rem;
    line-height: 1.65;
}
.syntax-rel-row:last-child { border-bottom: none; }
.syntax-rel-kind {
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text-sub);
    opacity: 0.5;
    flex-shrink: 0;
    min-width: 32px;
    text-transform: uppercase;
    padding-top: 1px;
}
.syntax-rel-text {
    color: var(--text-main);
    font-size: 0.82rem;
    line-height: 1.65;
}

/* 構文構造（ツリー）：subtle indentation / light connectors / soft hierarchy */
/* 禁止：giant parser canvas / colorful linguistics graph / debug-like UI */
.syntax-tree {
    margin: 8px 0 4px 0;
    font-size: 0.79rem;
    line-height: 1.9;
    color: var(--text-sub);
    font-family: inherit;
}
.syntax-tree-row {
    display: flex;
    align-items: baseline;
    gap: 0;
    padding: 1px 0;
}
.syntax-tree-indent {
    /* 階層ごとの静かなインデント。横スクロール地獄にならないよう幅を抑える */
    display: inline-block;
    width: 16px;
    flex-shrink: 0;
    color: rgba(0,0,0,0.12);
    font-size: 0.7rem;
    line-height: 1.9;
    user-select: none;
}
.syntax-tree-connector {
    display: inline-block;
    width: 10px;
    flex-shrink: 0;
    color: rgba(0,0,0,0.15);
    font-size: 0.7rem;
    line-height: 1.9;
    user-select: none;
}
.syntax-tree-role {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text-sub);
    opacity: 0.5;
    margin-right: 5px;
    text-transform: uppercase;
    flex-shrink: 0;
}
.syntax-tree-content {
    color: var(--text-main);
    font-size: 0.8rem;
    opacity: 0.85;
}
.syntax-tree-note {
    font-size: 0.72rem;
    color: var(--text-sub);
    opacity: 0.6;
    margin-left: 5px;
    font-style: italic;
}

/* Syntax AI補助エリア */
.syntax-ai-prose {
    font-size: 0.84rem;
    color: var(--text-main);
    line-height: 1.8;
    padding: 8px 0 0 12px;
    border-left: 2px solid rgba(90,110,130,0.12);
    margin-top: 2px;
    margin-bottom: 6px;
}
.syntax-ai-label {
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: 0.5;
    margin-right: 4px;
    vertical-align: middle;
    text-transform: uppercase;
}
.study-details {
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 0;
}
.study-details:last-of-type { border-bottom: none; }
.study-summary {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-sub);
    padding: 10px 0;
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
    outline: none;
}
.study-summary::-webkit-details-marker { display: none; }
.study-summary::before {
    content: '›';
    font-size: 0.85rem;
    color: var(--text-sub);
    opacity: 0.5;
    transition: transform 0.15s;
    display: inline-block;
    width: 10px;
}
details[open] .study-summary::before {
    transform: rotate(90deg);
}
.study-details-body {
    padding: 0 0 12px 16px;
}

/* ══════════════════════════════════════════
   Research Tools — Study タブ内の静かな探索補助
   ══════════════════════════════════════════

   設計思想：
   - Reading Evidence（語形・論理構造・意味論的根拠）の下に配置
   - 初期状態は折りたたみ。「研究ツールを開く」で展開
   - card乱立禁止・dense search UI禁止・analytics感禁止
   - filter controls は compact・expandable
   - 読書空間を壊さない quiet な外観を維持
   ══════════════════════════════════════════ */

/* Research Tools 全体ラッパー */
.rt-section {
    margin-top: 8px;
    border-top: 1px solid rgba(0,0,0,0.06);
    padding-top: 8px;
}
.rt-open-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    background: none;
    border: none;
    padding: 8px 0;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-sub);
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: color 0.12s;
}
.rt-open-btn:hover { color: var(--highlight); }
.rt-open-btn-icon {
    font-size: 0.7rem;
    opacity: 0.5;
    transition: transform 0.15s;
    display: inline-block;
    width: 10px;
}
.rt-open-btn.expanded .rt-open-btn-icon { transform: rotate(90deg); }

/* Research Tools 本体 */
.rt-body {
    display: none;
}
.rt-body.visible { display: block; }

/* 各 Research Tool（Morph / Syntax / Semantic）の切り替えタブ */
.rt-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 12px;
}
.rt-tab {
    padding: 5px 12px 6px;
    font-size: 0.68rem;
    font-weight: 600;
    font-family: inherit;
    color: var(--text-sub);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: color 0.12s, border-color 0.12s;
    letter-spacing: 0.02em;
    position: relative;
    bottom: -1px;
}
.rt-tab:hover { color: var(--highlight); }
.rt-tab.active {
    color: var(--highlight);
    border-bottom-color: var(--highlight);
}

/* 各 Research Tool のコンテンツエリア */
.rt-content { display: none; }
.rt-content.visible { display: block; }

/* フィルター行：label + control をコンパクトに並べる */
.rt-filter-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 10px;
    margin-bottom: 10px;
    align-items: baseline;
}
.rt-filter-label {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text-sub);
    opacity: 0.6;
    min-width: 24px;
    flex-shrink: 0;
}
/* select コントロール：quiet & compact */
.rt-select {
    font-size: 0.72rem;
    font-family: inherit;
    color: var(--text-main);
    background: var(--bg-panel);
    border: 1px solid var(--border-soft);
    border-radius: 5px;
    padding: 3px 6px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.12s;
    max-width: 110px;
}
.rt-select:focus { border-color: rgba(90,110,130,0.4); }

/* 実行ボタン */
.rt-run-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 14px;
    font-size: 0.7rem;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.03em;
    color: var(--highlight);
    background: transparent;
    border: 1px solid rgba(90,110,130,0.25);
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    margin-top: 4px;
}
.rt-run-btn:hover {
    background: var(--highlight-light);
    border-color: rgba(90,110,130,0.4);
}
.rt-run-btn:active { opacity: 0.7; }

/* 検索結果エリア */
.rt-results {
    margin-top: 10px;
    min-height: 0;
}
/* ローディング（ac-loading と同じアニメーションを流用） */
.rt-loading {
    font-size: 0.75rem;
    color: var(--text-sub);
    padding: 10px 0;
    text-align: center;
    animation: ac-blink 1.2s ease-in-out infinite;
    display: none;
}
.rt-loading.visible { display: block; }

/* 結果ブロック：静かな paper-like カード。乱立禁止・1項目ずつ縦積み */
.rt-result-block {
    border-left: 2px solid rgba(90,110,130,0.15);
    padding: 6px 0 6px 10px;
    margin-bottom: 8px;
    font-size: 0.82rem;
    color: var(--text-main);
    line-height: 1.75;
}
.rt-result-block:last-child { margin-bottom: 0; }
.rt-result-kind {
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: 0.5;
    display: block;
    margin-bottom: 2px;
    text-transform: uppercase;
}
.rt-result-text {
    font-size: 0.82rem;
    color: var(--text-main);
    line-height: 1.75;
}
.rt-result-ref {
    font-size: 0.65rem;
    color: var(--text-sub);
    opacity: 0.65;
    margin-top: 2px;
    display: block;
}
/* 空結果メッセージ */
.rt-no-result {
    font-size: 0.78rem;
    color: var(--text-sub);
    text-align: center;
    padding: 16px 0;
    opacity: 0.7;
}
/* Semantic Search：concept チップ選択 */
.rt-concept-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
}
.rt-concept-chip {
    font-size: 0.68rem;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--bg-panel);
    color: var(--text-sub);
    border: 1px solid var(--border-soft);
    cursor: pointer;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    letter-spacing: 0.01em;
    user-select: none;
}
.rt-concept-chip.selected {
    background: var(--highlight-light);
    color: var(--highlight);
    border-color: rgba(90,110,130,0.3);
    font-weight: 600;
}

/* ══════════════════════════════════════════
   Word List View — 節語形リスト
   Progressive Disclosure 段階展開型。
   タブバー廃止。「流れ」を唯一の基盤UIとし、
   chipクリックでインライン展開する。
   ══════════════════════════════════════════ */

/* 外枠（flex列で flow-stream + drawer を縦積み） */
#word-list-view {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
}

/* ── 流れUI：ギリシャ語順日本語chip列 ── */
/* 常時表示。タブで隠さない。読書の延長として機能する。 */
.wlv-flow-section {
    padding: 20px 18px 0;
    flex-shrink: 0;
}
.wlv-flow-label {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: 0.4;
    display: block;
    margin-bottom: 12px;
    text-transform: uppercase;
}

/* chip流：横並び・折り返し・prose-like */
.wlv-flow-stream {
    display: flex;
    flex-wrap: wrap;
    gap: 5px 3px;
    align-items: baseline;
    line-height: 2.6;
}

/* 各語のchip：軽量・ボーダー使わない */
.wlv-chip {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    padding: 3px 7px 2px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
    border: 1px solid transparent;
}
.wlv-chip:hover {
    background: rgba(90,110,130,0.06);
}
.wlv-chip.active {
    background: rgba(90,110,130,0.09);
    border-color: rgba(90,110,130,0.2);
}

/* chip内：日本語グロス（主役） */
.wlv-chip-ja {
    font-size: 1.0rem;
    font-family: 'Noto Serif JP', serif;
    color: var(--text-main);
    line-height: 1.3;
    letter-spacing: -0.01em;
}

/* chip内：signal dot（役割の色点・極小）*/
.wlv-chip-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: transparent;
    flex-shrink: 0;
}
/* signal 種別ごとの dot 色（静かに） */
.wlv-chip.role-verb  .wlv-chip-dot { background: #7a8fa6; }
.wlv-chip.role-noun  .wlv-chip-dot { background: #8a9a8a; }
.wlv-chip.role-conj  .wlv-chip-dot { background: #a09070; }
.wlv-chip.role-prep  .wlv-chip-dot { background: #9a8a6a; }
.wlv-chip.role-adj   .wlv-chip-dot { background: #8a7a9a; }
.wlv-chip.role-pron  .wlv-chip-dot { background: #7a9090; }
.wlv-chip.role-part  .wlv-chip-dot { background: #7a9a7a; }
.wlv-chip.role-art   .wlv-chip-dot { background: transparent; }
.wlv-chip.role-other .wlv-chip-dot { background: rgba(90,110,130,0.2); }

/* 句区切り：軽い縦線 */
.wlv-phrase-sep {
    display: inline-block;
    width: 1px;
    height: 16px;
    background: rgba(0,0,0,0.07);
    margin: 0 5px;
    vertical-align: middle;
    flex-shrink: 0;
    align-self: center;
}

/* ── chip詳細ドロワー（クリックで展開・flow-streamの直下） ── */
/* 底部固定しない。streamの直後にインラインで展開する。 */
.wlv-detail-drawer {
    margin: 10px 18px 0;
    padding: 12px 14px 12px;
    border-left: 2px solid rgba(90,110,130,0.18);
    display: none;
    animation: wlvDrawerIn 0.12s ease;
}
.wlv-detail-drawer.visible { display: block; }
@keyframes wlvDrawerIn {
    from { opacity: 0; transform: translateY(-3px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ドロワー内：ギリシャ語（主役） */
.wlv-detail-greek {
    font-family: 'Gentium Plus', serif;

<script>
let abbottSmithDict = null;
let _proximityTokens = [];

/* ══════════════════════════════════════════
   AppState — UI状態の一元管理
   ══════════════════════════════════════════
   設計方針:
     - グローバル状態はすべてここに集約する
     - DOM操作（display切替など）はこのオブジェクトに触れない
       → 実際のDOM操作は各関数が行う
     - 状態を「読む」ことで現在モードを判定できる
     - scroll位置は「Reading に戻る」ときに復元する

   状態遷移:
     reading  → 節クリック  → browsing
     browsing → 語カードクリック → popover表示（modeは browsing のまま）
     browsing → 「詳しく見る」 → study
     study    → 「読書に戻る」 → reading（scroll復元）
     study    → 「分析に戻る」 → study（params保持・tab記憶）
   ══════════════════════════════════════════ */
const AppState = {
    /* 現在のモード: 'reading' | 'browsing' | 'study' */
    mode: 'reading',

    /* 選択中の節 */
    selectedVerse: {
        vNum:     null,   /* string: 節番号 e.g. "3" */
        elWords:  [],     /* Array: 節内の語形データ */
    },

    /* Inspect スナップショット（選択中の語） */
    inspect: {
        data: null,       /* { greek, strong, jpMorph, rawMorph, lemma, jaWord, desc, ref } */
    },

    /* Study 情報（タブ・params）*/
    study: {
        params: null,     /* _currentAnalysisParams と同内容 */
        tab:    'flow',   /* 最後に表示していたタブ。Study閉じても保持。 */
    },

    /* 本文スクロール位置（Study閉じたとき復元する） */
    scrollTop: 0,

    /* ── ヘルパー ── */

    /* Reading 状態にリセット（scroll保持・study.tab保持） */
    toReading() {
        this.mode = 'reading';
        this.selectedVerse = { vNum: null, elWords: [] };
        this.inspect.data  = null;
        /* study.params / study.tab はあえて保持する（再開ボタンのため） */
    },

    /* Browsing 状態に移行（節選択後） */
    toBrowsing(vNum, elWords) {
        this.mode = 'browsing';
        this.selectedVerse = { vNum, elWords: elWords || [] };
        this.inspect.data  = null;
    },

    /* Study 状態に移行 */
    toStudy(params, tab) {
        this.mode = 'study';
        this.study.params = params;
        if (tab) this.study.tab = tab;
    },

    /* スクロール位置を保存 */
    saveScroll() {
        const el = document.getElementById('bible-text-area');
        if (el) this.scrollTop = el.scrollTop;
    },

    /* スクロール位置を復元 */
    restoreScroll() {
        const el = document.getElementById('bible-text-area');
        if (el) el.scrollTop = this.scrollTop;
    },

    /* Study が再開できる状態か */
    canReopen() {
        return !!(this.study.params);
    },
};

// ギリシャ語データが存在する書物のキーセット
const GREEK_BOOKS = new Set([
    'ROM','1CO','2CO','GAL','EPH','PHP','COL',
    '1TH','2TH','1TI','2TI','TIT','PHM',
    'MAT','MRK','LUK','JHN','ACT',
    'HEB','JAS','1PE','2PE','1JN','2JN','3JN','JUD','REV'
]);

const JPN_MAP = {
    pos: { 'V': '動詞', 'N': '名詞', 'A': '形容詞', 'R': '関係代名詞', 'P': '人称代名詞', 'D': '指示代名詞', 'T': '冠詞', 'ADV': '副詞', 'PREP': '前置詞', 'CONJ': '接続詞', 'PRT': '添語' },
    tense: { 'P': '現在', 'I': '未完了', 'F': '未来', 'A': 'アオリスト', 'X': '完了' },
    voice: { 'A': '能動', 'M': '中動', 'P': '受動', 'D': '能動的受動' },
    mood: { 'I': '直説', 'S': '接続', 'O': '希求', 'M': '命令', 'N': '不定', 'P': '分詞' },
    case: { 'N': '主格', 'G': '属格', 'D': '与格', 'A': '対格', 'V': '呼格' },
    gender: { 'M': '男性', 'F': '女性', 'N': '中性' },
    number: { 'S': '単数', 'P': '複数' },
    person: { '1': '1人称', '2': '2人称', '3': '3人称' }
};

async function loadDict() {
    try {
        abbottSmithDict = {};
        const resAbbott = await fetch('./abbott-smith.tsv');
        if (!resAbbott.ok) return;
        const textAbbott = await resAbbott.text();
        textAbbott.split(/\r?\n/).forEach(row => {
            const cols = row.split('\t');
            const strong = String(cols[0]).trim();
            if (strong) {
                abbottSmithDict[strong] = { description: cols[2]?.trim() || "" };
            }
        });
    } catch (e) { console.error("Dict Error:", e); }
}

function decorate(wordText, wordData) {
    const m = wordData;
    const morph = m.morph || "";
    const parts = morph.split('-');
    const pos = parts[0]; 
    let jpMorph = "";
    let styleClass = "";
    let middleStar = "";

    if (pos === 'V' && parts[1]) {
        const off = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off + 0];
        const voiceCode = parts[1][off + 1];
        const moodCode  = parts[1][off + 2];

        if (['M', 'P', 'D'].includes(voiceCode)) {
            middleStar = '<span style="color:var(--highlight); margin-left:2px;">*</span>';
        }

        const t  = JPN_MAP.tense[tenseCode] || "";
        const v  = JPN_MAP.voice[voiceCode]  || "";
        const md = JPN_MAP.mood[moodCode]    || "";

        if (moodCode === 'P') {
            const cng = parts[2]
                ? (JPN_MAP.case[parts[2][0]]   || "") +
                  (JPN_MAP.number[parts[2][1]] || "") +
                  (JPN_MAP.gender[parts[2][2]] || "")
                : "";
            jpMorph = `動詞:分詞${t}${v}${cng ? "(" + cng + ")" : ""}`;
        } else if (moodCode === 'I' || moodCode === 'M') {
            if (tenseCode === 'P') styleClass = "present-text";
            else if (tenseCode === 'A') styleClass = "aorist-text";
            else if (tenseCode === 'X') styleClass = "perfect-text";
            else if (tenseCode === 'F') styleClass = "future-text";
            if (moodCode === 'I') styleClass += " indicative-text";
            else if (moodCode === 'M') styleClass += " imperative-text";
            const person = parts[1].length >= (off + 4) ? (JPN_MAP.person[parts[1][off + 3]] || "") : "";
            const number = parts[1].length >= (off + 5) ? (JPN_MAP.number[parts[1][off + 4]] || "") : "";
            jpMorph = `動詞:${md}${t}${v}${person}${number}`;
        } else {
            const person = parts[1].length >= (off + 4) ? (JPN_MAP.person[parts[1][off + 3]] || "") : "";
            const number = parts[1].length >= (off + 5) ? (JPN_MAP.number[parts[1][off + 4]] || "") : "";
            jpMorph = `動詞:${md}${t}${v}${person}${number}`;
        }
    } else if (['N', 'A', 'R', 'P', 'T', 'D'].includes(pos) && parts[1]) {
        const label = JPN_MAP.pos[pos] || pos;
        let p = "", c = "", n = "", g = "";
        if (['1', '2', '3'].includes(parts[1][0])) {
            p = parts[1][0] + "人称";
            c = JPN_MAP.case[parts[1][1]]   || "";
            n = JPN_MAP.number[parts[1][2]] || "";
        } else {
            c = JPN_MAP.case[parts[1][0]]   || "";
            n = JPN_MAP.number[parts[1][1]] || "";
            g = JPN_MAP.gender[parts[1][2]] || "";
        }
        jpMorph = `${label}:${p}${c}${n}${g}`;
    } else {
        jpMorph = JPN_MAP.pos[pos] || morph;
    }

    const strong = String(m.strong || "").replace(/[^0-9]/g, ""); 
    const jaWord  = m.japanese || m.gloss || (abbottSmithDict && abbottSmithDict[strong]?.japanese) || "？";
    const desc    = m.description || (abbottSmithDict && abbottSmithDict[strong]?.description) || "解説なし";
    const lemma   = String(m.lemma || "").replace(/'/g, "\\'");
    const jaWordE = jaWord.replace(/'/g, "\\'");
    const descE   = desc.replace(/'/g, "\\'").replace(/\n/g, '\\n');
    const ref = m.ref || '';

    // ── Inspect用データをdata属性に持たせる。onclick は showInspect へ ──
    return `<div class="word-card"
                data-greek="${wordText.replace(/"/g,'&quot;')}"
                data-strong="${strong}"
                data-jpmorph="${jpMorph.replace(/"/g,'&quot;')}"
                data-morph="${(m.morph||'').replace(/"/g,'&quot;')}"
                data-lemma="${lemma.replace(/"/g,'&quot;')}"
                data-ja="${jaWordE.replace(/"/g,'&quot;')}"
                data-desc="${descE.replace(/"/g,'&quot;')}"
                data-ref="${ref}"
                onclick="onWordCardClick(this, event)">
                <div>
                    <span class="greek-word ${styleClass}">${wordText}</span>${middleStar}
                    <span style="color:var(--text-sub);font-weight:400;margin-left:6px;font-size:0.82rem;">［${jaWord}］</span>
                    <span class="tag-jp">${jpMorph}</span>
                </div>
                <span class="strong-num">G${strong}</span>
            </div>`;
}

/* ══════════════════════════════════════════
   Inspect Popover 制御
   ══════════════════════════════════════════ */

/*
 * _inspectData は後方互換エイリアス。
 * 実態は AppState.inspect.data。
 * _renderMorphTab / _renderSemanticsTab が直接参照しているため
 * Proxy でリダイレクトする。
 */
const _inspectDataProxy = {
    get greek()    { return AppState.inspect.data?.greek    || ''; },
    get strong()   { return AppState.inspect.data?.strong   || ''; },
    get jpMorph()  { return AppState.inspect.data?.jpMorph  || ''; },
    get rawMorph() { return AppState.inspect.data?.rawMorph || ''; },
    get lemma()    { return AppState.inspect.data?.lemma    || ''; },
    get jaWord()   { return AppState.inspect.data?.jaWord   || ''; },
    get desc()     { return AppState.inspect.data?.desc     || ''; },
    get ref()      { return AppState.inspect.data?.ref      || ''; },
};
/* 後方互換: _inspectData を参照している既存コードが動くよう変数として公開 */
let _inspectData = _inspectDataProxy;

/**
 * word-card クリック時のエントリポイント。
 * Inspect層の責務:
 *   - AppState.inspect.data を更新する
 *   - popover を表示する
 *   - Study panel は開かない（モードを変えない）
 */
function onWordCardClick(cardEl, event) {
    event.stopPropagation();

    const greek   = cardEl.dataset.greek   || '';
    const strong  = cardEl.dataset.strong  || '';
    const jpMorph = cardEl.dataset.jpmorph || '';
    const rawMorph= cardEl.dataset.morph   || '';
    const lemma   = cardEl.dataset.lemma   || '';
    const jaWord  = cardEl.dataset.ja      || '';
    const desc    = cardEl.dataset.desc    || '';
    const ref     = cardEl.dataset.ref     || '';

    /* Inspect 状態を AppState に記録 */
    AppState.inspect.data = { greek, strong, jpMorph, rawMorph, lemma, jaWord, desc, ref };

    showInspectPopover(cardEl, greek, strong, jpMorph, rawMorph, jaWord);
}

function showInspectPopover(anchorEl, greek, strong, jpMorph, rawMorph, jaWord) {
    const popover = document.getElementById('inspect-popover');

    // --- 内容を更新 ---
    document.getElementById('insp-greek').textContent = greek;
    document.getElementById('insp-ja').textContent    = jaWord || '—';

    // 品詞タグ（最大3つ）
    const tagsEl = document.getElementById('insp-tags');
    tagsEl.innerHTML = buildInspectTagsHTML(rawMorph);

    // --- 位置決め ---
    // anchorElのbounding rectから popover を配置する
    const rect = anchorEl.getBoundingClientRect();
    const popW = 220;
    const popH = 130; // 概算

    // デフォルトは anchorEl の右下
    let left = rect.right + 8;
    let top  = rect.top;

    // 右端オーバー対策
    if (left + popW > window.innerWidth - 8) {
        left = rect.left - popW - 8;
    }
    // 下端オーバー対策
    if (top + popH > window.innerHeight - 8) {
        top = window.innerHeight - popH - 8;
    }
    // 上端オーバー対策
    if (top < 8) { top = 8; }

    popover.style.left = left + 'px';
    popover.style.top  = top  + 'px';

    popover.classList.add('visible');
}

function hideInspectPopover() {
    const popover = document.getElementById('inspect-popover');
    popover.classList.remove('visible');
}

/**
 * Inspect → Study へ昇格。
 * popoverの「詳しく見る」ボタンから呼ばれる。
 * 責務:
 *   - popoverを閉じる
 *   - Study.open に制御を移す（AppState.toStudy は openStudyPanel が行う）
 */
function escalateToStudy() {
    if (!AppState.inspect.data) return;
    hideInspectPopover();
    const { greek, rawMorph, ref, lemma } = AppState.inspect.data;
    openStudyPanel(greek, rawMorph, ref, lemma);
}

/**
 * Inspect用の品詞タグHTMLを生成（最大3つ）。
 * morph-tag-pill と同じ情報だが、inspect-tag クラスを使う。
 */
function buildInspectTagsHTML(rawMorph) {
    const m = parseMorphForSearch(rawMorph);
    const JPN = {
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞' },
        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法',
                  imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },
    };

    // 優先度順に最大3つ選ぶ：品詞 > 時制/法 > 格/数
    const picks = [];
    if (m.pos)   picks.push({ label: JPN.pos[m.pos]     || m.pos,    core: true });
    if (m.tense && picks.length < 3) picks.push({ label: JPN.tense[m.tense] || m.tense, core: true });
    if (m.mood  && picks.length < 3) picks.push({ label: JPN.mood[m.mood]   || m.mood,  core: true });
    if (m.case  && picks.length < 3) picks.push({ label: JPN.case[m.case]   || m.case,  core: false });
    if (m.voice && picks.length < 3) picks.push({ label: JPN.voice[m.voice] || m.voice, core: false });

    return picks.slice(0, 3).map(t =>
        `<span class="inspect-tag${t.core ? ' core' : ''}">${t.label}</span>`
    ).join('');
}

/* ══════════════════════════════════════════
   Study Panel 制御
   ══════════════════════════════════════════ */

/*
 * _currentAnalysisParams は後方互換エイリアス。
 * 実態は AppState.study.params。
 * switchAnalysisTab / _renderMorphTab 等が直接参照しているため
 * get/set プロパティとして公開する。
 *
 * 注意: 代入は AppState.study.params への書き込みと等価。
 */
Object.defineProperty(window, '_currentAnalysisParams', {
    get()  { return AppState.study.params; },
    set(v) { AppState.study.params = v; },
    configurable: true,
});

/*
 * openStudyPanel / closeStudyPanel / reopenStudyPanel は
 * openWordListInStudyPanel の直後（このファイル末尾付近）に
 * 一箇所だけ定義されています。
 * AppState 更新・scroll 保存/復元を含む正規実装です。
 */

/**
 * 従来の toggleSidePanel を置き換え。
 * 外部から呼ばれる可能性があるため互換として残す。
 */
function toggleSidePanel() {
    const sidePanel = document.getElementById('side-panel');
    const isHidden  = window.getComputedStyle(sidePanel).display === 'none';
    if (isHidden) {
        if (AppState.canReopen()) reopenStudyPanel();
    } else {
        closeStudyPanel();
    }
}

/**
 * 従来の closeAnalysis 互換（message handler等から呼ばれる）。
 */
function closeAnalysis() {
    closeStudyPanel();
}

function switchAnalysisTab(tab) {
    if (!_currentAnalysisParams) return;
    const p = _currentAnalysisParams;

    /* 選択タブを AppState に記録（reopen時の復元に使う） */
    AppState.study.tab = tab;

    ['flow','meaning','study'].forEach(t => {
        document.getElementById(`atab-${t}`).classList.toggle('active', t === tab);
    });

    const area = document.getElementById('analysis-content-area');
    if (!area) return;
    area.scrollTop = 0;

    if (tab === 'flow')        _renderFlowTab(area, p);
    else if (tab === 'meaning') _renderMeaningTab(area, p);
    else if (tab === 'study')   _renderStudyTab(area, p);
}

function _renderMorphTab(area, p) {
    const JPN_FULL = {
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞', ADV:'副詞', PREP:'前置詞', CONJ:'接続詞', PRT:'添語' },
        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了', pluperfect:'大完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動', 'middle or passive':'中動/受動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法', imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },
        person: { '1':'1人称', '2':'2人称', '3':'3人称' },
    };

    const rows = [];
    if (p.pos)    rows.push({ k:'品詞',  v: JPN_FULL.pos[p.pos]    || p.pos,    core: true });
    if (p.tense)  rows.push({ k:'時制',  v: JPN_FULL.tense[p.tense]|| p.tense,  core: true });
    if (p.mood)   rows.push({ k:'法',    v: JPN_FULL.mood[p.mood]  || p.mood,   core: true });
    if (p.voice)  rows.push({ k:'態',    v: JPN_FULL.voice[p.voice]|| p.voice,  core: false });
    if (p.case)   rows.push({ k:'格',    v: JPN_FULL.case[p.case]  || p.case,   core: false });
    if (p.number) rows.push({ k:'数',    v: JPN_FULL.number[p.number]||p.number,core: false });
    if (p.gender) rows.push({ k:'性',    v: JPN_FULL.gender[p.gender]||p.gender,core: false });

    const morphGridHTML = rows.length
        ? `<div class="ac-morph-grid">
            ${rows.map(r => `
                <span class="ac-morph-key">${r.k}</span>
                <span class="ac-morph-val${r.core ? ' core' : ''}">${r.v}</span>
            `).join('')}
           </div>`
        : `<p class="ac-no-data">形態論データがありません</p>`;

    const jaWord = (_inspectData && _inspectData.jaWord) || '—';
    const desc   = (_inspectData && _inspectData.desc)   || '';
    const strong = (_inspectData && _inspectData.strong)  || '';
    const ref    = p.ref || '';
    const lemma  = p.lemma || '';

    // 近くの語を見るリンク（morph-search.html へ URL遷移）
    const qs = new URLSearchParams();
    if (ref)   qs.set('ref',   ref);
    if (p.word) qs.set('word', p.word);
    if (lemma)  qs.set('lemma', lemma);
    if (p.pos)  qs.set('pos',   p.pos);
    if (p.tense) qs.set('tense', p.tense);
    if (p.mood)  qs.set('mood',  p.mood);
    if (p.voice) qs.set('voice', p.voice);
    if (p.gender) qs.set('gender', p.gender);
    if (p.number) qs.set('number', p.number);
    if (p.case)   qs.set('case',   p.case);
    const morphSearchURL = `morph-search.html?${qs.toString()}`;

    area.innerHTML = `
        <span class="ac-section-label">形態論</span>
        <div class="ac-entry">
            <div class="ac-entry-greek">${p.word || '—'}</div>
            <div class="ac-entry-ja">${jaWord}</div>
            ${strong ? `<span class="ac-entry-strong">G${strong}</span>` : ''}
            ${morphGridHTML}
            ${ref ? `<span class="ac-cite-ref">📍 ${ref}</span>` : ''}
        </div>
        ${desc ? `<div class="ac-abbottsmith">${desc.replace(/\n/g,'<br>')}</div>` : ''}
        <div class="ac-morph-search-row">
            <a href="${morphSearchURL}" class="morph-search-btn" title="この語形が現れる他の箇所を検索">
                近くの語を見る →
            </a>
        </div>
    `;
}

/* ══════════════════════════════════════════
   Flow / Meaning / Study タブ描画
   （読解支援を主役にした新タブ体系）
   ══════════════════════════════════════════ */

/**
 * Flow タブ：「この語・この節が何をしているか」を読解補助として表示。
 * AIによるニュアンス補助（Anthropic API）。
 * データなし時はローカルルールベースフォールバックを表示。
 */
function _renderFlowTab(area, p) {
    const word   = p.word   || '—';
    const pos    = p.pos    || '';
    const mood   = p.mood   || '';
    const tense  = p.tense  || '';
    const voice  = p.voice  || '';
    const jaWord = (_inspectData && _inspectData.jaWord) || '';
    const ref    = p.ref    || '';

    /* ══════════════════════════════════════════
       ローカルフォールバック：9種 Flow signal
       「著者の流れ・強調・意図」を静かに補助する。
       チェックリスト化禁止。自然な文章として表示。
       ══════════════════════════════════════════ */
    const signals = [];
    // signal: { kind: CSS class suffix, kindLabel: 極小ラベル, text: 自然文 }

    /* ── #1 鍵となるフレーズ・単語（繰り返し・転換・強調） ── */
    if (pos === 'CONJ') {
        const CONJ_SIGNAL = {
            'γάρ':  { cls: 'sig-logic',    text: 'ここで理由が始まります。直前の主張の根拠として読むと、議論の構造が見えてきます。' },
            'ἀλλά': { cls: 'sig-turn',     text: '「しかし」による転換。ここで流れが変わります。' },
            'οὖν':  { cls: 'sig-logic',    text: 'ここで論理が結論へ進みます。前節の集約として読む箇所です。' },
            'δέ':   { cls: 'sig-turn',     text: '話が次の段階に進んでいます。微妙な展開・対比のサインです。' },
            'καί':  { cls: 'sig-emphasis', text: '内容が積み重なっています。強調の「そして」として機能する場合もあります。' },
            'ἵνα':  { cls: 'sig-logic',    text: '目的節。この語以降に「なぜそうするのか」という著者の意図が示されます。' },
            'ὅτι':  { cls: 'sig-logic',    text: '内容・理由節。以降が主張の根拠か内容補足になります。' },
            'εἰ':   { cls: 'sig-logic',    text: '条件節。仮定の前提の上で議論が展開されています。' },
            'ὥστε': { cls: 'sig-logic',    text: 'ここに議論の帰結があります。「その結果として」という流れです。' },
        };
        const s = CONJ_SIGNAL[word];
        if (s) signals.push({ cls: s.cls, kindLabel: '流れ', text: s.text });
        else   signals.push({ cls: 'sig-logic', kindLabel: '流れ', text: '接続詞。前後をつなぎ、議論の流れを形作っています。' });
    }

    /* ── #6 論理的展開（最重要：Flow の中心機能） ── */
    /* 動詞の法：命令・約束・宣言・論理を区別して表示 */
    if (pos === 'V') {
        /* #2 命令・勧め */
        if (mood === 'imperative') {
            signals.push({ cls: 'sig-exhort', kindLabel: '勧め', text: 'ここは説明ではなく、行動への呼びかけです。' });
        }
        /* 接続法：目的・願望 */
        if (mood === 'subjunctive') {
            signals.push({ cls: 'sig-logic', kindLabel: '目的', text: '接続法。目的・条件・願望を表しています。断定ではなく「〜するために」「〜であれば」という含みです。' });
        }
        /* 不定詞：補足・目的 */
        if (mood === 'infinitive') {
            signals.push({ cls: 'sig-logic', kindLabel: '補足', text: '不定詞。動作の目的か内容を補足する役割です。' });
        }
        /* 分詞：修飾・同時進行 */
        if (mood === 'participle') {
            signals.push({ cls: 'sig-logic', kindLabel: '修飾', text: '分詞。主動詞の状況・背景を描写しています。' });
        }

        /* 時制による流れへの影響 */
        if (tense === 'aorist' && mood === 'indicative') {
            /* #4 宣言との区別：アオリスト直説は事実・宣言として機能することが多い */
            signals.push({ cls: 'sig-declare', kindLabel: '宣言', text: 'アオリスト直説法。「その出来事が起きた」という完結した事実の提示です。命令でも約束でもなく、宣言的な重みがあります。' });
        }
        if (tense === 'present' && mood === 'indicative') {
            signals.push({ cls: 'sig-logic', kindLabel: '流れ', text: '現在直説法。継続・習慣・普遍的な事実として述べています。' });
        }
        if (tense === 'perfect') {
            /* #3 約束・完了の状態：完了形は「今も続く結果」 */
            signals.push({ cls: 'sig-promise', kindLabel: '状態', text: '完了形。過去の出来事の結果が今も有効です。単なる過去の話ではなく、現在の状態を含む表現です。' });
        }
        if (tense === 'future' && mood === 'indicative') {
            /* 未来直説法はしばしば約束・確約として機能 */
            signals.push({ cls: 'sig-promise', kindLabel: '約束', text: '未来直説法。これは命令というより、確かな約束・確約として機能していることがあります。' });
        }

        /* #7 語の選択：態のニュアンス */
        if (voice === 'passive') {
            signals.push({ cls: 'sig-word', kindLabel: '語感', text: '受動態。主語は動作を受ける側に置かれています。神学的文脈では「神による行為」を暗示することがあります。' });
        }
        if (voice === 'middle' || voice === 'middle deponent') {
            signals.push({ cls: 'sig-word', kindLabel: '語感', text: '中動態。主語が動作に深く関与しています。単なる能動でも受動でもない、自身が関わる動作です。' });
        }
    }

    /* ── 名詞系の格：論理的役割を「流れ」として表示 ── */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const CASE_SIGNAL = {
            nominative: { cls: 'sig-logic',   text: '主格。この語が文の中心にいます。主語または述語として機能しています。' },
            genitive:   { cls: 'sig-logic',   text: '属格。「〜の」という関係を示します。所有・由来・特徴などのニュアンスがあります。' },
            dative:     { cls: 'sig-logic',   text: '与格。動作の間接的な受け手・場所・手段を示します。' },
            accusative: { cls: 'sig-logic',   text: '対格。動作の直接の対象です。' },
        };
        const s = CASE_SIGNAL[p.case];
        if (s) signals.push({ cls: s.cls, kindLabel: '構造', text: s.text });
    }

    /* ── #5 比喩表現：特定語の比喩的使用に注意を促す ── */
    const METAPHOR_WORDS = {
        'περιπατέω': '「歩む」は、ここでは文字通りの歩行ではなく、生き方・行動様式の比喩として使われています。',
        'περιπατεῖν': '「歩む」は、生き方の比喩として使われています。',
        'φωτί':      '「光」は比喩的な表現として機能していることが多く、知識・啓示・義などを指すことがあります。',
        'σκότος':    '「闇」は比喩的に罪・無知・神との断絶を示すことがあります。',
        'σταυρός':   '十字架は当時の読者にとって処刑の道具であると同時に、贖いの象徴として受け取られた語です。',
    };
    if (METAPHOR_WORDS[word]) {
        signals.push({ cls: 'sig-metaphor', kindLabel: '比喩', text: METAPHOR_WORDS[word] });
    }

    /* ── デフォルト：signal がない場合 ── */
    if (signals.length === 0) {
        signals.push({ cls: 'sig-default', kindLabel: '補助', text: 'この語の文脈的な役割は「含み」タブでさらに確認できます。' });
    }

    const localHTML = signals.map(s =>
        `<div class="flow-signal ${s.cls}">
            <span class="flow-signal-kind">${s.kindLabel}</span>
            <span class="flow-signal-text">${s.text}</span>
        </div>`
    ).join('');

    area.innerHTML = `
        <div class="flow-word-head">
            <span class="flow-greek">${word}</span>${jaWord ? `<span class="flow-ja">　${jaWord}</span>` : ''}
        </div>
        ${ref ? `<div class="flow-ref">${ref}</div>` : ''}
        <div class="flow-hints" id="flow-hints-local">
            ${localHTML}
        </div>
    `;
}

/**
 * Flow タブ用 AI 補助（廃止：ローカルsignalのみ使用）
 */
async function _fetchFlowAI(area, p, jaWord) {
    /* no-op */
}

/**
 * Meaning タブ：「この語が今この文脈でどう響くか」を読書補助として表示。
 * Abbott-Smith は Study → Semantics へ移動済み。
 * ここは辞書ではなく、tone / relational force / contextual nuance の層。
 */
function _renderMeaningTab(area, p) {
    const word   = p.word   || '—';
    const jaWord = (_inspectData && _inspectData.jaWord) || '—';
    const ref    = p.ref    || '';

    /* ローカルルールベースの Meaning signals */
    const meaningSignals = _buildMeaningSignals(p);
    const signalHTML = meaningSignals.length
        ? meaningSignals.map(s =>
            `<div class="flow-signal ${s.cls || 'sig-default'}">
                <span class="flow-signal-kind">${s.kindLabel}</span>
                <span class="flow-signal-text">${s.text}</span>
            </div>`).join('')
        : `<p class="ac-no-data">この語のシグナルデータがありません。</p>`;

    area.innerHTML = `
        <div class="flow-word-head">
            <span class="flow-greek">${word}</span><span class="flow-ja">　${jaWord}</span>
        </div>
        ${ref ? `<div class="flow-ref">${ref}</div>` : ''}
        <div class="flow-hints">
            ${signalHTML}
        </div>
    `;
}

/**
 * Meaning タブ用ローカルシグナル生成。
 * AIなし。形態論データからルールベースでシグナルを導出する。
 */
function _buildMeaningSignals(p) {
    const signals = [];
    const pos   = p.pos   || '';
    const mood  = p.mood  || '';
    const tense = p.tense || '';
    const voice = p.voice || '';
    const word  = p.word  || '';

    if (pos === 'V') {
        if (mood === 'imperative') {
            signals.push({ cls: 'sig-exhort', kindLabel: '行為', text: '命令形。説明ではなく、行動への直接の呼びかけとして機能しています。' });
        }
        if (mood === 'subjunctive') {
            signals.push({ cls: 'sig-logic', kindLabel: '態度', text: '接続法。断定ではなく、目的・願望・可能性の含みをもちます。' });
        }
        if (mood === 'participle') {
            signals.push({ cls: 'sig-logic', kindLabel: '修飾', text: '分詞。主動詞の状況・背景・手段として機能しています。' });
        }
        if (tense === 'perfect') {
            signals.push({ cls: 'sig-promise', kindLabel: '状態', text: '完了形。過去の出来事の結果が現在も有効であることを示します。' });
        }
        if (tense === 'aorist' && mood === 'indicative') {
            signals.push({ cls: 'sig-declare', kindLabel: '宣言', text: 'アオリスト直説法。完結した出来事の事実提示。宣言的な重みがあります。' });
        }
        if (tense === 'future') {
            signals.push({ cls: 'sig-promise', kindLabel: '約束', text: '未来形。確かな約束・確約として機能することがあります。' });
        }
        if (voice === 'passive') {
            signals.push({ cls: 'sig-word', kindLabel: '態', text: '受動態。神学的文脈では「神による行為」を暗示することがあります。' });
        }
        if (voice === 'middle' || voice === 'middle deponent') {
            signals.push({ cls: 'sig-word', kindLabel: '態', text: '中動態。主語が動作に深く関与しています。' });
        }
    }

    if (pos === 'CONJ') {
        const CONJ_MEANING = {
            'γάρ':  { cls: 'sig-logic',    kindLabel: '論理', text: '理由の接続詞。前の主張への根拠として読みます。' },
            'ἀλλά': { cls: 'sig-turn',     kindLabel: '転換', text: '強い対比・転換。ここで話の方向が変わります。' },
            'οὖν':  { cls: 'sig-logic',    kindLabel: '帰結', text: '論理的帰結。前節の議論をここで集約しています。' },
            'δέ':   { cls: 'sig-turn',     kindLabel: '展開', text: '微妙な転換・進展のサイン。' },
            'καί':  { cls: 'sig-emphasis', kindLabel: '付加', text: '並列・強調。内容が積み重なっています。' },
            'ἵνα':  { cls: 'sig-logic',    kindLabel: '目的', text: '目的節。著者の意図がこの語の後に示されます。' },
            'ὅτι':  { cls: 'sig-logic',    kindLabel: '内容', text: '内容・理由節。主張の根拠か内容補足になります。' },
        };
        const cs = CONJ_MEANING[word];
        if (cs) signals.push(cs);
        else signals.push({ cls: 'sig-logic', kindLabel: '接続', text: '接続詞。前後の節をつなぎ、議論の流れを形作っています。' });
    }

    if (signals.length === 0) {
        signals.push({ cls: 'sig-default', kindLabel: '補足', text: 'この語の特記すべき語用論的特徴はありません。' });
    }

    return signals;
}

/**
 * ローカルルールベースで「構文関係」テキストを生成。
 * 品詞・法・時制・格から「この語が論理上何をしているか」を読解補助として記述。
 * linguistics用語の羅列禁止。自然な読解文として書く。
 *
 * @returns Array<{kind:string, text:string}>
 */
function _buildSyntaxRelations(p, JPN) {
    const rels = [];
    const pos   = p.pos   || '';
    const mood  = p.mood  || '';
    const tense = p.tense || '';
    const voice = p.voice || '';

    /* 接続詞：節の論理関係 */
    if (pos === 'CONJ') {
        const CONJ_LOGIC = {
            'γάρ':  { kind: '理由節',  text: 'この語以降が直前の主張の根拠節として機能しています。' },
            'ἀλλά': { kind: '対比節',  text: '前節との対比・反転を示す節境界です。' },
            'οὖν':  { kind: '結論節',  text: '前節の議論を受けた結論節が始まります。' },
            'δέ':   { kind: '展開',    text: '前節に続く展開または対比の接続点です。' },
            'καί':  { kind: '並列',    text: '前節と並列関係にある節が続きます。' },
            'ἵνα':  { kind: '目的節',  text: 'この語以降が目的節：「〜するために」という従属節です。' },
            'ὅτι':  { kind: '補足節',  text: '内容節または理由節として前節を補足しています。' },
            'εἰ':   { kind: '条件節',  text: '条件節：「〜ならば」という仮定の節を導きます。' },
            'ὥστε': { kind: '結果節',  text: '結果節：前節の帰結として「〜になった」を示します。' },
        };
        const word = p.word || '';
        const r = CONJ_LOGIC[word];
        if (r) rels.push(r);
        else   rels.push({ kind: '接続',  text: '前後の節をつなぐ論理的接点です。' });
    }

    /* 動詞：節内の役割 */
    if (pos === 'V') {
        /* 法による節の機能 */
        if (mood === 'imperative') {
            rels.push({ kind: '主節',   text: 'この動詞が節の中心命令を担っています。要求・指示の主語述語構造です。' });
        } else if (mood === 'subjunctive') {
            rels.push({ kind: '従属節', text: '接続法として従属節内に位置し、目的・条件・願望を支えています。' });
        } else if (mood === 'infinitive') {
            rels.push({ kind: '補語',   text: '不定詞として主動詞の補語または目的語の役割を担っています。' });
        } else if (mood === 'participle') {
            rels.push({ kind: '修飾',   text: '分詞として主節の主語または動作の状況・背景を修飾しています。' });
        } else if (mood === 'indicative') {
            rels.push({ kind: '主節',   text: '直説法として節の主動詞に位置しています。' });
        }

        /* 時制による時間軸上の位置 */
        if (tense === 'aorist' && mood === 'indicative') {
            rels.push({ kind: '時制軸', text: '時制上、完結した出来事として主節に先行するか同時点に置かれています。' });
        } else if (tense === 'perfect') {
            rels.push({ kind: '時制軸', text: '完了形として、過去の出来事の結果が今も有効であるという論理的含意を持ちます。' });
        } else if (tense === 'present' && mood === 'indicative') {
            rels.push({ kind: '時制軸', text: '現在時制として、論理上の普遍命題または継続する状態として機能しています。' });
        }

        /* 態による動作構造 */
        if (voice === 'passive') {
            rels.push({ kind: '動作構造', text: '受動態。主語は動作の受け手として節内に配置されています。' });
        } else if (voice === 'middle' || voice === 'middle deponent') {
            rels.push({ kind: '動作構造', text: '中動態。主語が動作に深く関与する自動詞的構造です。' });
        }
    }

    /* 名詞・代名詞：節内の格役割 */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const CASE_ROLE = {
            nominative: { kind: '格役割', text: '主格として、この節の主語または述語主格の位置にあります。' },
            genitive:   { kind: '格役割', text: '属格として、修飾語または「〜の」という関係を節内で担っています。' },
            dative:     { kind: '格役割', text: '与格として、動作の間接目的・場所・手段の位置にあります。' },
            accusative: { kind: '格役割', text: '対格として、動詞の直接目的語または動作の到達点に配置されています。' },
            vocative:   { kind: '格役割', text: '呼格として、節の主述関係の外に位置する呼びかけです。' },
        };
        const r = CASE_ROLE[p.case];
        if (r) rels.push(r);
    }

    return rels;
}

/**
 * 「静かな構文ツリー」HTML を生成。
 * ROOT / NP / VP / CP のような学術ラベル禁止。
 * 読解補助として「誰が」「何を」「どういう関係で」を示す。
 * モバイルで横スクロール地獄にならないよう幅を抑える。
 *
 * @returns HTML string（構文ツリー行群）
 */
function _buildSyntaxTree(p, JPN, jaWord) {
    const pos   = p.pos   || '';
    const mood  = p.mood  || '';
    const tense = p.tense || '';
    const voice = p.voice || '';
    const word  = p.word  || '—';
    const rows  = [];

    /* ヘルパー：インデントと接続文字を組み合わせた1行を生成 */
    const treeRow = (indent, isLast, role, content, note = '') =>
        `<div class="syntax-tree-row">` +
        `${'<span class="syntax-tree-indent">  </span>'.repeat(indent)}` +
        `<span class="syntax-tree-connector">${isLast ? '└' : '├'}</span>` +
        `<span class="syntax-tree-role">${role}</span>` +
        `<span class="syntax-tree-content">${content}</span>` +
        `${note ? `<span class="syntax-tree-note">${note}</span>` : ''}` +
        `</div>`;

    /* 動詞中心の構造 */
    if (pos === 'V') {
        const moodLabel  = JPN.mood[mood]   || mood  || '';
        const tenseLabel = JPN.tense[tense] || tense || '';
        const voiceLabel = JPN.voice[voice] || voice || '';

        /* ルート：動詞節 */
        rows.push(`<div class="syntax-tree-row"><span class="syntax-tree-role" style="font-size:0.6rem;opacity:0.4;">節</span><span class="syntax-tree-content" style="opacity:0.5;">述語構造</span></div>`);

        if (mood === 'participle') {
            rows.push(treeRow(0, false, '述語分詞', word, `${tenseLabel}・${voiceLabel}`));
            rows.push(treeRow(1, false, '機能', '主節の動作を修飾', ''));
            rows.push(treeRow(1, true,  '法',   moodLabel, ''));
        } else if (mood === 'infinitive') {
            rows.push(treeRow(0, false, '動詞', word, `${tenseLabel}`));
            rows.push(treeRow(1, false, '機能', '主動詞の補語', ''));
            rows.push(treeRow(1, true,  '法',   moodLabel, ''));
        } else {
            rows.push(treeRow(0, false, '述語', word, `${moodLabel}・${tenseLabel}${voiceLabel ? '・' + voiceLabel : ''}`));
            if (mood === 'imperative') {
                rows.push(treeRow(1, false, '節種', '命令節（主節）', ''));
                rows.push(treeRow(1, true,  '主語', '（2人称：省略）', ''));
            } else if (mood === 'subjunctive') {
                rows.push(treeRow(1, true, '節種', '従属節（接続法）', ''));
            } else if (mood === 'indicative') {
                rows.push(treeRow(1, true, '節種', '主節（直説法）', ''));
            }
        }
    }

    /* 名詞・代名詞・冠詞系 */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const caseLabel   = JPN.case[p.case]     || p.case   || '';
        const numberLabel = JPN.number[p.number] || p.number || '';
        const genderLabel = JPN.gender[p.gender] || p.gender || '';
        const posLabel    = JPN.pos[pos]          || pos;

        rows.push(`<div class="syntax-tree-row"><span class="syntax-tree-role" style="font-size:0.6rem;opacity:0.4;">句</span><span class="syntax-tree-content" style="opacity:0.5;">名詞句</span></div>`);
        rows.push(treeRow(0, false, posLabel, word, `${caseLabel}${numberLabel ? '・'+numberLabel : ''}${genderLabel ? '・'+genderLabel : ''}`));

        const CASE_FUNC = {
            nominative: '主語または述語主格',
            genitive:   '修飾語（〜の）',
            dative:     '間接目的語・場所・手段',
            accusative: '直接目的語',
            vocative:   '呼びかけ（独立）',
        };
        const func = CASE_FUNC[p.case];
        if (func) rows.push(treeRow(1, true, '節内機能', func, ''));
    }

    /* 接続詞 */
    if (pos === 'CONJ') {
        rows.push(`<div class="syntax-tree-row"><span class="syntax-tree-role" style="font-size:0.6rem;opacity:0.4;">接続</span><span class="syntax-tree-content" style="opacity:0.5;">節境界</span></div>`);
        rows.push(treeRow(0, false, '接続詞', word, ''));
        rows.push(treeRow(1, false, '先行節', '（前節）', ''));
        rows.push(treeRow(1, true,  '後続節', '（後節）', ''));
    }

    return rows.join('');
}

/** Research Tools の開閉トグル */
function _rtToggle() {
    const btn  = document.getElementById('rt-open-btn');
    const body = document.getElementById('rt-body');
    if (!btn || !body) return;
    const isOpen = body.classList.contains('visible');
    body.classList.toggle('visible', !isOpen);
    btn.classList.toggle('expanded', !isOpen);
    btn.querySelector('.rt-open-btn-icon').textContent = isOpen ? '›' : '›';
    /* ラベルも切り替え */
    const label = btn.childNodes[1];
    if (label) label.textContent = isOpen ? '研究ツールを開く' : '研究ツールを閉じる';
}

/** Research Tools 内タブ切り替え（morph / syntax / sem） */
function _rtSwitchTab(name) {
    ['morph','syntax','sem'].forEach(t => {
        const tab = document.getElementById(`rt-tab-${t}`);
        const cnt = document.getElementById(`rt-content-${t}`);
        if (tab) tab.classList.toggle('active', t === name);
        if (cnt) cnt.classList.toggle('visible', t === name);

/** Semantic Search チップの単一選択制御を初期化 */
function _rtInitSemChips() {
    const chips = document.querySelectorAll('.rt-concept-chip');
    chips.forEach(chip => {
        chip.addEventListener('click', () => {
            const wasSelected = chip.classList.contains('selected');
            chips.forEach(c => c.classList.remove('selected'));
            if (!wasSelected) chip.classList.add('selected');
        });
    });
}

/**
 * 結果テキストを rt-result-block 群に変換して描画。
 * AIには「---」区切りで複数結果を返すよう指示する。
 * 各ブロックは「種別: / 内容: / 参照:」の3行構成（なければ省略）。
 */
function _rtRenderResults(text, resultsEl) {
    if (!text) {
        resultsEl.innerHTML = `<div class="rt-no-result">該当する用例が見つかりませんでした。</div>`;
        return;
    }
    /* ブロック分割（--- 区切り）*/
    const blocks = text.split(/---+/).map(b => b.trim()).filter(Boolean);
    if (blocks.length === 0) {
        resultsEl.innerHTML = `<div class="rt-result-block"><span class="rt-result-text">${text.replace(/\n/g,'<br>')}</span></div>`;
        return;
    }
    resultsEl.innerHTML = blocks.map(block => {
        /* 各ブロックからラベル・本文・参照を抽出 */
        const kindMatch = block.match(/^種別[:：]\s*(.+)/m);
        const textMatch = block.match(/^内容[:：]\s*([\s\S]+?)(?=参照[:：]|$)/m);
        const refMatch  = block.match(/^参照[:：]\s*(.+)/m);
        const kind   = kindMatch ? kindMatch[1].trim() : '';
        const body   = textMatch ? textMatch[1].trim() : block.replace(/^種別.+\n?/m,'').trim();
        const ref    = refMatch  ? refMatch[1].trim()  : '';
        return `<div class="rt-result-block">
            ${kind ? `<span class="rt-result-kind">${kind}</span>` : ''}
            <span class="rt-result-text">${body.replace(/\n/g,'<br>')}</span>
            ${ref  ? `<span class="rt-result-ref">📍 ${ref}</span>` : ''}
        </div>`;
    }).join('');
}

    _rtCallAI(prompt, 'rt-sem-loading', 'rt-sem-results', _rtRenderResults);

function parseMorphForSearch(rawMorph) {
    const parts = rawMorph.split('-');
    const pos = parts[0];
    const result = { pos };

    if (pos === 'V' && parts[1]) {
        const off = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off + 0];
        const voiceCode = parts[1][off + 1];
        const moodCode  = parts[1][off + 2];

        const TENSE_MAP = { P:'present', I:'imperfect', F:'future', A:'aorist', X:'perfect' };
        const VOICE_MAP = { A:'active', M:'middle', P:'passive', D:'middle deponent' };
        const MOOD_MAP  = { I:'indicative', S:'subjunctive', O:'optative',
                            M:'imperative', N:'infinitive', P:'participle' };

        if (tenseCode) result.tense = TENSE_MAP[tenseCode] || '';
        if (voiceCode) result.voice = VOICE_MAP[voiceCode] || '';
        if (moodCode)  result.mood  = MOOD_MAP[moodCode]   || '';

        if (moodCode === 'P' && parts[2]) {
            const CASE_MAP   = { N:'nominative', G:'genitive', D:'dative', A:'accusative', V:'vocative' };
            const NUMBER_MAP = { S:'singular', P:'plural' };
            const GENDER_MAP = { M:'masculine', F:'feminine', N:'neuter' };
            result.case   = CASE_MAP[parts[2][0]]   || '';
            result.number = NUMBER_MAP[parts[2][1]] || '';
            result.gender = GENDER_MAP[parts[2][2]] || '';
        }
    } else if (['N','A','R','P','T','D'].includes(pos) && parts[1]) {
        const CASE_MAP   = { N:'nominative', G:'genitive', D:'dative', A:'accusative', V:'vocative' };
        const NUMBER_MAP = { S:'singular', P:'plural' };
        const GENDER_MAP = { M:'masculine', F:'feminine', N:'neuter' };
        const base = ['1','2','3'].includes(parts[1][0]) ? parts[1].slice(1) : parts[1];
        result.case   = CASE_MAP[base[0]]   || '';
        result.number = NUMBER_MAP[base[1]] || '';
        result.gender = GENDER_MAP[base[2]] || '';
    }
    return result;
}

function buildMorphTagsHTML(rawMorph) {
    const m = parseMorphForSearch(rawMorph);
    const JPN = {
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞' },
        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法',
                  imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },
    };

    const tags = [];
    if (m.pos)    tags.push({ label: JPN.pos[m.pos]    || m.pos,    core: true });
    if (m.tense)  tags.push({ label: JPN.tense[m.tense]|| m.tense,  core: true });
    if (m.voice)  tags.push({ label: JPN.voice[m.voice]|| m.voice,  core: false });
    if (m.mood)   tags.push({ label: JPN.mood[m.mood]  || m.mood,   core: true });
    if (m.gender) tags.push({ label: JPN.gender[m.gender]|| m.gender, core: false });
    if (m.number) tags.push({ label: JPN.number[m.number]|| m.number, core: false });
    if (m.case)   tags.push({ label: JPN.case[m.case]  || m.case,   core: false });

    if (tags.length === 0) return '';
    return `<div class="morph-tag-row">
        ${tags.map(t => `<span class="morph-tag-pill${t.core ? ' core' : ''}">${t.label}</span>`).join('')}
    </div>`;
}

let sbSection  = 'nt';
let sbBookKey  = null;
let sbBookName = '';
let sbMaxCh    = 1;

function sbGoTo(layer, section) {
    document.querySelectorAll('.sb-layer').forEach(l => l.classList.remove('active'));
    document.getElementById('sb-layer' + layer).classList.add('active');

    if (layer === 0) {
        document.getElementById('sb-nt-row').classList.toggle('active', sbSection === 'nt');
        document.getElementById('sb-ot-row').classList.toggle('active', sbSection === 'ot');
    }

    if (layer === 1) {
        if (section) sbSection = section;
        const label = sbSection === 'nt' ? '新約聖書' : '旧約聖書';
        document.getElementById('sb-l1-title').textContent = label;
        document.getElementById('sb-nt-row').classList.toggle('active', sbSection === 'nt');
        document.getElementById('sb-ot-row').classList.toggle('active', sbSection === 'ot');
        sbRenderBooks();
    }

    if (layer === 2) {
        document.getElementById('sb-l2-title').textContent = sbBookName;
        sbRenderChapters();
    }
}

function sbGoBack(layer) { sbGoTo(layer); }

function sbRenderBooks() {
    const list = document.getElementById('sb-book-list');
    list.innerHTML = '';
    SB_BOOKS[sbSection].forEach(b => {
        const div = document.createElement('div');
        div.className = 'sb-row' + (b.key === sbBookKey ? ' active' : '');
        const hasGreek = GREEK_BOOKS.has(b.key);
        div.innerHTML = `<span>${b.name}</span><span class="sb-row-arrow">›</span>`;
        if (!hasGreek) {
            div.title = '日本語訳のみ';
            div.querySelector('span').style.color = 'var(--text-sub)';
        }
        div.onclick = () => {
            sbBookKey  = b.key;
            sbBookName = b.name;
            sbMaxCh    = b.ch;
            sbGoTo(2);
        };
        list.appendChild(div);
    });
}

function sbRenderChapters() {
    const urlParams = new URLSearchParams(window.location.search);
    const currentCh = parseInt(urlParams.get('ch') || '1');
    const currentBook = urlParams.get('book') || 'ROM';

    const grid = document.getElementById('sb-ch-grid');
    grid.innerHTML = '';
    for (let i = 1; i <= sbMaxCh; i++) {
        const btn = document.createElement('div');
        btn.className = 'sb-ch-btn' + (sbBookKey === currentBook && i === currentCh ? ' active' : '');
        btn.textContent = i;
        btn.onclick = () => {
            window.location.href = `?book=${sbBookKey}&ch=${i}`;
        };
        grid.appendChild(btn);
    }
}

function sbInitState(bookKey, ch) {
    const inNt = SB_BOOKS.nt.some(b => b.key === bookKey);
    sbSection = inNt ? 'nt' : 'ot';
    const books = SB_BOOKS[sbSection];
    const found = books.find(b => b.key === bookKey);
    if (found) {
        sbBookKey  = found.key;
        sbBookName = found.name;
        sbMaxCh    = found.ch;
    }
    sbGoTo(1);
    if (found) sbGoTo(2);
}
