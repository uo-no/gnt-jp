<!DOCTYPE html>

<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05131000｜聖書をギリシャ語で読むアプリ｜コトバト</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="shared-insight.js"></script>
    <style>
    :root {
        --bg-paper: #ffffff;
        --bg-panel: #f5f5f7;
        --bg-sidebar: #fafafa;
        --bg-card: #f5f5f7;
        --text-main: #1d1d1f;
        --text-sub: #6e6e73;
        --accent-dark: #1d1d1f;
        --highlight: #5a6e82;
        --highlight-light: rgba(90,110,130,0.10);
        --border-soft: rgba(0,0,0,0.08);
    }

body { 
    font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    line-height: 2.0; 
    background: var(--bg-paper); 
    color: var(--text-main); 
    margin: 0; padding: 0;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
}

.main-layout { display: flex; height: 100vh; width: 100vw; }

/* --- 左サイドメニュー --- */
.nav-sidebar {
    width: 220px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border-soft);
    display: flex;
    flex-direction: column;
    transition: width 0.3s ease;
    overflow: hidden;
    flex-shrink: 0;
}
.nav-sidebar.collapsed { width: 56px; }
.sidebar-top { padding: 22px 16px 16px; display: flex; align-items: center; gap: 12px; }
.sidebar-toggle-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-sub); width: 28px; padding: 0; }
.sidebar-logo { font-weight: 700; font-size: 1rem; white-space: nowrap; letter-spacing: -0.01em; color: var(--text-main); }

.sidebar-menu { flex: 1; padding: 8px 10px; overflow-y: auto; }
.sidebar-section { margin-bottom: 20px; }
.section-label { font-size: 0.65rem; font-weight: 700; color: var(--text-sub); padding-left: 10px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.12em; }

.menu-item {
    padding: 7px 10px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
    font-size: 0.9rem;
}
.menu-item:hover { background: rgba(0,0,0,0.04); }
.menu-item.active { background: rgba(90,110,130,0.10); color: var(--highlight); font-weight: 700; }
.collapsed .menu-text, .collapsed .section-label { display: none; }

/* --- サイドバー ドリルダウン --- */
.sb-layer { display: none; }
.sb-layer.active { display: block; }
.sb-layer-header {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px 6px; cursor: pointer; border-radius: 6px; margin: 0 4px 2px;
    transition: background 0.12s;
}
.sb-layer-header:hover { background: rgba(0,0,0,0.04); }
.sb-back-arrow { font-size: 11px; color: var(--highlight); font-weight: 700; }
.sb-layer-title { font-size: 0.65rem; font-weight: 700; color: var(--highlight); letter-spacing: 0.1em; text-transform: uppercase; }
.sb-row {
    padding: 7px 12px; font-size: 0.88rem; color: var(--text-main);
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    border-radius: 8px; margin: 0 4px 1px; transition: background 0.12s;
}
.sb-row:hover { background: rgba(0,0,0,0.04); }
.sb-row.active { background: var(--highlight-light); color: var(--highlight); font-weight: 700; }
.sb-row-arrow { font-size: 10px; color: #ccc; }
.sb-row.active .sb-row-arrow { color: var(--highlight); }
.sb-ch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 6px 10px 10px; }
.sb-ch-btn {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 500; color: var(--text-sub);
    background: #fff; border: 1px solid var(--border-soft);
    border-radius: 7px; cursor: pointer; transition: all 0.12s;
}
.sb-ch-btn:hover { background: var(--highlight-light); border-color: var(--highlight); color: var(--highlight); }
.sb-ch-btn.active { background: var(--highlight); color: #fff; border-color: var(--highlight); font-weight: 700; }

/* --- 中央メインエリア --- */
.container { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--bg-paper); }
.app-header { padding: 18px 40px; border-bottom: 1px solid var(--border-soft); background: var(--bg-paper); }
.header-content { display: flex; align-items: center; justify-content: space-between; }
.breadcrumb { display: flex; align-items: center; gap: 8px; color: var(--text-sub); font-size: 0.85rem; }
.breadcrumb h1 { font-size: 1.05rem; margin: 0; color: var(--text-main); font-weight: 700; letter-spacing: -0.02em; }
.separator { color: var(--text-sub); opacity: 0.4; }

#app {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ══════════════════════════════════════════
   Reading / Study レイアウト
   Reading: side-panel 非表示 → 本文全幅
   Study:   side-panel 表示  → 本文縮小
   bottom-word-panel は廃止（Inspectに統合）
   ══════════════════════════════════════════ */
#main-reading-area {
    flex: 1;
    display: flex;
    min-height: 0;
}
/* 左：聖書本文 */
#bible-text-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px 20px 48px;
}
/* 右：並列訳（Reading時のみ表示） */
#parallel-text-area {
    width: 44%;
    border-left: 1px solid var(--border-soft);
    overflow-y: auto;
    padding: 28px 24px 20px 48px;
    background: #fafafa;
    font-size: 0.92rem;
    color: var(--text-sub);
    line-height: 2.0;
}

/* bottom-word-panel: 廃止。高さ0で残骸を隠す */
#bottom-word-panel {
    display: none;
}
#panel-content { display: none; }
#word-detail-view { display: none; }

/* --- フッター --- */
.app-footer {
    border-top: 1px solid var(--border-soft);
    padding: 12px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--bg-paper);
}
.footer-copy {
    font-size: 0.7rem;
    color: var(--text-sub);
    letter-spacing: 0.01em;
}
.footer-links {
    display: flex;
    gap: 18px;
}
.footer-links button {
    font-size: 0.7rem;
    color: var(--text-sub);
    background: none;
    border: none;
    border-bottom: 1px solid rgba(0,0,0,0.12);
    cursor: pointer;
    padding-bottom: 1px;
    font-family: inherit;
    transition: color 0.15s;
}
.footer-links button:hover { color: var(--text-main); }

/* --- 右サイドパネル（Study モード） --- */
#open-panel-btn {
    background: transparent; border: none; padding: 0 10px; cursor: pointer; color: var(--highlight); 
    font-size: 1.2rem; transition: transform 0.2s, opacity 0.2s; line-height: 1;
}
#open-panel-btn:hover { opacity: 0.7; transform: scale(1.1); }

#side-panel { 
    width: 42%;
    min-width: 280px;
    max-width: 80%;
    background: var(--bg-panel); 
    border-left: 1px solid var(--border-soft); 
    padding: 0;
    display: none;   /* ← Reading時は非表示。Studyへの昇格時のみ表示 */
    flex-direction: column; 
    flex-shrink: 0; 
    height: 100vh; 
    box-sizing: border-box;
    position: relative;
}

/* リサイズハンドル */
#panel-resize-handle {
    position: absolute;
    left: -4px;
    top: 0;
    width: 8px;
    height: 100%;
    cursor: col-resize;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
}
#panel-resize-handle::after {
    content: '';
    display: block;
    width: 3px;
    height: 40px;
    border-radius: 2px;
    background: var(--border-soft);
    transition: background 0.15s, height 0.15s;
}
#panel-resize-handle:hover::after,
#panel-resize-handle.dragging::after {
    background: var(--highlight);
    height: 60px;
}
.panel-header { 
    font-weight: 700; 
    font-size: 0.95rem;
    letter-spacing: -0.01em;
    padding: 18px 22px 0;
    display: flex; 
    justify-content: space-between;
    align-items: center;
    color: var(--accent-dark); 
    flex-shrink: 0;
}

/* --- 分析タブバー --- */
.analysis-tabs {
    display: none;
    align-items: flex-end;
    gap: 0;
    padding: 12px 22px 0;
    border-bottom: 1px solid var(--border-soft);
    flex-shrink: 0;
    background: var(--bg-panel);
}
.analysis-tabs.visible { display: flex; }
.atab {
    padding: 7px 16px 8px;
    font-size: 0.78rem;
    font-weight: 600;
    font-family: inherit;
    color: var(--text-sub);
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    letter-spacing: 0.01em;
    position: relative;
    bottom: -1px;
}
.atab:hover { color: var(--highlight); background: rgba(90,110,130,0.06); }
.atab.active {
    color: var(--highlight);
    background: var(--bg-paper);
    border-color: var(--border-soft);
    border-bottom-color: var(--bg-paper);
}
.atab .atab-dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--highlight);
    margin-right: 5px;
    vertical-align: middle;
    opacity: 0;
    transition: opacity 0.15s;
}
.atab.active .atab-dot { opacity: 1; }

/* --- 分析 iframe エリア --- */
#analysis-frame-wrap {
    display: none;
    flex: 1;
    min-height: 0;
    background: var(--bg-paper);
    flex-direction: column;
}
#analysis-frame-wrap.visible { display: flex; }
#analysis-iframe {
    width: 100%;
    flex: 1;
    border: none;
    display: block;
    background: var(--bg-paper);
}

/* --- 本文 --- */
.verse-block { border-bottom: 0px solid var(--border-soft); transition: background 0.15s; border-radius: 6px; margin-bottom: 2px; }
.jp-section { padding: 4px 8px; cursor: pointer; display: flex; align-items: baseline; border-radius: 6px; }
.jp-section:hover { background: rgba(0,0,0,0.03); }
.v-num { color: #c0c0c5; margin-right: 16px; font-size: 0.72rem; font-weight: 700; min-width: 20px; text-align: right; letter-spacing: 0.02em; }
.jp-text { font-size: 1.05rem; line-height: 2.0; color: var(--text-main); }

/* --- 語形カード（Study panel内の一覧用：既存互換のため残す） --- */
.word-card { 
    background: #ffffff;
    padding: 10px 14px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between; 
    align-items: baseline;
    margin-bottom: 8px;
    border: 1px solid var(--border-soft);
    cursor: pointer;
    transition: all 0.15s;
}
.word-card:hover { border-color: var(--highlight); background: var(--highlight-light); transform: translateY(-1px); }
.greek-word { font-family: 'Gentium Plus', serif; font-size: 1.45rem; line-height: 1.3; }

/* 文法装飾クラス */
.present-text { border-bottom: 2px solid var(--highlight); }
.aorist-text  { border-bottom: 2px dotted var(--highlight); }
.perfect-text { text-decoration: underline wavy var(--highlight); text-underline-offset: 4px; }
.future-text { border-bottom: 2px double var(--highlight); }
.indicative-text { background: rgba(90,110,130,0.10); border-radius: 3px; padding: 0 4px; }
.imperative-text { background: rgba(90,110,130,0.10); border-radius: 3px; padding: 0 4px; }

.grammar-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; font-size: 0.65rem; color: var(--text-sub); border-top: 1px solid var(--border-soft); padding-top: 6px; }
.tag-jp { color: var(--text-sub); font-size: 0.75rem; margin-left: 8px; }
.strong-num { font-size: 0.62rem; color: #c0c0c5; font-family: monospace; }

/* ══════════════════════════════════════════
   Inspect Popover
   語クリックで本文上に浮かぶ軽量カード。
   基本義・品詞タグ・「詳しく見る」だけ。
   ══════════════════════════════════════════ */
#inspect-popover {
    position: fixed;
    z-index: 200;
    width: 220px;
    background: #ffffff;
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
    padding: 0;
    display: none;
    flex-direction: column;
    overflow: hidden;
    animation: popoverIn 0.15s ease;
}
#inspect-popover.visible { display: flex; }
@keyframes popoverIn {
    from { opacity: 0; transform: translateY(4px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* popoverの上部：語形 + 基本義 */
.inspect-head {
    padding: 11px 14px 8px;
    border-bottom: 1px solid var(--border-soft);
}
.inspect-greek {
    font-family: 'Gentium Plus', serif;
    font-size: 1.35rem;
    line-height: 1.2;
    color: var(--text-main);
    margin-bottom: 2px;
}
.inspect-ja {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-main);
    line-height: 1.4;
    margin-bottom: 0;
}

/* popoverの中部：品詞タグ3つまで */
.inspect-tags {
    padding: 6px 14px 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    border-bottom: 1px solid var(--border-soft);
}
.inspect-tag {
    font-size: 0.65rem;
    padding: 2px 7px;
    border-radius: 20px;
    background: var(--bg-panel);
    color: var(--text-sub);
    border: 1px solid var(--border-soft);
    letter-spacing: 0.01em;
}
.inspect-tag.core {
    background: rgba(90,110,130,0.10);
    color: var(--highlight);
    border-color: rgba(90,110,130,0.2);
    font-weight: 600;
}

/* popoverのフッター：「詳しく見る」ボタン */
.inspect-footer {
    padding: 0;
}
.inspect-study-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 9px 14px;
    font-size: 0.75rem;
    font-family: inherit;
    font-weight: 600;
    color: var(--highlight);
    background: transparent;
    border: none;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.12s;
    text-align: left;
}
.inspect-study-btn:hover {
    background: var(--highlight-light);
}
.inspect-study-arrow {
    font-size: 0.85rem;
    opacity: 0.6;
}

/* ---- morph-search-btn（近くの語を見るなど、Study panel内で継続使用） ---- */
.morph-search-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 6px 16px;
    font-size: 0.75rem;
    font-family: inherit;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-sub);
    background: transparent;
    border: 1px solid rgba(0,0,0,0.13);
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    text-decoration: none;
    white-space: nowrap;
}
.morph-search-btn:hover {
    color: var(--highlight);
    border-color: var(--highlight);
    background: var(--highlight-light);
}
.morph-search-btn:active { opacity: 0.7; }
.morph-search-btn .btn-icon { display: none; }

/* 形態タグ一覧（Study panel内） */
.morph-tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin: 0px 0 4px;
}
.morph-tag-pill {
    font-size: 0.7rem;
    padding: 2px 9px;
    border-radius: 20px;
    background: var(--bg-panel);
    color: var(--text-sub);
    border: 1px solid var(--border-soft);
    letter-spacing: 0.01em;
}
.morph-tag-pill.core {
    background: rgba(90,110,130,0.10);
    color: var(--highlight);
    border-color: rgba(90,110,130,0.2);
    font-weight: 600;
}

/* reading-core-bar（side-panel ヘッダー固定） */
.rcb-container {
    display: none;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    padding: 6px 22px 8px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border-soft);
    font-size: 0.7rem;
    flex-shrink: 0;
}
.rcb-container.visible { display: flex; }
.rcb-chip-sm {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 20px;
    font-size: 0.66rem;
    background: var(--highlight-light);
    border: 1px solid rgba(90,110,130,0.2);
    color: var(--highlight); font-weight: 600;
}
.rcb-label-sm {
    font-size: 0.56rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-sub);
    flex-shrink: 0;
}
.rcb-sep-sm { color: var(--border-soft); font-size: 0.75rem; }

/* ギリシャ語なしバッジ */
.no-greek-badge {
    display: inline-block;
    font-size: 0.65rem;
    color: var(--text-sub);
    background: var(--bg-panel);
    border: 1px solid var(--border-soft);
    border-radius: 4px;
    padding: 1px 7px;
    margin-left: 8px;
    vertical-align: middle;
    letter-spacing: 0.04em;
}

@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>

</head>
<body>

<!-- ══════════════════════════════════════════
     Inspect Popover（本文上に浮かぶ軽量カード）
     DOM最上位に置くことでz-index競合を避ける
     ══════════════════════════════════════════ -->
<div id="inspect-popover" role="tooltip" aria-live="polite">
    <div class="inspect-head">
        <div class="inspect-greek" id="insp-greek">—</div>
        <div class="inspect-ja"    id="insp-ja">—</div>
    </div>
    <div class="inspect-tags" id="insp-tags"></div>
    <div class="inspect-footer">
        <button class="inspect-study-btn" id="insp-study-btn" onclick="escalateToStudy()">
            <span>詳しく見る</span>
            <span class="inspect-study-arrow">→</span>
        </button>
    </div>
</div>

<div class="main-layout">
    <nav id="nav-sidebar" class="nav-sidebar">
        <div class="sidebar-top">
            <button class="sidebar-toggle-btn" onclick="toggleSidebar()">☰</button>
            <span class="menu-text sidebar-logo">コトバト</span>
        </div>
        <div class="sidebar-menu">

        <!-- Layer 0: 旧約 / 新約 -->
        <div class="sb-layer active" id="sb-layer0">
            <div class="section-label" style="padding: 10px 12px 4px;">聖書</div>
            <div class="sb-row" id="sb-ot-row" onclick="sbGoTo(1,'ot')">
                <span class="menu-text">旧約聖書</span>
                <span class="sb-row-arrow menu-text">›</span>
            </div>
            <div class="sb-row active" id="sb-nt-row" onclick="sbGoTo(1,'nt')">
                <span class="menu-text">新約聖書</span>
                <span class="sb-row-arrow menu-text">›</span>
            </div>

            <div class="section-label menu-text" style="padding: 16px 12px 4px;">ツール</div>
            <div class="sb-row" id="nav-proximity" onclick="goProximityPage()">
                <span class="menu-text">近接検索（詳細）</span>
                <span class="sb-row-arrow menu-text">↗</span>
            </div>
        </div>

        <!-- Layer 1: 書物リスト -->
        <div class="sb-layer" id="sb-layer1">
            <div class="sb-layer-header menu-text" onclick="sbGoBack(0)">
                <span class="sb-back-arrow">‹</span>
                <span class="sb-layer-title" id="sb-l1-title">新約聖書</span>
            </div>
            <div id="sb-book-list"></div>
        </div>

        <!-- Layer 2: 章グリッド -->
        <div class="sb-layer" id="sb-layer2">
            <div class="sb-layer-header menu-text" onclick="sbGoBack(1)">
                <span class="sb-back-arrow">‹</span>
                <span class="sb-layer-title" id="sb-l2-title"></span>
            </div>
            <div class="section-label" style="padding: 8px 12px 4px;">章を選ぶ</div>
            <div class="sb-ch-grid menu-text" id="sb-ch-grid"></div>
        </div>

    </div>
</nav>

<div class="container">
    <header class="app-header">
        <div class="header-content">
            <div class="breadcrumb">
                <span class="root-name">新約聖書</span>
                <span class="separator">/</span>
                <h1 id="view-title">読み込み中...</h1>
            </div>
            <!-- open-panel-btn は Study閉じた後の再開ボタン。非表示スタート。 -->
            <button id="open-panel-btn" onclick="reopenStudyPanel()" style="display:none;" title="語形分解を表示">
                <i class="fa-solid fa-circle-info"></i>
            </button>
        </div>
    </header>
    <div id="app">
        <div id="main-reading-area">
            <div id="bible-text-area"></div>
            <div id="parallel-text-area"></div>
        </div>
        <!-- bottom-word-panel は廃止。DOMは残すが非表示 -->
        <div id="bottom-word-panel">
            <div id="panel-content"></div>
            <div id="word-detail-view"></div>
        </div>
    </div>
    <footer class="app-footer">
        <span class="footer-copy">© 2026 ウオノ All rights reserved.</span>

<script>
let abbottSmithDict = null;
let _proximityTokens = [];

// ギリシャ語データが存在する書物のキーセット
const GREEK_BOOKS = new Set([
    'ROM','1CO','2CO','GAL','EPH','PHP','COL',
    '1TH','2TH','1TI','2TI','TIT','PHM',
    'MAT','MRK','LUK','JHN','ACT',
    'HEB','JAS','1PE','2PE','1JN','2JN','3JN','JUD','REV'
]);

const JPN_MAP = {
    pos: { 'V': '動詞', 'N': '名詞', 'A': '形容詞', 'R': '関係代名詞', 'P': '人称代名詞', 'D': '指示代名詞', 'T': '冠詞', 'ADV': '副詞', 'PREP': '前置詞', 'CONJ': '接続詞', 'PRT': '添語' },
    tense: { 'P': '現在', 'I': '未完了', 'F': '未来', 'A': 'アオリスト', 'X': '完了' },
    voice: { 'A': '能動', 'M': '中動', 'P': '受動', 'D': '能動的受動' },
    mood: { 'I': '直説', 'S': '接続', 'O': '希求', 'M': '命令', 'N': '不定', 'P': '分詞' },
    case: { 'N': '主格', 'G': '属格', 'D': '与格', 'A': '対格', 'V': '呼格' },
    gender: { 'M': '男性', 'F': '女性', 'N': '中性' },
    number: { 'S': '単数', 'P': '複数' },
    person: { '1': '1人称', '2': '2人称', '3': '3人称' }
};

async function loadDict() {
    try {
        abbottSmithDict = {};
        const resAbbott = await fetch('./abbott-smith.tsv');
        if (!resAbbott.ok) return;
        const textAbbott = await resAbbott.text();
        textAbbott.split(/\r?\n/).forEach(row => {
            const cols = row.split('\t');
            const strong = String(cols[0]).trim();
            if (strong) {
                abbottSmithDict[strong] = { description: cols[2]?.trim() || "" };
            }
        });
    } catch (e) { console.error("Dict Error:", e); }
}

function decorate(wordText, wordData) {
    const m = wordData;
    const morph = m.morph || "";
    const parts = morph.split('-');
    const pos = parts[0]; 
    let jpMorph = "";
    let styleClass = "";
    let middleStar = "";

    if (pos === 'V' && parts[1]) {
        const off = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off + 0];
        const voiceCode = parts[1][off + 1];
        const moodCode  = parts[1][off + 2];

        if (['M', 'P', 'D'].includes(voiceCode)) {
            middleStar = '<span style="color:var(--highlight); margin-left:2px;">*</span>';
        }

        const t  = JPN_MAP.tense[tenseCode] || "";
        const v  = JPN_MAP.voice[voiceCode]  || "";
        const md = JPN_MAP.mood[moodCode]    || "";

        if (moodCode === 'P') {
            const cng = parts[2]
                ? (JPN_MAP.case[parts[2][0]]   || "") +
                  (JPN_MAP.number[parts[2][1]] || "") +
                  (JPN_MAP.gender[parts[2][2]] || "")
                : "";
            jpMorph = `動詞:分詞${t}${v}${cng ? "(" + cng + ")" : ""}`;
        } else if (moodCode === 'I' || moodCode === 'M') {
            if (tenseCode === 'P') styleClass = "present-text";
            else if (tenseCode === 'A') styleClass = "aorist-text";
            else if (tenseCode === 'X') styleClass = "perfect-text";
            else if (tenseCode === 'F') styleClass = "future-text";
            if (moodCode === 'I') styleClass += " indicative-text";
            else if (moodCode === 'M') styleClass += " imperative-text";
            const person = parts[1].length >= (off + 4) ? (JPN_MAP.person[parts[1][off + 3]] || "") : "";
            const number = parts[1].length >= (off + 5) ? (JPN_MAP.number[parts[1][off + 4]] || "") : "";
            jpMorph = `動詞:${md}${t}${v}${person}${number}`;
        } else {
            const person = parts[1].length >= (off + 4) ? (JPN_MAP.person[parts[1][off + 3]] || "") : "";
            const number = parts[1].length >= (off + 5) ? (JPN_MAP.number[parts[1][off + 4]] || "") : "";
            jpMorph = `動詞:${md}${t}${v}${person}${number}`;
        }
    } else if (['N', 'A', 'R', 'P', 'T', 'D'].includes(pos) && parts[1]) {
        const label = JPN_MAP.pos[pos] || pos;
        let p = "", c = "", n = "", g = "";
        if (['1', '2', '3'].includes(parts[1][0])) {
            p = parts[1][0] + "人称";
            c = JPN_MAP.case[parts[1][1]]   || "";
            n = JPN_MAP.number[parts[1][2]] || "";
        } else {
            c = JPN_MAP.case[parts[1][0]]   || "";
            n = JPN_MAP.number[parts[1][1]] || "";
            g = JPN_MAP.gender[parts[1][2]] || "";
        }
        jpMorph = `${label}:${p}${c}${n}${g}`;
    } else {
        jpMorph = JPN_MAP.pos[pos] || morph;
    }

    const strong = String(m.strong || "").replace(/[^0-9]/g, ""); 
    const jaWord  = m.japanese || m.gloss || (abbottSmithDict && abbottSmithDict[strong]?.japanese) || "？";
    const desc    = m.description || (abbottSmithDict && abbottSmithDict[strong]?.description) || "解説なし";
    const lemma   = String(m.lemma || "").replace(/'/g, "\\'");
    const jaWordE = jaWord.replace(/'/g, "\\'");
    const descE   = desc.replace(/'/g, "\\'").replace(/\n/g, '\\n');
    const ref = m.ref || '';

    // ── Inspect用データをdata属性に持たせる。onclick は showInspect へ ──
    return `<div class="word-card"
                data-greek="${wordText.replace(/"/g,'&quot;')}"
                data-strong="${strong}"
                data-jpmorph="${jpMorph.replace(/"/g,'&quot;')}"
                data-morph="${(m.morph||'').replace(/"/g,'&quot;')}"
                data-lemma="${lemma.replace(/"/g,'&quot;')}"
                data-ja="${jaWordE.replace(/"/g,'&quot;')}"
                data-desc="${descE.replace(/"/g,'&quot;')}"
                data-ref="${ref}"
                onclick="onWordCardClick(this, event)">
                <div>
                    <span class="greek-word ${styleClass}">${wordText}</span>${middleStar}
                    <span style="font-weight:bold; margin-left:5px; font-size:0.9rem;">［${jaWord}］</span>
                    <span class="tag-jp">${jpMorph}</span>
                </div>
                <span class="strong-num">G${strong}</span>
            </div>`;
}

/* ══════════════════════════════════════════
   Inspect Popover 制御
   ══════════════════════════════════════════ */

// 現在Inspectで表示中の語データをキャッシュ
let _inspectData = null;

/**
 * word-card クリック時のエントリポイント。
 * Inspect popover を表示する。Study panelは開かない。
 */
function onWordCardClick(cardEl, event) {
    event.stopPropagation();

    const greek   = cardEl.dataset.greek   || '';
    const strong  = cardEl.dataset.strong  || '';
    const jpMorph = cardEl.dataset.jpmorph || '';
    const rawMorph= cardEl.dataset.morph   || '';
    const lemma   = cardEl.dataset.lemma   || '';
    const jaWord  = cardEl.dataset.ja      || '';
    const desc    = cardEl.dataset.desc    || '';
    const ref     = cardEl.dataset.ref     || '';

    _inspectData = { greek, strong, jpMorph, rawMorph, lemma, jaWord, desc, ref };

    showInspectPopover(cardEl, greek, strong, jpMorph, rawMorph, jaWord);
}

function showInspectPopover(anchorEl, greek, strong, jpMorph, rawMorph, jaWord) {
    const popover = document.getElementById('inspect-popover');

    // --- 内容を更新 ---
    document.getElementById('insp-greek').textContent = greek;
    document.getElementById('insp-ja').textContent    = jaWord || '—';

    // 品詞タグ（最大3つ）
    const tagsEl = document.getElementById('insp-tags');
    tagsEl.innerHTML = buildInspectTagsHTML(rawMorph);

    // --- 位置決め ---
    // anchorElのbounding rectから popover を配置する
    const rect = anchorEl.getBoundingClientRect();
    const popW = 220;
    const popH = 130; // 概算

    // デフォルトは anchorEl の右下
    let left = rect.right + 8;
    let top  = rect.top;

    // 右端オーバー対策
    if (left + popW > window.innerWidth - 8) {
        left = rect.left - popW - 8;
    }
    // 下端オーバー対策
    if (top + popH > window.innerHeight - 8) {
        top = window.innerHeight - popH - 8;
    }
    // 上端オーバー対策
    if (top < 8) { top = 8; }

    popover.style.left = left + 'px';
    popover.style.top  = top  + 'px';

    popover.classList.add('visible');
}

function hideInspectPopover() {
    const popover = document.getElementById('inspect-popover');
    popover.classList.remove('visible');
}

/**
 * Inspect → Study へ昇格。
 * popoverの「詳しく見る」ボタンから呼ばれる。
 */
function escalateToStudy() {
    if (!_inspectData) return;
    hideInspectPopover();
    const { greek, strong, jpMorph, rawMorph, lemma, jaWord, desc, ref } = _inspectData;
    openStudyPanel(greek, rawMorph, ref, lemma);
}

/**
 * Inspect用の品詞タグHTMLを生成（最大3つ）。
 * morph-tag-pill と同じ情報だが、inspect-tag クラスを使う。
 */
function buildInspectTagsHTML(rawMorph) {
    const m = parseMorphForSearch(rawMorph);
    const JPN = {
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞' },
        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法',
                  imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },
    };

    // 優先度順に最大3つ選ぶ：品詞 > 時制/法 > 格/数
    const picks = [];
    if (m.pos)   picks.push({ label: JPN.pos[m.pos]     || m.pos,    core: true });
    if (m.tense && picks.length < 3) picks.push({ label: JPN.tense[m.tense] || m.tense, core: true });
    if (m.mood  && picks.length < 3) picks.push({ label: JPN.mood[m.mood]   || m.mood,  core: true });
    if (m.case  && picks.length < 3) picks.push({ label: JPN.case[m.case]   || m.case,  core: false });
    if (m.voice && picks.length < 3) picks.push({ label: JPN.voice[m.voice] || m.voice, core: false });

    return picks.slice(0, 3).map(t =>
        `<span class="inspect-tag${t.core ? ' core' : ''}">${t.label}</span>`
    ).join('');
}

/* ══════════════════════════════════════════
   Study Panel 制御
   ══════════════════════════════════════════ */

let _currentAnalysisParams = null;

/**
 * Study panel を開く。
 * parallel-text-area を非表示にし、side-panel を表示する。
 */
function openStudyPanel(greek, rawMorph, ref, lemma) {
    const m = parseMorphForSearch(rawMorph);
    _currentAnalysisParams = {
        ref,
        word:      greek,
        lemma:     lemma || '',
        pos:       m.pos    || '',
        _rawMorph: rawMorph,
        tense:     m.tense  || '',
        mood:      m.mood   || '',
        voice:     m.voice  || '',
        gender:    m.gender || '',
        number:    m.number || '',
        case:      m.case   || '',
    };

    updateReadingCoreBar(_currentAnalysisParams);

    // side-panel を表示、並列訳を非表示
    const sidePanel   = document.getElementById('side-panel');
    const parallelArea = document.getElementById('parallel-text-area');
    sidePanel.style.display   = 'flex';
    parallelArea.style.display = 'none';

    document.getElementById('open-panel-btn').style.display = 'none';
    document.getElementById('analysis-tabs').classList.add('visible');
    document.getElementById('analysis-frame-wrap').classList.add('visible');

    switchAnalysisTab('morph');
}

/**
 * Study panel を閉じる（Reading に戻る）。
 * 並列訳を復帰させる。
 */
function closeStudyPanel() {
    const sidePanel   = document.getElementById('side-panel');
    const parallelArea = document.getElementById('parallel-text-area');
    sidePanel.style.display   = 'none';
    parallelArea.style.display = '';

    document.getElementById('analysis-frame-wrap').classList.remove('visible');
    document.getElementById('analysis-iframe').src = '';
    document.getElementById('open-panel-btn').style.display = 'block';

    const rcb = document.getElementById('rcb-container');
    if (rcb) rcb.classList.remove('visible');

    _currentAnalysisParams = null;
}

/**
 * ヘッダーの「i」ボタンから Study panel を再開。
 * 最後に分析していた語をそのまま復元する。
 */
function reopenStudyPanel() {
    if (!_currentAnalysisParams) return;
    const p = _currentAnalysisParams;
    openStudyPanel(p.word, p._rawMorph, p.ref, p.lemma);
}

/**
 * 従来の toggleSidePanel を置き換え。
 * 外部から呼ばれる可能性があるため互換として残す。
 */
function toggleSidePanel() {
    const sidePanel = document.getElementById('side-panel');
    const isHidden  = window.getComputedStyle(sidePanel).display === 'none';
    if (isHidden) {
        if (_currentAnalysisParams) reopenStudyPanel();
    } else {
        closeStudyPanel();
    }
}

/**
 * 従来の closeAnalysis 互換（message handler等から呼ばれる）。
 */
function closeAnalysis() {
    closeStudyPanel();
}

function switchAnalysisTab(tab) {
    if (!_currentAnalysisParams) return;
    const p = _currentAnalysisParams;

    ['morph','syntax','semantics'].forEach(t => {
        document.getElementById(`atab-${t}`).classList.toggle('active', t === tab);
    });

    const qs = new URLSearchParams();
    qs.set('ref',   p.ref);
    qs.set('word',  p.word);
    if (p.lemma) qs.set('lemma', p.lemma);
    if (p.pos)   qs.set('pos',   p.pos);
    if (p.tense)  qs.set('tense',  p.tense);
    if (p.mood)   qs.set('mood',   p.mood);
    if (p.voice)  qs.set('voice',  p.voice);
    if (p.gender) qs.set('gender', p.gender);
    if (p.number) qs.set('number', p.number);
    if (p.case)   qs.set('case',   p.case);

    const fileMap = {
        morph:     'morph-search.html',
        syntax:    'syntax-search.html',
        semantics: 'semantic-search.html',
    };
    const iframe = document.getElementById('analysis-iframe');
    const dir    = location.pathname.replace(/\/[^\/]*$/, '/');
    iframe.src   = `${location.origin}${dir}${fileMap[tab]}?${qs.toString()}`;
}

function updateReadingCoreBar(p) {
    const rcb = document.getElementById('rcb-container');
    if (!rcb) return;

    const TENSE_SH = { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオ', perfect:'完了', pluperfect:'大完了' };
    const MOOD_SH  = { indicative:'直説', subjunctive:'接続', optative:'希求', imperative:'命令', infinitive:'不定詞', participle:'分詞' };
    const VOICE_SH = { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動', 'middle or passive':'中/受' };

    const setChip = (id, val) => {
        const el = document.getElementById(id);
        if (!el) return;
        if (val) { el.textContent = val; el.style.display = ''; }
        else { el.style.display = 'none'; }
    };
    setChip('rcb-main-word',  p.word  || null);
    setChip('rcb-main-tense', TENSE_SH[p.tense] || p.tense || null);
    setChip('rcb-main-mood',  MOOD_SH[p.mood]   || p.mood  || null);
    setChip('rcb-main-voice', VOICE_SH[p.voice] || p.voice || null);

    rcb.classList.add('visible');
}

/* ══════════════════════════════════════════
   Inspect popover を本文クリックで閉じる
   ══════════════════════════════════════════ */
document.addEventListener('click', function(e) {
    const popover = document.getElementById('inspect-popover');
    if (!popover.classList.contains('visible')) return;
    // popover自体のクリックは閉じない
    if (popover.contains(e.target)) return;
    // word-cardのクリックは onWordCardClick が処理するため、ここでは閉じるだけ
    hideInspectPopover();
}, true);

/* ══════════════════════════════════════════
   以下は従来コードをそのまま保持
   ══════════════════════════════════════════ */

function parseMorphForSearch(rawMorph) {
    const parts = rawMorph.split('-');
    const pos = parts[0];
    const result = { pos };

    if (pos === 'V' && parts[1]) {
        const off = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off + 0];
        const voiceCode = parts[1][off + 1];
        const moodCode  = parts[1][off + 2];

        const TENSE_MAP = { P:'present', I:'imperfect', F:'future', A:'aorist', X:'perfect' };
        const VOICE_MAP = { A:'active', M:'middle', P:'passive', D:'middle deponent' };
        const MOOD_MAP  = { I:'indicative', S:'subjunctive', O:'optative',
                            M:'imperative', N:'infinitive', P:'participle' };

        if (tenseCode) result.tense = TENSE_MAP[tenseCode] || '';
        if (voiceCode) result.voice = VOICE_MAP[voiceCode] || '';
        if (moodCode)  result.mood  = MOOD_MAP[moodCode]   || '';

        if (moodCode === 'P' && parts[2]) {
            const CASE_MAP   = { N:'nominative', G:'genitive', D:'dative', A:'accusative', V:'vocative' };
            const NUMBER_MAP = { S:'singular', P:'plural' };
            const GENDER_MAP = { M:'masculine', F:'feminine', N:'neuter' };
            result.case   = CASE_MAP[parts[2][0]]   || '';
            result.number = NUMBER_MAP[parts[2][1]] || '';
            result.gender = GENDER_MAP[parts[2][2]] || '';
        }
    } else if (['N','A','R','P','T','D'].includes(pos) && parts[1]) {
        const CASE_MAP   = { N:'nominative', G:'genitive', D:'dative', A:'accusative', V:'vocative' };
        const NUMBER_MAP = { S:'singular', P:'plural' };
        const GENDER_MAP = { M:'masculine', F:'feminine', N:'neuter' };
        const base = ['1','2','3'].includes(parts[1][0]) ? parts[1].slice(1) : parts[1];
        result.case   = CASE_MAP[base[0]]   || '';
        result.number = NUMBER_MAP[base[1]] || '';
        result.gender = GENDER_MAP[base[2]] || '';
    }
    return result;
}

function buildMorphTagsHTML(rawMorph) {
    const m = parseMorphForSearch(rawMorph);
    const JPN = {
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞' },
        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法',
                  imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },
    };

    const tags = [];
    if (m.pos)    tags.push({ label: JPN.pos[m.pos]    || m.pos,    core: true });
    if (m.tense)  tags.push({ label: JPN.tense[m.tense]|| m.tense,  core: true });
    if (m.voice)  tags.push({ label: JPN.voice[m.voice]|| m.voice,  core: false });
    if (m.mood)   tags.push({ label: JPN.mood[m.mood]  || m.mood,   core: true });
    if (m.gender) tags.push({ label: JPN.gender[m.gender]|| m.gender, core: false });
    if (m.number) tags.push({ label: JPN.number[m.number]|| m.number, core: false });
    if (m.case)   tags.push({ label: JPN.case[m.case]  || m.case,   core: false });

    if (tags.length === 0) return '';
    return `<div class="morph-tag-row">
        ${tags.map(t => `<span class="morph-tag-pill${t.core ? ' core' : ''}">${t.label}</span>`).join('')}
    </div>`;
}

/**

window.addEventListener('message', (e) => {
    const d = e.data;
    if (!d || !d.type) return;

    if (d.ref)  _currentAnalysisParams = { ...(_currentAnalysisParams || {}), ref: d.ref, word: d.word, lemma: d.lemma || '' };

    if (d.type === 'NAV_TO_MORPH')      switchAnalysisTab('morph');
    if (d.type === 'NAV_TO_SYNTAX')     switchAnalysisTab('syntax');
    if (d.type === 'NAV_TO_SEMANTICS')  switchAnalysisTab('semantics');

    if (d.type === 'GO_TO_REF' && d.ref) {
        const m = d.ref.match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
        if (m) window.location.href = `?book=${m[1]}&ch=${m[2]}`;
    }
});

let sbSection  = 'nt';
let sbBookKey  = null;
let sbBookName = '';
let sbMaxCh    = 1;

function sbGoTo(layer, section) {
    document.querySelectorAll('.sb-layer').forEach(l => l.classList.remove('active'));
    document.getElementById('sb-layer' + layer).classList.add('active');

    if (layer === 0) {
        document.getElementById('sb-nt-row').classList.toggle('active', sbSection === 'nt');
        document.getElementById('sb-ot-row').classList.toggle('active', sbSection === 'ot');
    }

    if (layer === 1) {
        if (section) sbSection = section;
        const label = sbSection === 'nt' ? '新約聖書' : '旧約聖書';
        document.getElementById('sb-l1-title').textContent = label;
        document.getElementById('sb-nt-row').classList.toggle('active', sbSection === 'nt');
        document.getElementById('sb-ot-row').classList.toggle('active', sbSection === 'ot');
        sbRenderBooks();
    }

    if (layer === 2) {
        document.getElementById('sb-l2-title').textContent = sbBookName;
        sbRenderChapters();
    }
}

function sbGoBack(layer) { sbGoTo(layer); }

function sbRenderBooks() {
    const list = document.getElementById('sb-book-list');
    list.innerHTML = '';
    SB_BOOKS[sbSection].forEach(b => {
        const div = document.createElement('div');
        div.className = 'sb-row' + (b.key === sbBookKey ? ' active' : '');
        const hasGreek = GREEK_BOOKS.has(b.key);
        div.innerHTML = `<span>${b.name}</span><span class="sb-row-arrow">›</span>`;
        if (!hasGreek) {
            div.title = '日本語訳のみ';
            div.querySelector('span').style.color = 'var(--text-sub)';
        }
        div.onclick = () => {
            sbBookKey  = b.key;
            sbBookName = b.name;
            sbMaxCh    = b.ch;
            sbGoTo(2);
        };
        list.appendChild(div);
    });
}

function sbRenderChapters() {
    const urlParams = new URLSearchParams(window.location.search);
    const currentCh = parseInt(urlParams.get('ch') || '1');
    const currentBook = urlParams.get('book') || 'ROM';

    const grid = document.getElementById('sb-ch-grid');
    grid.innerHTML = '';
    for (let i = 1; i <= sbMaxCh; i++) {
        const btn = document.createElement('div');
        btn.className = 'sb-ch-btn' + (sbBookKey === currentBook && i === currentCh ? ' active' : '');
        btn.textContent = i;
        btn.onclick = () => {
            window.location.href = `?book=${sbBookKey}&ch=${i}`;
        };
        grid.appendChild(btn);
    }
}

function sbInitState(bookKey, ch) {
    const inNt = SB_BOOKS.nt.some(b => b.key === bookKey);
    sbSection = inNt ? 'nt' : 'ot';
    const books = SB_BOOKS[sbSection];
    const found = books.find(b => b.key === bookKey);
    if (found) {
        sbBookKey  = found.key;
        sbBookName = found.name;
        sbMaxCh    = found.ch;
    }
    sbGoTo(1);
    if (found) sbGoTo(2);
}

async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || 'ROM';
    const ch   = urlParams.get('ch')   || '1';

    const isNt = SB_BOOKS.nt.some(b => b.key === book);
    document.querySelector('.root-name').innerText = isNt ? '新約聖書' : '旧約聖書';

    const allBooks = [...SB_BOOKS.nt, ...SB_BOOKS.ot];
    const found = allBooks.find(b => b.key === book);
    document.getElementById('view-title').innerText = found
        ? `${found.name} ${ch}章`
        : `${book} ${ch}章`;

    sbInitState(book, parseInt(ch));

    await loadDict();

    const hasGreek = GREEK_BOOKS.has(book);

    try {
        const jpRes = await fetch(`./bible_jp/${book}/${ch}.json`);
        if (!jpRes.ok) throw new Error(`bible_jp not found: ${book}/${ch}`);
        const jpData = await jpRes.json();

        let elData = [];
        if (hasGreek) {
            try {
                const elRes = await fetch(`./bible_data/${book}/${ch}.json`);
                if (elRes.ok) {
                    elData = await elRes.json();
                } else {
                    console.warn(`bible_data not found for ${book}/${ch} — Greek panel disabled`);
                }
            } catch (e) {
                console.warn(`bible_data fetch error for ${book}/${ch}:`, e);
            }
        }

        render(jpData, elData, hasGreek && elData.length > 0);

    } catch (err) {
        console.error(err);
        document.getElementById('bible-text-area').innerHTML = `<p style="color:red">データが見つかりません（${book} ${ch}章）</p>`;
    }
}

function render(jpData, elData, hasGreek) {
    const app          = document.getElementById('bible-text-area');
    const parallel     = document.getElementById('parallel-text-area');
    // ── Study panel を閉じて Reading 状態に戻す ──
    closeStudyPanel();
    app.innerHTML = '';
    parallel.innerHTML = '';

    // Study panel 内の語形一覧はなくなったため、elByVerseは
    // word-cardのHTMLをverse-blockにインライン埋め込むのではなく、
    // 節クリックで bottom のhidden panelに格納して onWordCardClick から読む方式を維持。
    // ただし bottom-word-panel は display:none なので、代わりに
    // 節クリックで「語形ポップアップリスト」を side-panel 上部に表示する。
    // 今回の最小差分では: 節クリック → side-panel の panelContent に語形カードを描画し Study へ
    // という旧来の挙動を維持しつつ、
    // 語形カードクリック → Inspect popover（新規）の流れにする。

    const elByVerse = {};
    if (elData && elData.length > 0) {
        elData.forEach(w => {
            const v = w.ref.split(':')[1]?.split('!')[0];
            if (v) { if (!elByVerse[v]) elByVerse[v] = []; elByVerse[v].push(w); }
        });
    }

    const openBtn = document.getElementById('open-panel-btn');
    if (!hasGreek) {
        document.getElementById('side-panel').style.display = 'none';
        openBtn.style.display = 'none';
    }

    Object.entries(jpData.verses).forEach(([vNum, text]) => {
        // 左：聖書本文
        const block = document.createElement('div');
        block.className = 'verse-block';
        block.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text">${text}</div></div>`;

        if (hasGreek) {
            block.onclick = () => {
                // 節クリック：Study panel を開き、語形カードリストを表示する
                // （従来の bottom-word-panel → panel-content の役割を side-panel 内に移動）
                app.querySelectorAll('.verse-block').forEach(b => b.style.background = 'transparent');
                block.style.background = 'rgba(0,0,0,0.03)';

                // side-panel の active-v ラベルを更新
                document.getElementById('active-v').innerText = `${vNum} 節`;

                // Study panel を開き、語形一覧を iframe の代わりに表示
                // Inspect flowの前段として、まず side-panel に語形カードリストを表示する。
                // 語形カードを選んだら Inspect popover → 詳しく見る → iframe 表示。
                openWordListInStudyPanel(vNum, elByVerse[vNum] || []);

                hideInspectPopover();
            };
        }

        app.appendChild(block);

        // 右：並列訳
        const pBlock = document.createElement('div');
        pBlock.className = 'verse-block';
        pBlock.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text">${text}</div></div>`;
        parallel.appendChild(pBlock);
    });

    _proximityTokens = (elData || []).map(w => ({ text: w.text || '', lemma: w.lemma || w.text || '' }));
}

/**
 * 節クリック時に side-panel の iframe エリアを語形カードリストで置き換える。
 * これが Inspect の起点となる。
 * 語形カードをクリックすると showInspectPopover が呼ばれる。

function openWordListInStudyPanel(vNum, words) {
    const sidePanel    = document.getElementById('side-panel');
    const parallelArea = document.getElementById('parallel-text-area');
    const frameWrap    = document.getElementById('analysis-frame-wrap');
    const iframe       = document.getElementById('analysis-iframe');
    const analysisTabs = document.getElementById('analysis-tabs');

    // side-panel を表示
    sidePanel.style.display   = 'flex';
    parallelArea.style.display = 'none';
    document.getElementById('open-panel-btn').style.display = 'none';

    // iframe は一旦非表示にして、語形リストに置き換える
    frameWrap.classList.remove('visible');
    iframe.src = '';

    // 分析タブは非表示（語形選択前なので）
    analysisTabs.classList.remove('visible');

    // rcb-container も隠す（語選択前）
    const rcb = document.getElementById('rcb-container');
    if (rcb) rcb.classList.remove('visible');
    _currentAnalysisParams = null;

    // 既存の word-list-view があれば削除
    const existing = document.getElementById('word-list-view');
    if (existing) existing.remove();

    // 語形カードリストを動的に生成して side-panel に追加
    const listEl = document.createElement('div');
    listEl.id = 'word-list-view';
    listEl.style.cssText = 'flex:1;overflow-y:auto;padding:14px 18px;';

    if (!words.length) {
        listEl.innerHTML = `<p style="color:var(--text-sub);font-size:0.82rem;text-align:center;padding:32px 0;">この節の語形データがありません</p>`;
    } else {
        listEl.innerHTML = `
            <div style="font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-hint,#aaa);margin-bottom:12px;">
                語形一覧 — タップして確認
            </div>
            ${words.map(w => decorate(w.text, w)).join('')}
            <p style="font-size:0.7rem;color:var(--text-sub);text-align:center;margin-top:16px;padding-top:12px;border-top:1px solid var(--border-soft);">
                語をタップして基本義を確認 →「詳しく見る」で分析へ
            </p>`;
    }

    sidePanel.appendChild(listEl);
}

/* ══════════════════════════════════════════

(function() {
    const handle = document.getElementById('panel-resize-handle');
    const panel  = document.getElementById('side-panel');
    const layout = document.querySelector('.main-layout');
    let dragging = false;
    let startX = 0;
    let startW = 0;

    handle.addEventListener('mousedown', (e) => {
        dragging = true;
        startX = e.clientX;
        startW = panel.offsetWidth;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const delta = startX - e.clientX;
        const layoutW = layout.offsetWidth;
        const minPx = 280;
        const maxPx = layoutW * 0.80;
        const newW = Math.min(maxPx, Math.max(minPx, startW + delta));
        panel.style.width = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });

    handle.addEventListener('touchstart', (e) => {
        dragging = true;
        startX = e.touches[0].clientX;
        startW = panel.offsetWidth;
        handle.classList.add('dragging');
        e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
        if (!dragging) return;
        const delta = startX - e.touches[0].clientX;
        const layoutW = layout.offsetWidth;
        const minPx = 280;
        const maxPx = layoutW * 0.80;
        const newW = Math.min(maxPx, Math.max(minPx, startW + delta));
        panel.style.width = newW + 'px';
    }, { passive: false });

    document.addEventListener('touchend', () => {
        dragging = false;
        handle.classList.remove('dragging');
    });
})();

/* ══════════════════════════════════════════
   近接検索ページへの文脈付き遷移
   ══════════════════════════════════════════ */
function goProximityPage() {
    const p = new URLSearchParams();

    const activeVEl   = document.getElementById('active-v');
    const activeVText = activeVEl ? activeVEl.innerText.replace(/\s*節\s*$/, '').trim() : '';

    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || '';
    const ch   = urlParams.get('ch')   || '';

    if (_inspectData && _inspectData.greek) {
        p.set('word1', _inspectData.greek);
    }

    if (book && ch) {
        const ref = activeVText ? `${book}${ch}:${activeVText}` : `${book}${ch}`;
        p.set('ref', ref);
        if (activeVText) p.set('scope', 'verse');
    }

    const qs = p.toString();
    window.location.href = qs ? `proximity.html?${qs}` : 'proximity.html';
}

function switchTab(evt, tabName) {
    const tabContents = document.getElementsByClassName("tab-content");
    for (let i = 0; i < tabContents.length; i++) tabContents[i].classList.remove("active");
    const tabBtns = document.getElementsByClassName("tab-btn");
    for (let i = 0; i < tabBtns.length; i++) tabBtns[i].classList.remove("active");
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
    document.getElementById('bible-text-area').scrollTop = 0;
}

async function renderCurrentPage() {
    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || 'ROM';
    const ch   = urlParams.get('ch')   || '1';

    const isNt = SB_BOOKS.nt.some(b => b.key === book);
    document.querySelector('.root-name').innerText = isNt ? '新約聖書' : '旧約聖書';

    const allBooks = [...SB_BOOKS.nt, ...SB_BOOKS.ot];
    const found = allBooks.find(b => b.key === book);
    document.getElementById('view-title').innerText = found ? `${found.name} ${ch}章` : `${book} ${ch}章`;

    const hasGreek = GREEK_BOOKS.has(book);

    try {
        const jpRes = await fetch(`./bible_jp/${book}/${ch}.json`);
        if (!jpRes.ok) throw new Error('Not found');
        const jpData = await jpRes.json();

        let elData = [];
        if (hasGreek) {
            try {
                const elRes = await fetch(`./bible_data/${book}/${ch}.json`);
                if (elRes.ok) elData = await elRes.json();
            } catch(e) {}
        }

        render(jpData, elData, hasGreek && elData.length > 0);
        const parallel = document.getElementById('parallel-text-area');
        if (parallel) parallel.style.display = '';
        document.getElementById('active-v').innerText = "";
    } catch (err) {
        document.getElementById('bible-text-area').innerHTML = `<p style="color:red">データが見つかりません。</p>`;
    }
}
