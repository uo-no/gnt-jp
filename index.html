<!DOCTYPE html>

<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05162100｜聖書をギリシャ語で読むアプリ｜コトバト</title>
    <link rel="icon" href="data:,">
    <link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="shared-insight.js"></script>
    <style>
    :root {
        --bg-paper: #ffffff;
        --bg-panel: #f5f5f7;
        --bg-sidebar: #fafafa;
        --bg-card: #f5f5f7;
        --text-main: #1d1d1f;
        --text-sub: #6e6e73;
        --accent-dark: #1d1d1f;
        --highlight: #5a6e82;
        --highlight-light: rgba(90,110,130,0.10);
        --border-soft: rgba(0,0,0,0.08);
    }

body {
font-family: ‘Noto Sans JP’, -apple-system, BlinkMacSystemFont, ‘Helvetica Neue’, sans-serif;
line-height: 2.0;
background: var(--bg-paper);
color: var(--text-main);
margin: 0; padding: 0;
overflow: hidden;
-webkit-font-smoothing: antialiased;
}

.main-layout { display: flex; height: 100vh; width: 100vw; }

/* - 左サイドメニュー - */
.nav-sidebar {
width: 220px;
background: var(--bg-sidebar);
border-right: 1px solid var(--border-soft);
display: flex;
flex-direction: column;
transition: width 0.25s ease, transform 0.25s ease;
overflow: hidden;
flex-shrink: 0;
}
.nav-sidebar.collapsed { width: 56px; }
.sidebar-top { padding: 22px 16px 16px; display: flex; align-items: center; gap: 12px; }
.sidebar-toggle-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-sub); width: 28px; padding: 0; flex-shrink: 0; }
.sidebar-logo { font-weight: 700; font-size: 1rem; white-space: nowrap; letter-spacing: -0.01em; color: var(--text-main); }

/* ── overlay モード（幅狭時） ── */
#sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.25);
    z-index: 200;
}
#sidebar-overlay.visible { display: block; }

@media (max-width: 900px) {
    .nav-sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        z-index: 201;
        transform: translateX(-100%);
        width: 240px !important;
        box-shadow: 2px 0 16px rgba(0,0,0,0.12);
    }
    .nav-sidebar.mobile-open {
        transform: translateX(0);
    }
    /* collapsed クラスは narrow では無効 */
    .nav-sidebar.collapsed { width: 240px !important; }
    .collapsed .menu-text, .collapsed .section-label { display: unset; }

    /* ハンバーガーを常に見えるヘッダーに固定 */
    .app-header { position: relative; }
    #mobile-menu-btn {
        display: flex;
    }
}
@media (min-width: 901px) {
    #mobile-menu-btn { display: none !important; }
}

.sidebar-menu { flex: 1; padding: 8px 10px; overflow-y: auto; }
.sidebar-section { margin-bottom: 20px; }
.section-label { font-size: 0.65rem; font-weight: 700; color: var(--text-sub); padding-left: 10px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.12em; }

.menu-item {
padding: 7px 10px;
border-radius: 8px;
display: flex;
align-items: center;
gap: 10px;
cursor: pointer;
transition: background 0.15s;
white-space: nowrap;
font-size: 0.9rem;
}
.menu-item:hover { background: rgba(0,0,0,0.04); }
.menu-item.active { background: rgba(90,110,130,0.10); color: var(--highlight); font-weight: 700; }
.collapsed .menu-text, .collapsed .section-label { display: none; }

/* - サイドバー ドリルダウン - */
.sb-layer { display: none; }
.sb-layer.active { display: block; }
.sb-layer-header {
display: flex; align-items: center; gap: 6px;
padding: 8px 12px 6px; cursor: pointer; border-radius: 6px; margin: 0 4px 2px;
transition: background 0.12s;
}
.sb-layer-header:hover { background: rgba(0,0,0,0.04); }
.sb-back-arrow { font-size: 11px; color: var(--highlight); font-weight: 700; }
.sb-layer-title { font-size: 0.65rem; font-weight: 700; color: var(--highlight); letter-spacing: 0.1em; text-transform: uppercase; }
.sb-row {
padding: 7px 12px; font-size: 0.88rem; color: var(--text-main);
cursor: pointer; display: flex; align-items: center; justify-content: space-between;
border-radius: 8px; margin: 0 4px 1px; transition: background 0.12s;
}
.sb-row:hover { background: rgba(0,0,0,0.04); }
.sb-row.active { background: var(--highlight-light); color: var(--highlight); font-weight: 700; }
.sb-row-arrow { font-size: 10px; color: #ccc; }
.sb-row.active .sb-row-arrow { color: var(--highlight); }
.sb-ch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 6px 10px 10px; }
.sb-ch-btn {
aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
font-size: 0.8rem; font-weight: 500; color: var(--text-sub);
background: #fff; border: 1px solid var(--border-soft);
border-radius: 7px; cursor: pointer; transition: all 0.12s;
}
.sb-ch-btn:hover { background: var(--highlight-light); border-color: var(--highlight); color: var(--highlight); }
.sb-ch-btn.active { background: var(--highlight); color: #fff; border-color: var(--highlight); font-weight: 700; }

/* Layer 1/2 ナビヘッダー（旧約聖書 ／ 新約聖書 › 書物名） */
.sb-nav-header {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 2px;
    padding: 12px 14px 10px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
}
.sb-nav-item {
    background: none;
    border: none;
    padding: 0 2px;
    font-size: 0.72rem;
    font-weight: 700;
    font-family: inherit;
    letter-spacing: 0.03em;
    color: var(--text-sub);
    opacity: 0.4;
    cursor: pointer;
    transition: opacity 0.15s;
    line-height: 1.6;
}
.sb-nav-item:hover { opacity: 0.75; }
.sb-nav-item.active {
    color: var(--text-main);
    opacity: 1;
    cursor: default;
}
.sb-nav-sep {
    font-size: 0.6rem;
    color: var(--text-sub);
    opacity: 0.2;
    user-select: none;
    padding: 0 1px;
}
.sb-nav-sep-book {
    opacity: 0.15;
}
.sb-nav-book {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-main);
    opacity: 0.85;
    letter-spacing: 0.01em;
    line-height: 1.6;
}

/* - 中央メインエリア - */
.container { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(-bg-paper); }
.app-header { padding: 18px 40px; border-bottom: 1px solid var(-border-soft); background: var(-bg-paper); }
.header-content { display: flex; align-items: center; justify-content: space-between; }
/* ── グローバル breadcrumb（空間ナビゲーション） ── */
#global-breadcrumb {
    display: flex;
    align-items: baseline;
    gap: 0;
    flex-wrap: wrap;
}
.gbc-item {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.82rem;
    color: var(--text-sub);
    cursor: pointer;
    padding: 2px 0;
    letter-spacing: 0.01em;
    border-bottom: 1px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'Noto Serif JP', serif;
}
.gbc-item:hover {
    color: var(--text-main);
    border-bottom-color: rgba(0,0,0,0.15);
}
.gbc-item.current {
    color: var(--text-main);
    font-weight: 600;
    cursor: default;
    border-bottom-color: transparent;
}
.gbc-sep {
    color: var(--text-sub);
    opacity: 0.35;
    font-size: 0.78rem;
    padding: 0 5px;
    user-select: none;
}

/* ── パネル戻るボタン ── */
#panel-back-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0;
    color: var(--text-sub);
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    transition: color 0.15s;
    flex-shrink: 0;
}
#panel-back-btn:hover { color: var(--text-main); }
.panel-back-arrow {
    font-size: 0.9rem;
    line-height: 1;
    opacity: 0.6;
}
#panel-back-label {
    font-size: 0.73rem;
}

.breadcrumb { display: flex; align-items: center; gap: 8px; color: var(--text-sub); font-size: 0.85rem; }
.breadcrumb h1 { font-size: 1.05rem; margin: 0; color: var(--text-main); font-weight: 700; letter-spacing: -0.02em; }
.separator { color: var(--text-sub); opacity: 0.4; }

#app {
flex: 1;
display: flex;
flex-direction: column;
overflow: hidden;
}

/* ══════════════════════════════════════════
Reading / Study レイアウト
Reading: side-panel 非表示 → 本文全幅
Study:   side-panel 表示  → 本文縮小
bottom-word-panel は廃止（Inspectに統合）
══════════════════════════════════════════ */
#main-reading-area {
flex: 1;
display: grid;
grid-template-columns: 1fr 42%;
min-height: 0;
overflow-y: auto;
}
/* グリッドモード：左右は scroll しない。親が scroll する */
#bible-text-area {
overflow: visible;
padding: 0;
min-width: 0;
}
#parallel-text-area {
overflow: visible;
padding: 0;
background: #fafafa;
border-left: 1px solid rgba(0,0,0,0.08);
font-size: 0.92rem;
color: var(--text-sub);
line-height: 2.0;
}
/* 節ペア：左右セルを display:contents で grid に展開 */
.verse-pair { display: contents; }
.verse-pair-left {
padding: 2px 32px 2px 52px;
background: #fff;
}
.verse-pair-right {
padding: 2px 24px 2px 32px;
background: #fafafa;
}
/* 上下の余白行 */
.verse-grid-spacer-left  { height: 32px; background: #fff; }
.verse-grid-spacer-right { height: 32px; background: #fafafa; }
.verse-grid-footer-left  { height: 40px; background: #fff; }
.verse-grid-footer-right { height: 40px; background: #fafafa; }
/* study panel が開いているとき parallel 列を非表示 */
#main-reading-area.panel-open {
    grid-template-columns: 1fr 0;
}
#main-reading-area.panel-open #parallel-text-area,
#main-reading-area.panel-open .verse-pair-right,
#main-reading-area.panel-open .verse-grid-spacer-right,
#main-reading-area.panel-open .verse-grid-footer-right {
    display: none;
}


/* bottom-word-panel: 廃止。高さ0で残骸を隠す */
#bottom-word-panel {
display: none;
}
#panel-content { display: none; }
#word-detail-view { display: none; }

/* - フッター - */
.app-footer {
border-top: 1px solid var(-border-soft);
padding: 12px 48px;
display: flex;
align-items: center;
justify-content: space-between;
flex-shrink: 0;
background: var(-bg-paper);
}
.footer-copy {
font-size: 0.7rem;
color: var(-text-sub);
letter-spacing: 0.01em;
}
.footer-links {
display: flex;
gap: 18px;
}
.footer-links button {
font-size: 0.7rem;
color: var(-text-sub);
background: none;
border: none;
border-bottom: 1px solid rgba(0,0,0,0.12);
cursor: pointer;
padding-bottom: 1px;
font-family: inherit;
transition: color 0.15s;
}
.footer-links button:hover { color: var(-text-main); }

/* - Depth Panel（下から展開、縦構造） - */
#open-panel-btn {
background: transparent; border: none; padding: 0 10px; cursor: pointer; color: var(--highlight);
font-size: 1.2rem; transition: transform 0.2s, opacity 0.2s; line-height: 1;
}
#open-panel-btn:hover { opacity: 0.7; transform: scale(1.1); }

#bottom-depth-panel {
width: 100%;
background: var(--bg-panel);
border-top: 1px solid var(--border-soft);
padding: 0;
display: none;
flex-direction: column;
flex-shrink: 0;
height: 46vh;
min-height: 220px;
max-height: 70vh;
box-sizing: border-box;
position: relative;
overflow: hidden;
}
#bottom-depth-panel.open {
display: flex;
}

/* リサイズハンドル（上辺） */
#panel-resize-handle {
position: absolute;
top: -4px;
left: 0;
width: 100%;
height: 8px;
cursor: row-resize;
z-index: 100;
display: flex;
justify-content: center;
align-items: flex-end;
}
#panel-resize-handle::after {
content: '';
display: block;
height: 3px;
width: 40px;
border-radius: 2px;
background: var(--border-soft);
transition: background 0.15s, width 0.15s;
margin-bottom: 2px;
}
#panel-resize-handle:hover::after,
#panel-resize-handle.dragging::after {
background: var(--highlight);
width: 60px;
}
.panel-header {
font-weight: 700;
font-size: 0.95rem;
letter-spacing: -0.01em;
padding: 14px 22px 0;
display: flex;
justify-content: space-between;
align-items: center;
color: var(--accent-dark);
flex-shrink: 0;
}


/* - 読書メモUI - */
/* タブなし・単一スクロール・annotation feel */
#reading-notes-wrap {
display: flex;
flex-direction: column;
}
#reading-notes-area {
padding: 0 22px 60px;
}

/* 語形ヘッダー（Word Head）*/
.rn-word-head {
padding: 18px 0 12px;
border-bottom: 1px solid rgba(0,0,0,0.05);
margin-bottom: 8px;
}
.rn-greek {
font-family: 'Gentium Plus', serif;
font-size: 1.7rem;
line-height: 1.2;
color: var(--text-main);
display: block;
margin-bottom: 2px;
}
.rn-ja {
font-size: 0.85rem;
color: var(--text-sub);
font-weight: 400;
display: block;
margin-bottom: 2px;
}
.rn-ref {
font-size: 0.62rem;
color: var(--text-sub);
opacity: 0.5;
letter-spacing: 0.02em;
display: block;
}

/* 読書メモ本体 */
.rn-notes {
margin-top: 6px;
}

/* ══════════════════════════════════════════
   Depth reading system
   rn-prose → rn-deep（深く読む）の縦方向連続体
   「別パネル」ではなく「本文が深く続く」感覚

   Layer 1: rn-prose      - 表層の読書メモ
   Layer 2: rn-deep-prose - 橋：表現の深読み
   Layer 3: rn-grammar    - 最下層：grammar（折りたたみ）

   open時: rn-proseが後景へ静かに沈む
   ══════════════════════════════════════════ */

/* Layer 1: surface reading prose */
.rn-prose {
padding: 14px 0 2px 14px;
border-left: 2px solid rgba(90,110,130,0.15);
margin-bottom: 0;
transition: opacity 0.35s ease, transform 0.35s ease;
}
.rn-prose-text {
font-family: 'Noto Serif JP', serif;
font-size: 0.84rem;
color: var(--text-main);
line-height: 2.0;
letter-spacing: 0.01em;
}

/* rn-deep-section/toggle/body: 廃止済み（Layer 1/2 統合）互換のため定義のみ残す */
.reading-deep-active .rn-prose { opacity: 1; transform: none; }
.rn-deep-section { display: none; }
.rn-deep-toggle  { display: none; }
.rn-deep-body    { display: none; }
@keyframes depthUnfold {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Layer 2: deep reading prose - 橋としての自然文 */
/* 直接 grammar ではなく、読書の延長として入る */
.rn-deep-prose {
padding: 12px 0 14px 0;
border-bottom: 1px solid rgba(0,0,0,0.04);
margin-bottom: 14px;
}
.rn-deep-prose-text {
font-family: 'Noto Serif JP', serif;
font-size: 0.83rem;
color: var(--text-main);
line-height: 2.05;
letter-spacing: 0.01em;
}

/* Layer 3: grammar section label - 最下層の静かなラベル */
.rn-grammar-label {
font-size: 0.54rem;
font-weight: 700;
letter-spacing: 0.1em;
color: var(--text-sub);
opacity: 0.35;
display: block;
margin-bottom: 10px;
text-transform: uppercase;
}

/* grammar grid: 同温度・同余白 */
.rn-morph-grid {
display: grid;
grid-template-columns: auto 1fr;
gap: 3px 14px;
font-size: 0.78rem;
margin-bottom: 12px;
}
.rn-morph-key {
color: var(--text-sub);
font-size: 0.66rem;
font-weight: 400;
padding: 2px 0;
border-bottom: 1px solid rgba(0,0,0,0.03);
white-space: nowrap;
opacity: 0.7;
}
.rn-morph-val {
color: var(--text-main);
font-weight: 400;
font-size: 0.78rem;
padding: 2px 0;
border-bottom: 1px solid rgba(0,0,0,0.03);
}
.rn-morph-val.core { font-weight: 600; }

/* 辞書引用（Abbott-Smith）*/
.rn-lexicon {
font-size: 0.77rem;
color: var(--text-sub);
line-height: 1.8;
padding: 8px 0 4px;
margin-top: 6px;
border-top: 1px solid rgba(0,0,0,0.04);
}
.rn-lexicon-label {
font-size: 0.54rem;
font-weight: 700;
letter-spacing: 0.08em;
text-transform: uppercase;
color: var(--text-sub);
opacity: 0.4;
display: block;
margin-bottom: 4px;
}

/* ─── Layer 3: 「単語を調べる」reference layer ─── */
/* 読書から分離された最下層。折りたたみ。annotation feel。 */
.rn-ref-section {
    margin-top: 20px;
}
.rn-ref-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    background: none;
    border: none;
    padding: 8px 0 6px 14px;
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--text-sub);
    cursor: pointer;
    font-family: 'Noto Serif JP', serif;
    text-align: left;
    transition: color 0.2s, opacity 0.2s;
    opacity: 0.45;
    border-left: 2px solid rgba(90,110,130,0.06);
}
.rn-ref-toggle:hover {
    color: var(--highlight);
    opacity: 0.85;
    border-left-color: rgba(90,110,130,0.2);
}
.rn-ref-toggle.open {
    opacity: 0.6;
    border-left-color: rgba(90,110,130,0.15);
}
.rn-ref-toggle-icon {
    font-size: 0.8rem;
    transition: transform 0.2s;
    display: inline-block;
    width: 12px;
    opacity: 0.5;
    flex-shrink: 0;
}
.rn-ref-body {
    display: none;
    margin-top: 0;
    padding-left: 14px;
    border-left: 2px solid rgba(90,110,130,0.08);
    padding-top: 8px;
    animation: depthUnfold 0.25s ease both;
}
.rn-ref-body.visible { display: block; }

/* 外部検索リンク */
.rn-search-links {
display: flex;
flex-wrap: wrap;
gap: 6px;
margin-top: 14px;
padding-top: 10px;
border-top: 1px solid rgba(0,0,0,0.04);
}
.rn-search-link {
font-size: 0.65rem;
color: var(--text-sub);
background: none;
border: none;
padding: 0;
cursor: pointer;
text-decoration: underline;
text-underline-offset: 2px;
text-decoration-color: rgba(0,0,0,0.18);
font-family: inherit;
letter-spacing: 0.01em;
transition: color 0.12s;
opacity: 0.7;
}
.rn-search-link:hover { color: var(--highlight); opacity: 1; }

/* 後方互換：分析タブバーは完全非表示 */
.analysis-tabs { display: none !important; }
#analysis-frame-wrap { display: none !important; }

/* 旧 iframe：非表示にして DOM に残す（外部参照の互換のため） */
#analysis-iframe {
display: none;
}
/* 新 インラインコンテンツエリア */
#analysis-content-area {
flex: 1;
overflow-y: auto;
padding: 18px 22px 32px;
background: var(-bg-paper);
font-size: 0.9rem;
line-height: 1.9;
color: var(-text-main);
}
/* 分析コンテンツ内の共通スタイル */
.ac-section-label {
font-size: 0.62rem;
font-weight: 600;
letter-spacing: 0.06em;
color: var(-text-sub);
margin-bottom: 10px;
display: block;
opacity: 0.7;
}
.ac-entry {
background: #fff;
border: 1px solid var(-border-soft);
border-radius: 10px;
padding: 14px 16px;
margin-bottom: 10px;
}
.ac-entry-greek {
font-family: ‘Gentium Plus’, serif;
font-size: 1.65rem;
line-height: 1.2;
color: var(-text-main);
margin-bottom: 2px;
}
.ac-entry-ja {
font-size: 0.82rem;
font-weight: 400;
color: var(-text-sub);
margin-bottom: 6px;
}
.ac-entry-desc {
font-size: 0.82rem;
color: var(-text-sub);
line-height: 1.75;
border-top: 1px solid var(-border-soft);
padding-top: 8px;
margin-top: 4px;
}
.ac-entry-strong {
font-size: 0.6rem;
color: #c8c8ce;
font-family: monospace;
margin-top: 2px;
display: block;
}
.ac-table {
width: 100%;
border-collapse: collapse;
font-size: 0.82rem;
margin-top: 8px;
}
.ac-table th {
text-align: left;
padding: 5px 8px;
color: var(-text-sub);
font-size: 0.7rem;
font-weight: 700;
letter-spacing: 0.06em;
text-transform: uppercase;
border-bottom: 1px solid var(-border-soft);
}
.ac-table td {
padding: 6px 8px;
border-bottom: 1px solid rgba(0,0,0,0.04);
color: var(-text-main);
vertical-align: baseline;
}
.ac-table tr:last-child td { border-bottom: none; }
.ac-table td.ac-td-greek {
font-family: ‘Gentium Plus’, serif;
font-size: 1.1rem;
}
.ac-morph-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 6px 16px;
margin-top: 8px;
font-size: 0.82rem;
}
.ac-morph-row {
display: contents;
}
.ac-morph-key {
color: var(-text-sub);
font-size: 0.68rem;
font-weight: 400;
letter-spacing: 0.04em;
padding: 3px 0;
border-bottom: 1px solid rgba(0,0,0,0.04);
grid-column: 1;
}
.ac-morph-val {
color: var(-text-main);
font-weight: 500;
font-size: 0.82rem;
padding: 3px 0;
border-bottom: 1px solid rgba(0,0,0,0.04);
grid-column: 2;
}
.ac-morph-val.core {
color: var(-text-main);
font-weight: 700;
}
.ac-cite-ref {
font-size: 0.75rem;
color: var(-text-sub);
margin-top: 6px;
display: block;
}
.ac-no-data {
text-align: center;
color: var(-text-sub);
font-size: 0.82rem;
padding: 32px 0;
}
.ac-morph-search-row {
margin-top: 14px;
display: flex;
gap: 8px;
flex-wrap: wrap;
}
/* semantics: Abbott-Smith 引用ブロック */
.ac-abbottsmith {
background: rgba(90,110,130,0.05);
border-left: 3px solid var(-highlight);
border-radius: 0 8px 8px 0;
padding: 12px 14px;
margin-top: 10px;
font-size: 0.82rem;
color: var(-text-sub);
line-height: 1.75;
}
/* syntax: 文脈節一覧ローディング */
.ac-loading {
font-size: 0.78rem;
color: var(-text-sub);
padding: 16px 0;
text-align: center;
animation: ac-blink 1.2s ease-in-out infinite;
}
@keyframes ac-blink {
0%, 100% { opacity: 0.5; }
50% { opacity: 1; }
}

/* - 本文 - */
.verse-block { transition: background 0.15s; }
.verse-pair-left  { border-radius: 6px 0 0 6px; }
.verse-pair-right { border-radius: 0 6px 6px 0; }
.verse-block.selected { background: rgba(90,110,130,0.07); }
.jp-section { padding: 4px 8px; cursor: pointer; display: flex; align-items: baseline; border-radius: 6px; }
.jp-section:hover { background: rgba(0,0,0,0.03); }
.v-num { color: #a8a8af; margin-right: 16px; font-size: 0.7rem; font-weight: 400; min-width: 20px; text-align: right; letter-spacing: 0.02em; flex-shrink: 0; }
.jp-text { font-size: 1.1rem; line-height: 2.1; color: var(-text-main); font-family: ‘Noto Serif JP’, serif; }

/* - 語形カード（Study panel内の一覧用：既存互換のため残す） - */
.word-card {
background: #ffffff;
padding: 10px 14px;
border-radius: 10px;
display: flex;
justify-content: space-between;
align-items: baseline;
margin-bottom: 8px;
border: 1px solid var(-border-soft);
cursor: pointer;
transition: border-color 0.15s, background 0.15s;
}
.word-card:hover { border-color: rgba(90,110,130,0.3); background: rgba(90,110,130,0.04); }
.greek-word { font-family: ‘Gentium Plus’, serif; font-size: 1.45rem; line-height: 1.3; }

/* 文法装飾クラス */
.present-text { border-bottom: 2px solid var(-highlight); }
.aorist-text  { border-bottom: 2px dotted var(-highlight); }
.perfect-text { text-decoration: underline wavy var(-highlight); text-underline-offset: 4px; }
.future-text { border-bottom: 2px double var(-highlight); }
.indicative-text { border-bottom: 2px solid var(-highlight); }
.imperative-text { border-bottom: 2px solid var(-highlight); }

.grammar-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; font-size: 0.65rem; color: var(-text-sub); border-top: 1px solid var(-border-soft); padding-top: 6px; }
.tag-jp { color: var(-text-sub); font-size: 0.7rem; margin-left: 6px; opacity: 0.75; }
.strong-num { font-size: 0.6rem; color: #c8c8ce; font-family: monospace; }

/* ══════════════════════════════════════════
Inspect Popover
語クリックで本文上に浮かぶ軽量カード。
基本義・品詞タグ・「詳しく見る」だけ。
══════════════════════════════════════════ */
#inspect-popover {
position: fixed;
z-index: 200;
width: 220px;
background: #ffffff;
border: 1px solid var(-border-soft);
border-radius: 10px;
box-shadow: 0 4px 20px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
padding: 0;
display: none;
flex-direction: column;
overflow: hidden;
animation: popoverIn 0.15s ease;
}
#inspect-popover.visible { display: flex; }
@keyframes popoverIn {
from { opacity: 0; transform: translateY(4px) scale(0.98); }
to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* popoverの上部：語形 + 基本義 */
.inspect-head {
padding: 11px 14px 8px;
border-bottom: 1px solid var(-border-soft);
}
.inspect-greek {
font-family: ‘Gentium Plus’, serif;
font-size: 1.5rem;
line-height: 1.2;
color: var(-text-main);
margin-bottom: 3px;
}
.inspect-ja {
font-size: 0.8rem;
font-weight: 400;
color: var(-text-sub);
line-height: 1.4;
margin-bottom: 0;
}

/* popoverの中部：品詞タグ3つまで */
.inspect-tags {
padding: 6px 14px 8px;
display: flex;
flex-wrap: wrap;
gap: 4px;
border-bottom: 1px solid var(-border-soft);
}
.inspect-tag {
font-size: 0.65rem;
padding: 2px 7px;
border-radius: 20px;
background: var(-bg-panel);
color: var(-text-sub);
border: 1px solid var(-border-soft);
letter-spacing: 0.01em;
}
.inspect-tag.core {
background: rgba(90,110,130,0.10);
color: var(-highlight);
border-color: rgba(90,110,130,0.2);
font-weight: 600;
}

/* popoverのフッター：「詳しく見る」ボタン */
.inspect-footer {
padding: 0;
}
.inspect-study-btn {
display: flex;
align-items: center;
justify-content: space-between;
width: 100%;
padding: 9px 14px;
font-size: 0.75rem;
font-family: inherit;
font-weight: 600;
color: var(-highlight);
background: transparent;
border: none;
cursor: pointer;
letter-spacing: 0.02em;
transition: background 0.12s;
text-align: left;
}
.inspect-study-btn:hover {
background: var(-highlight-light);
}
.inspect-study-arrow {
font-size: 0.85rem;
opacity: 0.6;
}

/* -- morph-search-btn（近くの語を見るなど、Study panel内で継続使用） -- */
.morph-search-btn {
display: inline-flex;
align-items: center;
justify-content: center;
padding: 6px 16px;
font-size: 0.75rem;
font-family: inherit;
font-weight: 600;
letter-spacing: 0.06em;
text-transform: uppercase;
color: var(-text-sub);
background: transparent;
border: 1px solid rgba(0,0,0,0.13);
border-radius: 6px;
cursor: pointer;
transition: color 0.15s, border-color 0.15s, background 0.15s;
text-decoration: none;
white-space: nowrap;
}
.morph-search-btn:hover {
color: var(-highlight);
border-color: var(-highlight);
background: var(-highlight-light);
}
.morph-search-btn:active { opacity: 0.7; }
.morph-search-btn .btn-icon { display: none; }

/* 形態タグ一覧（Study panel内） */
.morph-tag-row {
display: flex;
flex-wrap: wrap;
gap: 5px;
margin: 0px 0 4px;
}
.morph-tag-pill {
font-size: 0.7rem;
padding: 2px 9px;
border-radius: 20px;
background: var(-bg-panel);
color: var(-text-sub);
border: 1px solid var(-border-soft);
letter-spacing: 0.01em;
}
.morph-tag-pill.core {
background: rgba(90,110,130,0.10);
color: var(-highlight);
border-color: rgba(90,110,130,0.2);
font-weight: 600;
}

/* reading-core-bar（side-panel ヘッダー固定） */
.rcb-container {
display: none;
align-items: baseline;
gap: 8px;
flex-wrap: wrap;
padding: 8px 22px 10px;
background: var(--bg-panel);
border-bottom: 1px solid var(--border-soft);
font-size: 0.7rem;
flex-shrink: 0;
}
.rcb-container.visible { display: flex; }
.rcb-chip-sm {
font-family: 'Gentium Plus', serif;
font-size: 1.05rem;
color: var(--text-main);
font-weight: 400;
}
.rcb-label-sm {
font-size: 0.72rem;
color: var(--text-sub);
font-weight: 400;
opacity: 0.7;
}
.rcb-sep-sm { color: var(--border-soft); font-size: 0.75rem; }

/* ギリシャ語なしバッジ */
.no-greek-badge {
display: inline-block;
font-size: 0.65rem;
color: var(-text-sub);
background: var(-bg-panel);
border: 1px solid var(-border-soft);
border-radius: 4px;
padding: 1px 7px;
margin-left: 8px;
vertical-align: middle;
letter-spacing: 0.04em;
}

@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Study panel 閉じるボタン（廃止 → depth-history に置き換え済み） */
#study-close-btn {
display: none;
}

/* 読書モード: 本文エリア下部のヒント */
#reading-hint {
position: sticky;
bottom: 0;
left: 0;
right: 0;
padding: 6px 52px;
background: linear-gradient(to top, var(-bg-paper) 70%, transparent);
font-size: 0.62rem;
color: var(-text-sub);
letter-spacing: 0.04em;
pointer-events: none;
opacity: 0.5;
display: none;
}
#reading-hint.visible { display: block; }

/* ══════════════════════════════════════════
   Flow / Meaning / Study タブ 共通スタイル
   ══════════════════════════════════════════ */

/* 語形ヘッダー（タブ上部に共通） */
.flow-word-head {
    display: flex;
    align-items: baseline;
    gap: 0;
    margin-bottom: 4px;
    flex-wrap: wrap;
}
.flow-greek {
    font-family: 'Gentium Plus', serif;
    font-size: 1.65rem;
    line-height: 1.2;
    color: var(--text-main);
}
.flow-ja {
    font-size: 0.82rem;
    color: var(--text-sub);
    font-weight: 400;
}
.flow-ref {
    font-size: 0.62rem;
    color: var(--text-sub);
    opacity: 0.6;
    margin-bottom: 14px;
    letter-spacing: 0.02em;
}

/* ── Flow タブ ── */
/* ── AI補助共通エリア ── */
.flow-ai-area {
    margin-top: 10px;
    margin-bottom: 4px;
}
.flow-ai-content {
    font-size: 0.84rem;
    color: var(--text-main);
    line-height: 1.8;
    padding: 12px 14px;
    background: rgba(90,110,130,0.04);
    border-left: 2px solid rgba(90,110,130,0.2);
    border-radius: 0 6px 6px 0;
    margin-bottom: 4px;
}
.flow-ai-label {
    display: inline-block;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text-sub);
    opacity: 0.7;
    margin-right: 4px;
    vertical-align: middle;
}

/* ── Meaning タブ：「どう響くか」層 ── */
/* Abbott-Smith は不在。AIの contextual nuance が主役。静かなプロース。 */
.meaning-strong {
    font-size: 0.6rem;
    color: #c8c8ce;
    font-family: monospace;
    margin-bottom: 10px;
}
/* Meaning AI 出力エリア：flow-ai-prose と共通の静かなスタイル */
.meaning-prose {
    font-size: 0.84rem;
    color: var(--text-main);
    line-height: 1.8;
    padding: 10px 0 0 12px;
    border-left: 2px solid rgba(90,110,130,0.12);
    margin-top: 6px;
}
.meaning-prose-label {
    display: inline-block;
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: 0.5;
    margin-right: 5px;
    vertical-align: middle;
}

/* ── Semantics セクション（Study内）：quiet scholarly notes ── */
/* dense tables・giant lexicon UI 禁止。折りたたみで必要な時だけ確認する層。 */
.semantics-abbott {
    font-size: 0.81rem;
    color: var(--text-sub);
    line-height: 1.8;
    padding: 10px 0 4px;
}
.semantics-note {
    font-size: 0.78rem;
    color: var(--text-sub);
    line-height: 1.75;
    padding: 6px 0 2px;
    border-top: 1px solid rgba(0,0,0,0.04);
    margin-top: 6px;
}
.semantics-note-label {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text-sub);
    opacity: 0.5;
    text-transform: uppercase;
    display: block;
    margin-bottom: 2px;
}

/* ── flow-signal rows（prose化） ── */
/* 種別ごとの細いボーダーは維持しつつ、カード感・行列感を除去 */
.flow-signal {
    padding: 0;
    border-bottom: none;
    border-left: none;
    line-height: 1.85;
}
.flow-signal:last-child { border-bottom: none; }

/* signal種別ボーダー：flow-hints全体の左ボーダーで統合。個別signal行には付けない */
.flow-signal.sig-logic     { }
.flow-signal.sig-emphasis  { }
.flow-signal.sig-turn      { }
.flow-signal.sig-exhort    { }
.flow-signal.sig-promise   { }
.flow-signal.sig-declare   { }
.flow-signal.sig-metaphor  { }
.flow-signal.sig-word      { }
.flow-signal.sig-caution   { }
.flow-signal.sig-culture   { }
.flow-signal.sig-default   { }

.flow-signal-text {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.84rem;
    color: var(--text-main);
    line-height: 2.0;
    letter-spacing: 0.01em;
}

/* flow-hints全体：prose blockとして静かに収める */
.flow-hints {
    padding: 14px 0 4px 14px;
    border-left: 2px solid rgba(90,110,130,0.15);
    margin-bottom: 12px;
}

/* signal種別ラベル（廃止：prose化のため非表示） */
.flow-signal-kind {
    display: none;
}

/* AI補助エリア：signal群の下に続く自然な流れとして */
.flow-ai-prose {
    font-size: 0.84rem;
    color: var(--text-main);
    line-height: 1.8;
    padding: 10px 0 0 12px;
    border-left: 2px solid rgba(90,110,130,0.12);
    margin-top: 10px;
}
.flow-ai-prose-label {
    display: inline-block;
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: 0.5;
    margin-right: 5px;
    vertical-align: middle;
}

/* ══════════════════════════════════════════
   Syntax セクション（Study内）
   「論理の骨組み」を静かな読解補助として表示。
   linguistics software感・academic parser感禁止。
   ══════════════════════════════════════════ */

/* 読解説明：構文の前に出る自然文 */
.syntax-reading {
    font-size: 0.84rem;
    color: var(--text-main);
    line-height: 1.8;
    padding: 8px 0 10px 12px;
    border-left: 2px solid rgba(90,110,130,0.15);
    margin-bottom: 2px;
}
.syntax-reading-label {
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: 0.5;
    display: block;
    margin-bottom: 3px;
    text-transform: uppercase;
}

/* 構文関係リスト：clause relation / modifier / logical role */
.syntax-relations {
    margin: 6px 0 2px;
}
.syntax-rel-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(0,0,0,0.03);
    font-size: 0.82rem;
    line-height: 1.65;
}
.syntax-rel-row:last-child { border-bottom: none; }
.syntax-rel-kind {
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text-sub);
    opacity: 0.5;
    flex-shrink: 0;
    min-width: 32px;
    text-transform: uppercase;
    padding-top: 1px;
}
.syntax-rel-text {
    color: var(--text-main);
    font-size: 0.82rem;
    line-height: 1.65;
}

/* 構文構造（ツリー）：subtle indentation / light connectors / soft hierarchy */
/* 禁止：giant parser canvas / colorful linguistics graph / debug-like UI */
.syntax-tree {
    margin: 8px 0 4px 0;
    font-size: 0.79rem;
    line-height: 1.9;
    color: var(--text-sub);
    font-family: inherit;
}
.syntax-tree-row {
    display: flex;
    align-items: baseline;
    gap: 0;
    padding: 1px 0;
}
.syntax-tree-indent {
    /* 階層ごとの静かなインデント。横スクロール地獄にならないよう幅を抑える */
    display: inline-block;
    width: 16px;
    flex-shrink: 0;
    color: rgba(0,0,0,0.12);
    font-size: 0.7rem;
    line-height: 1.9;
    user-select: none;
}
.syntax-tree-connector {
    display: inline-block;
    width: 10px;
    flex-shrink: 0;
    color: rgba(0,0,0,0.15);
    font-size: 0.7rem;
    line-height: 1.9;
    user-select: none;
}
.syntax-tree-role {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text-sub);
    opacity: 0.5;
    margin-right: 5px;
    text-transform: uppercase;
    flex-shrink: 0;
}
.syntax-tree-content {
    color: var(--text-main);
    font-size: 0.8rem;
    opacity: 0.85;
}
.syntax-tree-note {
    font-size: 0.72rem;
    color: var(--text-sub);
    opacity: 0.6;
    margin-left: 5px;
    font-style: italic;
}

/* Syntax AI補助エリア */
.syntax-ai-prose {
    font-size: 0.84rem;
    color: var(--text-main);
    line-height: 1.8;
    padding: 8px 0 0 12px;
    border-left: 2px solid rgba(90,110,130,0.12);
    margin-top: 2px;
    margin-bottom: 6px;
}
.syntax-ai-label {
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: 0.5;
    margin-right: 4px;
    vertical-align: middle;
    text-transform: uppercase;
}
.study-details {
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 0;
}
.study-details:last-of-type { border-bottom: none; }
.study-summary {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-sub);
    padding: 10px 0;
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
    outline: none;
}
.study-summary::-webkit-details-marker { display: none; }
.study-summary::before {
    content: '›';
    font-size: 0.85rem;
    color: var(--text-sub);
    opacity: 0.5;
    transition: transform 0.15s;
    display: inline-block;
    width: 10px;
}
details[open] .study-summary::before {
    transform: rotate(90deg);
}
.study-details-body {
    padding: 0 0 12px 16px;
}

/* ══════════════════════════════════════════
   Research Tools - Study タブ内の静かな探索補助
   ══════════════════════════════════════════

   設計思想：
   - Reading Evidence（語形・論理構造・意味論的根拠）の下に配置
   - 初期状態は折りたたみ。「研究ツールを開く」で展開
   - card乱立禁止・dense search UI禁止・analytics感禁止
   - filter controls は compact・expandable
   - 読書空間を壊さない quiet な外観を維持
   ══════════════════════════════════════════ */

/* Research Tools 全体ラッパー */
.rt-section {
    margin-top: 8px;
    border-top: 1px solid rgba(0,0,0,0.06);
    padding-top: 8px;
}
.rt-open-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    background: none;
    border: none;
    padding: 8px 0;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-sub);
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: color 0.12s;
}
.rt-open-btn:hover { color: var(--highlight); }
.rt-open-btn-icon {
    font-size: 0.7rem;
    opacity: 0.5;
    transition: transform 0.15s;
    display: inline-block;
    width: 10px;
}
.rt-open-btn.expanded .rt-open-btn-icon { transform: rotate(90deg); }

/* Research Tools 本体 */
.rt-body {
    display: none;
}
.rt-body.visible { display: block; }

/* 各 Research Tool（Morph / Syntax / Semantic）の切り替えタブ */
.rt-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 12px;
}
.rt-tab {
    padding: 5px 12px 6px;
    font-size: 0.68rem;
    font-weight: 600;
    font-family: inherit;
    color: var(--text-sub);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: color 0.12s, border-color 0.12s;
    letter-spacing: 0.02em;
    position: relative;
    bottom: -1px;
}
.rt-tab:hover { color: var(--highlight); }
.rt-tab.active {
    color: var(--highlight);
    border-bottom-color: var(--highlight);
}

/* 各 Research Tool のコンテンツエリア */
.rt-content { display: none; }
.rt-content.visible { display: block; }

/* フィルター行：label + control をコンパクトに並べる */
.rt-filter-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 10px;
    margin-bottom: 10px;
    align-items: baseline;
}
.rt-filter-label {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--text-sub);
    opacity: 0.6;
    min-width: 24px;
    flex-shrink: 0;
}
/* select コントロール：quiet & compact */
.rt-select {
    font-size: 0.72rem;
    font-family: inherit;
    color: var(--text-main);
    background: var(--bg-panel);
    border: 1px solid var(--border-soft);
    border-radius: 5px;
    padding: 3px 6px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.12s;
    max-width: 110px;
}
.rt-select:focus { border-color: rgba(90,110,130,0.4); }

/* 実行ボタン */
.rt-run-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 14px;
    font-size: 0.7rem;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.03em;
    color: var(--highlight);
    background: transparent;
    border: 1px solid rgba(90,110,130,0.25);
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    margin-top: 4px;
}
.rt-run-btn:hover {
    background: var(--highlight-light);
    border-color: rgba(90,110,130,0.4);
}
.rt-run-btn:active { opacity: 0.7; }

/* 検索結果エリア */
.rt-results {
    margin-top: 10px;
    min-height: 0;
}
/* ローディング（ac-loading と同じアニメーションを流用） */
.rt-loading {
    font-size: 0.75rem;
    color: var(--text-sub);
    padding: 10px 0;
    text-align: center;
    animation: ac-blink 1.2s ease-in-out infinite;
    display: none;
}
.rt-loading.visible { display: block; }

/* 結果ブロック：静かな paper-like カード。乱立禁止・1項目ずつ縦積み */
.rt-result-block {
    border-left: 2px solid rgba(90,110,130,0.15);
    padding: 6px 0 6px 10px;
    margin-bottom: 8px;
    font-size: 0.82rem;
    color: var(--text-main);
    line-height: 1.75;
}
.rt-result-block:last-child { margin-bottom: 0; }
.rt-result-kind {
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: 0.5;
    display: block;
    margin-bottom: 2px;
    text-transform: uppercase;
}
.rt-result-text {
    font-size: 0.82rem;
    color: var(--text-main);
    line-height: 1.75;
}
.rt-result-ref {
    font-size: 0.65rem;
    color: var(--text-sub);
    opacity: 0.65;
    margin-top: 2px;
    display: block;
}
/* 空結果メッセージ */
.rt-no-result {
    font-size: 0.78rem;
    color: var(--text-sub);
    text-align: center;
    padding: 16px 0;
    opacity: 0.7;
}
/* Semantic Search：concept チップ選択 */
.rt-concept-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 10px;
}
.rt-concept-chip {
    font-size: 0.68rem;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--bg-panel);
    color: var(--text-sub);
    border: 1px solid var(--border-soft);
    cursor: pointer;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    letter-spacing: 0.01em;
    user-select: none;
}
.rt-concept-chip.selected {
    background: var(--highlight-light);
    color: var(--highlight);
    border-color: rgba(90,110,130,0.3);
    font-weight: 600;
}

/* ══════════════════════════════════════════
   Word List View - 節語形リスト
   Progressive Disclosure 段階展開型。
   タブバー廃止。「流れ」を唯一の基盤UIとし、
   chipクリックでインライン展開する。
   ══════════════════════════════════════════ */

/* 外枠（flex列で flow-stream + drawer を縦積み） */
#word-list-view {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
}

/* ── 流れUI：ギリシャ語順日本語chip列 ── */
/* 常時表示。タブで隠さない。読書の延長として機能する。 */
.wlv-flow-section {
    padding: 20px 18px 0;
    flex-shrink: 0;
}
.wlv-flow-label {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    opacity: 0.4;
    display: block;
    margin-bottom: 12px;
    text-transform: uppercase;
}

/* chip流：横並び・折り返し・prose-like */
.wlv-flow-stream {
    display: flex;
    flex-wrap: wrap;
    gap: 5px 3px;
    align-items: baseline;
    line-height: 2.6;
}

/* 各語のchip：軽量・ボーダー使わない */
.wlv-chip {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    padding: 3px 7px 2px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
    border: 1px solid transparent;
}
.wlv-chip:hover {
    background: rgba(90,110,130,0.06);
}
.wlv-chip.active {
    background: rgba(90,110,130,0.09);
    border-color: rgba(90,110,130,0.2);
}

/* chip内：日本語グロス（主役） */
.wlv-chip-ja {
    font-size: 1.0rem;
    font-family: 'Noto Serif JP', serif;
    color: var(--text-main);
    line-height: 1.3;
    letter-spacing: -0.01em;
}

/* chip内：signal dot（役割の色点・極小）*/
.wlv-chip-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: transparent;
    flex-shrink: 0;
}
/* signal 種別ごとの dot 色（静かに） */
.wlv-chip.role-verb  .wlv-chip-dot { background: #7a8fa6; }
.wlv-chip.role-noun  .wlv-chip-dot { background: #8a9a8a; }
.wlv-chip.role-conj  .wlv-chip-dot { background: #a09070; }
.wlv-chip.role-prep  .wlv-chip-dot { background: #9a8a6a; }
.wlv-chip.role-adj   .wlv-chip-dot { background: #8a7a9a; }
.wlv-chip.role-pron  .wlv-chip-dot { background: #7a9090; }
.wlv-chip.role-part  .wlv-chip-dot { background: #7a9a7a; }
.wlv-chip.role-art   .wlv-chip-dot { background: transparent; }
.wlv-chip.role-other .wlv-chip-dot { background: rgba(90,110,130,0.2); }

/* 句区切り：軽い縦線 */
.wlv-phrase-sep {
    display: inline-block;
    width: 1px;
    height: 16px;
    background: rgba(0,0,0,0.07);
    margin: 0 5px;
    vertical-align: middle;
    flex-shrink: 0;
    align-self: center;
}

/* ── chip詳細ドロワー - "深く潜る" continuity design ── */
/* 別パネルではなく、chip streamの下に自然に続く深層として展開する */
.wlv-detail-drawer {
    margin: 12px 0 0;
    padding: 14px 18px 14px 32px;
    display: none;
    border-left: 2px solid rgba(90,110,130,0.15);
    background: transparent;
    position: relative;
}
/* 左線の上部に小さな点を打って「ここから潜る」感を出す */
.wlv-detail-drawer::before {
    content: '';
    position: absolute;
    left: -5px;
    top: 16px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(90,110,130,0.25);
}
.wlv-detail-drawer.visible {
    display: block;
    animation: depthUnfold 0.28s ease both;
}
@keyframes wlvDrawerIn {
    from { opacity: 0; transform: translateY(-3px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ドロワー内：ギリシャ語 - 読書温度で */
.wlv-detail-greek {
    font-family: 'Gentium Plus', serif;
    font-size: 1.3rem;
    color: var(--text-main);
    line-height: 1.2;
    margin-bottom: 1px;
    opacity: 0.85;
}
/* ドロワー内：日本語グロス */
.wlv-detail-ja {
    font-size: 0.8rem;
    color: var(--text-sub);
    margin-bottom: 10px;
    opacity: 0.7;
}
/* ドロワー内：文法メモ（廃止：resonanceに統合） */
.wlv-detail-morph {
    display: none;
}
/* ドロワー内：signalタグ（廃止） */
.wlv-detail-signals {
    display: none;
}
.wlv-signal-tag {
    display: none;
}
/* ドロワー内：「深く読む」ボタン */
.wlv-detail-study-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    font-weight: 400;
    font-family: 'Noto Serif JP', serif;
    color: var(--text-sub);
    background: transparent;
    border: none;
    padding: 8px 0 0;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: color 0.15s, opacity 0.15s;
    opacity: 0.5;
}
.wlv-detail-study-btn:hover { color: var(--highlight); opacity: 0.9; }

/* ── ドロワー下のヒントテキスト ── */
.wlv-flow-hint {
    padding: 12px 18px 16px;
    font-size: 0.6rem;
    color: var(--text-sub);
    opacity: 0.4;
    letter-spacing: 0.02em;
    flex-shrink: 0;
}

/* ── 旧タブ関連：完全廃止。CSS定義を残すが使われない ── */
/* wlv-tabs / wlv-tab / wlv-content は削除（JS側で生成しなくなる） */
.wlv-normal-hint {
    font-size: 0.65rem;
    color: var(--text-sub);
    opacity: 0.6;
    text-align: center;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border-soft);
}

/* ══════════════════════════════════════════
   節全体の読書メモ - passage note
   word-list-view の下に配置する。
   「読書の余白に書かれたメモ」として機能する。
   commentary・exegesis・sermon noteではない。
   軽い読書補助。静かな prose。
   ══════════════════════════════════════════ */
.wlv-reading-passage-note {
    padding: 20px 18px 24px;
    border-top: 1px solid rgba(0,0,0,0.06);
    margin-top: 4px;
    flex-shrink: 0;
}

.wlv-pn-label {
    font-size: 0.56rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-sub);
    opacity: 0.4;
    display: block;
    margin-bottom: 14px;
    text-transform: uppercase;
}

.wlv-pn-prose {
    padding-left: 14px;
    border-left: 2px solid rgba(90,110,130,0.15);
}

.wlv-pn-prose p {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.84rem;
    color: var(--text-main);
    line-height: 2.1;
    letter-spacing: 0.01em;
    margin: 0 0 10px 0;
}
.wlv-pn-prose p:last-child {
    margin-bottom: 0;
}

/* chip stream: 補助として小さく静かに */
.wlv-flow-section-compact {
    padding: 18px 18px 0;
    flex-shrink: 0;
}

.wlv-flow-label-compact {
    font-size: 0.54rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-sub);
    opacity: 0.35;
    display: block;
    margin-bottom: 10px;
    text-transform: uppercase;
}

/* chip stream: 補助モードではグロスを少し小さく */
.wlv-flow-section-compact .wlv-chip-ja {
    font-size: 0.88rem;
}

/* ドロワー内：「この節での響き」prose - 同読書温度で */
.wlv-detail-resonance {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.83rem;
    color: var(--text-main);
    line-height: 1.95;
    padding: 0 0 10px 0;
    margin-bottom: 0;
    letter-spacing: 0.01em;
    opacity: 0.82;
}

/* ══════════════════════════════════════════
   翻訳モード
   ══════════════════════════════════════════ */
/* 単一モード: 右列を隠す */
#main-reading-area.single-mode {
    grid-template-columns: 1fr 0;
}
#main-reading-area.single-mode #parallel-text-area,
#main-reading-area.single-mode .verse-pair-right {
    display: none;
}
/* 比較モード: 左右均等 */
#main-reading-area.compare-mode {
    grid-template-columns: 1fr 1fr;
}
#main-reading-area.compare-mode #parallel-text-area {
    display: block;
}
/* 比較モード: panel-open 時は右を畳む */
#main-reading-area.compare-mode.panel-open {
    grid-template-columns: 1fr 0;
}
/* カラムヘッダー（比較時のみ表示） */
.trans-col-header {
    display: none;
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-sub);
    opacity: 0.45;
    padding: 10px 32px 4px 52px;
    background: #fff;
}
.trans-col-header.right {
    padding: 10px 24px 4px 32px;
    background: #fafafa;
}
#main-reading-area.compare-mode .trans-col-header {
    display: block;
}
/* 右列の jp-text */
.verse-pair-right .jp-text {
    font-size: 1.1rem;
    line-height: 2.1;
    color: var(--text-main);
    font-family: 'Noto Serif JP', serif;
}
/* 「聖書」ラベル：クリック可能 */
.sb-bible-label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    transition: opacity 150ms;
    user-select: none;
}
.sb-bible-label:hover { opacity: 0.65; }
.sb-bible-label-arrow {
    font-size: 0.58rem;
    opacity: 0.4;
}

/* Layer 1/2 の「‹ 聖書」breadcrumb ボタン */
.sb-bible-back {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 14px 4px;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--highlight);
    cursor: pointer;
    letter-spacing: 0.02em;
    opacity: 0.7;
    transition: opacity 0.15s;
    text-align: left;
    width: 100%;
}
.sb-bible-back:hover { opacity: 1; }
.sb-bible-back-chevron {
    font-size: 0.75rem;
    font-weight: 400;
    opacity: 0.8;
    line-height: 1;
}

/* ══════════════════════════════════════════
   Bible Picker Popup
   ══════════════════════════════════════════ */
#bible-picker-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 500;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: rgba(255,255,255,0.55);
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 200ms ease;
}
#bible-picker-backdrop.bp-open {
    display: flex;
    opacity: 1;
}
#bible-picker-popup {
    width: 420px;
    max-width: calc(100vw - 32px);
    border-radius: 22px;
    background: rgba(250,250,248,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow:
        0 10px 40px rgba(0,0,0,0.08),
        0 2px 10px rgba(0,0,0,0.04);
    overflow: hidden;
    transform: scale(0.96) translateY(6px);
    opacity: 0;
    transition: transform 220ms cubic-bezier(0.34,1.06,0.64,1), opacity 200ms ease;
}
#bible-picker-backdrop.bp-open #bible-picker-popup {
    transform: scale(1) translateY(0);
    opacity: 1;
}
.bp-header {
    padding: 24px 26px 16px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
}
.bp-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text-main);
    letter-spacing: -0.01em;
    margin-bottom: 2px;
}
.bp-subtitle {
    font-size: 0.68rem;
    color: var(--text-sub);
    opacity: 0.6;
    letter-spacing: 0.02em;
}
.bp-segment-wrap {
    padding: 14px 26px 12px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
}
.bp-segment {
    display: inline-flex;
    background: rgba(0,0,0,0.06);
    border-radius: 100px;
    padding: 3px;
}
.bp-seg-btn {
    padding: 5px 18px;
    font-size: 0.72rem;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.01em;
    color: var(--text-sub);
    background: transparent;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    transition: background 180ms ease, color 180ms ease, box-shadow 180ms ease;
    white-space: nowrap;
}
.bp-seg-btn.active {
    background: rgba(255,255,255,0.92);
    color: var(--text-main);
    box-shadow: 0 1px 4px rgba(0,0,0,0.10);
}
.bp-seg-btn:not(.active):hover { color: var(--text-main); }
.bp-body {
    padding: 10px 14px 14px;
    max-height: 300px;
    overflow-y: auto;
}
.bp-trans-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 150ms ease;
}
.bp-trans-item:hover { background: rgba(0,0,0,0.04); }
.bp-trans-item.active .bp-trans-name {
    font-weight: 700;
    color: var(--highlight);
}
.bp-trans-item.active .bp-trans-check { opacity: 1; }
.bp-trans-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.92rem;
    color: var(--text-main);
    line-height: 1.4;
}
.bp-trans-code {
    font-size: 0.6rem;
    color: var(--text-sub);
    opacity: 0.45;
    margin-top: 1px;
    letter-spacing: 0.04em;
    display: block;
}
.bp-trans-check {
    font-size: 0.85rem;
    color: var(--highlight);
    opacity: 0;
    transition: opacity 150ms;
}
.bp-compare-body {
    padding: 14px 20px 18px;
}
.bp-compare-pair {
    background: rgba(0,0,0,0.025);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.05);
    display: flex;
    flex-direction: row;
}
.bp-compare-col { padding: 12px 16px; flex: 1; min-width: 0; }
.bp-compare-col + .bp-compare-col {
    border-top: none;
    border-left: 1px solid rgba(0,0,0,0.06);
}
.bp-compare-side-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-sub);
    opacity: 0.45;
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
}
.bp-compare-options { display: flex; flex-direction: column; gap: 2px; }
.bp-compare-opt {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 150ms;
}
.bp-compare-opt:hover { background: rgba(0,0,0,0.04); }
.bp-compare-opt.active .bp-compare-opt-name {
    font-weight: 700;
    color: var(--highlight);
}
.bp-compare-opt.active .bp-compare-opt-dot { background: var(--highlight); }
.bp-compare-opt-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(0,0,0,0.12);
    flex-shrink: 0;
    transition: background 150ms;
}
.bp-compare-opt-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.88rem;
    color: var(--text-main);
}
.bp-footer { padding: 0 20px 20px; }
.bp-confirm-btn {
    width: 100%;
    padding: 11px 0;
    background: var(--highlight);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 0.82rem;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: opacity 150ms;
}
.bp-confirm-btn:hover { opacity: 0.88; }
.bp-confirm-btn:active { opacity: 0.75; }
</style>

</head>
<body>

<!-- ══════════════════════════════════════════
     Inspect Popover（本文上に浮かぶ軽量カード）
     DOM最上位に置くことでz-index競合を避ける
     ══════════════════════════════════════════ -->

<div id="inspect-popover" role="tooltip" aria-live="polite">
    <div class="inspect-head">
        <div class="inspect-greek" id="insp-greek">-</div>
        <div class="inspect-ja"    id="insp-ja">-</div>
    </div>
    <div class="inspect-tags" id="insp-tags"></div>
    <div class="inspect-footer">
        <button class="inspect-study-btn" id="insp-study-btn" onclick="escalateToStudy()">
            <span>この語の流れを見る</span>
            <span class="inspect-study-arrow">→</span>
        </button>
    </div>
</div>

<!-- ══════════════════════════════════════════
     Bible Picker Popup

<script>
let abbottSmithDict = null;
let _proximityTokens = [];

/* ══════════════════════════════════════════
   AppState - UI状態の一元管理
   ══════════════════════════════════════════
   設計方針:
     - グローバル状態はすべてここに集約する
     - DOM操作（display切替など）はこのオブジェクトに触れない
       → 実際のDOM操作は各関数が行う
     - 状態を「読む」ことで現在モードを判定できる
     - scroll位置は「Reading に戻る」ときに復元する

   状態遷移:
     reading  → 節クリック  → browsing
     browsing → 語カードクリック → popover表示（modeは browsing のまま）
     browsing → 「詳しく見る」 → study
     study    → 「テキストに戻る」 → reading（scroll復元）
     study    → 「分析に戻る」 → study（params保持・tab記憶）
   ══════════════════════════════════════════ */
const AppState = {
    /* 現在のモード: 'reading' | 'browsing' | 'study' */
    mode: 'reading',

    /* 選択中の節 */
    selectedVerse: {
        vNum:     null,   /* string: 節番号 e.g. "3" */
        elWords:  [],     /* Array: 節内の語形データ */
    },

    /* Inspect スナップショット（選択中の語） */
    inspect: {
        data: null,       /* { greek, strong, jpMorph, rawMorph, lemma, jaWord, desc, ref } */
    },

    /* Study 情報（タブ・params）*/
    study: {
        params: null,     /* _currentAnalysisParams と同内容 */
        tab:    'flow',   /* 最後に表示していたタブ。Study閉じても保持。 */
    },

    /* 空間階層（聖書全体の"場所"） */
    location: {
        testament: null,  /* 'nt' | 'ot' */
        book:      null,  /* e.g. { key:'1CO', name:'コリント人への手紙 第一', ch:16 } */
        chapter:   null,  /* number */
    },

    /* 読書深度スタック */
    depth: {
        stack: [],        /* [ { type, label, verse?, strong? }, ... ] */
    },

    /* 本文スクロール位置（Study閉じたとき復元する） */
    scrollTop: 0,

    /* ── ヘルパー ── */

    /* Reading 状態にリセット（scroll保持・study.tab保持） */
    toReading() {
        this.mode = 'reading';
        this.selectedVerse = { vNum: null, elWords: [] };
        this.inspect.data  = null;
        /* study.params / study.tab はあえて保持する（再開ボタンのため） */
    },

    /* Browsing 状態に移行（節選択後） */
    toBrowsing(vNum, elWords) {
        this.mode = 'browsing';
        this.selectedVerse = { vNum, elWords: elWords || [] };
        this.inspect.data  = null;
    },

    /* Study 状態に移行 */
    toStudy(params, tab) {
        this.mode = 'study';
        this.study.params = params;
        if (tab) this.study.tab = tab;
    },

    /* スクロール位置を保存 */
    saveScroll() {
        const el = document.getElementById('main-reading-area');
        if (el) this.scrollTop = el.scrollTop;
    },

    /* スクロール位置を復元 */
    restoreScroll() {
        const el = document.getElementById('main-reading-area');
        if (el) el.scrollTop = this.scrollTop;
    },

    /* Study が再開できる状態か */
    canReopen() {
        return !!(this.study.params);
    },

    /* depth stack に追加 */
    pushDepth(entry) {
        this.depth.stack.push(entry);
    },

    /* depth stack をクリア */
    clearDepth() {
        this.depth.stack = [];
    },
};

// ギリシャ語データが存在する書物のキーセット
const GREEK_BOOKS = new Set([
    'ROM','1CO','2CO','GAL','EPH','PHP','COL',
    '1TH','2TH','1TI','2TI','TIT','PHM',
    'MAT','MRK','LUK','JHN','ACT',
    'HEB','JAS','1PE','2PE','1JN','2JN','3JN','JUD','REV'
]);

/* ══════════════════════════════════════════
   グローバル breadcrumb（空間ナビゲーション）
   ══════════════════════════════════════════ */
function renderGlobalBreadcrumb() {
    const el = document.getElementById('global-breadcrumb');
    if (!el) return;

    const loc = AppState.location;
    if (!loc.testament) {
        el.innerHTML = '<span class="gbc-item current" style="font-family:\'Noto Serif JP\',serif;">聖書</span>';
        return;
    }

    const testamentLabel = loc.testament === 'nt' ? '新約聖書' : '旧約聖書';
    const items = [];

    /* 聖書全体（testament）- クリックで書物一覧へ */
    items.push(`<button class="gbc-item" onclick="_gbcGoTestament()">${testamentLabel}</button>`);

    if (loc.book) {
        items.push(`<span class="gbc-sep">›</span>`);
        /* 書物 - クリックで章一覧へ */
        items.push(`<button class="gbc-item" onclick="_gbcGoBook()">${loc.book.name}</button>`);
    }

    if (loc.chapter !== null) {
        items.push(`<span class="gbc-sep">›</span>`);
        /* 章 - クリックで現在章を再表示 */
        items.push(`<button class="gbc-item current" onclick="_gbcGoChapter()">${loc.chapter}章</button>`);
    }

    el.innerHTML = items.join('');
}

function _gbcGoTestament() {
    /* サイドバーを書物一覧に戻す */
    sbGoTo(1);
    /* depth stack をクリア */
    AppState.clearDepth();
    renderDepthHistory();
}

function _gbcGoBook() {
    /* サイドバーを章一覧に戻す */
    sbGoTo(2);
    AppState.clearDepth();
    renderDepthHistory();
}

function _gbcGoChapter() {
    /* 現在の章を再表示 */
    if (AppState.location.book && AppState.location.chapter !== null) {
        window.location.href = `?book=${AppState.location.book.key}&ch=${AppState.location.chapter}`;
    }
}

/* ══════════════════════════════════════════
   読書深度スタック（読書の潜水履歴）
   ══════════════════════════════════════════ */

/**
 * depth stack にエントリを追加し、履歴を再描画する。
 * @param {Object} entry - { type, label, verse?, strong? }
 */
function pushDepth(entry) {
    AppState.depth.stack.push(entry);
    renderDepthHistory();
}

/**
 * depth-history パネルを再描画する。
 * 縦並び・左borderで深度感・静かな読書履歴。
 */
function renderDepthHistory() {
    const btn   = document.getElementById('panel-back-btn');
    const label = document.getElementById('panel-back-label');
    if (!btn || !label) return;

    const stack = AppState.depth.stack;
    if (stack.length <= 1) {
        btn.style.display = 'none';
        return;
    }

    const prev = stack[stack.length - 2];
    const backLabel = {
        'reading':      '読書に戻る',
        'verse-flow':   'ことばの流れに戻る',
        'word-flow':    prev.label + ' に戻る',
        'deep-reading': '読解に戻る',
    }[prev.type] || (prev.label + ' に戻る');

    label.textContent = backLabel;
    btn.style.display = 'flex';
}

function panelGoBack() {
    const stack = AppState.depth.stack;
    if (stack.length <= 1) return;
    AppState.depth.stack = stack.slice(0, stack.length - 1);
    const target = AppState.depth.stack[AppState.depth.stack.length - 1];
    restoreContext(target);
    renderDepthHistory();
}


/**
 * depth entry の type に応じて UI を復元する。
 */
function restoreContext(ctx) {
    switch (ctx.type) {
        case 'reading':
            /* パネルを閉じて本文に戻る（スクロール復元あり） */
            _closeStudyPanelInternal();
            break;

        case 'verse-flow':
            /* 節の語形一覧に戻る */
            if (ctx.verse !== undefined && AppState.selectedVerse.elWords) {
                _openWordListInternal(ctx.verse, AppState.selectedVerse.elWords);
            }
            break;

        case 'word-flow':
            /* 語のドロワー展開状態には戻せないが、study panel を開く */
            if (ctx.strong && AppState.inspect.data) {
                const d = AppState.inspect.data;
                openStudyPanel(d.greek, d.rawMorph, d.ref, d.lemma);
            }
            break;

        case 'deep-reading':
            /* 読書メモ（deep reading）に戻る */
            if (AppState.study.params) {
                const p = AppState.study.params;
                openStudyPanel(p.word, p._rawMorph, p.ref, p.lemma);
            }
            break;
    }
}

/* 内部: パネルを閉じてReadingへ（depth stackは変えない） */
function _closeStudyPanelInternal() {
    const sidePanel    = document.getElementById('bottom-depth-panel');
    sidePanel.classList.remove('open');

    const notesWrap = document.getElementById('reading-notes-wrap');
    if (notesWrap) { notesWrap.style.display = 'none'; }
    const notesArea = document.getElementById('reading-notes-area');
    if (notesArea) {
        notesArea.innerHTML = '';
        notesArea.classList.remove('reading-deep-active');
    }

    const area = document.getElementById('analysis-content-area');
    if (area) area.innerHTML = '';

    document.getElementById('open-panel-btn').style.display =
        AppState.canReopen() ? 'block' : 'none';

    const rcb = document.getElementById('rcb-container');
    if (rcb) rcb.classList.remove('visible');

    const listEl = document.getElementById('word-list-view');
    if (listEl) listEl.remove();

    document.querySelectorAll('.verse-block').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('.verse-pair-right').forEach(b => b.classList.remove('selected'));
    document.getElementById('active-v').innerText = '';

    AppState.toReading();
    AppState.restoreScroll();
}

/* 内部: 語形一覧を開く（depth stackは変えない） */
function _openWordListInternal(vNum, words) {
    _wlvWordCache = words || [];
    const sidePanel    = document.getElementById('bottom-depth-panel');
    sidePanel.classList.add('open');
    document.getElementById('open-panel-btn').style.display = 'none';

    const notesWrap = document.getElementById('reading-notes-wrap');
    if (notesWrap) notesWrap.style.display = 'none';
    const notesArea = document.getElementById('reading-notes-area');
    if (notesArea) notesArea.innerHTML = '';

    const rcb = document.getElementById('rcb-container');
    if (rcb) rcb.classList.remove('visible');
    _currentAnalysisParams = null;

    const existing = document.getElementById('word-list-view');
    if (existing) existing.remove();

    const listEl = document.createElement('div');
    listEl.id = 'word-list-view';
    listEl.style.cssText = 'flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0;';

    if (!words.length) {
        listEl.innerHTML = `<p style="color:var(--text-sub);font-size:0.82rem;text-align:center;padding:32px 18px;">この節の語形データがありません</p>`;
        sidePanel.appendChild(listEl);
        return;
    }

    listEl.innerHTML = _buildFlowTabHTML(words);
    sidePanel.appendChild(listEl);
}

const JPN_MAP = {
    pos: { 'V': '動詞', 'N': '名詞', 'A': '形容詞', 'R': '関係代名詞', 'P': '人称代名詞', 'D': '指示代名詞', 'T': '冠詞', 'ADV': '副詞', 'PREP': '前置詞', 'CONJ': '接続詞', 'PRT': '添語' },
    tense: { 'P': '現在', 'I': '未完了', 'F': '未来', 'A': 'アオリスト', 'X': '完了' },
    voice: { 'A': '能動', 'M': '中動', 'P': '受動', 'D': '能動的受動' },
    mood: { 'I': '直説', 'S': '接続', 'O': '希求', 'M': '命令', 'N': '不定', 'P': '分詞' },
    case: { 'N': '主格', 'G': '属格', 'D': '与格', 'A': '対格', 'V': '呼格' },
    gender: { 'M': '男性', 'F': '女性', 'N': '中性' },
    number: { 'S': '単数', 'P': '複数' },
    person: { '1': '1人称', '2': '2人称', '3': '3人称' }
};

async function loadDict() {
    try {
        abbottSmithDict = {};
        const resAbbott = await fetch('./abbott-smith.tsv');
        if (!resAbbott.ok) return;
        const textAbbott = await resAbbott.text();
        textAbbott.split(/\r?\n/).forEach(row => {
            const cols = row.split('\t');
            const strong = String(cols[0]).trim();
            if (strong) {
                abbottSmithDict[strong] = { description: cols[2]?.trim() || "" };
            }
        });
    } catch (e) { console.error("Dict Error:", e); }
}

function decorate(wordText, wordData) {
    const m = wordData;
    const morph = m.morph || "";
    const parts = morph.split('-');
    const pos = parts[0]; 
    let jpMorph = "";
    let styleClass = "";
    let middleStar = "";

    if (pos === 'V' && parts[1]) {
        const off = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off + 0];
        const voiceCode = parts[1][off + 1];
        const moodCode  = parts[1][off + 2];

        if (['M', 'P', 'D'].includes(voiceCode)) {
            middleStar = '<span style="color:var(--highlight); margin-left:2px;">*</span>';
        }

        const t  = JPN_MAP.tense[tenseCode] || "";
        const v  = JPN_MAP.voice[voiceCode]  || "";
        const md = JPN_MAP.mood[moodCode]    || "";

        if (moodCode === 'P') {
            const cng = parts[2]
                ? (JPN_MAP.case[parts[2][0]]   || "") +
                  (JPN_MAP.number[parts[2][1]] || "") +
                  (JPN_MAP.gender[parts[2][2]] || "")
                : "";
            jpMorph = `動詞:分詞${t}${v}${cng ? "(" + cng + ")" : ""}`;
        } else if (moodCode === 'I' || moodCode === 'M') {
            if (tenseCode === 'P') styleClass = "present-text";
            else if (tenseCode === 'A') styleClass = "aorist-text";
            else if (tenseCode === 'X') styleClass = "perfect-text";
            else if (tenseCode === 'F') styleClass = "future-text";
            if (moodCode === 'I') styleClass += " indicative-text";
            else if (moodCode === 'M') styleClass += " imperative-text";
            const person = parts[1].length >= (off + 4) ? (JPN_MAP.person[parts[1][off + 3]] || "") : "";
            const number = parts[1].length >= (off + 5) ? (JPN_MAP.number[parts[1][off + 4]] || "") : "";
            jpMorph = `動詞:${md}${t}${v}${person}${number}`;
        } else {
            const person = parts[1].length >= (off + 4) ? (JPN_MAP.person[parts[1][off + 3]] || "") : "";
            const number = parts[1].length >= (off + 5) ? (JPN_MAP.number[parts[1][off + 4]] || "") : "";
            jpMorph = `動詞:${md}${t}${v}${person}${number}`;
        }
    } else if (['N', 'A', 'R', 'P', 'T', 'D'].includes(pos) && parts[1]) {
        const label = JPN_MAP.pos[pos] || pos;
        let p = "", c = "", n = "", g = "";
        if (['1', '2', '3'].includes(parts[1][0])) {
            p = parts[1][0] + "人称";
            c = JPN_MAP.case[parts[1][1]]   || "";
            n = JPN_MAP.number[parts[1][2]] || "";
        } else {
            c = JPN_MAP.case[parts[1][0]]   || "";
            n = JPN_MAP.number[parts[1][1]] || "";
            g = JPN_MAP.gender[parts[1][2]] || "";
        }
        jpMorph = `${label}:${p}${c}${n}${g}`;
    } else {
        jpMorph = JPN_MAP.pos[pos] || morph;
    }

    const strong = String(m.strong || "").replace(/[^0-9]/g, ""); 
    const jaWord  = m.japanese || m.gloss || (abbottSmithDict && abbottSmithDict[strong]?.japanese) || "？";
    const desc    = m.description || (abbottSmithDict && abbottSmithDict[strong]?.description) || "解説なし";
    const lemma   = String(m.lemma || "").replace(/'/g, "\\'");
    const jaWordE = jaWord.replace(/'/g, "\\'");
    const descE   = desc.replace(/'/g, "\\'").replace(/\n/g, '\\n');
    const ref = m.ref || '';

    // ── Inspect用データをdata属性に持たせる。onclick は showInspect へ ──
    return `<div class="word-card"
                data-greek="${wordText.replace(/"/g,'&quot;')}"
                data-strong="${strong}"
                data-jpmorph="${jpMorph.replace(/"/g,'&quot;')}"
                data-morph="${(m.morph||'').replace(/"/g,'&quot;')}"
                data-lemma="${lemma.replace(/"/g,'&quot;')}"
                data-ja="${jaWordE.replace(/"/g,'&quot;')}"
                data-desc="${descE.replace(/"/g,'&quot;')}"
                data-ref="${ref}"
                onclick="onWordCardClick(this, event)">
                <div>
                    <span class="greek-word ${styleClass}">${wordText}</span>${middleStar}
                    <span style="color:var(--text-sub);font-weight:400;margin-left:6px;font-size:0.82rem;">［${jaWord}］</span>
                    <span class="tag-jp">${jpMorph}</span>
                </div>
                <span class="strong-num">G${strong}</span>
            </div>`;
}

/* ══════════════════════════════════════════
   Inspect Popover 制御
   ══════════════════════════════════════════ */

/*
 * _inspectData は後方互換エイリアス。
 * 実態は AppState.inspect.data。
 * _renderMorphTab / _renderSemanticsTab が直接参照しているため
 * Proxy でリダイレクトする。
 */
const _inspectDataProxy = {
    get greek()    { return AppState.inspect.data?.greek    || ''; },
    get strong()   { return AppState.inspect.data?.strong   || ''; },
    get jpMorph()  { return AppState.inspect.data?.jpMorph  || ''; },
    get rawMorph() { return AppState.inspect.data?.rawMorph || ''; },
    get lemma()    { return AppState.inspect.data?.lemma    || ''; },
    get jaWord()   { return AppState.inspect.data?.jaWord   || ''; },
    get desc()     { return AppState.inspect.data?.desc     || ''; },
    get ref()      { return AppState.inspect.data?.ref      || ''; },
};
/* 後方互換: _inspectData を参照している既存コードが動くよう変数として公開 */
let _inspectData = _inspectDataProxy;

/**
 * word-card クリック時のエントリポイント。
 * Inspect層の責務:
 *   - AppState.inspect.data を更新する
 *   - popover を表示する
 *   - Study panel は開かない（モードを変えない）
 */
function onWordCardClick(cardEl, event) {
    event.stopPropagation();

    const greek   = cardEl.dataset.greek   || '';
    const strong  = cardEl.dataset.strong  || '';
    const jpMorph = cardEl.dataset.jpmorph || '';
    const rawMorph= cardEl.dataset.morph   || '';
    const lemma   = cardEl.dataset.lemma   || '';
    const jaWord  = cardEl.dataset.ja      || '';
    const desc    = cardEl.dataset.desc    || '';
    const ref     = cardEl.dataset.ref     || '';

    /* Inspect 状態を AppState に記録 */
    AppState.inspect.data = { greek, strong, jpMorph, rawMorph, lemma, jaWord, desc, ref };

    showInspectPopover(cardEl, greek, strong, jpMorph, rawMorph, jaWord);
}

function showInspectPopover(anchorEl, greek, strong, jpMorph, rawMorph, jaWord) {
    const popover = document.getElementById('inspect-popover');

    // --- 内容を更新 ---
    document.getElementById('insp-greek').textContent = greek;
    document.getElementById('insp-ja').textContent    = jaWord || '-';

    // 品詞タグ（最大3つ）
    const tagsEl = document.getElementById('insp-tags');
    tagsEl.innerHTML = buildInspectTagsHTML(rawMorph);

    // --- 位置決め ---
    // anchorElのbounding rectから popover を配置する
    const rect = anchorEl.getBoundingClientRect();
    const popW = 220;
    const popH = 130; // 概算

    // デフォルトは anchorEl の右下
    let left = rect.right + 8;
    let top  = rect.top;

    // 右端オーバー対策
    if (left + popW > window.innerWidth - 8) {
        left = rect.left - popW - 8;
    }
    // 下端オーバー対策
    if (top + popH > window.innerHeight - 8) {
        top = window.innerHeight - popH - 8;
    }
    // 上端オーバー対策
    if (top < 8) { top = 8; }

    popover.style.left = left + 'px';
    popover.style.top  = top  + 'px';

    popover.classList.add('visible');
}

function hideInspectPopover() {
    const popover = document.getElementById('inspect-popover');
    popover.classList.remove('visible');
}

/**
 * Inspect → Study へ昇格。
 * popoverの「詳しく見る」ボタンから呼ばれる。
 * 責務:
 *   - popoverを閉じる
 *   - Study.open に制御を移す（AppState.toStudy は openStudyPanel が行う）
 */
function escalateToStudy() {
    if (!AppState.inspect.data) return;
    hideInspectPopover();
    const { greek, rawMorph, ref, lemma, strong } = AppState.inspect.data;

    /* word-flow を depth stack に追加 */
    const stack = AppState.depth.stack;
    const top = stack[stack.length - 1];
    if (!top || top.type !== 'word-flow') {
        pushDepth({
            type:   'word-flow',
            label:  greek,
            strong: String(strong || ''),
        });
    }

    openStudyPanel(greek, rawMorph, ref, lemma);
}

/**
 * Inspect用のヒントHTMLを生成（最大2つ）。
 * 文法用語ではなく「この語がここで何をしているか」を読書感覚で表示。
 */
function buildInspectTagsHTML(rawMorph) {
    const m = parseMorphForSearch(rawMorph);
    const hints = [];

    if (m.pos === 'V') {
        // 法による読書ヒント
        if (m.mood === 'imperative')  hints.push({ label: '強く勧めている', core: true });
        else if (m.mood === 'infinitive') hints.push({ label: '目的・内容を補っている', core: true });
        else if (m.mood === 'participle') hints.push({ label: '背景を描き添えている', core: true });
        else if (m.mood === 'subjunctive') hints.push({ label: '願いや目的を示している', core: true });
        else if (m.mood === 'indicative') hints.push({ label: '事実として語っている', core: true });
        // 時制による読書ヒント
        if (m.tense === 'perfect')    hints.push({ label: '今も続いている', core: false });
        else if (m.tense === 'aorist' && m.mood === 'indicative') hints.push({ label: '一つの出来事として', core: false });
        else if (m.tense === 'future') hints.push({ label: '確かに起きると語っている', core: false });
        // 態による読書ヒント
        if (m.voice === 'passive')    hints.push({ label: '受けとめる側に立っている', core: false });
        else if (m.voice === 'middle' || m.voice === 'middle deponent') hints.push({ label: '深く関わりながら動いている', core: false });
    } else if (m.pos === 'CONJ') {
        const CONJ_HINT = {
            imperative: '強く勧めている',
        };
        hints.push({ label: '流れをつないでいる', core: true });
    } else if (m.pos === 'N' || m.pos === 'A') {
        const CASE_HINT = {
            nominative: '中心にいる',
            genitive:   '結びついている',
            dative:     '関わりを受けている',
            accusative: '動作の向かう先',
            vocative:   '呼びかけられている',
        };
        if (m.case && CASE_HINT[m.case]) hints.push({ label: CASE_HINT[m.case], core: true });
    } else if (['P','R','D'].includes(m.pos)) {
        hints.push({ label: '誰かを指し示している', core: true });
    } else if (m.pos === 'PREP') {
        hints.push({ label: '関係の方向を示している', core: true });
    }

    return hints.slice(0, 2).map(t =>
        `<span class="inspect-tag${t.core ? ' core' : ''}">${t.label}</span>`
    ).join('');
}
