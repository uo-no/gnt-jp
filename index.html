init();

/* ══════════════════════════════════════════
   翻訳モード管理
   ══════════════════════════════════════════ */

/*
 * ディレクトリ移行メモ
 * ─────────────────────────────────────────
 * 旧:
 *   bible_jp/MAT/1.json          … NKJ2017 固定
 *   bible_jp_nkj/MAT/1.json      … NKJ
 *   bible_jp_niv/MAT/1.json      … NIV
 *   bible_jp_esv/MAT/1.json      … ESV
 *
 * 新（translations/ 以下に統一）:
 *   translations/JA1955/MAT/1.json   … 口語訳（JA1955）
 *   translations/KAI17/MAT/1.json    … 新改訳2017
 *   translations/KYO/MAT/1.json      … 新共同訳
 *
 * 移行手順:
 *   1. 旧 bible_jp/     → translations/KAI17/  へコピー
 *   2. 各翻訳ディレクトリ → translations/{ID}/ へコピー
 *   3. 旧ディレクトリは削除可（フォールバックが不要になってから）
 * ─────────────────────────────────────────
 */

/* 翻訳マスター定義
 * ─ TRANS_LIST / TRANS_LABELS はここから自動生成 ─ */
const TRANSLATIONS = {
    'JA1955': { label: '口語訳（1955）',     code: 'JA1955' },
    'BUN': { label: '文語訳',        code: 'BUN'    },
    'KAI17':  { label: '新改訳2017', code: 'KAI17'  },
    'KYO':    { label: '新共同訳',   code: 'KYO'    },
};

/* 後方互換: TRANS_LIST / TRANS_LABELS を TRANSLATIONS から生成 */
const TRANS_LIST   = Object.entries(TRANSLATIONS).map(([id, t]) => ({ id, name: t.label, code: t.code }));
const TRANS_LABELS = Object.fromEntries(Object.entries(TRANSLATIONS).map(([id, t]) => [id, t.label]));

/* アクティブ翻訳（A = メイン / B = 比較列） */
let currentTranslation  = 'KAI17';  /* 単一モード・比較左列 */
let currentTranslationB = 'KYO';    /* 比較右列（UI切替は将来対応） */

/* _transA / _transB は currentTranslation* と同期して動かす（後方互換エイリアス） */
let _transMode = 'single';
let _transA    = currentTranslation;
let _transB    = currentTranslationB;

/*
 * transDataPath — 翻訳IDとbook/chからJSONパスを返す
 *
 * 新パス: translations/{transId}/{book}/{ch}.json
 * フォールバック（旧ディレクトリが残っている移行期用）:
 *   NKJ2017 → bible_jp/{book}/{ch}.json
 *   他      → bible_jp_{transId.toLowerCase()}/{book}/{ch}.json
 */
function transDataPath(transId, book, ch) {
    /* 新構造が整っていればこちらを使う */
    return `./translations/${transId}/${book}/${ch}.json`;
}

/* フォールバック用（旧ディレクトリ構造）*/
function _transDataPathLegacy(transId, book, ch) {
    if (!transId || transId === 'KAI17') return `./bible_jp/${book}/${ch}.json`;
    return `./bible_jp_${transId.toLowerCase()}/${book}/${ch}.json`;
}

/*
 * _fetchTranslation — 新パス → 旧パスの順で試みる
 *   loadBook(book, translation) のエイリアスとして機能する。
 *
 *   新パス優先で fetch し、404 なら旧ディレクトリへフォールバック。
 *   両方失敗した場合は null を返す。
 */
async function _fetchTranslation(transId, book, ch) {
    /* ① 新パス: translations/{transId}/{book}/{ch}.json */
    try {
        const res = await fetch(transDataPath(transId, book, ch));
        if (res.ok) return await res.json();
    } catch(e) {}

    /* ② 旧パスへフォールバック（移行期のみ有効） */
    try {
        const res2 = await fetch(_transDataPathLegacy(transId, book, ch));
        if (res2.ok) return await res2.json();
    } catch(e) {}

    return null;
}

/*
 * loadBook — 汎用ブック読み込み関数
 *   loadBook('JHN')                  … currentTranslation で読み込み
 *   loadBook('JHN', 'NKJ2017')       … 指定翻訳で読み込み
 *   loadBook('JHN', 'NKJ')           … 口語訳等を明示指定
 */
async function loadBook(book, translation = currentTranslation) {
    const ch = AppState.location.chapter || 1;
    return await _fetchTranslation(translation, book, String(ch));
}

function _applyTransMode(mode) {
    _transMode = mode;
    const area = document.getElementById('main-reading-area');
    if (mode === 'compare') {
        area.classList.remove('single-mode');
        area.classList.add('compare-mode');
    } else {
        area.classList.remove('compare-mode');
        area.classList.add('single-mode');
    }
    _updateColHeaders();
}

function _updateColHeaders() {
    const hA = document.getElementById('trans-col-header-a');
    const hB = document.getElementById('trans-col-header-b');
    /* TRANSLATIONS から label を引く。未定義なら id をそのまま表示 */
    if (hA) hA.textContent = (TRANSLATIONS[_transA] || {}).label || _transA;
    if (hB) hB.textContent = (TRANSLATIONS[_transB] || {}).label || _transB;
}

/* ══════════════════════════════════════════
   Bible Picker Popup
   ══════════════════════════════════════════ */
let _bpMode = 'single';
let _bpSelA = 'KAI17';
let _bpSelB = 'KYO';

function openBiblePicker() {
    _bpMode = _transMode;
    _bpSelA = _transA;
    _bpSelB = _transB;
    _bpRenderSingle();
    _bpRenderCompare();
    _bpApplyMode(_bpMode);
    const bd = document.getElementById('bible-picker-backdrop');
    bd.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => bd.classList.add('bp-open')));
}

function closeBiblePicker() {
    const bd = document.getElementById('bible-picker-backdrop');
    bd.classList.remove('bp-open');
    bd.addEventListener('transitionend', () => { bd.style.display = 'none'; }, { once: true });
}

function bpBackdropClick(e) {
    if (e.target === document.getElementById('bible-picker-backdrop')) closeBiblePicker();
}

function bpSwitchMode(mode) {
    _bpMode = mode;
    _bpApplyMode(mode);
}

function _bpApplyMode(mode) {
    document.getElementById('bp-seg-single').classList.toggle('active', mode === 'single');
    document.getElementById('bp-seg-compare').classList.toggle('active', mode === 'compare');
    document.getElementById('bp-single-body').style.display  = mode === 'single'  ? 'block' : 'none';
    document.getElementById('bp-compare-body').style.display = mode === 'compare' ? 'block' : 'none';
}

function _bpRenderSingle() {
    document.getElementById('bp-single-body').innerHTML = TRANS_LIST.map(t =>
        `<div class="bp-trans-item${t.id === _bpSelA ? ' active' : ''}" onclick="bpSelectA('${t.id}')">
            <div>
                <span class="bp-trans-name">${t.name}</span>
                <span class="bp-trans-code">${t.code}</span>
            </div>
            <span class="bp-trans-check">✓</span>
        </div>`
    ).join('');
}

function _bpRenderCompare() {
    document.getElementById('bp-col-a').innerHTML = TRANS_LIST.map(t =>
        `<div class="bp-compare-opt${t.id === _bpSelA ? ' active' : ''}" onclick="bpSelectA('${t.id}')">
            <span class="bp-compare-opt-dot"></span>
            <span class="bp-compare-opt-name">${t.name}</span>
        </div>`
    ).join('');
    document.getElementById('bp-col-b').innerHTML = TRANS_LIST.map(t =>
        `<div class="bp-compare-opt${t.id === _bpSelB ? ' active' : ''}" onclick="bpSelectB('${t.id}')">
            <span class="bp-compare-opt-dot"></span>
            <span class="bp-compare-opt-name">${t.name}</span>
        </div>`
    ).join('');
}

function bpSelectA(id) {
    _bpSelA = id;
    _bpRenderSingle();
    _bpRenderCompare();
}

function bpSelectB(id) {
    _bpSelB = id;
    _bpRenderCompare();
}

function bpConfirm() {
    _transA = _bpSelA;
    _transB = _bpSelB;
    /* currentTranslation* を _transA/B と常に同期させる */
    currentTranslation  = _transA;
    currentTranslationB = _transB;
    _applyTransMode(_bpMode);
    closeBiblePicker();
    renderCurrentPage();
}
</script>
