<script>
let abbottSmithDict = null;
let _proximityTokens = [];

/* ══════════════════════════════════════════
   翻訳マスター定義（TDZ対策：先頭で宣言）
   ══════════════════════════════════════════ */
const TRANSLATIONS = {
    'JA1955': { label: '口語訳（1955）',     code: 'JA1955' },
    'BUN':    { label: '文語訳',             code: 'BUN'    },
    'KAI17':  { label: '新改訳2017',         code: 'KAI17'  },
    'KYO':    { label: '聖書協会共同訳',     code: 'KYO'    },
    'FLOW':   { label: '読解フロー',         code: 'FLOW'   },
};
const TRANS_LIST   = Object.entries(TRANSLATIONS).map(([id, t]) => ({ id, name: t.label, code: t.code }));
const TRANS_LABELS = Object.fromEntries(Object.entries(TRANSLATIONS).map(([id, t]) => [id, t.label]));

/* アクティブ翻訳（A = メイン / B = 比較列） */
let currentTranslation  = 'JA1955';
let currentTranslationB = 'BUN';

/* _transA / _transB は currentTranslation* と同期して動かす（後方互換エイリアス） */
let _transMode   = 'single';
let _transA      = currentTranslation;
let _transB      = currentTranslationB;
let _rightMode   = 'trans'; // 'trans' | 'flow'
let _cachedElByVerse = {};
let _cachedJpDataB   = null;
    
/* ══════════════════════════════════════════
   AppState - UI状態の一元管理
   ══════════════════════════════════════════
   設計方針:
     - グローバル状態はすべてここに集約する
     - DOM操作（display切替など）はこのオブジェクトに触れない
       → 実際のDOM操作は各関数が行う
     - 状態を「読む」ことで現在モードを判定できる
     - scroll位置は「Reading に戻る」ときに復元する

   状態遷移:
     reading  → 節クリック  → browsing
     browsing → 語カードクリック → popover表示（modeは browsing のまま）
     browsing → 「詳しく見る」 → study
     study    → 「テキストに戻る」 → reading（scroll復元）
     study    → 「分析に戻る」 → study（params保持・tab記憶）
   ══════════════════════════════════════════ */
const AppState = {
    /* 現在のモード: 'reading' | 'browsing' | 'study' */
    mode: 'reading',

    /* 選択中の節 */
    selectedVerse: {
        vNum:     null,   /* string: 節番号 e.g. "3" */
        elWords:  [],     /* Array: 節内の語形データ */
    },

    /* Inspect スナップショット（選択中の語） */
    inspect: {
        data: null,       /* { greek, strong, jpMorph, rawMorph, lemma, jaWord, desc, ref } */
    },

    /* Study 情報（タブ・params）*/
    study: {
        params: null,     /* _currentAnalysisParams と同内容 */
        tab:    'flow',   /* 最後に表示していたタブ。Study閉じても保持。 */
    },

    /* 空間階層（聖書全体の"場所"） */
    location: {
        testament: null,  /* 'nt' | 'ot' */
        book:      null,  /* e.g. { key:'1CO', name:'コリント人への手紙 第一', ch:16 } */
        chapter:   null,  /* number */
    },

    /* 読書深度スタック */
    depth: {
        stack: [],        /* [ { type, label, verse?, strong? }, ... ] */
    },

    /* 本文スクロール位置（Study閉じたとき復元する） */
    scrollTop: 0,

    /* ── ヘルパー ── */

    /* Reading 状態にリセット（scroll保持・study.tab保持） */
    toReading() {
        this.mode = 'reading';
        this.selectedVerse = { vNum: null, elWords: [] };
        this.inspect.data  = null;
        /* study.params / study.tab はあえて保持する（再開ボタンのため） */
    },

    /* Browsing 状態に移行（節選択後） */
    toBrowsing(vNum, elWords) {
        this.mode = 'browsing';
        this.selectedVerse = { vNum, elWords: elWords || [] };
        this.inspect.data  = null;
    },

    /* Study 状態に移行 */
    toStudy(params, tab) {
        this.mode = 'study';
        this.study.params = params;
        if (tab) this.study.tab = tab;
    },

    /* スクロール位置を保存 */
    saveScroll() {
        const el = document.getElementById('main-reading-area');
        if (el) this.scrollTop = el.scrollTop;
    },

/* スクロール位置を復元 */
    restoreScroll() {
        const el = document.getElementById('main-reading-area');
        if (el) el.scrollTop = this.scrollTop;
    },

    /* Study が再開できる状態か */
    canReopen() {
        return !!(this.study.params);
    },

    /* depth stack に追加 */
    pushDepth(entry) {
        this.depth.stack.push(entry);
    },

    /* depth stack をクリア */
    clearDepth() {
        this.depth.stack = [];
    },
};

function syncUrlState() {
    const url = new URL(window.location);

    url.searchParams.set('book', AppState.location.book.key);
    url.searchParams.set('ch', AppState.location.chapter);

    if (typeof _transA !== 'undefined') {
        url.searchParams.set('transA', _transA);
    }

    if (typeof _transB !== 'undefined') {
        url.searchParams.set('transB', _transB);
    }

    if (typeof _transMode !== 'undefined') {
        url.searchParams.set('mode', _transMode);
    }

    history.replaceState(null, '', url);
}

// ギリシャ語データが存在する書物のキーセット
const GREEK_BOOKS = new Set([
    // 新約
    'ROM','1CO','2CO','GAL','EPH','PHP','COL',
    '1TH','2TH','1TI','2TI','TIT','PHM',
    'MAT','MRK','LUK','JHN','ACT',
    'HEB','JAS','1PE','2PE','1JN','2JN','3JN','JUD','REV',
    // 旧約（LXXデータがある書物）
    'GEN','EXO','LEV','NUM','DEU','JOS','JDG','RUT',
    '1SA','2SA','1KI','2KI','1CH','2CH',
    'EZR','NEH','EST','JOB','PSA','PRO','ECC','SNG',
    'ISA','JER','LAM','EZK','DAN',
    'HOS','JOL','AMO','OBA','JON','MIC','NAH','HAB','ZEP','HAG','ZEC','MAL',
]);

/* ══════════════════════════════════════════
   グローバル breadcrumb（空間ナビゲーション）
   ══════════════════════════════════════════ */
function renderGlobalBreadcrumb() {
    const el = document.getElementById('global-breadcrumb');
    if (!el) return;

    const loc = AppState.location;
    if (!loc.testament) {
        el.innerHTML = '<span class="gbc-item current" style="font-family:\'Noto Serif JP\',serif;">聖書</span>';
        return;
    }

    const testamentLabel = loc.testament === 'nt' ? '新約聖書' : '旧約聖書';
    const items = [];

    /* 聖書全体（testament）- クリックで書物一覧へ */
    items.push(`<button class="gbc-item" onclick="_gbcGoTestament()">${testamentLabel}</button>`);

    if (loc.book) {
        items.push(`<span class="gbc-sep">›</span>`);
        /* 書物 - クリックで章一覧へ */
        items.push(`<button class="gbc-item" onclick="_gbcGoBook()">${loc.book.name}</button>`);
    }

    if (loc.chapter !== null) {
        items.push(`<span class="gbc-sep">›</span>`);
        /* 章 - クリックで現在章を再表示 */
        items.push(`<button class="gbc-item current" onclick="_gbcGoChapter()">${loc.chapter}章</button>`);
    }

    el.innerHTML = items.join('');
}

function _gbcGoTestament() {
    /* サイドバーを書物一覧に戻す */
    sbGoTo(1);
    /* depth stack をクリア */
    AppState.clearDepth();
    renderDepthHistory();
}

function _gbcGoBook() {
    /* サイドバーを章一覧に戻す */
    sbGoTo(2);
    AppState.clearDepth();
    renderDepthHistory();
}

/* ══════════════════════════════════════════
   ナビゲーションヘルパー
   翻訳選択（transA/transB/mode）を保持したまま遷移する
   ══════════════════════════════════════════ */
/* _navTo は別ページ遷移のため変更禁止 - 修正なし */
function _navTo(book, ch) {
    const p = new URLSearchParams();
    p.set('book', book);
    p.set('ch',   String(ch));
    p.set('transA', _transA);
    p.set('transB', _transB);
    p.set('mode',   _transMode);
    window.location.href = '?' + p.toString();
}

function _gbcGoChapter() {
    /* 現在の章を再表示 */
    if (AppState.location.book && AppState.location.chapter !== null) {
        _navTo(AppState.location.book.key, AppState.location.chapter);
    }
}

/* ══════════════════════════════════════════
   読書深度スタック（読書の潜水履歴）
   ══════════════════════════════════════════ */

/**
 * depth stack にエントリを追加し、履歴を再描画する。
 * @param {Object} entry - { type, label, verse?, strong? }
 */
function pushDepth(entry) {
    AppState.depth.stack.push(entry);
    renderDepthHistory();
}

/**
 * depth-history パネルを再描画する。
 * 縦並び・左borderで深度感・静かな読書履歴。
 */
function renderDepthHistory() {
    const btn   = document.getElementById('panel-back-btn');
    const label = document.getElementById('panel-back-label');
    if (!btn || !label) return;

    const stack = AppState.depth.stack;
    if (stack.length <= 1) {
        btn.style.display = 'none';
        /* モバイル：本文に戻るラベルに戻す */
        const mbl = document.getElementById('mobile-panel-back-label');
        if (mbl) {
            const _loc2 = AppState.location;
            mbl.textContent = _bookChapterLabel(_loc2);
        }
        return;
    }

    let prevIdx = stack.length - 2;
    while (prevIdx > 0 && stack[prevIdx].type === 'word-flow') {
        prevIdx--;
    }
    const prev = stack[prevIdx];

    const _loc = AppState.location;
    const _chapterLabel = _bookChapterLabel(_loc);

    const _verseFlowLabel = (prev.type === 'verse-flow' && prev.verse && _loc.book && _loc.chapter !== null)
        ? ((BOOK_SHORT[_loc.book.key] || _loc.book.name) + _loc.chapter + '章' + prev.verse + '節')
        : 'フロー';
    const backLabel = {
        'reading':      _chapterLabel,
        'verse-flow':   _verseFlowLabel,
        'deep-reading': '読解',
    }[prev.type] || (prev.label || '戻る');

    label.textContent = backLabel;
    btn.style.display = 'flex';


    /* モバイル：同じラベルをナビバーにも反映（デスクトップと同じラベルを使用） */
    const mobileBackLabel = document.getElementById('mobile-panel-back-label');
    if (mobileBackLabel) {
        mobileBackLabel.textContent = backLabel;
    }
}

function panelGoBack() {
    const stack = AppState.depth.stack;
    if (stack.length <= 1) return;

    /* word-flow はスキップして、意味あるエントリまで一気に戻る */
    let targetIdx = stack.length - 2;
    while (targetIdx > 0 && stack[targetIdx].type === 'word-flow') {
        targetIdx--;
    }
    AppState.depth.stack = stack.slice(0, targetIdx + 1);
    const target = AppState.depth.stack[AppState.depth.stack.length - 1];
    restoreContext(target);
    renderDepthHistory();
}


/**
 * depth entry の type に応じて UI を復元する。
 */
function restoreContext(ctx) {
    switch (ctx.type) {
        case 'reading':
            /* パネルを閉じて本文に戻る（スクロール復元あり） */
            _closeStudyPanelInternal();
            break;

        case 'verse-flow':
            /* 節の語形一覧に戻る */
            if (ctx.verse !== undefined && AppState.selectedVerse.elWords) {
                _openWordListInternal(ctx.verse, AppState.selectedVerse.elWords);
            }
            break;

        case 'word-flow':
            if (ctx.strong && AppState.inspect.data) {
                const d = AppState.inspect.data;
                openStudyPanel(
                    d.greek,
                    d.rawMorph,
                    d.ref,
                    d.lemma,
                    { skipDepthPush: true }
                );
            }
            break;
        
        case 'deep-reading':
            if (AppState.study.params) {
                const p = AppState.study.params;
                openStudyPanel(
                    p.word,
                    p._rawMorph,
                    p.ref,
                    p.lemma,
                    { skipDepthPush: true }
                );
            }
            break;
    }
}

/* 内部: パネルを閉じてReadingへ（depth stackは変えない） */
function _closeStudyPanelInternal() {
    const sidePanel    = document.getElementById('bottom-depth-panel');
    sidePanel.classList.remove('open');

    const notesWrap = document.getElementById('reading-notes-wrap');
    if (notesWrap) { notesWrap.style.display = 'none'; }
    const notesArea = document.getElementById('reading-notes-area');
    if (notesArea) {
        notesArea.innerHTML = '';
        notesArea.classList.remove('reading-deep-active');
    }

    const area = document.getElementById('analysis-content-area');
    if (area) area.innerHTML = '';

    document.getElementById('open-panel-btn').style.display =
        AppState.canReopen() ? 'block' : 'none';

    const rcb = document.getElementById('rcb-container');
    if (rcb) rcb.classList.remove('visible');

    const listEl = document.getElementById('word-list-view');
    if (listEl) listEl.remove();

    document.querySelectorAll('.verse-block').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('.verse-pair-right').forEach(b => b.classList.remove('selected'));
    document.getElementById('active-v').innerText = '';

    /* モバイル：スライドアウトアニメーションで本文に戻る */
    document.getElementById('app').classList.remove('mobile-study-open');

    /* モバイル：スワイプ途中で残ったtransformを確実にリセット */
    const mainAreaEl = document.getElementById('main-reading-area');
    if (mainAreaEl) {
        mainAreaEl.style.transform = '';
        mainAreaEl.style.opacity   = '';
        mainAreaEl.style.transition = '';
    }
    const panelEl = document.getElementById('bottom-depth-panel');
    if (panelEl) {
        panelEl.style.transform = '';
        panelEl.style.transition = '';
    }

    /* モバイルナビバーを非表示 */
    const navBar = document.getElementById('mobile-nav-bar');
    if (navBar) navBar.style.display = 'none';

    AppState.toReading();
    AppState.restoreScroll();
}

/* ── モバイル専用：フルスクリーン切り替えヘルパー ── */
function _isMobile() {
    return window.innerWidth <= 900;
}

/* Study Panel を開くとき、モバイルではスライドイン遷移を起動 */
function _mobileOpenPanel(titleText) {
    if (_isMobile()) {
        document.getElementById('app').classList.add('mobile-study-open');

        /* モバイルナビバーの表示 */
        const navBar = document.getElementById('mobile-nav-bar');
        if (navBar) navBar.style.display = 'flex';

        /* タイトル更新 */
        const navTitle = document.getElementById('mobile-nav-title');
        if (navTitle) navTitle.textContent = titleText || '語を読む';

        /* 戻るラベル：stack があれば前の画面名、なければ節番号 */
        const backLabel = document.getElementById('mobile-panel-back-label');
        if (backLabel) {
            const stack = AppState.depth.stack;
            const prev = stack.length > 1 ? stack[stack.length - 2] : null;
            if (prev && prev.type === 'verse-flow') {
                const vNum = AppState.selectedVerse.vNum;
                const _loc3 = AppState.location;
                const short = _loc3.book ? (BOOK_SHORT[_loc3.book.key] || _loc3.book.name) : '';
                backLabel.textContent = (short && _loc3.chapter && vNum)
                    ? short + _loc3.chapter + '章' + vNum + '節'
                    : '一覧';
            } else if (prev && prev.type === 'reading') {
                const _loc4 = AppState.location;
                backLabel.textContent = _bookChapterLabel(_loc4);
            } else {
                const _loc5 = AppState.location;

const JPN_MAP = {
    pos: { 'V': '動詞', 'N': '名詞', 'A': '形容詞', 'R': '関係代名詞', 'P': '人称代名詞', 'D': '指示代名詞', 'T': '冠詞', 'ADV': '副詞', 'PREP': '前置詞', 'CONJ': '接続詞', 'PRT': '添語' },
    tense: { 'P': '現在', 'I': '未完了', 'F': '未来', 'A': 'アオリスト', 'X': '完了' },
    voice: { 'A': '能動', 'M': '中動', 'P': '受動', 'D': '能動的受動' },
    mood: { 'I': '直説', 'S': '接続', 'O': '希求', 'M': '命令', 'N': '不定', 'P': '分詞' },
    case: { 'N': '主格', 'G': '属格', 'D': '与格', 'A': '対格', 'V': '呼格' },
    gender: { 'M': '男性', 'F': '女性', 'N': '中性' },
    number: { 'S': '単数', 'P': '複数' },
    person: { '1': '1人称', '2': '2人称', '3': '3人称' }
};

async function loadDict() {
    try {
        abbottSmithDict = {};
        const resAbbott = await fetch('./abbott-smith.tsv');
        if (!resAbbott.ok) return;
        const textAbbott = await resAbbott.text();
        textAbbott.split(/\r?\n/).forEach(row => {
            const cols = row.split('\t');
            const strong = String(cols[0]).trim();
            if (strong) {
                abbottSmithDict[strong] = { description: cols[2]?.trim() || "" };
            }
        });
    } catch (e) { console.error("Dict Error:", e); }
}

function decorate(wordText, wordData) {
    const m = wordData;
    const morph = m.morph || "";
    const parts = morph.split('-');
    const pos = parts[0]; 
    let jpMorph = "";
    let styleClass = "";
    let middleStar = "";

    if (pos === 'V' && parts[1]) {
        const off = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off + 0];
        const voiceCode = parts[1][off + 1];
        const moodCode  = parts[1][off + 2];

        if (['M', 'P', 'D'].includes(voiceCode)) {
            middleStar = '<span style="color:var(--highlight); margin-left:2px;">*</span>';
        }

        const t  = JPN_MAP.tense[tenseCode] || "";
        const v  = JPN_MAP.voice[voiceCode]  || "";
        const md = JPN_MAP.mood[moodCode]    || "";

        if (moodCode === 'P') {
            const cng = parts[2]
                ? (JPN_MAP.case[parts[2][0]]   || "") +
                  (JPN_MAP.number[parts[2][1]] || "") +
                  (JPN_MAP.gender[parts[2][2]] || "")
                : "";
            jpMorph = `動詞:分詞${t}${v}${cng ? "(" + cng + ")" : ""}`;
        } else if (moodCode === 'I' || moodCode === 'M') {
            if (tenseCode === 'P') styleClass = "present-text";
            else if (tenseCode === 'A') styleClass = "aorist-text";
            else if (tenseCode === 'X') styleClass = "perfect-text";
            else if (tenseCode === 'F') styleClass = "future-text";
            if (moodCode === 'I') styleClass += " indicative-text";
            else if (moodCode === 'M') styleClass += " imperative-text";
            const person = parts[1].length >= (off + 4) ? (JPN_MAP.person[parts[1][off + 3]] || "") : "";
            const number = parts[1].length >= (off + 5) ? (JPN_MAP.number[parts[1][off + 4]] || "") : "";
            jpMorph = `動詞:${md}${t}${v}${person}${number}`;
        } else {
            const person = parts[1].length >= (off + 4) ? (JPN_MAP.person[parts[1][off + 3]] || "") : "";
            const number = parts[1].length >= (off + 5) ? (JPN_MAP.number[parts[1][off + 4]] || "") : "";
            jpMorph = `動詞:${md}${t}${v}${person}${number}`;
        }
    } else if (['N', 'A', 'R', 'P', 'T', 'D'].includes(pos) && parts[1]) {
        const label = JPN_MAP.pos[pos] || pos;
        let p = "", c = "", n = "", g = "";
        if (['1', '2', '3'].includes(parts[1][0])) {
            p = parts[1][0] + "人称";
            c = JPN_MAP.case[parts[1][1]]   || "";
            n = JPN_MAP.number[parts[1][2]] || "";
        } else {
            c = JPN_MAP.case[parts[1][0]]   || "";
            n = JPN_MAP.number[parts[1][1]] || "";
            g = JPN_MAP.gender[parts[1][2]] || "";
        }
        jpMorph = `${label}:${p}${c}${n}${g}`;
    } else {
        jpMorph = JPN_MAP.pos[pos] || morph;
    }

    const strong = String(m.strong || "").replace(/[^0-9]/g, ""); 
    const jaWord  = m.gloss || m.lemma || "-";
    const desc    = m.description || (abbottSmithDict && abbottSmithDict[strong]?.description) || "解説なし";
    const lemma   = String(m.lemma || "").replace(/'/g, "\\'");
    const jaWordE = jaWord.replace(/'/g, "\\'");
    const descE   = desc.replace(/'/g, "\\'").replace(/\n/g, '\\n');
    const ref = m.ref || '';

    // ── Inspect用データをdata属性に持たせる。onclick は showInspect へ ──
    return `<div class="word-card"
                data-greek="${wordText.replace(/"/g,'&quot;')}"
                data-strong="${strong}"
                data-jpmorph="${jpMorph.replace(/"/g,'&quot;')}"
                data-morph="${(m.morph||'').replace(/"/g,'&quot;')}"
                data-lemma="${lemma.replace(/"/g,'&quot;')}"
                data-ja="${jaWordE.replace(/"/g,'&quot;')}"
                data-desc="${descE.replace(/"/g,'&quot;')}"
                data-ref="${ref}"
                onclick="onWordCardClick(this, event)">
                <div>
                    <span class="greek-word ${styleClass}">${wordText}</span>${middleStar}
                    <span style="color:var(--text-sub);font-weight:400;margin-left:6px;font-size:0.82rem;">［${jaWord}］</span>
                    <span class="tag-jp">${jpMorph}</span>
                </div>
                <span class="strong-num">G${strong}</span>
            </div>`;
}

/**

 * Inspect層の責務:

function onWordCardClick(cardEl, event) {

function showInspectPopover(anchorEl, greek, strong, jpMorph, rawMorph, jaWord) {
    const popover = document.getElementById('inspect-popover');

    // --- 位置決め用 rect を DOM 変更前に読む（forced reflow 防止） ---
    const rect = anchorEl.getBoundingClientRect();

    // --- 内容を更新 ---
    document.getElementById('insp-greek').textContent = greek;
    document.getElementById('insp-ja').textContent    = jaWord || '-';

    // 品詞タグ（最大3つ）
    const tagsEl = document.getElementById('insp-tags');
    tagsEl.innerHTML = buildInspectTagsHTML(rawMorph);

    // --- 位置決め ---
    const popW = 220;
    const popH = 130; // 概算

    // デフォルトは anchorEl の右下
    let left = rect.right + 8;
    let top  = rect.top;

    // 右端オーバー対策
    if (left + popW > window.innerWidth - 8) {
        left = rect.left - popW - 8;
    }
    // 下端オーバー対策
    if (top + popH > window.innerHeight - 8) {
        top = window.innerHeight - popH - 8;
    }
    // 上端オーバー対策
    if (top < 8) { top = 8; }

    popover.style.left = left + 'px';
    popover.style.top  = top  + 'px';

    popover.classList.add('visible');

    /* onboarding hook */
    if (window.AppOnboarding) window.AppOnboarding.onPopoverShown(anchorEl);
}

function hideInspectPopover() {
    const popover = document.getElementById('inspect-popover');
    popover.classList.remove('visible');
}

/**
 * Inspect → Study へ昇格。
 * popoverの「詳しく見る」ボタンから呼ばれる。
 * 責務:
 *   - popoverを閉じる
 *   - Study.open に制御を移す（AppState.toStudy は openStudyPanel が行う）
 */
function escalateToStudy() {
    if (!AppState.inspect.data) return;
    hideInspectPopover();
    const { greek, rawMorph, ref, lemma, strong } = AppState.inspect.data;

    /* word-flow を depth stack に追加 */
    const stack = AppState.depth.stack;
    const top = stack[stack.length - 1];
    if (!top || top.type !== 'word-flow') {
        pushDepth({
            type:   'word-flow',
            label:  greek,
            strong: String(strong || ''),
        });
    }

    openStudyPanel(greek, rawMorph, ref, lemma);
}

/**
 * Inspect用のヒントHTMLを生成（最大2つ）。
 * 文法用語ではなく「この語がここで何をしているか」を読書感覚で表示。
 */
function buildInspectTagsHTML(rawMorph) {
    const m = parseMorphForSearch(rawMorph);
    const hints = [];

    if (m.pos === 'V') {
        // 法による読書ヒント
        if (m.mood === 'imperative')  hints.push({ label: '強く勧めている', core: true });
        else if (m.mood === 'infinitive') hints.push({ label: '目的・内容を補っている', core: true });
        else if (m.mood === 'participle') hints.push({ label: '背景を描き添えている', core: true });
        else if (m.mood === 'subjunctive') hints.push({ label: '願いや目的を示している', core: true });
        else if (m.mood === 'indicative') hints.push({ label: '事実として語っている', core: true });
        // 時制による読書ヒント
        if (m.tense === 'perfect')    hints.push({ label: '今も続いている', core: false });
        else if (m.tense === 'aorist' && m.mood === 'indicative') hints.push({ label: '一つの出来事として', core: false });
        else if (m.tense === 'future') hints.push({ label: '確かに起きると語っている', core: false });
        // 態による読書ヒント
        if (m.voice === 'passive')    hints.push({ label: '受けとめる側に立っている', core: false });
        else if (m.voice === 'middle' || m.voice === 'middle deponent') hints.push({ label: '深く関わりながら動いている', core: false });
    } else if (m.pos === 'CONJ') {
        const CONJ_HINT = {
            imperative: '強く勧めている',
        };
        hints.push({ label: '流れをつないでいる', core: true });
    } else if (m.pos === 'N' || m.pos === 'A') {
        const CASE_HINT = {
            nominative: '中心にいる',
            genitive:   '結びついている',
            dative:     '関わりを受けている',
            accusative: '動作の向かう先',
            vocative:   '呼びかけられている',
        };
        if (m.case && CASE_HINT[m.case]) hints.push({ label: CASE_HINT[m.case], core: true });
    } else if (['P','R','D'].includes(m.pos)) {
        hints.push({ label: '誰かを指し示している', core: true });
    } else if (m.pos === 'PREP') {
        hints.push({ label: '関係の方向を示している', core: true });
    }

    return hints.slice(0, 2).map(t =>
        `<span class="inspect-tag${t.core ? ' core' : ''}">${t.label}</span>`
    ).join('');
}

/* ══════════════════════════════════════════
   _renderReadingNotes
   タブなし・単一スクロール・読書メモ方式。
   flow signal → 読書感覚の自然文 → 原語深読み（折りたたみ）
   ══════════════════════════════════════════ */
function _renderReadingNotes(p) {
    const area = document.getElementById('reading-notes-area');
    if (!area) return;
    area.scrollTop = 0;

    const word   = p.word   || '-';
    const pos    = p.pos    || '';
    const mood   = p.mood   || '';
    const tense  = p.tense  || '';
    const voice  = p.voice  || '';
    const ref    = p.ref    || '';
    const lemma  = p.lemma  || '';
    const jaWord = (AppState.inspect.data?.jaWord) || '';
    const strong = String(AppState.inspect.data?.strong || '').replace(/[^0-9]/g,'');
    const desc   = (AppState.inspect.data?.desc) || (abbottSmithDict && abbottSmithDict[strong]?.description) || '';
    const w      = jaWord ? `「${jaWord}」` : 'この語';

    /* ═══════════════════════════════════════════════════════
       Reading prose - 唯一の層。
       grammar / lexical nuance / discourse motion を
       「文章の空気」として書く。
       説明しない。感じさせる。
       Layer 1 / Layer 2 の区別なし。一つの連続した文章。
       ═══════════════════════════════════════════════════════ */

    const prose = [];

    /* ── 接続詞：流れの転換を一文で ── */
    if (pos === 'CONJ') {
        const CONJ_AIR = {
            'γάρ':  `前の言葉を受けながら、${w}とともに理由の説明へと入っていきます。前の主張が宙に浮いていたとすれば、ここで地に足がつきます。`,
            'ἀλλά': `${w}がここに置かれることで、前の流れが切り替わります。対比として響き、調子がはっきりと変わる場所です。`,
            'οὖν':  `前の節で積み重ねられてきたものが、${w}とともに収束します。結論へ向かう動きが始まる場所です。`,
            'δέ':   `${w}とともに、話が次の段階へ自然に進んでいます。強い転換ではなく、静かな展開です。`,
            'καί':  `内容が積み重なりながら続いています。${w}が繰り返されるとき、強調の働きをすることもあります。`,
            'ἵνα':  `${w}の先に、著者がどこへ向かっているかが見えてきます。目的として語られる内容がここから始まります。`,
            'ὅτι':  `${w}から、前の言葉の内容か根拠が語られます。何が主張され、何がその理由かを読み分ける場所です。`,
            'εἰ':   `仮定の前提が始まります。「もし〜ならば」という条件の上で、議論が展開していきます。`,
            'ὥστε': `前に語られたことを受けて、その帰結が続きます。論理の流れが結果へと着地する場所です。`,
        };
        prose.push(CONJ_AIR[word] || `前後をつなぎながら、議論の流れを形作っています。`);
    }

    /* ── 動詞：法・時制・態を一つの読書感覚として ── */
    if (pos === 'V') {
        if (mood === 'imperative') {
            if (tense === 'present') {
                prose.push(`${w}という語が、続けていく姿勢として呼びかけています。一度だけではなく、繰り返し保ち続けるような響きがあります。`);
            } else {
                prose.push(`${w}という語が、説明や宣言ではなく、相手に向かって直接方向を指し示しています。`);
            }
        } else if (mood === 'subjunctive') {
            prose.push(`断言ではなく、願いや目的を込めた調子で${w}が置かれています。著者がどこへ向かっているかが、ここに見えてきます。`);
        } else if (mood === 'infinitive') {
            prose.push(`${w}は、前の動作の意味を補いながら、目的や内容として添えられています。「何のために」「何を」という方向がここで示されます。`);
        } else if (mood === 'participle') {
            if (tense === 'aorist') {
                prose.push(`${w}は、先行する出来事として背景に描かれています。主な動作より前に起きていることとして、静かに添えられています。`);
            } else if (tense === 'perfect') {
                prose.push(`すでに起きていることとして${w}が背景に置かれ、主な動作を支えています。完了の状態が土台になっています。`);
            } else {
                prose.push(`${w}は、主な動作と同時に進んでいる状況を描き添えています。「〜しながら」という情景が重なっています。`);
            }
        } else if (tense === 'perfect') {
            prose.push(`${w}という語は、かつて起きた出来事の効果が今も続いている、という重みで語られています。過去の出来事が、今この文の中に生きています。`);
        } else if (tense === 'aorist' && mood === 'indicative') {
            prose.push(`${w}という語は、ひとつの完結した出来事として静かに提示されています。時間の流れの中で点として刻まれた、宣言のような重みがあります。`);
        } else if (tense === 'future' && mood === 'indicative') {
            prose.push(`${w}は、確かに起きることとして語られています。命令ではなく、約束のような調子があります。`);
        } else if (tense === 'present' && mood === 'indicative') {
            if (voice === 'passive') {
                prose.push(`${w}は、主語が受けとめる側として置かれた形で、継続して語られています。`);
            } else if (voice === 'middle' || voice === 'middle deponent') {
                prose.push(`${w}は、主語が深く関わりながら動いていることが伝わる語です。続いている状態として語られています。`);
            } else {
                prose.push(`${w}という語は、続いている状態として落ち着いた調子で語られています。`);
            }
        } else {
            if (voice === 'passive') {
                prose.push(`${w}は、主語が受けとめる側として置かれています。神学的な文脈では、神による行為を指すことがあります。`);
            } else if (voice === 'middle' || voice === 'middle deponent') {
                prose.push(`${w}は、主語が深く関わりながら動いていることが伝わる語です。`);
            }
        }
    }

    /* ── 名詞・形容詞・代名詞：格を読書感覚として ── */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const CASE_AIR = {
            nominative: `${w}は、この節の中心として置かれています。`,
            genitive:   `${w}は「〜の」と結びつき、前後の語との関係を深く示しています。所有・性質・由来など、どのニュアンスかは文脈が決めます。`,
            dative:     `${w}は、動作が向かう間接的な関わり先として置かれています。`,
            accusative: `${w}は、動作が直接向かう対象として置かれています。`,
            vocative:   `${w}は、文の外から直接呼びかけられています。主述の構造の外に立っています。`,
        };
        if (p.case && CASE_AIR[p.case]) {
            prose.push(CASE_AIR[p.case]);
        } else if (['P','R','D'].includes(pos)) {
            prose.push(`${w}は、誰か・何かを指し示しながら、関係をつないでいます。`);
        }
    }

    /* ── 前置詞 ── */
    if (pos === 'PREP') {
        prose.push(`${w}が関係の方向や位置を示しています。次に来る語との結びつきが、この語の意味を決めます。`);
    }

    /* ── 比喩語：文章の空気として添える ── */
    const METAPHOR_AIR = {
        'περιπατέω':  '「歩む」という語が繰り返され、姿勢を保ち続けるような響きがあります。',
        'περιπατεῖν': '「歩む」という語は、生き方のあり方を指す比喩として響いています。',
        'φωτί':       '「光」は、知識・啓示・義などを指す比喩として機能しています。',
        'σκότος':     '「闇」が比喩として置かれています。罪や神との断絶を示しています。',
        'σταυρός':    '十字架は、当時の読者にとって処刑の道具でありながら、贖いの象徴として受け取られた語です。',
    };
    if (METAPHOR_AIR[word]) prose.push(METAPHOR_AIR[word]);

    /* デフォルト */
    if (prose.length === 0) {
        prose.push(`この語の文脈的な響きは、下の「単語を調べる」から確認できます。`);
    }

    /* ═══════════════════════════════════════════════════════
       Reference layer - 「単語を調べる」
       morph grid + Abbott-Smith。
       読書 prose から分離された最下層。
       折りたたみ。初期状態は閉じている。
       ═══════════════════════════════════════════════════════ */
    const JPN_FULL = {
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞', ADV:'副詞', PREP:'前置詞', CONJ:'接続詞', PRT:'添語' },
        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了', pluperfect:'大完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動', 'middle or passive':'中動/受動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法', imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },
    };
    const morphRows = [];
    if (p.pos)    morphRows.push({ k:'品詞', v: JPN_FULL.pos[p.pos]      || p.pos,    core:true  });
    if (p.tense)  morphRows.push({ k:'時制', v: JPN_FULL.tense[p.tense]  || p.tense,  core:true  });
    if (p.mood)   morphRows.push({ k:'法',   v: JPN_FULL.mood[p.mood]    || p.mood,   core:true  });
    if (p.voice)  morphRows.push({ k:'態',   v: JPN_FULL.voice[p.voice]  || p.voice,  core:false });
    if (p.case)   morphRows.push({ k:'格',   v: JPN_FULL.case[p.case]    || p.case,   core:false });
    if (p.number) morphRows.push({ k:'数',   v: JPN_FULL.number[p.number]|| p.number, core:false });
    if (p.gender) morphRows.push({ k:'性',   v: JPN_FULL.gender[p.gender]|| p.gender, core:false });

    const morphGridHTML = morphRows.length
        ? `<div class="rn-morph-grid">${morphRows.map(r =>
            `<span class="rn-morph-key">${r.k}</span><span class="rn-morph-val${r.core?' core':''}">${r.v}</span>`
          ).join('')}</div>`
        : '';

    const abbottHTML = desc
        ? `<div class="rn-lexicon">
               <span class="rn-lexicon-label ui-label" title="古典ギリシャ語辞典（Abbott-Smith, 1922）">Abbott-Smith${strong ? ' · G'+strong : ''}</span>
               ${desc.replace(/\n/g,'<br>')}
           </div>`
        : '';

    const qsMorph = new URLSearchParams();
    if (ref)     qsMorph.set('ref',   ref);
    if (p.word)  qsMorph.set('word',  p.word);
    if (lemma)   qsMorph.set('lemma', lemma);
    if (p.pos)   qsMorph.set('pos',   p.pos);
    if (p.tense) qsMorph.set('tense', p.tense);
    if (p.mood)  qsMorph.set('mood',  p.mood);
    const morphSearchURL = `morph-search.html?${qsMorph.toString()}`;
    const syntaxURL      = `syntax-search.html?${qsMorph.toString()}`;
    const qsSem = new URLSearchParams();
    if (ref)    qsSem.set('ref',   ref);
    if (p.word) qsSem.set('word',  p.word);
    if (lemma)  qsSem.set('lemma', lemma);
    if (p.pos)  qsSem.set('pos',   p.pos);
    const semanticsURL = `semantic-search.html?${qsSem.toString()}`;

    const refHTML = `
        <div class="rn-ref-section">
            <button class="rn-ref-toggle" id="rn-ref-toggle" onclick="_rnToggleRef()">
                <span class="rn-ref-toggle-label">単語を調べる</span>
                <span class="rn-ref-toggle-icon">›</span>
            </button>
            <div class="rn-ref-body" id="rn-ref-body">
                ${morphGridHTML}
                ${abbottHTML}
                <div class="rn-search-links">
                    <a href="${morphSearchURL}" class="rn-search-link">同語形を探す</a>
                    <a href="${syntaxURL}"      class="rn-search-link">構文で探す</a>
                    <a href="${semanticsURL}"   class="rn-search-link">意味で探す</a>
                </div>
            </div>
        </div>`;

/* ── 中級者向け補助ラベル（experiencedReader のみ） ── */
    let expLabelHTML = '';
    if (window.AppOnboarding?.getState()?.experiencedReader && pos === 'V') {
        const labels = [];

        // 中動態判定（既存関数を使用）
        if (typeof classifyMiddleVoice === 'function') {
            const mvc = classifyMiddleVoice(lemma, voice);
            if (mvc) {
                labels.push('中動態として読むこともできます');
            }
        }

        // 神的受動態判定（既存関数を使用）
        if (typeof detectDivinePassive === 'function' && typeof decodeMorph === 'function') {
            const inspectData = AppState.inspect.data || {};
            const tokenForDP  = { word, lemma, morph: p._rawMorph };
            const verseTokens = [];   // 節トークン未取得時は空配列で渡す
            const dp = detectDivinePassive(tokenForDP, verseTokens, decodeMorph);
            if (dp && dp.isDivinePassive) {
                labels.push('行為者が暗示されています');
            }
        }

        // 主語省略（省略形：主格代名詞なし動詞）
        if (['indicative','subjunctive','imperative'].includes(mood) && pos === 'V') {
            const hasExplicitSubject = (AppState.inspect.data?.rawMorph || '').includes('1S')
                || (AppState.inspect.data?.rawMorph || '').includes('2S');
            if (!hasExplicitSubject && ['1st','2nd'].some(p => (p._rawMorph || '').includes(p))) {
                labels.push('主語が省略されています');
            }
        }

        if (labels.length > 0) {
            expLabelHTML = `<div class="rn-exp-labels">${
                labels.map(l => `<span class="rn-exp-label">${l}</span>`).join('')
            }</div>`;
        }
    }

    area.innerHTML = `
        <div class="rn-word-head">
            <span class="rn-greek greek-headword">${word}</span>
            ${jaWord ? `<span class="rn-ja">${jaWord}</span>` : ''}
            ${ref    ? `<span class="rn-ref">${ref}</span>`   : ''}
        </div>
        <div class="rn-prose reading-block">
            <p class="rn-prose-text reading-prose">${prose.join('<br><br>')}</p>
        </div>
        ${expLabelHTML}
        ${refHTML}
    `;
}

/* 単語を調べる（reference layer）トグル */
function _rnToggleRef() {
    const btn  = document.getElementById('rn-ref-toggle');
    const body = document.getElementById('rn-ref-body');

    if (!btn || !body) return;

    const isOpen = body.classList.contains('visible');

    body.classList.toggle('visible', !isOpen);
    btn.classList.toggle('open', !isOpen);

    const icon = btn.querySelector('.rn-ref-toggle-icon');
    if (icon) {
        icon.style.transform = isOpen
            ? ''
            : 'rotate(90deg)';
    }

    const label = btn.querySelector('.rn-ref-toggle-label');

    if (label) {
        label.textContent = isOpen
            ? '単語を調べる'
            : '閉じる';
    }
}

/* ══════════════════════════════════════════
   Flow / Meaning / Study タブ描画
   （読解支援を主役にした新タブ体系）
   ══════════════════════════════════════════ */

/**
 * Flow タブ：「この語・この節が何をしているか」を読解補助として表示。
 * AIによるニュアンス補助（Anthropic API）。
 * データなし時はローカルルールベースフォールバックを表示。
 */
function _renderFlowTab(area, p) {
    const word   = p.word   || '-';
    const pos    = p.pos    || '';
    const mood   = p.mood   || '';
    const tense  = p.tense  || '';
    const voice  = p.voice  || '';
    const jaWord = (_inspectData && _inspectData.jaWord) || '';
    const ref    = p.ref    || '';

    /* ══════════════════════════════════════════
       ローカルフォールバック：9種 Flow signal
       「著者の流れ・強調・意図」を静かに補助する。
       チェックリスト化禁止。自然な文章として表示。
       ══════════════════════════════════════════ */
    const signals = [];
    // signal: { kind: CSS class suffix, kindLabel: 極小ラベル, text: 自然文 }

    /* ── #1 鍵となるフレーズ・単語（繰り返し・転換・強調） ── */
    if (pos === 'CONJ') {
        const CONJ_SIGNAL = {
            'γάρ':  { cls: 'sig-logic',    text: 'ここで理由が始まります。直前の主張の根拠として読むと、議論の構造が見えてきます。' },
            'ἀλλά': { cls: 'sig-turn',     text: '「しかし」による転換。ここで流れが変わります。' },
            'οὖν':  { cls: 'sig-logic',    text: 'ここで論理が結論へ進みます。前節の集約として読む箇所です。' },
            'δέ':   { cls: 'sig-turn',     text: '話が次の段階に進んでいます。微妙な展開・対比のサインです。' },
            'καί':  { cls: 'sig-emphasis', text: '内容が積み重なっています。強調の「そして」として機能する場合もあります。' },
            'ἵνα':  { cls: 'sig-logic',    text: '目的節。この語以降に「なぜそうするのか」という著者の意図が示されます。' },
            'ὅτι':  { cls: 'sig-logic',    text: '内容・理由節。以降が主張の根拠か内容補足になります。' },
            'εἰ':   { cls: 'sig-logic',    text: '条件節。仮定の前提の上で議論が展開されています。' },
            'ὥστε': { cls: 'sig-logic',    text: 'ここに議論の帰結があります。「その結果として」という流れです。' },
        };
        const s = CONJ_SIGNAL[word];
        if (s) signals.push({ cls: s.cls, kindLabel: '流れ', text: s.text });
        else   signals.push({ cls: 'sig-logic', kindLabel: '流れ', text: '接続詞。前後をつなぎ、議論の流れを形作っています。' });
    }

    /* ── #6 論理的展開（最重要：Flow の中心機能） ── */
    /* 動詞の法：命令・約束・宣言・論理を区別して表示 */
    if (pos === 'V') {
        /* #2 命令・勧め */
        if (mood === 'imperative') {
            signals.push({ cls: 'sig-exhort', kindLabel: '呼びかけ', text: 'ここは説明ではなく、行動への呼びかけです。' });
        }
        /* 接続法：目的・願望 */
        if (mood === 'subjunctive') {
            signals.push({ cls: 'sig-logic', kindLabel: '願い', text: '目的・条件・願望を表しています。断定ではなく「〜するために」「〜であれば」という含みです。' });
        }
        /* 不定詞：補足・目的 */
        if (mood === 'infinitive') {
            signals.push({ cls: 'sig-logic', kindLabel: '補足', text: '動作の目的か内容を補足する役割です。' });
        }
        /* 分詞：修飾・同時進行 */
        if (mood === 'participle') {
            signals.push({ cls: 'sig-logic', kindLabel: '背景', text: '主動詞の状況・背景を描写しています。' });
        }

        /* 時制による流れへの影響 */
        if (tense === 'aorist' && mood === 'indicative') {
            signals.push({ cls: 'sig-declare', kindLabel: '出来事', text: '「その出来事が起きた」という完結した事実の提示です。命令でも約束でもなく、宣言的な重みがあります。' });
        }
        if (tense === 'present' && mood === 'indicative') {
            signals.push({ cls: 'sig-logic', kindLabel: '継続', text: '継続・習慣・普遍的な事実として述べています。' });
        }
        if (tense === 'perfect') {
            signals.push({ cls: 'sig-promise', kindLabel: '今も続く', text: '過去の出来事の結果が今も有効です。単なる過去の話ではなく、現在の状態を含む表現です。' });
        }
        if (tense === 'future' && mood === 'indicative') {
            signals.push({ cls: 'sig-promise', kindLabel: '約束', text: 'これは命令というより、確かな約束・確約として機能していることがあります。' });
        }

        /* #7 語の選択：態のニュアンス */
        if (voice === 'passive') {
            signals.push({ cls: 'sig-word', kindLabel: '受けとめる', text: '主語は動作を受ける側に置かれています。神学的文脈では「神による行為」を暗示することがあります。' });
        }
        if (voice === 'middle' || voice === 'middle deponent') {
            signals.push({ cls: 'sig-word', kindLabel: '深く関わる', text: '主語が動作に深く関与しています。単なる能動でも受動でもない、自身が関わる動作です。' });
        }
    }

    /* ── 名詞系の格：論理的役割を「流れ」として表示 ── */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const CASE_SIGNAL = {
            nominative: { cls: 'sig-logic',   text: 'この語が文の中心にいます。主語または述語として機能しています。' },
            genitive:   { cls: 'sig-logic',   text: '「〜の」という関係を示します。所有・由来・特徴などのニュアンスがあります。' },
            dative:     { cls: 'sig-logic',   text: '動作の間接的な受け手・場所・手段を示します。' },
            accusative: { cls: 'sig-logic',   text: '動作の直接の対象です。' },
        };
        const caseSig = CASE_SIGNAL[p.case];
        if (caseSig) signals.push({ cls: caseSig.cls, kindLabel: '役割', text: caseSig.text });
    }

    /* ── #5 比喩表現：特定語の比喩的使用に注意を促す ── */
    const METAPHOR_WORDS = {
        'περιπατέω': '「歩む」は、ここでは文字通りの歩行ではなく、生き方・行動様式の比喩として使われています。',
        'περιπατεῖν': '「歩む」は、生き方の比喩として使われています。',
        'φωτί':      '「光」は比喩的な表現として機能していることが多く、知識・啓示・義などを指すことがあります。',
        'σκότος':    '「闇」は比喩的に罪・無知・神との断絶を示すことがあります。',
        'σταυρός':   '十字架は当時の読者にとって処刑の道具であると同時に、贖いの象徴として受け取られた語です。',
    };
    if (METAPHOR_WORDS[word]) {
        signals.push({ cls: 'sig-metaphor', kindLabel: '比喩', text: METAPHOR_WORDS[word] });
    }

    if (signals.length === 0) {
        signals.push({ cls: 'sig-default', kindLabel: '補足', text: 'この語の文脈的な役割は「含み」タブでさらに確認できます。' });
    }

    /* signals を prose として統合（列挙しない） */
    const localHTML = `<div class="flow-signal-text reading-prose">${signals.map(s => s.text).join('　')}</div>`;

    area.innerHTML = `
        <div class="flow-word-head">
            <span class="flow-greek greek-headword">${word}</span>${jaWord ? `<span class="flow-ja">　${jaWord}</span>` : ''}
        </div>
        ${ref ? `<div class="flow-ref">${ref}</div>` : ''}
        <div class="flow-hints reading-block" id="flow-hints-local">
            ${localHTML}
        </div>
    `;
}

/**
 * Meaning タブ：「この語が今この文脈でどう響くか」を読書補助として表示。
 * Abbott-Smith は Study → Semantics へ移動済み。
 * ここは辞書ではなく、tone / relational force / contextual nuance の層。
 */
function _renderMeaningTab(area, p) {
    const word   = p.word   || '-';
    const jaWord = (_inspectData && _inspectData.jaWord) || '-';
    const ref    = p.ref    || '';

    /* ローカルルールベースの Meaning signals */
    const meaningSignals = _buildMeaningSignals(p);
    const signalHTML = meaningSignals.length
        ? `<div class="flow-signal-text reading-prose">${meaningSignals.map(s => s.text).join('<br>')}</div>`
        : `<div class="flow-signal-text" style="color:var(--text-sub);">原語の詳細は「原語を見る」から確認できます。</div>`;

    area.innerHTML = `
        <div class="flow-word-head">
            <span class="flow-greek greek-headword">${word}</span><span class="flow-ja">　${jaWord}</span>
        </div>
        ${ref ? `<div class="flow-ref">${ref}</div>` : ''}
        <div class="flow-hints reading-block">
            ${signalHTML}
        </div>
    `;
}

/**
 * Meaning タブ用ローカルシグナル生成。
 * AIなし。形態論データからルールベースでシグナルを導出する。
 */
function _buildMeaningSignals(p) {
    const signals = [];
    const pos   = p.pos   || '';
    const mood  = p.mood  || '';
    const tense = p.tense || '';
    const voice = p.voice || '';
    const word  = p.word  || '';

    if (pos === 'V') {
        if (mood === 'imperative') {
            signals.push({ cls: 'sig-exhort', kindLabel: '行為', text: '命令形。説明ではなく、行動への直接の呼びかけとして機能しています。' });
        }
        if (mood === 'subjunctive') {
            signals.push({ cls: 'sig-logic', kindLabel: '態度', text: '接続法。断定ではなく、目的・願望・可能性の含みをもちます。' });
        }
        if (mood === 'participle') {
            signals.push({ cls: 'sig-logic', kindLabel: '修飾', text: '分詞。主動詞の状況・背景・手段として機能しています。' });
        }
        if (tense === 'perfect') {
            signals.push({ cls: 'sig-promise', kindLabel: '状態', text: '完了形。過去の出来事の結果が現在も有効であることを示します。' });
        }
        if (tense === 'aorist' && mood === 'indicative') {
            signals.push({ cls: 'sig-declare', kindLabel: '宣言', text: 'アオリスト直説法。完結した出来事の事実提示。宣言的な重みがあります。' });
        }
        if (tense === 'future') {
            signals.push({ cls: 'sig-promise', kindLabel: '約束', text: '未来形。確かな約束・確約として機能することがあります。' });
        }
        if (voice === 'passive') {
            signals.push({ cls: 'sig-word', kindLabel: '態', text: '受動態。神学的文脈では「神による行為」を暗示することがあります。' });
        }
        if (voice === 'middle' || voice === 'middle deponent') {
            signals.push({ cls: 'sig-word', kindLabel: '態', text: '中動態。主語が動作に深く関与しています。' });
        }
    }

    if (pos === 'CONJ') {
        const CONJ_MEANING = {
            'γάρ':  { cls: 'sig-logic',    kindLabel: '論理', text: '理由の接続詞。前の主張への根拠として読みます。' },
            'ἀλλά': { cls: 'sig-turn',     kindLabel: '転換', text: '強い対比・転換。ここで話の方向が変わります。' },
            'οὖν':  { cls: 'sig-logic',    kindLabel: '帰結', text: '論理的帰結。前節の議論をここで集約しています。' },
            'δέ':   { cls: 'sig-turn',     kindLabel: '展開', text: '微妙な転換・進展のサイン。' },
            'καί':  { cls: 'sig-emphasis', kindLabel: '付加', text: '並列・強調。内容が積み重なっています。' },
            'ἵνα':  { cls: 'sig-logic',    kindLabel: '目的', text: '目的節。著者の意図がこの語の後に示されます。' },
            'ὅτι':  { cls: 'sig-logic',    kindLabel: '内容', text: '内容・理由節。主張の根拠か内容補足になります。' },
        };
        const cs = CONJ_MEANING[word];
        if (cs) signals.push(cs);
        else signals.push({ cls: 'sig-logic', kindLabel: '接続', text: '接続詞。前後の節をつなぎ、議論の流れを形作っています。' });
    }

    if (signals.length === 0) {
        signals.push({ cls: 'sig-default', kindLabel: '補足', text: 'この語の特記すべき語用論的特徴はありません。' });
    }

    return signals;
}

/**
 * Study タブ：「なぜそう読める？」を支える根拠層。
 * 構造:
 *   Study
 *   ├ 語形・文法（Morphology）← open
 *   ├ 論理構造（Syntax）← AI読解説明 + ローカル構文関係 + 静かな構文ツリー
 *   ├ 意味論的根拠（Semantics）← Abbott-Smith
 *   └ 詳細検索
 *
 * Flow → Meaning → Study の思想維持。Study が主役に戻らない。
 * Syntax は「構文分析」ではなく「著者の論理構造を理解する補助」。
 */
function _renderStudyTab(area, p) {
    const JPN_FULL = {
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞', ADV:'副詞', PREP:'前置詞', CONJ:'接続詞', PRT:'添語' },
        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了', pluperfect:'大完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動', 'middle or passive':'中動/受動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法', imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },
        person: { '1':'1人称', '2':'2人称', '3':'3人称' },
    };

    /* ── Morphology ── */
    const rows = [];
    if (p.pos)    rows.push({ k:'品詞',  v: JPN_FULL.pos[p.pos]    || p.pos,    core: true });
    if (p.tense)  rows.push({ k:'時制',  v: JPN_FULL.tense[p.tense]|| p.tense,  core: true });
    if (p.mood)   rows.push({ k:'法',    v: JPN_FULL.mood[p.mood]  || p.mood,   core: true });
    if (p.voice)  rows.push({ k:'態',    v: JPN_FULL.voice[p.voice]|| p.voice,  core: false });
    if (p.case)   rows.push({ k:'格',    v: JPN_FULL.case[p.case]  || p.case,   core: false });
    if (p.number) rows.push({ k:'数',    v: JPN_FULL.number[p.number]||p.number,core: false });
    if (p.gender) rows.push({ k:'性',    v: JPN_FULL.gender[p.gender]||p.gender,core: false });

    const coreRows  = rows.filter(r => r.core);
    const extraRows = rows.filter(r => !r.core);

    const _morphRowsHTML = (rr) => rr.map(r => `
        <span class="ac-morph-key">${r.k}</span>
        <span class="ac-morph-val${r.core ? ' core' : ''}">${r.v}</span>
    `).join('');

    const morphGridHTML = rows.length
        ? `<div class="ac-morph-grid">
            ${_morphRowsHTML(coreRows)}
           </div>${extraRows.length ? `
           <div class="morph-grid-expand">
               <button class="morph-grid-expand-btn" onclick="(function(btn){var el=btn.closest('.study-details-body').querySelector('.morph-grid-extra');el.classList.toggle('visible');btn.textContent=el.classList.contains('visible')?'▴ 閉じる':'▾ 態・格・数・性を見る';})(this)">▾ 態・格・数・性を見る</button>
               <div class="morph-grid-extra">
                   <div class="ac-morph-grid" style="margin-top:4px;">
                       ${_morphRowsHTML(extraRows)}
                   </div>
               </div>
           </div>` : ''}`
        : `<p class="ac-no-data">語形データがありません</p>`;

    const jaWord = (_inspectData && _inspectData.jaWord) || '-';
    const desc   = (_inspectData && _inspectData.desc)   || '';
    const strong = (_inspectData && _inspectData.strong)  || '';
    const ref    = p.ref || '';
    const lemma  = p.lemma || '';

    /* ── URL ── */
    const qsMorph = new URLSearchParams();
    if (ref)      qsMorph.set('ref',   ref);
    if (p.word)   qsMorph.set('word',  p.word);
    if (lemma)    qsMorph.set('lemma', lemma);
    if (p.pos)    qsMorph.set('pos',   p.pos);
    if (p.tense)  qsMorph.set('tense', p.tense);
    if (p.mood)   qsMorph.set('mood',  p.mood);
    if (p.voice)  qsMorph.set('voice', p.voice);
    if (p.gender) qsMorph.set('gender',p.gender);
    if (p.number) qsMorph.set('number',p.number);
    if (p.case)   qsMorph.set('case',  p.case);
    const morphSearchURL = `morph-search.html?${qsMorph.toString()}`;
    const syntaxURL      = `syntax-search.html?${new URLSearchParams(qsMorph).toString()}`;
    const qsSem = new URLSearchParams();
    if (ref)    qsSem.set('ref',   ref);
    if (p.word) qsSem.set('word',  p.word);
    if (lemma)  qsSem.set('lemma', lemma);
    if (p.pos)  qsSem.set('pos',   p.pos);
    const semanticsURL = `semantic-search.html?${qsSem.toString()}`;

    /* ── Semantics: Abbott-Smith ── */
    const abbottBody = desc
        ? `<div class="semantics-abbott">${desc.replace(/\n/g,'<br>')}</div>`
        : `<p class="ac-no-data" style="padding:8px 0;">辞書データが見つかりません</p>`;
    const semanticsSectionHTML = `
        <details class="study-details">
            <summary class="study-summary"><span class="study-summary-inner"><span>語の意味</span><span class="study-summary-sub">Semantics · 辞書・意味論</span></span></summary>
            <div class="study-details-body">
                ${strong ? `<div class="semantics-note">
                    <span class="semantics-note-label">Abbott-Smith Lexicon · G${strong}</span>
                    ${abbottBody}
                </div>` : abbottBody}
            </div>
        </details>`;

    /* ── Syntax: ローカルルールベース構文関係 ── */
    /* 読解上の意味 → 構文根拠 → 詳細構造 の順で表示する */
    const synRelations = _buildSyntaxRelations(p, JPN_FULL);
    const synTreeHTML  = _buildSyntaxTree(p, JPN_FULL, jaWord);

    const syntaxSectionHTML = `
        <details class="study-details">
            <summary class="study-summary"><span class="study-summary-inner"><span>文の構造</span><span class="study-summary-sub">Syntax · 統語・構文関係</span></span></summary>
            <div class="study-details-body">
                <!-- 構文関係（ローカルルール） -->
                ${synRelations.length ? `
                <div class="syntax-relations" id="syntax-relations">
                    ${synRelations.map(r => `
                    <div class="syntax-rel-row">
                        <span class="syntax-rel-kind">${r.kind}</span>
                        <span class="syntax-rel-text">${r.text}</span>
                    </div>`).join('')}
                </div>` : ''}

                <!-- 構文構造（折りたたみ内に収める） -->
                ${synTreeHTML ? `
                <details class="study-details" style="margin-top:6px;border-top:1px solid rgba(0,0,0,0.04);">
                    <summary class="study-summary" style="font-size: 0.68rem;">構文構造を見る</summary>
                    <div class="study-details-body" style="padding-top:4px;">
                        <div class="syntax-tree">${synTreeHTML}</div>
                    </div>
                </details>` : ''}
            </div>
        </details>`;

    area.innerHTML = `
        <div class="flow-word-head">
            <span class="flow-greek greek-headword">${p.word || '-'}</span><span class="flow-ja">　${jaWord}</span>
        </div>
        ${ref ? `<div class="flow-ref">${ref}</div>` : ''}

        <!-- 語形・文法（Morphology）: デフォルト open -->
        <details class="study-details" open>
            <summary class="study-summary"><span class="study-summary-inner"><span>語形・文法</span><span class="study-summary-sub">Morphology · 品詞・時制・法</span></span></summary>
            <div class="study-details-body">
                ${morphGridHTML}
            </div>
        </details>

        <!-- 論理構造（Syntax）-->
        ${syntaxSectionHTML}

        <!-- 意味論的根拠（Semantics）-->
        ${semanticsSectionHTML}

        <!-- 詳細検索 -->
        <details class="study-details">
            <summary class="study-summary"><span class="study-summary-inner"><span>詳細検索</span><span class="study-summary-sub">Research · 同語形・構文・意味で探す</span></span></summary>
            <div class="study-details-body">
                <div class="ac-morph-search-row">
                    <a href="${morphSearchURL}" class="morph-search-btn">同語形を探す →</a>
                    <a href="${syntaxURL}"      class="morph-search-btn">構文で探す →</a>
                    <a href="${semanticsURL}"   class="morph-search-btn">意味で探す →</a>
                </div>
            </div>
        </details>

        <!-- Research Tools（折りたたみ。初期状態は閉じている） -->
        <div class="rt-section" id="rt-section">
            <button class="rt-open-btn" id="rt-open-btn" onclick="_rtToggle()">
                <span class="rt-open-btn-icon">›</span>研究ツールを開く
            </button>
            <div class="rt-body" id="rt-body">
                <!-- Research Tools 内タブ: 語形検索 / 構文検索 / 意味検索 -->
                <div class="rt-tabs">
                    <button class="rt-tab active" id="rt-tab-morph"   onclick="_rtSwitchTab('morph')">語形検索</button>
                    <button class="rt-tab"        id="rt-tab-syntax"  onclick="_rtSwitchTab('syntax')">構文検索</button>
                    <button class="rt-tab"        id="rt-tab-sem"     onclick="_rtSwitchTab('sem')">意味検索</button>
                </div>

                <!-- 語形検索 -->
                <div class="rt-content visible" id="rt-content-morph">
                    <div class="rt-filter-group">
                        <span class="rt-filter-label">品詞</span>
                        <select class="rt-select" id="rt-m-pos">
                            <option value="">指定なし</option>
                            <option value="V" ${p.pos==='V'?'selected':''}>動詞</option>
                            <option value="N" ${p.pos==='N'?'selected':''}>名詞</option>
                            <option value="A" ${p.pos==='A'?'selected':''}>形容詞</option>
                            <option value="P" ${p.pos==='P'?'selected':''}>人称代名詞</option>
                            <option value="R" ${p.pos==='R'?'selected':''}>関係代名詞</option>

                    </div>
                    <div class="rt-filter-group">
                        <span class="rt-filter-label">時制</span>
                        <select class="rt-select" id="rt-m-tense">
                            <option value="">指定なし</option>
                            <option value="present"    ${p.tense==='present'?'selected':''}>現在</option>
                            <option value="imperfect"  ${p.tense==='imperfect'?'selected':''}>未完了</option>
                            <option value="aorist"     ${p.tense==='aorist'?'selected':''}>アオリスト</option>
                            <option value="perfect"    ${p.tense==='perfect'?'selected':''}>完了</option>
                            <option value="future"     ${p.tense==='future'?'selected':''}>未来</option>
                        </select>

                        <select class="rt-select" id="rt-m-mood">
                            <option value="">指定なし</option>
                            <option value="indicative"  ${p.mood==='indicative'?'selected':''}>直説法</option>
                            <option value="imperative"  ${p.mood==='imperative'?'selected':''}>命令法</option>

                    </div>
                    <div class="rt-filter-group">
                        <span class="rt-filter-label">数</span>
                        <select class="rt-select" id="rt-m-number">
                            <option value="">指定なし</option>
                            <option value="singular" ${p.number==='singular'?'selected':''}>単数</option>
                            <option value="plural"   ${p.number==='plural'?'selected':''}>複数</option>
                        </select>
                        <span class="rt-filter-label">性</span>
                        <select class="rt-select" id="rt-m-gender">
                            <option value="">指定なし</option>

/**
 * ローカルルールベースで「構文関係」テキストを生成。
 * 品詞・法・時制・格から「この語が論理上何をしているか」を読解補助として記述。
 * linguistics用語の羅列禁止。自然な読解文として書く。
 *
 * @returns Array<{kind:string, text:string}>
 */
function _buildSyntaxRelations(p, JPN) {
    const rels = [];
    const pos   = p.pos   || '';
    const mood  = p.mood  || '';
    const tense = p.tense || '';
    const voice = p.voice || '';

    /* 接続詞：節の論理関係 */
    if (pos === 'CONJ') {
        const CONJ_LOGIC = {
            'γάρ':  { kind: '理由節',  text: 'この語以降が直前の主張の根拠節として機能しています。' },
            'ἀλλά': { kind: '対比節',  text: '前節との対比・反転を示す節境界です。' },
            'οὖν':  { kind: '結論節',  text: '前節の議論を受けた結論節が始まります。' },
            'δέ':   { kind: '展開',    text: '前節に続く展開または対比の接続点です。' },
            'καί':  { kind: '並列',    text: '前節と並列関係にある節が続きます。' },
            'ἵνα':  { kind: '目的節',  text: 'この語以降が目的節：「〜するために」という従属節です。' },
            'ὅτι':  { kind: '補足節',  text: '内容節または理由節として前節を補足しています。' },
            'εἰ':   { kind: '条件節',  text: '条件節：「〜ならば」という仮定の節を導きます。' },
            'ὥστε': { kind: '結果節',  text: '結果節：前節の帰結として「〜になった」を示します。' },
        };
        const word = p.word || '';
        const r = CONJ_LOGIC[word];
        if (r) rels.push(r);
        else   rels.push({ kind: '接続',  text: '前後の節をつなぐ論理的接点です。' });
    }

    /* 動詞：節内の役割 */
    if (pos === 'V') {
        /* 法による節の機能 */
        if (mood === 'imperative') {
            rels.push({ kind: '主節',   text: 'この動詞が節の中心命令を担っています。要求・指示の主語述語構造です。' });
        } else if (mood === 'subjunctive') {
            rels.push({ kind: '従属節', text: '接続法として従属節内に位置し、目的・条件・願望を支えています。' });
        } else if (mood === 'infinitive') {
            rels.push({ kind: '補語',   text: '不定詞として主動詞の補語または目的語の役割を担っています。' });
        } else if (mood === 'participle') {
            rels.push({ kind: '修飾',   text: '分詞として主節の主語または動作の状況・背景を修飾しています。' });
        } else if (mood === 'indicative') {
            rels.push({ kind: '主節',   text: '直説法として節の主動詞に位置しています。' });
        }

        /* 時制による時間軸上の位置 */
        if (tense === 'aorist' && mood === 'indicative') {
            rels.push({ kind: '時制軸', text: '時制上、完結した出来事として主節に先行するか同時点に置かれています。' });
        } else if (tense === 'perfect') {
            rels.push({ kind: '時制軸', text: '完了形として、過去の出来事の結果が今も有効であるという論理的含意を持ちます。' });
        } else if (tense === 'present' && mood === 'indicative') {
            rels.push({ kind: '時制軸', text: '現在時制として、論理上の普遍命題または継続する状態として機能しています。' });
        }

        /* 態による動作構造 */
        if (voice === 'passive') {
            rels.push({ kind: '動作構造', text: '受動態。主語は動作の受け手として節内に配置されています。' });
        } else if (voice === 'middle' || voice === 'middle deponent') {
            rels.push({ kind: '動作構造', text: '中動態。主語が動作に深く関与する自動詞的構造です。' });
        }
    }

    /* 名詞・代名詞：節内の格役割 */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const CASE_ROLE = {
            nominative: { kind: '格役割', text: '主格として、この節の主語または述語主格の位置にあります。' },
            genitive:   { kind: '格役割', text: '属格として、修飾語または「〜の」という関係を節内で担っています。' },
            dative:     { kind: '格役割', text: '与格として、動作の間接目的・場所・手段の位置にあります。' },
            accusative: { kind: '格役割', text: '対格として、動詞の直接目的語または動作の到達点に配置されています。' },
            vocative:   { kind: '格役割', text: '呼格として、節の主述関係の外に位置する呼びかけです。' },
        };
        const r = CASE_ROLE[p.case];
        if (r) rels.push(r);
    }

    return rels;
}

/**
 * 「静かな構文ツリー」HTML を生成。
 * ROOT / NP / VP / CP のような学術ラベル禁止。
 * 読解補助として「誰が」「何を」「どういう関係で」を示す。
 * モバイルで横スクロール地獄にならないよう幅を抑える。
 *
 * @returns HTML string（構文ツリー行群）
 */
function _buildSyntaxTree(p, JPN, jaWord) {
    const pos   = p.pos   || '';
    const mood  = p.mood  || '';
    const tense = p.tense || '';
    const voice = p.voice || '';
    const word  = p.word  || '-';
    const rows  = [];

    /* ヘルパー：インデントと接続文字を組み合わせた1行を生成 */
        const treeRow = (indent, isLast, role, content, note = '', rawMorphForRow = '') => {
        const dpCls = rawMorphForRow ? buildDepthGrammarClasses(rawMorphForRow).join(' ') : '';
        const contentHtml = dpCls
            ? `<span class="${dpCls}">${content}</span>`
            : content;
        return `<div class="syntax-tree-row">` +
        `${'<span class="syntax-tree-indent">  </span>'.repeat(indent)}` +
        `<span class="syntax-tree-connector">${isLast ? '└' : '├'}</span>` +
        `<span class="syntax-tree-role">${role}</span>` +
        `<span class="syntax-tree-content">${contentHtml}</span>` +
        `${note ? `<span class="syntax-tree-note">${note}</span>` : ''}` +
        `</div>`;
    };

    /* 動詞中心の構造 */
    if (pos === 'V') {
        const moodLabel  = JPN.mood[mood]   || mood  || '';
        const tenseLabel = JPN.tense[tense] || tense || '';
        const voiceLabel = JPN.voice[voice] || voice || '';

        /* ルート：動詞節 */
        rows.push(`<div class="syntax-tree-row"><span class="syntax-tree-role" style="font-size:0.68rem;opacity:0.4;">節</span><span class="syntax-tree-content" style="opacity:0.5;">述語構造</span></div>`);

        if (mood === 'participle') {
                    rows.push(treeRow(0, false, '述語分詞', word, `${tenseLabel}・${voiceLabel}`, rawMorph));
        rows.push(treeRow(1, false, '機能', '主節の動作を修飾', ''));
        rows.push(treeRow(1, true,  '法',   moodLabel, ''));
    } else if (mood === 'infinitive') {
        rows.push(treeRow(0, false, '動詞', word, `${tenseLabel}`, rawMorph));
        rows.push(treeRow(1, false, '機能', '主動詞の補語', ''));
        rows.push(treeRow(1, true,  '法',   moodLabel, ''));
    } else {
        rows.push(treeRow(0, false, '述語', word, `${moodLabel}・${tenseLabel}${voiceLabel ? '・' + voiceLabel : ''}`, rawMorph));
            if (mood === 'imperative') {
                rows.push(treeRow(1, false, '節種', '命令節（主節）', ''));
                rows.push(treeRow(1, true,  '主語', '（2人称：省略）', ''));
            } else if (mood === 'subjunctive') {
                rows.push(treeRow(1, true, '節種', '従属節（接続法）', ''));
            } else if (mood === 'indicative') {
                rows.push(treeRow(1, true, '節種', '主節（直説法）', ''));
            }
        }
    }

    /* 名詞・代名詞・冠詞系 */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const caseLabel   = JPN.case[p.case]     || p.case   || '';
        const numberLabel = JPN.number[p.number] || p.number || '';
        const genderLabel = JPN.gender[p.gender] || p.gender || '';
        const posLabel    = JPN.pos[pos]          || pos;

        rows.push(`<div class="syntax-tree-row"><span class="syntax-tree-role" style="font-size:0.68rem;opacity:0.4;">句</span><span class="syntax-tree-content" style="opacity:0.5;">名詞句</span></div>`);
        rows.push(treeRow(0, false, posLabel, word, `${caseLabel}${numberLabel ? '・'+numberLabel : ''}${genderLabel ? '・'+genderLabel : ''}`));

        const CASE_FUNC = {
            nominative: '主語または述語主格',
            genitive:   '修飾語（〜の）',
            dative:     '間接目的語・場所・手段',
            accusative: '直接目的語',
            vocative:   '呼びかけ（独立）',
        };
        const func = CASE_FUNC[p.case];
        if (func) rows.push(treeRow(1, true, '節内機能', func, ''));
    }

    /* 接続詞 */
    if (pos === 'CONJ') {
        rows.push(`<div class="syntax-tree-row"><span class="syntax-tree-role" style="font-size:0.68rem;opacity:0.4;">接続</span><span class="syntax-tree-content" style="opacity:0.5;">節境界</span></div>`);
        rows.push(treeRow(0, false, '接続詞', word, ''));
        rows.push(treeRow(1, false, '先行節', '（前節）', ''));
        rows.push(treeRow(1, true,  '後続節', '（後節）', ''));
    }

    return rows.join('');
}

/** Research Tools の開閉トグル */
function _rtToggle() {
    const btn  = document.getElementById('rt-open-btn');
    const body = document.getElementById('rt-body');
    if (!btn || !body) return;
    const isOpen = body.classList.contains('visible');
    body.classList.toggle('visible', !isOpen);
    btn.classList.toggle('expanded', !isOpen);
    btn.querySelector('.rt-open-btn-icon').textContent = isOpen ? '›' : '›';
    /* ラベルも切り替え */
    const label = btn.childNodes[1];
    if (label) label.textContent = isOpen ? '研究ツールを開く' : '研究ツールを閉じる';
}

/** Research Tools 内タブ切り替え（morph / syntax / sem） */
function _rtSwitchTab(name) {
    ['morph','syntax','sem'].forEach(t => {
        const tab = document.getElementById(`rt-tab-${t}`);
        const cnt = document.getElementById(`rt-content-${t}`);
        if (tab) tab.classList.toggle('active', t === name);
        if (cnt) cnt.classList.toggle('visible', t === name);
    });
}

/** Semantic Search チップの単一選択制御を初期化 */
function _rtInitSemChips() {
    const chips = document.querySelectorAll('.rt-concept-chip');
    chips.forEach(chip => {
        chip.addEventListener('click', () => {
            const wasSelected = chip.classList.contains('selected');
            chips.forEach(c => c.classList.remove('selected'));
            if (!wasSelected) chip.classList.add('selected');
        });
    });
}

/**
 * 結果テキストを rt-result-block 群に変換して描画。
 * AIには「---」区切りで複数結果を返すよう指示する。
 * 各ブロックは「種別: / 内容: / 参照:」の3行構成（なければ省略）。
 */
function _rtRenderResults(text, resultsEl) {
    if (!text) {
        resultsEl.innerHTML = `<div class="rt-no-result">該当する用例が見つかりませんでした。</div>`;
        return;
    }
    /* ブロック分割（--- 区切り）*/
    const blocks = text.split(/---+/).map(b => b.trim()).filter(Boolean);
    if (blocks.length === 0) {
        resultsEl.innerHTML = `<div class="rt-result-block"><span class="rt-result-text">${text.replace(/\n/g,'<br>')}</span></div>`;
        return;
    }
    resultsEl.innerHTML = blocks.map(block => {
        /* 各ブロックからラベル・本文・参照を抽出 */
        const kindMatch = block.match(/^種別[:：]\s*(.+)/m);
        const textMatch = block.match(/^内容[:：]\s*([\s\S]+?)(?=参照[:：]|$)/m);
        const refMatch  = block.match(/^参照[:：]\s*(.+)/m);
        const kind   = kindMatch ? kindMatch[1].trim() : '';
        const body   = textMatch ? textMatch[1].trim() : block.replace(/^種別.+\n?/m,'').trim();
        const ref    = refMatch  ? refMatch[1].trim()  : '';
        return `<div class="rt-result-block">
            ${kind ? `<span class="rt-result-kind">${kind}</span>` : ''}
            <span class="rt-result-text">${body.replace(/\n/g,'<br>')}</span>
            ${ref  ? `<span class="rt-result-ref">📍 ${ref}</span>` : ''}
        </div>`;
    }).join('');
}

/** Morph Search 実行 */
function _rtRunMorphSearch() {
    const posEl    = document.getElementById('rt-m-pos');
    const tenseEl  = document.getElementById('rt-m-tense');
    const moodEl   = document.getElementById('rt-m-mood');
    const voiceEl  = document.getElementById('rt-m-voice');
    const caseEl   = document.getElementById('rt-m-case');
    const numberEl = document.getElementById('rt-m-number');
    const genderEl = document.getElementById('rt-m-gender');
    if (!posEl) return;

    const JPN = {
        pos:    {V:'動詞',N:'名詞',A:'形容詞',P:'人称代名詞',R:'関係代名詞',T:'冠詞',CONJ:'接続詞',PREP:'前置詞'},
        tense:  {present:'現在',imperfect:'未完了',aorist:'アオリスト',perfect:'完了',future:'未来'},
        mood:   {indicative:'直説法',imperative:'命令法',subjunctive:'接続法',participle:'分詞',infinitive:'不定詞'},
        voice:  {active:'能動',middle:'中動',passive:'受動'},
        case:   {nominative:'主格',genitive:'属格',dative:'与格',accusative:'対格'},
        number: {singular:'単数',plural:'複数'},
        gender: {masculine:'男性',feminine:'女性',neuter:'中性'},
    };

    const conditions = [];
    const posV  = posEl.value;    if (posV)    conditions.push(`品詞：${JPN.pos[posV]    || posV}`);
    const tenV  = tenseEl.value;  if (tenV)    conditions.push(`時制：${JPN.tense[tenV]  || tenV}`);
    const moodV = moodEl.value;   if (moodV)   conditions.push(`法：${JPN.mood[moodV]    || moodV}`);
    const voiV  = voiceEl.value;  if (voiV)    conditions.push(`態：${JPN.voice[voiV]    || voiV}`);
    const casV  = caseEl.value;   if (casV)    conditions.push(`格：${JPN.case[casV]     || casV}`);
    const numV  = numberEl.value; if (numV)    conditions.push(`数：${JPN.number[numV]   || numV}`);
    const genV  = genderEl.value; if (genV)    conditions.push(`性：${JPN.gender[genV]   || genV}`);

    if (conditions.length === 0) {
        document.getElementById('rt-m-results').innerHTML =
            `<div class="rt-no-result">条件を1つ以上選んでください。</div>`;
        return;
    }

    const p = _currentAnalysisParams || {};
    const word = p.word || '';

function _rtRunSyntaxSearch() {
    const clauseEl   = document.getElementById('rt-s-clause');
    const moodEl     = document.getElementById('rt-s-mood');
    const voiceEl    = document.getElementById('rt-s-voice');
    const parallelEl = document.getElementById('rt-s-parallel');
    if (!clauseEl) return;

    const CLAUSE_JPN = {
        purpose:'目的節（ἵνα系）', result:'結果節（ὥστε系）', reason:'理由節（γάρ系）',
        condition:'条件節（εἰ系）', contrast:'対比（ἀλλά）', conclusion:'結論節（οὖν系）',
    };
    const MOOD_JPN = {
        imperative:'命令法（指示）', subjunctive:'接続法（目的・願望）',
        indicative:'直説法（事実）', participle:'分詞（修飾）',
    };
    const VOICE_JPN = {
        passive:'受動（神的受動を含む）', middle:'中動（主語の深い関与）', active:'能動',
    };
    const PARALLEL_JPN = {
        coordinate:'等位接続（καί）', antithesis:'対照構造', chiasm:'交差配列',
    };

    const conditions = [];
    const cV = clauseEl.value;   if (cV) conditions.push(`節の種類：${CLAUSE_JPN[cV]   || cV}`);
    const mV = moodEl.value;     if (mV) conditions.push(`動詞の法：${MOOD_JPN[mV]     || mV}`);
    const vV = voiceEl.value;    if (vV) conditions.push(`態：${VOICE_JPN[vV]           || vV}`);
    const pV = parallelEl.value; if (pV) conditions.push(`並列構造：${PARALLEL_JPN[pV] || pV}`);

    if (conditions.length === 0) {
        document.getElementById('rt-s-results').innerHTML =
            `<div class="rt-no-result">条件を1つ以上選んでください。</div>`;
        return;

/* ══════════════════════════════════════════
   buildDepthGrammarClasses
   Depth Panel 限定の文法装飾クラスを合成して返す。
   原文文字列は一切変更しない。
   ══════════════════════════════════════════ */
function buildDepthGrammarClasses(rawMorph) {
    const classes = ['dp-word'];
    if (!rawMorph) return classes;

    const parts = rawMorph.split('-');
    const pos   = parts[0] || '';

    if (pos === 'V' && parts[1]) {
        const off      = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenCode  = parts[1][off]     || '';
        const voiCode  = parts[1][off + 1] || '';
        const moodCode = parts[1][off + 2] || '';

        /* 法 */
        if (moodCode === 'M') classes.push('dp-mood-imperative');
        else if (moodCode === 'I') classes.push('dp-mood-indicative');

        /* 時制 */
        if (tenCode === 'P')      classes.push('dp-tense-present');
        else if (tenCode === 'A') classes.push('dp-tense-aorist');
        else if (tenCode === 'X') classes.push('dp-tense-perfect');

        /* 態 */
        if (voiCode === 'M' || voiCode === 'D') classes.push('dp-voice-middle');
        else if (voiCode === 'P')               classes.push('dp-voice-passive');
    }

    return classes;
}

function parseMorphForSearch(rawMorph) {
    const parts = rawMorph.split('-');
    const pos = parts[0];
    const result = { pos };

    if (pos === 'V' && parts[1]) {
        const off = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off + 0];
        const voiceCode = parts[1][off + 1];
        const moodCode  = parts[1][off + 2];

        const TENSE_MAP = { P:'present', I:'imperfect', F:'future', A:'aorist', X:'perfect' };
        const VOICE_MAP = { A:'active', M:'middle', P:'passive', D:'middle deponent' };
        const MOOD_MAP  = { I:'indicative', S:'subjunctive', O:'optative',
                            M:'imperative', N:'infinitive', P:'participle' };

        if (tenseCode) result.tense = TENSE_MAP[tenseCode] || '';
        if (voiceCode) result.voice = VOICE_MAP[voiceCode] || '';
        if (moodCode)  result.mood  = MOOD_MAP[moodCode]   || '';

        if (moodCode === 'P' && parts[2]) {
            const CASE_MAP   = { N:'nominative', G:'genitive', D:'dative', A:'accusative', V:'vocative' };
            const NUMBER_MAP = { S:'singular', P:'plural' };
            const GENDER_MAP = { M:'masculine', F:'feminine', N:'neuter' };
            result.case   = CASE_MAP[parts[2][0]]   || '';
            result.number = NUMBER_MAP[parts[2][1]] || '';
            result.gender = GENDER_MAP[parts[2][2]] || '';
        }
    } else if (['N','A','R','P','T','D'].includes(pos) && parts[1]) {
        const CASE_MAP   = { N:'nominative', G:'genitive', D:'dative', A:'accusative', V:'vocative' };
        const NUMBER_MAP = { S:'singular', P:'plural' };
        const GENDER_MAP = { M:'masculine', F:'feminine', N:'neuter' };
        const base = ['1','2','3'].includes(parts[1][0]) ? parts[1].slice(1) : parts[1];
        result.case   = CASE_MAP[base[0]]   || '';
        result.number = NUMBER_MAP[base[1]] || '';
        result.gender = GENDER_MAP[base[2]] || '';
    }
    return result;
}

function buildMorphTagsHTML(rawMorph) {
    const m = parseMorphForSearch(rawMorph);
    const JPN = {
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞' },
        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法',
                  imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },
    };

    const tags = [];
    if (m.pos)    tags.push({ label: JPN.pos[m.pos]    || m.pos,    core: true });
    if (m.tense)  tags.push({ label: JPN.tense[m.tense]|| m.tense,  core: true });
    if (m.voice)  tags.push({ label: JPN.voice[m.voice]|| m.voice,  core: false });
    if (m.mood)   tags.push({ label: JPN.mood[m.mood]  || m.mood,   core: true });
    if (m.gender) tags.push({ label: JPN.gender[m.gender]|| m.gender, core: false });
    if (m.number) tags.push({ label: JPN.number[m.number]|| m.number, core: false });
    if (m.case)   tags.push({ label: JPN.case[m.case]  || m.case,   core: false });

    if (tags.length === 0) return '';
    return `<div class="morph-tag-row">
        ${tags.map(t => `<span class="morph-tag-pill${t.core ? ' core' : ''}">${t.label}</span>`).join('')}
    </div>`;
}

    const d = e.data;
    if (!d || !d.type) return;

    /* iframeから参照更新が来た場合（後方互換）*/
    if (d.ref && AppState.study.params) {
        AppState.study.params = {
            ...AppState.study.params,
            ref:   d.ref,
            word:  d.word  || AppState.study.params.word,
            lemma: d.lemma || AppState.study.params.lemma,
        };
    }

    if (d.type === 'NAV_TO_MORPH')      switchAnalysisTab('morph');
    if (d.type === 'NAV_TO_SYNTAX')     switchAnalysisTab('syntax');
    if (d.type === 'NAV_TO_SEMANTICS')  switchAnalysisTab('semantics');

    if (d.type === 'GO_TO_REF' && d.ref) {
        const m = d.ref.match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
        if (m) _navTo(m[1], m[2]);
    }
});

function _bookChapterLabel(loc) {
    if (!loc.book || loc.chapter === null) return '本文';
    const short = BOOK_SHORT[loc.book.key] || loc.book.name;
    return short + loc.chapter + '章';
}

let sbSection  = 'nt';
let sbBookKey  = null;
let sbBookName = '';
let sbMaxCh    = 1;

function sbGoTo(layer, section) {
    document.querySelectorAll('.sb-layer').forEach(l => l.classList.remove('active'));
    document.getElementById('sb-layer' + layer).classList.add('active');

    /* Layer 0: sb-nt-row / sb-ot-row のアクティブ表示 */
    if (layer === 0) {
        document.getElementById('sb-nt-row').classList.toggle('active', sbSection === 'nt');
        document.getElementById('sb-ot-row').classList.toggle('active', sbSection === 'ot');
    }

    /* Layer 1: 書物一覧を描画 */
    if (layer === 1) {
        if (section) sbSection = section;
        _sbSyncNavHeaders();
        document.getElementById('sb-nt-row').classList.toggle('active', sbSection === 'nt');
        document.getElementById('sb-ot-row').classList.toggle('active', sbSection === 'ot');
        sbRenderBooks();
    }

    /* Layer 2: 章グリッドを描画 */
    if (layer === 2) {
        _sbSyncNavHeaders();
        document.getElementById('sb-l2-title').textContent = sbBookName;
        sbRenderChapters();
    }
}

/* Layer 1/2 のナビヘッダーのアクティブ状態を同期 */
function _sbSyncNavHeaders() {
    const isNt = sbSection === 'nt';
    ['sb-nav-nt', 'sb-nav-nt-l2'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('active', isNt);
    });
    ['sb-nav-ot', 'sb-nav-ot-l2'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('active', !isNt);
    });
}

function sbGoBack(layer) { sbGoTo(layer); }

function sbRenderBooks() {
    const list = document.getElementById('sb-book-list');
    list.innerHTML = '';
    SB_BOOKS[sbSection].forEach(b => {
        const div = document.createElement('div');
        div.className = 'sb-row' + (b.key === sbBookKey ? ' active' : '');
        const hasGreek = GREEK_BOOKS.has(b.key);
        div.innerHTML = `<span>${b.name}</span><span class="sb-row-arrow">›</span>`;
        if (!hasGreek) {
            div.title = '日本語訳のみ';
            div.querySelector('span').style.color = 'var(--text-sub)';
        }
        div.onclick = () => {
            sbBookKey  = b.key;
            sbBookName = b.name;
            sbMaxCh    = b.ch;
            sbGoTo(2);
        };
        list.appendChild(div);
    });
}

function sbRenderChapters() {
    const urlParams = new URLSearchParams(window.location.search);
    const currentCh = parseInt(urlParams.get('ch') || '1');
    const currentBook = urlParams.get('book') || 'ROM';

    const grid = document.getElementById('sb-ch-grid');
    grid.innerHTML = '';
    for (let i = 1; i <= sbMaxCh; i++) {
        const btn = document.createElement('div');
        btn.className = 'sb-ch-btn' + (sbBookKey === currentBook && i === currentCh ? ' active' : '');
        btn.textContent = i;
        btn.onclick = () => {
            _navTo(sbBookKey, i);
        };
        grid.appendChild(btn);
    }
}

function sbInitState(bookKey, ch) {
    const inNt = SB_BOOKS.nt.some(b => b.key === bookKey);
    sbSection = inNt ? 'nt' : 'ot';
    const books = SB_BOOKS[sbSection];
    const found = books.find(b => b.key === bookKey);
    if (found) {
        sbBookKey  = found.key;
        sbBookName = found.name;
        sbMaxCh    = found.ch;
    }
    /* 起動時: Layer 0 を表示（トップメニューから始める） */
    sbGoTo(0);
}
