<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖書ノ門｜言語の壁を超える</title>
    <link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
    :root {
        --bg-paper: #ffffff;
        --bg-panel: #f5f5f7;
        --bg-sidebar: #fafafa;
        --bg-card: #f5f5f7;
        --text-main: #1d1d1f;
        --text-sub: #6e6e73;
        --accent-dark: #1d1d1f;
        --highlight: #5a6e82;
        --highlight-light: rgba(90,110,130,0.10);
        --border-soft: rgba(0,0,0,0.08);
    }

    body { 
        font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
        line-height: 2.0; 
        background: var(--bg-paper); 
        color: var(--text-main); 
        margin: 0; padding: 0;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
    }

    .main-layout { display: flex; height: 100vh; width: 100vw; }

    /* --- 左サイドメニュー --- */
    .nav-sidebar {
        width: 220px;
        background: var(--bg-sidebar);
        border-right: 1px solid var(--border-soft);
        display: flex;
        flex-direction: column;
        transition: width 0.3s ease;
        overflow: hidden;
        flex-shrink: 0;
    }
    .nav-sidebar.collapsed { width: 56px; }
    .sidebar-top { padding: 22px 16px 16px; display: flex; align-items: center; gap: 12px; }
    .sidebar-toggle-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-sub); width: 28px; padding: 0; }
    .sidebar-logo { font-weight: 700; font-size: 1rem; white-space: nowrap; letter-spacing: -0.01em; color: var(--text-main); }

    .sidebar-menu { flex: 1; padding: 8px 10px; overflow-y: auto; }
    .sidebar-section { margin-bottom: 20px; }
    .section-label { font-size: 0.65rem; font-weight: 700; color: var(--text-sub); padding-left: 10px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.12em; }
    
    .menu-item {
        padding: 7px 10px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
        font-size: 0.9rem;
    }
    .menu-item:hover { background: rgba(0,0,0,0.04); }
    .menu-item.active { background: rgba(90,110,130,0.10); color: var(--highlight); font-weight: 700; }
    .collapsed .menu-text, .collapsed .section-label { display: none; }

    /* --- サイドバー ドリルダウン --- */
    .sb-layer { display: none; }
    .sb-layer.active { display: block; }
    .sb-layer-header {
        display: flex; align-items: center; gap: 6px;
        padding: 8px 12px 6px; cursor: pointer; border-radius: 6px; margin: 0 4px 2px;
        transition: background 0.12s;
    }
    .sb-layer-header:hover { background: rgba(0,0,0,0.04); }
    .sb-back-arrow { font-size: 11px; color: var(--highlight); font-weight: 700; }
    .sb-layer-title { font-size: 0.65rem; font-weight: 700; color: var(--highlight); letter-spacing: 0.1em; text-transform: uppercase; }
    .sb-row {
        padding: 7px 12px; font-size: 0.88rem; color: var(--text-main);
        cursor: pointer; display: flex; align-items: center; justify-content: space-between;
        border-radius: 8px; margin: 0 4px 1px; transition: background 0.12s;
    }
    .sb-row:hover { background: rgba(0,0,0,0.04); }
    .sb-row.active { background: var(--highlight-light); color: var(--highlight); font-weight: 700; }
    .sb-row-arrow { font-size: 10px; color: #ccc; }
    .sb-row.active .sb-row-arrow { color: var(--highlight); }
    .sb-ch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 6px 10px 10px; }
    .sb-ch-btn {
        aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
        font-size: 0.8rem; font-weight: 500; color: var(--text-sub);
        background: #fff; border: 1px solid var(--border-soft);
        border-radius: 7px; cursor: pointer; transition: all 0.12s;
    }
    .sb-ch-btn:hover { background: var(--highlight-light); border-color: var(--highlight); color: var(--highlight); }
    .sb-ch-btn.active { background: var(--highlight); color: #fff; border-color: var(--highlight); font-weight: 700; }

    /* --- 中央メインエリア --- */
    .container { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--bg-paper); }
    .app-header { padding: 18px 40px; border-bottom: 1px solid var(--border-soft); background: var(--bg-paper); }
    .header-content { display: flex; align-items: center; justify-content: space-between; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; color: var(--text-sub); font-size: 0.85rem; }
    .breadcrumb h1 { font-size: 1.05rem; margin: 0; color: var(--text-main); font-weight: 700; letter-spacing: -0.02em; }
    .separator { color: var(--text-sub); opacity: 0.4; }

    #app { flex: 1; overflow-y: auto; padding: 28px 48px 60px 48px; }

    /* --- フッター --- */
    .app-footer {
        border-top: 1px solid var(--border-soft);
        padding: 12px 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        background: var(--bg-paper);
    }
    .footer-copy {
        font-size: 0.7rem;
        color: var(--text-sub);
        letter-spacing: 0.01em;
    }
    .footer-links {
        display: flex;
        gap: 18px;
    }
    .footer-links button {
        font-size: 0.7rem;
        color: var(--text-sub);
        background: none;
        border: none;
        border-bottom: 1px solid rgba(0,0,0,0.12);
        cursor: pointer;
        padding-bottom: 1px;
        font-family: inherit;
        transition: color 0.15s;
    }
    .footer-links button:hover { color: var(--text-main); }

    /* --- 右サイドパネル --- */
    #open-panel-btn {
        background: transparent; border: none; padding: 0 10px; cursor: pointer; color: var(--highlight); 
        font-size: 1.2rem; transition: transform 0.2s, opacity 0.2s; line-height: 1;
    }
    #open-panel-btn:hover { opacity: 0.7; transform: scale(1.1); }

    #side-panel { 
        width: 360px; 
        background: var(--bg-panel); 
        border-left: 1px solid var(--border-soft); 
        padding: 24px 22px; 
        display: flex; 
        flex-direction: column; 
        flex-shrink: 0; 
        height: 100vh; 
        box-sizing: border-box;
    }
    .panel-header { 
        font-weight: 700; 
        font-size: 0.95rem;
        letter-spacing: -0.01em;
        margin-bottom: 18px; 
        padding-bottom: 14px; 
        border-bottom: 1px solid var(--border-soft); 
        display: flex; 
        justify-content: space-between; 
        color: var(--accent-dark); 
        flex-shrink: 0;
    }
    #panel-content { flex: 1; overflow-y: auto; min-height: 0; }

    /* 詳細表示エリア */
    #word-detail-view { 
        background: #ffffff; 
        border: 1px solid var(--border-soft); 
        border-radius: 12px; 
        display: none; 
        margin-top: 14px; 
        max-height: 55%; 
        overflow-y: auto; 
        flex-shrink: 0; 
        animation: slideUp 0.25s ease-out; 
    }
    .detail-header { position: sticky; top: 0; background: #ffffff; padding: 14px 16px; border-bottom: 1px solid var(--border-soft); display: flex; justify-content: space-between; align-items: flex-start; z-index: 10; border-radius: 12px 12px 0 0; }
    .detail-body { padding: 14px 16px; }

    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* --- 本文 --- */
    .verse-block { border-bottom: 0px solid var(--border-soft); transition: background 0.15s; border-radius: 6px; margin-bottom: 2px; }
    .jp-section { padding: 4px 8px; cursor: pointer; display: flex; align-items: baseline; border-radius: 6px; }
    .jp-section:hover { background: rgba(0,0,0,0.03); }
    .v-num { color: #c0c0c5; margin-right: 16px; font-size: 0.72rem; font-weight: 700; min-width: 20px; text-align: right; letter-spacing: 0.02em; }
    .jp-text { font-size: 1.05rem; line-height: 2.0; color: var(--text-main); }

    /* --- 語形カード --- */
    .word-card { 
        background: #ffffff;
        padding: 10px 14px;
        border-radius: 10px;
        display: flex;
        justify-content: space-between; 
        align-items: baseline;
        margin-bottom: 8px;
        border: 1px solid var(--border-soft);
        cursor: pointer;
        transition: all 0.15s;
    }
    .word-card:hover { border-color: var(--highlight); background: var(--highlight-light); transform: translateY(-1px); }
    .greek-word { font-family: 'Gentium Plus', serif; font-size: 1.45rem; line-height: 1.3; }
    
    /* 文法装飾クラス */
    .present-text { border-bottom: 2px solid var(--highlight); }
    .aorist-text  { border-bottom: 2px dotted var(--highlight); }
    .perfect-text { text-decoration: underline wavy var(--highlight); text-underline-offset: 4px; }
    .future-text { border-bottom: 2px double var(--highlight); }
    .indicative-text { background: rgba(90,110,130,0.10); border-radius: 3px; padding: 0 4px; }
    .imperative-text { background: rgba(90,110,130,0.10); border-radius: 3px; padding: 0 4px; }

    .grammar-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; font-size: 0.65rem; color: var(--text-sub); border-top: 1px solid var(--border-soft); padding-top: 6px; }
    .tag-jp { color: var(--text-sub); font-size: 0.75rem; margin-left: 8px; }
    .strong-num { font-size: 0.62rem; color: #c0c0c5; font-family: monospace; }

    /* ---- 形態論検索ボタン ---- */
    .morph-search-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 12px;
        padding: 7px 14px;
        font-size: 0.78rem;
        font-family: inherit;
        font-weight: 500;
        color: var(--highlight);
        background: var(--highlight-light);
        border: 1px solid rgba(90,110,130,0.25);
        border-radius: 20px;
        cursor: pointer;
        letter-spacing: 0.01em;
        transition: background 0.15s, border-color 0.15s, transform 0.1s;
        text-decoration: none;
    }
    .morph-search-btn:hover {
        background: rgba(90,110,130,0.18);
        border-color: rgba(90,110,130,0.4);
        transform: translateY(-1px);
    }
    .morph-search-btn:active { transform: scale(0.97); }
    .morph-search-btn .btn-icon { font-size: 0.85rem; opacity: 0.8; }

    /* 形態タグ一覧（詳細パネル内） */
    .morph-tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin: 8px 0 4px;
    }
    .morph-tag-pill {
        font-size: 0.7rem;
        padding: 2px 9px;
        border-radius: 20px;
        background: var(--bg-panel);
        color: var(--text-sub);
        border: 1px solid var(--border-soft);
        letter-spacing: 0.01em;
    }
    .morph-tag-pill.core {
        background: rgba(90,110,130,0.10);
        color: var(--highlight);
        border-color: rgba(90,110,130,0.2);
        font-weight: 600;
    }
    </style>
</head>
<body>

<div class="main-layout">
    <nav id="nav-sidebar" class="nav-sidebar">
        <div class="sidebar-top">
            <button class="sidebar-toggle-btn" onclick="toggleSidebar()">☰</button>
            <span class="menu-text sidebar-logo">聖書ノ門</span>
        </div>
        <div class="sidebar-menu">

            <!-- Layer 0: 旧約 / 新約 -->
            <div class="sb-layer active" id="sb-layer0">
                <div class="section-label" style="padding: 10px 12px 4px;">聖書</div>
                <div class="sb-row" id="sb-ot-row" onclick="sbGoTo(1,'ot')">
                    <span class="menu-text">旧約聖書</span>
                    <span class="sb-row-arrow menu-text">›</span>
                </div>
                <div class="sb-row active" id="sb-nt-row" onclick="sbGoTo(1,'nt')">
                    <span class="menu-text">新約聖書</span>
                    <span class="sb-row-arrow menu-text">›</span>
                </div>
            </div>

            <!-- Layer 1: 書物リスト -->
            <div class="sb-layer" id="sb-layer1">
                <div class="sb-layer-header menu-text" onclick="sbGoBack(0)">
                    <span class="sb-back-arrow">‹</span>
                    <span class="sb-layer-title" id="sb-l1-title">新約聖書</span>
                </div>
                <div id="sb-book-list"></div>
            </div>

            <!-- Layer 2: 章グリッド -->
            <div class="sb-layer" id="sb-layer2">
                <div class="sb-layer-header menu-text" onclick="sbGoBack(1)">
                    <span class="sb-back-arrow">‹</span>
                    <span class="sb-layer-title" id="sb-l2-title"></span>
                </div>
                <div class="section-label" style="padding: 8px 12px 4px;">章を選ぶ</div>
                <div class="sb-ch-grid menu-text" id="sb-ch-grid"></div>
            </div>

        </div>
    </nav>

    <div class="container">
        <header class="app-header">
            <div class="header-content">
                <div class="breadcrumb">
                    <span class="root-name">新約聖書</span>
                    <span class="separator">/</span>                    <h1 id="view-title">読み込み中...</h1>
                </div>
                <button id="open-panel-btn" onclick="toggleSidePanel()" style="display:none;" title="語形分解を表示">
                    <i class="fa-solid fa-circle-info"></i>
                </button>
            </div>
        </header>
        <div id="app"></div>
        <footer class="app-footer">
            <span class="footer-copy">© 2026 ウオノ All rights reserved.</span>
            <div class="footer-links">
                <button onclick="showMameKnowledge()">まめ知識</button>
                <button onclick="showAppInfo()">出典・ポリシー</button>
            </div>
        </footer>
    </div>

    <aside id="side-panel">
        <div class="panel-header">
            <span>語形分解</span>
            <div style="display: flex; gap: 10px; align-items: center;">
                <span id="active-v" style="font-size: 0.8rem; color: var(--text-sub);"></span>
                <button onclick="toggleSidePanel()" style="background:none; border:none; cursor:pointer; color:var(--text-sub); font-size: 1.2rem;">&times;</button>
            </div>
        </div>
        <div id="panel-content"><p style="color: var(--text-sub); font-size: 0.82rem; letter-spacing: 0.01em;">節を選択して解析を表示</p></div>
        <div id="word-detail-view"></div>
    </aside>
</div>

<script>
let abbottSmithDict = null;
const JPN_MAP = {
    pos: { 'V': '動詞', 'N': '名詞', 'A': '形容詞', 'R': '関係代名詞', 'P': '人称代名詞', 'D': '指示代名詞', 'T': '冠詞', 'ADV': '副詞', 'PREP': '前置詞', 'CONJ': '接続詞', 'PRT': '添語' },
    tense: { 'P': '現在', 'I': '未完了', 'F': '未来', 'A': 'アオリスト', 'X': '完了' },
    voice: { 'A': '能動', 'M': '中動', 'P': '受動', 'D': '能動的受動' },
    mood: { 'I': '直説', 'S': '接続', 'O': '希求', 'M': '命令', 'N': '不定', 'P': '分詞' },
    case: { 'N': '主格', 'G': '属格', 'D': '与格', 'A': '対格', 'V': '呼格' },
    gender: { 'M': '男性', 'F': '女性', 'N': '中性' },
    number: { 'S': '単数', 'P': '複数' },
    person: { '1': '1人称', '2': '2人称', '3': '3人称' }
};

async function loadDict() {
    try {
        abbottSmithDict = {};
        const resJp = await fetch('./macula-greek-SBLGNT.tsv');
        const buffer = await resJp.arrayBuffer();
        const decoder = new TextDecoder('utf-8');
        const textJp = decoder.decode(buffer);
        textJp.split(/\r?\n/).forEach((row, index) => {
            if (index === 0 || !row.trim()) return;
            const cols = row.split('\t');
            const strong = String(cols[12]).replace(/[^0-9]/g, "");
            if (strong) abbottSmithDict[strong] = { japanese: cols[6]?.trim() || "（未登録）", gloss: cols[5]?.trim() || "" };
        });
        const resAbbott = await fetch('./abbott-smith.tsv');
        const textAbbott = await resAbbott.text();
        textAbbott.split(/\r?\n/).forEach(row => {
            const cols = row.split('\t');
            const strong = String(cols[0]).trim();
            if (abbottSmithDict[strong]) abbottSmithDict[strong].description = cols[2]?.trim() || "";
        });
    } catch (e) { console.error("Dict Error:", e); }
}

function decorate(wordText, wordData) {
    const m = wordData;
    const morph = m.morph || "";
    const parts = morph.split('-');
    const pos = parts[0]; 
    let jpMorph = "";
    let styleClass = "";
    let middleStar = "";

    if (pos === 'V' && parts[1]) {
        // 先頭が数字（語幹タイプ）の場合はオフセット+1
        const off = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off + 0];
        const voiceCode = parts[1][off + 1];
        const moodCode  = parts[1][off + 2];

        // 中動態・受動態にアスタリスク
        if (['M', 'P', 'D'].includes(voiceCode)) {
            middleStar = '<span style="color:var(--highlight); margin-left:2px;">*</span>';
        }

        const t  = JPN_MAP.tense[tenseCode] || "";
        const v  = JPN_MAP.voice[voiceCode]  || "";
        const md = JPN_MAP.mood[moodCode]    || "";

        if (moodCode === 'P') {
            // 分詞：装飾なし（直説・命令のみ装飾）
            const cng = parts[2]
                ? (JPN_MAP.case[parts[2][0]]   || "") +
                  (JPN_MAP.number[parts[2][1]] || "") +
                  (JPN_MAP.gender[parts[2][2]] || "")
                : "";
            // 語順：動詞:分詞(時制・態・格数性)
            jpMorph = `動詞:分詞${t}${v}${cng ? "(" + cng + ")" : ""}`;
        } else if (moodCode === 'I' || moodCode === 'M') {
            if (tenseCode === 'P') styleClass = "present-text";
            else if (tenseCode === 'A') styleClass = "aorist-text";
            else if (tenseCode === 'X') styleClass = "perfect-text";
            else if (tenseCode === 'F') styleClass = "future-text";
            if (moodCode === 'I') styleClass += " indicative-text";
            else if (moodCode === 'M') styleClass += " imperative-text";
            const person = parts[1].length >= (off + 4) ? (JPN_MAP.person[parts[1][off + 3]] || "") : "";
            const number = parts[1].length >= (off + 5) ? (JPN_MAP.number[parts[1][off + 4]] || "") : "";
            // 語順：動詞:法・時制・態・人称数
            jpMorph = `動詞:${md}${t}${v}${person}${number}`;
        } else {
            // 接続法(S)・希求法(O)・不定詞(N) など
            const person = parts[1].length >= (off + 4) ? (JPN_MAP.person[parts[1][off + 3]] || "") : "";
            const number = parts[1].length >= (off + 5) ? (JPN_MAP.number[parts[1][off + 4]] || "") : "";
            jpMorph = `動詞:${md}${t}${v}${person}${number}`;
        }
    } else if (['N', 'A', 'R', 'P', 'T', 'D'].includes(pos) && parts[1]) {
        const label = JPN_MAP.pos[pos] || pos;
        let p = "", c = "", n = "", g = "";
        if (['1', '2', '3'].includes(parts[1][0])) {
            p = parts[1][0] + "人称";
            c = JPN_MAP.case[parts[1][1]]   || "";
            n = JPN_MAP.number[parts[1][2]] || "";
        } else {
            c = JPN_MAP.case[parts[1][0]]   || "";
            n = JPN_MAP.number[parts[1][1]] || "";
            g = JPN_MAP.gender[parts[1][2]] || "";
        }
        // 語順：品詞:格・数・性（名詞系）
        jpMorph = `${label}:${p}${c}${n}${g}`;
    } else {
        jpMorph = JPN_MAP.pos[pos] || morph;
    }

    const strong = String(m.strong || "").replace(/[^0-9]/g, ""); 
    const info = abbottSmithDict ? abbottSmithDict[strong] : null;
    return `<div class="word-card" onclick="showDetail('${wordText}', '${strong}', '${jpMorph}', '${morph}')">
                <div>
                    <span class="greek-word ${styleClass}">${wordText}</span>${middleStar}
                    <span style="font-weight:bold; margin-left:5px; font-size:0.9rem;">［${info?.japanese || "？"}］</span>
                    <span class="tag-jp">${jpMorph}</span>
                </div>
                <span class="strong-num">G${strong}</span>
            </div>`;
}

/* =====================================================
   形態素コード → 検索パラメータ変換
   ===================================================== */
function parseMorphForSearch(rawMorph) {
    const parts = rawMorph.split('-');
    const pos = parts[0];
    const result = { pos };

    if (pos === 'V' && parts[1]) {
        const off = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off + 0];
        const voiceCode = parts[1][off + 1];
        const moodCode  = parts[1][off + 2];

        const TENSE_MAP = { P:'present', I:'imperfect', F:'future', A:'aorist', X:'perfect' };
        const VOICE_MAP = { A:'active', M:'middle', P:'passive', D:'middle deponent' };
        const MOOD_MAP  = { I:'indicative', S:'subjunctive', O:'optative',
                            M:'imperative', N:'infinitive', P:'participle' };

        if (tenseCode) result.tense = TENSE_MAP[tenseCode] || '';
        if (voiceCode) result.voice = VOICE_MAP[voiceCode] || '';
        if (moodCode)  result.mood  = MOOD_MAP[moodCode]   || '';

        // 分詞の場合は格・数・性も取得
        if (moodCode === 'P' && parts[2]) {
            const CASE_MAP   = { N:'nominative', G:'genitive', D:'dative', A:'accusative', V:'vocative' };
            const NUMBER_MAP = { S:'singular', P:'plural' };
            const GENDER_MAP = { M:'masculine', F:'feminine', N:'neuter' };
            result.case   = CASE_MAP[parts[2][0]]   || '';
            result.number = NUMBER_MAP[parts[2][1]] || '';
            result.gender = GENDER_MAP[parts[2][2]] || '';
        }
    } else if (['N','A','R','P','T','D'].includes(pos) && parts[1]) {
        const CASE_MAP   = { N:'nominative', G:'genitive', D:'dative', A:'accusative', V:'vocative' };
        const NUMBER_MAP = { S:'singular', P:'plural' };
        const GENDER_MAP = { M:'masculine', F:'feminine', N:'neuter' };
        const base = ['1','2','3'].includes(parts[1][0]) ? parts[1].slice(1) : parts[1];
        result.case   = CASE_MAP[base[0]]   || '';
        result.number = NUMBER_MAP[base[1]] || '';
        result.gender = GENDER_MAP[base[2]] || '';
    }
    return result;
}

/* 形態論検索ページへ遷移 */
function goMorphSearch(greek, rawMorph, ref) {
    const m = parseMorphForSearch(rawMorph);
    const p = new URLSearchParams();

    // コア条件（動詞：pos + tense + mood + voice）
    if (m.pos)   p.set('pos',   m.pos);
    if (m.tense) p.set('tense', m.tense);
    if (m.mood)  p.set('mood',  m.mood);
    if (m.voice) p.set('voice', m.voice);

    // 拡張条件（ON状態で渡す）
    if (m.gender) p.set('gender', m.gender);
    if (m.number) p.set('number', m.number);
    if (m.case)   p.set('case',   m.case);

    // メタ（パンくず用）
    if (ref)   p.set('ref',  ref);
    if (greek) p.set('word', greek);

    window.open(`morph-search.html?${p.toString()}`, '_blank');
}

/* 形態タグ HTML 生成 */
function buildMorphTagsHTML(rawMorph) {
    const m = parseMorphForSearch(rawMorph);
    const JPN = {
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞' },
        tense:  { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了' },
        voice:  { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動' },
        mood:   { indicative:'直説法', subjunctive:'接続法', optative:'希求法',
                  imperative:'命令法', infinitive:'不定詞', participle:'分詞' },
        gender: { masculine:'男性', feminine:'女性', neuter:'中性' },
        number: { singular:'単数', plural:'複数' },
        case:   { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' },
    };

    const tags = [];
    if (m.pos)    tags.push({ label: JPN.pos[m.pos], core: true });
    if (m.mood)   tags.push({ label: JPN.mood[m.mood], core: true });
    if (m.tense)  tags.push({ label: JPN.tense[m.tense], core: true });
    if (m.voice)  tags.push({ label: JPN.voice[m.voice], core: false });
    if (m.person) tags.push({ label: JPN.person[m.person], core: false });
    if (m.number) tags.push({ label: JPN.number[m.number], core: false });
    if (m.case)   tags.push({ label: JPN.case[m.case], core: false });
    if (m.gender) tags.push({ label: JPN.gender[m.gender], core: false });

    if (tags.length === 0) return '';
    return `<div class="morph-tag-row">
        ${tags.map(t => `<span class="morph-tag-pill${t.core ? ' core' : ''}">${t.label}</span>`).join('')}
    </div>`;
}

function showDetail(greek, strong, jpMorph, rawMorph) {
    const view = document.getElementById('word-detail-view');
    view.style.display = 'block';
    const info = abbottSmithDict ? abbottSmithDict[strong] : null;
    let classes = [], legends = [];
    
    const parts = rawMorph.split('-');
    if (parts[0] === 'V' && parts[1]) {
        const off = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off + 0];
        const moodCode  = parts[1][off + 2];

        // 直説・命令の場合のみ装飾凡例を表示（語順：法→時制）
        if (moodCode === 'I' || moodCode === 'M') {
            if (moodCode === 'I') { classes.push("indicative-text"); legends.push(`<span class="indicative-text">背景:直説</span>`); }
            else if (moodCode === 'M') { classes.push("imperative-text"); legends.push(`<span class="imperative-text">背景:命令</span>`); }
            if (tenseCode === 'P') { classes.push("present-text"); legends.push(`<span class="present-text">実線:現在</span>`); }
            else if (tenseCode === 'A') { classes.push("aorist-text"); legends.push(`<span class="aorist-text">点線:アオリスト</span>`); }
            else if (tenseCode === 'X') { classes.push("perfect-text"); legends.push(`<span class="perfect-text">波線:完了</span>`); }
            else if (tenseCode === 'F') { classes.push("future-text"); legends.push(`<span class="future-text">二重線:未来</span>`); }
        }
    }

    // 形態タグと検索ボタン（動詞・名詞・形容詞系すべてに表示）
    const morphTagsHTML = buildMorphTagsHTML(rawMorph);
    const canSearch = ['V','N','A','R','P','T','D'].includes(parts[0]);
    const currentRef = document.getElementById('active-v')?.innerText?.replace(' 節','') || '';
    const searchBtnHTML = canSearch ? `
        <button class="morph-search-btn" onclick="goMorphSearch('${greek.replace(/'/g,"\\'")}', '${rawMorph}', '${currentRef}')">
            <span class="btn-icon">⊕</span>
            形態で検索
        </button>` : '';
    
    view.innerHTML = `
        <div class="detail-header">
            <div>
                <span style="font-family:'Gentium Plus'; font-size:1.7rem;" class="${classes.join(' ')}">${greek}</span>
                <span style="color:var(--text-sub); font-size:0.75rem; margin-left:10px;">G${strong}</span>
            </div>
            <button onclick="closeDetail()" style="background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--text-sub); line-height:1;">&times;</button>
        </div>
        <div class="detail-body">
            ${morphTagsHTML}
            <div class="grammar-legend">${legends.join(" ")}</div>
            <p style="margin:10px 0 6px;"><strong style="color:var(--highlight);">基本義</strong>　${info?.japanese || '---'}</p>
            <div style="background:var(--bg-panel); padding:12px; border-radius:8px; white-space:pre-wrap; font-size:0.85rem; color:var(--text-main); line-height:1.8;">${info?.description || "解説なし"}</div>
            ${searchBtnHTML}
        </div>`;
    
    view.scrollTop = 0;
}

function sbGoTo(layer, section) {
    document.querySelectorAll('.sb-layer').forEach(l => l.classList.remove('active'));

    if (layer === 0) {

    if (found) sbGoTo(2);

async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || 'ROM';
    const ch   = urlParams.get('ch')   || '1';

    // 旧約/新約に応じてヘッダーのroot-nameを更新
    const isNt = SB_BOOKS.nt.some(b => b.key === book);
    document.querySelector('.root-name').innerText = isNt ? '新約聖書' : '旧約聖書';

    // ヘッダータイトル更新
    const allBooks = [...SB_BOOKS.nt, ...SB_BOOKS.ot];
    const found = allBooks.find(b => b.key === book);
    document.getElementById('view-title').innerText = found
        ? `${found.name} ${ch}章`
        : `${book} ${ch}章`;

    // サイドバーをドリルダウンで初期化
    sbInitState(book, parseInt(ch));

    await loadDict();
    try {
        const [jpRes, elRes] = await Promise.all([
            fetch(`./bible_jp/${book}/${ch}.json`),
            fetch(`./bible_data/${book}/${ch}.json`)
        ]);
        render(await jpRes.json(), await elRes.json());
    } catch (err) {
        document.getElementById('app').innerHTML = `<p style="color:red">Data not found.</p>`;
    }
}

function render(jpData, elData) {
    const app = document.getElementById('app');
    const panelContent = document.getElementById('panel-content');
    const vLabel = document.getElementById('active-v');
    app.innerHTML = '';
    const elByVerse = {};
    elData.forEach(w => {
        const v = w.ref.split(':')[1]?.split('!')[0];
        if (v) { if (!elByVerse[v]) elByVerse[v] = []; elByVerse[v].push(w); }
    });
    Object.entries(jpData.verses).forEach(([vNum, text]) => {
        const block = document.createElement('div');
        block.className = 'verse-block';
        block.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text">${text}</div></div>`;
        block.onclick = () => {
            if (window.getComputedStyle(document.getElementById('side-panel')).display === 'none') toggleSidePanel();
            document.querySelectorAll('.verse-block').forEach(b => b.style.background = 'transparent');
            block.style.background = 'rgba(0,0,0,0.03)';
            vLabel.innerText = `${vNum} 節`;
            panelContent.innerHTML = ''; 
            if (elByVerse[vNum]) elByVerse[vNum].forEach(w => { panelContent.innerHTML += decorate(w.text, w); });
            closeDetail();
        };
        app.appendChild(block);
    });
}

            .info-box h3 { font-size: 1.1rem; color: #d35400; margin-top: 30px; border-bottom: 1px solid var(--border-soft); padding-bottom: 5px; }
            .info-box ul { padding-left: 20px; }
            .info-box li { margin-bottom: 10px; }
            .info-box strong { color: var(--accent-dark); }

                background: var(--highlight); color: white; border: none; padding: 12px 40px;

            }

            @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        </style>

        <div class="knowledge-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(event, 'kanji')">冠詞</button>
                <button class="tab-btn" onclick="switchTab(event, 'kaku')">格の特徴</button>
                <button class="tab-btn" onclick="switchTab(event, 'futei')">不定詞</button>
            </div>

            <div id="kanji" class="tab-content active">
                <div class="info-box">
                    <h2>ギリシャ語の冠詞</h2>
                    <aside>
                        ギリシャ語の冠詞は英語の「the」とは異なり、「それが何であるか（正体）」を示す装置である。基本は次の対比で整理する。<br>
                        <strong>冠詞あり</strong> → 正体が特定されている<br>
                        <strong>冠詞なし</strong> → 性質・本質が強調されている
                    </aside>
                    <h3>①：基本機能（最重要）</h3>
                    <p>冠詞は対象を特定し、読者に「これである」と指し示す働きを持つ。一方、無冠詞は対象の性質や特徴に焦点を当てる。</p>
                    <h3>②：冠詞ありの主な用法</h3>
                    <ul>
                        <li>既出の対象：前に言及されたもの</li>
                        <li>文脈上明らかな対象：周知のもの</li>
                        <li>唯一の存在（神、太陽など）</li>
                        <li>クラスを代表するもの</li>
                    </ul>
                    <h3>③：無冠詞名詞の主な用法</h3>
                    <ul>
                        <li>性質の強調（どのような存在か）</li>
                        <li>不特定（ある一つの〜）</li>
                        <li>文脈上は特定される（固有名詞など）</li>
                    </ul>
                    <h3>④：主語と述語主格（重要構文）</h3>
                    <p>「AはBである」では、冠詞がある方が主語。動詞の前に置かれた述語主格は無冠詞になりやすく、性質が強調される。</p>
                    <h3>⑤：重要な文法規則</h3>
                    <ul>
                        <li><strong>コルウェルの規則：</strong>動詞の前の述語主格は無冠詞になりうる。</li>
                        <li><strong>グランヴィル・シャープの規則：</strong>「冠詞＋A＋και＋B」は同一人物。</li>
                        <li><strong>アポロニウスの規則：</strong>関連する名詞ペアは冠詞の有無が一致しやすい。</li>
                    </ul>
                    <h3>⑥：実体化（名詞化）の機能</h3>
                    <p>冠詞＋不定詞＝「〜すること」、冠詞＋分詞＝「〜する者」。</p>
                    <h3>⑦：判断の手順</h3>
                    <div class="step-list">
                        1. 冠詞の有無確認 → 2. 正体か性質か判定 → 3. 特定可能か検討 → 4. 主語述語関係確認 → 5. 文法規則適用検討 → 6. 性質強調の可能性検討
                    </div>
                    <div class="back-button-container">
                        <button class="back-btn" onclick="renderCurrentPage()">本文に戻る</button>
                    </div>
                </div>
            </div>

            <div id="kaku" class="tab-content">
                <div class="info-box">
                    <h2>格の特徴</h2>
                    <aside>
                        5格（主・属・与・対・呼）を「誰が・誰の・誰に・何を・呼びかけ」を軸に整理する。
                    </aside>
                    <h3>①：主格</h3>
                    <p>コアイメージは「主体・同一性」。主語や述語主格に使われる。冠詞・代名詞・固有名詞の順に主語になりやすい。</p>
                    <h3>②：属格</h3>
                    <p>コアイメージは「制限・関係（〜の）」。所有、関係、性質、同格などのほか、「〜から（分離）」も表す。主格的／目的格的属格の判断が重要。</p>
                    <h3>③：与格</h3>
                    <p>コアイメージは「関わり・影響」。間接目的語、利益、場所（〜において）、手段（〜によって）などを表す。</p>
                    <h3>④：対格</h3>
                    <p>コアイメージは「動作の到達点・範囲」。直接目的語、時間の長さ、方向。<strong>不定詞の主語が対格になる</strong>点に注意。</p>
                    <h3>⑤：呼格</h3>
                    <p>コアイメージは「呼びかけ」。主格が代用される場合は、より強調されたニュアンスを持つ。</p>
                    <div class="back-button-container">
                        <button class="back-btn" onclick="renderCurrentPage()">本文に戻る</button>
                    </div>
                </div>
            </div>

            <div id="futei" class="tab-content">
                <div class="info-box">
                    <h2>不定詞</h2>
                    <aside>
                        動詞の性質（相）と名詞の性質（〜すること）をあわせ持つ「動詞的名詞」。
                    </aside>
                    <h3>①：相（アスペクト）</h3>
                    <ul>
                        <li>現在不定詞：進行・継続</li>
                        <li>アオリスト不定詞：単純な出来事（過去ではない）</li>
                        <li>完了不定詞：動作の結果の状態</li>
                    </ul>
                    <h3>②：名詞的／副詞的な使い方</h3>
                    <p>主語や目的語として働くほか、理由・目的（〜するために）・結果などの副詞的機能も持つ。</p>
                    <h3>④：前置詞＋不定詞（時間関係）</h3>
                    <ul>
                        <li>μετὰ + 不定詞：〜した後で</li>
                        <li>ἐν + 不定詞：〜している最中に</li>
                        <li>πρὸ + 不定詞：〜する前に</li>
                    </ul>
                    <h3>⑤：判断の手順</h3>
                    <div class="step-list">
                        1. 前の動詞確認 → 2. 前置詞確認 → 3. 「〜すること」代入 → 4. 理由・目的検討 → 5. 不定詞の主語（対格）確認
                    </div>
                    <div class="back-button-container">
                        <button class="back-btn" onclick="renderCurrentPage()">本文に戻る</button>
                    </div>
                </div>
            </div>
        </div>
