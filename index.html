async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || 'ROM';
    const ch   = urlParams.get('ch')   || '1';

    if (urlParams.get('transA')) _transA = currentTranslation  = urlParams.get('transA');
    if (urlParams.get('mode') && urlParams.get('mode') !== 'compare') {
        _transMode = urlParams.get('mode');
    }
    if (_transMode === 'compare' && urlParams.get('transB')) {
        _transB = currentTranslationB = urlParams.get('transB');
    }
    _applyTransMode(_transMode);
    
    const isNt = SB_BOOKS.nt.some(b => b.key === book);
    document.querySelector('.root-name') && (document.querySelector('.root-name').innerText = isNt ? '新約聖書' : '旧約聖書');

    const allBooks = [...SB_BOOKS.nt, ...SB_BOOKS.ot];
    const found = allBooks.find(b => b.key === book);
    const chNum = parseInt(ch);

    /* AppState.location を設定 */
    AppState.location.testament = isNt ? 'nt' : 'ot';
    AppState.location.book      = found || null;
    AppState.location.chapter   = chNum;

    /* view-title は互換のため維持 */
    const titleEl = document.getElementById('view-title');
    if (titleEl) titleEl.innerText = found ? `${found.name} ${ch}章` : `${book} ${ch}章`;

    /* グローバルbreadcrumb を描画 */
    renderGlobalBreadcrumb();

    syncUrlState();

    sbInitState(book, chNum);

    await loadDict();

    const hasGreek = GREEK_BOOKS.has(book);

    try {
        /* _transA が FLOW の場合は翻訳JSONをfetchしない */
        const jpData = _transA === 'FLOW'
            ? null
            : await _fetchTranslation(_transA, book, ch);
        if (_transA !== 'FLOW' && !jpData) throw new Error(`bible_jp not found: ${book}/${ch}`);

        let jpDataB = null;
        if (_transMode === 'compare' && _transB !== 'FLOW') {
            jpDataB = await _fetchTranslation(_transB, book, ch);
        }

        let elData = [];
        if (hasGreek) {
            try {
                const testament = SB_BOOKS.nt.some(b => b.key === book) ? 'nt' : 'lxx';
                const elRes = await fetch(`./bible_data/${testament}/${book}/${ch}.json`);
                if (elRes.ok) {
                    elData = await elRes.json();
                } else {
                    console.warn(`bible_data not found for ${book}/${ch} - Greek panel disabled`);
                }
            } catch (e) {
                console.warn(`bible_data fetch error for ${book}/${ch}:`, e);
            }
        }

        /* _transA === 'FLOW': elData から verse キーを組み立てて jpData の代わりに渡す */
        const resolvedJpData = (_transA === 'FLOW')
            ? _buildFlowJpData(elData)
            : jpData;
        if (!resolvedJpData) throw new Error(`bible_jp not found: ${book}/${ch}`);

        render(resolvedJpData, elData, hasGreek && elData.length > 0, jpDataB);

            if (window.AppOnboarding && !window.AppOnboarding.getState().onboardingComplete) {
                document.querySelectorAll('[data-onboarding-anchor="true"]').forEach(function(el) {
                    el.removeAttribute('data-onboarding-anchor');
                });
                const ANCHOR_WORDS = ['γάρ', 'ἠγάπησεν', 'οὕτως'];
                let anchorEl = null;
                for (var aw = 0; aw < ANCHOR_WORDS.length; aw++) {
                    anchorEl = document.querySelector('.wlv-chip[data-greek="' + ANCHOR_WORDS[aw] + '"], .word-card[data-greek="' + ANCHOR_WORDS[aw] + '"]');
                    if (anchorEl) break;
                }
                if (!anchorEl) anchorEl = document.querySelector('.verse-block, .verse-pair-left');
                if (anchorEl) anchorEl.setAttribute('data-onboarding-anchor', 'true');
                window.AppOnboarding.onPageRendered();
        }

    } catch (err) {
        console.error(err);
        document.getElementById('bible-text-area').innerHTML = `<p style="color:red">データが見つかりません（${book} ${ch}章）</p>`;
    }
}

function render(jpData, elData, hasGreek, jpDataB) {
    const app          = document.getElementById('bible-text-area');
    const parallel     = document.getElementById('parallel-text-area');
    const mainArea     = document.getElementById('main-reading-area');

    /* 翻訳ヘッダー */
    const headerA = document.getElementById('trans-col-header-a');
    const headerB = document.getElementById('trans-col-header-b');
    headerA.textContent = (TRANSLATIONS[_transA] || {}).label || _transA;

    // 右列ヘッダーラベルを更新
    const gfTransLblEarly = document.getElementById('gf-trans-label');
    if (mainArea.classList.contains('compare-mode')) {
        if (gfTransLblEarly) gfTransLblEarly.textContent = (TRANSLATIONS[_transB] || {}).label || _transB;
    } else {
        if (gfTransLblEarly) gfTransLblEarly.textContent = '';
    }

    // ── Study panel を閉じて Reading 状態に戻す ──
    closeStudyPanel();
    /* 章が変わった場合は AppState を完全リセット（study.params も破棄） */
    AppState.mode                = 'reading';
    AppState.selectedVerse       = { vNum: null, elWords: [] };
    AppState.inspect.data        = null;
    AppState.study.params        = null;
    AppState.study.tab           = 'flow';
    AppState.scrollTop           = 0;
    AppState.clearDepth();
app.innerHTML = '';
    parallel.innerHTML = '';
    /* compare モードで mainArea に直接追加した verse-pair をクリア */
    mainArea.querySelectorAll('.verse-pair').forEach(el => el.remove());

    const elByVerse = {};
    if (elData && elData.length > 0) {
        elData.forEach(w => {
            const v = w.ref.split(':')[1]?.split('!')[0];
            if (v) { if (!elByVerse[v]) elByVerse[v] = []; elByVerse[v].push(w); }
        });
    }

    const openBtn = document.getElementById('open-panel-btn');
    if (!hasGreek) {
        document.getElementById('bottom-depth-panel').style.display = 'none';
        openBtn.style.display = 'none';
    }

    const useVersePair = mainArea.classList.contains('compare-mode');

    Object.entries(jpData.verses).forEach(([vNum, text]) => {
        // 左：聖書本文 or 読解フロー（_transA === 'FLOW'）
        const block = document.createElement('div');
        block.className = useVersePair ? 'verse-block verse-pair-left' : 'verse-block';

        if (_transA === 'FLOW') {
            const words = elByVerse[vNum] || [];
            if (words.length === 0) {
                block.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text" style="color:var(--text-sub);font-size:0.82rem;opacity:0.5;">原語データなし</div></div>`;
            } else {
                const chips = words.map((w, i) => _wordToFlowChip(w, i));
                /* 修正B: ヨハネ3:16の先頭chip（index=0）にオンボーディングアンカーを付与 */
                const _obBook = AppState.location.book ? AppState.location.book.key : '';
                const _obChapter = AppState.location.chapter;
                const isAnchorVerse = _obBook === 'JHN' && _obChapter === 3
                    && String(vNum) === '16';
                const chipsHTML = chips.map((c, i) => {
                    const sep = c.phraseBreakBefore ? `<span class="wlv-phrase-sep"></span>` : '';
                    const anchorAttr = (isAnchorVerse && i === 0)
                        ? ' data-onboarding-anchor="true" data-greek="' + c.greek + '"'
                        : '';
                    return `${sep}<span class="wlv-chip ${c.roleClass}" data-idx="${i}"${anchorAttr} onclick="event.stopPropagation();_wlvChipClick(this,${i})" title="${c.greek}"><span class="wlv-chip-ja"><span class="${c.dpGrammarClasses}">${c.gloss}</span></span><span class="wlv-chip-dot"></span></span>`;
                }).join('');
                block.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text" style="font-size:0.88rem;line-height:2.4;"><div class="wlv-flow-stream" style="flex-wrap:wrap;display:flex;gap:4px 2px;align-items:baseline;">${chipsHTML}</div></div></div>`;
                block.onclick = () => {
                    mainArea.querySelectorAll('.verse-block').forEach(b => b.classList.remove('selected'));
                    block.classList.add('selected');
                    document.getElementById('active-v').innerText = `${vNum} 節`;
                    AppState.toBrowsing(vNum, words);
                    openWordListInStudyPanel(vNum, words);
                    hideInspectPopover();
                };
            }
        } else {
            block.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text">${text}</div></div>`;
        }

        // 右：並列訳 or 読解フロー
        const pBlock = document.createElement('div');
        pBlock.className = 'verse-block verse-pair-right';
        pBlock.dataset.vnum = vNum;

        if (_transB === 'FLOW') {
            // _setRightMode('flow') が gf-verse-block を差し込むので
            // ここでは空コンテナのみ用意する（二重描画防止）
            pBlock.innerHTML = '';
        } else if (!useVersePair && _transA === 'FLOW') {
            // single-mode + transA=FLOW: 右列は不要
            pBlock.innerHTML = '';
        } else {
            const rightText = (jpDataB && jpDataB.verses && jpDataB.verses[vNum]) ? jpDataB.verses[vNum] : (jpData.verses[vNum] || '');
            pBlock.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text">${rightText}</div></div>`;
            if (hasGreek) {
                pBlock.onclick = () => {
                    document.querySelectorAll('.verse-block').forEach(b => b.classList.remove('selected'));
                    block.classList.add('selected');
                    pBlock.classList.add('selected');
                    document.getElementById('active-v').innerText = `${vNum} 節`;
                    AppState.toBrowsing(vNum, elByVerse[vNum] || []);
                    openWordListInStudyPanel(vNum, elByVerse[vNum] || []);
                    hideInspectPopover();
                };
            }
        }

        if (hasGreek && _transA !== 'FLOW') {
            block.onclick = () => {
                mainArea.querySelectorAll('.verse-block').forEach(b => b.classList.remove('selected'));
                block.classList.add('selected');
                pBlock.classList.add('selected');
                document.getElementById('active-v').innerText = `${vNum} 節`;
                AppState.toBrowsing(vNum, elByVerse[vNum] || []);
                openWordListInStudyPanel(vNum, elByVerse[vNum] || []);
                hideInspectPopover();
            };
        }

        if (useVersePair && window.innerWidth <= 768) {
            /* モバイル比較モード：節ごとにA訳→区切り→B訳を縦に積む */
            const verseGroup = document.createElement('div');
            verseGroup.className = 'mobile-verse-group';
            verseGroup.dataset.vnum = vNum;

            /* 節番号バッジ */
            const vBadge = document.createElement('div');
            vBadge.className = 'mobile-vnum-badge';
            vBadge.textContent = vNum;
            verseGroup.appendChild(vBadge);

            /* A訳ブロック */
            const aWrap = document.createElement('div');
            aWrap.className = 'mobile-trans-block mobile-trans-a';
            const aLabel = document.createElement('div');
            aLabel.className = 'mobile-trans-label';
            aLabel.textContent = (TRANSLATIONS[_transA] || {}).label || _transA;
            aWrap.appendChild(aLabel);
            aWrap.appendChild(block);
            verseGroup.appendChild(aWrap);

            /* 区切り線 */
            const sep = document.createElement('div');
            sep.className = 'mobile-verse-sep';
            verseGroup.appendChild(sep);

            /* B訳ブロック */
            const bWrap = document.createElement('div');
            bWrap.className = 'mobile-trans-block mobile-trans-b';
            const bLabel = document.createElement('div');
            bLabel.className = 'mobile-trans-label';
            bLabel.textContent = (TRANSLATIONS[_transB] || {}).label || _transB;
            bWrap.appendChild(bLabel);
            bWrap.appendChild(pBlock);
            verseGroup.appendChild(bWrap);

            app.appendChild(verseGroup);
        } else if (useVersePair) {
            const pairEl = document.createElement('div');
            pairEl.className = 'verse-pair';
            pairEl.appendChild(block);
            pairEl.appendChild(pBlock);
            mainArea.appendChild(pairEl);
        } else {
            app.appendChild(block);
            parallel.appendChild(pBlock);
        }
    });

_proximityTokens = (elData || []).map(w => ({ text: w.text || '', lemma: w.lemma || w.text || '' }));

    /* Greek Flow View: キャッシュ保存 */
    _cachedElByVerse = elByVerse;
    _cachedJpDataB   = jpDataB || null;

    /* 右列ヘッダーラベルを更新 */
    const gfTransLbl  = document.getElementById('gf-trans-label');
    /* 右列ヘッダーラベルを常に transBの翻訳名で更新 */
    if (gfTransLbl) {
        gfTransLbl.textContent = mainArea.classList.contains('compare-mode')
            ? ((TRANSLATIONS[_transB] || {}).label || _transB)
            : '';
    }

    /* flowモードが残っている場合はリセット（章移動時の整合性）
       ただし activateFlowCompare が呼ぶ renderCurrentPage の場合は除外 */
    if (_transB === 'FLOW') {
        /* transB=FLOW が選ばれているときは常にflowモードを起動 */
        const gfTabBar = document.getElementById('gf-tab-bar');
        if (gfTabBar) gfTabBar.style.display = '';
        _setRightMode('flow');
    } else if (_rightMode === 'flow' && _transB !== 'FLOW') {
        _setRightMode('trans');
    }

    /* オンボーディング Flow ステップ中：モバイルCSS を上書きして右列を強制表示 */
    if (window.AppOnboarding) {
        var _obState = window.AppOnboarding.getState();
        if (!_obState.onboardingComplete && !_obState.onboardingSkipped
            && _obState.currentStep === 'gar17_clicked') {
            mainArea.querySelectorAll('.verse-pair-right').forEach(function(el) {
                el.style.display = 'block';
                el.style.visibility = 'visible';
            });
            if (document.getElementById('parallel-text-area')) {
                document.getElementById('parallel-text-area').style.display = 'block';
            }
        }
    }

    /* モバイル比較モード：1節ナビセットアップ */
    if (window.innerWidth <= 768 && mainArea.classList.contains('compare-mode')) {
        _mobileCompareSetup();
    } else {
        _mobileCompareTeardown();
    }

}

/**
 * 節クリック時に side-panel を開き、語形リストを3タブで表示する。
 *
 * タブ構成:
 *   流れ（デフォルト） … ギリシャ語順の日本語chip列。「読解UI」のメイン。
 *   通常               … 既存の word-card リスト。
 *   原語               … ギリシャ語テキスト + 簡易morph。
 *
 * 既存の AppState / openStudyPanel / Inspect popover との接続はそのまま。
 * word-card の onclick（onWordCardClick）も通常タブでは変わらず動作する。
 * 流れタブのchipクリックは _wlvChipClick() を経由して同じ AppState を更新する。
 */
function openWordListInStudyPanel(vNum, words) {
    /* words をキャッシュ（chip クリック時の詳細参照用） */
    _wlvWordCache = words || [];

    /* depth stack に verse-flow を追加（reading が先頭になければ追加） */
    const stack = AppState.depth.stack;
    if (stack.length === 0 || stack[0].type !== 'reading') {
        /* reading を先頭に置いてからverse-flowを追加 */
        AppState.clearDepth();
        pushDepth({ type: 'reading', label: '読書' });
    }
    /* verse-flow を追加（重複しないよう top を確認） */
    const top = stack[stack.length - 1];
    if (!top || top.type !== 'verse-flow' || String(top.verse) !== String(vNum)) {
        pushDepth({
            type:  'verse-flow',
            label: 'ことばの流れ',
            verse: vNum,
        });
    }

    _openWordListInternal(vNum, words);

    /* onboarding hook: 節タップ時にも通知 */
    if (window.AppOnboarding) {
        window.AppOnboarding.onStudyPanelOpened(window.innerWidth <= 900, String(vNum));
    }
}

/* ════════════════════════════════════════════════════════
   buildFlowTabHTML - 「流れ」タブのメイン描画
   ════════════════════════════════════════════════════════

   設計：
   ① ギリシャ語順を保持（並べ替えない）
   ② 日本語グロスを自然化（品詞・法・時制に応じて接尾語を変換）
   ③ 冠詞は「その」「この」のみ、接続詞は軽く句区切りを挿入
   ④ chip内 dot で品詞を静かに色付け（役割ラベルなし）
   ⑤ クリックで下部ドロワーに詳細を展開（初期非表示）
   ════════════════════════════════════════════════════════ */
function _buildFlowTabHTML(words) {
    /* 各語を「流れchip」データに変換 */
    const chips = words.map((w, i) => _wordToFlowChip(w, i));

    /* ── chip HTML（補助として小さく） ── */
    const chipsHTML = chips.map((c, i) => {
        const sepBefore = c.phraseBreakBefore ? `<span class="wlv-phrase-sep"></span>` : '';
        /* 修正B: FLOWモードでは本文chipにアンカーが付くため、Study Panel側は付与しない */
        const anchorAttr = (i === 0
            && typeof _transA !== 'undefined' && _transA !== 'FLOW'
            && window.AppOnboarding && !window.AppOnboarding.getState().onboardingComplete)
            ? ' data-onboarding-anchor="true"'
            : '';
        return `${sepBefore}<span class="wlv-chip ${c.roleClass}"
            data-idx="${i}"
            data-greek="${c.greek}"${anchorAttr}
            onclick="_wlvChipClick(this,${i})"
            title="${c.greek}">
            <span class="wlv-chip-ja"><span class="${c.dpGrammarClasses}">${c.gloss}</span></span>
            <span class="wlv-chip-dot"></span>
        </span>`;
    }).join('');

    /* ── 詳細ドロワー：prosecontinuity design ── */
    const drawerHTML = `
        <div class="wlv-detail-drawer" id="wlv-detail-drawer">
            <div class="wlv-detail-greek" id="wlv-dd-greek">-</div>
            <div class="wlv-detail-ja"    id="wlv-dd-ja">-</div>
            <div class="wlv-detail-resonance" id="wlv-dd-resonance"></div>
            <button class="wlv-detail-study-btn" id="wlv-dd-study-btn" onclick="_wlvStudyBtnClick()">
                詳しく見る →
            </button>
        </div>`;

    /* ── 節全体の読書メモ ── */
    const passageNoteHTML = _buildPassageNote(words);

    /* オンボーディング完了前は凡例を非表示 */
    const _obComplete = window.AppOnboarding?.getState()?.onboardingComplete;
    const legendHTML = _obComplete ? `<div class="dp-legend">
        <span class="dp-legend-item"><span class="dp-sample dp-mood-imperative">語</span><span class="dp-legend-label">命令法</span></span>
        <span class="dp-legend-item"><span class="dp-sample dp-mood-indicative">語</span><span class="dp-legend-label">直説法</span></span>
        <span class="dp-legend-item"><span class="dp-sample dp-tense-present">語</span><span class="dp-legend-label">現在</span></span>
        <span class="dp-legend-item"><span class="dp-sample dp-tense-aorist">語</span><span class="dp-legend-label">アオリスト</span></span>
        <span class="dp-legend-item"><span class="dp-sample dp-tense-perfect">語</span><span class="dp-legend-label">完了</span></span>
        <span class="dp-legend-item"><span class="dp-sample dp-voice-middle">語</span><span class="dp-legend-label">中動/受動</span></span>
    </div>` : '';

    return `
        <div class="wlv-flow-section-compact">
            <span class="wlv-flow-label-compact">原語の順序</span>
            <div class="wlv-flow-stream" id="wlv-flow-stream">
                ${chipsHTML}
            </div>
            ${drawerHTML}
        </div>
        ${passageNoteHTML}
        ${legendHTML}`;
}

/**
 * 節全体の読書メモを生成する。
 * words 配列を解析し、節の「流れ・tone・discourse・emphasis」を
 * 自然な prose として表現する。
 *
 * 設計原則：
 * - signal 列挙しない。自然な文章として融合する。
 * - commentary / exegesis ではない。軽い読書補助。
 * - 情報を列挙するのではなく、文章の動きを感じさせる。
 */
function _buildPassageNote(words) {
    if (!words || words.length === 0) return '';

    /* ────────────────────────────────────────────────
       節全体の読書メモ。
       signal 列挙しない。自然な文として書く。
       文章の動きを感じさせる。commentary ではない。
       ──────────────────────────────────────────────── */

    /* 接続詞 */
    const conjWords = words.filter(w => (w.morph || '').split('-')[0] === 'CONJ').map(w => w.text || '');
    const CONJ_FEEL = {
        'γάρ':  '理由や根拠を示しながら',
        'ἀλλά': '前の内容と対比しながら',
        'οὖν':  '前の流れを受けて結論へ向かいながら',
        'δέ':   '話が次の段階へ進みながら',
        'ἵνα':  '目的を示しながら',
        'ὥστε': '前の内容の帰結として',
        'ὅτι':  '内容を補足しながら',
    };
    const conjHints = conjWords.map(c => CONJ_FEEL[c]).filter(Boolean);

    /* 動詞の法を読む */
    const verbs = words.filter(w => (w.morph || '').split('-')[0] === 'V');
    const imperatives = verbs.filter(w => {
        const p1 = (w.morph || '').split('-')[1] || '';
        const off = /^[0-9]/.test(p1) ? 1 : 0;
        return p1[off + 2] === 'M';
    });
    const perfects = verbs.filter(w => {
        const p1 = (w.morph || '').split('-')[1] || '';
        const off = /^[0-9]/.test(p1) ? 1 : 0;
        return p1[off] === 'X';
    });
    const passives = verbs.filter(w => {
        const p1 = (w.morph || '').split('-')[1] || '';
        const off = /^[0-9]/.test(p1) ? 1 : 0;
        return p1[off + 1] === 'P';
    });
    const participles = verbs.filter(w => {
        const p1 = (w.morph || '').split('-')[1] || '';
        const off = /^[0-9]/.test(p1) ? 1 : 0;
        return p1[off + 2] === 'P';
    });

    /* 比喩語 */
    const METAPHOR = { 'περιπατέω': '歩む', 'περιπατεῖν': '歩む', 'φωτί': '光', 'σκότος': '闇', 'σταυρός': '十字架' };
    const metaphorFound = words.find(w => METAPHOR[w.text] || METAPHOR[w.lemma]);

    /* 呼格 */
    const hasVocative = words.some(w => {
        const p1 = (w.morph || '').split('-')[1] || '';
        const base = ['1','2','3'].includes(p1[0]) ? p1.slice(1) : p1;
        return base[0] === 'V';
    });

    const parts = [];

    /* 第一段落：全体の流れと調子 */
    if (conjHints.length > 0) {
        const hint = conjHints[0];
        if (imperatives.length > 0)
            parts.push(`${hint}、行動への呼びかけが続いています。`);
        else if (perfects.length > 0)
            parts.push(`${hint}、かつての出来事が今も続いているという響きが感じられます。`);
        else
            parts.push(`${hint}、話が展開しています。`);
    } else if (imperatives.length >= 2) {
        parts.push(`呼びかけの調子が重なっています。同じ方向への言葉が繰り返されることで、強調の感触があります。`);
    } else if (imperatives.length === 1) {
        parts.push(`説明や叙述ではなく、行動への呼びかけとして語られています。`);
    } else if (perfects.length > 0) {
        parts.push(`過去に起きた出来事の効果が今も続いている、という完了の重みが感じられます。`);
    } else if (passives.length > 0) {
        parts.push(`主語が「受けとめる側」として置かれています。神学的な文脈では、神による行為を示すことがあります。`);
    }

    /* 第二段落：構造の特徴 */
    if (participles.length > 0 && imperatives.length > 0) {
        parts.push(`主な呼びかけに、分詞が添えられています。「〜しながら」という背景や状況を重ねています。`);
    } else if (participles.length > 1) {
        parts.push(`複数の分詞が連なり、主語の状況や動作の背景が丁寧に描かれています。`);
    }
    if (metaphorFound) {
        const mJa = METAPHOR[metaphorFound.text] || METAPHOR[metaphorFound.lemma] || '';
        if (mJa) parts.push(`「${mJa}」が比喩として使われています。文字通りの意味を超えて、生き方や状態を指している可能性があります。`);
    }
    if (hasVocative) {
        parts.push(`呼びかけの言葉が使われています。読者を直接名指しする調子があります。`);
    }

    /* デフォルト */
    if (parts.length === 0) {
        if (words.length <= 5)
            parts.push(`短い節です。一語一語が凝縮された意味を持って置かれています。`);
        else
            parts.push(`原語の語順と品詞の流れは、上の原語の順序から確認できます。`);
    }

    const proseParagraphs = parts.map(p2 => `<p>${p2}</p>`).join('');

    return `
        <section class="wlv-reading-passage-note">
            <span class="wlv-pn-label">この節の読書メモ</span>
            <div class="wlv-pn-prose">
                ${proseParagraphs}
            </div>
        </section>`;
}


/**
 * 1語のデータを flow chip 表示用オブジェクトに変換する。
 *
 * @param {Object} w   word data（text, morph, lemma, japanese/gloss, ref, strong）
 * @param {number} i   index
 * @returns {{ greek, gloss, roleClass, phraseBreakBefore, signals, morphText, jaWord, rawMorph, lemma, ref, strong }}
 */
function _wordToFlowChip(w, i) {
    const greek    = w.text   || '-';
    const rawMorph = w.morph  || '';
    const lemma    = w.lemma  || '';
    const ref      = w.ref    || '';
    const strong   = String(w.strong || '').replace(/[^0-9]/g, '');
    // 表示言語の優先順位: gloss → lemma → '—'
    // 日本語対応時はここを w.japanese || w.gloss || w.lemma || '—' に変更する
    const jaWord   = w.gloss || w.lemma || '—';

    const parts    = rawMorph.split('-');
    const pos      = parts[0] || '';

    /* ── グロス自然化 ── */
    let gloss = jaWord;

    /* 動詞の法・時制に応じた接尾調整 */
    if (pos === 'V' && parts[1]) {
        const off       = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off]     || '';
        const voiceCode = parts[1][off + 1] || '';
        const moodCode  = parts[1][off + 2] || '';

        /* 分詞：「〜ながら」「〜した（上で）」など */
        if (moodCode === 'P') {
            if (tenseCode === 'P') gloss = _naturalize(jaWord, 'part-pres');
            else if (tenseCode === 'A') gloss = _naturalize(jaWord, 'part-aor');
            else if (tenseCode === 'X') gloss = _naturalize(jaWord, 'part-perf');
        }
        /* 不定詞 */
        else if (moodCode === 'N') {
            gloss = _naturalize(jaWord, 'inf');
        }
        /* 命令法 */
        else if (moodCode === 'M') {
            gloss = _naturalize(jaWord, 'imp');
        }
        /* 受動態 */
        if (voiceCode === 'P') {
            gloss = _naturalize(gloss, 'pass');
        }
    }

    /* 冠詞：gloss/lemma をそのまま使う（他の品詞と統一） */

    /* roleClass：chip dot の色付けと signal 生成 */
    const dpGrammarClasses = buildDepthGrammarClasses(rawMorph).join(' ');
    
    let roleClass = 'role-other';
    const signals = [];

    if (pos === 'V') {
        roleClass = 'role-verb';
        const off      = /^[0-9]/.test(parts[1] || '') ? 1 : 0;
        const moodCode = (parts[1] || '')[off + 2] || '';
        const tenCode  = (parts[1] || '')[off]     || '';
        const voiCode  = (parts[1] || '')[off + 1] || '';

        /* 法（Mood）シグナル - 読書感覚の言葉で */
        if (moodCode === 'M') signals.push({ label: '強く勧めている', cls: 'sig-exhort' });
        else if (moodCode === 'P') signals.push({ label: '背景を描いている', cls: 'sig-logic' });
        else if (moodCode === 'N') signals.push({ label: '目的を示している', cls: 'sig-logic' });
        else if (moodCode === 'S') signals.push({ label: '願いを込めている', cls: 'sig-logic' });

        /* 時制シグナル - 読書感覚の言葉で */
        if (tenCode === 'X') signals.push({ label: '今も続いている', cls: 'sig-promise' });
        else if (tenCode === 'A' && moodCode === 'I') signals.push({ label: '一つの出来事として語っている', cls: 'sig-declare' });
        else if (tenCode === 'F' && moodCode === 'I') signals.push({ label: '確かに起きると語っている', cls: 'sig-promise' });

        /* 態シグナル */
        if (voiCode === 'P') signals.push({ label: '受けとめる側に立っている', cls: 'sig-word' });
        else if (voiCode === 'M' || voiCode === 'D') signals.push({ label: '深く関わりながら動いている', cls: 'sig-word' });
    }
    else if (pos === 'N')    {
        roleClass = 'role-noun';
        const caseParts = parts[1] || '';
        const base = ['1','2','3'].includes(caseParts[0]) ? caseParts.slice(1) : caseParts;
        const CASE_SIG = {
            N: { label: '中心にいる', cls: 'sig-logic' },
            G: { label: '結びついている', cls: 'sig-logic' },
            D: { label: '関わりを受けている', cls: 'sig-logic' },
            A: { label: '動作の向かう先', cls: 'sig-logic' },
            V: { label: '呼びかけられている', cls: 'sig-logic' }
        };
        const cs = CASE_SIG[base[0]];
        if (cs) signals.push(cs);
        const NUM_SIG = { P: { label: '複数で語られている', cls: 'sig-logic' } };
        const ns = NUM_SIG[base[1]];
        if (ns) signals.push(ns);
    }
    else if (pos === 'A')    {
        roleClass = 'role-adj';
        const caseParts = parts[1] || '';
        const base = ['1','2','3'].includes(caseParts[0]) ? caseParts.slice(1) : caseParts;
        const CASE_SIG = {
            N: { label: '特徴を示している', cls: 'sig-logic' },
            G: { label: '性質を結びつけている', cls: 'sig-logic' },
            D: { label: '関わる対象を彩っている', cls: 'sig-logic' },
            A: { label: '対象の様子を語っている', cls: 'sig-logic' }
        };
        const cs = CASE_SIG[base[0]];
        if (cs) signals.push(cs);
    }
    else if (pos === 'CONJ') {
        roleClass = 'role-conj';
        const CONJ_SIG = {
            'γάρ':  { label: 'なぜなら、と理由へ進む', cls: 'sig-logic' },
            'ἀλλά': { label: 'しかし、と流れが変わる', cls: 'sig-turn' },
            'οὖν':  { label: 'だから、と結論へ向かう', cls: 'sig-logic' },
            'δέ':   { label: '話が次の段階へ進む', cls: 'sig-turn' },
            'καί':  { label: 'さらに、と積み重なる', cls: 'sig-emphasis' },
            'ἵνα':  { label: '〜のために、と目的が示される', cls: 'sig-logic' },
            'ὅτι':  { label: '〜ということ、と内容が続く', cls: 'sig-logic' },
            'εἰ':   { label: 'もし〜なら、と仮定の話に入る', cls: 'sig-logic' },
            'ὥστε': { label: 'その結果として、と帰結が来る', cls: 'sig-logic' },
        };
        const cs = CONJ_SIG[w.text];
        if (cs) signals.push(cs);
        else signals.push({ label: '前後をつないでいる', cls: 'sig-logic' });
    }
    else if (pos === 'PREP') { roleClass = 'role-prep'; signals.push({ label: '関係の方向を示している', cls: 'sig-logic' }); }
    else if (pos === 'T')    { roleClass = 'role-art'; /* 冠詞はsignalなし。静かに */ }
    else if (['P','R','D'].includes(pos)) {
        roleClass = 'role-pron';
        const caseParts = parts[1] || '';
        const base = ['1','2','3'].includes(caseParts[0]) ? caseParts.slice(1) : caseParts;
        const CASE_SIG = {
            N: { label: '誰の話かを示している', cls: 'sig-logic' },
            G: { label: '誰に関わるかを示している', cls: 'sig-logic' },
            D: { label: '関わりを受けている人を指す', cls: 'sig-logic' },
            A: { label: '動作の向かう人を指す', cls: 'sig-logic' }
        };
        const cs = CASE_SIG[base[0]];
        if (cs) signals.push(cs);
    }

    /* 句区切りの判定：接続詞・前置詞の前で区切る */
    const phraseBreakBefore = (pos === 'CONJ' && i > 0) || (pos === 'PREP' && i > 0);

    /* morphText：ドロワーに表示する人が読める文法メモ */
    const morphText = _buildMorphText(rawMorph, pos, parts);

    return { greek, gloss, roleClass, phraseBreakBefore, signals, morphText, jaWord, rawMorph, lemma, ref, strong, dpGrammarClasses };
}

/**
 * 日本語グロスを品詞・法に応じて自然化する。
 * グロスの末尾をルールベースで変換する。複雑な形態素分析は行わない。
 * 変換できなければ元の gloss をそのまま返す。
 */
function _naturalize(gloss, kind) {
    /* 動詞語幹の末尾を変換するルールテーブル */
    const RULES = {
        'part-pres': [ /* 現在分詞：〜ながら / 〜つつ → 〜ながら */
            [/する$/, 'しながら'], [/する$/, 'しながら'],
            [/いる$/, 'いながら'], [/える$/, 'えながら'],
            [/くる$/, 'きながら'], [/ある$/, 'ありながら'],
            [/([^ん])る$/, '$1ながら'],
            [/つ$/, 'ちながら'],   [/ぬ$/, 'にながら'],
            [/む$/, 'みながら'],   [/ぶ$/, 'びながら'],
            [/う$/, 'いながら'],   [/く$/, 'きながら'],
            [/す$/, 'しながら'],   [/ぐ$/, 'ぎながら'],
        ],
        'part-aor': [ /* アオリスト分詞：〜した（後で） */
            [/する$/, 'した'],     [/いる$/, 'いた'],
            [/える$/, 'えた'],     [/くる$/, 'きた'],
            [/([^ん])る$/, '$1た'],
            [/つ$/, 'った'],       [/ぬ$/, 'んだ'],
            [/む$/, 'んだ'],       [/ぶ$/, 'んだ'],
            [/う$/, 'った'],       [/く$/, 'いた'],
            [/す$/, 'した'],       [/ぐ$/, 'いだ'],
        ],
        'part-perf': [ /* 完了分詞：〜した（状態） */
            [/する$/, 'してきた'], [/いる$/, 'いてきた'],
            [/([^ん])る$/, '$1てきた'],
            [/つ$/, 'ってきた'],   [/む$/, 'んできた'],
        ],
        'inf': [ /* 不定詞：〜すること */
            [/する$/, 'すること'], [/いる$/, 'いること'],
            [/える$/, 'えること'], [/くる$/, 'くること'],
            [/([^ん])る$/, '$1ること'],
            [/つ$/, 'つこと'],    [/ぬ$/, 'ぬこと'],
            [/む$/, 'むこと'],    [/ぶ$/, 'ぶこと'],
            [/う$/, 'うこと'],    [/く$/, 'くこと'],
            [/す$/, 'すこと'],
        ],
        'imp': [ /* 命令法：そのまま（「〜せよ」は重い）*/
            [/する$/, 'せよ'],    [/([^ん])る$/, '$1よ'],
        ],
        'pass': [ /* 受動：〜される */
            [/する$/, 'される'],  [/いる$/, 'いられる'],
            [/([^ん])る$/, '$1られる'],
            [/つ$/, 'たれる'],    [/む$/, 'まれる'],
            [/ぶ$/, 'ばれる'],    [/く$/, 'かれる'],
            [/す$/, 'される'],
        ],
    };

    const rules = RULES[kind] || [];
    for (const [pattern, replacement] of rules) {
        if (pattern.test(gloss)) {
            return gloss.replace(pattern, replacement);
        }
    }
    return gloss; /* 変換できなければ元のまま */
}

/**
 * rawMorph から読書感覚の補助メモ（1行）を生成する。
 * ドロワーに表示するだけなので学術ラベルは使わない。
 * Study タブでは別途詳細が表示される。
 */
function _buildMorphText(rawMorph, pos, parts) {
    if (pos === 'V' && parts[1]) {
        const off  = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const moodCode  = parts[1][off + 2] || '';
        const tenCode   = parts[1][off]     || '';
        const voiCode   = parts[1][off + 1] || '';

        const ptcNote = tenCode === 'A' ? '先行する副詞的動作（先行状況）'
                      : tenCode === 'P' ? '副詞的・形容詞的に同時の状況を描き添えている'
                      : '副詞的・実体的に状況を補っている';
        const MOOD_NOTE = {
            'M': '行動への呼びかけ',
            'P': ptcNote,
            'N': '目的や内容を補っている',
            'S': '願いや目的を含んでいる',
            'I': '事実として語っている',
            'O': '望みを込めた表現',
        };
        const TEN_NOTE = {
            'X': '過去から今も続く状態',
            'A': 'ある出来事として',
            'F': '確かに起きること',
            'P': '今・継続して',
            'I': '続いていた状態',
        };
        const VOI_NOTE = {
            'P': '受けとめる側に',
            'M': '深く関わりながら',
            'D': '深く関わりながら',
        };

        const notes = [];
        if (MOOD_NOTE[moodCode]) notes.push(MOOD_NOTE[moodCode]);
        if (TEN_NOTE[tenCode] && moodCode !== 'N' && moodCode !== 'P') notes.push(TEN_NOTE[tenCode]);
        if (VOI_NOTE[voiCode]) notes.push(VOI_NOTE[voiCode]);
        return notes.join('・') || '動詞';
    } else if (['N','A'].includes(pos) && parts[1]) {
        const base = ['1','2','3'].includes(parts[1][0]) ? parts[1].slice(1) : parts[1];
        const CASE_NOTE = {
            'N': '文の中心にいる', 'G': '〜の、と結びつく',
            'D': '関わりを受ける', 'A': '動作の向かう先', 'V': '呼びかけ'
        };
        const NUM_NOTE = { 'S': '単数', 'P': '複数' };
        const notes = [];
        if (CASE_NOTE[base[0]]) notes.push(CASE_NOTE[base[0]]);
        if (NUM_NOTE[base[1]] === '複数') notes.push('複数で語られている');
        return notes.join('・') || (pos === 'N' ? '名詞' : '形容詞');
    } else if (pos === 'CONJ') {
        return '前後をつなぐことば';
    } else if (pos === 'PREP') {
        return '関係の方向を示す';
    } else if (pos === 'T') {
        return '指し示すことば（冠詞）';
    } else if (['P','R','D'].includes(pos)) {
        return '誰かを指し示している';
    }
    return '';
}

/**
 * 1語について「この節でどう響くか」を1〜2文のproseで返す。
 * signal tag列挙禁止。形態論タームを読書感覚の言葉に翻訳する。
 */
function _buildResonanceText(chip) {
    const rawMorph = chip.rawMorph || '';
    const parts    = rawMorph.split('-');
    const pos      = parts[0] || '';
    const p1       = parts[1] || '';
    const off      = /^[0-9]/.test(p1) ? 1 : 0;
    const jaWord   = chip.jaWord || '';
    const w        = jaWord ? `「${jaWord}」` : 'この語';

    /* 動詞 */
    if (pos === 'V') {
        const tenCode  = p1[off]     || '';
        const voiCode  = p1[off + 1] || '';
        const moodCode = p1[off + 2] || '';

        if (moodCode === 'M') {
            if (tenCode === 'P') return `${w}が繰り返し続けていく姿勢として、呼びかけています。`;
            return `説明ではなく、${w}として直接方向を示しています。`;
        }
        if (moodCode === 'P') {
            if (tenCode === 'A') return `先行する動作として背景に置かれ、主な出来事を支えています。`;
            return `主な動作と同時に進む状況を描き添えています。`;
        }
        if (moodCode === 'N') return `前の動作の目的や内容を補っています。`;
        if (moodCode === 'S') return `願いや目的の含みをもって響いています。`;
        if (tenCode === 'X') return `かつて起きた出来事の効果が、今この節でも続いています。`;
        if (tenCode === 'A' && moodCode === 'I') return `点的動作として捉えられた出来事です。時間的な位置は文脈に依存しますが、動作全体をひとまとまりとして提示しています。`;        if (tenCode === 'F') return `確かに起きることとして語られています。`;
        if (voiCode === 'P') return `主語が受けとめる側として置かれています。`;
        if (voiCode === 'M' || voiCode === 'D') return `主語が深く関わりながら動いています。`;
        return `この節の中心的な動作として響いています。`;
    }

    /* 接続詞 */
    if (pos === 'CONJ') {
        const CONJ_FEEL = {
            'γάρ':  '前の内容の根拠へと流れが向かっています。',
            'ἀλλά': 'ここで流れが転換し、対比が強まっています。',
            'οὖν':  '前の議論を受けて、結論へと向かっています。',
            'δέ':   '話が次の段階へ静かに進んでいます。',
            'καί':  '内容が積み重なりながら続いています。',
            'ἵνα':  '目的の内容がこの先に続きます。',
            'ὥστε': '前の内容を受けて、その帰結が語られています。',
            'ὅτι':  '内容や根拠の節が始まっています。',
        };
        return CONJ_FEEL[chip.greek] || '前後の節をつなぎ、流れを形作っています。';
    }

    /* 名詞・形容詞・代名詞 */
    if (['N','A','R','P','T','D'].includes(pos)) {
        const base = ['1','2','3'].includes(p1[0]) ? p1.slice(1) : p1;
        const CASE_FEEL = {
            'N': `${w}が、この節の中心に置かれています。`,
            'G': `${w}が「〜の」として結びつき、関係を示しています。`,
            'D': `${w}が、動作の間接的な関わりとして響いています。`,
            'A': `${w}が、動作の向かう先として置かれています。`,
            'V': `${w}が、直接呼びかけられています。`,
        };
        return CASE_FEEL[base[0]] || '原語の詳細は「深く読む」から確認できます。';
    }

    if (pos === 'PREP') return '関係の方向や位置を示しています。';
    if (pos === 'T') return '後続の語を特定して指し示しています。';
    return '原語の詳細は「深く読む」から確認できます。';
}

/* ══════════════════════════════════════════
   パネルリサイズ（縦方向ドラッグ - bottom-depth-panel）
   ══════════════════════════════════════════ */
(function() {
    const handle = document.getElementById('panel-resize-handle');
    const panel  = document.getElementById('bottom-depth-panel');
    if (!handle || !panel) return;
    let dragging = false, startY = 0, startH = 0;

    handle.addEventListener('mousedown', (e) => {
        dragging = true;
        startY = e.clientY;
        startH = panel.offsetHeight;
        handle.classList.add('dragging');
        document.body.style.cursor = 'row-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const dy = startY - e.clientY;
        const nh = Math.max(220, Math.min(window.innerHeight * 0.70, startH + dy));
        panel.style.height = nh + 'px';
    });
    document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });
    handle.addEventListener('touchstart', (e) => {
        dragging = true;
        startY = e.touches[0].clientY;
        startH = panel.offsetHeight;
        e.preventDefault();
    }, { passive: false });
    document.addEventListener('touchmove', (e) => {
        if (!dragging) return;
        const dy = startY - e.touches[0].clientY;
        const nh = Math.max(220, Math.min(window.innerHeight * 0.70, startH + dy));
        panel.style.height = nh + 'px';
    }, { passive: false });
    document.addEventListener('touchend', () => { dragging = false; });
})();

/* ══════════════════════════════════════════
   openStudyPanel - 読書メモ版
   タブを廃止し、単一スクロールの読書メモパネルに表示する。
   ══════════════════════════════════════════ */
function openStudyPanel(greek, rawMorph, ref, lemma, options = {}) {
    const listEl = document.getElementById('word-list-view');
    if (listEl) listEl.remove();

    const m = parseMorphForSearch(rawMorph);
    const params = {
        ref,
        word:      greek,
        lemma:     lemma || '',
        pos:       m.pos    || '',
        _rawMorph: rawMorph,
        tense:     m.tense  || '',
        mood:      m.mood   || '',
        voice:     m.voice  || '',
        gender:    m.gender || '',
        number:    m.number || '',
        case:      m.case   || '',
    };

    AppState.saveScroll();
    AppState.toStudy(params, 'notes');

    /* depth stack に追加（重複しないよう、top が同じなら追加しない） */
    const stack = AppState.depth.stack;
    const topEntry = stack[stack.length - 1];
    const isAlreadyDeep = topEntry && topEntry.type === 'deep-reading' && topEntry.strong === String(AppState.inspect.data?.strong || '');
    if (!options.skipDepthPush && !isAlreadyDeep) {
        pushDepth({
            type:   'deep-reading',
            label:  '深く読む',
            strong: String(AppState.inspect.data?.strong || ''),
        });
    }

    const sidePanel    = document.getElementById('bottom-depth-panel');
    sidePanel.classList.add('open');
const activeVEl = document.getElementById('active-v');
    if (activeVEl && greek) activeVEl.textContent = greek;

    document.getElementById('open-panel-btn').style.display = 'none';

    /* rcb-container: 語形のみ表示 */
    const rcb = document.getElementById('rcb-container');
    const rcbWord  = document.getElementById('rcb-main-word');
    const rcbGloss = document.getElementById('rcb-main-gloss');
    if (rcbWord)  rcbWord.textContent  = greek || '-';
    if (rcbGloss) rcbGloss.textContent = (AppState.inspect.data?.jaWord) || '';
    if (rcb) rcb.classList.add('visible');

    /* 読書メモエリアを表示 */
    const notesWrap = document.getElementById('reading-notes-wrap');
    if (notesWrap) notesWrap.style.display = 'flex';

    _renderReadingNotes(params);

    /* ── オンボーディング：アンカー語（ἠγάπησεν）初回タップ時に発見テキストを先頭注入 ── */
    (function _injectObDiscovery() {
        const obState = window.AppOnboarding?.getState();
        if (!obState || obState.onboardingComplete) return;
        if (obState.wordClicked) return; /* 2語目以降は出さない */
        if (greek !== 'ἠγάπησεν') return;

        const area = document.getElementById('reading-notes-area');
        if (!area) return;

        const disc = document.createElement('div');
        disc.id = 'ob-discovery-banner';
        disc.style.cssText = [
            'margin:0 0 18px 0',
            'padding:13px 16px',
            'background:rgba(90,110,130,0.07)',
            'border-left:3px solid rgba(90,110,130,0.55)',
            'border-radius:0 8px 8px 0',
            'font-family:\'Noto Serif JP\',Georgia,serif',
            'font-size:0.80rem',
            'line-height:1.8',
            'color:rgba(29,29,31,0.82)',
            'letter-spacing:0.01em',
        ].join(';');
        disc.textContent = 'この語は文の先頭に置かれています。ギリシャ語では動詞が最初に来るとき、その行為が強調される読み方があります。日本語訳では見えにくい語順の意図が、原語には残っています。';

        area.insertBefore(disc, area.firstChild);
    })();
    /* ─────────────────────────────────────────────────────── */

    _mobileOpenPanel(greek || '語を読む');

    /* onboarding hook */
    if (window.AppOnboarding) {
        window.AppOnboarding.onStudyPanelOpened(window.innerWidth <= 900, AppState.selectedVerse?.vNum);
    }
}

function goProximityPage() {
    const p = new URLSearchParams();

    const activeVEl   = document.getElementById('active-v');
    const activeVText = activeVEl ? activeVEl.innerText.replace(/\s*節\s*$/, '').trim() : '';

    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || '';
    const ch   = urlParams.get('ch')   || '';

    /* AppState.inspect.data から語を取得（後方互換: _inspectData も同じ参照） */
    const inspData = AppState.inspect.data;
    if (inspData && inspData.greek) {
        p.set('word1', inspData.greek);
    }

    if (book && ch) {
        const ref = activeVText ? `${book}${ch}:${activeVText}` : `${book}${ch}`;
        p.set('ref', ref);
        if (activeVText) p.set('scope', 'verse');
    }

    const qs = p.toString();
    window.location.href = qs ? `proximity.html?${qs}` : 'proximity.html';
}

function switchTab(evt, tabName) {
    const tabContents = document.getElementsByClassName("tab-content");
    for (let i = 0; i < tabContents.length; i++) tabContents[i].classList.remove("active");
    const tabBtns = document.getElementsByClassName("tab-btn");
    for (let i = 0; i < tabBtns.length; i++) tabBtns[i].classList.remove("active");
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
    document.getElementById('main-reading-area').scrollTop = 0;
}

async function renderCurrentPage() {
    document.getElementById('main-reading-area').classList.remove('static-view');
    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || 'ROM';
    const ch   = urlParams.get('ch')   || '1';

    const isNt = SB_BOOKS.nt.some(b => b.key === book);
    document.querySelector('.root-name') && (document.querySelector('.root-name').innerText = isNt ? '新約聖書' : '旧約聖書');

    const allBooks = [...SB_BOOKS.nt, ...SB_BOOKS.ot];
    const found = allBooks.find(b => b.key === book);
    const titleEl = document.getElementById('view-title');
    if (titleEl) titleEl.innerText = found ? `${found.name} ${ch}章` : `${book} ${ch}章`;

    /* location 更新 */
    AppState.location.testament = isNt ? 'nt' : 'ot';
    AppState.location.book      = found || null;
    AppState.location.chapter   = parseInt(ch);
    renderGlobalBreadcrumb();

    const hasGreek = GREEK_BOOKS.has(book);

    try {
        /* _transA が FLOW の場合は翻訳JSONをfetchしない */
        const jpData = _transA === 'FLOW'
            ? null
            : await _fetchTranslation(_transA, book, ch);

        let jpDataB = null;
        if (_transMode === 'compare' && _transB !== 'FLOW') {
            jpDataB = await _fetchTranslation(_transB, book, ch);
        }
        
        let elData = [];
        if (hasGreek) {
            try {
                const testament = SB_BOOKS.nt.some(b => b.key === book) ? 'nt' : 'lxx';
                const elRes = await fetch(`./bible_data/${testament}/${book}/${ch}.json`);
                if (elRes.ok) elData = await elRes.json();
            } catch(e) {}
        }

        /* _transA === 'FLOW': elData から verse キーを組み立てて jpData の代わりに渡す */
        const resolvedJpData = (_transA === 'FLOW')
            ? _buildFlowJpData(elData)
            : jpData;
        if (!resolvedJpData) throw new Error('Not found');

        render(resolvedJpData, elData, hasGreek && elData.length > 0, jpDataB);
        document.getElementById('active-v').innerText = "";
        syncUrlState();

// 本文レンダリング完了後

        // ── オンボーディング：アンカー語付与 ──────────────────
        // ヨハネ3:16表示中かつオンボーディング未完了の場合のみ実行。
        // word-card の data-greek から対象語を探し、最初の1枚に
        // data-onboarding-anchor="true" を付与する。
        // 対象語優先順: ἠγάπησεν → οὕτως → （先頭カード）
    } catch (err) {
        document.getElementById('bible-text-area').innerHTML = `<p style="color:red">データが見つかりません。</p>`;
    }
}

/* ══════════════════════════════════════════
   _navigateVerse — オンボーディングCTAから呼ばれる
   章内の次の節へスクロール。章末なら次章へ遷移。
   ══════════════════════════════════════════ */
/* ══════════════════════════════════════════
   モバイル比較モード：1節ナビゲーション
   ══════════════════════════════════════════ */
let _mobileVerseList = [];   // 章内の全節番号（文字列）の配列
let _mobileVerseIdx  = 0;    // 現在表示中のインデックス

function _mobileCompareSetup() {
    if (window.innerWidth > 768) return;
    const area = document.getElementById('main-reading-area');
    if (!area || !area.classList.contains('compare-mode')) return;

    // 節リストを mobile-verse-group から収集
    const groups = area.querySelectorAll('#bible-text-area .mobile-verse-group[data-vnum]');
    _mobileVerseList = Array.from(groups).map(g => g.dataset.vnum);
    if (_mobileVerseList.length === 0) return;

    _mobileVerseIdx = 0;
    _mobileVerseApply();

    const nav = document.getElementById('mobile-verse-nav');
    if (nav) nav.style.display = 'flex';
}

function _mobileVerseApply() {
    const area = document.getElementById('main-reading-area');
    if (!area) return;
    const cur = _mobileVerseList[_mobileVerseIdx];

    // mobile-verse-group を cur 以外を非表示
    area.querySelectorAll('#bible-text-area .mobile-verse-group[data-vnum]').forEach(g => {
        g.style.display = g.dataset.vnum === cur ? '' : 'none';
    });

    // ナビ表示を更新
    const numEl = document.getElementById('mvn-verse-num');
    if (numEl) numEl.textContent = cur;
    const prev = document.getElementById('mvn-prev');
    const next = document.getElementById('mvn-next');
    if (prev) prev.disabled = _mobileVerseIdx === 0;
    if (next) next.disabled = _mobileVerseIdx === _mobileVerseList.length - 1;

    // 先頭にスクロール
    const mainArea = document.getElementById('main-reading-area');
    if (mainArea) mainArea.scrollTop = 0;
}

function _mobileVerseNav(delta) {
    const next = _mobileVerseIdx + delta;
    if (next < 0 || next >= _mobileVerseList.length) return;
    _mobileVerseIdx = next;
    _mobileVerseApply();
}

function _mobileCompareTeardown() {
    const nav = document.getElementById('mobile-verse-nav');
    if (nav) nav.style.display = 'none';
    const area = document.getElementById('main-reading-area');
    if (area) area.querySelectorAll('#bible-text-area .mobile-verse-group').forEach(g => {
        g.style.display = '';
    });
    _mobileVerseList = [];
}

function _navigateVerse(delta) {
    /* 現在の章の次の節ブロックを探してスクロール */
    const selectedBlocks = document.querySelectorAll('.verse-block.selected');
    let currentVNum = null;
    if (selectedBlocks.length > 0) {
        const vNumEl = selectedBlocks[0].querySelector('.v-num');
        if (vNumEl) currentVNum = parseInt(vNumEl.textContent.trim());
    }

    const allBlocks = document.querySelectorAll('.verse-pair-left, .verse-block:not(.verse-pair-left):not(.verse-pair-right)');
    const blockArr = Array.from(allBlocks);

    if (currentVNum !== null) {
        /* 現在の節の次を探す */
        let found = false;
        for (let i = 0; i < blockArr.length; i++) {
            const vEl = blockArr[i].querySelector('.v-num');
            if (!vEl) continue;
            const v = parseInt(vEl.textContent.trim());
            if (v === currentVNum + delta) {
                blockArr[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                found = true;
                break;
            }
        }
        if (!found) {
            /* 章末 → 次章へ遷移 */
            const nextCh = (AppState.location.chapter || 1) + delta;
            const maxCh = AppState.location.book ? AppState.location.book.ch : 999;
            if (nextCh >= 1 && nextCh <= maxCh) {
                _navTo(AppState.location.book.key, nextCh);
            }
        }
    } else {
        /* 節未選択 → 3:17へスクロール */
        for (let i = 0; i < blockArr.length; i++) {
            const vEl = blockArr[i].querySelector('.v-num');
            if (vEl && parseInt(vEl.textContent.trim()) === 17) {
                blockArr[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                break;
            }
        }
    }
}


/* ══════════════════════════════════════════
   翻訳モード管理
   ══════════════════════════════════════════ */

/*
 * ディレクトリ移行メモ
 * ─────────────────────────────────────────
 * 旧:
 *   bible_jp/MAT/1.json          … NKJ2017 固定
 *   bible_jp_nkj/MAT/1.json      … NKJ
 *   bible_jp_niv/MAT/1.json      … NIV
 *   bible_jp_esv/MAT/1.json      … ESV
 *
 * 新（translations/ 以下に統一）:
 *   translations/JA1955/MAT/1.json   … 口語訳（JA1955）
 *   translations/KAI17/MAT/1.json    … 新改訳2017
 *   translations/KYO/MAT/1.json      … 聖書協会共同訳
 *
 * 移行手順:
 *   1. 旧 bible_jp/     → translations/KAI17/  へコピー
 *   2. 各翻訳ディレクトリ → translations/{ID}/ へコピー
 *   3. 旧ディレクトリは削除可（フォールバックが不要になってから）
 * ─────────────────────────────────────────
 */

/* 翻訳マスター定義・変数はスクリプト先頭で宣言済み（TDZ対策） */

/*
 * transDataPath — 翻訳IDとbook/chからJSONパスを返す
 *
 * 新パス: translations/{transId}/{book}/{ch}.json
 * フォールバック（旧ディレクトリが残っている移行期用）:
 *   NKJ2017 → bible_jp/{book}/{ch}.json
 *   他      → bible_jp_{transId.toLowerCase()}/{book}/{ch}.json
 */
function transDataPath(transId, book, ch) {
    /* 新構造が整っていればこちらを使う */
    return `./translations/${transId}/${book}/${ch}.json`;
}

/* フォールバック用（旧ディレクトリ構造）*/
function _transDataPathLegacy(transId, book, ch) {
    if (!transId || transId === 'KAI17') return `./bible_jp/${book}/${ch}.json`;
    return `./bible_jp_${transId.toLowerCase()}/${book}/${ch}.json`;
}

/*
 * _buildFlowJpData — _transA === 'FLOW' のとき elData から
 * jpData 互換オブジェクト { verses: { "1": "", ... } } を生成する。
 * text は空文字（FLOW チップが左列を担うため）。
 */
function _buildFlowJpData(elData) {
    if (!elData || elData.length === 0) return null;
    const verses = {};
    elData.forEach(w => {
        const v = w.ref && w.ref.split(':')[1]?.split('!')[0];
        if (v && !(v in verses)) verses[v] = '';
    });
    if (Object.keys(verses).length === 0) return null;
    return { verses };
}

/*
 *   loadBook(book, translation) のエイリアスとして機能する。
 *
 *   新パス優先で fetch し、404 なら旧ディレクトリへフォールバック。
 *   両方失敗した場合は null を返す。
 */
async function _fetchTranslation(transId, book, ch) {
    /* ① 新パス: translations/{transId}/{book}/{ch}.json */
    try {
        const res = await fetch(transDataPath(transId, book, ch));
        if (res.ok) return await res.json();
    } catch(e) {}

    /* ② 旧パスへフォールバック（移行期のみ有効） */
    try {
        const res2 = await fetch(_transDataPathLegacy(transId, book, ch));
        if (res2.ok) return await res2.json();
    } catch(e) {}

    return null;
}

/*
 * loadBook — 汎用ブック読み込み関数
 *   loadBook('JHN')                  … currentTranslation で読み込み
 *   loadBook('JHN', 'NKJ2017')       … 指定翻訳で読み込み
 *   loadBook('JHN', 'NKJ')           … 口語訳等を明示指定
 */
async function loadBook(book, translation = currentTranslation) {
    const ch = AppState.location.chapter || 1;
    return await _fetchTranslation(translation, book, String(ch));
}

function _applyTransMode(mode) {
    _transMode = mode;
    const area = document.getElementById('main-reading-area');
    if (mode === 'compare') {
        area.classList.remove('single-mode');
        area.classList.add('compare-mode');
    } else {
        area.classList.remove('compare-mode');
        area.classList.add('single-mode');
        /* Greek Flow View: 単一表示に戻ったとき、transB が FLOW でなければタブを隠す */
        const gfTabBar = document.getElementById('gf-tab-bar');
        if (gfTabBar && _transA !== 'FLOW' && _transB !== 'FLOW') {
            gfTabBar.style.display = 'none';
        }
        if (_rightMode === 'flow' && _transB !== 'FLOW') _setRightMode('trans');
    }
    _updateColHeaders();
}

function _updateColHeaders() {
    const hA = document.getElementById('trans-col-header-a');
    if (hA) hA.textContent = (TRANSLATIONS[_transA] || {}).label || _transA;
    const gfTransLbl = document.getElementById('gf-trans-label');
    if (gfTransLbl) gfTransLbl.textContent = (TRANSLATIONS[_transB] || {}).label || _transB;
    _updateBibleLabel();
}

/* ── Greek Flow View: 右列表示モード切り替え ── */
function _setRightMode(mode) {
    _rightMode = mode;

    /* タブボタンの active 更新 */
    const tabTrans = document.getElementById('gf-tab-trans');
    const tabFlow  = document.getElementById('gf-tab-flow');
    if (tabTrans) tabTrans.classList.toggle('active', mode === 'trans');
    if (tabFlow)  tabFlow.classList.toggle('active',  mode === 'flow');

    /* flow タブ初回開封を onboarding へ通知 */
    if (mode === 'flow') {
        window.AppOnboarding?.onFlowTabOpened();
    }

    /* 全 verse-pair-right を切り替え */
    document.querySelectorAll('.verse-pair-right').forEach(block => {
        const vNum = block.dataset.vnum;
        block.classList.toggle('gf-mode', mode === 'flow');

        if (mode === 'flow') {
            /* gf-verse-block がまだなければ生成 */
            if (!block.querySelector('.gf-verse-block')) {
                const words = (_cachedElByVerse && vNum) ? (_cachedElByVerse[vNum] || []) : [];
                const gfEl = document.createElement('div');
                gfEl.className = 'gf-verse-block';
                gfEl.innerHTML = _buildGfVerseBlock(vNum, words);
                block.appendChild(gfEl);
            }
        }
    });
}

/* ── Greek Flow View: 1節分の右列HTML生成 ── */
function _buildGfVerseBlock(vNum, words) {
    if (!words || words.length === 0) {
        return `<p style="font-size:0.8rem;color:var(--text-sub);opacity:0.6;padding:8px 0;">この節の原語データがありません</p>`;
    }
    /* 既存の Study Panel 用ロジックを再利用 */
    const chips = words.map((w, i) => _wordToFlowChip(w, i));
    const chipsHTML = chips.map((c, i) => {
        const sepBefore = c.phraseBreakBefore ? `<span class="wlv-phrase-sep"></span>` : '';
        return `${sepBefore}<span class="wlv-chip ${c.roleClass}"
            data-idx="${i}"
            onclick="_wlvChipClick(this,${i})"
            title="${c.greek}">
            <span class="wlv-chip-ja"><span class="${c.dpGrammarClasses}">${c.gloss}</span></span>
            <span class="wlv-chip-dot"></span>
        </span>`;
    }).join('');

    return `
    <div style="display:flex;align-items:baseline;gap:8px;padding:6px 0;">
        <span class="v-num">${vNum}</span>
        <div style="flex:1;font-size:0.88rem;line-height:2.4;display:flex;flex-wrap:wrap;gap:4px 2px;align-items:baseline;">${chipsHTML}</div>
    </div>`;
}

function _updateBibleLabel() {
    const el = document.getElementById('sb-bible-label-text');
    if (!el) return;
    const labelA = (TRANSLATIONS[_transA] || {}).label || _transA;
    if (_transMode === 'compare') {
        const labelB = (TRANSLATIONS[_transB] || {}).label || _transB;
        el.textContent = labelA + ' / ' + labelB;
    } else {
        el.textContent = labelA;
    }
}

            <span class="bp-compare-opt-name">${t.name}</span>
        </div>`
    ).join('');
    /* 右列：左と同じものは除外。左がFLOWのとき右にFLOWは選べない（同一不可） */
    document.getElementById('bp-col-b').innerHTML = TRANS_LIST.filter(t => t.id !== _bpSelA).map(t =>
        `<div class="bp-compare-opt${t.id === _bpSelB ? ' active' : ''}" onclick="bpSelectB('${t.id}')">
            <span class="bp-compare-opt-dot"></span>
            <span class="bp-compare-opt-name">${t.name}</span>
        </div>`
    ).join('');
}

function bpSelectA(id) {
    _bpSelA = id;
    if (_bpSelB === id) {
        const fallback = TRANS_LIST.find(t => t.id !== id);
        _bpSelB = fallback ? fallback.id : '';
    }
    _bpRenderSingle();
    _bpRenderCompare();
}

function bpSelectB(id) {
    _bpSelB = id;
    _bpRenderCompare();
}

function bpConfirm() {
    _transA = _bpSelA;
    _transB = _bpSelB;
    currentTranslation  = _transA;
    currentTranslationB = _transB;
    _applyTransMode(_bpMode);
    closeBiblePicker();

    syncUrlState();

    renderCurrentPage();
}

/* ══════════════════════════════════════════
   モバイル：スワイプジェスチャー（右スワイプで戻る）
   Study Panel 上の端からスワイプすると本文に戻れる
   ══════════════════════════════════════════ */
function _mobileSwipeBack() {
    const stack = AppState.depth.stack;
    if (stack.length <= 1) {
        closeStudyPanel();
        return;
    }
    AppState.depth.stack = stack.slice(0, stack.length - 1);
    const target = AppState.depth.stack[AppState.depth.stack.length - 1];
    restoreContext(target);
    renderDepthHistory();
}
    
(function _initSwipeBack() {
    let touchStartX = 0;
    let touchStartY = 0;
    let isDragging  = false;
    const EDGE_THRESHOLD = 32;  /* 画面左端から何pxのスワイプを検知するか */
    const SWIPE_THRESHOLD = 80; /* 何px右にスワイプしたら戻るとみなすか */

    const panel = document.getElementById('bottom-depth-panel');
    if (!panel) return;

    panel.addEventListener('touchstart', (e) => {
        if (window.innerWidth > 900) return;
        if (!panel.classList.contains('open')) return;

        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        /* isDragging はまだ確定しない。touchmove で方向確認後に決める */
        isDragging  = touchStartX < EDGE_THRESHOLD ? null : false;
    }, { passive: true });

    panel.addEventListener('touchmove', (e) => {
        if (window.innerWidth > 900) return;
        if (isDragging === false) return;

        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;

        /* isDragging が未確定（null）の場合：最初の8px移動で方向を判定 */
        if (isDragging === null) {
            if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return; /* まだ判定しない */
            /* 縦スクロールが主体 or 左スワイプ → 無効化 */
            if (Math.abs(dy) > Math.abs(dx) * 1.2 || dx < 0) {
                isDragging = false;
                return;
            }
            /* 右スワイプ確定 */
            isDragging = true;
        }

        /* 縦スクロールが主体なら無視 */
        if (Math.abs(dy) > Math.abs(dx) * 1.5) {
            isDragging = false;
            panel.style.transform = '';
            const mainArea = document.getElementById('main-reading-area');
            if (mainArea) { mainArea.style.transform = ''; mainArea.style.opacity = ''; }
            return;
        }

        if (dx > 0) {
            /* パネルを指の動きに追従（rubber band感） */
            panel.style.transition = 'none';
            panel.style.transform  = `translateX(${Math.min(dx, window.innerWidth)}px)`;
            /* 本文を逆方向に少し動かして奥行き感を出す */
            const mainArea = document.getElementById('main-reading-area');
            if (mainArea) {
                const ratio = dx / window.innerWidth;
                const offsetX = -24 + (24 * ratio);
                const opacityVal = 0.6 + (0.4 * ratio);
                mainArea.style.transition = 'none';
                mainArea.style.transform  = `translateX(${offsetX}px)`;
                mainArea.style.opacity    = opacityVal;
            }
        }
    }, { passive: true });

    panel.addEventListener('touchend', (e) => {
        if (window.innerWidth > 900) return;
        const wasTracking = isDragging === true || isDragging === null;
        isDragging = false;

        /* transform が動いていない場合は何もしない */
        if (!wasTracking) return;

        const dx = e.changedTouches[0].clientX - touchStartX;

        /* トランジションを戻す */
        panel.style.transition = '';
        const mainArea = document.getElementById('main-reading-area');
        if (mainArea) mainArea.style.transition = '';

        if (dx > SWIPE_THRESHOLD && panel.classList.contains('open')) {
            /* 閾値を超えた → 戻る */
            _mobileSwipeBack();
        } else {
            /* 閾値未満 or パネル未open → 元に戻す */
            panel.style.transform = '';
            if (mainArea) {
                mainArea.style.transform = '';
                mainArea.style.opacity   = '';
            }
        }
    }, { passive: true });
})();

    /* ── オンボーディング初期化 ── */
    /* ── オンボーディング用ブリッジ ──────────────────────────
       onboarding.js は 'use strict' IIFE のため index.html の
       let 変数に直接アクセスできない。window 経由で公開する。
    ─────────────────────────────────────────────────── */
    window.AppBridge = {
    activateFlowCompare: async function() {
        _transB = currentTranslationB = 'FLOW';
        _applyTransMode('compare');
        await renderCurrentPage();
        _setRightMode('flow');
    },
    activateCompare: async function(transBId) {
        _transB = currentTranslationB = transBId || 'BUN';
        _applyTransMode('compare');
        await renderCurrentPage();
    },
    openFlowTab: async function() {
        /* モバイル：StudyPanelを閉じてFLOWモードで本文を再描画 */
        if (window.innerWidth <= 900) {
            if (typeof _mobileClosePanelToText === 'function') {
                closeStudyPanel();
            }
        }
        _transA = currentTranslation = 'FLOW';
        _applyTransMode('single');
        await renderCurrentPage();
        if (window.AppOnboarding && typeof window.AppOnboarding.onFlowTabOpened === 'function') {
            window.AppOnboarding.onFlowTabOpened();
        }
    },
    closeStudyPanel: function() {
        closeStudyPanel();
    },
};

    document.addEventListener('DOMContentLoaded', function () {
        if (window.AppOnboarding) window.AppOnboarding.init();
        init();
    });
    
</script>
<script src="shared-insight.js" defer></script>
<script src="onboarding.js"></script>
</body>
