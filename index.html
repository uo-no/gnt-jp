<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNT Study Explorer - Library Edition</title>
    <style>
    :root {
        --bg-paper: #f4f1ea;        /* メイン背景 */
        --bg-panel: #ebe7de;        /* サイドパネル（背景よりわずかに濃い） */
        --bg-card: #f9f7f2;         /* パネル内のカード（背景よりわずかに明るい） */
        --text-main: #2c2c2c;       /* 深いチャコール */
        --text-sub: #8e8e8e;
        --accent-dark: #3d3d3d;     
        --highlight: #d35400;       /* 落ち着いた琥珀色 */
        --border-soft: rgba(0,0,0,0.06);
    }

    body { 
        font-family: 'Inter', 'Noto Serif JP', serif; 
        line-height: 1.8; 
        background: var(--bg-paper); 
        color: var(--text-main); 
        margin: 0; 
        padding: 0;
    }

    .main-layout {
        display: flex;
        max-width: 1200px;
        margin: 0 auto;
        padding: 50px 30px;
        gap: 40px;
    }

    .container { flex: 1; min-width: 0; }

    /* ヘッダーデザイン */
    .app-header {
        margin-bottom: 40px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border-soft);
    }
    .location-info {
        display: flex;
        align-items: baseline;
        gap: 20px;
    }
    .location-info h1 {
        font-size: 1.8rem;
        letter-spacing: -0.5px;
        margin: 0;
        font-weight: 800;
        color: var(--accent-dark);
    }
    .nav-toggle {
        font-size: 0.7rem;
        background: transparent;
        border: 1px solid #ccc;
        color: #888;
        padding: 3px 10px;
        border-radius: 20px;
        cursor: pointer;
        transition: 0.2s;
    }
    .nav-toggle:hover { border-color: var(--text-main); color: var(--text-main); }

    .nav-panel {
        display: none;
        margin-top: 20px;
        background: rgba(0,0,0,0.03);
        padding: 15px;
        border-radius: 8px;
        gap: 10px;
        align-items: center;
    }

    /* 本文表示 */
    .verse-block { 
        border-bottom: 1px solid var(--border-soft); 
        transition: background 0.3s;
    }
    .jp-section { padding: 12px 15px; cursor: pointer; display: flex; align-items: baseline; }
    .jp-section:hover { background: rgba(0,0,0,0.02); }
    .v-num { color: #b2bec3; margin-right: 15px; font-size: 0.8rem; font-weight: bold; }
    .jp-text { font-size: 1.1rem; letter-spacing: 0.02em; }

    /* サイドパネル：明るいセピアの階層構造 */
    #side-panel {
        width: 380px;
        height: calc(100vh - 100px);
        position: sticky;
        top: 50px;
        background: var(--bg-panel);
        border-radius: 12px;
        padding: 25px;
        display: flex;
        flex-direction: column;
        box-shadow: inset 1px 1px 3px rgba(255,255,255,0.5), 2px 2px 10px rgba(0,0,0,0.05);
        border: 1px solid var(--border-soft);
    }
    .panel-header {
        font-weight: bold;
        font-size: 1.1rem;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border-soft);
        display: flex;
        justify-content: space-between;
        color: var(--accent-dark);
        letter-spacing: 0.05em;
    }
    #panel-content { flex: 1; overflow-y: auto; }

    /* 単語カード：パネル内で一段明るい紙として表現 */
    .word-card { 
        background: var(--bg-card); 
        padding: 10px 15px; 
        border-radius: 6px; 
        display: flex; 
        justify-content: space-between; 
        align-items: baseline;
        margin-bottom: 10px; 
        border: 1px solid var(--border-soft);
        box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        cursor: pointer;
        transition: all 0.2s;
    }
    .word-card:hover { 
        transform: translateY(-1px);
        border-color: var(--highlight);
        box-shadow: 0 3px 8px rgba(0,0,0,0.06);
    }
    .greek-word { font-family: 'SBL Greek', serif; font-size: 1.35rem; color: #000; }
    .tag-jp { color: #5f6a6a; font-size: 0.8rem; margin-left: 10px; }
    .strong-num { font-size: 0.65rem; color: #b2babb; font-family: monospace; }

    /* 詳細表示：パネル下部に馴染む表示 */
    #word-detail-view {
        background: var(--bg-card); 
        border: 1px solid var(--highlight); 
        border-radius: 8px;
        padding: 18px; 
        display: none; 
        margin-top: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .detail-body { font-size: 0.95rem; line-height: 1.6; color: var(--text-main); }

    /* 文法装飾 */
    .indicative .greek-word, .imperative .greek-word { border-bottom: 2px solid var(--highlight); }
    .middle .greek-word::after, .passive .greek-word::after { content: "*"; color: #c0392b; vertical-align: super; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="container">
        <header class="app-header">
            <div class="location-info">
                <h1 id="view-title">Loading...</h1>
                <button class="nav-toggle" onclick="toggleNav()">INDEX</button>
            </div>
            
            <div id="nav-panel" class="nav-panel">
                <select id="bookSelect" style="background:var(--bg-card); border:1px solid #ccc; padding:5px; border-radius:4px;">
                    <option value="ROM">Romans</option>
                    <option value="1CO">1 Corinthians</option>
                    <option value="2CO">2 Corinthians</option>
                    <option value="GAL">Galatians</option>
                </select>
                <input type="number" id="chInput" value="1" style="width: 45px; background:var(--bg-card); border:1px solid #ccc; padding:5px; border-radius:4px;">
                <button onclick="changePage()" style="background:var(--accent-dark); color:white; border:none; padding:6px 15px; border-radius:4px; cursor:pointer; font-size:0.8rem;">OPEN</button>
            </div>
        </header>
        <div id="app">アーカイブから取得中...</div>
    </div>

    <aside id="side-panel">
        <div class="panel-header">
            <span>MORPHOLOGY</span>
            <span id="active-v" style="font-size: 0.8rem; color: var(--text-sub);"></span>
        </div>
        <div id="panel-content">
            <p style="color: var(--text-sub); font-size: 0.85rem; font-style: italic;">Select a verse to analyze</p>
        </div>
        
        <div id="word-detail-view">
            <div style="font-weight:bold; border-bottom:1px solid var(--border-soft); margin-bottom:12px; display:flex; justify-content:space-between; padding-bottom:5px;">
                <span id="detail-greek" style="font-size:1.4rem; color:#000;"></span>
                <span id="detail-strong" style="color:var(--text-sub); font-size:0.75rem;"></span>
            </div>
            <div id="detail-body" class="detail-body"></div>
        </div>
    </aside>
</div>

<script>
let abbottSmithDict = null;

const JPN_MAP = {
    pos: { 'V': '動詞', 'N': '名詞', 'A': '形容詞', 'R': '関係代名詞', 'P': '人称代名詞', 'D': '指示代名詞', 'T': '冠詞', 'ADV': '副詞', 'PREP': '前置詞', 'CONJ': '接続詞', 'PRT': '添語' },
    tense: { 'P': '現在', 'I': '未完了', 'F': '未来', 'A': 'アオリスト', 'X': '完了' },
    voice: { 'A': '能動', 'M': '中動', 'P': '受動', 'D': '能動的受動' },
    mood: { 'I': '直説', 'S': '接続', 'O': '希求', 'M': '命令', 'N': '不定', 'P': '分詞' },
    case: { 'N': '主格', 'G': '属格', 'D': '与格', 'A': '対格', 'V': '呼格' },
    gender: { 'M': '男性', 'F': '女性', 'N': '中性' },
    number: { 'S': '単数', 'P': '複数' },
    person: { '1': '1人称', '2': '2人称', '3': '3人称' }
};

async function loadDict() {
    try {
        abbottSmithDict = {}; // 辞書を初期化

        // 1. 日本語辞書の読み込み
        const resJp = await fetch('./macula-greek-japanese-SBLGNT.tsv');
        if (!resJp.ok) throw new Error("日本語TSVが見つかりません");
        const textJp = await resJp.text();

        textJp.split(/\r?\n/).forEach((row, index) => {
            if (index === 0 || !row.trim()) return;
            const cols = row.split('\t');
            // 列の数が足りているか、Strong番号(cols[12])があるか確認
            if (cols.length >= 13) {
                const strong = String(cols[12]).trim();
                abbottSmithDict[strong] = { 
                    japanese: cols[6] ? cols[6].trim() : "（訳なし）", 
                    gloss: cols[5] ? cols[5].trim() : "" 
                };
            }
        });

        // 2. Abbott-Smithの読み込み
        const resAbbott = await fetch('./abbott-smith.tsv');
        if (!resAbbott.ok) throw new Error("Abbott-Smith TSVが見つかりません");
        const textAbbott = await resAbbott.text();

        textAbbott.split(/\r?\n/).forEach((row, index) => {
            if (index === 0 || !row.trim()) return;
            const cols = row.split('\t');
            if (cols.length < 3) return;

            const strong = String(cols[0]).trim();
            const description = cols[2] ? cols[2].trim() : "";

            if (abbottSmithDict[strong]) {
                // すでに日本語データがある場合は description を追加
                abbottSmithDict[strong].description = description;
            } else {
                // 日本語データがなくても Abbott-Smith 単体で登録
                abbottSmithDict[strong] = { 
                    japanese: "（日本語訳データなし）", 
                    gloss: "", 
                    description: description 
                };
            }
        });

        console.log("辞書の全統合が完了しました。総単語数:", Object.keys(abbottSmithDict).length);
    } catch (e) {
        console.error("辞書の読み込み中に重大なエラーが発生しました:", e);
    }
}

function decorate(wordText, wordData) {
    const m = wordData;
    const morph = m.morph || "";
    const parts = morph.split('-');
    const pos = parts[0]; 
    let jpMorph = "";

    if (pos === 'V' && parts[1]) {
        const t = JPN_MAP.tense[parts[1][0]] || "";
        const v = JPN_MAP.voice[parts[1][1]] || "";
        const md = JPN_MAP.mood[parts[1][2]] || "";
        let detail = "";
        if (parts[1][2] === 'P' && parts[2]) {
            detail = `(${JPN_MAP.case[parts[2][0]] || ""}${JPN_MAP.number[parts[2][1]] || ""}${JPN_MAP.gender[parts[2][2]] || ""})`;
        } else if (parts[1].length >= 5) {
            detail = (JPN_MAP.person[parts[1][3]] || "") + (JPN_MAP.number[parts[1][4]] || "");
        }
        jpMorph = `${t}${v}${md}${detail}`;
    } else if (['N', 'A', 'R', 'P', 'T', 'D'].includes(pos) && parts[1]) {
        const label = JPN_MAP.pos[pos] || pos;
        const p1 = parts[1];
        let p = "", c = "", n = "", g = "";
        if (['1', '2', '3'].includes(p1[0])) {
            p = p1[0] + "人称"; c = JPN_MAP.case[p1[1]] || ""; n = JPN_MAP.number[p1[2]] || "";
        } else {
            c = JPN_MAP.case[p1[0]] || ""; n = JPN_MAP.number[p1[1]] || ""; g = JPN_MAP.gender[p1[2]] || "";
        }
        jpMorph = `${label}:${p}${c}${n}${g}`;
    } else { jpMorph = JPN_MAP.pos[pos] || morph; }

    // Strong番号の照合（Gなしの数字のみで比較）
    const strong = String(m.strong || "").trim(); 
    const info = abbottSmithDict ? abbottSmithDict[strong] : null;
    
    // 日本語訳があれば ［ ］ で囲む
    const jpGloss = info && info.japanese ? `［${info.japanese}］` : ""; 

    // クラス名生成
    const tenseClass = (pos === 'V' && parts[1]) ? { 'P': 'present', 'A': 'aorist', 'X': 'perfect' }[parts[1][0]] : "";
    const voiceClass = (pos === 'V' && parts[1]) ? { 'P': 'passive', 'M': 'middle', 'D': 'passive' }[parts[1][1]] : "";
    const moodClass  = (pos === 'V' && parts[1]) ? { 'I': 'indicative', 'M': 'imperative' }[parts[1][2]] : "";
    const classes = ["verb-hit", tenseClass, voiceClass, moodClass].filter(Boolean).join(" ");
    
    return `<div class="word-card ${classes}" onclick="showDetail('${wordText}', '${strong}', '${jpMorph}')">
                <div>
                    <span class="greek-word">${wordText}</span>
                    <span style="color: var(--highlight); font-weight: bold; margin-left: 5px; font-size: 0.9rem;">${jpGloss}</span>
                    <span class="tag-jp">${jpMorph}</span>
                </div>
                <span class="strong-num">G${strong}</span>
            </div>`;
}

// 詳細パネルの修正
function showDetail(greek, strong, morph) {
    const view = document.getElementById('word-detail-view');
    view.style.display = 'block';
    document.getElementById('detail-greek').innerText = greek;
    document.getElementById('detail-strong').innerText = `G${strong}`;
    
    const info = abbottSmithDict ? abbottSmithDict[strong] : null;
    
    if (info) {
        // コンソールでデータが正しく読み込まれているか確認できるようにします
        console.log(`G${strong} のデータ:`, info);

        document.getElementById('detail-body').innerHTML = `
            <div style="color:var(--highlight); margin-bottom:8px; font-weight:bold; font-size:0.85rem;">${morph}</div>
            <div style="font-size:1.1rem; font-weight:bold; margin-bottom:10px;">${info.japanese || '（日本語訳なし）'}</div>
            <div style="font-size:0.9rem; line-height:1.6; border-top:1px solid var(--border-soft); padding-top:10px;">
                <p><strong>Definition:</strong> ${info.gloss || '---'}</p>
                <div style="color:var(--text-main); background:rgba(0,0,0,0.03); padding:12px; border-radius:6px; white-space: pre-wrap; margin-top:10px;">
                    ${info.description || "No detailed description available."}
                </div>
            </div>
        `;
    } else {
        document.getElementById('detail-body').innerHTML = `
            <div style="color:var(--highlight); font-size:0.85rem;">${morph}</div>
            <p style="font-size:0.8rem; color:var(--text-sub);">詳細データが見つかりません (G${strong})</p>
        `;
    }
}
    
function toggleNav() {
    const nav = document.getElementById('nav-panel');
    nav.style.display = (nav.style.display === 'flex') ? 'none' : 'flex';
}

async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || 'ROM';
    const ch = urlParams.get('ch') || '1';
    document.getElementById('view-title').innerText = `${book} ${ch}`;
    document.getElementById('bookSelect').value = book;
    document.getElementById('chInput').value = ch;
    
    await loadDict();

    try {
        const [jpRes, elRes] = await Promise.all([
            fetch(`./bible_jp/${book}/${ch}.json`),
            fetch(`./bible_data/${book}/${ch}.json`)
        ]);
        render(await jpRes.json(), await elRes.json());
    } catch (err) { document.getElementById('app').innerHTML = `<p style="color:red">Archive not found.</p>`; }
}

function render(jpData, elData) {
    const app = document.getElementById('app');
    const panel = document.getElementById('panel-content');
    const vLabel = document.getElementById('active-v');
    app.innerHTML = '';
    
    const elByVerse = {};
    elData.forEach(w => {
        const v = w.ref.split(':')[1]?.split('!')[0];
        if (v) { if (!elByVerse[v]) elByVerse[v] = []; elByVerse[v].push(w); }
    });

    Object.entries(jpData.verses).forEach(([vNum, text]) => {
        const block = document.createElement('div');
        block.className = 'verse-block';
        block.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text">${text}</div></div>`;
        block.onclick = () => {
            document.querySelectorAll('.verse-block').forEach(b => b.style.background = 'transparent');
            block.style.background = 'rgba(0,0,0,0.03)';
            vLabel.innerText = `Verse ${vNum}`;
            panel.innerHTML = '';
            if (elByVerse[vNum]) elByVerse[vNum].forEach(w => { panel.innerHTML += decorate(w.text, w); });
            document.getElementById('word-detail-view').style.display = 'none';
        };
        app.appendChild(block);
    });
}

function changePage() {
    window.location.href = `?book=${document.getElementById('bookSelect').value}&ch=${document.getElementById('chInput').value}`;
}

init();
</script>
</body>
</html>
