                        <th style="text-align: left; padding: 10px;">日本語訳聖書</th>
                        <td style="padding: 10px;">聖書 新改訳2017 ©2017新日本聖書刊行会</td>
                    </tr>
                </table>
            </section>

            <div style="text-align: center; margin-top: 40px;">
                <button onclick="renderCurrentPage()" style="background: var(--highlight); color: white; border: none; padding: 12px 40px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: opacity 0.2s;">
                    本文に戻る
                </button>
            </div>
        </div>
    `;
    app.innerHTML = infoHtml;
}
    
async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || 'ROM';
    const ch   = urlParams.get('ch')   || '1';

    const isNt = SB_BOOKS.nt.some(b => b.key === book);
    document.querySelector('.root-name').innerText = isNt ? '新約聖書' : '旧約聖書';

    const allBooks = [...SB_BOOKS.nt, ...SB_BOOKS.ot];
    const found = allBooks.find(b => b.key === book);
    document.getElementById('view-title').innerText = found
        ? `${found.name} ${ch}章`
        : `${book} ${ch}章`;

    sbInitState(book, parseInt(ch));

    await loadDict();

    const hasGreek = GREEK_BOOKS.has(book);

    try {
        const jpRes = await fetch(`./bible_jp/${book}/${ch}.json`);
        if (!jpRes.ok) throw new Error(`bible_jp not found: ${book}/${ch}`);
        const jpData = await jpRes.json();

        let elData = [];
        if (hasGreek) {
            try {
                const elRes = await fetch(`./bible_data/${book}/${ch}.json`);
                if (elRes.ok) {
                    elData = await elRes.json();
                } else {
                    console.warn(`bible_data not found for ${book}/${ch} — Greek panel disabled`);
                }
            } catch (e) {
                console.warn(`bible_data fetch error for ${book}/${ch}:`, e);
            }
        }

        render(jpData, elData, hasGreek && elData.length > 0);

    } catch (err) {
        console.error(err);
        document.getElementById('bible-text-area').innerHTML = `<p style="color:red">データが見つかりません（${book} ${ch}章）</p>`;
    }
}

function render(jpData, elData, hasGreek) {
    const app          = document.getElementById('bible-text-area');
    const parallel     = document.getElementById('parallel-text-area');
    // ── Study panel を閉じて Reading 状態に戻す ──
    closeStudyPanel();
    /* 章が変わった場合は AppState を完全リセット（study.params も破棄） */
    AppState.mode                = 'reading';
    AppState.selectedVerse       = { vNum: null, elWords: [] };
    AppState.inspect.data        = null;
    AppState.study.params        = null;
    AppState.study.tab           = 'flow';
    AppState.scrollTop           = 0;
    // reading-hint を保持（なければ再生成）
    let hintEl = document.getElementById('reading-hint');
    if (!hintEl) {
        hintEl = document.createElement('div');
        hintEl.id = 'reading-hint';
        hintEl.textContent = '語をタップすると基本義を確認できます';
    }
    app.innerHTML = '';
    app.appendChild(hintEl);
    parallel.innerHTML = '';

    // Study panel 内の語形一覧はなくなったため、elByVerseは
    // word-cardのHTMLをverse-blockにインライン埋め込むのではなく、
    // 節クリックで bottom のhidden panelに格納して onWordCardClick から読む方式を維持。
    // ただし bottom-word-panel は display:none なので、代わりに
    // 節クリックで「語形ポップアップリスト」を side-panel 上部に表示する。
    // 今回の最小差分では: 節クリック → side-panel の panelContent に語形カードを描画し Study へ
    // という旧来の挙動を維持しつつ、
    // 語形カードクリック → Inspect popover（新規）の流れにする。

    const elByVerse = {};
    if (elData && elData.length > 0) {
        elData.forEach(w => {
            const v = w.ref.split(':')[1]?.split('!')[0];
            if (v) { if (!elByVerse[v]) elByVerse[v] = []; elByVerse[v].push(w); }
        });
    }

    const openBtn = document.getElementById('open-panel-btn');
    if (!hasGreek) {
        document.getElementById('side-panel').style.display = 'none';
        openBtn.style.display = 'none';
    }

    Object.entries(jpData.verses).forEach(([vNum, text]) => {
        // 左：聖書本文
        const block = document.createElement('div');
        block.className = 'verse-block';
        block.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text">${text}</div></div>`;

        if (hasGreek) {
            block.onclick = () => {
                // 節クリック：語形リストを side-panel に表示（本文は消えない）
                app.querySelectorAll('.verse-block').forEach(b => b.classList.remove('selected'));
                block.classList.add('selected');
                document.getElementById('active-v').innerText = `${vNum} 節`;

                /* AppState に選択節を記録（Browsing モードへ） */
                AppState.toBrowsing(vNum, elByVerse[vNum] || []);

                openWordListInStudyPanel(vNum, elByVerse[vNum] || []);
                hideInspectPopover();
            };
        }

        app.appendChild(block);

        // 右：並列訳
        const pBlock = document.createElement('div');
        pBlock.className = 'verse-block';
        pBlock.innerHTML = `<div class="jp-section"><span class="v-num">${vNum}</span><div class="jp-text">${text}</div></div>`;
        parallel.appendChild(pBlock);
    });

    _proximityTokens = (elData || []).map(w => ({ text: w.text || '', lemma: w.lemma || w.text || '' }));

    // Reading hint: 語クリックで Inspect を開けることを静かに示す
    const hint = document.getElementById('reading-hint');
    if (hint) hint.classList.toggle('visible', hasGreek);
}

/**
 * 節クリック時に side-panel を開き、語形リストを3タブで表示する。
 *
 * タブ構成:
 *   流れ（デフォルト） … ギリシャ語順の日本語chip列。「読解UI」のメイン。
 *   通常               … 既存の word-card リスト。
 *   原語               … ギリシャ語テキスト + 簡易morph。
 *
 * 既存の AppState / openStudyPanel / Inspect popover との接続はそのまま。
 * word-card の onclick（onWordCardClick）も通常タブでは変わらず動作する。
 * 流れタブのchipクリックは _wlvChipClick() を経由して同じ AppState を更新する。
 */
function openWordListInStudyPanel(vNum, words) {
    /* words をキャッシュ（chip クリック時の詳細参照用） */
    _wlvWordCache = words || [];

    const sidePanel    = document.getElementById('side-panel');
    const parallelArea = document.getElementById('parallel-text-area');
    const frameWrap    = document.getElementById('analysis-frame-wrap');
    const iframe       = document.getElementById('analysis-iframe');
    const analysisTabs = document.getElementById('analysis-tabs');

    /* side-panel を表示 */
    sidePanel.style.display    = 'flex';
    parallelArea.style.display = 'none';
    document.getElementById('open-panel-btn').style.display = 'none';

    /* analysis エリアはクリア・非表示（語形選択前） */
    const area = document.getElementById('analysis-content-area');
    if (area) area.innerHTML = '';
    frameWrap.classList.remove('visible');
    if (iframe) iframe.src = '';
    analysisTabs.classList.remove('visible');
    const rcb = document.getElementById('rcb-container');
    if (rcb) rcb.classList.remove('visible');
    _currentAnalysisParams = null;

    /* 既存の word-list-view があれば削除 */
    const existing = document.getElementById('word-list-view');
    if (existing) existing.remove();

    /* ── 外枠 ── */
    const listEl = document.createElement('div');
    listEl.id = 'word-list-view';
    listEl.style.cssText = 'flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0;';

    if (!words.length) {
        listEl.innerHTML = `<p style="color:var(--text-sub);font-size:0.82rem;text-align:center;padding:32px 18px;">この節の語形データがありません</p>`;
        sidePanel.appendChild(listEl);
        return;
    }

    /* ── 流れビュー（タブなし・常時表示） ── */
    const flowHTML = _buildFlowTabHTML(words);

    listEl.innerHTML = flowHTML;

    sidePanel.appendChild(listEl);
}

/* ════════════════════════════════════════════════════════
   buildFlowTabHTML — 「流れ」タブのメイン描画
   ════════════════════════════════════════════════════════

   設計：
   ① ギリシャ語順を保持（並べ替えない）
   ② 日本語グロスを自然化（品詞・法・時制に応じて接尾語を変換）
   ③ 冠詞は「その」「この」のみ、接続詞は軽く句区切りを挿入
   ④ chip内 dot で品詞を静かに色付け（役割ラベルなし）
   ⑤ クリックで下部ドロワーに詳細を展開（初期非表示）
   ════════════════════════════════════════════════════════ */
function _buildFlowTabHTML(words) {
    /* 各語を「流れchip」データに変換 */
    const chips = words.map((w, i) => _wordToFlowChip(w, i));

    /* chip HTML */
    const chipsHTML = chips.map((c, i) => {
        const sepBefore = c.phraseBreakBefore
            ? `<span class="wlv-phrase-sep"></span>`
            : '';
        return `${sepBefore}<span class="wlv-chip ${c.roleClass}"
            id="wlv-chip-${i}"
            data-idx="${i}"
            onclick="_wlvChipClick(this, ${i})"
            title="${c.greek}">
            <span class="wlv-chip-ja">${c.gloss}</span>
            <span class="wlv-chip-dot"></span>
        </span>`;
    }).join('');

    /* 詳細ドロワー（全chip共通。クリックで内容を差し替え） */
    const drawerHTML = `
        <div class="wlv-detail-drawer" id="wlv-detail-drawer">
            <div class="wlv-detail-greek" id="wlv-dd-greek">—</div>
            <div class="wlv-detail-ja"    id="wlv-dd-ja">—</div>
            <div class="wlv-detail-morph" id="wlv-dd-morph"></div>
            <div class="wlv-detail-signals" id="wlv-dd-signals"></div>
            <button class="wlv-detail-study-btn" id="wlv-dd-study-btn" onclick="_wlvStudyBtnClick()">
                詳しく見る →
            </button>
        </div>`;

    /* グロス補足ラベル（読解の手引き） */
    const hintHTML = `<p style="font-size:0.6rem;color:var(--text-sub);opacity:0.4;margin-top:14px;letter-spacing:0.02em;">
        語をタップ → 原語と文法シグナルを確認 → 詳しく見る
    </p>`;

    return `
        <div class="wlv-flow-section">
            <div class="wlv-flow-stream" id="wlv-flow-stream">
                ${chipsHTML}
            </div>
            ${drawerHTML}
            ${hintHTML}
        </div>`;
}

/**
 * 1語のデータを flow chip 表示用オブジェクトに変換する。
 *
 * @param {Object} w   word data（text, morph, lemma, japanese/gloss, ref, strong）
 * @param {number} i   index
 * @returns {{ greek, gloss, roleClass, phraseBreakBefore, signals, morphText, jaWord, rawMorph, lemma, ref, strong }}
 */
function _wordToFlowChip(w, i) {
    const greek    = w.text   || '—';
    const rawMorph = w.morph  || '';
    const lemma    = w.lemma  || '';
    const ref      = w.ref    || '';
    const strong   = String(w.strong || '').replace(/[^0-9]/g, '');
    const jaWord   = w.japanese || w.gloss
        || (abbottSmithDict && abbottSmithDict[strong]?.japanese)
        || '？';

    const parts    = rawMorph.split('-');
    const pos      = parts[0] || '';

    /* ── グロス自然化 ── */
    let gloss = jaWord;

    /* 動詞の法・時制に応じた接尾調整 */
    if (pos === 'V' && parts[1]) {
        const off       = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const tenseCode = parts[1][off]     || '';
        const voiceCode = parts[1][off + 1] || '';
        const moodCode  = parts[1][off + 2] || '';

        /* 分詞：「〜ながら」「〜した（上で）」など */
        if (moodCode === 'P') {
            if (tenseCode === 'P') gloss = _naturalize(jaWord, 'part-pres');
            else if (tenseCode === 'A') gloss = _naturalize(jaWord, 'part-aor');
            else if (tenseCode === 'X') gloss = _naturalize(jaWord, 'part-perf');
        }
        /* 不定詞 */
        else if (moodCode === 'N') {
            gloss = _naturalize(jaWord, 'inf');
        }
        /* 命令法 */
        else if (moodCode === 'M') {
            gloss = _naturalize(jaWord, 'imp');
        }
        /* 受動態 */
        if (voiceCode === 'P') {
            gloss = _naturalize(gloss, 'pass');
        }
    }

    /* 冠詞：「その」「この」または非表示 */
    if (pos === 'T') {
        /* 冠詞は目に見える情報を最小化。「の」だけ示す */
        gloss = 'その';
    }

    /* roleClass：chip dot の色付けと signal 生成 */
    let roleClass = 'role-other';
    const signals = [];

    if (pos === 'V') {
        roleClass = 'role-verb';
        const off      = /^[0-9]/.test(parts[1] || '') ? 1 : 0;
        const moodCode = (parts[1] || '')[off + 2] || '';
        const tenCode  = (parts[1] || '')[off]     || '';
        const voiCode  = (parts[1] || '')[off + 1] || '';

        /* 法（Mood）シグナル */
        if (moodCode === 'M') signals.push({ label: '命令', cls: 'sig-exhort' });
        else if (moodCode === 'P') signals.push({ label: '分詞', cls: 'sig-logic' });
        else if (moodCode === 'N') signals.push({ label: '不定詞', cls: 'sig-logic' });
        else if (moodCode === 'S') signals.push({ label: '接続法', cls: 'sig-logic' });
        else if (moodCode === 'I') signals.push({ label: '直説法', cls: 'sig-logic' });
        else if (moodCode === 'O') signals.push({ label: '希求法', cls: 'sig-logic' });

        /* 時制シグナル */
        if (tenCode === 'X') signals.push({ label: '完了', cls: 'sig-promise' });
        else if (tenCode === 'A') signals.push({ label: 'アオリスト', cls: 'sig-declare' });
        else if (tenCode === 'F') signals.push({ label: '未来', cls: 'sig-promise' });
        else if (tenCode === 'I') signals.push({ label: '未完了', cls: 'sig-logic' });

        /* 態シグナル */
        if (voiCode === 'P') signals.push({ label: '受動', cls: 'sig-word' });
        else if (voiCode === 'M' || voiCode === 'D') signals.push({ label: '中動', cls: 'sig-word' });
    }
    else if (pos === 'N')    {
        roleClass = 'role-noun';
        const caseParts = parts[1] || '';
        const base = ['1','2','3'].includes(caseParts[0]) ? caseParts.slice(1) : caseParts;
        const CASE_SIG = { N: { label: '主格', cls: 'sig-logic' }, G: { label: '属格', cls: 'sig-logic' }, D: { label: '与格', cls: 'sig-logic' }, A: { label: '対格', cls: 'sig-logic' }, V: { label: '呼格', cls: 'sig-logic' } };
        const cs = CASE_SIG[base[0]];
        if (cs) signals.push(cs);
        const NUM_SIG = { P: { label: '複数', cls: 'sig-logic' } };
        const ns = NUM_SIG[base[1]];
        if (ns) signals.push(ns);
    }
    else if (pos === 'A')    {
        roleClass = 'role-adj';
        const caseParts = parts[1] || '';
        const base = ['1','2','3'].includes(caseParts[0]) ? caseParts.slice(1) : caseParts;
        const CASE_SIG = { N: { label: '主格', cls: 'sig-logic' }, G: { label: '属格', cls: 'sig-logic' }, D: { label: '与格', cls: 'sig-logic' }, A: { label: '対格', cls: 'sig-logic' } };
        const cs = CASE_SIG[base[0]];
        if (cs) signals.push(cs);
    }
    else if (pos === 'CONJ') {
        roleClass = 'role-conj';
        const CONJ_SIG = {
            'γάρ':  { label: '理由', cls: 'sig-logic' },
            'ἀλλά': { label: '転換', cls: 'sig-turn' },
            'οὖν':  { label: '結論', cls: 'sig-logic' },
            'δέ':   { label: '展開', cls: 'sig-turn' },
            'καί':  { label: '継続', cls: 'sig-emphasis' },
            'ἵνα':  { label: '目的', cls: 'sig-logic' },
            'ὅτι':  { label: '内容', cls: 'sig-logic' },
            'εἰ':   { label: '条件', cls: 'sig-logic' },
            'ὥστε': { label: '結果', cls: 'sig-logic' },
        };
        const cs = CONJ_SIG[w.text];
        if (cs) signals.push(cs);
        else signals.push({ label: '接続', cls: 'sig-logic' });
    }
    else if (pos === 'PREP') { roleClass = 'role-prep'; signals.push({ label: '前置詞', cls: 'sig-logic' }); }
    else if (pos === 'T')    { roleClass = 'role-art'; signals.push({ label: '冠詞', cls: 'sig-logic' }); }
    else if (['P','R','D'].includes(pos)) {
        roleClass = 'role-pron';
        const caseParts = parts[1] || '';
        const base = ['1','2','3'].includes(caseParts[0]) ? caseParts.slice(1) : caseParts;
        const CASE_SIG = { N: { label: '主格', cls: 'sig-logic' }, G: { label: '属格', cls: 'sig-logic' }, D: { label: '与格', cls: 'sig-logic' }, A: { label: '対格', cls: 'sig-logic' } };
        const cs = CASE_SIG[base[0]];
        if (cs) signals.push(cs);
    }

    /* 句区切りの判定：接続詞・前置詞の前で区切る */
    const phraseBreakBefore = (pos === 'CONJ' && i > 0) || (pos === 'PREP' && i > 0);

    /* morphText：ドロワーに表示する人が読める文法メモ */
    const morphText = _buildMorphText(rawMorph, pos, parts);

    return { greek, gloss, roleClass, phraseBreakBefore, signals, morphText, jaWord, rawMorph, lemma, ref, strong };
}

/**
 * 日本語グロスを品詞・法に応じて自然化する。
 * グロスの末尾をルールベースで変換する。複雑な形態素分析は行わない。
 * 変換できなければ元の gloss をそのまま返す。
 */
function _naturalize(gloss, kind) {
    /* 動詞語幹の末尾を変換するルールテーブル */
    const RULES = {
        'part-pres': [ /* 現在分詞：〜ながら / 〜つつ → 〜ながら */
            [/する$/, 'しながら'], [/する$/, 'しながら'],
            [/いる$/, 'いながら'], [/える$/, 'えながら'],
            [/くる$/, 'きながら'], [/ある$/, 'ありながら'],
            [/([^ん])る$/, '$1ながら'],
            [/つ$/, 'ちながら'],   [/ぬ$/, 'にながら'],
            [/む$/, 'みながら'],   [/ぶ$/, 'びながら'],
            [/う$/, 'いながら'],   [/く$/, 'きながら'],
            [/す$/, 'しながら'],   [/ぐ$/, 'ぎながら'],
        ],
        'part-aor': [ /* アオリスト分詞：〜した（後で） */
            [/する$/, 'した'],     [/いる$/, 'いた'],
            [/える$/, 'えた'],     [/くる$/, 'きた'],
            [/([^ん])る$/, '$1た'],
            [/つ$/, 'った'],       [/ぬ$/, 'んだ'],
            [/む$/, 'んだ'],       [/ぶ$/, 'んだ'],
            [/う$/, 'った'],       [/く$/, 'いた'],
            [/す$/, 'した'],       [/ぐ$/, 'いだ'],
        ],
        'part-perf': [ /* 完了分詞：〜した（状態） */
            [/する$/, 'してきた'], [/いる$/, 'いてきた'],
            [/([^ん])る$/, '$1てきた'],
            [/つ$/, 'ってきた'],   [/む$/, 'んできた'],
        ],
        'inf': [ /* 不定詞：〜すること */
            [/する$/, 'すること'], [/いる$/, 'いること'],
            [/える$/, 'えること'], [/くる$/, 'くること'],
            [/([^ん])る$/, '$1ること'],
            [/つ$/, 'つこと'],    [/ぬ$/, 'ぬこと'],
            [/む$/, 'むこと'],    [/ぶ$/, 'ぶこと'],
            [/う$/, 'うこと'],    [/く$/, 'くこと'],
            [/す$/, 'すこと'],
        ],
        'imp': [ /* 命令法：そのまま（「〜せよ」は重い）*/
            [/する$/, 'せよ'],    [/([^ん])る$/, '$1よ'],
        ],
        'pass': [ /* 受動：〜される */
            [/する$/, 'される'],  [/いる$/, 'いられる'],
            [/([^ん])る$/, '$1られる'],
            [/つ$/, 'たれる'],    [/む$/, 'まれる'],
            [/ぶ$/, 'ばれる'],    [/く$/, 'かれる'],
            [/す$/, 'される'],
        ],
    };

    const rules = RULES[kind] || [];
    for (const [pattern, replacement] of rules) {
        if (pattern.test(gloss)) {
            return gloss.replace(pattern, replacement);
        }
    }
    return gloss; /* 変換できなければ元のまま */
}

/**
 * rawMorph から人が読める文法メモ（1〜2行）を生成する。
 * ドロワーに表示するだけなので学術ラベルは避ける。
 */
function _buildMorphText(rawMorph, pos, parts) {
    const JPN = {
        tense:  { P:'現在', I:'未完了', F:'未来', A:'アオリスト', X:'完了' },
        mood:   { I:'直説法', S:'接続法', O:'希求法', M:'命令法', N:'不定詞', P:'分詞' },
        voice:  { A:'能動', M:'中動', P:'受動', D:'中動自動' },
        case:   { N:'主格', G:'属格', D:'与格', A:'対格', V:'呼格' },
        number: { S:'単数', P:'複数' },
        gender: { M:'男性', F:'女性', N:'中性' },
        pos:    { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞', ADV:'副詞', PREP:'前置詞', CONJ:'接続詞', PRT:'添語' },
    };
    const posJpn = JPN.pos[pos] || pos;
    const notes  = [posJpn];

    if (pos === 'V' && parts[1]) {
        const off  = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const t    = JPN.tense[parts[1][off]]     || '';
        const v    = JPN.voice[parts[1][off + 1]] || '';
        const m    = JPN.mood[parts[1][off + 2]]  || '';
        if (t) notes.push(t);
        if (m) notes.push(m);
        if (v && v !== '能動') notes.push(v);
    } else if (['N','A','R','P','T','D'].includes(pos) && parts[1]) {
        const base = ['1','2','3'].includes(parts[1][0]) ? parts[1].slice(1) : parts[1];
        const c = JPN.case[base[0]]   || '';
        const n = JPN.number[base[1]] || '';
        if (c) notes.push(c);
        if (n) notes.push(n);
    }

    return notes.join(' · ');
}

/* ══════════════════════════════════════════
   パネルリサイズ（ドラッグ）
   ══════════════════════════════════════════ */
(function() {
    const handle = document.getElementById('panel-resize-handle');
    const panel  = document.getElementById('side-panel');
    const layout = document.querySelector('.main-layout');
    let dragging = false;
    let startX = 0;
    let startW = 0;

    handle.addEventListener('mousedown', (e) => {
        dragging = true;
        startX = e.clientX;
        startW = panel.offsetWidth;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const delta = startX - e.clientX;
        const layoutW = layout.offsetWidth;
        const minPx = 280;
        const maxPx = layoutW * 0.80;
        const newW = Math.min(maxPx, Math.max(minPx, startW + delta));
        panel.style.width = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });

    handle.addEventListener('touchstart', (e) => {
        dragging = true;
        startX = e.touches[0].clientX;
        startW = panel.offsetWidth;
        handle.classList.add('dragging');
        e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
        if (!dragging) return;
        const delta = startX - e.touches[0].clientX;
        const layoutW = layout.offsetWidth;
        const minPx = 280;
        const maxPx = layoutW * 0.80;
        const newW = Math.min(maxPx, Math.max(minPx, startW + delta));
        panel.style.width = newW + 'px';
    }, { passive: false });

    document.addEventListener('touchend', () => {
        dragging = false;
        handle.classList.remove('dragging');
    });
})();

/* ══════════════════════════════════════════
   openStudyPanel — 正規実装（唯一の定義）
   責務:
     - word-list-view を消去してiframe/インライン分析に切り替える
     - AppState.saveScroll() で scroll 位置を保存
     - AppState.toStudy() で状態を Study モードへ遷移
     - study.tab を引き継いで前回開いていたタブを復元
   ══════════════════════════════════════════ */
// openStudyPanel を再定義して word-list-view を隠す処理を追加
function openStudyPanel(greek, rawMorph, ref, lemma) {
    // word-list-view を削除（Study分析エリアと共存させない）
    const listEl = document.getElementById('word-list-view');
    if (listEl) listEl.remove();

    const m = parseMorphForSearch(rawMorph);
    const params = {
        ref,
        word:      greek,
        lemma:     lemma || '',
        pos:       m.pos    || '',
        _rawMorph: rawMorph,
        tense:     m.tense  || '',
        mood:      m.mood   || '',
        voice:     m.voice  || '',
        gender:    m.gender || '',
        number:    m.number || '',
        case:      m.case   || '',
    };

    /* スクロール位置を保存（Reading に戻るときに復元する） */
    AppState.saveScroll();

    /* AppState を Study モードへ遷移（tab は記憶されていたものを引き継ぐ） */
    AppState.toStudy(params, AppState.study.tab || 'flow');

    updateReadingCoreBar(params);

    const sidePanel    = document.getElementById('side-panel');
    const parallelArea = document.getElementById('parallel-text-area');
    sidePanel.style.display    = 'flex';
    parallelArea.style.display = 'none';

    // active-v に語形情報を表示
    const activeVEl = document.getElementById('active-v');
    if (activeVEl && greek) activeVEl.textContent = greek;

    document.getElementById('open-panel-btn').style.display = 'none';
    document.getElementById('analysis-tabs').classList.add('visible');
    document.getElementById('analysis-frame-wrap').classList.add('visible');

    switchAnalysisTab(AppState.study.tab || 'flow');
}

/* ══════════════════════════════════════════
   closeStudyPanel — 正規実装（唯一の定義）
   責務:
     - side-panel を非表示、並列訳を復帰
     - AppState.toReading() で状態を Reading モードへ遷移
       （study.params / study.tab はあえて保持する → 再開ボタンのため）
     - AppState.restoreScroll() で scroll 位置を復元
     - 「分析に戻る」ボタンを study.params の有無で制御
   ══════════════════════════════════════════ */
function closeStudyPanel() {
    const sidePanel    = document.getElementById('side-panel');
    const parallelArea = document.getElementById('parallel-text-area');
    sidePanel.style.display    = 'none';
    parallelArea.style.display = '';

    document.getElementById('analysis-frame-wrap').classList.remove('visible');
    // iframe は使わなくなったが互換のためsrcをクリア
    const iframe = document.getElementById('analysis-iframe');
    if (iframe) iframe.src = '';
    // インラインコンテンツエリアをクリア
    const area = document.getElementById('analysis-content-area');
    if (area) area.innerHTML = '';
    document.getElementById('analysis-tabs').classList.remove('visible');

    /* 「分析に戻る」ボタン:
       study.params が残っていれば表示（再開可能）、なければ非表示 */
    document.getElementById('open-panel-btn').style.display =
        AppState.canReopen() ? 'block' : 'none';

    const rcb = document.getElementById('rcb-container');
    if (rcb) rcb.classList.remove('visible');

    // word-list-view も削除
    const listEl = document.getElementById('word-list-view');
    if (listEl) listEl.remove();

    // 節の選択ハイライトも解除
    document.querySelectorAll('.verse-block').forEach(b => b.classList.remove('selected'));
    document.getElementById('active-v').innerText = '';

    /* AppState を Reading モードへ遷移（study.params / study.tab は保持） */
    AppState.toReading();

    /* スクロール位置を復元 */
    AppState.restoreScroll();
}

/* ══════════════════════════════════════════
   reopenStudyPanel — 正規実装（唯一の定義）
   責務:
     - ヘッダー「分析に戻る」ボタンから呼ばれる
     - AppState.saveScroll() で現在の scroll 位置を保存してから展開
     - AppState.study.tab を引き継いで前回タブを復元
   ══════════════════════════════════════════ */
function reopenStudyPanel() {
    if (!AppState.canReopen()) return;
    const p = AppState.study.params;
    /* 再開前に現在の scroll 位置を保存（戻るときに復元するため） */
    AppState.saveScroll();
    openStudyPanel(p.word, p._rawMorph, p.ref, p.lemma);
    /* openStudyPanel 内で switchAnalysisTab(AppState.study.tab) が呼ばれるため
       タブは自動的に前回のものが復元される */
}

function goProximityPage() {
    const p = new URLSearchParams();

    const activeVEl   = document.getElementById('active-v');
    const activeVText = activeVEl ? activeVEl.innerText.replace(/\s*節\s*$/, '').trim() : '';

    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || '';
    const ch   = urlParams.get('ch')   || '';

    /* AppState.inspect.data から語を取得（後方互換: _inspectData も同じ参照） */
    const inspData = AppState.inspect.data;
    if (inspData && inspData.greek) {
        p.set('word1', inspData.greek);
    }

    if (book && ch) {
        const ref = activeVText ? `${book}${ch}:${activeVText}` : `${book}${ch}`;
        p.set('ref', ref);
        if (activeVText) p.set('scope', 'verse');
    }

    const qs = p.toString();
    window.location.href = qs ? `proximity.html?${qs}` : 'proximity.html';
}

function switchTab(evt, tabName) {
    const tabContents = document.getElementsByClassName("tab-content");
    for (let i = 0; i < tabContents.length; i++) tabContents[i].classList.remove("active");
    const tabBtns = document.getElementsByClassName("tab-btn");
    for (let i = 0; i < tabBtns.length; i++) tabBtns[i].classList.remove("active");
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
    document.getElementById('bible-text-area').scrollTop = 0;
}

async function renderCurrentPage() {
    const urlParams = new URLSearchParams(window.location.search);
    const book = urlParams.get('book') || 'ROM';
    const ch   = urlParams.get('ch')   || '1';

    const isNt = SB_BOOKS.nt.some(b => b.key === book);
    document.querySelector('.root-name').innerText = isNt ? '新約聖書' : '旧約聖書';

    const allBooks = [...SB_BOOKS.nt, ...SB_BOOKS.ot];
    const found = allBooks.find(b => b.key === book);
    document.getElementById('view-title').innerText = found ? `${found.name} ${ch}章` : `${book} ${ch}章`;

    const hasGreek = GREEK_BOOKS.has(book);

    try {
        const jpRes = await fetch(`./bible_jp/${book}/${ch}.json`);
        if (!jpRes.ok) throw new Error('Not found');
        const jpData = await jpRes.json();

        let elData = [];
        if (hasGreek) {
            try {
                const elRes = await fetch(`./bible_data/${book}/${ch}.json`);
                if (elRes.ok) elData = await elRes.json();
            } catch(e) {}
        }

        render(jpData, elData, hasGreek && elData.length > 0);
        const parallel = document.getElementById('parallel-text-area');
        if (parallel) parallel.style.display = '';
        document.getElementById('active-v').innerText = "";
    } catch (err) {
        document.getElementById('bible-text-area').innerHTML = `<p style="color:red">データが見つかりません。</p>`;
    }
}

            <p>主語や目的語として働くほか、理由・目的（〜するために）・結果などの副詞的機能も持つ。</p>
            <h3>④：前置詞＋不定詞（時間関係）</h3>
            <ul>
                <li>μετὰ + 不定詞：〜した後で</li>
                <li>ἐν + 不定詞：〜している最中に</li>
                <li>πρὸ + 不定詞：〜する前に</li>
            </ul>
            <h3>⑤：判断の手順</h3>
            <div class="step-list">
                1. 前の動詞確認 → 2. 前置詞確認 → 3. 「〜すること」代入 → 4. 理由・目的検討 → 5. 不定詞の主語（対格）確認
            </div>
