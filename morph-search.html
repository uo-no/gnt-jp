/* ══════════════════════════════════════════════════════
   §20  構文ツリー（展開パネル）
   ══════════════════════════════════════════════════════ */

const ROLE_LABEL = { verb:'動詞', subj:'主語', obj:'目的語', phr:'修飾', prep:'前置詞句', mod:'準動詞', other:'' };
const ROLE_COLOR = { verb:'#4a7fa5', subj:'#5a8a6e', obj:'#9a6040', phr:'#888', prep:'#7a6aa0', mod:'#a09050', other:'' };

/** 節の全トークンを返す */
function getVerseTokens(ref) {
    if (!window._morphData || !ref) return [];
    const verseId = String(ref).replace(/!.*$/, '').trim();
    return window._morphData.filter(e => String(e.ref || '').replace(/!.*$/, '').trim() === verseId);
}

/** エントリから構文上の役割を返す */
function getRole(entry) {
    const morph = decodeMorph(entry);
    const pos   = morph.pos.toUpperCase();

    if (pos === 'V') return (!morph.mood || morph.mood === 'infinitive' || morph.mood === 'participle') ? 'mod' : 'verb';
    if (pos === 'P') return 'prep';
    if (['N','T','A','D','R'].includes(pos)) {
        if (morph.case === 'nominative') return 'subj';
        if (morph.case === 'accusative') return 'obj';
        if (morph.case === 'genitive' || morph.case === 'dative') return 'phr';
        return 'other';
    }
    return 'other';
}

/** トークンを構文役割ごとにグループ化する（前置詞句は次のトークンを取り込む） */
function groupTokens(tokens) {
    const groups = [];
    let i = 0;
    while (i < tokens.length) {
        const token = tokens[i];
        const role  = getRole(token);
        if (role === 'prep') {
            const members = [token];
            let j = i + 1;
            while (j < tokens.length) {
                const nextRole = getRole(tokens[j]);
                if (['subj','obj','phr','other'].includes(nextRole) && decodeMorph(tokens[j]).pos.toUpperCase() !== 'P') {
                    members.push(tokens[j]);
                    j++;
                } else {
                    break;
                }
            }
            groups.push({ role:'prep', members });
            i = j;
        } else {
            groups.push({ role, members:[token] });
            i++;
        }
    }
    return groups;
}

/** 構文ツリーパネルのトグル（初回は生成、2回目以降は表示/非表示切り替え） */
function toggleContext(cardEl, ref, encodedWord) {
    const hitWord  = decodeURIComponent(encodedWord);
    const existing = cardEl.querySelector('.ctx-panel');

    if (existing) {
        const isOpen = existing.style.display !== 'none';
        existing.style.display = isOpen ? 'none' : 'block';
        cardEl.classList.toggle('card-open', !isOpen);
        return;
    }

    const tokens = getVerseTokens(ref);
    if (!tokens.length) return;

    // トークンを役割別バケツに振り分け
    const ORDER   = ['verb','subj','obj','prep','phr','mod'];
    const buckets = {};
    ORDER.forEach(role => buckets[role] = []);

    groupTokens(tokens).forEach(group => {
        const text  = group.members.map(cleanText).filter(Boolean).join(' ');
        const gloss = group.members.map(getJapaneseGloss).filter(Boolean).join('・');
        if (!text) return;
        const isHit = group.members.some(m =>
            cleanText(m) === hitWord ||
            (m.word || '').replace(/[.,:;·⸀⸁⸂⸃⌈⌉]/g, '') === hitWord
        );
        if (ORDER.includes(group.role)) buckets[group.role].push({ text, gloss, isHit });
    });

    // 動詞ノード（ルート）HTML
    const glossStyle = `font-family:'Noto Sans JP',sans-serif;font-size:0.62rem;color:var(--text-sub);margin-left:4px;`;
    const buildNodeHTML = item => `
        <span class="ctx-greek${item.isHit ? ' hit' : ''}">
            ${item.text}
            ${item.gloss ? `<span style="${glossStyle}">［${item.gloss}］</span>` : ''}
        </span>`;

    const verbHTML = buckets['verb'].length
        ? buckets['verb'].map(buildNodeHTML).join(' ')
        : '<span style="color:#ccc;font-size:0.8rem;">（動詞なし）</span>';

    // 原文行（非表示・データ保持用）
    const rawLine = tokens.map(entry => {
        const text  = cleanText(entry);
        if (!text) return '';
        const isHit = text === hitWord || (entry.word || '').replace(/[.,:;·⸀⸁⸂⸃⌈⌉]/g, '') === hitWord;
        return isHit
            ? `<span style="color:var(--highlight);font-weight:700;">${text}</span>`
            : `<span>${text}</span>`;
    }).filter(Boolean).join(' ');

    // 枝ノード（主語・目的語・前置詞句・修飾）HTML
    const branchHTML = ['subj','obj','prep','phr','mod']
        .filter(role => buckets[role].length > 0 && ROLE_LABEL[role])
        .map(role => `<div class="ctx-tree-node" data-role="${role}">
            <span class="ctx-role-tag" style="color:${ROLE_COLOR[role]}">${ROLE_LABEL[role]}</span>
            <span>${buckets[role].map(buildNodeHTML).join('　')}</span>
        </div>`)
        .join('');

    const panel = document.createElement('div');
    panel.className = 'ctx-panel';
    panel.onclick   = e => e.stopPropagation(); // パネル内クリックはカードに伝播しない

    // 分詞検索のとき用法判定パネルを生成
    const hitEntry = tokens.find(t =>
        cleanText(t) === hitWord ||
        (t.word || '').replace(/[.,:;·⸀⸁⸂⸃⌈⌉]/g, '') === hitWord
    );
    const ptcHTML = (params.mood === 'participle' && hitEntry)
        ? renderParticiplePanel(classifyParticiple(hitEntry, tokens))
        : '';

    panel.innerHTML = `
        <div class="ctx-raw" style="display:none">${rawLine}</div>
        <div class="ctx-label">構文分解</div>
        <div class="ctx-tree">
            <div class="ctx-tree-verb">
                <span class="ctx-role-tag" style="color:${ROLE_COLOR['verb']}">${ROLE_LABEL['verb']}</span>
                ${verbHTML}
            </div>
            ${branchHTML ? `<div class="ctx-tree-branch">${branchHTML}</div>` : ''}
        </div>
        ${ptcHTML}`;

    cardEl.appendChild(panel);
    cardEl.classList.add('card-open');
}

/* ══════════════════════════════════════════════════════
   §21  分詞用法判定（5ステップ）
   ══════════════════════════════════════════════════════ */

/** ヒット分詞エントリを5ステップで用法分類し、結果オブジェクトを返す */
function classifyParticiple(hitEntry, tokens) {
    const hitMorph  = decodeMorph(hitEntry);
    const ptcCase   = hitMorph.case;
    const ptcGender = hitMorph.gender;
    const ptcNumber = hitMorph.number;
    const ptcTense  = hitMorph.tense;

    const hitIdx    = tokens.findIndex(t =>
        cleanText(t) === cleanText(hitEntry) ||
        String(t.ref) === String(hitEntry.ref)
    );
    const prevToken = hitIdx > 0 ? tokens[hitIdx - 1] : null;
    const prevPos   = prevToken ? entryPosCode(prevToken) : '';

    // STEP 1: 実体用法 — 直前が格・性・数の一致する冠詞か
    if (prevPos === 'T') {
        const prevMorph = decodeMorph(prevToken);
        if (prevMorph.case === ptcCase && prevMorph.gender === ptcGender && prevMorph.number === ptcNumber) {
            return {
                classification: 'substantival',
                label:    '実体用法（名詞的分詞）',
                reason:   '直前に一致する格・性・数の冠詞がある。分詞が名詞として機能している。',
                confidence: 0.95,
                candidates: null,
            };
        }
    }

    // STEP 2: 形容詞用法 — 同節内に格・性・数が一致する名詞があるか
    const matchingNoun = tokens.find(t => {
        if (cleanText(t) === cleanText(hitEntry)) return false;
        if (!['N','T','A','D','R'].includes(entryPosCode(t))) return false;
        const morph = decodeMorph(t);
        return morph.case === ptcCase && morph.gender === ptcGender && morph.number === ptcNumber;
    });
    if (matchingNoun) {
        return {
            classification: 'attributive',
            label:    '形容詞用法',
            reason:   `同節内の「${cleanText(matchingNoun)}」と格（${CASE_JP[ptcCase] || ptcCase}）・性・数が一致している。`,
            confidence: 0.9,
            candidates: null,
        };
    }

    // STEP 3: 属格絶対 — 属格で同節内に別の属格名詞があるか
    if (ptcCase === 'genitive') {
        const genNoun = tokens.find(t => {
            if (cleanText(t) === cleanText(hitEntry)) return false;
            if (!['N','T','A','D','R'].includes(entryPosCode(t))) return false;
            return decodeMorph(t).case === 'genitive';
        });
        if (genNoun) {
            return {
                classification: 'genitive_absolute',
                label:    '属格絶対分詞',
                reason:   `主節と独立した属格節。「${cleanText(genNoun)}」と共に属格を形成している。`,
                confidence: 0.9,
                candidates: null,
            };
        }
    }

    // STEP 4: 補語用法 — 知覚・認識動詞が同節にあるか
    const mainVerb = tokens.find(t => {
        if (entryPosCode(t) !== 'V') return false;
        const morph = decodeMorph(t);
        if (!morph.mood || morph.mood === 'participle' || morph.mood === 'infinitive') return false;
        const lemma = (t.lemma || '').replace(/[ʼ']/g, '');
        return COMPLEMENTARY_VERBS.some(v => v === lemma || lemma.startsWith(v.slice(0, 4)));
    });
    if (mainVerb) {
        return {
            classification: 'complementary',
            label:    '補語用法',
            reason:   `知覚・認識動詞「${cleanText(mainVerb)}」の補語として機能している。`,
            confidence: 0.85,
            candidates: null,
        };
    }

    // STEP 5: 副詞用法（推定）— 意味候補を時制から生成
    const adverbialCandidates = [];
    if (ptcTense === 'present')  adverbialCandidates.push({ key:'simultaneous', label:'同時（〜しながら）', conf: 0.80 });
    if (ptcTense === 'aorist')   adverbialCandidates.push({ key:'antecedent',   label:'先行（〜してから）', conf: 0.80 });
    if (ptcTense === 'perfect')  adverbialCandidates.push({ key:'resultant',    label:'結果（〜した状態で）', conf: 0.75 });
    adverbialCandidates.push(
        { key:'cause',      label:'原因（〜なので）',  conf: 0.40 },
        { key:'condition',  label:'条件（〜なら）',    conf: 0.30 },
        { key:'concession', label:'譲歩（〜なのに）',  conf: 0.30 },
    );

    return {
        classification: 'adverbial',
        label:    '副詞用法（推定）',
        reason:   '冠詞・格一致名詞・属格独立・補語動詞のいずれも確認できないため副詞用法と推定。文脈で判断してください。',
        confidence: 0.70,
        candidates: adverbialCandidates,
    };
}

/** 分詞用法パネルの HTML を生成する */
function renderParticiplePanel(result) {
    const conf      = result.confidence;
    const confPct   = Math.round(conf * 100);
    const confColor = conf >= 0.9 ? '#5a8a6e' : conf >= 0.7 ? '#a09050' : '#b06050';

    const candidatesHTML = result.candidates ? `
        <div class="ptc-candidates">
            <div class="ptc-cand-label">副詞用法の意味候補</div>
            ${result.candidates.map(c => `
                <div class="ptc-cand">
                    <span class="ptc-cand-name">${c.label}</span>
                    <div class="ptc-cand-bar-wrap">
                        <div class="ptc-cand-bar-fill" style="width:${Math.round(c.conf * 100)}%"></div>
                    </div>
                    <span class="ptc-cand-pct">${Math.round(c.conf * 100)}%</span>
                </div>`
            ).join('')}
        </div>` : '';

    return `<div class="ptc-panel">
        <div class="ptc-label">分詞用法</div>
        <div class="ptc-class">${result.label}</div>
        <div class="ptc-reason">${result.reason}</div>
        <div class="ptc-conf">
            <div class="ptc-conf-bar">
                <div class="ptc-conf-fill" style="width:${confPct}%;background:${confColor};"></div>
            </div>
            <span>推定確信度 ${confPct}%</span>
        </div>
        ${candidatesHTML}
    </div>`;
}

   §22  データ読み込み
   ══════════════════════════════════════════════════════ */

const JA_FOLDER = 'bible_jp';

/** 検索対象の書物と章のリスト */
const ALL_BOOKS = [
    {key:'ROM',ch:16},{key:'1CO',ch:16},{key:'2CO',ch:13},{key:'GAL',ch:6},
    {key:'EPH',ch:6}, {key:'PHP',ch:4}, {key:'COL',ch:4}, {key:'1TH',ch:5},
    {key:'2TH',ch:3}, {key:'1TI',ch:6}, {key:'2TI',ch:4}, {key:'TIT',ch:3},
    {key:'PHM',ch:1},
];

/** ALL_BOOKS から全章のパス一覧を生成する */
function buildAllChapterPaths() {
    const paths = [];
    for (const book of ALL_BOOKS) {
        for (let ch = 1; ch <= book.ch; ch++) {
            paths.push({ key: book.key, ch, path: `./bible_data/${book.key}/${ch}.json` });
        }
    }
    return paths;
}

/** タスク配列を size 件ずつバッチ処理し、進捗コールバックを呼ぶ */
async function fetchInBatches(tasks, size, onProgress) {
    let allData = [];
    for (let i = 0; i < tasks.length; i += size) {
        const batch   = tasks.slice(i, i + size);
        const results = await Promise.allSettled(
            batch.map(task =>
                fetch(task.path)
                    .then(r => r.ok ? r.json() : null)
                    .catch(() => null)
                    .then(data => {
                        if (!Array.isArray(data)) return null;
                        data.forEach(entry => { entry._bookKey = task.key; });
                        return data;
                    })
            )
        );
        results.forEach(r => {
            if (r.status === 'fulfilled' && Array.isArray(r.value)) allData = allData.concat(r.value);
        });
        onProgress(Math.min(i + size, tasks.length), tasks.length);
    }
    return allData;
}

/** 日本語訳JSONを読み込み _jaVerseMap に格納する */
async function fetchJaData(morphPaths) {
    const keyToCode = {};
    Object.entries(BOOK_MAP).forEach(([code, key]) => { keyToCode[key] = code; });

    const jaPaths = morphPaths.map(t => ({
        key:  t.key,
        ch:   t.ch,
        path: `./${JA_FOLDER}/${t.key}/${t.ch}.json`,
    }));

    return Promise.allSettled(
        jaPaths.map(task =>
            fetch(task.path).then(r => r.ok ? r.json() : null).catch(() => null)
            .then(data => {
                if (!data || typeof data.verses !== 'object') return;
                const code = keyToCode[task.key];
                if (!code) return;
                const chStr = String(task.ch).padStart(2, '0');
                Object.entries(data.verses).forEach(([verseNum, text]) => {
                    const verseStr = String(parseInt(verseNum)).padStart(2, '0');
                    _jaVerseMap.set(`${code}${chStr}${verseStr}`, String(text));
                });
            })
        )
    );
}

/** TSVファイルから単語レベルの日本語グロスを読み込み _japaneseWordMap に格納する */
async function fetchJapaneseTSV() {
    try {
        const res = await fetch('./macula-greek-SBLGNT.tsv');
        if (!res.ok) return;
        const lines = (await res.text()).split('\n');
        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split('\t');
            if (cols.length < 12) continue;
            const normalized = (cols[11] || '').trim();
            const japanese   = (cols[6]  || '').trim();
            if (normalized && japanese && !_japaneseWordMap.has(normalized)) {
                _japaneseWordMap.set(normalized, japanese);
            }
        }
    } catch (e) {
        console.warn('TSV読み込み失敗:', e);
    }
}

    loadEl.innerHTML = `
        <div style="margin-bottom:10px;font-family:'Gentium Plus',serif;font-size:1.3rem;color:#ccc;">ἀναζητεῖ</div>
        <div style="width:100%;max-width:280px;margin:0 auto 8px;height:3px;background:#eee;border-radius:2px;overflow:hidden;">
            <div id="load-fill" style="height:100%;width:0%;background:var(--highlight);transition:width 0.25s ease;border-radius:2px;"></div>
        </div>
        <div id="load-status" style="font-size:0.72rem;color:#bbb;">データを読み込み中 (0 / ${total})...</div>`;

    const allData = await fetchInBatches(paths, 20, (done, total) => {
        const pct        = Math.round(done / total * 100);
        const fillEl     = document.getElementById('load-fill');
        const statusEl   = document.getElementById('load-status');
        if (fillEl)   fillEl.style.width  = pct + '%';
        if (statusEl) statusEl.textContent = `形態素データ読み込み中 (${done} / ${total}) ${pct}%`;
    });

    if (!allData.length) {
        loadEl.innerHTML = `<p style="color:#c00;font-size:0.82rem;line-height:2.2;">データが見つかりませんでした。<br>
            <code style="background:#f5f5f7;padding:2px 8px;border-radius:4px;">bible_data/ROM/1.json の形式で配置してください</code></p>`;
        return;
    }

    const statusEl = document.getElementById('load-status');
    if (statusEl) statusEl.textContent = '日本語訳を読み込み中...';
    await fetchJaData(paths);
    await fetchJapaneseTSV();

    window._morphData = allData;
    loadEl.style.display  = 'none';
    listEl.style.display  = 'flex';
    renderResults(allData);
})();

/* ── meaning-card がスクロールアウトしたら固定バーを表示 ── */
(function initStickyBar() {
    const card   = document.getElementById('meaning-card');
    const sticky = document.getElementById('meaning-sticky');

    const observer = new IntersectionObserver(([entry]) => {
        if (!entry.isIntersecting) {
            sticky.textContent = document.getElementById('meaning-title').textContent;
            sticky.classList.add('visible');
        } else {
            sticky.classList.remove('visible');
        }
    }, { threshold: 0, rootMargin: '0px 0px 0px 0px' });

    observer.observe(card);
})();
</script>
