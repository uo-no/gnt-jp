<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>形態論検索 — コトバト</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="shared-insight.js"></script>
<style>
:root {
    --bg:             #ffffff;
    --bg-panel:       #f5f5f7;
    --bg-inset:       #fafafa;
    --text:           #1d1d1f;
    --text-sub:       #6e6e73;
    --text-hint:      #aeaeb2;
    --accent:         #5a6e82;
    --accent-light:   rgba(90,110,130,0.10);
    --accent-mid:     rgba(90,110,130,0.20);
    --border:         rgba(0,0,0,0.07);
    --radius-s:       8px;
    --radius-m:       12px;
    --radius-l:       16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
.page { max-width: 680px; margin: 0 auto; padding: 32px 24px 100px; }

/* ── Nav ── */
.nav { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
.btn-back {
display: inline-flex; align-items: center; gap: 4px;
padding: 5px 13px; font-size: 0.78rem; font-family: inherit;
border: 1px solid var(--border); border-radius: 20px;
background: transparent; cursor: pointer; color: var(--text-sub);
transition: background 0.12s;
}
.btn-back:hover { background: var(--bg-panel); }
.breadcrumb {
display: flex; align-items: center; gap: 5px;
font-size: 0.75rem; color: var(--text-hint); flex: 1; overflow: hidden;
}
.breadcrumb .crumb { color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
.breadcrumb .sep { opacity: 0.35; flex-shrink: 0; }

/* ══════════════════════════════════════════
① HEADER BLOCK
══════════════════════════════════════════ */
.morph-header {
padding: 0 0 36px;
border-bottom: 1px solid var(--border);
margin-bottom: 36px;
}
.morph-header-pos {
font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
text-transform: uppercase; color: var(--accent);
margin-bottom: 10px;
}
.morph-header-word {
font-family: 'Gentium Plus', serif;
font-size: 3rem; font-weight: 700;
color: var(--text); line-height: 1.15;
letter-spacing: 0.01em;
margin-bottom: 10px;
}
.morph-header-lemma {
display: flex; align-items: center; gap: 8px;
}
.morph-header-lemma-label {
font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
text-transform: uppercase; color: var(--text-hint);
}
.morph-header-lemma-val {
font-family: 'Gentium Plus', serif;
font-size: 1.05rem; color: var(--text-sub);
}

/* ══════════════════════════════════════════
② CORE MORPH INFO
══════════════════════════════════════════ */
.morph-core { margin-bottom: 36px; }
.section-label {
font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em;
text-transform: uppercase; color: var(--text-hint);
margin-bottom: 14px;
}
.morph-tags {
display: flex; flex-wrap: wrap; gap: 8px;
margin-bottom: 16px;
}
.morph-tag {
display: inline-flex; flex-direction: column;
padding: 9px 14px;
background: var(--bg-panel);
border: 1px solid var(--border);
border-radius: var(--radius-m);
min-width: 60px;
}
.morph-tag-key {
font-size: 0.55rem; font-weight: 700; letter-spacing: 0.1em;
text-transform: uppercase; color: var(--text-hint);
margin-bottom: 3px;
}
.morph-tag-val {
font-size: 0.82rem; font-weight: 500; color: var(--text);
line-height: 1.3;
}
.morph-tag.accent {
background: var(--accent-light);
border-color: var(--accent-mid);
}
.morph-tag.accent .morph-tag-val { color: var(--accent); font-weight: 700; }
.morph-summary {
font-size: 0.88rem; font-weight: 500; color: var(--text);
line-height: 1.6; letter-spacing: 0.01em;
padding: 12px 16px;
background: var(--bg-panel);
border-radius: var(--radius-m);
border-left: 3px solid var(--accent);
}

/* ══════════════════════════════════════════
③ EXPLANATION
══════════════════════════════════════════ */
.morph-explain { margin-bottom: 36px; }
.explain-body {
font-size: 0.9rem; color: var(--text);
line-height: 1.85;
padding: 18px 20px;
background: var(--bg-inset);
border: 1px solid var(--border);
border-radius: var(--radius-m);
}
.explain-body p + p { margin-top: 10px; }
.explain-note {
margin-top: 10px; font-size: 0.77rem;
color: var(--text-sub); line-height: 1.7;
padding: 10px 14px;
background: rgba(90,110,130,0.05);
border-radius: var(--radius-s);
border: 1px solid var(--accent-mid);
}

/* ══════════════════════════════════════════
④ DISTRIBUTION
══════════════════════════════════════════ */
.morph-dist { margin-bottom: 36px; }
.dist-list { display: flex; flex-direction: column; gap: 7px; }
.dist-row { display: flex; align-items: center; gap: 10px; }
.dist-name {
width: 72px; font-size: 0.72rem;
color: var(--text-sub); text-align: right; flex-shrink: 0;
}
.dist-bar-track {
flex: 1; height: 5px; background: var(--bg-panel);
border-radius: 3px; overflow: hidden;
}
.dist-bar-fill {
height: 100%; border-radius: 3px;
background: var(--accent); transition: width 0.5s ease;
}
.dist-num {
width: 32px; font-size: 0.68rem; color: var(--text-hint);
text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums;
}
.dist-total-row {
display: flex; align-items: baseline;
gap: 8px; margin-bottom: 16px;
}
.dist-total-num {
font-size: 1.6rem; font-weight: 700; color: var(--text); line-height: 1;
}
.dist-total-label { font-size: 0.75rem; color: var(--text-sub); }

/* ══════════════════════════════════════════
⑤ FILTER
══════════════════════════════════════════ */
.morph-filter { margin-bottom: 36px; }
.filter-group { margin-bottom: 16px; }
.filter-group-label {
font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
text-transform: uppercase; color: var(--text-hint);
margin-bottom: 10px;
}
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
display: inline-flex; align-items: center; gap: 5px;
padding: 5px 12px; border-radius: 20px; font-size: 0.75rem;
transition: all 0.12s;
}
.chip-fixed {
background: var(--accent-light);
border: 1px solid var(--accent-mid);
color: var(--accent); font-weight: 600;
}
.chip-fixed .chip-key {
font-size: 0.58rem; color: var(--text-sub);
font-weight: 400; margin-right: 1px;
}
.chip-toggle {
border: 1px solid var(--border); cursor: pointer; user-select: none;
}
.chip-toggle.on {
background: var(--accent-light); border-color: var(--accent-mid);
color: var(--accent); font-weight: 600;
}
.chip-toggle.off {
background: var(--bg); border-color: var(--border);
color: var(--text-hint); text-decoration: line-through;
}
.chip-toggle:hover.on  { background: rgba(90,110,130,0.17); }
.chip-toggle:hover.off { background: var(--bg-panel); text-decoration: none; }
.chip-dot {
width: 13px; height: 13px; border-radius: 50%;
border: 1.5px solid currentColor;
display: flex; align-items: center; justify-content: center;
font-size: 8px; flex-shrink: 0;
}
.chip-toggle.on .chip-dot { background: var(--accent); border-color: var(--accent); color: #fff; }
.chip-toggle.off .chip-dot { background: transparent; color: #ccc; }

/* ══════════════════════════════════════════
⑥ NAVIGATION
══════════════════════════════════════════ */
.morph-nav { margin-bottom: 48px; }
.nav-tools { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.nav-tool-btn {
display: flex; align-items: center; justify-content: space-between;
padding: 14px 16px;
background: var(--bg-inset); border: 1px solid var(--border);
border-radius: var(--radius-m); cursor: pointer;
text-decoration: none; color: var(--text);
transition: background 0.12s, border-color 0.12s, transform 0.1s;
}
.nav-tool-btn:hover {
background: var(--accent-light); border-color: var(--accent-mid);
transform: translateY(-1px);
}
.nav-tool-icon { font-size: 1.2rem; line-height: 1; margin-bottom: 4px; }
.nav-tool-main { font-size: 0.82rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.nav-tool-sub  { font-size: 0.68rem; color: var(--text-sub); }
.nav-tool-arrow { font-size: 0.85rem; color: var(--text-hint); flex-shrink: 0; margin-left: 8px; align-self: center; }

/* ══════════════════════════════════════════
RESULT SECTION
══════════════════════════════════════════ */
.results-section { margin-bottom: 48px; }
.results-meta {
display: flex; align-items: baseline; justify-content: space-between;
margin-bottom: 14px;
}
.results-count { font-size: 0.82rem; color: var(--text-sub); }
.results-count strong { font-size: 1rem; font-weight: 700; color: var(--text); }
.results-pct { font-size: 0.7rem; color: var(--text-hint); }

.result-list { display: flex; flex-direction: column; gap: 5px; }
.result-card {
border: 1px solid var(--border); border-radius: var(--radius-m);
padding: 12px 16px; background: var(--bg);
cursor: pointer; transition: background 0.1s, border-color 0.1s;
}
.result-card:hover { background: var(--bg-panel); border-color: var(--accent-mid); }
.result-card.ctx-open { border-color: var(--accent-mid); background: var(--bg-inset); }
.result-top { display: flex; align-items: baseline; justify-content: space-between; }
.result-word {
font-family: 'Gentium Plus', serif;
font-size: 1.3rem; color: var(--text); line-height: 1.4;
}
.result-lemma {
font-family: 'Gentium Plus', serif;
font-size: 0.78rem; color: var(--text-hint); margin-left: 7px;
}
.result-ref { font-size: 0.7rem; color: var(--text-hint); font-variant-numeric: tabular-nums; }
.result-ja { font-size: 0.8rem; color: var(--text-sub); margin-top: 3px; line-height: 1.5; }

/* ── ctx-panel ── */
.morph-ctx {
margin-top: 8px; padding-top: 8px;
border-top: 1px solid var(--border);
animation: fadeUp 0.15s ease;
}
.morph-ctx-line {
font-family: 'Gentium Plus', serif;
font-size: 0.92rem; line-height: 1.9;
color: var(--text-sub);
display: flex; flex-wrap: wrap; gap: 2px 5px;
margin-bottom: 4px;
}
.morph-ctx-line .hit-w {
color: var(--accent); font-weight: 700;
border-bottom: 2px solid var(--accent);
padding-bottom: 1px;
}
/* ── 共起語チップ（ctx内） ── */
.morph-ctx-cooc {
display: flex; flex-wrap: wrap; gap: 4px;
margin: 6px 0 4px;
}
.morph-ctx-cooc-chip {
font-family: 'Gentium Plus', serif;
font-size: 0.78rem; padding: 2px 8px;
border-radius: 20px;
background: var(--bg-panel);
border: 1px solid var(--border);
color: var(--text-sub);
}
.morph-ctx-cooc-chip.is-noun { color: #3d6b9a; border-color: rgba(61,107,154,0.25); background: rgba(61,107,154,0.06); }
.morph-ctx-cooc-chip.is-verb { color: #4a8a62; border-color: rgba(74,138,98,0.25); background: rgba(74,138,98,0.06); }
.morph-ctx-goto {
text-align: right; margin-top: 6px;
}
.morph-ctx-goto button {
font-size: 0.68rem; font-family: inherit;
background: none; border: none; cursor: pointer;
color: var(--accent); text-decoration: underline;
padding: 0;
}
/* ── 分詞用法バッジ ── */
.ptc-lite {
margin-top: 6px; padding: 8px 11px;
background: rgba(196,112,40,0.07);
border: 1px solid rgba(196,112,40,0.22);
border-radius: var(--radius-s);
font-size: 0.72rem; line-height: 1.6; color: var(--text-sub);
}
.ptc-lite-label {
font-size: 0.57rem; font-weight: 700; letter-spacing: 0.10em;
text-transform: uppercase; color: rgba(196,112,40,0.8);
margin-bottom: 3px;
}
.ptc-lite-main { font-weight: 700; color: var(--text); font-size: 0.82rem; margin-bottom: 2px; }
.ptc-lite-hint { color: var(--text-sub); font-size: 0.72rem; }

/* Loading */
.loading { text-align: center; padding: 56px 16px; color: var(--text-hint); }
.loading-greek { font-family: 'Gentium Plus', serif; font-size: 1.8rem; color: #d8d8dc; margin-bottom: 14px; }
.loading-bar-wrap { width: 200px; margin: 0 auto 10px; height: 2px; background: var(--bg-panel); border-radius: 2px; overflow: hidden; }
.loading-bar { height: 100%; background: var(--accent); transition: width 0.3s; border-radius: 2px; }
.loading-text { font-size: 0.72rem; }
@keyframes pulse { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }
.dot { display: inline-block; animation: pulse 1.4s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

.empty { text-align: center; padding: 48px 16px; color: var(--text-sub); font-size: 0.82rem; line-height: 2.2; }
.empty-icon { font-family: 'Gentium Plus', serif; font-size: 2.2rem; color: #d8d8dc; margin-bottom: 10px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.25s ease forwards; }

/* Footer */
.app-footer {
margin-top: 48px; padding-top: 16px;
border-top: 1px solid var(--border);
display: flex; align-items: center; justify-content: space-between;
font-size: 0.68rem; color: var(--text-hint);
}
.footer-links { display: flex; gap: 16px; }
.footer-links a { color: var(--text-hint); text-decoration: none; border-bottom: 1px solid var(--border); padding-bottom: 1px; }
.footer-links a:hover { color: var(--text-sub); }

.section-divider { border: none; border-top: 1px solid var(--border); margin: 0 0 36px; }

@media (max-width: 520px) {
    .page { padding: 24px 16px 80px; }
    .morph-header-word { font-size: 2.3rem; }
    .nav-tools { grid-template-columns: 1fr; }
}

/* ══════════════════════════════════════════
iframe compact mode
══════════════════════════════════════════ */
body.in-iframe .nav,
body.in-iframe .btn-back,
body.in-iframe .breadcrumb,
body.in-iframe .app-footer,
body.in-iframe .footer-links { display: none !important; }
body.in-iframe .nav-tools,
body.in-iframe .morph-nav { display: none !important; }
body.in-iframe .morph-nav + .section-divider,
body.in-iframe .section-divider:last-of-type { display: none !important; }
body.in-iframe .page { padding: 12px 16px 40px; max-width: 100%; }
body.in-iframe .morph-header-word { font-size: 2rem; }
body.in-iframe .morph-header { padding-bottom: 20px; margin-bottom: 20px; }
body.in-iframe .morph-core,
body.in-iframe .morph-explain,
body.in-iframe .morph-dist,
body.in-iframe .morph-filter { margin-bottom: 20px; }
body.in-iframe .section-divider { margin: 0 0 20px; }
body.in-iframe .nav { margin-bottom: 0; }
body.in-iframe #meaning-sticky,
body.in-iframe .meaning-sticky,
body.in-iframe .sticky-bar,
body.in-iframe .sticky-header { position: static !important; display: none !important; }

/* ══════════════════════════════════════════
   C. compact-reading-mode
   body.in-iframe と連動。情報密度を最適化する。
   ══════════════════════════════════════════ */
body.compact-reading-mode .results-section details:not([open]) {
    max-height: 0;
    overflow: hidden;
}
body.compact-reading-mode .result-ja {
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 1;
    overflow: hidden;
}
body.compact-reading-mode .morph-ctx-cooc { display: none; }
body.compact-reading-mode .ptc-lite { font-size: 0.7rem; padding: 5px 9px; }
body.compact-reading-mode .dist-list .dist-row:nth-child(n+5) { display: none; }
body.in-iframe { /* compact-reading-mode を自動付与するためのトリガー */ }

/* ══════════════════════════════════════════
   E. reading-core-bar
   データロード前から表示できるヘッダー固定要約バー
   ══════════════════════════════════════════ */
.reading-core-bar {
    display: none;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    padding: 8px 12px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-m);
    margin-bottom: 12px;
    font-size: 0.72rem;
    line-height: 1.4;
}
body.in-iframe .reading-core-bar { display: flex; }
.rcb-chip {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 8px; border-radius: 20px;
    font-size: 0.68rem;
    background: var(--accent-light);
    border: 1px solid var(--accent-mid);
    color: var(--accent); font-weight: 600;
}
.rcb-chip.rcb-empty {
    background: var(--bg); border-color: var(--border);
    color: var(--text-hint); font-weight: 400;
}
.rcb-label {
    font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-hint);
    flex-shrink: 0;
}
.rcb-sep { color: var(--border); font-size: 0.8rem; }

/* ══════════════════════════════════════════
   B. exp-panel（統合 Explainable Scoring）
   renderExplainability() の出力スタイル
   ══════════════════════════════════════════ */
.exp-panel {
    border: 1px solid var(--border);
    border-radius: var(--radius-s);
    overflow: hidden;
    margin-top: 6px;
    font-size: 0.78rem;
}
.exp-panel summary {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px 5px;
    background: var(--bg-panel);
    cursor: pointer; user-select: none; list-style: none;
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-hint);
}
.exp-panel summary::-webkit-details-marker { display: none; }
.exp-panel summary::after {
    content: '▾'; font-size: 0.68rem; color: var(--text-hint);
}
.exp-panel[open] summary::after { content: '▴'; }
.exp-body {
    padding: 8px 10px 10px;
    border-top: 1px solid var(--border);
}
.exp-row {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.72rem; margin-bottom: 3px;
}
.exp-delta {
    font-size: 0.68rem; font-weight: 700;
    min-width: 28px; text-align: right; flex-shrink: 0;
}
.exp-label { flex: 1; color: var(--text); line-height: 1.4; }
.exp-alts {
    margin-top: 6px; padding-top: 6px;
    border-top: 1px solid var(--border);
}
.exp-alt-row {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.7rem; color: var(--text-sub); margin-bottom: 2px;
}
body.compact-reading-mode .exp-body { padding: 5px 8px 8px; }
body.compact-reading-mode .exp-row { margin-bottom: 2px; }

/* ══════════════════════════════════════════
Beginner Mode
══════════════════════════════════════════ */
.mode-bar {
display: flex; gap: 6px; margin-bottom: 16px;
padding: 4px; background: var(--bg-panel);
border-radius: 12px; border: 1px solid var(--border);
}
.mode-btn {
flex: 1; padding: 7px 10px;
border: none; border-radius: 9px;
font-family: inherit; font-size: 0.72rem; font-weight: 600;
cursor: pointer; transition: all 0.15s;
background: transparent; color: var(--text-sub);
}
.mode-btn.active {
background: #fff; color: var(--accent);
box-shadow: 0 1px 4px rgba(0,0,0,0.10);
}
.b-panel {
margin-bottom: 16px;
border-radius: var(--radius-l);
overflow: hidden;
border: 1px solid var(--accent-mid);
background: linear-gradient(135deg, rgba(90,110,130,0.04) 0%, rgba(90,110,130,0.01) 100%);
}
.b-reading { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); }
.b-reading-label {
font-size: 0.58rem; font-weight: 700; letter-spacing: 0.14em;
text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
}
.b-reading-main {
font-size: 1.45rem; font-weight: 700; color: var(--text);
line-height: 1.25; letter-spacing: -0.01em; margin-bottom: 5px;
}
.b-reading-conf {
font-size: 0.7rem; color: var(--text-sub);
display: flex; align-items: center; gap: 5px;
}
.b-reading-conf::before {
content: ''; display: inline-block;
width: 6px; height: 6px; border-radius: 50%;
background: #4a8a62; flex-shrink: 0;
}
.b-reading-alt {
margin-top: 10px; padding: 8px 11px;
background: rgba(90,110,130,0.06);
border-radius: var(--radius-s);
border-left: 3px solid var(--accent-mid);
}
.b-reading-alt-label {
font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em;
text-transform: uppercase; color: var(--text-hint); margin-bottom: 3px;
}
.b-reading-alt-val { font-size: 0.85rem; color: var(--text-sub); font-weight: 500; }
.b-reason { padding: 12px 18px; border-bottom: 1px solid var(--border); }
.b-reason-label {
font-size: 0.58rem; font-weight: 700; letter-spacing: 0.12em;
text-transform: uppercase; color: var(--text-hint); margin-bottom: 8px;
}

}

}

/* instant comprehension summary card (iframe のみ) */
.ic-summary-card {

}

<script>

(function detectIframe() {
    try { if (window.self !== window.top) document.body.classList.add('in-iframe'); }
    catch(e) { document.body.classList.add('in-iframe'); }
})();

/* ══════════════════════════════════════════
   Beginner Mode — READING_LABEL テーブル
   ══════════════════════════════════════════ */
const READING_LABEL = {
    'present+indicative': {
        main:    '〜している／〜する',
        alt:     '〜する（習慣・一般真理）',
        reasons: ['現在時制は動作の継続・進行を表すアスペクトを持つから', '直説法は事実として述べる法だから'],
        caution: '必ずしも「今この瞬間」だけを指しません。習慣や普遍的な真理にも使われます。',
    },
    'imperfect+indicative': {
        main:    '〜していた',
        alt:     '〜しようとしていた（未遂）／〜し始めた',
        reasons: ['未完了過去は過去の継続・反復・進行中の動作を表すから', '直説法は事実として述べる法だから'],
        caution: 'アオリスト（〜した）と混同しないように。線的・継続的な過去のイメージです。',
    },
    'future+indicative': {
        main:    '〜するだろう／〜するつもりだ',
        alt:     '〜するに違いない（予言・確信）',
        reasons: ['未来時制は将来の動作・状態を表すから', '直説法は事実・確信として述べる法だから'],
        caution: '予言・約束・脅し・確信など様々なニュアンスがあります。',
    },
    'aorist+indicative': {
        main:    '〜した',
        alt:     '〜来た／〜行った（移動動詞）',
        reasons: ['アオリストは動作の完結・生起を一点として捉えるから', '直説法は事実として述べる法だから'],
        caution: '「〜していた」（未完了過去）とは違います。動作が起きたこと自体に焦点があります。',
    },
    'perfect+indicative': {
        main:    '〜してしまっている／〜した状態にある',
        alt:     '〜したことがある（経験）',
        reasons: ['完了時制は過去の動作の結果が現在も続いている状態を表すから', '直説法は事実として述べる法だから'],
        caution: '単純な過去（アオリスト）とは異なり、今この瞬間の状態を含意します。',
    },
    'pluperfect+indicative': {
        main:    '〜してしまっていた',
        alt:     '（過去のある時点で）〜した状態だった',
        reasons: ['過去完了は過去のある時点より前に完了した動作の結果状態を表すから'],
        caution: '英語の had done に相当します。基準となる過去の時点に注意してください。',
    },
    'present+imperative': {
        main:    '〜し続けなさい／〜していなさい',
        alt:     '〜しなさい（習慣的行為として）',
        reasons: ['現在命令は継続・反復的な動作を求める命令を表すから'],
        caution: 'アオリスト命令（一回的・即時）との区別が重要です。否定形は「〜するのをやめなさい」の意味になることがあります。',
    },
    'aorist+imperative': {
        main:    '〜しなさい（今すぐ）',
        alt:     '〜し始めなさい',
        reasons: ['アオリスト命令は一回的・即時的な動作の開始を求めるから'],
        caution: '継続を求める現在命令との区別が読解の鍵です。',
    },
    'present+subjunctive': {
        main:    '〜するように（目的）／〜するならば（条件）',
        alt:     '〜し続けることを（名詞節）',
        reasons: ['接続法は動作の実現が未確定・仮想的な場合に使われるから', '先行する接続詞が意味を決定するから'],
        caution: '必ず前後の接続詞を確認してください。接続詞なしでは意味が確定しません。',
    },
    'aorist+subjunctive': {
        main:    '〜するように（目的）／もし〜するなら（条件）',
        alt:     '〜した場合には（確定的条件）',
        reasons: ['アオリスト接続法は動作の一回的な実現が未確定な場合に使われるから', '先行する接続詞が目的・条件・時間などの意味を決定するから'],
        caution: '先行する接続詞（ἵνα・ἐάν・ὅταν など）を必ず確認してください。',
    },
    'present+optative': {
        main:    '〜すればよいのだが／〜できますように',
        alt:     '〜するかもしれない（間接話法）',
        reasons: ['希求法は願望・可能性・丁寧な表現に使われるから'],
        caution: '現代語訳では希求法が消えることもあります。μὴ γένοιτο（断じてありえない）は定型表現です。',
    },
    'aorist+optative': {
        main:    '〜しますように（願望）',
        alt:     '〜するだろうか（疑問の婉曲）',
        reasons: ['アオリスト希求法は一回的な動作への願望・可能性を表すから'],
        caution: 'パウロのμὴ γένοιτοはアオリスト希求法。「そんなことは絶対にない」の意です。',
    },
    'present+infinitive': {
        main:    '〜し続けること',
        alt:     '〜すること（一般的行為として）',
        reasons: ['不定詞は動詞の名詞化形で、主語・目的語として機能するから', '現在不定詞は継続・進行のアスペクトを持つから'],
        caution: '人称・数の変化がありません。',
    },
    'aorist+infinitive': {
        main:    '〜すること（一回的・完結）',
        alt:     '〜したこと',
        reasons: ['アオリスト不定詞は一回的・完結した動作の名詞化を表すから'],
        caution: '現在不定詞（継続）との区別が訳に影響します。',
    },
    'perfect+infinitive': {
        main:    '〜してしまっていること',
        alt:     '〜した結果の状態にあること',
        reasons: ['完了不定詞は完了した動作の結果状態の名詞化を表すから'],
        caution: '完了の結果が今も続いているという含意があります。',
    },
    'present+participle': {
        main:    '〜しながら（同時動作）',
        alt:     '〜している〇〇（形容詞的）／〜する者（名詞的）',
        reasons: ['現在分詞は主動詞と同時進行の動作を表すことが多いから'],
        caution: '冠詞があれば名詞的用法（〜する者）の可能性が高まります。',
    },
    'aorist+participle': {
        main:    '〜してから（先行動作）',
        alt:     '〜したので（理由）／〜した後で',
        reasons: ['アオリスト分詞は主動詞より前の動作を表すことが多いから'],
        caution: 'これは推定です。冠詞があれば名詞的用法の可能性もあります。',
    },
    'perfect+participle': {
        main:    '〜した状態にある〇〇（結果状態）',
        alt:     '〜してしまっているので',
        reasons: ['完了分詞は先行動作の結果状態が続いていることを示すから'],
        caution: '状態の継続が核心です。完了動作そのものより、残っている状態に焦点があります。',
    },
};

function confLabel(tense, mood) {
    if (['indicative','imperative'].includes(mood)) return 'ほぼ確実にこう読めます';
    if (mood === 'participle')  return 'この読みが有力ですが、文脈で変わります';
    if (mood === 'subjunctive') return '接続詞によって意味が変わります';
    if (mood === 'infinitive')  return 'この読みが有力です';
    if (mood === 'optative')    return '文脈での確認が必要です';
    return 'この組み合わせは詳細モードで確認してください';
}

function renderBeginnerPanel() {
    const key  = [params.tense, params.mood].filter(Boolean).join('+');
    const data = READING_LABEL[key];
    const panel = document.getElementById('b-panel');
    if (!panel) return;
    if (!data) {
        const label = [TENSE_JP[params.tense], MOOD_JP[params.mood]].filter(Boolean).join('・') || '—';
        panel.innerHTML = `
            <div class="b-reading">
                <div class="b-reading-label">この語形の読み方</div>
                <div class="b-reading-main">${label}</div>
                <div class="b-reading-conf">詳しく見るモードで確認してください</div>
            </div>`;
        return;
    }
    panel.innerHTML = `
        <div class="b-reading">
            <div class="b-reading-label">この語形の読み方</div>
            <div class="b-reading-main">「${data.main}」</div>
            <div class="b-reading-conf">${confLabel(params.tense, params.mood)}</div>
            ${data.alt ? `
            <div class="b-reading-alt">
                <div class="b-reading-alt-label">他の可能性</div>
                <div class="b-reading-alt-val">${data.alt}</div>
            </div>` : ''}
        </div>
        <div class="b-reason">
            <div class="b-reason-label">なぜその読みか</div>
            ${data.reasons.map(r => `<div class="b-reason-item">${r}</div>`).join('')}
            ${data.caution ? `<div class="b-caution">${data.caution}</div>` : ''}
        </div>
        <button class="b-more-btn" onclick="setMode('advanced')">▶ 詳しく見る（文法・用例）</button>`;
}

function renderICSummaryCard() {
    if (!document.body.classList.contains('in-iframe')) return;
    const key  = [params.tense, params.mood].filter(Boolean).join('+');
    const data = READING_LABEL[key];
    const word = params.word || document.getElementById('hdr-word')?.textContent || '—';
    const wordEl   = document.getElementById('ic-word');
    const readEl   = document.getElementById('ic-reading');
    const confEl   = document.getElementById('ic-conf');
    const altWrap  = document.getElementById('ic-alt-wrap');
    const altEl    = document.getElementById('ic-alt');
    const reasonEl = document.getElementById('ic-reasons');
    if (wordEl) wordEl.textContent = word;
    if (!data) {
        const label = [TENSE_JP[params.tense], MOOD_JP[params.mood]].filter(Boolean).join('・') || '—';
        if (readEl)   readEl.textContent = label;
        if (confEl)   confEl.textContent = '詳しく見るモードで確認してください';
        if (altWrap)  altWrap.style.display = 'none';
        if (reasonEl) reasonEl.textContent = '';
        return;
    }
    if (readEl)  readEl.textContent = `「${data.main}」`;
    if (confEl)  confEl.textContent = confLabel(params.tense, params.mood);
    if (data.alt && altWrap && altEl) {
        altEl.textContent = data.alt;
        altWrap.style.display = 'block';
    } else if (altWrap) {
        altWrap.style.display = 'none';
    }
    if (reasonEl) {
        reasonEl.innerHTML = data.reasons
            .map(r => `<span style="display:block;padding-left:12px;position:relative;">
                <span style="position:absolute;left:2px;color:var(--accent);">›</span>${r}
            </span>`).join('');
        if (data.caution) {
            reasonEl.innerHTML += `<div class="b-caution" style="margin-top:6px;">${data.caution}</div>`;
        }
    }
}

let _bMode = 'beginner';
function setMode(mode) {
    _bMode = mode;
    const page = document.querySelector('.page');
    if (!page) return;
    page.classList.remove('beginner','advanced');
    page.classList.add(mode);
    document.getElementById('btn-beginner')?.classList.toggle('active', mode === 'beginner');
    document.getElementById('btn-advanced')?.classList.toggle('active', mode !== 'beginner');
}

/* ── E. reading-core-bar 描画 ─────────────────── */
function renderReadingCoreBar() {
    const bar = document.getElementById('reading-core-bar');
    if (!bar) return;
    const TENSE_SH = { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオ', perfect:'完了', pluperfect:'大完了' };
    const MOOD_SH  = { indicative:'直説', subjunctive:'接続', optative:'希求', imperative:'命令', infinitive:'不定詞', participle:'分詞' };
    const VOICE_SH = { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動', 'middle or passive':'中/受' };
    const CASE_SH  = { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' };

    const setChip = (id, val) => {
        const el = document.getElementById(id);
        if (!el) return;
        if (val) { el.textContent = val; el.classList.remove('rcb-empty'); el.style.display = ''; }
        else { el.style.display = 'none'; }
    };
    setChip('rcb-word',  params.word || '—');
    setChip('rcb-tense', TENSE_SH[params.tense] || params.tense || null);
    setChip('rcb-mood',  MOOD_SH[params.mood]   || params.mood  || null);
    setChip('rcb-voice', VOICE_SH[params.voice] || params.voice || null);

    // case は名詞・形容詞系のみ表示
    const caseVal = CASE_SH[params.case?.value || params.case] || '';
    setChip('rcb-case', caseVal || null);
}

function buildExplain(pos, tense, voice, mood) {
    const keys = [
        `${pos}+${tense}+${mood}+${voice}`,
        `${pos}+${tense}+${mood}`,
        `${pos}+${mood}`,
        pos,
    ].filter(Boolean);
    for (const k of keys) {
        if (EXPLAIN_DB[k]) return EXPLAIN_DB[k];
        if (EXPLAIN_FALLBACK[k]) return EXPLAIN_FALLBACK[k];
    }
    return { body: 'この語形の詳しい説明は現在準備中です。', note: '' };
}

   ══════════════════════════════════════════ */
const CLASS_TO_POS = {
    'verb':'V','noun':'N','adjective':'A','article':'T',
    'preposition':'P','conjunction':'C','adverb':'D',
    'particle':'X','pronoun':'P','relative pronoun':'R',
    'personal pronoun':'P','demonstrative pronoun':'D',
};
const TENSE_CODE  = { P:'present',I:'imperfect',F:'future',A:'aorist',X:'perfect',Z:'pluperfect' };
const VOICE_CODE  = { A:'active',M:'middle',P:'passive',D:'middle deponent',E:'middle or passive',N:'middle or passive' };
const MOOD_CODE   = { I:'indicative',S:'subjunctive',O:'optative',M:'imperative',N:'infinitive',P:'participle' };
const CASE_CODE   = { N:'nominative',G:'genitive',D:'dative',A:'accusative',V:'vocative' };
const NUMBER_CODE = { S:'singular',P:'plural' };
const GENDER_CODE = { M:'masculine',F:'feminine',N:'neuter' };

function entryPosCode(entry) {
    if (entry.pos) return String(entry.pos).replace(/-$/,'').toUpperCase();
    if (entry.class) return CLASS_TO_POS[String(entry.class).toLowerCase()] || '';
    return '';
}
function decodeMorph(entry) {
    const norm = v => (!v || v === '-') ? '' : v;
    if (entry.tense || entry.mood || entry.voice) {
        return {
            pos: entryPosCode(entry), tense: norm(entry.tense), voice: norm(entry.voice),
            mood: norm(entry.mood), case: norm(entry.case), number: norm(entry.number),
            gender: norm(entry.gender), person: norm(entry.person),
        };
    }
    if (entry.morph && typeof entry.morph === 'object') {
        const m = entry.morph;
        return {
            pos: norm(entry.pos||'').replace(/-$/,''),
            tense:norm(m.tense),voice:norm(m.voice),mood:norm(m.mood),
            case:norm(m.case),number:norm(m.number),gender:norm(m.gender),person:norm(m.person),
        };
    }
    const raw = typeof entry.morph === 'string' ? entry.morph : '';
    const parts = raw.split('-');
    const pos = norm(entry.pos||parts[0]||'').replace(/-$/,'');
    if (pos.toUpperCase() === 'V' && parts[1]) {
        const seg = parts[1], off = /^[0-9]/.test(seg) ? 1 : 0;
        return { pos, tense:TENSE_CODE[seg[off]]||'', voice:VOICE_CODE[seg[off+1]]||'',
                 mood:MOOD_CODE[seg[off+2]]||'', person:seg[off+3]||'',
                 number:NUMBER_CODE[seg[off+4]]||'', gender:'', case:'' };
    }
    if (parts[1]) {
        const seg=parts[1], hp=['1','2','3'].includes(seg[0]), b=hp?seg.slice(1):seg;
        return { pos, tense:'',voice:'',mood:'', person:hp?seg[0]:'',
                 case:CASE_CODE[b[0]]||'', number:NUMBER_CODE[b[1]]||'', gender:GENDER_CODE[b[2]]||'' };
    }
    return { pos, tense:'',voice:'',mood:'',case:'',number:'',gender:'',person:'' };
}
function cleanText(entry) {
    return (entry.word||entry.normalized||entry.text||'').replace(/[.,:;·⸀⸁⸂⸃⌈⌉]/g,'').trim();
}

function getBookKey(entry) {
    if (entry._bookKey) return entry._bookKey;
    if (entry.book && isNaN(entry.book)) return String(entry.book);
    if (entry.book != null && entry.book !== '') {
        return BOOK_MAP[String(entry.book).padStart(2,'0')] || null;
    }
    if (entry.ref) {
        const m = String(entry.ref).match(/^([A-Z0-9]+)/);
        if (m) return m[1];
    }
    return null;
}
function normalizeGreek(str) {
    return (str || '').normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/[⸀⸁⸂⸃⌈⌉.,;:·]/g,'').replace(/ς/g,'σ').toLowerCase().trim();
}

const STOP_LEMMAS = new Set([
    'ὁ','ἡ','τό','καί','δέ','εἰς','ἐν','οὐ','μή','ἀλλά','γάρ','ὅτι',
    'ἐκ','ἐξ','διά','κατά','περί','ὑπό','παρά','πρός','ἀπό','σύν','μετά','ἐπί',
    'αὐτός','ὅς','τις','πᾶς','εἰμί',
]);

/* ══════════════════════════════════════════
   マッチング
   ══════════════════════════════════════════ */
function matchEntry(entry) {
    if (wordFilterMode === 'lemma' && params.lemma) {
        if (normalizeGreek(entry.lemma||'') !== normalizeGreek(params.lemma)) return false;
    } else if (wordFilterMode === 'word' && params.word) {
        if (normalizeGreek(entry.word||entry.normalized||entry.text||'') !== normalizeGreek(params.word)) return false;
    }
    if (!bookState.every(g => g.enabled)) {
        const en = new Set(bookState.filter(g=>g.enabled).flatMap(g=>g.books));
        const bk = entry._bookKey || getBookKey(entry);
        if (!bk || !en.has(bk)) return false;
    }
    const sp = params.pos.replace(/-$/,'').toUpperCase();
    if (sp && entryPosCode(entry) !== sp) return false;
    const m = decodeMorph(entry);
    if (params.tense && m.tense !== params.tense) return false;
    if (params.mood  && m.mood  !== params.mood)  return false;
    if (params.voice) {
        const ok = m.voice === params.voice
            || (params.voice==='middle'  && (m.voice==='middle deponent'||m.voice==='middle or passive'))
            || (params.voice==='passive' && m.voice==='middle or passive');
        if (!ok) return false;
    }
    for (const f of extState) {
        if (!f.enabled || !f.value) continue;
        if ((m[f.key]||'') !== f.value) return false;
    }
    return true;
}

function toggleExt(i)  { extState[i].enabled=!extState[i].enabled; renderExtChips(); renderCoreTags(); syncURL(); notifyFilterChanged(); if(window._morphData)renderResults(window._morphData); }

/* ══════════════════════════════════════════

   ══════════════════════════════════════════ */
function getActiveFilterState() {
    return {
        books:    bookState.filter(g=>g.enabled).flatMap(g=>g.books),
        groups:   bookState.filter(g=>g.enabled).map(g=>g.key),
        scope:    bookState.filter(g=>g.enabled).length===1 ? bookState.find(g=>g.enabled).key : '',
        chips:    extState.filter(f=>f.enabled&&f.value).map(f=>`${f.key}:${f.value}`),
        disabled: extState.filter(f=>!f.enabled).map(f=>f.key),
    };
}
function navToSyntax(e) {
    e.preventDefault();
    const msg = { type:'NAV_TO_SYNTAX', ref:params.ref, word:params.word, filters:getActiveFilterState() };
    if (window.parent && window.parent !== window) window.parent.postMessage(msg,'*');
    else if (window.opener && !window.opener.closed) window.opener.postMessage(msg,'*');
}
function navToSemantics(e) {
    e.preventDefault();
    const msg = { type:'NAV_TO_SEMANTICS', ref:params.ref, word:params.word, filters:getActiveFilterState() };
    if (window.parent && window.parent !== window) window.parent.postMessage(msg,'*');
    else if (window.opener && !window.opener.closed) window.opener.postMessage(msg,'*');
}
function notifyFilterChanged() {
    const filters = getActiveFilterState();
    const msg = { type:'FILTER_CHANGED', filters };
    if (window.parent && window.parent !== window) window.parent.postMessage(msg,'*');
    else if (window.opener && !window.opener.closed) window.opener.postMessage(msg,'*');
}

/* ══════════════════════════════════════════
   日本語訳
   ══════════════════════════════════════════ */
const _jaMap = new Map();
const _refToJaKey = (() => {
    const KEY_TO_CODE = {};
    Object.entries(BOOK_MAP).forEach(([code,key])=>{ KEY_TO_CODE[key]=code; });
    return function(ref) {
        const m = String(ref||'').match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
        if (!m) return null;
        const code = KEY_TO_CODE[m[1]];
        if (!code) return null;
        return `${code}${String(m[2]).padStart(2,'0')}${String(m[3]).padStart(2,'0')}`;
    };
})();
function getJaVerse(entry) {
    const key = _refToJaKey(entry.ref);
    if (key && _jaMap.has(key)) return _jaMap.get(key);
    return entry.gloss || entry.english || '';
}
function buildRefLabel(ref) {
    const r = String(ref||'');
    const m = r.match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
    if (m) return `${BOOK_JP[m[1]]||m[1]} ${m[2]}:${m[3]}`;
    if (r.length===6 && /^\d+$/.test(r)) {
        const bk = BOOK_MAP[r.slice(0,2)];
        return `${(bk&&BOOK_JP[bk])||bk||r.slice(0,2)} ${parseInt(r.slice(2,4))}:${parseInt(r.slice(4,6))}`;
    }
    return r;
}

/* ══════════════════════════════════════════
   結果一覧
   ══════════════════════════════════════════ */
let _currentRows = [];
let _displayCount = 100;
const PAGE_SIZE = 100;

function renderResults(allData) {
    const matched = allData.filter(matchEntry);
    const sp      = params.pos.replace(/-$/,'');
    const samePos = allData.filter(e=>(e.pos||'').replace(/-$/,'').toUpperCase()===sp.toUpperCase()).length;
    document.getElementById('count').textContent      = matched.length.toLocaleString();
    document.getElementById('result-pct').textContent = samePos>0 ? `同品詞 ${samePos.toLocaleString()} 件中` : '';
    _currentRows  = matched;
    _displayCount = PAGE_SIZE;
    renderDist(matched);

    /* ── quick-insight: buildCompactInsight（計画A）を優先使用 ── */
    const qiEl = document.getElementById('quick-insight');
    if (qiEl) {
        let insightHTML = '';

        // A. buildCompactInsight による即読サマリー
        if (typeof buildCompactInsight === 'function' && matched.length > 0) {
            const ci = buildCompactInsight({
                tense:   params.tense,
                mood:    params.mood,
                matched: matched,
                BOOK_JP: BOOK_JP,
            });

            const confColor = ci.confidence >= 85 ? '#4a7a5a'
                            : ci.confidence >= 65 ? '#a09050'
                            : '#8a6a50';

            insightHTML += `<div style="
                padding:11px 14px 10px;
                background:linear-gradient(135deg,rgba(90,110,130,0.07) 0%,rgba(90,110,130,0.02) 100%);
                border:1px solid rgba(90,110,130,0.20);
                border-left:3px solid var(--accent,#5a6e82);
                border-radius:10px;
                margin-bottom:10px;
            ">
                <div style="font-size:0.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
                            color:var(--accent,#5a6e82);margin-bottom:5px;">即読サマリー</div>
                ${ci.primary ? `<div style="font-size:0.92rem;font-weight:700;color:var(--text,#1d1d1f);
                                            margin-bottom:3px;line-height:1.4;">${ci.primary}</div>` : ''}
                ${ci.secondary ? `<div style="font-size:0.73rem;color:var(--text-sub,#6e6e73);margin-bottom:5px;">${ci.secondary}</div>` : ''}
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
                    <span style="font-size:0.68rem;font-weight:700;color:${confColor};">確信度 ${ci.confidence}%</span>
                </div>
                ${ci.quickGuide ? `<div style="font-size:0.73rem;color:var(--text-sub,#6e6e73);
                                              padding:6px 10px;
                                              background:rgba(90,110,130,0.06);
                                              border-radius:6px;
                                              line-height:1.6;">
                    <span style="font-size:0.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
                                 color:var(--text-hint,#aaa);margin-right:4px;">読解ガイド</span>${ci.quickGuide}
                </div>` : ''}
            </div>`;
        }

        // B. renderExplainability による統合スコアリングパネル
        if (typeof scoreEngine !== 'undefined' && typeof renderExplainability === 'function' && matched.length > 0) {
            const seResult = scoreEngine.evaluate({
                morphology: {
                    tense: params.tense,
                    mood:  params.mood,
                    voice: params.voice,
                },
                syntax:    {},
                semantics: { baseScore: Math.min(50, Math.round(matched.length / 3)) },
                context:   {},
            });
            // alternatives を件数情報で補完
            seResult.alternatives = [];
            if (matched.length > 0) {
                seResult.reasons.push(`この語形は新約全体に ${matched.length} 件ヒット`);
            }
            insightHTML += renderExplainability(seResult, '形態スコア詳細');
        }

        // 旧: insertInsightCard（フォールバック）
        if (!insightHTML && typeof insertInsightCard === 'function') {
            insertInsightCard('quick-insight', matched, params.tense, params.mood, BOOK_JP);
        } else {
            qiEl.innerHTML  = insightHTML;
            qiEl.style.display = insightHTML ? 'block' : 'none';
        }
    }

    renderPage();
}

function renderPage() {
    const el   = document.getElementById('result-list');
    const rows = _currentRows;
    if (!rows.length) {
        el.innerHTML = `<div class="empty"><div class="empty-icon">∅</div>条件に一致する語形が見つかりませんでした。<br>拡張条件をOFFにするか、書物範囲を広げてみてください。</div>`;
        return;
    }
    const slice = rows.slice(0, _displayCount);
    const more  = rows.length - _displayCount;
    el.innerHTML = slice.map((entry, idx) => {
        const word     = entry.word || entry.normalized || entry.text || '';
        const refLabel = buildRefLabel(entry.ref);
        const jaText   = getJaVerse(entry);
        const encRef   = encodeURIComponent(entry.ref || '');
        const encWord  = encodeURIComponent(word);
        return `<div class="result-card" style="animation:fadeUp 0.2s ease ${Math.min(idx*8,240)}ms both"
            onclick="toggleMorphContext(this,'${encRef}','${encWord}')">
            <div class="result-top">
                <div>
                    <span class="result-word">${word}</span>
                    <span class="result-lemma">${entry.lemma||''}</span>
                </div>
                <span class="result-ref">${refLabel}</span>
            </div>
            ${jaText ? `<div class="result-ja">${jaText}</div>` : ''}
        </div>`;
    }).join('');
    if (more > 0) {
        el.innerHTML += `<div style="text-align:center;padding:24px 0;">
            <button onclick="loadMore()" style="padding:8px 24px;font-size:0.78rem;font-family:inherit;
                border:1px solid var(--border);border-radius:20px;background:transparent;
                cursor:pointer;color:var(--text-sub);transition:background 0.12s;">
                さらに表示（残り ${more.toLocaleString()} 件）
            </button></div>`;
    }
}
function loadMore() { _displayCount += PAGE_SIZE; renderPage(); }

function goToWord(ref, enc) {
    const word = decodeURIComponent(enc);
    const msg  = { type:'GO_TO_REF', ref, word };
    if (window.parent && window.parent !== window) { window.parent.postMessage(msg,'*'); return; }
    if (window.opener && !window.opener.closed) window.opener.postMessage(msg,'*');
}

/* ══════════════════════════════════════════
   Step2: ctx-panel — 文脈展開 + XSC付き分詞分類
   ══════════════════════════════════════════ */
function toggleMorphContext(cardEl, encRef, encWord) {
    const ref  = decodeURIComponent(encRef);
    const word = decodeURIComponent(encWord);

    const existing = cardEl.querySelector('.morph-ctx');
    if (existing) { existing.remove(); cardEl.classList.remove('ctx-open'); return; }
    document.querySelectorAll('.result-card.ctx-open').forEach(c => {
        c.querySelector('.morph-ctx')?.remove(); c.classList.remove('ctx-open');
    });

    if (!window._morphData) { goToWord(ref, encWord); return; }

    const prefix = String(ref).replace(/!.*$/,'').trim();
    const tokens = window._morphData.filter(e =>
        String(e.ref||'').replace(/!.*$/,'').trim() === prefix
    );
    if (!tokens.length) { goToWord(ref, encWord); return; }

    const normWord = cleanText({ word });

    /* 原文行 */
    const lineHTML = tokens.map(t => {
        const w = cleanText(t);
        if (!w) return '';
        return w === normWord
            ? `<span class="hit-w">${w}</span>`
            : `<span>${w}</span>`;
    }).filter(Boolean).join(' ');

    /* 共起語チップ（shared-insight.js の calcCoocNeighbors を利用） */
    let coocHTML = '';
    if (typeof calcCoocNeighbors === 'function') {
        const hitIdx   = tokens.findIndex(t => cleanText(t) === normWord);
        const neighbors = calcCoocNeighbors(tokens, hitIdx, STOP_LEMMAS, entryPosCode, cleanText, 6);
        if (neighbors.length) {
            const POS_CLS = { N:'is-noun', V:'is-verb' };
            coocHTML = `<div class="morph-ctx-cooc">
                ${neighbors.map(n => `<span class="morph-ctx-cooc-chip ${POS_CLS[n.pos]||''}">${n.word}</span>`).join('')}
            </div>`;
        }
    }

    /* 分詞：XSC付き分類（shared-insight.js の classifyParticipleLiteShared を利用） */
    let ptcHTML = '';
    if (params.mood === 'participle') {
        const hitEntry = tokens.find(t => cleanText(t) === normWord);
        if (hitEntry) {
            let r;
            if (typeof classifyParticipleLiteShared === 'function') {
                r = classifyParticipleLiteShared(hitEntry, tokens, entryPosCode, decodeMorph, cleanText);
            } else {
                r = classifyParticipleLiteFallback(hitEntry, tokens);
            }
            /* B. renderExplainability を優先使用、フォールバックは buildXscPanelShared */
            let xscHTML = '';
            if (typeof renderExplainability === 'function' && r.deltas && r.deltas.length) {
                xscHTML = renderExplainability(
                    { confidence: r.conf, reasons: [], deltas: r.deltas, alternatives: [] },
                    '分詞判定根拠'
                );
            } else if (typeof buildXscPanelShared === 'function' && r.deltas && r.deltas.length) {
                const panelId = 'xsc-morph-' + Math.random().toString(36).slice(2,8);
                xscHTML = buildXscPanelShared(r.deltas, r.conf, panelId, 'rgba(196,112,40,0.85)');
            }
            ptcHTML = `<div class="ptc-lite">
                <div class="ptc-lite-label">分詞用法（Morph推定）</div>
                <div class="ptc-lite-main">${r.label}</div>
                <div class="ptc-lite-hint">${r.hint}</div>
                ${xscHTML}
            </div>`;
        }
    }

    /* B. scoreEngine による文脈スコア（非分詞時も表示） */
    let scoreHTML = '';
    if (params.mood !== 'participle'
        && typeof scoreEngine !== 'undefined'
        && typeof renderExplainability === 'function') {
        const hitEntry = tokens.find(t => cleanText(t) === normWord);
        if (hitEntry) {
            const hm     = decodeMorph(hitEntry);
            const hitIdx = tokens.findIndex(t => cleanText(t) === normWord);
            const prevTok = hitIdx > 0 ? tokens[hitIdx - 1] : null;
            const prevPos = prevTok ? entryPosCode(prevTok) : '';
            let matchNounWord = null;
            tokens.forEach((t, i) => {
                if (i === hitIdx || matchNounWord) return;
                const tm  = decodeMorph(t);
                const pos = entryPosCode(t);
                if (['N','A'].includes(pos) && tm.case && tm.case === hm.case
                    && tm.gender === hm.gender && tm.number === hm.number) {
                    matchNounWord = cleanText(t);
                }
            });
            const seResult = scoreEngine.evaluate({
                morphology: { tense: hm.tense, mood: hm.mood, voice: hm.voice },
                syntax: {
                    hasArticle: prevPos === 'T',
                    matchNoun:  matchNounWord || null,
                    role:       hm.mood === 'indicative' ? 'verb' : '',
                    ptcCase:    hm.case,
                },
                semantics: { baseScore: 40 },
                context:   { tokens, targetIdx: hitIdx },
            });
            scoreHTML = renderExplainability(seResult, '文脈スコア');
        }
    }

    const ctx = document.createElement('div');
    ctx.className = 'morph-ctx';
    ctx.addEventListener('click', e => e.stopPropagation());
    ctx.innerHTML = `
        <div class="morph-ctx-line">${lineHTML}</div>
        ${coocHTML}
        ${ptcHTML}
        ${scoreHTML}
        <div class="morph-ctx-goto">
            <button onclick="goToWord('${encRef}','${encWord}')">本文へ →</button>
        </div>`;

    cardEl.appendChild(ctx);
    cardEl.classList.add('ctx-open');
}

/* フォールバック（shared-insight.js未読込時） */
function classifyParticipleLiteFallback(entry, tokens) {
    const hm      = decodeMorph(entry);
    const tHint   = hm.tense === 'aorist'  ? '〜してから（先行動作）'
                  : hm.tense === 'present' ? '〜しながら（同時動作）'
                  : '副詞的に主動詞を修飾';
    return { label:'副詞用法（推定）', hint: tHint, conf: 55, deltas:[] };
}

/* ══════════════════════════════════════════
   データ読み込み
   ══════════════════════════════════════════ */
const JA_FOLDER = 'bible_jp';
const ALL_BOOKS = [
    {key:'ROM',ch:16},{key:'1CO',ch:16},{key:'2CO',ch:13},{key:'GAL',ch:6},
    {key:'EPH',ch:6},{key:'PHP',ch:4},{key:'COL',ch:4},{key:'1TH',ch:5},
    {key:'2TH',ch:3},{key:'1TI',ch:6},{key:'2TI',ch:4},{key:'TIT',ch:3},
    {key:'PHM',ch:1},
];
function buildAllChapterPaths() {
    const p=[];
    for(const b of ALL_BOOKS) for(let c=1;c<=b.ch;c++) p.push({key:b.key,ch:c,path:`./bible_data/${b.key}/${c}.json`});
    return p;
}
async function fetchInBatches(tasks,sz,onProg) {
    let all=[];
    for(let i=0;i<tasks.length;i+=sz) {
        const results=await Promise.allSettled(
            tasks.slice(i,i+sz).map(t=>
                fetch(t.path).then(r=>r.ok?r.json():null).catch(()=>null)
                .then(data=>{ if(!Array.isArray(data)) return null; data.forEach(e=>{e._bookKey=t.key;}); return data; })
            )
        );
        results.forEach(r=>{ if(r.status==='fulfilled'&&Array.isArray(r.value)) all=all.concat(r.value); });
        onProg(Math.min(i+sz,tasks.length),tasks.length);
    }
    return all;
}
async function fetchJaData(morphPaths) {
    const KEY_TO_CODE={};
    Object.entries(BOOK_MAP).forEach(([code,key])=>{ KEY_TO_CODE[key]=code; });
    return Promise.allSettled(
        morphPaths.map(t=>({...t,path:`./${JA_FOLDER}/${t.key}/${t.ch}.json`}))
        .map(t=>fetch(t.path).then(r=>r.ok?r.json():null).catch(()=>null)
            .then(data=>{
                if(!data) return;
                const vers=data.verses; if(!vers||typeof vers!=='object') return;
                const bc=KEY_TO_CODE[t.key]; if(!bc) return;
                const cs=String(t.ch).padStart(2,'0');
                Object.entries(vers).forEach(([vn,tx])=>{
                    _jaMap.set(`${bc}${String(t.ch).padStart(2,'0')}${String(parseInt(vn)).padStart(2,'0')}`,String(tx));
                });
            })
        )
    );
}

    renderResults(allData);
})();
