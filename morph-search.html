}

/* ── 構文ツリー（階層表示） ─────────────────────────── */
function getVerseTokens(ref) {
    if (!window._morphData || !ref) return [];
    const prefix = String(ref).replace(/!.*$/,'').trim();
    return window._morphData.filter(e => String(e.ref||'').replace(/!.*$/,'').trim() === prefix);
}
function cleanText(e) {
    return (e.word||e.normalized||e.text||'').replace(/[.,:;·⸀⸁⸂⸃⌈⌉]/g,'').trim();
}
function getRole(entry) {
    const m=decodeMorph(entry), pos=m.pos.toUpperCase();
    if (pos==='V') return (!m.mood||m.mood==='infinitive'||m.mood==='participle')?'mod':'verb';
    if (pos==='P') return 'prep';
    if (['N','T','A','D','R'].includes(pos)) {
        if (m.case==='nominative') return 'subj';
        if (m.case==='accusative') return 'obj';
        if (m.case==='genitive'||m.case==='dative') return 'phr';
        return 'other';
    }
    return 'other';
}

function getJapanese(entry) {
    if (entry.japanese) return entry.japanese;
    const norm = entry.normalized || entry.word || entry.text || '';
    return _japaneseMap.get(norm) || '';
}
    
function groupTokens(tokens) {
    const groups=[]; let i=0;
    while (i<tokens.length) {
        const e=tokens[i], role=getRole(e);
        if (role==='prep') {
            const members=[e]; let j=i+1;
            while (j<tokens.length) {
                const nr=getRole(tokens[j]);
                if (['subj','obj','phr','other'].includes(nr)&&decodeMorph(tokens[j]).pos.toUpperCase()!=='P') {
                    members.push(tokens[j]); j++;
                } else break;
            }
            groups.push({role:'prep',members}); i=j;
        } else {
            groups.push({role,members:[e]}); i++;
        }
    }
    return groups;
}

const ROLE_LABEL = { verb:'動詞', subj:'主語', obj:'目的語', phr:'修飾', prep:'前置詞句', mod:'準動詞', other:'' };
const ROLE_COLOR = { verb:'#4a7fa5', subj:'#5a8a6e', obj:'#9a6040', phr:'#888', prep:'#7a6aa0', mod:'#a09050', other:'' };

/* ══════════════════════════════════════════════════════
   分詞用法判定（5ステップ）
   ══════════════════════════════════════════════════════ */

// 補語動詞リスト（STEP4）
const COMPLEMENTARY_VERBS = [
    'βλέπω','ἀκούω','οἶδα','γινώσκω','ὁράω','θεάομαι','εὑρίσκω'
];

function classifyParticiple(hitEntry, tokens) {
    const hm = decodeMorph(hitEntry);
    const ptcCase   = hm.case;
    const ptcGender = hm.gender;
    const ptcNumber = hm.number;
    const ptcTense  = hm.tense;

    // ── STEP 1: 実体用法 ────────────────────────────────
    // ヒット語の直前トークンが冠詞（T）かチェック
    const hitIdx = tokens.findIndex(t =>
        cleanText(t) === cleanText(hitEntry) ||
        String(t.ref) === String(hitEntry.ref)
    );
    const prevToken = hitIdx > 0 ? tokens[hitIdx - 1] : null;
    const prevPos   = prevToken ? entryPosCode(prevToken) : '';
    if (prevPos === 'T') {
        const pm = decodeMorph(prevToken);
        if (pm.case === ptcCase && pm.gender === ptcGender && pm.number === ptcNumber) {
            return {
                classification: 'substantival',
                label: '実体用法（名詞的分詞）',
                reason: '直前に一致する格・性・数の冠詞がある。分詞が名詞として機能している。',
                confidence: 0.95,
                candidates: null,
            };
        }
    }

    // ── STEP 2: 形容詞用法 ──────────────────────────────
    // 同節内に格・性・数が一致する名詞・代名詞があるか
    const matchingNoun = tokens.find(t => {
        if (cleanText(t) === cleanText(hitEntry)) return false;
        const pos = entryPosCode(t);
        if (!['N','T','A','D','R'].includes(pos)) return false;
        const tm = decodeMorph(t);
        return tm.case === ptcCase && tm.gender === ptcGender && tm.number === ptcNumber;
    });
    if (matchingNoun) {
        return {
            classification: 'attributive',
            label: '形容詞用法',
            reason: `同節内の「${cleanText(matchingNoun)}」と格（${CASE_JP[ptcCase]||ptcCase}）・性・数が一致している。`,
            confidence: 0.9,
            candidates: null,
        };
    }

    // ── STEP 3: 属格絶対 ────────────────────────────────
    if (ptcCase === 'genitive') {
        const genNoun = tokens.find(t => {
            if (cleanText(t) === cleanText(hitEntry)) return false;
            const pos = entryPosCode(t);
            if (!['N','T','A','D','R'].includes(pos)) return false;
            const tm = decodeMorph(t);
            return tm.case === 'genitive';
        });
        if (genNoun) {
            return {
                classification: 'genitive_absolute',
                label: '属格絶対分詞',
                reason: `主節と独立した属格節。「${cleanText(genNoun)}」と共に属格を形成している。`,
                confidence: 0.9,
                candidates: null,
            };
        }
    }

    // ── STEP 4: 補語用法 ────────────────────────────────
    const mainVerb = tokens.find(t => {
        const pos = entryPosCode(t);
        if (pos !== 'V') return false;
        const tm = decodeMorph(t);
        if (!tm.mood || tm.mood === 'participle' || tm.mood === 'infinitive') return false;
        const lemma = (t.lemma || '').replace(/[ʼ']/g, '');
        return COMPLEMENTARY_VERBS.some(v => v === lemma || lemma.startsWith(v.slice(0,4)));
    });
    if (mainVerb) {
        return {
            classification: 'complementary',
            label: '補語用法',
            reason: `知覚・認識動詞「${cleanText(mainVerb)}」の補語として機能している。`,
            confidence: 0.85,
            candidates: null,
        };
    }

    // ── STEP 5: 副詞用法（推定）────────────────────────
    const adverbialCandidates = (() => {
        const cands = [];
        if (ptcTense === 'present') {
            cands.push({ key:'simultaneous', label:'同時（〜しながら）', conf: 0.80 });
        } else if (ptcTense === 'aorist') {
            cands.push({ key:'antecedent',   label:'先行（〜してから）', conf: 0.80 });
        } else if (ptcTense === 'perfect') {
            cands.push({ key:'resultant',    label:'結果（〜した状態で）', conf: 0.75 });
        }
        // 常に低確率で追加
        cands.push({ key:'cause',      label:'原因（〜なので）',  conf: 0.40 });
        cands.push({ key:'condition',  label:'条件（〜なら）',    conf: 0.30 });
        cands.push({ key:'concession', label:'譲歩（〜なのに）',  conf: 0.30 });
        return cands;
    })();

    return {
        classification: 'adverbial',
        label: '副詞用法（推定）',
        reason: '冠詞・格一致名詞・属格独立・補語動詞のいずれも確認できないため副詞用法と推定。文脈で判断してください。',
        confidence: 0.70,
        candidates: adverbialCandidates,
    };
}

/* ── Explainable Scoring レンダリング ──────────────── */

function xscRankChar(rank) {
    const chars = ['①','②','③','④','⑤'];
    return chars[rank-1] || String(rank);
}

// スコア内訳の1行をHTMLに変換
function xscRowHTML(item, maxAbsDelta) {
    const isPos = item.delta > 0;
    const isNeg = item.delta < 0;
    const cls   = isPos ? 'pos' : isNeg ? 'neg' : 'neu';
    const sign  = isPos ? '+' : '';
    const barW  = maxAbsDelta > 0 ? Math.round(Math.abs(item.delta) / maxAbsDelta * 100) : 0;
    const barColor = isPos ? 'rgba(74,122,90,0.55)' : isNeg ? 'rgba(176,80,80,0.45)' : '#ddd';
    return `<div class="xsc-row">
        <span class="xsc-delta ${cls}">${sign}${item.delta}</span>
        <div class="xsc-row-bar-wrap">
            <div class="xsc-row-bar" style="width:${barW}%;background:${barColor};"></div>
        </div>
        <span class="xsc-row-label">${item.label}${item.note ? `<span class="xsc-row-note"> — ${item.note}</span>` : ''}</span>
    </div>`;
}

// 1候補ブロックのHTML
function xscCandidateHTML(cand, rank, isActive, panelId) {
    const max   = 100;
    const pct   = Math.round(cand.score);
    const color = pct >= 65 ? '#4a7a5a' : pct >= 45 ? '#a09050' : '#b06050';
    const maxDelta = Math.max(...cand.items.map(i => Math.abs(i.delta)), 1);

    // 上位3〜5要因だけ表示（delta絶対値の大きい順）
    const topItems = [...cand.items]
        .sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta))
        .slice(0, 5);

    const total = topItems.reduce((s, i) => s + i.delta, 0);

    return `<div class="xsc-candidate${isActive?' active':''}" id="${panelId}-cand-${cand.key}"
        onclick="xscToggle('${panelId}','${cand.key}')">
        <div class="xsc-cand-header">
            <span class="xsc-cand-rank${rank===1?' top':''}">${xscRankChar(rank)}</span>
            <span class="xsc-cand-name">${cand.label}</span>
            <div class="xsc-cand-pct-wrap">
                <div class="xsc-cand-bar-wrap">
                    <div class="xsc-cand-bar" style="width:${pct}%;background:${color};"></div>
                </div>
                <span class="xsc-cand-pct" style="color:${color}">${pct}%</span>
            </div>
            <span class="xsc-cand-arrow">▾</span>
        </div>
        <div class="xsc-breakdown">
            <div class="xsc-breakdown-title">スコア内訳（上位${topItems.length}要因）</div>
            <div class="xsc-rows">
                ${topItems.map(i => xscRowHTML(i, maxDelta)).join('')}
            </div>
            <div class="xsc-total">
                <span>主要因の合計</span>
                <span class="xsc-total-num">${total >= 0 ? '+' : ''}${total}</span>
            </div>
            <div class="xsc-why">${cand.why}</div>
        </div>
    </div>`;
}

// 候補切り替え（アコーディオン）
function xscToggle(panelId, key) {
    const allCands = document.querySelectorAll(`#${panelId} .xsc-candidate`);
    allCands.forEach(el => {
        const isTarget = el.id === `${panelId}-cand-${key}`;
        const wasActive = el.classList.contains('active');
        // 同じ候補をクリックした場合は閉じる、違うものは開く
        el.classList.toggle('active', isTarget && !wasActive);
    });
}

function renderParticiplePanel(result, hitEntry, tokens) {
    const conf    = result.confidence;
    const confPct = Math.round(conf * 100);
    const confColor = conf >= 0.9 ? '#5a8a6e' : conf >= 0.7 ? '#a09050' : '#b06050';
    const panelId = 'xsc-' + Math.random().toString(36).slice(2, 7);

    // ── 副詞用法（推定）の場合：Explainable Scoring を表示 ──
    if (result.classification === 'adverbial' && hitEntry && tokens) {
        const hm = decodeMorph(hitEntry);
        const hitIdx = tokens.findIndex(t =>
            cleanText(t) === cleanText(hitEntry) ||
            String(t.ref) === String(hitEntry.ref)
        );
        const prevToken = hitIdx > 0 ? tokens[hitIdx - 1] : null;
        const prevPos   = prevToken ? entryPosCode(prevToken) : '';

        const scored = buildAdverbialBreakdown(hm, tokens, hitIdx, prevPos);

        return `<div class="ptc-panel" id="${panelId}">
            <div class="ptc-label">分詞用法 — スコア根拠を表示</div>
            <div class="ptc-class">${result.label}</div>
            <div class="ptc-reason">${result.reason}</div>
            <div class="ptc-conf">
                <div class="ptc-conf-bar">
                    <div class="ptc-conf-fill" style="width:${confPct}%;background:${confColor};"></div>
                </div>
                <span>推定確信度 ${confPct}%</span>
            </div>
            <div style="margin-top:10px;">
                <div style="font-size:0.62rem;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;">
                    推定候補（上位${scored.length}件）— タップで内訳を確認
                </div>
                <div class="xsc-candidates">
                    ${scored.map((c, i) => xscCandidateHTML(c, i+1, i===0, panelId)).join('')}
                </div>
                <div style="font-size:0.65rem;color:var(--text-sub);margin-top:8px;opacity:0.7;">
                    ※ スコアは形態素・文脈シグナルから計算。絶対的な判定ではありません。
                </div>
            </div>
        </div>`;
    }

    // ── 確定的用法（実体・形容・属格絶対・補語）の場合 ──
    if (hitEntry && tokens) {
        const hm = decodeMorph(hitEntry);
        const hitIdx = tokens.findIndex(t =>
            cleanText(t) === cleanText(hitEntry) ||
            String(t.ref) === String(hitEntry.ref)
        );
        const prevToken = hitIdx > 0 ? tokens[hitIdx - 1] : null;
        const prevPos   = prevToken ? entryPosCode(prevToken) : '';

        // 形容詞用法の場合、一致名詞を特定
        let matchingNoun = null;
        if (result.classification === 'attributive') {
            const ptcCase = hm.case, ptcGender = hm.gender, ptcNumber = hm.number;
            matchingNoun = tokens.find(t => {
                if (cleanText(t) === cleanText(hitEntry)) return false;
                const pos = entryPosCode(t);
                if (!['N','T','A','D','R'].includes(pos)) return false;
                const tm = decodeMorph(t);
                return tm.case === ptcCase && tm.gender === ptcGender && tm.number === ptcNumber;
            });
        }

        const bd = buildDecisiveBreakdown(result.classification, hm, tokens, hitIdx, prevToken, matchingNoun);
        const maxDelta = Math.max(...bd.items.map(i => Math.abs(i.delta)), 1);

        const breakdownHTML = bd.items.length ? `
            <div style="margin-top:10px;">
                <div style="font-size:0.62rem;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;">
                    判定根拠（スコア内訳）
                </div>
                <div class="xsc-rows">
                    ${bd.items.map(i => xscRowHTML(i, maxDelta)).join('')}
                </div>
                <div class="xsc-why">${bd.why}</div>
            </div>` : '';

        return `<div class="ptc-panel" id="${panelId}">
            <div class="ptc-label">分詞用法 — 判定根拠あり</div>
            <div class="ptc-class">${result.label}</div>
            <div class="ptc-reason">${result.reason}</div>
            <div class="ptc-conf">
                <div class="ptc-conf-bar">
                    <div class="ptc-conf-fill" style="width:${confPct}%;background:${confColor};"></div>
                </div>
                <span>推定確信度 ${confPct}%</span>
            </div>
            ${breakdownHTML}
        </div>`;
    }

    // フォールバック（hitEntry なし）
    return `<div class="ptc-panel">
        <div class="ptc-label">分詞用法</div>
        <div class="ptc-class">${result.label}</div>
        <div class="ptc-reason">${result.reason}</div>
        <div class="ptc-conf">
            <div class="ptc-conf-bar">
                <div class="ptc-conf-fill" style="width:${confPct}%;background:${confColor};"></div>
            </div>
            <span>推定確信度 ${confPct}%</span>
        </div>
    </div>`;
}

function toggleContext(cardEl, ref, wordEnc) {
    const hitWord = decodeURIComponent(wordEnc);
    const existing = cardEl.querySelector('.ctx-panel');
    if (existing) {
        const open = existing.style.display !== 'none';
        existing.style.display = open ? 'none' : 'block';
        cardEl.classList.toggle('card-open', !open);
        return;
    }

    const tokens = getVerseTokens(ref);
    if (!tokens.length) return;

    const groups = groupTokens(tokens);
    const ORDER  = ['verb','subj','obj','prep','phr','mod'];
    const buckets = {};
    ORDER.forEach(r => buckets[r] = []);

    groups.forEach(g => {
    const text  = g.members.map(cleanText).filter(Boolean).join(' ');
    const gloss = g.members.map(m => getJapanese(m)).filter(Boolean).join('・');
    if (!text) return;
    const isHit = g.members.some(m => cleanText(m) === hitWord ||
        (m.word||'').replace(/[.,:;·⸀⸁⸂⸃⌈⌉]/g,'') === hitWord);
    if (ORDER.includes(g.role)) buckets[g.role].push({ text, gloss, isHit });
    });

    /* ── 階層ツリーHTML生成 ── */
    // 動詞ノード（ルート）
    const verbItems = buckets['verb'];
    const verbHTML = verbItems.length
    ? verbItems.map(item => `
        <span class="ctx-greek${item.isHit?' hit':''}">
            ${item.text}
            ${item.gloss ? `<span style="font-family:'Noto Sans JP',sans-serif;font-size:0.62rem;color:var(--text-sub);margin-left:4px;">［${item.gloss}］</span>` : ''}
        </span>`).join(' ')
    : '<span style="color:#ccc;font-size:0.8rem;">（動詞なし）</span>';

    // 原文行（非表示・データ保持用）
    const rawLine = tokens.map(e => {
        const t = cleanText(e); if (!t) return '';
        const isHit = t === hitWord || (e.word||'').replace(/[.,:;·⸀⸁⸂⸃⌈⌉]/g,'') === hitWord;
        return isHit ? `<span style="color:var(--highlight);font-weight:700;">${t}</span>` : `<span>${t}</span>`;
    }).filter(Boolean).join(' ');

    // 枝ノード（主語・目的語・前置詞句・修飾）
    const branchRoles = ['subj','obj','prep','phr','mod'];
    const branchHTML = branchRoles
        .filter(r => buckets[r].length > 0 && ROLE_LABEL[r])
        .map(role => {
            const color = ROLE_COLOR[role];
            const items = buckets[role].map(item =>
                `<span class="ctx-greek${item.isHit?' hit':''}">
                    ${item.text}
                    ${item.gloss ? `<span style="font-family:'Noto Sans JP',sans-serif;font-size:0.62rem;color:var(--text-sub);margin-left:4px;">［${item.gloss}］</span>` : ''}
                </span>`
            ).join('　');
            return `<div class="ctx-tree-node" data-role="${role}">
                <span class="ctx-role-tag" style="color:${color}">${ROLE_LABEL[role]}</span>
                <span>${items}</span>
            </div>`;
        }).join('');

    const panel = document.createElement('div');
    panel.className = 'ctx-panel';
    panel.onclick = e => e.stopPropagation(); // パネル内クリックはカードに伝播しない

    // 分詞検索のとき用法判定パネルを生成
    const hitEntry   = tokens.find(t =>
        cleanText(t) === hitWord ||
        (t.word||'').replace(/[.,:;·⸀⸁⸂⸃⌈⌉]/g,'') === hitWord
    );
    const isPtcSearch = params.mood === 'participle';
    const ptcHTML = (isPtcSearch && hitEntry)
        ? renderParticiplePanel(classifyParticiple(hitEntry, tokens), hitEntry, tokens)
        : '';

    panel.innerHTML = `
        <div class="ctx-raw" style="display:none">${rawLine}</div>
        <div class="ctx-label">構文分解</div>
        <div class="ctx-tree">
            <div class="ctx-tree-verb">
                <span class="ctx-role-tag" style="color:${ROLE_COLOR['verb']}">${ROLE_LABEL['verb']}</span>
                ${verbHTML}
            </div>
            ${branchHTML ? `<div class="ctx-tree-branch">${branchHTML}</div>` : ''}
        </div>
        ${ptcHTML}`;

    cardEl.appendChild(panel);
    cardEl.classList.add('card-open');
}

function buildAllChapterPaths() {

async function fetchInBatches(tasks,sz,onProg) {
    let all=[];
    for(let i=0;i<tasks.length;i+=sz) {
        const results=await Promise.allSettled(
            tasks.slice(i,i+sz).map(t=>
                fetch(t.path).then(r=>r.ok?r.json():null).catch(()=>null)
                .then(data=>{
                    if(!Array.isArray(data)) return null;
                    data.forEach(entry=>{entry._bookKey=t.key;});
                    return data;
                })
            )
        );
        results.forEach(r=>{if(r.status==='fulfilled'&&Array.isArray(r.value))all=all.concat(r.value);});
        onProg(Math.min(i+sz,tasks.length),tasks.length);
    }
    return all;
}

/* ── 確信度を言葉に変換 ─────────────────────────────── */
function confLabel(tense, mood) {
    /* 確定的な形（直説法・命令法）は高確信 */
    if (['indicative','imperative'].includes(mood)) return 'ほぼ確実にこう読めます';
    if (mood === 'participle') return 'この読みが有力ですが、文脈で変わります';
    if (mood === 'subjunctive') return '接続詞によって意味が変わります';
    if (mood === 'infinitive') return 'この読みが有力です';
    return 'この文だけでは判断できません';
}

/* ── 初学者UIを描画 ─────────────────────────────────── */
function renderBeginnerPanel() {
    const tense = params.tense;
    const mood  = params.mood;
    const key   = [tense, mood].filter(Boolean).join('+');
    const data  = READING_LABEL[key] || null;

    const mainEl    = document.getElementById('b-main');
    const confEl    = document.getElementById('b-conf');
    const altWrap   = document.getElementById('b-alt-wrap');
    const altEl     = document.getElementById('b-alt');
    const reasonEl  = document.getElementById('b-reason-body');

    if (!data) {
        /* テーブルに未登録の組み合わせ */
        mainEl.textContent  = [TENSE_JP[tense]||tense, MOOD_JP[mood]||mood].filter(Boolean).join('・') || '—';
        confEl.textContent  = '詳しく見るモードで内容を確認してください';
        altWrap.style.display = 'none';
        reasonEl.innerHTML  = '<div class="b-reason-item">この形態素の組み合わせの訳語は準備中です</div>';
        return;
    }

    /* メイン訳語 */
    mainEl.textContent = data.main;

    /* 確信度ラベル */
    confEl.textContent = confLabel(tense, mood);

    /* 他の可能性 */
    if (data.alt) {
        altEl.textContent = data.alt;
        altWrap.style.display = 'block';
    } else {
        altWrap.style.display = 'none';
    }

    /* 根拠 */
    let reasonHTML = data.reasons
        .map(r => `<div class="b-reason-item">${r}</div>`)
        .join('');
    if (data.caution) {
        reasonHTML += `<div class="b-caution">${data.caution}</div>`;
    }
    reasonEl.innerHTML = reasonHTML;
}

/* ── モード切替 ─────────────────────────────────────── */
let _currentMode = 'beginner';

function setMode(mode) {
    _currentMode = mode;
    const page = document.querySelector('.page');
    const btnB = document.getElementById('btn-beginner');
    const btnA = document.getElementById('btn-advanced');

    if (mode === 'beginner') {
        page.classList.add('beginner');
        btnB.classList.add('active');
        btnA.classList.remove('active');
    } else {
        page.classList.remove('beginner');
        btnB.classList.remove('active');
        btnA.classList.add('active');
    }
}

/* ── 初期化：デフォルトは初学者モード ──────────────── */
setMode('beginner');
renderBeginnerPanel();

(async function() {
    const loadEl=document.getElementById('loading');

    loadEl.innerHTML=`
        <div style="margin-bottom:10px;font-family:'Gentium Plus',serif;font-size:1.3rem;color:#ccc;">ἀναζητεῖ</div>
        <div style="width:100%;max-width:280px;margin:0 auto 8px;height:3px;background:#eee;border-radius:2px;overflow:hidden;">
            <div id="load-fill" style="height:100%;width:0%;background:var(--highlight);transition:width 0.25s ease;border-radius:2px;"></div>
        </div>
        <div id="load-status" style="font-size:0.72rem;color:#bbb;">データを読み込み中 (0 / ${total})...</div>`;

    const allData=await fetchInBatches(paths,20,(done,ttl)=>{
        const pct=Math.round(done/ttl*100);
        const f=document.getElementById('load-fill'),s=document.getElementById('load-status');
        if(f)f.style.width=pct+'%';
        if(s)s.textContent=`形態素データ読み込み中 (${done} / ${ttl}) ${pct}%`;
    });

    if(!allData.length){
        loadEl.innerHTML=`<p style="color:#c00;font-size:0.82rem;line-height:2.2;">データが見つかりませんでした。<br><code style="background:#f5f5f7;padding:2px 8px;border-radius:4px;">bible_data/ROM/1.json の形式で配置してください</code></p>`;
        return;
    }

    const s=document.getElementById('load-status');
    if(s)s.textContent='日本語訳を読み込み中...';
    await fetchJaData(paths);
    await fetchJapaneseTSV();

    window._morphData=allData;
    loadEl.style.display='none';
    listEl.style.display='flex';
    renderResults(allData);
})();

async function fetchJaData(morphPaths) {
    const jaPaths=morphPaths.map(t=>({key:t.key,ch:t.ch,path:`./${JA_FOLDER}/${t.key}/${t.ch}.json`}));
    const KEY_TO_CODE={};
    Object.entries(BOOK_MAP).forEach(([code,key])=>{KEY_TO_CODE[key]=code;});
    return Promise.allSettled(
        jaPaths.map(t=>
            fetch(t.path).then(r=>r.ok?r.json():null).catch(()=>null)
            .then(data=>{
                if(!data) return;
                const verses=data.verses;
                if(!verses||typeof verses!=='object') return;
                const bookCode=KEY_TO_CODE[t.key];
                if(!bookCode) return;
                const chStr=String(t.ch).padStart(2,'0');
                Object.entries(verses).forEach(([vNum,text])=>{
                    const vStr=String(parseInt(vNum)).padStart(2,'0');
                    _jaMap.set(`${bookCode}${chStr}${vStr}`,String(text));
                });
            })
        )
    );
}

const _japaneseMap = new Map();

async function fetchJapaneseTSV() {
    try {
        const res = await fetch('./macula-greek-SBLGNT.tsv');
        if (!res.ok) return;
        const text = await res.text();
        const lines = text.split('\n');
        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split('\t');
            if (cols.length < 12) continue;
            const normalized = (cols[11] || '').trim();
            const japanese   = (cols[6]  || '').trim();
            if (normalized && japanese && !_japaneseMap.has(normalized)) {
                _japaneseMap.set(normalized, japanese);
            }
        }
    } catch(e) {
        console.warn('TSV読み込み失敗:', e);
    }
}
/* ── meaning-card スクロールアウト → 固定バー表示 ────────
   カード自体は一切動かさず、独立した #meaning-sticky を
   固定表示することでレイアウトのガタつきをゼロにする
   ===================================================== */
(function () {
    const card   = document.getElementById('meaning-card');
    const sticky = document.getElementById('meaning-sticky');

    const observer = new IntersectionObserver(
        ([entry]) => {
            if (!entry.isIntersecting) {
                // カードが画面外 → 固定バーを表示
                sticky.textContent = document.getElementById('meaning-title').textContent;
                sticky.classList.add('visible');
            } else {
                // カードが画面内 → 固定バーを非表示
                sticky.classList.remove('visible');
            }
        },
        { threshold: 0, rootMargin: '0px 0px 0px 0px' }
    );
    observer.observe(card);
})();
