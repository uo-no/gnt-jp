<style>

<script>
/* ── ラベルマップ ─────────────────────────────────────── */
const TENSE_JP  = { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了', pluperfect:'過去完了' };
const VOICE_JP  = { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動', 'middle or passive':'中動/受動' };
const MOOD_JP   = { indicative:'直説法', subjunctive:'接続法', optative:'希求法', imperative:'命令法', infinitive:'不定詞', participle:'分詞' };
const GENDER_JP = { masculine:'男性', feminine:'女性', neuter:'中性' };
const NUMBER_JP = { singular:'単数', plural:'複数' };
const CASE_JP   = { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' };
const POS_JP    = { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞' };
const MOOD_DESC = {
    participle:'継続・進行中の動作を表す分詞形。「〜している者」という含意を持ちます。',
    indicative:'事実として起きていることを述べる直説法。文の主軸となる形式です。',
    imperative:'命令・要求を表す命令法。現在命令は反復継続の命令を表します。',
    subjunctive:'可能性・目的を表す接続法。条件節や目的節で使われます。',
    infinitive:'動詞の不定詞形。「〜すること」と訳せます。',
    optative:'願望・婉曲を表す希求法。新約ではやや稀な形式です。',
};

/* ── BOOK_MAP ───────────────────────────────────────── */
const BOOK_MAP = {
    '01':'MAT','02':'MRK','03':'LUK','04':'JHN','05':'ACT',
    '06':'ROM','07':'1CO','08':'2CO','09':'GAL','10':'EPH',
    '11':'PHP','12':'COL','13':'1TH','14':'2TH','15':'1TI',
    '16':'2TI','17':'TIT','18':'PHM','19':'HEB','20':'JAS',
    '21':'1PE','22':'2PE','23':'1JN','24':'2JN','25':'3JN',
    '26':'JUD','27':'REV'
};

const BOOK_GROUPS = [
    { key:'pauline',  label:'パウロ書簡', books:['ROM','1CO','2CO','GAL','1TH','2TH'] },
    { key:'prison',   label:'獄中書簡',   books:['EPH','PHP','COL','PHM'] },
    { key:'pastoral', label:'牧会書簡',   books:['1TI','2TI','TIT'] },
];

function getBookKey(entry) {
    if (entry._bookKey) return entry._bookKey;
    if (entry.book && isNaN(entry.book)) return String(entry.book);
    if (entry.book != null && entry.book !== '') {
        return BOOK_MAP[String(entry.book).padStart(2,'0')] || null;
    }
    if (entry.ref) {
        const m = String(entry.ref).match(/^([A-Z0-9]+)/);
        if (m) return m[1];
    }
    return null;
}

/* ── URLパラメータ ───────────────────────────────────── */
function getSearchParams() {
    const p = new URLSearchParams(location.search);
    const dis = new Set((p.get('_disabled')||'').split(',').filter(Boolean));
    return {
        pos:    p.get('pos')   || '',
        tense:  p.get('tense') || '',
        mood:   p.get('mood')  || '',
        voice:  p.get('voice') || '',
        gender: { value: p.get('gender')||'', enabled: !dis.has('gender') },
        number: { value: p.get('number')||'', enabled: !dis.has('number') },
        case:   { value: p.get('case')  ||'', enabled: !dis.has('case')   },
        ref:    p.get('ref')   || '',
        word:   p.get('word')  || '',
        lemma:  p.get('lemma') || '',
    };
}
const params = getSearchParams();

let extState = [
    { key:'gender', label:'性', value: params.gender.value, enabled: params.gender.enabled },
    { key:'number', label:'数', value: params.number.value, enabled: params.number.enabled },
    { key:'case',   label:'格', value: params.case.value,   enabled: params.case.enabled   },
].filter(f => f.value);

let bookState = BOOK_GROUPS.map(g => ({ ...g, enabled: true }));

/* ── 語形フィルター状態 ──────────────────────────────
   'none'  : フィルターなし（全件）
   'lemma' : lemma一致（同じ原形の全変化形）
   'word'  : 語形完全一致（表示形が同じものだけ）
   ===================================================== */
let wordFilterMode = params.word ? 'word' : (params.lemma ? 'lemma' : 'none');

// アクセント・気息符号を除去して比較用に正規化
function normalizeGreek(str) {
    return (str || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')   // 結合文字（アクセント等）除去
        .replace(/[⸀⸁⸂⸃⌈⌉.,;:·]/g, '')
        .replace(/ς/g, 'σ')               // 語末シグマを統一
        .toLowerCase()
        .trim();
}

function syncURL() {
    const p = new URLSearchParams(location.search);
    const dis = extState.filter(f=>!f.enabled).map(f=>f.key);
    if (dis.length) p.set('_disabled', dis.join(','));
    else p.delete('_disabled');
    history.replaceState(null,'','?'+p.toString());
}

/* ── 品詞コード変換 ─────────────────────────────────── */
const CLASS_TO_POS = {
    'verb':'V','noun':'N','adjective':'A','article':'T',
    'preposition':'P','conjunction':'C','adverb':'D',
    'particle':'X','pronoun':'P','relative pronoun':'R',
    'personal pronoun':'P','demonstrative pronoun':'D',
};
function entryPosCode(entry) {
    if (entry.pos) return String(entry.pos).replace(/-$/,'').toUpperCase();
    if (entry.class) return CLASS_TO_POS[String(entry.class).toLowerCase()] || '';
    return '';
}

/* ── 形態素デコード ─────────────────────────────────── */
const TENSE_CODE  = { P:'present',I:'imperfect',F:'future',A:'aorist',X:'perfect',Z:'pluperfect' };
const VOICE_CODE  = { A:'active',M:'middle',P:'passive',D:'middle deponent',E:'middle or passive',N:'middle or passive' };
const MOOD_CODE   = { I:'indicative',S:'subjunctive',O:'optative',M:'imperative',N:'infinitive',P:'participle' };
const CASE_CODE   = { N:'nominative',G:'genitive',D:'dative',A:'accusative',V:'vocative' };
const NUMBER_CODE = { S:'singular',P:'plural' };
const GENDER_CODE = { M:'masculine',F:'feminine',N:'neuter' };

function decodeMorph(entry) {
    const norm = v => (!v || v === '-') ? '' : v;
    if (entry.tense || entry.mood || entry.voice) {
        return {
            pos:    entryPosCode(entry),
            tense:  norm(entry.tense), voice: norm(entry.voice), mood:   norm(entry.mood),
            case:   norm(entry.case),  number:norm(entry.number),gender: norm(entry.gender),
            person: norm(entry.person),
        };
    }
    if (entry.morph && typeof entry.morph === 'object') {
        const m = entry.morph;
        return {
            pos: norm(entry.pos||'').replace(/-$/,''),
            tense:norm(m.tense),voice:norm(m.voice),mood:norm(m.mood),
            case:norm(m.case),number:norm(m.number),gender:norm(m.gender),person:norm(m.person),
        };
    }
    const raw = typeof entry.morph === 'string' ? entry.morph : '';
    const parts = raw.split('-');
    const pos = norm(entry.pos||parts[0]||'').replace(/-$/,'');
    if (pos.toUpperCase() === 'V' && parts[1]) {
        const seg = parts[1], off = /^[0-9]/.test(seg) ? 1 : 0;
        return { pos, tense:TENSE_CODE[seg[off]]||'', voice:VOICE_CODE[seg[off+1]]||'',
                 mood:MOOD_CODE[seg[off+2]]||'', person:seg[off+3]||'',
                 number:NUMBER_CODE[seg[off+4]]||'', gender:'', case:'' };
    }
    if (parts[1]) {
        const seg=parts[1], hp=['1','2','3'].includes(seg[0]), b=hp?seg.slice(1):seg;
        return { pos, tense:'',voice:'',mood:'', person:hp?seg[0]:'',
                 case:CASE_CODE[b[0]]||'', number:NUMBER_CODE[b[1]]||'', gender:GENDER_CODE[b[2]]||'' };
    }
    return { pos, tense:'',voice:'',mood:'',case:'',number:'',gender:'',person:'' };
}

/* ── マッチング ─────────────────────────────────────── */
function matchEntry(entry) {
    /* ── 語形フィルター ── */
    if (wordFilterMode === 'lemma' && params.lemma) {
        const entryLemma = normalizeGreek(entry.lemma || '');
        const targetLemma = normalizeGreek(params.lemma);
        if (entryLemma !== targetLemma) return false;
    } else if (wordFilterMode === 'word' && params.word) {
        const entryWord = normalizeGreek(entry.word || entry.normalized || entry.text || '');
        const targetWord = normalizeGreek(params.word);
        if (entryWord !== targetWord) return false;
    }
    if (!bookState.every(g => g.enabled)) {
        const enabledBooks = new Set(bookState.filter(g=>g.enabled).flatMap(g=>g.books));
        const bk = entry._bookKey || getBookKey(entry);
        if (!bk || !enabledBooks.has(bk)) return false;
    }
    const sp = params.pos.replace(/-$/,'').toUpperCase();
    if (sp && entryPosCode(entry) !== sp) return false;
    const m = decodeMorph(entry);
    if (params.tense && m.tense !== params.tense) return false;
    if (params.mood  && m.mood  !== params.mood)  return false;
    if (params.voice) {
        const ok = m.voice === params.voice
            || (params.voice==='middle'  && (m.voice==='middle deponent'||m.voice==='middle or passive'))
            || (params.voice==='passive' && m.voice==='middle or passive');
        if (!ok) return false;
    }
    for (const f of extState) {
        if (!f.enabled || !f.value) continue;
        if ((m[f.key]||'') !== f.value) return false;
    }
    return true;
}

/* ── 説明文 ─────────────────────────────────────────── */
function buildDescription() {
    const tense=TENSE_JP[params.tense]||params.tense, voice=VOICE_JP[params.voice]||params.voice;
    const mood=MOOD_JP[params.mood]||params.mood, pos=POS_JP[params.pos.replace(/-$/,'')]||params.pos;
    const MAP={gender:GENDER_JP,number:NUMBER_JP,case:CASE_JP};
    const extP=extState.filter(f=>f.enabled&&f.value).map(f=>MAP[f.key]?.[f.value]||f.value);
    const isMO=['participle','infinitive'].includes(params.mood);
    const core=isMO?[mood,tense,voice].filter(Boolean).join(''):[pos,mood,tense,voice].filter(Boolean).join('');
    const ext=extP.length?`（${extP.join('・')}）`:'';
    const relaxed=extState.some(f=>!f.enabled);
    const sub=relaxed?'拡張条件を一部解除中 — より広い分布を表示しています。':(MOOD_DESC[params.mood]||'選択された形態素に完全一致する語形を検索しています。');
    return { title:`${core}${ext}を抽出しています`, sub };
}

/* ── 日本語訳 ───────────────────────────────────────── */
const _refToJaKey = (() => {
    const KEY_TO_CODE = {};
    Object.entries(BOOK_MAP).forEach(([code,key])=>{KEY_TO_CODE[key]=code;});
    return function(ref) {
        const m=String(ref||'').match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
        if(!m) return null;
        const code=KEY_TO_CODE[m[1]];
        if(!code) return null;
        return `${code}${String(m[2]).padStart(2,'0')}${String(m[3]).padStart(2,'0')}`;
    };
})();
function getJaVerse(entry) {
    const key=_refToJaKey(entry.ref);
    if(key&&_jaMap.has(key)) return _jaMap.get(key);
    return entry.gloss||entry.english||'';
}

/* ① 書物別分布を集計 */
function calcDistribution(matched) {
    const counts = {};
    matched.forEach(e => {
        const bk = e._bookKey || getBookKey(e) || '?';
        counts[bk] = (counts[bk] || 0) + 1;
    });
    return Object.entries(counts)
        .sort((a,b) => b[1] - a[1])
        .map(([key, count]) => ({ key, count, label: BOOK_JP[key] || key }));
}

/* ② 用法パターンを分析（ルールベース） */
function analyzePatterns(matched) {
    const total = matched.length;
    if (!total) return [];
    const patterns = [];

    // 直前・直後のトークンを参照するために節ごとにグループ化
    const verseMap = {};
    matched.forEach(e => {
        const prefix = String(e.ref||'').replace(/!.*$/,'').trim();
        if (!verseMap[prefix]) verseMap[prefix] = e;
    });
    const verseCount = Object.keys(verseMap).length;

    // 前置詞句との共起
    let withPrep = 0;
    matched.forEach(e => {
        const prefix = String(e.ref||'').replace(/!.*$/,'').trim();
        const tokens = window._morphData
            ? window._morphData.filter(t => String(t.ref||'').replace(/!.*$/,'').trim() === prefix)
            : [];
        if (tokens.some(t => entryPosCode(t) === 'P')) withPrep++;
    });
    const prepPct = Math.round(withPrep / total * 100);
    if (prepPct >= 50) patterns.push(`約${prepPct}%の用例で前置詞句と共起する`);

    // 主語との共起分析
    let withSubj = 0;
    matched.forEach(e => {
        const prefix = String(e.ref||'').replace(/!.*$/,'').trim();
        const tokens = window._morphData
            ? window._morphData.filter(t => String(t.ref||'').replace(/!.*$/,'').trim() === prefix)
            : [];
        if (tokens.some(t => {
            const m = decodeMorph(t);
            return ['N','T','A'].includes(m.pos?.toUpperCase()||'') && m.case === 'nominative';
        })) withSubj++;
    });
    const subjPct = Math.round(withSubj / total * 100);
    if (subjPct >= 60) patterns.push(`約${subjPct}%の用例に明示的な主語が現れる`);
    else if (subjPct < 40) patterns.push(`主語が省略される用例が多い（文脈から補われる）`);

    // 目的語の有無
    let withObj = 0;
    matched.forEach(e => {
        const prefix = String(e.ref||'').replace(/!.*$/,'').trim();
        const tokens = window._morphData
            ? window._morphData.filter(t => String(t.ref||'').replace(/!.*$/,'').trim() === prefix)
            : [];
        if (tokens.some(t => {
            const m = decodeMorph(t);
            return ['N','T'].includes(m.pos?.toUpperCase()||'') && m.case === 'accusative';
        })) withObj++;
    });
    const objPct = Math.round(withObj / total * 100);
    if (objPct >= 55) patterns.push(`約${objPct}%の用例に目的語（対格）を伴う`);

    // 書物分布の偏り
    const dist = calcDistribution(matched);
    if (dist.length > 0) {
        const topBook = dist[0];
        const topPct = Math.round(topBook.count / total * 100);
        if (topPct >= 30 && dist.length > 2) {
            patterns.push(`${topBook.label}に集中（全体の${topPct}%）`);
        } else if (dist.length <= 2) {
            patterns.push(`${dist.map(d=>d.label).join('・')}のみに登場`);
        } else {
            patterns.push(`パウロ書簡全体に均等に分布している`);
        }
    }

    // 法・時制の組み合わせ特徴
    const moodLabel = MOOD_JP[params.mood] || '';
    const tenseLabel = TENSE_JP[params.tense] || '';
    if (params.mood === 'imperative' && params.tense === 'present') {
        patterns.push(`現在命令形 — 反復・継続的な行為を促す`);
    } else if (params.mood === 'imperative' && params.tense === 'aorist') {
        patterns.push(`アオリスト命令形 — 一回的・即時的な行為を促す`);
    } else if (params.mood === 'subjunctive') {
        patterns.push(`接続法 — 条件・目的・願望を表す節内で使われやすい`);
    } else if (params.mood === 'participle' && params.tense === 'present') {
        patterns.push(`現在分詞 — 主動詞と同時進行する動作を表す`);
    } else if (params.mood === 'participle' && params.tense === 'aorist') {
        patterns.push(`アオリスト分詞 — 主動詞より先に完了した動作を表す`);
    }

    return patterns.slice(0, 4);
}

/* ③ 代表用例を選出（節が短い＋ヒット語を含む） */
/* ═══════════════════════════════════════════════════════════════
   用例選出モジュール — コイネーギリシャ語形態論検索
   既存のグローバル関数 decodeMorph / entryPosCode / cleanText に依存
   ═══════════════════════════════════════════════════════════════ */

function scoreVerse(tokens, hitWord) {
    let score = 0;
    const wordCount = tokens.length;
    let hasVerb = false;
    let hasSubj = false;
    let hasObj  = false;
    let hasPrep = false;
    let hasHit  = false;

    for (const t of tokens) {
        const m   = decodeMorph(t);
        const pos = (m.pos || '').toUpperCase();
        const w   = cleanText(t);

        if (w && normalizeGreek(w) === normalizeGreek(hitWord)) hasHit = true;
        if (pos === 'V' && m.mood && m.mood !== 'participle' && m.mood !== 'infinitive') hasVerb = true;
        if (pos === 'P') hasPrep = true;
        if (['N','T','A','D','R'].includes(pos)) {
            if (m.case === 'nominative') hasSubj = true;
            if (m.case === 'accusative') hasObj  = true;
        }
    }

    if (hasHit)  score += 30;
    if (hasVerb) score += 20;
    if (hasSubj) score += 15;
    if (hasObj)  score += 12;
    if (hasPrep) score +=  8;

    if      (wordCount >= 4  && wordCount <= 7)  score += 15;
    else if (wordCount >= 8  && wordCount <= 12) score +=  8;
    else if (wordCount >= 13 && wordCount <= 18) score +=  2;
    else if (wordCount > 18)  score -= 10;
    else if (wordCount <= 3)  score -=  5;

    score += [hasVerb, hasSubj, hasObj].filter(Boolean).length * 3;

    return score;
}

function classifyVerseType(tokens) {
    let hasVerb = false;
    let hasSubj = false;
    let hasPrep = false;

    for (const t of tokens) {
        const m   = decodeMorph(t);
        const pos = (m.pos || '').toUpperCase();
        if (pos === 'V' && m.mood && m.mood !== 'participle' && m.mood !== 'infinitive') hasVerb = true;
        if (pos === 'P') hasPrep = true;
        if (['N','T','A','D','R'].includes(pos) && m.case === 'nominative') hasSubj = true;
    }

    if (!hasVerb) return 'other';
    if (hasPrep)  return 'prep';
    if (hasSubj)  return 'basic';
    return 'ellipsis';
}

function selectBestExamples(matchedEntries, morphData, limit = 4) {
    if (!matchedEntries.length || !morphData) return [];

    const seenVerses = new Set();
    const candidates = [];

    for (const entry of matchedEntries) {
        const verseId = String(entry.ref || '').replace(/!.*$/, '').trim();
        if (!verseId || seenVerses.has(verseId)) continue;
        seenVerses.add(verseId);

        const tokens = morphData.filter(t =>
            String(t.ref || '').replace(/!.*$/, '').trim() === verseId
        );
        if (!tokens.length) continue;

        const hitWord = entry.word || entry.normalized || entry.text || '';
        const score   = scoreVerse(tokens, hitWord);
        const type    = classifyVerseType(tokens);
        const ja      = (typeof getJaVerse === 'function') ? getJaVerse(entry) : '';

        candidates.push({ entry, tokens, score, type, ja });
    }

    candidates.sort((a, b) => b.score - a.score);

    const TYPE_PRIORITY = ['basic', 'prep', 'ellipsis', 'other'];
    const selected = [];

    for (const type of TYPE_PRIORITY) {
        if (selected.length >= limit) break;
        const best = candidates.find(c => c.type === type && !selected.includes(c));
        if (best) selected.push(best);
    }

    for (const c of candidates) {
        if (selected.length >= limit) break;
        if (!selected.includes(c)) selected.push(c);
    }

    return selected;
}

function selectTopExample(matchedEntries, morphData) {
    const results = selectBestExamples(matchedEntries, morphData, 1);
    return results.length ? results[0] : null;
}

function getExampleDescription(example) {
    if (!example) return '';
    const { type, tokens } = example;
    let hasObj = false;
    let verbMood = '';

    for (const t of tokens) {
        const m   = decodeMorph(t);
        const pos = (m.pos || '').toUpperCase();
        if (['N','T','A','D','R'].includes(pos) && m.case === 'accusative') hasObj = true;
        if (pos === 'V' && m.mood && m.mood !== 'participle' && m.mood !== 'infinitive') verbMood = m.mood || '';
    }

    switch (type) {
        case 'basic':
            return hasObj ? '主語・動詞・目的語が揃った典型的な構文です' : '主語と動詞が明示された基本構文です';
        case 'prep':
            return hasObj ? '目的語と前置詞句を伴う、関係性が明確な構文です' : '前置詞句を伴う用法を示しています';
        case 'ellipsis':
            return verbMood === 'imperative' ? '主語が省略された命令形の用例です（動詞中心の構造）' : '主語が省略され、動詞を中心として展開する構文です';
        default:
            return 'この形の用法を示す用例です';
    }
}

                <!-- 書物別行 -->
                ${dist.map(d => `
                    <div class="dist-row">
                        <span class="dist-book">${d.label}</span>

                            <div class="dist-bar-fill" style="width:${Math.round(d.count/barBase*100)}%"></div>
                        </div>
                        <span class="dist-count">${d.count}</span>

    // ② 用法パターン

/* ── ページネーション ───────────────────────────────── */
let _currentRows = [];
let _displayCount = 100;
const PAGE_SIZE = 100;

function renderResults(allData) {
    const matched = allData.filter(matchEntry);
    const sp      = params.pos.replace(/-$/,'');
    const samePos = allData.filter(e=>(e.pos||'').replace(/-$/,'').toUpperCase()===sp.toUpperCase()).length;
    document.getElementById('count').textContent      = matched.length.toLocaleString();
    document.getElementById('result-pct').textContent = samePos>0 ? `同品詞 ${samePos.toLocaleString()} 件中` : '';
    _currentRows  = matched;
    _displayCount = PAGE_SIZE;
    renderInsight(matched, samePos);  // ← インサイト更新
    renderPage();
}

function renderPage() {
    const el   = document.getElementById('result-list');
    const rows = _currentRows;

    if (!rows.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">∅</div>条件に一致する語形が見つかりませんでした。<br>拡張条件をOFFにするか、書物範囲を広げてみてください。</div>`;
        return;
    }

    const slice = rows.slice(0, _displayCount);
    const more  = rows.length - _displayCount;

    el.innerHTML = slice.map((entry, idx) => {
        const word     = entry.word || entry.normalized || entry.text || '';
        const refLabel = buildRefLabel(entry.ref);
        const jaText   = getJaVerse(entry);
        const mainHTML = jaText
            ? `<span class="result-ja">${jaText}</span>`
            : `<span class="result-word">${word}</span><span class="result-lemma">${entry.lemma||''}</span>`;
        return `<div class="result-card animate-in" style="animation-delay:${Math.min(idx*10,300)}ms"
            onclick="toggleContext(this, '${entry.ref||''}', '${encodeURIComponent(word)}')">
            <div class="result-top">
                <div class="result-main">${mainHTML}</div>
                <span class="result-ref">${refLabel}</span>
            </div>
        </div>`;
    }).join('');

    if (more > 0) {
        el.innerHTML += `<div style="text-align:center;padding:20px 0;">
            <button onclick="loadMore()" style="padding:8px 24px;font-size:0.8rem;font-family:inherit;
                border:1px solid var(--border-soft);border-radius:20px;background:transparent;
                cursor:pointer;color:var(--text-sub);transition:background 0.12s;">
                さらに表示（残り ${more.toLocaleString()} 件）
            </button></div>`;
    }
}

function buildRefLabel(ref) {
    const r = String(ref||'');
    const m = r.match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
    if (m) return `${BOOK_JP[m[1]]||m[1]} ${m[2]}:${m[3]}`;
    if (r.length===6 && /^\d+$/.test(r)) {
        const bk=BOOK_MAP[r.slice(0,2)];
        return `${(bk&&BOOK_JP[bk])||bk||r.slice(0,2)} ${parseInt(r.slice(2,4))}:${parseInt(r.slice(4,6))}`;
    }
    return r;
}

function loadMore() {
    _displayCount += PAGE_SIZE;
    renderPage();
}

/* ── インタラクション ───────────────────────────────── */
function toggleExt(i)  { extState[i].enabled=!extState[i].enabled;  renderExtChips();  renderMeaning(); syncURL(); if(window._morphData)renderResults(window._morphData); }
function toggleBook(i) { bookState[i].enabled=!bookState[i].enabled; renderBookChips(); if(window._morphData)renderResults(window._morphData); }
function goToWord(ref,enc) {
    const word=decodeURIComponent(enc);
    if(window.opener&&!window.opener.closed) window.opener.postMessage({type:'GO_TO_REF',ref,word},'*');
}

/* ── 構文ツリー（階層表示） ─────────────────────────── */
function getVerseTokens(ref) {
    if (!window._morphData || !ref) return [];
    const prefix = String(ref).replace(/!.*$/,'').trim();
    return window._morphData.filter(e => String(e.ref||'').replace(/!.*$/,'').trim() === prefix);
}
function cleanText(e) {
    return (e.word||e.normalized||e.text||'').replace(/[.,:;·⸀⸁⸂⸃⌈⌉]/g,'').trim();
}
function getRole(entry) {
    const m=decodeMorph(entry), pos=m.pos.toUpperCase();
    if (pos==='V') return (!m.mood||m.mood==='infinitive'||m.mood==='participle')?'mod':'verb';
    if (pos==='P') return 'prep';
    if (['N','T','A','D','R'].includes(pos)) {
        if (m.case==='nominative') return 'subj';
        if (m.case==='accusative') return 'obj';
        if (m.case==='genitive'||m.case==='dative') return 'phr';
        return 'other';
    }
    return 'other';
}
function groupTokens(tokens) {
    const groups=[]; let i=0;
    while (i<tokens.length) {
        const e=tokens[i], role=getRole(e);
        if (role==='prep') {
            const members=[e]; let j=i+1;
            while (j<tokens.length) {
                const nr=getRole(tokens[j]);
                if (['subj','obj','phr','other'].includes(nr)&&decodeMorph(tokens[j]).pos.toUpperCase()!=='P') {
                    members.push(tokens[j]); j++;
                } else break;
            }
            groups.push({role:'prep',members}); i=j;
        } else {
            groups.push({role,members:[e]}); i++;
        }
    }
    return groups;
}

const ROLE_LABEL = { verb:'動詞', subj:'主語', obj:'目的語', phr:'修飾', prep:'前置詞句', mod:'準動詞', other:'' };
const ROLE_COLOR = { verb:'#4a7fa5', subj:'#5a8a6e', obj:'#9a6040', phr:'#888', prep:'#7a6aa0', mod:'#a09050', other:'' };

function toggleContext(cardEl, ref, wordEnc) {
    const hitWord = decodeURIComponent(wordEnc);
    const existing = cardEl.querySelector('.ctx-panel');
    if (existing) {
        const open = existing.style.display !== 'none';
        existing.style.display = open ? 'none' : 'block';
        cardEl.classList.toggle('card-open', !open);
        return;
    }

    const tokens = getVerseTokens(ref);
    if (!tokens.length) return;

    const groups = groupTokens(tokens);
    const ORDER  = ['verb','subj','obj','prep','phr','mod'];
    const buckets = {};
    ORDER.forEach(r => buckets[r] = []);

    groups.forEach(g => {
        const text  = g.members.map(cleanText).filter(Boolean).join(' ');
        if (!text) return;
        const isHit = g.members.some(m => cleanText(m) === hitWord ||
            (m.word||'').replace(/[.,:;·⸀⸁⸂⸃⌈⌉]/g,'') === hitWord);
        if (ORDER.includes(g.role)) buckets[g.role].push({ text, isHit });
    });

    /* ── 階層ツリーHTML生成 ── */
    // 動詞ノード（ルート）
    const verbItems = buckets['verb'];
    const verbHTML = verbItems.length
        ? verbItems.map(item => `
            <span class="ctx-greek${item.isHit?' hit':''}">${item.text}</span>`).join(' ')
        : '<span style="color:#ccc;font-size:0.8rem;">（動詞なし）</span>';

    // 原文行（非表示・データ保持用）
    const rawLine = tokens.map(e => {
        const t = cleanText(e); if (!t) return '';
        const isHit = t === hitWord || (e.word||'').replace(/[.,:;·⸀⸁⸂⸃⌈⌉]/g,'') === hitWord;
        return isHit ? `<span style="color:var(--highlight);font-weight:700;">${t}</span>` : `<span>${t}</span>`;
    }).filter(Boolean).join(' ');

    // 枝ノード（主語・目的語・前置詞句・修飾）
    const branchRoles = ['subj','obj','prep','phr','mod'];
    const branchHTML = branchRoles
        .filter(r => buckets[r].length > 0 && ROLE_LABEL[r])
        .map(role => {
            const color = ROLE_COLOR[role];
            const items = buckets[role].map(item =>
                `<span class="ctx-greek${item.isHit?' hit':''}">${item.text}</span>`
            ).join('　');
            return `<div class="ctx-tree-node" data-role="${role}">
                <span class="ctx-role-tag" style="color:${color}">${ROLE_LABEL[role]}</span>
                <span>${items}</span>
            </div>`;
        }).join('');

    const panel = document.createElement('div');
    panel.className = 'ctx-panel';
    panel.innerHTML = `
        <div class="ctx-raw" style="display:none">${rawLine}</div>
        <div class="ctx-label">構文分解</div>
        <div class="ctx-tree">
            <div class="ctx-tree-verb">
                <span class="ctx-role-tag" style="color:${ROLE_COLOR['verb']}">${ROLE_LABEL['verb']}</span>
                ${verbHTML}
            </div>
            ${branchHTML ? `<div class="ctx-tree-branch">${branchHTML}</div>` : ''}
        </div>`;

    cardEl.appendChild(panel);
    cardEl.classList.add('card-open');
}

/* ── 書物日本語名 ───────────────────────────────────── */
const BOOK_JP = {
    MAT:'マタイ',MRK:'マルコ',LUK:'ルカ',JHN:'ヨハネ',ACT:'使徒',
    ROM:'ローマ','1CO':'Ⅰコリント','2CO':'Ⅱコリント',
    GAL:'ガラテヤ',EPH:'エペソ',PHP:'ピリピ',COL:'コロサイ',
    '1TH':'Ⅰテサロニケ','2TH':'Ⅱテサロニケ',
    '1TI':'Ⅰテモテ','2TI':'Ⅱテモテ',TIT:'テトス',PHM:'ピレモン',
    HEB:'ヘブル',JAS:'ヤコブ','1PE':'Ⅰペテロ','2PE':'Ⅱペテロ',
    '1JN':'Ⅰヨハネ','2JN':'Ⅱヨハネ','3JN':'Ⅲヨハネ',JUD:'ユダ',REV:'黙示録',
    GEN:'創世記',EXO:'出エジプト',LEV:'レビ',NUM:'民数',DEU:'申命',
    JOS:'ヨシュア',JDG:'士師',RUT:'ルツ','1SA':'Ⅰサムエル','2SA':'Ⅱサムエル',
    '1KI':'Ⅰ列王','2KI':'Ⅱ列王',PSA:'詩篇',PRO:'箴言',ECC:'伝道',
    ISA:'イザヤ',JER:'エレミヤ',EZK:'エゼキエル',DAN:'ダニエル',
};

/* ── データ読み込み ─────────────────────────────────── */
const JA_FOLDER = 'bible_jp';
const _jaMap = new Map();

const ALL_BOOKS = [
    {key:'ROM',ch:16},{key:'1CO',ch:16},{key:'2CO',ch:13},{key:'GAL',ch:6},
    {key:'EPH',ch:6}, {key:'PHP',ch:4}, {key:'COL',ch:4}, {key:'1TH',ch:5},
    {key:'2TH',ch:3}, {key:'1TI',ch:6}, {key:'2TI',ch:4}, {key:'TIT',ch:3},
    {key:'PHM',ch:1},
];
function buildAllChapterPaths() {
    const p=[];
    for(const b of ALL_BOOKS) for(let c=1;c<=b.ch;c++) p.push({key:b.key,ch:c,path:`./bible_data/${b.key}/${c}.json`});
    return p;
}
async function fetchInBatches(tasks,sz,onProg) {
    let all=[];
    for(let i=0;i<tasks.length;i+=sz) {
        const results=await Promise.allSettled(
            tasks.slice(i,i+sz).map(t=>
                fetch(t.path).then(r=>r.ok?r.json():null).catch(()=>null)
                .then(data=>{
                    if(!Array.isArray(data)) return null;
                    data.forEach(entry=>{entry._bookKey=t.key;});
                    return data;
                })
            )
        );
        results.forEach(r=>{if(r.status==='fulfilled'&&Array.isArray(r.value))all=all.concat(r.value);});
        onProg(Math.min(i+sz,tasks.length),tasks.length);
    }
    return all;
}

renderBreadcrumb(); renderCoreChips(); renderExtChips(); renderBookChips(); renderWordFilterChips(); renderMeaning();

(async function() {
    const loadEl=document.getElementById('loading');
    const listEl=document.getElementById('result-list');
    const paths=buildAllChapterPaths();
    const total=paths.length;

    loadEl.innerHTML=`
        <div style="margin-bottom:10px;font-family:'Gentium Plus',serif;font-size:1.3rem;color:#ccc;">ἀναζητεῖ</div>
        <div style="width:100%;max-width:280px;margin:0 auto 8px;height:3px;background:#eee;border-radius:2px;overflow:hidden;">
            <div id="load-fill" style="height:100%;width:0%;background:var(--highlight);transition:width 0.25s ease;border-radius:2px;"></div>
        </div>
        <div id="load-status" style="font-size:0.72rem;color:#bbb;">データを読み込み中 (0 / ${total})...</div>`;

    const allData=await fetchInBatches(paths,20,(done,ttl)=>{
        const pct=Math.round(done/ttl*100);
        const f=document.getElementById('load-fill'),s=document.getElementById('load-status');
        if(f)f.style.width=pct+'%';
        if(s)s.textContent=`形態素データ読み込み中 (${done} / ${ttl}) ${pct}%`;
    });

    if(!allData.length){
        loadEl.innerHTML=`<p style="color:#c00;font-size:0.82rem;line-height:2.2;">データが見つかりませんでした。<br><code style="background:#f5f5f7;padding:2px 8px;border-radius:4px;">bible_data/ROM/1.json の形式で配置してください</code></p>`;
        return;
    }

    const s=document.getElementById('load-status');
    if(s)s.textContent='日本語訳を読み込み中...';
    await fetchJaData(paths);

    window._morphData=allData;
    loadEl.style.display='none';
    listEl.style.display='flex';
    renderResults(allData);
})();

async function fetchJaData(morphPaths) {
    const jaPaths=morphPaths.map(t=>({key:t.key,ch:t.ch,path:`./${JA_FOLDER}/${t.key}/${t.ch}.json`}));
    const KEY_TO_CODE={};
    Object.entries(BOOK_MAP).forEach(([code,key])=>{KEY_TO_CODE[key]=code;});
    return Promise.allSettled(
        jaPaths.map(t=>
            fetch(t.path).then(r=>r.ok?r.json():null).catch(()=>null)
            .then(data=>{
                if(!data) return;
                const verses=data.verses;
                if(!verses||typeof verses!=='object') return;
                const bookCode=KEY_TO_CODE[t.key];
                if(!bookCode) return;
                const chStr=String(t.ch).padStart(2,'0');
                Object.entries(verses).forEach(([vNum,text])=>{
                    const vStr=String(parseInt(vNum)).padStart(2,'0');
                    _jaMap.set(`${bookCode}${chStr}${vStr}`,String(text));
                });
            })
        )
    );
}
