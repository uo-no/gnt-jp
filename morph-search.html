<script>
/* в”Җв”Җ гғ©гғҷгғ«гғһгғғгғ— в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
const TENSE_JP  = { present:'зҸҫеңЁ', imperfect:'жңӘе®ҢдәҶ', future:'жңӘжқҘ', aorist:'гӮўгӮӘгғӘгӮ№гғҲ', perfect:'е®ҢдәҶ', pluperfect:'йҒҺеҺ»е®ҢдәҶ' };
const VOICE_JP  = { active:'иғҪеӢ•', middle:'дёӯеӢ•', passive:'еҸ—еӢ•', 'middle deponent':'дёӯеӢ•иҮӘеӢ•', 'middle or passive':'дёӯеӢ•/еҸ—еӢ•' };
const MOOD_JP   = { indicative:'зӣҙиӘ¬жі•', subjunctive:'жҺҘз¶ҡжі•', optative:'еёҢжұӮжі•', imperative:'е‘Ҫд»Өжі•', infinitive:'дёҚе®ҡи©һ', participle:'еҲҶи©һ' };
const GENDER_JP = { masculine:'з”·жҖ§', feminine:'еҘіжҖ§', neuter:'дёӯжҖ§' };
const NUMBER_JP = { singular:'еҚҳж•°', plural:'иӨҮж•°' };
const CASE_JP   = { nominative:'дё»ж ј', genitive:'еұһж ј', dative:'дёҺж ј', accusative:'еҜҫж ј', vocative:'е‘јж ј' };
const POS_JP    = { V:'еӢ•и©һ', N:'еҗҚи©һ', A:'еҪўе®№и©һ', R:'й–ўдҝӮд»ЈеҗҚи©һ', P:'дәәз§°д»ЈеҗҚи©һ', T:'еҶ и©һ', D:'жҢҮзӨәд»ЈеҗҚи©һ' };
const MOOD_DESC = {
    participle:'з¶ҷз¶ҡгғ»йҖІиЎҢдёӯгҒ®еӢ•дҪңгӮ’иЎЁгҒҷеҲҶи©һеҪўгҖӮгҖҢгҖңгҒ—гҒҰгҒ„гӮӢиҖ…гҖҚгҒЁгҒ„гҒҶеҗ«ж„ҸгӮ’жҢҒгҒЎгҒҫгҒҷгҖӮ',
    indicative:'дәӢе®ҹгҒЁгҒ—гҒҰиө·гҒҚгҒҰгҒ„гӮӢгҒ“гҒЁгӮ’иҝ°гҒ№гӮӢзӣҙиӘ¬жі•гҖӮж–ҮгҒ®дё»и»ёгҒЁгҒӘгӮӢеҪўејҸгҒ§гҒҷгҖӮ',
    imperative:'е‘Ҫд»Өгғ»иҰҒжұӮгӮ’иЎЁгҒҷе‘Ҫд»Өжі•гҖӮзҸҫеңЁе‘Ҫд»ӨгҒҜеҸҚеҫ©з¶ҷз¶ҡгҒ®е‘Ҫд»ӨгӮ’иЎЁгҒ—гҒҫгҒҷгҖӮ',
    subjunctive:'еҸҜиғҪжҖ§гғ»зӣ®зҡ„гӮ’иЎЁгҒҷжҺҘз¶ҡжі•гҖӮжқЎд»¶зҜҖгӮ„зӣ®зҡ„зҜҖгҒ§дҪҝгӮҸгӮҢгҒҫгҒҷгҖӮ',
    infinitive:'еӢ•и©һгҒ®дёҚе®ҡи©һеҪўгҖӮгҖҢгҖңгҒҷгӮӢгҒ“гҒЁгҖҚгҒЁиЁігҒӣгҒҫгҒҷгҖӮ',
    optative:'йЎҳжңӣгғ»е©үжӣІгӮ’иЎЁгҒҷеёҢжұӮжі•гҖӮж–°зҙ„гҒ§гҒҜгӮ„гӮ„зЁҖгҒӘеҪўејҸгҒ§гҒҷгҖӮ',
};

/* в”Җв”Җ вҳ… BOOK_MAP: MorphGNT жЁҷжә–з•ӘеҸ·пјҲref е…Ҳй ӯ2жЎҒгҒЁеҜҫеҝңпјү в”Җ */
// ref:"071440" вҶ’ е…Ҳй ӯ"07" = 1COпјҲгӮігғӘгғігғҲдёҖпјү14з« 40зҜҖ
const BOOK_MAP = {
    '01':'MAT','02':'MRK','03':'LUK','04':'JHN','05':'ACT',
    '06':'ROM','07':'1CO','08':'2CO','09':'GAL','10':'EPH',
    '11':'PHP','12':'COL','13':'1TH','14':'2TH','15':'1TI',
    '16':'2TI','17':'TIT','18':'PHM','19':'HEB','20':'JAS',
    '21':'1PE','22':'2PE','23':'1JN','24':'2JN','25':'3JN',
    '26':'JUD','27':'REV'
};

/* в”Җв”Җ вҳ… BOOK_GROUPS: ALL_BOOKS гҒ®гӮӯгғјгҒЁе®Ңе…ЁдёҖиҮҙгҒ•гҒӣгӮӢ в”Җв”Җв”Җв”Җ */
// ALL_BOOKSгҒ«еӯҳеңЁгҒ—гҒӘгҒ„гӮӯгғјгӮ’еҗ«гӮҒгӮӢгҒЁ getBookKey гҒҢ null гӮ’иҝ”гҒ—гҒҰ
// гғ•гӮЈгғ«гӮҝгғјгҒҢзҙ йҖҡгӮҠгҒҷгӮӢгҒҹгӮҒгҖҒе®ҹеңЁгҒҷгӮӢжӣёзү©гҒ гҒ‘гҒ§ж§ӢжҲҗгҒҷгӮӢ
const BOOK_GROUPS = [
    { key:'pauline',  label:'гғ‘гӮҰгғӯжӣёз°Ў', books:['ROM','1CO','2CO','GAL','1TH','2TH'] },
    { key:'prison',   label:'зҚ„дёӯжӣёз°Ў',   books:['EPH','PHP','COL','PHM'] },
    { key:'pastoral', label:'зү§дјҡжӣёз°Ў',   books:['1TI','2TI','TIT'] },
];

/* в”Җв”Җ гӮЁгғігғҲгғӘгҒ®жӣёзү©гӮӯгғјгӮ’и§Јжұә в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function getBookKey(entry) {
    if (entry._bookKey) return entry._bookKey;
    if (entry.book && isNaN(entry.book)) return String(entry.book);
    if (entry.book != null && entry.book !== '') {
        return BOOK_MAP[String(entry.book).padStart(2,'0')] || null;
    }
    if (entry.ref) {
        const m = String(entry.ref).match(/^([A-Z0-9]+)/);
        if (m) return m[1];
    }
    return null;
}

/* в”Җв”Җ URLгғ‘гғ©гғЎгғјгӮҝ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function getSearchParams() {
    const p = new URLSearchParams(location.search);
    const dis = new Set((p.get('_disabled')||'').split(',').filter(Boolean));
    return {
        pos:    p.get('pos')   || '',
        tense:  p.get('tense') || '',
        mood:   p.get('mood')  || '',
        voice:  p.get('voice') || '',
        gender: { value: p.get('gender')||'', enabled: !dis.has('gender') },
        number: { value: p.get('number')||'', enabled: !dis.has('number') },
        case:   { value: p.get('case')  ||'', enabled: !dis.has('case')   },
        ref:    p.get('ref')   || '',
        word:   p.get('word')  || '',
    };
}
const params = getSearchParams();

let extState = [
    { key:'gender', label:'жҖ§', value: params.gender.value, enabled: params.gender.enabled },
    { key:'number', label:'ж•°', value: params.number.value, enabled: params.number.enabled },
    { key:'case',   label:'ж ј', value: params.case.value,   enabled: params.case.enabled   },
].filter(f => f.value);

let bookState = BOOK_GROUPS.map(g => ({ ...g, enabled: true }));

function syncURL() {
    const p = new URLSearchParams(location.search);
    const dis = extState.filter(f=>!f.enabled).map(f=>f.key);
    if (dis.length) p.set('_disabled', dis.join(','));
    else p.delete('_disabled');
    history.replaceState(null,'','?'+p.toString());
}

/* в”Җв”Җ entry.class гғ•гғ«гғҚгғјгғ  вҶ’ 1ж–Үеӯ—гӮігғјгғүеӨүжҸӣ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
const CLASS_TO_POS = {
    'verb':'V', 'noun':'N', 'adjective':'A',
    'article':'T', 'preposition':'P', 'conjunction':'C',
    'adverb':'D', 'particle':'X', 'interjection':'I',
    'pronoun':'P', 'relative pronoun':'R',
    'personal pronoun':'P', 'demonstrative pronoun':'D',
};
function entryPosCode(entry) {
    if (entry.pos) return String(entry.pos).replace(/-$/,'').toUpperCase();
    if (entry.class) return CLASS_TO_POS[String(entry.class).toLowerCase()] || '';
    return '';
}

/* в”Җв”Җ еҪўж…Ӣзҙ гӮігғјгғү вҶ’ гӮӘгғ–гӮёгӮ§гӮҜгғҲеӨүжҸӣ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
const TENSE_CODE  = { P:'present',I:'imperfect',F:'future',A:'aorist',X:'perfect',Z:'pluperfect' };
const VOICE_CODE  = { A:'active',M:'middle',P:'passive',D:'middle deponent',E:'middle or passive',N:'middle or passive' };
const MOOD_CODE   = { I:'indicative',S:'subjunctive',O:'optative',M:'imperative',N:'infinitive',P:'participle' };
const CASE_CODE   = { N:'nominative',G:'genitive',D:'dative',A:'accusative',V:'vocative' };
const NUMBER_CODE = { S:'singular',P:'plural' };
const GENDER_CODE = { M:'masculine',F:'feminine',N:'neuter' };

function decodeMorph(entry) {
    const norm = v => (!v || v === '-') ? '' : v;

    // в‘  entry гҒ«еҪўж…Ӣзҙ гҒҢзӣҙжҺҘгғ•гӮЈгғјгғ«гғүгҒЁгҒ—гҒҰеӯҳеңЁгҒҷгӮӢпјҲжңҖе„Әе…Ҳпјү
    if (entry.tense || entry.mood || entry.voice) {
        return {
            pos:    entryPosCode(entry),
            tense:  norm(entry.tense),
            voice:  norm(entry.voice),
            mood:   norm(entry.mood),
            case:   norm(entry.case),
            number: norm(entry.number),
            gender: norm(entry.gender),
            person: norm(entry.person),
        };
    }

    // в‘Ў morph гҒҢгӮӘгғ–гӮёгӮ§гӮҜгғҲеҪўејҸ
    if (entry.morph && typeof entry.morph === 'object') {
        const m = entry.morph;
        return {
            pos:    norm(entry.pos || '').replace(/-$/,''),
            tense:  norm(m.tense),  voice:  norm(m.voice),  mood:   norm(m.mood),
            case:   norm(m.case),   number: norm(m.number), gender: norm(m.gender),
            person: norm(m.person),
        };
    }

    // в‘ў morph гҒҢж–Үеӯ—еҲ—гӮігғјгғү "V-AAI3S" / "N-NSM"
    const raw   = typeof entry.morph === 'string' ? entry.morph : '';
    const parts = raw.split('-');
    const pos   = norm(entry.pos || parts[0] || '').replace(/-$/,'');

    if (pos.toUpperCase() === 'V' && parts[1]) {
        const seg = parts[1];
        const off = /^[0-9]/.test(seg) ? 1 : 0;
        return {
            pos,
            tense:  TENSE_CODE[seg[off]]    || '',
            voice:  VOICE_CODE[seg[off+1]]  || '',
            mood:   MOOD_CODE[seg[off+2]]   || '',
            person: seg[off+3]              || '',
            number: NUMBER_CODE[seg[off+4]] || '',
            gender: '', case: '',
        };
    }
    if (parts[1]) {
        const seg = parts[1];
        const hp  = ['1','2','3'].includes(seg[0]);
        const b   = hp ? seg.slice(1) : seg;
        return {
            pos, tense:'', voice:'', mood:'',
            person: hp ? seg[0] : '',
            case:   CASE_CODE[b[0]]   || '',
            number: NUMBER_CODE[b[1]] || '',
            gender: GENDER_CODE[b[2]] || '',
        };
    }
    return { pos, tense:'', voice:'', mood:'', case:'', number:'', gender:'', person:'' };
}

/* в”Җв”Җ гғһгғғгғҒгғігӮ° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function matchEntry(entry) {
    /* в”Җв”Җ жӣёзү©гғ•гӮЈгғ«гӮҝгғј в”Җв”Җ */
    if (!bookState.every(g => g.enabled)) {
        const enabledBooks = new Set(
            bookState.filter(g => g.enabled).flatMap(g => g.books)
        );
        const bk = entry._bookKey || getBookKey(entry);
        if (!bk || !enabledBooks.has(bk)) return false;
    }

    /* в”Җв”Җ е“Ғи©һгғ•гӮЈгғ«гӮҝгғј в”Җв”Җ */
    const sp = params.pos.replace(/-$/,'').toUpperCase();
    if (sp && entryPosCode(entry) !== sp) return false;

    /* в”Җв”Җ еҪўж…Ӣзҙ гғ•гӮЈгғ«гӮҝгғј в”Җв”Җ */
    const m = decodeMorph(entry);
    if (params.tense && m.tense !== params.tense) return false;
    if (params.mood  && m.mood  !== params.mood)  return false;
    if (params.voice) {
        const ok = m.voice === params.voice
            || (params.voice==='middle'  && (m.voice==='middle deponent'||m.voice==='middle or passive'))
            || (params.voice==='passive' && m.voice==='middle or passive');
        if (!ok) return false;
    }

    /* в”Җв”Җ жӢЎејөжқЎд»¶ в”Җв”Җ */
    for (const f of extState) {
        if (!f.enabled || !f.value) continue;
        if ((m[f.key]||'') !== f.value) return false;
    }
    return true;
}

/* в”Җв”Җ иӘ¬жҳҺж–Ү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function buildDescription() {
    const tense = TENSE_JP[params.tense]||params.tense;
    const voice = VOICE_JP[params.voice]||params.voice;
    const mood  = MOOD_JP[params.mood]  ||params.mood;
    const pos   = POS_JP[params.pos.replace(/-$/,'')]||params.pos;
    const MAP   = { gender:GENDER_JP, number:NUMBER_JP, case:CASE_JP };
    const extP  = extState.filter(f=>f.enabled&&f.value).map(f=>MAP[f.key]?.[f.value]||f.value);
    const isMO  = ['participle','infinitive'].includes(params.mood);
    const core  = isMO ? [tense,voice,mood].filter(Boolean).join('')
                       : [pos,tense,voice,mood].filter(Boolean).join('');
    const ext   = extP.length ? `пјҲ${extP.join('гғ»')}пјү` : '';
    const relaxed = extState.some(f=>!f.enabled);
    const sub   = relaxed ? 'жӢЎејөжқЎд»¶гӮ’дёҖйғЁи§ЈйҷӨдёӯ вҖ” гӮҲгӮҠеәғгҒ„еҲҶеёғгӮ’иЎЁзӨәгҒ—гҒҰгҒ„гҒҫгҒҷгҖӮ'
                          : (MOOD_DESC[params.mood]||'йҒёжҠһгҒ•гӮҢгҒҹеҪўж…Ӣзҙ гҒ«е®Ңе…ЁдёҖиҮҙгҒҷгӮӢиӘһеҪўгӮ’жӨңзҙўгҒ—гҒҰгҒ„гҒҫгҒҷгҖӮ');
    return { title:`${core}${ext}гӮ’жҠҪеҮәгҒ—гҒҰгҒ„гҒҫгҒҷ`, sub };
}

/* в”Җв”Җ гғ¬гғігғҖгғӘгғігӮ° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function renderBreadcrumb() {
    document.getElementById('bc-ref').textContent  = params.ref  || 'и©ізҙ°';
    document.getElementById('bc-word').textContent = params.word || 'вҖ”';
}
function renderMeaning() {
    const {title,sub} = buildDescription();
    document.getElementById('meaning-title').textContent = title;
    document.getElementById('meaning-sub').textContent   = sub;
}
function renderCoreChips() {
    const defs = [
        { label:'е“Ғи©һ', val: POS_JP[params.pos.replace(/-$/,'')]||params.pos },
        { label:'жі•',   val: MOOD_JP[params.mood]  ||params.mood  },
        { label:'жҷӮеҲ¶', val: TENSE_JP[params.tense]||params.tense },

        `<div class="chip chip-core"><span class="chip-key">${d.label}</span><span>${d.val}</span></div>`
    ).join('');
}
function renderExtChips() {

    const MAP = { gender:GENDER_JP, number:NUMBER_JP, case:CASE_JP };

        <div class="chip chip-ext ${f.enabled?'on':'off'}" onclick="toggleExt(${i})">

}
function renderBookChips() {

        <div class="chip chip-ext ${g.enabled?'on':'off'}" onclick="toggleBook(${i})">
            <div class="chip-toggle-dot">${g.enabled?'вң“':''}</div>

/* в”Җв”Җ гғҡгғјгӮёгғҚгғјгӮ·гғ§гғізҠ¶ж…Ӣ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
let _currentRows = [];
let _displayCount = 100;
const PAGE_SIZE = 100;

function renderResults(allData) {
    const matched = allData.filter(matchEntry);
    const sp      = params.pos.replace(/-$/,'');
    const samePos = allData.filter(e=>(e.pos||'').replace(/-$/,'').toUpperCase()===sp.toUpperCase()).length;
    document.getElementById('count').textContent      = matched.length.toLocaleString();
    document.getElementById('result-pct').textContent = samePos>0 ? `еҗҢе“Ғи©һ ${samePos.toLocaleString()} д»¶дёӯ` : '';
    _currentRows  = matched;
    _displayCount = PAGE_SIZE;
    renderPage();
}

// entry.ref "ROM 1:5!3" вҶ’ _jaMapгӮӯгғј "060105"
const _refToJaKey = (() => {
    const KEY_TO_CODE = {};
    Object.entries(BOOK_MAP).forEach(([code, key]) => { KEY_TO_CODE[key] = code; });
    return function(ref) {
        const m = String(ref||'').match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
        if (!m) return null;
        const code = KEY_TO_CODE[m[1]];
        if (!code) return null;
        return `${code}${String(m[2]).padStart(2,'0')}${String(m[3]).padStart(2,'0')}`;
    };
})();

function getJaVerse(entry) {
    // в‘  _jaMap гҒӢгӮүзҜҖе…ЁдҪ“гҒ®иЁігӮ’еҸ–еҫ—
    const key = _refToJaKey(entry.ref);
    if (key && _jaMap.has(key)) return _jaMap.get(key);
    // в‘Ў гғ•гӮ©гғјгғ«гғҗгғғгӮҜпјҡglossпјҲиӘһгҒ®ж„Ҹе‘іпјү
    return entry.gloss || entry.english || '';
}

function renderPage() {
    const el   = document.getElementById('result-list');
    const rows = _currentRows;

    if (!rows.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon">вҲ…</div>жқЎд»¶гҒ«дёҖиҮҙгҒҷгӮӢиӘһеҪўгҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹгҖӮ<br>жӢЎејөжқЎд»¶гӮ’OFFгҒ«гҒҷгӮӢгҒӢгҖҒжӣёзү©зҜ„еӣІгӮ’еәғгҒ’гҒҰгҒҝгҒҰгҒҸгҒ гҒ•гҒ„гҖӮ</div>`;
        return;
    }

    const slice = rows.slice(0, _displayCount);
    const more  = rows.length - _displayCount;

    el.innerHTML = slice.map((entry, idx) => {
        const word     = entry.word || entry.normalized || entry.text || '';
        const refLabel = buildRefLabel(entry.ref);
        const jaText   = getJaVerse(entry);
        // ж—Ҙжң¬иӘһиЁігҒҢгҒӮгӮҢгҒ°жң¬ж–ҮиЎЁзӨәгҖҒгҒӘгҒ‘гӮҢгҒ°иҰӢеҮәгҒ—иӘһгҒ«гғ•гӮ©гғјгғ«гғҗгғғгӮҜ
        const mainHTML = jaText
            ? `<span class="result-ja">${jaText}</span>`
            : `<span class="result-word">${word}</span><span class="result-lemma">${entry.lemma||''}</span>`;
        return `<div class="result-card animate-in" style="animation-delay:${Math.min(idx*10,300)}ms"
            onclick="toggleContext(this, '${entry.ref||''}', '${encodeURIComponent(word)}')">
            <div class="result-top">
                <div class="result-main">${mainHTML}</div>
                <span class="result-ref">${refLabel}</span>
            </div>
        </div>`;
    }).join('');

    if (more > 0) {
        el.innerHTML += `<div style="text-align:center;padding:20px 0;">
            <button onclick="loadMore()" style="padding:8px 24px;font-size:0.8rem;font-family:inherit;
                border:1px solid var(--border-soft);border-radius:20px;background:transparent;
                cursor:pointer;color:var(--text-sub);transition:background 0.12s;">
                гҒ•гӮүгҒ«иЎЁзӨәпјҲж®ӢгӮҠ ${more.toLocaleString()} д»¶пјү
            </button></div>`;
    }
}

function buildRefLabel(ref) {
    const r = String(ref||'');

    // еҪўејҸв‘  "ROM 1:1!1" вҶ’ "гғӯгғјгғһ 1:1"
    const m = r.match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
    if (m) {
        const bookName = BOOK_JP[m[1]] || m[1];
        return `${bookName} ${m[2]}:${m[3]}`;
    }
    // еҪўејҸв‘Ў "060101"пјҲ6жЎҒж•°еӯ—пјү
    if (r.length === 6 && /^\d+$/.test(r)) {
        const bookKey  = BOOK_MAP[r.slice(0,2)];
        const bookName = (bookKey && BOOK_JP[bookKey]) || bookKey || r.slice(0,2);
        return `${bookName} ${parseInt(r.slice(2,4))}:${parseInt(r.slice(4,6))}`;
    }
    return r;
}

function loadMore() {
    _displayCount += PAGE_SIZE;
    renderPage();
}

/* в”Җв”Җ гӮӨгғігӮҝгғ©гӮҜгӮ·гғ§гғі в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function toggleExt(i)  { extState[i].enabled=!extState[i].enabled;  renderExtChips();  renderMeaning(); syncURL(); if(window._morphData)renderResults(window._morphData); }
function toggleBook(i) { bookState[i].enabled=!bookState[i].enabled; renderBookChips(); if(window._morphData)renderResults(window._morphData); }
function goToWord(ref,enc) {
    const word=decodeURIComponent(enc);
    if(window.opener&&!window.opener.closed) window.opener.postMessage({type:'GO_TO_REF',ref,word},'*');
}

/* в”Җв”Җ ж–Үи„ҲпјӢж§ӢйҖ гғ‘гғҚгғ«пјҲгӮҝгғғгғ—гҒ§еұ•й–Ӣпјү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */

// еҗҢгҒҳзҜҖгҒ®гғҲгғјгӮҜгғігӮ’еҸ–еҫ— вҖ” ref "ROM 1:5!1" гҒ®з« :зҜҖйғЁеҲҶгҒ§з…§еҗҲ
function getVerseTokens(ref) {
    if (!window._morphData || !ref) return [];
    // "ROM 1:5!1" вҶ’ "ROM 1:5" гӮ’гғ—гғ¬гғ•гӮЈгғғгӮҜгӮ№гҒЁгҒ—гҒҰеҗҢзҜҖгҒ®е…ЁиӘһгӮ’еҸ–еҫ—
    const prefix = String(ref).replace(/!.*$/, '').trim();
    return window._morphData.filter(e =>
        String(e.ref||'').replace(/!.*$/, '').trim() === prefix
    );
}

// иЎЁзӨәгғҶгӮӯгӮ№гғҲпјҲеҸҘиӘӯзӮ№йҷӨеҺ»пјү
function cleanText(e) {
    return (e.word || e.normalized || e.text || '').replace(/[.,:;В·вёҖвёҒвёӮвёғвҢҲвҢү]/g,'').trim();
}

// еҪўж…Ӣзҙ гҒӢгӮүеҪ№еүІгӮ’еҲӨе®ҡ
function getRole(entry) {
    const m   = decodeMorph(entry);
    const pos = m.pos.toUpperCase();
    if (pos === 'V') {
        if (!m.mood || m.mood==='infinitive'||m.mood==='participle') return 'mod';
        return 'verb';
    }
    if (pos === 'P') return 'prep';   // еүҚзҪ®и©һпјҲеҸҘгҒ®е…Ҳй ӯпјү
    if (['N','T','A','D','R'].includes(pos)) {
        if (m.case==='nominative') return 'subj';
        if (m.case==='accusative') return 'obj';
        if (m.case==='genitive'||m.case==='dative') return 'phr';
        return 'other';
    }
    return 'other'; // жҺҘз¶ҡи©һгғ»еүҜи©һгғ»дёҚеӨүеҢ–и©һ
}

// еҪ№еүІгғ©гғҷгғ«пјҲж—Ҙжң¬иӘһпјү
const ROLE_LABEL = {
    verb:'еӢ•и©һ', subj:'дё»иӘһ', obj:'зӣ®зҡ„иӘһ',
    phr:'дҝ®йЈҫ', prep:'еүҚзҪ®и©һеҸҘ', mod:'жә–еӢ•и©һ', other:''
};
// еҪ№еүІгӮ«гғ©гғјпјҲCSSеӨүж•°гҒ§гҒҜгҒӘгҒҸзӣҙеҖӨгҒ§е®үе®ҡгҒ•гҒӣгӮӢпјү
const ROLE_COLOR = {
    verb:'#4a7fa5', subj:'#5a8a6e', obj:'#9a6040',
    phr:'#888', prep:'#7a6aa0', mod:'#aaa', other:''
};

// еүҚзҪ®и©һеҸҘгӮ’гҒҫгҒЁгӮҒгҒҰгӮ°гғ«гғјгғ—еҢ–
function groupTokens(tokens) {
    const groups = [];
    let i = 0;
    while (i < tokens.length) {
        const e    = tokens[i];
        const role = getRole(e);
        if (role === 'prep') {
            // еүҚзҪ®и©һ + еҫҢз¶ҡгҒ®еҶ и©һгғ»еҪўе®№и©һгғ»еҗҚи©һгӮ’1гӮ°гғ«гғјгғ—гҒ«
            const members = [e];
            let j = i + 1;
            while (j < tokens.length) {
                const nr = getRole(tokens[j]);
                if (['subj','obj','phr','other'].includes(nr) &&
                    decodeMorph(tokens[j]).pos.toUpperCase() !== 'P') {
                    members.push(tokens[j]);
                    j++;
                } else break;
            }
            groups.push({ role:'prep', members });
            i = j;
        } else {
            groups.push({ role, members:[e] });
            i++;
        }
    }
    return groups;
}

function toggleContext(cardEl, ref, wordEnc) {
    const hitWord = decodeURIComponent(wordEnc);

    // ж—ўеӯҳгғ‘гғҚгғ«гҒҢгҒӮгӮҢгҒ°гғҲгӮ°гғ«
    const existing = cardEl.querySelector('.ctx-panel');
    if (existing) {
        const open = existing.style.display !== 'none';
        existing.style.display = open ? 'none' : 'block';
        cardEl.classList.toggle('card-open', !open);
        return;
    }

    const tokens = getVerseTokens(ref);
    if (!tokens.length) return;

    const groups = groupTokens(tokens);

    // в”Җв”Җ иЎҢгӮ’ж§ӢзҜү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    // еҪ№еүІгҒ”гҒЁгҒ«гҒҫгҒЁгӮҒгҒҰгҖҢеӢ•и©һпҪңдё»иӘһпҪңзӣ®зҡ„иӘһпҪңеүҚзҪ®и©һеҸҘгҖҚгҒ®й ҶгҒ§иЎҢгҒ«дёҰгҒ№гӮӢ
    const ORDER = ['verb','subj','obj','prep','phr','mod','other'];
    const buckets = {};
    ORDER.forEach(r => buckets[r] = []);

    groups.forEach(g => {
        const text = g.members.map(cleanText).filter(Boolean).join(' ');
        if (!text) return;
        // гғ’гғғгғҲиӘһгӮ’еҗ«гӮҖгӮ°гғ«гғјгғ—гҒҜеј·иӘҝгғ•гғ©гӮ°
        const isHit = g.members.some(m => cleanText(m) === hitWord ||
            (m.word||'').replace(/[.,:;В·вёҖвёҒвёӮвёғвҢҲвҢү]/g,'') === hitWord);
        buckets[g.role].push({ text, isHit });
    });

    // в”Җв”Җ HTMLз”ҹжҲҗ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    const rows = ORDER.filter(r => buckets[r].length > 0 && ROLE_LABEL[r]).map(role => {
        const color = ROLE_COLOR[role];
        const items = buckets[role].map(item => {
            const hit = item.isHit
                ? `style="color:${color};font-weight:700;border-bottom:2px solid ${color};"`
                : `style="color:var(--text-main);"`;
            return `<span class="ctx-token" ${hit}>${item.text}</span>`;
        }).join('<span class="ctx-sep">гғ»</span>');

        return `<div class="ctx-row">
            <span class="ctx-role" style="color:${color};">${ROLE_LABEL[role]}</span>
            <span class="ctx-tokens">${items}</span>
        </div>`;
    }).join('');

    // еҺҹж–ҮдёҖиЎҢпјҲе…ЁиӘһгӮ’й ҶеәҸгҒ©гҒҠгӮҠгҖҒгғ’гғғгғҲиӘһгӮ’иүІд»ҳгҒ‘пјү
    const rawLine = tokens.map(e => {
        const t = cleanText(e);
        if (!t) return '';
        const isHit = t === hitWord || (e.word||'').replace(/[.,:;В·вёҖвёҒвёӮвёғвҢҲвҢү]/g,'') === hitWord;
        return isHit
            ? `<span style="color:var(--highlight);font-weight:700;">${t}</span>`
            : `<span>${t}</span>`;
    }).filter(Boolean).join(' ');

    const panel = document.createElement('div');
    panel.className = 'ctx-panel';
    panel.innerHTML = `
        <div class="ctx-raw">${rawLine}</div>
        <div class="ctx-structure">${rows}</div>`;

    cardEl.appendChild(panel);
    cardEl.classList.add('card-open');
}

/* в”Җв”Җ вҳ… ж—Ҙжң¬иӘһиЁігғ•гӮ©гғ«гғҖеҗҚпјҲ1з®ҮжүҖгҒ гҒ‘еӨүжӣҙгҒҷгӮҢгҒ°е…ЁдҪ“гҒ«еҸҚжҳ пјү в”Җв”Җ */
const JA_FOLDER = 'bible_jp';

/* ж—Ҙжң¬иӘһиЁігғҶгӮӯгӮ№гғҲгҒ®Map: refж–Үеӯ—еҲ— вҶ’ иЁіж–Ү */
const _jaMap = new Map();

/* жӣёзү©гҒ®ж—Ҙжң¬иӘһеҗҚ */
const BOOK_JP = {
    MAT:'гғһгӮҝгӮӨ', MRK:'гғһгғ«гӮі', LUK:'гғ«гӮ«',   JHN:'гғЁгғҸгғҚ', ACT:'дҪҝеҫ’',
    ROM:'гғӯгғјгғһ', '1CO':'в… гӮігғӘгғігғҲ', '2CO':'в…ЎгӮігғӘгғігғҲ',
    GAL:'гӮ¬гғ©гғҶгғӨ', EPH:'гӮЁгғҡгӮҪ', PHP:'гғ”гғӘгғ”', COL:'гӮігғӯгӮөгӮӨ',
    '1TH':'в… гғҶгӮөгғӯгғӢгӮұ', '2TH':'в…ЎгғҶгӮөгғӯгғӢгӮұ',
    '1TI':'в… гғҶгғўгғҶ', '2TI':'в…ЎгғҶгғўгғҶ', TIT:'гғҶгғҲгӮ№', PHM:'гғ”гғ¬гғўгғі',
    HEB:'гғҳгғ–гғ«', JAS:'гғӨгӮігғ–', '1PE':'в… гғҡгғҶгғӯ', '2PE':'в…ЎгғҡгғҶгғӯ',
    '1JN':'в… гғЁгғҸгғҚ', '2JN':'в…ЎгғЁгғҸгғҚ', '3JN':'в…ўгғЁгғҸгғҚ', JUD:'гғҰгғҖ', REV:'й»ҷзӨәйҢІ',
    GEN:'еүөдё–иЁҳ', EXO:'еҮәгӮЁгӮёгғ—гғҲ', LEV:'гғ¬гғ“', NUM:'ж°‘ж•°', DEU:'з”іе‘Ҫ',
    JOS:'гғЁгӮ·гғҘгӮў', JDG:'еЈ«её«', RUT:'гғ«гғ„', '1SA':'в… гӮөгғ гӮЁгғ«', '2SA':'в…ЎгӮөгғ гӮЁгғ«',
    '1KI':'в… еҲ—зҺӢ', '2KI':'в…ЎеҲ—зҺӢ', PSA:'и©©зҜҮ', PRO:'з®ҙиЁҖ', ECC:'дјқйҒ“',
    ISA:'гӮӨгӮ¶гғӨ', JER:'гӮЁгғ¬гғҹгғӨ', EZK:'гӮЁгӮјгӮӯгӮЁгғ«', DAN:'гғҖгғӢгӮЁгғ«',
};
const ALL_BOOKS = [
    {key:'ROM',ch:16},{key:'1CO',ch:16},{key:'2CO',ch:13},{key:'GAL',ch:6},
    {key:'EPH',ch:6}, {key:'PHP',ch:4}, {key:'COL',ch:4}, {key:'1TH',ch:5},
    {key:'2TH',ch:3}, {key:'1TI',ch:6}, {key:'2TI',ch:4}, {key:'TIT',ch:3},
    {key:'PHM',ch:1},
];
function buildAllChapterPaths() {
    const p=[];
    for (const b of ALL_BOOKS) for (let c=1;c<=b.ch;c++) p.push({key:b.key,ch:c,path:`./bible_data/${b.key}/${c}.json`});
    return p;
}
async function fetchInBatches(tasks,sz,onProg) {
    let all=[];
    for (let i=0;i<tasks.length;i+=sz) {
        const results = await Promise.allSettled(
            tasks.slice(i,i+sz).map(t=>
                fetch(t.path).then(r=>r.ok?r.json():null).catch(()=>null)
                .then(data => {
                    if (!Array.isArray(data)) return null;
                    // вҳ… гғ•гӮ©гғ«гғҖгӮӯгғјпјҲ"ROM","1CO"зӯүпјүгӮ’еҗ„гӮЁгғігғҲгғӘгҒ«д»ҳдёҺ
                    data.forEach(entry => { entry._bookKey = t.key; });
                    return data;
                })
            )
        );
        results.forEach(r=>{ if(r.status==='fulfilled'&&Array.isArray(r.value)) all=all.concat(r.value); });
        onProg(Math.min(i+sz,tasks.length),tasks.length);
    }
    return all;
}

/* в”Җв”Җ еҲқжңҹеҢ– в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
renderBreadcrumb(); renderCoreChips(); renderExtChips(); renderBookChips(); renderMeaning();

(async function() {
    const loadEl = document.getElementById('loading');
    const listEl = document.getElementById('result-list');
    const paths  = buildAllChapterPaths();
    const total  = paths.length;

    loadEl.innerHTML = `
        <div style="margin-bottom:10px;font-family:'Gentium Plus',serif;font-size:1.3rem;color:#ccc;">бјҖОҪОұО¶О·П„Оөбҝ–</div>
        <div style="width:100%;max-width:280px;margin:0 auto 8px;height:3px;background:#eee;border-radius:2px;overflow:hidden;">
            <div id="load-fill" style="height:100%;width:0%;background:var(--highlight);transition:width 0.25s ease;border-radius:2px;"></div>
        </div>
        <div id="load-status" style="font-size:0.72rem;color:#bbb;">гғҮгғјгӮҝгӮ’иӘӯгҒҝиҫјгҒҝдёӯ (0 / ${total})...</div>`;

    // в‘  еҪўж…Ӣзҙ гғҮгғјгӮҝгӮ’гғ•гӮ§гғғгғҒпјҲгғ—гғӯгӮ°гғ¬гӮ№гғҗгғјд»ҳгҒҚпјү
    const allData = await fetchInBatches(paths, 20, (done, ttl) => {
        const pct = Math.round(done / ttl * 100);
        const f = document.getElementById('load-fill');
        const s = document.getElementById('load-status');
        if (f) f.style.width = pct + '%';
        if (s) s.textContent = `еҪўж…Ӣзҙ гғҮгғјгӮҝиӘӯгҒҝиҫјгҒҝдёӯ (${done} / ${ttl}) ${pct}%`;
    });

    if (!allData.length) {
        loadEl.innerHTML = `<p style="color:#c00;font-size:0.82rem;line-height:2.2;">гғҮгғјгӮҝгҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“гҒ§гҒ—гҒҹгҖӮ<br><code style="background:#f5f5f7;padding:2px 8px;border-radius:4px;">bible_data/ROM/1.json гҒ®еҪўејҸгҒ§й…ҚзҪ®гҒ—гҒҰгҒҸгҒ гҒ•гҒ„</code></p>`;
        return;
    }

    // в‘Ў ж—Ҙжң¬иӘһиЁігӮ’гғ•гӮ§гғғгғҒпјҲе®Ңе…ЁгҒ«зөӮгӮҸгҒЈгҒҰгҒӢгӮүжҸҸз”»пјү
    const s = document.getElementById('load-status');
    if (s) s.textContent = 'ж—Ҙжң¬иӘһиЁігӮ’иӘӯгҒҝиҫјгҒҝдёӯ...';
    await fetchJaData(paths);

    // в‘ў дёЎж–№жҸғгҒЈгҒҰгҒӢгӮүжҸҸз”»
    window._morphData = allData;
    loadEl.style.display = 'none';
    listEl.style.display = 'flex';
    renderResults(allData);
})();

/* в”Җв”Җ ж—Ҙжң¬иӘһиЁігғ•гӮ§гғғгғҒ вҶ’ _jaMap гҒ«еұ•й–Ӣ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
   bible_jp/{KEY}/{ch}.json гҒ®еҪўејҸ:
   { "book":"1CO", "chapter":1, "verses":{"1":"гҖң","2":"гҖң"} }
   вҶ’ _jaMap гҒ« "070101" вҶ’ "гҖң" гҒ®еҪўгҒ§ж јзҙҚ
   ===================================================== */
async function fetchJaData(morphPaths) {
    const jaPaths = morphPaths.map(t => ({
        key:  t.key,
        ch:   t.ch,
        path: `./${JA_FOLDER}/${t.key}/${t.ch}.json`,
    }));

    // BOOK_MAP гҒ®йҖҶеј•гҒҚпјҲ"ROM" вҶ’ "06" гҒӘгҒ©пјү
    const KEY_TO_CODE = {};
    Object.entries(BOOK_MAP).forEach(([code, key]) => { KEY_TO_CODE[key] = code; });

    // вҳ… return гӮ’д»ҳгҒ‘гҒҰзўәе®ҹгҒ« await гҒ§гҒҚгӮӢгӮҲгҒҶгҒ«гҒҷгӮӢ
    return Promise.allSettled(
        jaPaths.map(t =>
            fetch(t.path)
                .then(r => r.ok ? r.json() : null)
                .catch(() => null)
                .then(data => {
                    if (!data) return;
                    // verses гғ•гӮЈгғјгғ«гғүгҒҢгӮӘгғ–гӮёгӮ§гӮҜгғҲгҒӢгғҒгӮ§гғғгӮҜ
                    const verses = data.verses;
                    if (!verses || typeof verses !== 'object') return;
                    const bookCode = KEY_TO_CODE[t.key];
                    if (!bookCode) return;
                    const chStr = String(t.ch).padStart(2, '0');
                    Object.entries(verses).forEach(([vNum, text]) => {
                        const vStr = String(parseInt(vNum)).padStart(2, '0');
                        const ref  = `${bookCode}${chStr}${vStr}`;
                        _jaMap.set(ref, String(text));
                    });
                })
        )
    );
}
