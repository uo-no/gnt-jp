<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>形態論検索</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/layout.css">
<link rel="stylesheet" href="styles/components.css">

<style>
/* ── page-specific tokens ── */
:root {
    --badge-concentrated: #2d6a4f;
    --badge-dispersed:    #5a6e82;
    --badge-limited:      #a09050;
}

/* ══════════════════════════════════════════
   SECTION 1 — 語形の正体
══════════════════════════════════════════ */
.identity-block {
    padding: 0;
}
.identity-word {
    font-family: 'Gentium Plus', serif;
    font-size: 3.2rem;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: 0.01em;
    color: var(--text);
    margin-bottom: 8px;
}
.identity-lemma-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 20px;
}
.identity-lemma-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-hint);
}
.identity-lemma-val {
    font-family: 'Gentium Plus', serif;
    font-size: 1.25rem;
    color: var(--text-sub);
    line-height: 1;
}
.identity-pos-badge {
    display: inline-block;
    padding: 3px 10px;
    background: var(--accent-light);
    border: 1px solid var(--accent-mid);
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-bottom: 20px;
}
.identity-morph-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}
.identity-morph-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 10px 14px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-m);
    min-width: 72px;
}
.identity-morph-item.primary {
    background: var(--accent-light);
    border-color: var(--accent-mid);
}
.identity-morph-key {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-hint);
}
.identity-morph-val {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
}
.identity-morph-item.primary .identity-morph-val {
    color: var(--accent);
}
.identity-summary {
    margin-top: 16px;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-sub);
    line-height: 1.6;
    padding: 10px 14px;
    background: var(--bg-inset);
    border-radius: var(--radius-s);
    border-left: 3px solid var(--accent-mid);
}
.identity-morph-summary-line {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    letter-spacing: 0.02em;
}
.identity-ja-gloss {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text-sub);
    margin-bottom: 14px;
    padding: 6px 12px;
    background: var(--bg-inset);
    border-radius: var(--radius-s);
    display: inline-block;
}
.identity-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
}
.identity-detail-flat {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-sub);
    letter-spacing: 0.03em;
}
.identity-detail-block {
    margin-top: 16px;
    padding: 12px 14px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-s);
}
.identity-detail-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-hint);
    margin-bottom: 10px;
}
.identity-detail-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 16px;
    align-items: baseline;
}
.identity-detail-key {
    font-size: 0.72rem;
    color: var(--text-hint);
    font-weight: 600;
    white-space: nowrap;
}
.identity-detail-val {
    font-size: 0.82rem;
    color: var(--text);
    font-weight: 500;
}

/* ══════════════════════════════════════════
   フィルターパネル
══════════════════════════════════════════ */
.filter-disclosure {
    margin-bottom: 16px;
}
.filter-disclosure-trigger {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-s);
    cursor: pointer;
    user-select: none;
    font-size: 0.75rem;
    color: var(--text-sub);
    transition: background 0.12s;
}
.filter-disclosure-trigger:hover { background: #ebebed; }
.filter-disclosure-trigger .trigger-label { font-weight: 600; }
.filter-disclosure-trigger .trigger-state {
    font-size: 0.68rem;
    color: var(--text-hint);
    display: flex; align-items: center; gap: 6px;
}
.filter-disclosure-trigger .trigger-arrow {
    font-size: 0.7rem;
    color: var(--text-hint);
    transition: transform 0.2s;
}
.filter-disclosure[open] .filter-disclosure-trigger .trigger-arrow { transform: rotate(180deg); }
.filter-disclosure-body {
    padding: 14px;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius-s) var(--radius-s);
    background: var(--bg-inset);
}
.filter-group { margin-bottom: 14px; }
.filter-group:last-child { margin-bottom: 0; }
.filter-group-label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-hint);
    margin-bottom: 8px;
}
.chip-legend {
    display: flex; align-items: center; flex-wrap: wrap; gap: 6px 14px;
    padding: 7px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-s);
    margin-bottom: 12px;
    font-size: 0.66rem; color: var(--text-hint);
}
.chip-legend-label { font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-right: 4px; flex-shrink: 0; }
.chip-legend-item { display: flex; align-items: center; gap: 4px; }
.chip-legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.chip-legend-dot.on  { background: var(--accent); }
.chip-legend-dot.off { background: #d0d0d5; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 20px; font-size: 0.75rem;
    transition: all 0.12s;
}
.chip-fixed {
    background: var(--accent-light);
    border: 1px solid var(--accent-mid);
    color: var(--accent); font-weight: 600;
}
.chip-fixed .chip-key {
    font-size: 0.68rem; color: var(--text-sub); font-weight: 400; margin-right: 1px;
}
.chip-toggle {
    border: 1px solid var(--border); cursor: pointer; user-select: none;
}
.chip-toggle.on {
    background: var(--accent-light); border-color: var(--accent-mid);
    color: var(--accent); font-weight: 600;
}
.chip-toggle.off {
    background: var(--bg); border-color: var(--border);
    color: var(--text-hint); text-decoration: line-through;
}
.chip-toggle:hover.on  { background: rgba(90,110,130,0.17); }
.chip-toggle:hover.off { background: var(--bg-panel); text-decoration: none; }
.chip-dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; flex-shrink: 0;
}
.chip-toggle.on .chip-dot { background: var(--accent); border-color: var(--accent); color: #fff; }
.chip-toggle.off .chip-dot { background: transparent; color: #ccc; }
.filter-subgroup-label {
    font-size: 0.60rem;
    font-weight: 700;
    letter-spacing: 0.10em;
    color: var(--text-hint);
    margin-bottom: 6px;
    padding-left: 2px;
}
.chip-radio {
    border: 1px solid var(--border); cursor: pointer; user-select: none;
}
.chip-radio.on {
    background: var(--accent-light); border-color: var(--accent-mid);
    color: var(--accent); font-weight: 600;
}
.chip-radio.off {
    background: var(--bg); border-color: var(--border);
    color: var(--text-sub);
}
.chip-radio:hover.off { background: var(--bg-panel); }
.chip-radio-dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; flex-shrink: 0;
}
.chip-radio.on .chip-radio-dot { background: var(--accent); border-color: var(--accent); color: #fff; }
.chip-radio.off .chip-radio-dot { background: transparent; }
.chip-scope {
    border: 1px solid var(--border); cursor: pointer; user-select: none;
}
.chip-scope.on {
    background: var(--accent-light); border-color: var(--accent-mid);
    color: var(--accent); font-weight: 600;
}
.chip-scope.off {
    background: var(--bg); border-color: var(--border);
    color: var(--text-hint); text-decoration: line-through;
}
.chip-scope:hover.off { background: var(--bg-panel); text-decoration: none; }
.chip-scope-check {
    width: 13px; height: 13px; border-radius: 3px;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; flex-shrink: 0;
}
.chip-scope.on .chip-scope-check { background: var(--accent); border-color: var(--accent); color: #fff; }
.chip-scope.off .chip-scope-check { background: transparent; }

/* ══════════════════════════════════════════
   SECTION 2 — 統計情報
══════════════════════════════════════════ */
.results-meta {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 14px;
}
.results-count { font-size: 0.82rem; color: var(--text-sub); }
.results-count strong { font-size: 1rem; font-weight: 700; color: var(--text); }
.results-pct { font-size: 0.7rem; color: var(--text-hint); }
.result-list { display: flex; flex-direction: column; gap: 5px; }
/* .app-card base styles → components.css */
.app-card { cursor: pointer; }
.app-card:hover { background: var(--bg-panel); }
.app-card.ctx-open { border-color: var(--accent-mid); background: var(--bg-inset); }
.result-top { display: flex; align-items: baseline; justify-content: space-between; }
.result-word { font-size: 1.3rem; line-height: 1.4; font-family: 'Gentium Plus', serif; }
.result-lemma { font-size: 0.78rem; color: var(--text-hint); margin-left: 7px; line-height: inherit; font-family: 'Gentium Plus', serif; }
.result-ref { font-size: 0.7rem; color: var(--text-hint); font-variant-numeric: tabular-nums; }
.result-ja { font-size: 0.8rem; color: var(--text-sub); margin-top: 3px; line-height: 1.5; }
.morph-ctx {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border);
    animation: fadeUp 0.15s ease;
}
.morph-ctx-line {
    display: flex; flex-wrap: wrap; gap: 4px 3px;
    align-items: flex-end;
    margin-bottom: 4px;
}
.ctx-chip {
    display: inline-flex; flex-direction: column; align-items: center; gap: 1px;
    padding: 2px 6px 2px;
    border-radius: 4px;
    border: 1px solid transparent;
    cursor: default;
    transition: background 0.1s;
}
.ctx-chip.ctx-hit {
    background: rgba(90,110,130,0.10);
    border-color: rgba(90,110,130,0.25);
}
.ctx-chip-ja {
    font-family: 'Noto Serif JP', serif;
    font-size: 0.88rem;
    color: var(--text-main);
    line-height: 1.3;
}
.ctx-chip.ctx-hit .ctx-chip-ja { font-weight: 700; color: var(--accent); }
.ctx-chip-gr {
    font-family: 'Gentium Plus', serif;
    font-size: 0.62rem;
    color: var(--text-hint);
    opacity: 0.6;
    line-height: 1.1;
}
.ctx-chip.ctx-hit .ctx-chip-gr { opacity: 1; color: var(--accent); }
.ctx-chip-dot {
    width: 3px; height: 3px; border-radius: 50%;
    background: transparent; flex-shrink: 0;
    margin-top: 1px;
}
.ctx-chip.role-verb  .ctx-chip-dot { background: #7a8fa6; }
.ctx-chip.role-noun  .ctx-chip-dot { background: #8a9a8a; }
.ctx-chip.role-conj  .ctx-chip-dot { background: #a09070; }
.ctx-chip.role-prep  .ctx-chip-dot { background: #9a8a6a; }
.ctx-chip.role-adj   .ctx-chip-dot { background: #8a7a9a; }
.ctx-chip.role-pron  .ctx-chip-dot { background: #7a9090; }
.ctx-chip.role-art   .ctx-chip-dot { background: transparent; }
.ctx-chip.role-other .ctx-chip-dot { background: rgba(90,110,130,0.2); }
.ctx-chip-ja.dp-tense-present  { text-decoration: underline solid; text-underline-offset: 2px; }
.ctx-chip-ja.dp-tense-aorist   { text-decoration: underline dotted; text-underline-offset: 2px; }
.ctx-chip-ja.dp-tense-perfect  { text-decoration: underline wavy; text-underline-offset: 2px; }
.ctx-chip-ja.dp-mood-imperative { background: rgba(90,110,130,0.13); border-radius: 3px; padding: 0 2px; }
.ctx-chip-ja.dp-mood-indicative { background: rgba(0,0,0,0.04); border-radius: 3px; padding: 0 2px; }
.ctx-chip-ja.dp-voice-middle::after,
.ctx-chip-ja.dp-voice-passive::after { content:'*'; font-size:0.6em; color:var(--accent); opacity:0.7; margin-left:1px; vertical-align:super; }
.morph-ctx-goto { text-align: right; margin-top: 6px; }
.morph-ctx-goto button {
    font-size: 0.68rem; font-family: inherit;
    background: none; border: none; cursor: pointer;
    color: var(--accent); text-decoration: underline; padding: 0;
}

/* ══════════════════════════════════════════
   SECTION 3 — 統計情報
══════════════════════════════════════════ */
.dist-total-row {
    display: flex; align-items: baseline;
    gap: 8px; margin-bottom: 16px;
}
.dist-total-num {
    font-size: 1.6rem; font-weight: 700; color: var(--text); line-height: 1;
}
.dist-total-label { font-size: 0.75rem; color: var(--text-sub); }
.dist-list { display: flex; flex-direction: column; gap: 7px; }
.dist-row { display: flex; align-items: center; gap: 10px; }
.dist-name {
    width: 72px; font-size: 0.72rem;
    color: var(--text-sub); text-align: right; flex-shrink: 0;
}
.dist-bar-track {
    flex: 1; height: 5px; background: var(--bg-panel);
    border-radius: 3px; overflow: hidden;
}
.dist-bar-fill {
    height: 100%; border-radius: 3px;
    background: var(--accent); transition: width 0.5s ease;
}
.dist-num {
    width: 32px; font-size: 0.68rem; color: var(--text-hint);
    text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums;
}
.concentration-badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-left: 10px;
    vertical-align: middle;
}
.concentration-badge.concentrated {
    background: rgba(45,106,79,0.10);
    border: 1px solid rgba(45,106,79,0.25);
    color: var(--badge-concentrated);
}
.concentration-badge.dispersed {
    background: rgba(90,110,130,0.10);
    border: 1px solid rgba(90,110,130,0.25);
    color: var(--badge-dispersed);
}
.concentration-badge.limited {
    background: rgba(160,144,80,0.10);
    border: 1px solid rgba(160,144,80,0.25);
    color: var(--badge-limited);
}
/* .book-section-sep, .loading*, .empty*, @keyframes, .fade-up, .app-footer → layout.css */

.exp-panel {
    border: 1px solid var(--border); border-radius: var(--radius-s);
    overflow: hidden; margin-top: 6px; font-size: 0.78rem;
}
.exp-panel summary {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px 5px; background: var(--bg-panel);
    cursor: pointer; user-select: none; list-style: none;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-hint);
}
.exp-panel summary::-webkit-details-marker { display: none; }
.exp-panel summary::after { content: '▾'; font-size: 0.68rem; color: var(--text-hint); }
.exp-panel[open] summary::after { content: '▴'; }
.exp-body { padding: 8px 10px 10px; border-top: 1px solid var(--border); }
.exp-row { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; margin-bottom: 3px; }
.exp-delta { font-size: 0.68rem; font-weight: 700; min-width: 28px; text-align: right; flex-shrink: 0; }
.exp-label { flex: 1; color: var(--text); line-height: 1.4; }
.exp-alts { margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
.exp-alt-row { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: var(--text-sub); margin-bottom: 2px; }

body.in-iframe .nav,
body.in-iframe .btn-back,
body.in-iframe .breadcrumb,
body.in-iframe .app-footer,
body.in-iframe .footer-links { display: none !important; }
body.in-iframe .page { padding: 12px 16px 40px; max-width: 100%; }
body.in-iframe .identity-word { font-size: 2rem; }
body.in-iframe .section-block { margin-bottom: 20px; }
body.in-iframe .section-divider { margin: 0 0 20px; }

body.compact-reading-mode .result-ja {
    display: -webkit-box; -webkit-box-orient: vertical;
    -webkit-line-clamp: 1; overflow: hidden;
}

@media (max-width: 520px) {
    .page { padding: 24px 16px 80px; }
    .identity-word { font-size: 2.4rem; }
}

/* .discovery-card*, .help-btn, .help-popup*, .breadcrumb-tail → components.css */
/* .nav-next-*, .nav-inherit-* → components.css */

/* ══════════════════════════════════════════
   絞り込み条件ブロック（§1 直下用）
══════════════════════════════════════════ */
.filter-section-block { margin-bottom: 32px; }
</style>
</head>
<body>
<div class="page">

<!-- Nav -->
<div class="nav">
    <button class="btn-back" onclick="(function(){try{if(window.self!==window.top)return;}catch(e){}if(window.opener&&!window.opener.closed){window.close();return;}if(history.length>1){history.back();return;}location.href='index.html';})();">← 戻る</button>
    <div class="breadcrumb">
        <span class="crumb" id="bc-ref">—</span>
        <span class="sep">›</span>
        <span class="crumb" id="bc-word" style="font-family:'Gentium Plus',serif;font-size:0.95rem;">—</span>
        <span class="sep">›</span>
        <span class="breadcrumb-tail">
            <span>形態論</span>
            <button class="help-btn" id="help-btn" aria-expanded="false" aria-label="このページのヘルプ">?</button>
            <div class="help-popup" id="help-popup" role="tooltip">
                <div class="help-popup-title">形態論とは</div>
                <div class="help-popup-body">この語がどのような形で使われているかを調べます。</div>
                <div class="help-popup-examples">
                    <span class="help-popup-tag">動詞か名詞か</span>
                    <span class="help-popup-tag">どのような語形か</span>
                    <span class="help-popup-tag">どのように活用しているか</span>
                </div>
            </div>
        </span>
    </div>
</div>

<!-- ── 発見カード（形態論） ── -->
<div class="discovery-card" id="discovery-card" style="display:none">
    <div class="discovery-card-title">この語から分かること</div>
    <div class="discovery-word" id="disc-word"></div>
    <div class="discovery-rows" id="disc-rows"></div>
</div>


<!-- ══════════════════════════════════════════
     SECTION 1 — 語の正体
══════════════════════════════════════════ -->
<div class="section-block fade-up">
    <div class="section-title">§1 語形の正体</div>

    <div class="identity-block">
        <div class="identity-word" id="hdr-word">—</div>

        <div class="identity-lemma-row">
            <span class="identity-lemma-label">基本形</span>
            <span class="identity-lemma-val" id="hdr-lemma">—</span>
        </div>

        <div class="identity-ja-gloss" id="identity-ja-gloss" style="display:none"></div>

        <div class="identity-detail-block" id="identity-detail-block" style="display:none">
            <div class="identity-detail-label">詳細分析</div>
            <div class="identity-detail-flat" id="identity-detail-grid"></div>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════
     絞り込み条件（§1 直後・§2 の前）
══════════════════════════════════════════ -->
<div class="filter-section-block" id="filter-section-block" style="display:none">
    <details class="filter-disclosure" id="filter-details">
        <summary class="filter-disclosure-trigger">
            <span class="trigger-label">絞り込み条件</span>
            <span class="trigger-state">
                <span id="filter-summary-text">読み込み中…</span>
                <span class="trigger-arrow">▾</span>
            </span>
        </summary>
        <div class="filter-disclosure-body">

            <!-- ① 検索対象 -->
            <div class="filter-group" id="word-filter-group" style="display:none">
                <div class="filter-group-label">検索対象</div>
                <div class="chips" id="word-filter-chips"></div>
            </div>

            <!-- ② 範囲 -->
            <div class="filter-group">
                <div class="filter-group-label">範囲</div>

<script>

(function detectIframe() {
    try { if (window.self !== window.top) document.body.classList.add('in-iframe'); }
    catch(e) { document.body.classList.add('in-iframe'); }
})();

if (document.body.classList.contains('in-iframe')) {

}

const TENSE_JP  = { present:'現在', imperfect:'未完了', future:'未来', aorist:'アオリスト', perfect:'完了', pluperfect:'過去完了（大過去）' };
const VOICE_JP  = { active:'能動', middle:'中動', passive:'受動', 'middle deponent':'中動自動', 'middle or passive':'中動/受動' };
const VOICE_JP_FULL = { active:'能動態', middle:'中動態', passive:'受動態', 'middle deponent':'中動自動態', 'middle or passive':'中動態/受動態' };
const MOOD_JP   = { indicative:'直説法', subjunctive:'接続法', optative:'希求法', imperative:'命令法', infinitive:'不定詞', participle:'分詞' };
const GENDER_JP = { masculine:'男性', feminine:'女性', neuter:'中性' };
const NUMBER_JP = { singular:'単数', plural:'複数' };
const CASE_JP   = { nominative:'主格', genitive:'属格', dative:'与格', accusative:'対格', vocative:'呼格' };
const POS_JP    = { V:'動詞', N:'名詞', A:'形容詞', R:'関係代名詞', P:'人称代名詞', T:'冠詞', D:'指示代名詞' };

function getSearchParams() {
    const p   = new URLSearchParams(location.search);
    const dis = new Set((p.get('_disabled')||'').split(',').filter(Boolean));
    return {
        pos:    p.get('pos')   || '',
        tense:  p.get('tense') || '',
        mood:   p.get('mood')  || '',
        voice:  p.get('voice') || '',
        person: p.get('person')|| '',
        gender: { value: p.get('gender')||'', enabled: !dis.has('gender') },
        number: { value: p.get('number')||'', enabled: !dis.has('number') },
        case:   { value: p.get('case')  ||'', enabled: !dis.has('case')   },
        ref:    p.get('ref')   || '',
        word:   p.get('word')  || '',
        lemma:  p.get('lemma') || '',
        jword:  p.get('jword') || '',
    };
}
const params = getSearchParams();

let resolvedMorph = null;

function patchParamsFromEntry(entry) {
    if (resolvedMorph) return;
    const m = decodeMorph(entry);
    resolvedMorph = {
        voice:  m.voice  || params.voice  || '',
        gender: m.gender || params.gender?.value || '',
        number: m.number || params.number?.value || '',
        case:   m.case   || params.case?.value   || '',
        person: m.person || params.person || '',
        jaWord: entry.japanese || '',
    };
    ['gender','number','case'].forEach(key => {
        const val = resolvedMorph[key];
        if (val && !extState.find(f => f.key === key)) {
            extState.push({ key, label: key, value: val, enabled: true, _fromResolved: true });
        }
    });
    if (!params.voice && resolvedMorph.voice) params.voice = resolvedMorph.voice;
    if (!params.person && resolvedMorph.person) params.person = resolvedMorph.person;
    if (resolvedMorph.jaWord) {
        const bcWord = document.getElementById('bc-word');
        if (bcWord) {
            bcWord.textContent = resolvedMorph.jaWord;
            bcWord.style.fontFamily = 'inherit';
            bcWord.style.fontSize   = '';
        }
    }
    renderCoreTags();
    renderCoreChips();
    renderExtChips();
    updateFilterSummaryText();
}

let extState = [
    { key:'gender', label:'性', value: params.gender.value, enabled: params.gender.enabled },
    { key:'number', label:'数', value: params.number.value, enabled: params.number.enabled },
    { key:'case',   label:'格', value: params.case.value,   enabled: params.case.enabled   },
].filter(f => f.value);

/* 書物マスター（BOOK_MAP/BOOK_JP/BOOK_GROUPS/NT_BOOKS）は book-master.js が
   books.json から読み込む。init() の冒頭で BookMaster.load() を待ってから
   以下の変数を実値で埋める。レンダリング・検索関数はすべて init() 完了後にしか
   呼ばれないため、この遅延初期化で安全。 */
let BOOK_MAP = {};
let BOOK_JP = {};
let BOOK_GROUPS = [];
let bookState = [];
let wordFilterMode = params.word ? 'word' : (params.lemma ? 'lemma' : 'none');
const scopeState = { lxx: true, nt: true };
const LXX_KEYS = new Set(['lxx_torah','lxx_forprop','lxx_latprop','lxx_writings']);

function applyBookMaster(master) {
    BOOK_MAP = Object.fromEntries(master.ALL.map(b => [b.code, b.key]));
    BOOK_JP  = Object.fromEntries(master.ALL.map(b => [b.key, b.name]));
    BOOK_GROUPS = master.groups;
    bookState = BOOK_GROUPS.map(g => ({ ...g, enabled: true }));
}

function syncURL() {
    const p = new URLSearchParams(location.search);
    const dis = extState.filter(f=>!f.enabled).map(f=>f.key);
    if (dis.length) p.set('_disabled', dis.join(','));
    else p.delete('_disabled');
    history.replaceState(null,'','?'+p.toString());
}

const CLASS_TO_POS = {
    'verb':'V','noun':'N','adjective':'A','article':'T',
    'preposition':'P','conjunction':'C','adverb':'D',
    'particle':'X','pronoun':'P','relative pronoun':'R',
    'personal pronoun':'P','demonstrative pronoun':'D',
};
const TENSE_CODE  = { P:'present',I:'imperfect',F:'future',A:'aorist',X:'perfect',Z:'pluperfect' };
const VOICE_CODE  = { A:'active',M:'middle',P:'passive',D:'middle deponent',E:'middle or passive',N:'middle or passive' };
const MOOD_CODE   = { I:'indicative',S:'subjunctive',O:'optative',M:'imperative',N:'infinitive',P:'participle' };
const CASE_CODE   = { N:'nominative',G:'genitive',D:'dative',A:'accusative',V:'vocative' };
const NUMBER_CODE = { S:'singular',P:'plural' };
const GENDER_CODE = { M:'masculine',F:'feminine',N:'neuter' };

function entryPosCode(entry) {
    if (entry.pos) return String(entry.pos).replace(/-$/,'').toUpperCase();
    if (entry.class) return CLASS_TO_POS[String(entry.class).toLowerCase()] || '';
    return '';
}
function decodeMorph(entry) {
    const norm = v => (!v || v === '-') ? '' : v;
    if (entry.tense || entry.mood || entry.voice) {
        return { pos: entryPosCode(entry), tense: norm(entry.tense), voice: norm(entry.voice),
                 mood: norm(entry.mood), case: norm(entry.case), number: norm(entry.number),
                 gender: norm(entry.gender), person: norm(entry.person) };
    }
    if (entry.morph && typeof entry.morph === 'object') {
        const m = entry.morph;
        return { pos: norm(entry.pos||'').replace(/-$/,''), tense:norm(m.tense), voice:norm(m.voice),
                 mood:norm(m.mood), case:norm(m.case), number:norm(m.number), gender:norm(m.gender), person:norm(m.person) };
    }
    const raw = typeof entry.morph === 'string' ? entry.morph : '';
    const parts = raw.split('-');
    const pos = norm(entry.pos||parts[0]||'').replace(/-$/,'');
    if (pos.toUpperCase() === 'V' && parts[1]) {
        const seg = parts[1], off = /^[0-9]/.test(seg) ? 1 : 0;
        return { pos, tense:TENSE_CODE[seg[off]]||'', voice:VOICE_CODE[seg[off+1]]||'',
                 mood:MOOD_CODE[seg[off+2]]||'', person:seg[off+3]||'',
                 number:NUMBER_CODE[seg[off+4]]||'', gender:'', case:'' };
    }
    if (parts[1]) {
        const seg=parts[1], hp=['1','2','3'].includes(seg[0]), b=hp?seg.slice(1):seg;
        return { pos, tense:'',voice:'',mood:'', person:hp?seg[0]:'',
                 case:CASE_CODE[b[0]]||'', number:NUMBER_CODE[b[1]]||'', gender:GENDER_CODE[b[2]]||'' };
    }
    return { pos, tense:'',voice:'',mood:'',case:'',number:'',gender:'',person:'' };
}
function cleanText(entry) {
    return (entry.word||entry.normalized||entry.text||'').replace(/[.,:;·⸀⸁⸂⸃⌈⌉]/g,'').trim();
}
function getBookKey(entry) {
    if (entry._bookKey) return entry._bookKey;
    if (entry.book && isNaN(entry.book)) return String(entry.book);
    if (entry.book != null && entry.book !== '') {
        return BOOK_MAP[String(entry.book).padStart(2,'0')] || null;
    }
    return null;
}
function normalizeGreek(str) {
    return (str || '').normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/[⸀⸁⸂⸃⌈⌉.,;:·]/g,'').replace(/ς/g,'σ').toLowerCase().trim();
}

const STOP_LEMMAS = new Set([
    'ὁ','ἡ','τό','καί','δέ','εἰς','ἐν','οὐ','μή','ἀλλά','γάρ','ὅτι',
    'ἐκ','ἐξ','διά','κατά','περί','ὑπό','παρά','πρός','ἀπό','σύν','μετά','ἐπί',
    'ἀνά','ἀντί','ἕως','πρό','χωρίς','ὡς','ἐάν','εἰ','ἵνα','ὅταν','ὥστε',
    'αὐτός','ὅς','τις','πᾶς','ἐγώ','σύ','ἡμεῖς','ὑμεῖς','οὗτος','ἐκεῖνος',
    'εἰμί',
    'οὕτως','νῦν','τότε','ἤδη','μᾶλλον','οὐκέτι','μηκέτι','πάλιν','ὧδε','ἐκεῖ','ἔτι','ἄρα','ποτε','ὅτε',
    'μέν','τε','ἄν','γε','δή','οὖν',
    'οὐδέ','μηδέ','μήτε','οὔτε',
    'τίς','τί','πῶς','ποῦ','πόθεν',
]);

const coreOnState = { mood: true, voice: true, tense: true, person: true };

function matchEntry(entry) {
    if (wordFilterMode === 'lemma' && params.lemma) {
        if (normalizeGreek(entry.lemma||'') !== normalizeGreek(params.lemma)) return false;
    } else if (wordFilterMode === 'word' && params.word) {
        if (normalizeGreek(entry.word||entry.normalized||entry.text||'') !== normalizeGreek(params.word)) return false;
    }
    if (!bookState.every(g => g.enabled)) {
        const en = new Set(bookState.filter(g=>g.enabled).flatMap(g=>g.books));
        const bk = entry._bookKey || getBookKey(entry);
        if (!bk || !en.has(bk)) return false;
    }
    const sp = params.pos.replace(/-$/,'').toUpperCase();
    if (sp && entryPosCode(entry) !== sp) return false;
    const m = decodeMorph(entry);
    if (coreOnState.tense  && params.tense && m.tense !== params.tense) return false;
    if (coreOnState.mood   && params.mood  && m.mood  !== params.mood)  return false;
    if (coreOnState.voice  && params.voice) {
        const ok = m.voice === params.voice
            || (params.voice==='middle'  && (m.voice==='middle deponent'||m.voice==='middle or passive'))
            || (params.voice==='passive' && m.voice==='middle or passive');
        if (!ok) return false;
    }
    if (coreOnState.person && params.person && (m.person||'') !== params.person) return false;
    for (const f of extState) {
        if (f._fromResolved) continue;
        if (!f.enabled || !f.value) continue;
        if ((m[f.key]||'') !== f.value) return false;
    }
    return true;
}

function renderHeader() {
    const pos = params.pos.replace(/-$/,'').toUpperCase();
    document.getElementById('bc-ref').textContent   = buildRefLabel(params.ref) || '詳細';
    const bcWordEl = document.getElementById('bc-word');
    if (params.jword) {
        bcWordEl.textContent = params.jword;
        bcWordEl.style.fontFamily = "'Noto Serif JP', serif";
    } else {
        bcWordEl.textContent = params.word || '—';
        bcWordEl.style.fontFamily = "'Gentium Plus', serif";
    }
    document.getElementById('hdr-word').textContent = params.word || '—';
    document.getElementById('hdr-lemma').textContent = params.lemma || '—';
}

function renderDiscoveryCard() {
    const pos   = params.pos.replace(/-$/,'').toUpperCase();
    const word  = params.word || params.lemma || '—';
    const posJa = POS_JP[pos] || null;

    document.getElementById('disc-word').textContent = word;

    const rows = [];

    if (posJa) {
        rows.push(posJa);
    }

    if (pos === 'V') {
        const parts = [];
        if (params.tense) {
            const TENSE_PLAIN = {
                present: '今まさに起きていること',
                imperfect: '過去に繰り返し起きていたこと',
                future: 'これから起きること',
                aorist: '起きた出来事',
                perfect: '起きた結果が今も続いていること',
                pluperfect: '過去のある時点で完了していたこと',
            };
            parts.push(TENSE_PLAIN[params.tense] || TENSE_JP[params.tense]);
        }
        if (params.mood) {
            const MOOD_PLAIN = {
                indicative: '事実として述べている',
                subjunctive: '可能性・意志を表している',
                optative: '願望を表している',
                imperative: '命じている',
                infinitive: '動作そのものを表している',
                participle: '他の語と組み合わさっている',
            };
            parts.push(MOOD_PLAIN[params.mood] || MOOD_JP[params.mood]);
        }
        if (params.voice === 'passive' || params.voice === 'middle or passive') {
            parts.push('受ける側の立場で使われている');
        } else if (params.voice === 'middle' || params.voice === 'middle deponent') {
            parts.push('自分に関わる動作として使われている');
        }
        if (parts.length) rows.push(parts.join('・'));
    } else if (['N','A','R','D','P'].includes(pos)) {
        const CASE_PLAIN = {
            nominative: '文の主役として使われている',
            genitive:   '何かを修飾・所属を示している',
            dative:     '間接的な対象を示している',
            accusative: '動作の対象として使われている',
            vocative:   '呼びかけに使われている',
        };
        const caseVal = extState.find(f => f.key === 'case' && f.enabled)?.value;
        if (caseVal && CASE_PLAIN[caseVal]) {
            rows.push(CASE_PLAIN[caseVal]);
        }
        const numVal = extState.find(f => f.key === 'number' && f.enabled)?.value;
        if (numVal === 'plural') rows.push('複数形で使われている');
    }

    if (params.lemma) {
        rows.push(`「${params.lemma}」という語の一形`);
    }

    const el = document.getElementById('disc-rows');
    el.innerHTML = rows.map(r => `
        <div class="discovery-row">
            <span class="discovery-arrow">→</span>
            <span class="discovery-text">${r}</span>
        </div>`).join('');

    const card = document.getElementById('discovery-card');
    if (card && rows.length) {
        card.style.display = '';
        card.classList.add('fade-up');
    }
}

function renderCoreTags() {
    const pos = params.pos.replace(/-$/,'').toUpperCase();
    const PERSON_JP = { '1':'一人称', '2':'二人称', '3':'三人称' };

    const _rm = resolvedMorph || {};
    const _voiceVal = params.voice || _rm.voice || '';

    const jaGlossEl = document.getElementById('identity-ja-gloss');
    if (jaGlossEl) {
        const p = new URLSearchParams(location.search);
        const jaWord = p.get('jaword') || p.get('ja') || '';
        if (jaWord) {
            jaGlossEl.textContent = `「${jaWord}」`;
            jaGlossEl.style.display = '';
        }
    }

    const PATTERN_HINT = {
        'indicative:present':    '現在の事実・習慣的行為を描写します。',
        'indicative:imperfect':  '過去の継続・反復行為を表します。',
        'indicative:aorist':     '過去の単発的出来事を指示します。',
        'indicative:future':     '未来の確実な出来事を述べます。',
        'indicative:perfect':    '過去の行為が現在に持続的影響を与えます。',
        'indicative:pluperfect': '過去のある時点で完了していた行為を表します。',
        'subjunctive:present':   '現在・未来の可能性・目的・条件を示します。',
        'subjunctive:aorist':    '不確定な将来の行為・目的節で多用されます。',
        'imperative:present':    '継続・反復を求める命令を表します。',
        'imperative:aorist':     '一度限りの行為を命じます。',
        'infinitive:present':    '進行中・継続的な動作の動詞用法です。',
        'infinitive:aorist':     '完結した動作の動詞用法です。',
        'participle:present':    '主動詞と同時進行する動作を修飾します。',
        'participle:aorist':     '主動詞より先行する行為を修飾します。',
        'participle:perfect':    '完了した状態が持続する中での修飾を示します。',
        'optative:present':      '現在・未来への願望・祈願を表します。',
        'optative:aorist':       '過去に実現しなかった願望を示します。',
    };
    const hintKey = `${params.mood || ''}:${params.tense || ''}`;
    const hint = PATTERN_HINT[hintKey] || null;

    const summaryEl = document.getElementById('core-summary');
    if (summaryEl) {
        let summaryText = '';
        if (pos === 'V') {
            if (params.mood && ['indicative','subjunctive','imperative'].includes(params.mood)) {
                const personTxt  = PERSON_JP[params.person] || '';
                const moodTxt    = MOOD_JP[params.mood]     || '';
                const tenseTxt   = TENSE_JP[params.tense]   || '';
                const voiceTxt   = VOICE_JP[params.voice]   || '';
                if (params.mood === 'indicative') {
                    summaryText = `${personTxt ? personTxt + 'の' : ''}行為・出来事を事実として述べる形です。`;
                } else if (params.mood === 'subjunctive') {
                    summaryText = `${personTxt ? personTxt + 'に関わる' : ''}可能性・目的・条件を表す形です。`;
                } else if (params.mood === 'imperative') {
                    summaryText = `${tenseTxt === 'アオリスト' ? '一度限りの' : '継続的な'}行為を命じる命令法です。`;
                }
            } else if (params.mood === 'participle') {
                summaryText = hint || '動詞の意味を保ちながら名詞・形容詞的に機能します。性・数・格で修飾する名詞と一致します。';
            } else if (params.mood === 'infinitive') {
                summaryText = hint || '動作そのものを名詞のように表す不定詞です。';
            } else if (params.mood === 'optative') {
                summaryText = hint || '願望・祈願・婉曲な条件を表す希求法です。';
            } else if (hint) {
                summaryText = hint;
            }
        } else if (['N','A','R','P','D','T'].includes(pos)) {
            const POS_DESC = {
                N: '名詞として文中で使われています。',
                A: '形容詞として名詞を修飾しています。修飾する名詞と性・数・格が一致します。',
                R: '関係代名詞として節を導きます。先行詞の性・数と、節内の文法的役割（格）を持ちます。',
                P: '人称代名詞です。性・数・格で指示対象と文法的機能を示します。',
                D: '指示代名詞として対象を指し示します。性・数・格を持ちます。',
                T: '冠詞として名詞に添えられています。修飾する名詞と性・数・格が一致します。',
            };
            summaryText = POS_DESC[pos] || '';
        }
        summaryEl.textContent = summaryText;

            (typeof params[key] === 'object' ? params[key]?.value : params[key]) || '';

        if (pos === 'V') {
            if (params.mood)  parts.push(MOOD_JP[params.mood] || params.mood);
            const vv = _getVal('voice');
            if (vv)           parts.push(VOICE_JP_FULL[vv] || (vv + '態'));
            if (params.tense) parts.push(TENSE_JP[params.tense] || params.tense);
            const pv = params.person || _rm2.person || '';
            if (pv)           parts.push(PERSON_JP[pv] || (pv + '人称'));
            if (params.mood === 'participle') {
                const gv = _getVal('gender'), nv = _getVal('number'), cv = _getVal('case');
                if (gv) parts.push(GENDER_JP[gv] || gv);
                if (nv) parts.push(NUMBER_JP[nv] || nv);
                if (cv) parts.push(CASE_JP[cv]   || cv);
            } else {
                const nv = _getVal('number');
                if (nv) parts.push(NUMBER_JP[nv] || nv);

            if (nv) parts.push(NUMBER_JP[nv] || nv);
            if (cv) parts.push(CASE_JP[cv]   || cv);
        }

        if (parts.length) {
            detailGrid.textContent = parts.join('　');
            if (detailBlock) detailBlock.style.display = '';
        }
    }
}

function renderDist(matched) {
    const counts = {};
    matched.forEach(e => { const bk = e._bookKey || getBookKey(e) || '?'; counts[bk] = (counts[bk]||0)+1; });
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    const max = sorted[0]?.[1] || 1;
    const total = matched.length;

    let concentration, badgeClass;
    if (total <= 10) {
        concentration = '限定'; badgeClass = 'limited';
    } else {
        const top1Pct = sorted[0] ? sorted[0][1] / total : 0;
        const top3Sum = sorted.slice(0, 3).reduce((s, [,n]) => s + n, 0);
        if (top1Pct > 0.5) {
            concentration = '集中'; badgeClass = 'concentrated';
        } else {
            concentration = '分散'; badgeClass = 'dispersed';
        }
    }
    const badgeHTML = `<span class="concentration-badge ${badgeClass}">${concentration}</span>`;

    document.getElementById('dist-total').textContent = total.toLocaleString();
    document.getElementById('concentration-badge').innerHTML = badgeHTML;
    document.getElementById('dist-list').innerHTML = sorted.slice(0,12).map(([k,n]) => `
        <div class="dist-row">
            <span class="dist-name">${BOOK_JP[k]||k}</span>

            <span class="dist-num">${n}</span>

    document.getElementById('dist-section').style.display = 'block';
}

const _jaMap = new Map();
const _KEY_TO_CODE = (() => {
    const m = {};
    Object.entries(BOOK_MAP).forEach(([code, key]) => { m[key] = code; });
    return m;
})();
function getJaVerse(entry) {
    const bk   = entry._bookKey || entry.book;
    const code = _KEY_TO_CODE[bk];
    const ch   = String(entry.ch ?? '').padStart(2, '0');
    const v    = String(entry.verse ?? '').padStart(2, '0');
    const key  = code && ch && v ? `${code}${String(entry.ch??'').padStart(2,'0')}${String(parseInt(entry.verse??0)).padStart(2,'0')}` : null;
    if (key && _jaMap.has(key)) return _jaMap.get(key);
    return entry.gloss || entry.english || '';
}
function buildRefLabel(ref) {
    const r = String(ref||'');
    const m = r.match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
    if (m) return `${BOOK_JP[m[1]]||m[1]} ${m[2]}章${m[3]}節`;
    if (r.length===6 && /^\d+$/.test(r)) {
        const bk = BOOK_MAP[r.slice(0,2)];
        return `${(bk&&BOOK_JP[bk])||bk||r.slice(0,2)} ${parseInt(r.slice(2,4))}章${parseInt(r.slice(4,6))}節`;
    }
    return r;
}

function renderPage() {
    const el   = document.getElementById('result-list');
    const rows = _currentRows;

        return;
    }
    const slice = rows.slice(0, _displayCount);
    const more  = rows.length - _displayCount;
    el.innerHTML = slice.map((entry, idx) => {
        const word     = entry.word || entry.normalized || entry.text || '';
        const refLabel = buildRefLabel(entry.ref);
        const jaText   = getJaVerse(entry);

        const encWord  = encodeURIComponent(word);
        return `<div class="app-card" style="animation:fadeUp 0.2s ease ${Math.min(idx*8,240)}ms both"
            onclick="toggleMorphContext(this,'${encRef}','${encWord}')">

                    <span class="result-lemma">${entry.lemma||''}</span>

                <span class="result-ref">${refLabel}</span>

    }
}

function navToSyntax(e) {
    e.preventDefault();
    const msg = { type: 'NAV_TO_SYNTAX', ref: params.ref, word: params.word };
    if (window.parent && window.parent !== window) { window.parent.postMessage(msg, '*'); return; }
    if (window.opener && !window.opener.closed) { window.opener.postMessage(msg, '*'); return; }
    const qs = new URLSearchParams();
    if (params.ref)   qs.set('ref',   params.ref);
    if (params.word)  qs.set('word',  params.word);
    if (params.lemma) qs.set('lemma', params.lemma);
    if (params.pos)   qs.set('pos',   params.pos);
    const _rm = resolvedMorph || {};
    const _pos = params.pos.replace(/-$/,'').toUpperCase();
    if (_pos === 'V') {
        if (params.tense || _rm.tense)   qs.set('tense',  params.tense || _rm.tense);
        if (params.mood)                  qs.set('mood',   params.mood);
        if (params.voice || _rm.voice)    qs.set('voice',  params.voice || _rm.voice);
    } else {
        if (params.case?.value  || _rm.case)   qs.set('case',   params.case?.value  || _rm.case);
        if (params.number?.value|| _rm.number) qs.set('number', params.number?.value || _rm.number);
        if (params.gender?.value|| _rm.gender) qs.set('gender', params.gender?.value || _rm.gender);
    }
    location.href = `syntax-search.html?${qs.toString()}`;
}

}

function toggleMorphContext(cardEl, encRef, encWord) {
    const ref  = decodeURIComponent(encRef);
    const word = decodeURIComponent(encWord);
    const existing = cardEl.querySelector('.morph-ctx');
    if (existing) { existing.remove(); cardEl.classList.remove('ctx-open'); return; }
    document.querySelectorAll('.app-card.ctx-open').forEach(c => {
        c.querySelector('.morph-ctx')?.remove(); c.classList.remove('ctx-open');
    });
    if (!window._morphData) { goToWord(ref, encWord); return; }
    const prefix = String(ref).replace(/!.*$/,'').trim();
    const _refParsed = (function(){
        const m = prefix.match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
        return m ? {book: m[1], chapter: parseInt(m[2],10), verse: parseInt(m[3],10)} : null;
    })();
    const tokens = window._morphData.filter(e => {
        if (_refParsed && e.book && e.chapter != null && e.verse != null) {
            return e.book === _refParsed.book
                && String(e.chapter) === String(_refParsed.chapter)
                && String(e.verse)   === String(_refParsed.verse);
        }
        return String(e.ref||'').replace(/!.*$/,'').trim() === prefix;
    });
    if (!tokens.length) { goToWord(ref, encWord); return; }
    const normWord = cleanText({ word });

    const POS_ROLE = {
        V:'role-verb', N:'role-noun', A:'role-adj', R:'role-pron', P:'role-pron',
        D:'role-pron', T:'role-art', CONJ:'role-conj', PREP:'role-prep',
    };
    const JPN_MAP_CTX = {
        tense: { P:'present', I:'imperfect', F:'future', A:'aorist', X:'perfect' },
        voice: { A:'active',  M:'middle',    P:'passive', D:'middle' },
        mood:  { I:'indicative', S:'subjunctive', O:'optative', M:'imperative', N:'infinitive', P:'participle' },
    };
    function _ctxDpClasses(rawMorph) {
        const cls = [];
        const parts = (rawMorph||'').split('-');
        const pos = parts[0];
        if (pos !== 'V' || !parts[1]) return cls;
        const off = /^[0-9]/.test(parts[1]) ? 1 : 0;
        const ten = parts[1][off], voi = parts[1][off+1], moo = parts[1][off+2];
        const tense = JPN_MAP_CTX.tense[ten], voice = JPN_MAP_CTX.voice[voi], mood = JPN_MAP_CTX.mood[moo];
        if (tense === 'present')    cls.push('dp-tense-present');
        if (tense === 'aorist')     cls.push('dp-tense-aorist');
        if (tense === 'perfect')    cls.push('dp-tense-perfect');
        if (mood  === 'imperative') cls.push('dp-mood-imperative');
        if (mood  === 'indicative') cls.push('dp-mood-indicative');
        if (voice === 'middle')     cls.push('dp-voice-middle');
        if (voice === 'passive')    cls.push('dp-voice-passive');
        return cls;
    }
    const lineHTML = tokens.map(t => {
        const w = cleanText(t);
        if (!w) return '';
        const isHit = w === normWord;
        const pos = (t.morph||'').split('-')[0] || 'other';
        const roleClass = POS_ROLE[pos] || 'role-other';
        const ja = t.japanese || '';
        const dpCls = _ctxDpClasses(t.morph||'').join(' ');
        const jaSpan = `<span class="ctx-chip-ja${dpCls?' '+dpCls:''}">${ja || w}</span>`;
        const grSpan = ja ? `<span class="ctx-chip-gr">${w}</span>` : '';
        const dot    = `<span class="ctx-chip-dot"></span>`;
        return `<span class="ctx-chip ${roleClass}${isHit?' ctx-hit':''}">${jaSpan}${grSpan}${dot}</span>`;
    }).filter(Boolean).join('');
    const ctx = document.createElement('div');
    ctx.className = 'morph-ctx';
    ctx.addEventListener('click', e => e.stopPropagation());
    ctx.innerHTML = `
        <div class="morph-ctx-line">${lineHTML}</div>
        <div class="morph-ctx-goto"><button onclick="goToWord('${encRef}','${encWord}')">本文へ →</button></div>`;
    cardEl.appendChild(ctx);
    cardEl.classList.add('ctx-open');
}

const JA_FOLDER = 'translations';
const JA_VERSION = 'JA1955';
/* 書物・章一覧と nt/lxx 振り分けは book-master.js（books.json）が単一の出典。
   ここではローカルコピーを持たず、fetchInBatches に渡されたタスクのみを扱う。 */
async function fetchInBatches(tasks,sz,onProg) {
    let all=[];
    for(let i=0;i<tasks.length;i+=sz) {
        const results=await Promise.allSettled(
            tasks.slice(i,i+sz).map(t=>
                BookMaster.fetchJSON(t.path)
                .then(data=>{ if(!Array.isArray(data)) return null; data.forEach(e=>{e._bookKey=t.key;}); return data; })
            )
        );
        results.forEach(r=>{ if(r.status==='fulfilled'&&Array.isArray(r.value)) all=all.concat(r.value); });
        onProg(Math.min(i+sz,tasks.length),tasks.length);
    }
    return all;
}
async function fetchJaData(morphPaths) {
    const KEY_TO_CODE={};
    Object.entries(BOOK_MAP).forEach(([code,key])=>{ KEY_TO_CODE[key]=code; });
    return Promise.allSettled(
        morphPaths.map(t=>({...t,path:`./${JA_FOLDER}/${JA_VERSION}/${t.key}/${t.ch}.json`}))
        .map(t=>fetch(t.path).then(r=>r.ok?r.json():null)
            /* JA1955は七十人訳のみの章（PSA151・JOL4等）を収録していないため、
               この章には和訳が存在しない。genuineなデータ取得失敗ではないので
               __failedFetches には積まず、console.infoのみで追跡可能にする。 */
            .catch(err=>{ console.info('[ja-translation] fetch error, skipping:', t.path, err); return null; })
            .then(data=>{
                if(!data) { console.info('[ja-translation] no Japanese translation available for', t.path); return; }
                const vers=data.verses; if(!vers||typeof vers!=='object') return;
                const bc=KEY_TO_CODE[t.key]; if(!bc) return;
                Object.entries(vers).forEach(([vn,tx])=>{
                    _jaMap.set(`${bc}${String(t.ch).padStart(2,'0')}${String(parseInt(vn)).padStart(2,'0')}`,String(tx));
                });
            })
        )
    );
}

/* ヘルプポップオーバー */
(function initHelpPopup() {
    const btn   = document.getElementById('help-btn');
    const popup = document.getElementById('help-popup');
    if (!btn || !popup) return;

    function openPopup() {
        popup.classList.remove('align-right');
        popup.style.left = '';
        popup.style.right = '';
        popup.style.top = '';
        const rect = btn.getBoundingClientRect();
        const popW = 260;
        const margin = 16;
        let top = rect.bottom + 8;
        if (rect.left + popW > window.innerWidth - margin) {
            popup.classList.add('align-right');
            popup.style.right = (window.innerWidth - rect.right) + 'px';
        } else {
            popup.style.left = rect.left + 'px';
        }
        popup.style.top = top + 'px';
        popup.classList.add('open');
        btn.setAttribute('aria-expanded', 'true');
    }
    function closePopup() {
        popup.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
    }
    function togglePopup(e) {
        e.stopPropagation();
        popup.classList.contains('open') ? closePopup() : openPopup();
    }
    btn.addEventListener('click', togglePopup);
    btn.addEventListener('touchend', function(e){ e.preventDefault(); togglePopup(e); });
    document.addEventListener('click', function(e) {
        if (!popup.contains(e.target) && e.target !== btn) closePopup();
    });
    document.addEventListener('touchend', function(e) {
        if (!popup.contains(e.target) && e.target !== btn) closePopup();
    });
})();

/* 初期化 */
(async function init() {
    const loadEl = document.getElementById('loading');
    const listEl = document.getElementById('result-list');

    /* 書物マスターは books.json が唯一の出典。ロードが終わるまで
       BOOK_MAP/BOOK_JP/BOOK_GROUPS/bookState は使用不可。 */
    const master = await BookMaster.load();
    applyBookMaster(master);
    BookMaster.attachWarningPanel(document.getElementById('fetch-warning-panel'));

    const refStr = params.ref || '';
    const refM   = refStr.match(/^([A-Z0-9]+)\s+(\d+)/);
    if (refM) {
        const bookKey = refM[1];
        const chNum   = parseInt(refM[2], 10);
        const path    = await BookMaster.pathFor(bookKey, chNum);
        {
            const data = await BookMaster.fetchJSON(path);
            if (Array.isArray(data) && !resolvedMorph) {
                const tokenIdx = (refStr.match(/!(\d+)$/) || [])[1];
                const wordNorm = normalizeGreek(params.word || '');
                let target = null;
                if (tokenIdx != null) {
                    const verseParsed = refStr.match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
                    if (verseParsed) {
                        const vTokens = data.filter(e =>
                            String(e.chapter||'') === verseParsed[2] &&
                            String(e.verse||'')   === verseParsed[3]
                        );
                        target = vTokens[parseInt(tokenIdx,10) - 1] || null;
                    }
                }
                if (!target && wordNorm) {
                    target = data.find(e => normalizeGreek(e.word||e.normalized||e.text||'') === wordNorm);
                }
                if (target) patchParamsFromEntry(target);
            }
        }
    }

    renderHeader();
    renderDiscoveryCard();
    renderCoreTags();
    if (typeof renderAspectTag === 'function' && params.tense) { renderAspectTag(params.tense); }
    renderCoreChips();
    renderExtChips();
    renderBookChips();
    renderScopeChips();
    renderWordFilterChips();
    updateFilterSummaryText();

    /* 絞り込み条件ブロックを表示 */
    const filterBlock = document.getElementById('filter-section-block');
    if (filterBlock) filterBlock.style.display = '';

    const paths = await BookMaster.buildChapterTasks();
    const allData = await fetchInBatches(paths, 20, (done, ttl) => {
        const pct = Math.round(done/ttl*100);
        const bar = document.getElementById('load-bar');
        const txt = document.getElementById('load-text');
        if (bar) bar.style.width = pct + '%';
        if (txt) txt.textContent = `読み込み中 ${pct}%`;
    });

    if (!allData.length) {
        loadEl.innerHTML = `<p style="color:#c00;font-size:0.82rem;">データが見つかりませんでした。<code>bible_data/ROM/1.json</code> の形式で配置してください。</p>`;
        return;
    }

    const txt = document.getElementById('load-text');
    if (txt) txt.textContent = '日本語訳を読み込み中…';
    await fetchJaData(paths);

    window._morphData = allData;
    loadEl.style.display = 'none';
    listEl.style.display = 'flex';
    document.getElementById('result-section').style.display = '';
    renderResults(allData);
    updateNavInherit();
})();
</script>
