<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>形態論検索 — ウオノ門</title>
<link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-paper:        #ffffff;
    --bg-panel:        #f5f5f7;
    --bg-sidebar:      #fafafa;
    --bg-card:         #f5f5f7;
    --text-main:       #1d1d1f;
    --text-sub:        #6e6e73;
    --accent-dark:     #1d1d1f;
    --highlight:       #5a6e82;
    --highlight-light: rgba(90,110,130,0.10);
    --border-soft:     rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: var(--bg-paper);
    color: var(--text-main);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
}

/* ===================== レイアウト ===================== */
.page { max-width: 720px; margin: 0 auto; padding: 28px 24px 80px; }

/* ===================== ナビゲーション ===================== */
.nav-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
}
.btn-back {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 13px;
    font-size: 0.8rem;
    font-family: inherit;
    border: 1px solid var(--border-soft);
    border-radius: 20px;
    background: transparent;
    cursor: pointer;
    color: var(--text-sub);
    transition: background 0.12s;
}
.btn-back:hover { background: var(--bg-panel); }
.breadcrumb {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.78rem;
    color: var(--text-sub);
    flex: 1;
    overflow: hidden;
}
.breadcrumb .crumb { color: var(--highlight); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
.breadcrumb .sep   { color: var(--text-sub); opacity: 0.4; flex-shrink: 0; }
.breadcrumb .current { color: var(--text-sub); }

/* ===================== 検索の意味カード ===================== */
.meaning-card {
    background: var(--highlight-light);
    border: 1px solid rgba(90,110,130,0.2);
    border-left: 3px solid var(--highlight);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
}
.meaning-label {
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--highlight);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
}
.meaning-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text-main);
    line-height: 1.5;
    margin-bottom: 3px;
}
.meaning-sub {
    font-size: 0.75rem;
    color: var(--text-sub);
    line-height: 1.6;
}

/* ===================== フィルターパネル ===================== */
.filter-panel {
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    background: var(--bg-sidebar);
    margin-bottom: 16px;
    overflow: hidden;
}
.filter-section { padding: 12px 16px; }
.filter-section + .filter-section { border-top: 1px solid var(--border-soft); }
.filter-section-label {
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
}
.chips { display: flex; flex-wrap: wrap; gap: 6px; }

/* コアチップ（変更不可） */
.chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
}
.chip-core {
    background: rgba(90,110,130,0.08);
    border: 1px solid rgba(90,110,130,0.15);
    color: var(--highlight);
    font-weight: 600;
}
.chip-core .chip-key {
    font-size: 0.62rem;
    color: var(--text-sub);
    font-weight: 400;
}

/* 拡張チップ（ON/OFF可能） */
.chip-ext {
    border: 1px solid var(--border-soft);
    cursor: pointer;
    user-select: none;
    transition: all 0.12s;
}
.chip-ext.on {
    background: rgba(90,110,130,0.10);
    border-color: rgba(90,110,130,0.3);
    color: var(--highlight);
    font-weight: 600;
}
.chip-ext.off {
    background: var(--bg-paper);
    border-color: var(--border-soft);
    color: #bbb;
    text-decoration: line-through;
}
.chip-ext:hover.on  { background: rgba(90,110,130,0.17); }
.chip-ext:hover.off { background: var(--bg-panel); }

.chip-toggle-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    flex-shrink: 0;
    transition: background 0.1s;
}
.chip-ext.on .chip-toggle-dot {
    background: var(--highlight);
    border-color: var(--highlight);
    color: #fff;
}
.chip-ext.off .chip-toggle-dot { background: transparent; color: #ccc; }

/* ===================== 結果ヘッダー ===================== */
.result-meta {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 0 2px;
    margin-bottom: 12px;
}
.result-count { font-size: 0.82rem; color: var(--text-sub); }
.result-count strong { font-size: 1rem; font-weight: 700; color: var(--text-main); }
.result-pct   { font-size: 0.72rem; color: #c0c0c5; }

/* ===================== 結果リスト ===================== */
.result-list { display: flex; flex-direction: column; gap: 6px; }

.result-card {
    border: 1px solid var(--border-soft);
    border-radius: 10px;
    padding: 12px 14px;
    background: var(--bg-paper);
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s, transform 0.1s;
}
.result-card:hover {
    background: var(--highlight-light);
    border-color: rgba(90,110,130,0.3);
    transform: translateY(-1px);
}
.result-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 5px;
}
.result-word {
    font-family: 'Gentium Plus', serif;
    font-size: 1.4rem;
    line-height: 1.3;
    color: var(--text-main);
}
.result-lemma {
    font-family: 'Gentium Plus', serif;
    font-size: 0.78rem;
    color: var(--text-sub);
    margin-left: 6px;
}
.result-ref {
    font-size: 0.72rem;
    color: #c0c0c5;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    white-space: nowrap;
    flex-shrink: 0;
}
.morph-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
}
.mtag {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--bg-panel);
    color: var(--text-sub);
    border: 1px solid var(--border-soft);
}
.mtag.core {
    background: rgba(90,110,130,0.08);
    color: var(--highlight);
    border-color: rgba(90,110,130,0.18);
    font-weight: 700;
}

/* ===================== 空状態・ローディング ===================== */
.empty-state {
    text-align: center;
    padding: 40px 16px;
    color: var(--text-sub);
    font-size: 0.82rem;
    line-height: 2;
}
.empty-icon {
    font-family: 'Gentium Plus', serif;
    font-size: 2rem;
    color: #d0d0d8;
    margin-bottom: 8px;
}

.loading {
    text-align: center;
    padding: 48px 16px;
    font-size: 0.82rem;
    color: var(--text-sub);
}
.loading-dot {
    display: inline-block;
    animation: pulse 1.4s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }

/* ===================== プリセットバナー（将来拡張用） ===================== */
.preset-hint {
    display: none; /* 将来的に意味プリセット接続時に表示 */
    background: var(--bg-panel);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 12px;
    font-size: 0.75rem;
    color: var(--text-sub);
}
.preset-hint.visible { display: flex; align-items: center; gap: 8px; }

/* ===================== アニメーション ===================== */
@keyframes fadeIn   { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse    { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
@keyframes slideIn  { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.animate-in { animation: slideIn 0.2s ease forwards; }
</style>
</head>
<body>
<div class="page">

    <!-- ナビゲーション -->
    <div class="nav-bar">
        <button class="btn-back" onclick="window.close(); if(!window.opener) history.back();">← 戻る</button>
        <div class="breadcrumb">
            <span class="crumb" id="bc-ref">—</span>
            <span class="sep">›</span>
            <span class="crumb" id="bc-word" style="font-family:'Gentium Plus',serif; font-size:1rem;">—</span>
            <span class="sep">›</span>
            <span class="current">形態論検索</span>
        </div>
    </div>

    <!-- 検索の意味説明 -->
    <div class="meaning-card">
        <div class="meaning-label">この検索の意味</div>
        <div class="meaning-title" id="meaning-title">読み込み中...</div>
        <div class="meaning-sub"  id="meaning-sub"></div>
    </div>

    <!-- フィルターパネル -->
    <div class="filter-panel">
        <div class="filter-section">
            <div class="filter-section-label">コア条件（必須）</div>
            <div class="chips" id="core-chips"></div>
        </div>
        <div class="filter-section">
            <div class="filter-section-label">拡張条件 — タップで絞り込みON / OFF</div>
            <div class="chips" id="ext-chips"></div>
        </div>
    </div>

    <!-- 将来：意味プリセットバナー（非表示） -->
    <div class="preset-hint" id="preset-hint">
        <span>💡</span>
        <span>関連する意味プリセット: <strong>「信仰・信頼」</strong></span>
    </div>

    <!-- 結果ヘッダー -->
    <div class="result-meta">
        <div class="result-count"><strong id="count">0</strong> 件ヒット</div>
        <div class="result-pct" id="result-pct"></div>
    </div>

    <!-- 結果リスト -->
    <div id="loading" class="loading">
        <div style="margin-bottom:8px; font-family:'Gentium Plus',serif; font-size:1.4rem; color:#ccc;">ἀναζητεῖ</div>
        <span class="loading-dot">・</span><span class="loading-dot">・</span><span class="loading-dot">・</span>
    </div>
    <div class="result-list" id="result-list"></div>

</div>

<script>
/* =====================================================
   定数・ラベルマップ
   ===================================================== */
const TENSE_JP  = { present:'現在', imperfect:'未完了', future:'未来',
                    aorist:'アオリスト', perfect:'完了', pluperfect:'過去完了' };
const VOICE_JP  = { active:'能動', middle:'中動', passive:'受動',
                    'middle deponent':'中動自動', D:'能動的受動' };
const MOOD_JP   = { indicative:'直説法', subjunctive:'接続法', optative:'希求法',
                    imperative:'命令法', infinitive:'不定詞', participle:'分詞' };
const GENDER_JP = { masculine:'男性', feminine:'女性', neuter:'中性' };
const NUMBER_JP = { singular:'単数', plural:'複数', S:'単数', P:'複数' };
const CASE_JP   = { nominative:'主格', genitive:'属格', dative:'与格',
                    accusative:'対格', vocative:'呼格' };
const POS_JP    = { 'V-':'動詞', 'V':'動詞', 'N-':'名詞', 'A-':'形容詞',
                    'R-':'関係代名詞', 'P-':'人称代名詞', 'T-':'冠詞' };

/* 法ごとの意味説明 */
const MOOD_DESC = {
    participle: '継続・進行中の動作を表す分詞形。「〜している者」という含意を持ちます。条件を崩してより広い分布を確認してみましょう。',
    indicative: '事実として起きていることを述べる直説法。文の主軸となる最も一般的な形式です。',
    imperative: '命令・要求を表す命令法。訓戒・勧告文脈で頻出します。現在命令は反復継続の命令を表します。',
    subjunctive:'可能性・目的を表す接続法。条件節や目的節で使われます。',
    infinitive: '動詞の不定詞形。主語や目的語として機能します。「〜すること」と訳せます。',
    optative:   '願望・婉曲を表す希求法。新約ではやや稀な形式です。',
};

/* =====================================================
   URLパラメータ解析
   ===================================================== */
function getSearchParams() {
    const p = new URLSearchParams(location.search);
    const disabled = new Set((p.get('_disabled') || '').split(',').filter(Boolean));
    return {
        pos:    p.get('pos')    || '',
        tense:  p.get('tense')  || '',
        mood:   p.get('mood')   || '',
        voice:  p.get('voice')  || '',
        gender: { value: p.get('gender') || '', enabled: !disabled.has('gender') },
        number: { value: p.get('number') || '', enabled: !disabled.has('number') },
        case:   { value: p.get('case')   || '', enabled: !disabled.has('case')   },
        ref:    p.get('ref')    || '',
        word:   p.get('word')   || '',
    };
}

/* =====================================================
   状態
   ===================================================== */
const params = getSearchParams();

let extState = [
    { key:'gender', label:'性', value: params.gender.value, enabled: params.gender.enabled },
    { key:'number', label:'数', value: params.number.value, enabled: params.number.enabled },
    { key:'case',   label:'格', value: params.case.value,   enabled: params.case.enabled   },
].filter(f => f.value); // 値がない項目は表示しない

/* =====================================================
   URLを拡張条件の状態に同期
   ===================================================== */
function syncURL() {
    const p = new URLSearchParams(location.search);
    const disabled = extState.filter(f => !f.enabled).map(f => f.key);
    if (disabled.length) p.set('_disabled', disabled.join(','));
    else p.delete('_disabled');
    history.replaceState(null, '', '?' + p.toString());
}

/* =====================================================
   形態素コード文字列 → オブジェクト変換
   bible_data/{book}/{ch}.json の morph フィールドは
   "V-AAI3S" のような文字列コードになっている
   ===================================================== */
const TENSE_CODE  = { P:'present', I:'imperfect', F:'future', A:'aorist', X:'perfect', Z:'pluperfect' };
const VOICE_CODE  = { A:'active', M:'middle', P:'passive', D:'middle deponent', E:'middle or passive', N:'middle or passive' };
const MOOD_CODE   = { I:'indicative', S:'subjunctive', O:'optative', M:'imperative', N:'infinitive', P:'participle' };
const CASE_CODE   = { N:'nominative', G:'genitive', D:'dative', A:'accusative', V:'vocative' };
const NUMBER_CODE = { S:'singular', P:'plural' };
const GENDER_CODE = { M:'masculine', F:'feminine', N:'neuter' };
const PERSON_CODE = { '1':'1', '2':'2', '3':'3' };

function decodeMorph(entry) {
    // morphがオブジェクトならそのまま返す（morphgnt.json形式）
    if (entry.morph && typeof entry.morph === 'object') {
        const m = entry.morph;
        // オブジェクト形式でも値が "-" のものは空に正規化
        return {
            pos:    (entry.pos  || '').replace(/-$/, ''),
            tense:  m.tense  === '-' ? '' : (m.tense  || ''),
            voice:  m.voice  === '-' ? '' : (m.voice  || ''),
            mood:   m.mood   === '-' ? '' : (m.mood   || ''),
            case:   m.case   === '-' ? '' : (m.case   || ''),
            number: m.number === '-' ? '' : (m.number || ''),
            gender: m.gender === '-' ? '' : (m.gender || ''),
            person: m.person === '-' ? '' : (m.person || ''),
        };
    }

    // morphが文字列コードの場合（bible_data/{book}/{ch}.json 形式）
    // 例: "V-AAI3S"  "N-NSM" "A-NSM"
    const raw   = typeof entry.morph === 'string' ? entry.morph : '';
    const parts = raw.split('-');
    const pos   = (entry.pos || parts[0] || '').replace(/-$/, '');

    if ((pos === 'V' || pos === 'v') && parts[1]) {
        // 動詞コード: parts[1] = "AAI3S" など
        // 先頭が数字（語幹タイプ番号）の場合は+1オフセット
        const seg = parts[1];
        const off = /^[0-9]/.test(seg) ? 1 : 0;
        return {
            pos,
            tense:  TENSE_CODE[seg[off + 0]] || '',
            voice:  VOICE_CODE[seg[off + 1]] || '',
            mood:   MOOD_CODE[seg[off + 2]]  || '',
            person: seg[off + 3] || '',
            number: NUMBER_CODE[seg[off + 4]] || '',
            gender: '',  // 動詞本体に性は不要
            case:   '',
        };
    }

    // 名詞・形容詞・代名詞・冠詞系: parts[1] = "NSM" など
    if (parts[1]) {
        const seg = parts[1];
        const hasPerson = ['1','2','3'].includes(seg[0]);
        return {
            pos,
            tense:  '',
            voice:  '',
            mood:   '',
            person: hasPerson ? seg[0] : '',
            case:   CASE_CODE[hasPerson ? seg[1] : seg[0]]   || '',
            number: NUMBER_CODE[hasPerson ? seg[2] : seg[1]] || '',
            gender: GENDER_CODE[hasPerson ? seg[3] : seg[2]] || '',
        };
    }

    return { pos, tense:'', voice:'', mood:'', case:'', number:'', gender:'', person:'' };
}

/* =====================================================
   形態素マッチング
   ===================================================== */
function matchEntry(entry) {
    const m = decodeMorph(entry);

    // pos（"V-" と "V" 両対応）
    if (params.pos) {
        const searchPos = params.pos.replace(/-$/, '');
        if (m.pos.toUpperCase() !== searchPos.toUpperCase()) return false;
    }
    // tense
    if (params.tense && m.tense !== params.tense) return false;
    // mood
    if (params.mood  && m.mood  !== params.mood)  return false;
    // voice（"middle deponent" は "middle" にも反応させる）
    if (params.voice) {
        if (m.voice !== params.voice) {
            // "middle deponent" → params.voice="middle" なら通す
            if (!(params.voice === 'middle' && m.voice === 'middle deponent')) return false;
        }
    }

    // 拡張条件
    for (const f of extState) {
        if (!f.enabled || !f.value) continue;
        if ((m[f.key] || '') !== f.value) return false;
    }
    return true;
}

/* =====================================================
   自然言語説明生成
   ===================================================== */
function buildDescription() {
    const tense = TENSE_JP[params.tense]  || params.tense;
    const voice = VOICE_JP[params.voice]  || params.voice;
    const mood  = MOOD_JP[params.mood]    || params.mood;
    const pos   = POS_JP[params.pos]      || params.pos;

    const activeExt = extState.filter(f => f.enabled && f.value);
    const extParts  = activeExt.map(f => {
        if (f.key === 'gender') return GENDER_JP[f.value] || f.value;
        if (f.key === 'number') return NUMBER_JP[f.value] || f.value;
        if (f.key === 'case')   return CASE_JP[f.value]   || f.value;
        return '';
    }).filter(Boolean);

    // コア部分
    let core = '';
    if (params.mood === 'participle' || params.mood === 'infinitive') {
        core = [tense, voice, mood].filter(Boolean).join('');
    } else {
        core = [pos, tense, voice, mood].filter(Boolean).join('');
    }

    const extStr = extParts.length ? `（${extParts.join('・')}）` : '';
    const title  = `${core}${extStr}を抽出しています`;

    const relaxed = extState.filter(f => !f.enabled).length > 0;
    const sub = relaxed
        ? '拡張条件を一部解除中 — より広い分布を表示しています。条件を追加するほど絞り込まれます。'
        : (MOOD_DESC[params.mood] || '選択された形態素に完全一致する語形を検索しています。');

    return { title, sub };
}

/* =====================================================
   レンダリング — パンくず
   ===================================================== */
function renderBreadcrumb() {
    document.getElementById('bc-ref').textContent  = params.ref  || '詳細';
    document.getElementById('bc-word').textContent = params.word || '—';
}

/* =====================================================
   レンダリング — 意味カード
   ===================================================== */
function renderMeaning() {
    const { title, sub } = buildDescription();
    document.getElementById('meaning-title').textContent = title;
    document.getElementById('meaning-sub').textContent   = sub;
}

/* =====================================================
   レンダリング — コアチップ
   ===================================================== */
function renderCoreChips() {
    const defs = [
        { key:'pos',   label:'品詞', val: POS_JP[params.pos]    || params.pos    },
        { key:'tense', label:'時制', val: TENSE_JP[params.tense]|| params.tense  },
        { key:'voice', label:'態',   val: VOICE_JP[params.voice]|| params.voice  },
        { key:'mood',  label:'法',   val: MOOD_JP[params.mood]  || params.mood   },
    ].filter(d => d.val);

    document.getElementById('core-chips').innerHTML = defs.map(d => `
        <div class="chip chip-core">
            <span class="chip-key">${d.label}</span>
            <span>${d.val}</span>
        </div>
    `).join('');
}

/* =====================================================
   レンダリング — 拡張チップ
   ===================================================== */
function renderExtChips() {
    const LABEL_VAL = {
        gender: v => GENDER_JP[v] || v,
        number: v => NUMBER_JP[v] || v,
        case:   v => CASE_JP[v]   || v,
    };
    const el = document.getElementById('ext-chips');

    if (extState.length === 0) {
        el.innerHTML = '<span style="font-size:0.72rem; color:#bbb;">この形態素には絞り込み可能な拡張条件がありません</span>';
        return;
    }

    el.innerHTML = extState.map((f, i) => `
        <div class="chip chip-ext ${f.enabled ? 'on' : 'off'}" onclick="toggleExt(${i})">
            <div class="chip-toggle-dot">${f.enabled ? '✓' : ''}</div>
            <span style="font-size:0.65rem; opacity:0.7;">${f.label}</span>
            <span>${LABEL_VAL[f.key](f.value)}</span>
        </div>
    `).join('');
}

/* =====================================================
   レンダリング — 結果リスト
   ===================================================== */
function renderResults(allData) {
    const matched = allData.filter(matchEntry);
    const posNorm = params.pos.replace(/-$/, '');
    const samePos = allData.filter(e => (e.pos || '').replace(/-$/, '') === posNorm).length;

    document.getElementById('count').textContent     = matched.length.toLocaleString();
    document.getElementById('result-pct').textContent =
        samePos > 0 ? `同品詞 ${samePos.toLocaleString()} 件中` : '';

    const el = document.getElementById('result-list');

    if (matched.length === 0) {
        el.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">∅</div>
                条件に一致する語形が見つかりませんでした。<br>
                拡張条件をOFFにして検索範囲を広げてみてください。
            </div>`;
        return;
    }

    // 重複排除（同節・同語形）& 上限200件
    const seen   = new Set();
    const unique = matched.filter(e => {
        const key = `${e.ref}|${e.word || e.normalized}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    }).slice(0, 200);

    el.innerHTML = unique.map((entry, idx) => {
        const m = decodeMorph(entry);  // 文字列・オブジェクト両対応
        const displayWord = entry.word || entry.normalized || entry.text || '';

        // 形態タグ
        const coreParts = [
            MOOD_JP[m.mood],
            TENSE_JP[m.tense],
            VOICE_JP[m.voice],
        ].filter(Boolean);
        const extParts = [
            CASE_JP[m.case],
            NUMBER_JP[m.number],
            GENDER_JP[m.gender],
        ].filter(Boolean);

        const tagHTML =
            coreParts.map(t => `<span class="mtag core">${t}</span>`).join('') +
            extParts.map(t => `<span class="mtag">${t}</span>`).join('');

        // ref表示（書番号:章:節）
        const refLabel = entry.ref
            ? entry.ref.replace(/^0+/, '').replace(/(\d+)(\d{2})(\d{2})/, (_, bk, ch, v) => `${parseInt(bk)}:${parseInt(ch)}:${parseInt(v)}`)
            : '';

        return `
            <div class="result-card animate-in" style="animation-delay:${Math.min(idx * 20, 400)}ms"
                 onclick="goToWord('${entry.ref || ''}', '${encodeURIComponent(displayWord)}')">
                <div class="result-top">
                    <div>
                        <span class="result-word">${displayWord}</span>
                        <span class="result-lemma">${entry.lemma || ''}</span>
                    </div>
                    <span class="result-ref">${refLabel}</span>
                </div>
                <div class="morph-tags">${tagHTML}</div>
            </div>`;
    }).join('');
}

/* =====================================================
   インタラクション
   ===================================================== */
function toggleExt(i) {
    extState[i].enabled = !extState[i].enabled;
    renderExtChips();
    renderMeaning();
    syncURL();
    if (window._morphData) renderResults(window._morphData);
}

function goToWord(ref, wordEncoded) {
    // opener（index.html）が生きていれば通知、なければ単純にクローズ
    const word = decodeURIComponent(wordEncoded);
    if (window.opener && !window.opener.closed) {
        // index.html側でイベントリッスン可能な構造（将来の拡張ポイント）
        window.opener.postMessage({ type: 'GO_TO_REF', ref, word }, '*');
    }
    // 参照をURLに表示するだけでも十分
    console.log('→ ref:', ref, 'word:', word);
}

/* =====================================================
   書物リスト（index.html の SB_BOOKS と同期）
   bible_data/{key}/{chapter}.json の構造に対応
   ===================================================== */
const ALL_BOOKS = [
    // 新約
    {key:'ROM', ch:16}, {key:'1CO', ch:16}, {key:'2CO', ch:13},
    {key:'GAL', ch:6},  {key:'EPH', ch:6},  {key:'PHP', ch:4},
    {key:'COL', ch:4},  {key:'1TH', ch:5},  {key:'2TH', ch:3},
    {key:'1TI', ch:6},  {key:'2TI', ch:4},  {key:'TIT', ch:3},
    {key:'PHM', ch:1},
    // 旧約
    {key:'GEN', ch:50}, {key:'EXO', ch:40}, {key:'LEV', ch:27},
    {key:'NUM', ch:36}, {key:'DEU', ch:34}, {key:'JOS', ch:24},
    {key:'JDG', ch:21}, {key:'RUT', ch:4},  {key:'1SA', ch:31},
    {key:'2SA', ch:24}, {key:'1KI', ch:22}, {key:'2KI', ch:25},
    {key:'PSA', ch:150},{key:'PRO', ch:31}, {key:'ECC', ch:12},
    {key:'ISA', ch:66}, {key:'JER', ch:52}, {key:'EZK', ch:48},
    {key:'DAN', ch:12},
];

// 全 (book, chapter) ペアを展開
function buildAllChapterPaths() {
    const paths = [];
    for (const book of ALL_BOOKS) {
        for (let c = 1; c <= book.ch; c++) {
            paths.push({ key: book.key, ch: c, path: `./bible_data/${book.key}/${c}.json` });
        }
    }
    return paths; // 約796件
}

// N件ずつ並列フェッチするバッチ処理
async function fetchInBatches(tasks, batchSize, onProgress) {
    let allData = [];
    for (let i = 0; i < tasks.length; i += batchSize) {
        const batch = tasks.slice(i, i + batchSize);
        const results = await Promise.allSettled(
            batch.map(t =>
                fetch(t.path)
                    .then(r => r.ok ? r.json() : null)
                    .catch(() => null)
            )
        );
        results.forEach(r => {
            if (r.status === 'fulfilled' && Array.isArray(r.value)) {
                allData = allData.concat(r.value);
            }
        });
        onProgress(Math.min(i + batchSize, tasks.length), tasks.length);
    }
    return allData;
}

/* =====================================================
   初期化
   ===================================================== */
renderBreadcrumb();
renderCoreChips();
renderExtChips();
renderMeaning();

(async function loadAllChapters() {
    const loadingEl = document.getElementById('loading');
    const listEl    = document.getElementById('result-list');

    const allPaths  = buildAllChapterPaths(); // ~796ファイル
    const total     = allPaths.length;

    loadingEl.innerHTML = `
        <div style="margin-bottom:10px; font-family:'Gentium Plus',serif; font-size:1.3rem; color:#ccc;">ἀναζητεῖ</div>
        <div style="width:100%; max-width:280px; margin:0 auto 8px; height:3px;
                    background:#eee; border-radius:2px; overflow:hidden;">
            <div id="load-fill" style="height:100%; width:0%;
                 background:var(--highlight); transition:width 0.25s ease; border-radius:2px;"></div>
        </div>
        <div id="load-status" style="font-size:0.72rem; color:#bbb;">
            章データを読み込み中 (0 / ${total})...
        </div>`;

    const allData = await fetchInBatches(allPaths, 20, (done, ttl) => {
        const pct = Math.round(done / ttl * 100);
        const fill = document.getElementById('load-fill');
        const stat = document.getElementById('load-status');
        if (fill) fill.style.width = pct + '%';
        if (stat) stat.textContent = `章データを読み込み中 (${done} / ${ttl}) ${pct}%`;
    });

    if (allData.length === 0) {
        loadingEl.innerHTML = `
            <p style="color:#c00; font-size:0.82rem; line-height:2.2;">
                データが見つかりませんでした。<br>
                以下の形式でファイルを配置してください：<br>
                <code style="background:#f5f5f7; padding:2px 8px; border-radius:4px; font-size:0.78rem;">
                    bible_data/ROM/1.json<br>
                    bible_data/ROM/2.json ...
                </code>
            </p>`;
        return;
    }

    window._morphData = allData;
    loadingEl.style.display = 'none';
    listEl.style.display    = 'flex';
    renderResults(allData);
})();
</script>
