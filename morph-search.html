<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>形態論検索</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg:             #ffffff;
    --bg-panel:       #f5f5f7;
    --bg-inset:       #fafafa;
    --text:           #1d1d1f;
    --text-sub:       #6e6e73;
    --text-hint:      #8e8e93;
    --accent:         #5a6e82;
    --accent-light:   rgba(90,110,130,0.10);
    --accent-mid:     rgba(90,110,130,0.20);
    --border:         rgba(0,0,0,0.07);
    --radius-s:       8px;
    --radius-m:       12px;
    --radius-l:       16px;
    --badge-concentrated: #2d6a4f;
    --badge-dispersed:    #5a6e82;
    --badge-limited:      #a09050;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
.page { max-width: 680px; margin: 0 auto; padding: 32px 24px 100px; }

/* ── Nav ── */
.nav { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.btn-back {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 13px; font-size: 0.78rem; font-family: inherit;
    border: 1px solid var(--border); border-radius: 20px;
    background: transparent; cursor: pointer; color: var(--text-sub);
    transition: background 0.12s;
}
.btn-back:hover { background: var(--bg-panel); }
.breadcrumb {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.75rem; color: var(--text-hint); flex: 1; overflow: hidden;
}
.breadcrumb .crumb { color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
.breadcrumb .sep { color: #b0b0b6; flex-shrink: 0; }

/* ══════════════════════════════════════════
   SECTION SYSTEM
══════════════════════════════════════════ */
.section-block {
    margin-bottom: 40px;
}
.section-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-sub);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
}
.section-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 0 40px;
}

/* ══════════════════════════════════════════
   SECTION 1 — 語形の正体
   目標：最初の3秒で「この語は何か」を理解させる
══════════════════════════════════════════ */
.identity-block {
    padding: 0 0 32px;
}

/* 語形（最も大きく・最初に目に入る） */
.identity-word {
    font-family: 'Gentium Plus', serif;
    font-size: 3.2rem;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: 0.01em;
    color: var(--text);
    margin-bottom: 8px;
}

/* lemma（語形の直下・同系列で表示） */
.identity-lemma-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 20px;
}
.identity-lemma-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-hint);
}
.identity-lemma-val {
    font-family: 'Gentium Plus', serif;
    font-size: 1.25rem;
    color: var(--text-sub);
    line-height: 1;
}

/* 品詞バッジ */
.identity-pos-badge {
    display: inline-block;
    padding: 3px 10px;
    background: var(--accent-light);
    border: 1px solid var(--accent-mid);
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
    margin-bottom: 20px;
}

/* 活用情報グリッド */
.identity-morph-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}
.identity-morph-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 10px 14px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-m);
    min-width: 72px;
}
.identity-morph-item.primary {
    background: var(--accent-light);
    border-color: var(--accent-mid);
}
.identity-morph-key {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-hint);
}
.identity-morph-val {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
}
.identity-morph-item.primary .identity-morph-val {
    color: var(--accent);
}

/* 活用サマリー（1行で全体を把握） */
.identity-summary {
    margin-top: 16px;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-sub);
    line-height: 1.6;
    padding: 10px 14px;
    background: var(--bg-inset);
    border-radius: var(--radius-s);
    border-left: 3px solid var(--accent-mid);
}

/* 一行活用サマリー（品詞＋活用を連結表示） */
.identity-morph-summary-line {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
    letter-spacing: 0.02em;
}

/* 日本語訳 */
.identity-ja-gloss {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text-sub);
    margin-bottom: 14px;
    padding: 6px 12px;
    background: var(--bg-inset);
    border-radius: var(--radius-s);
    display: inline-block;
}

/* 語の正体内の区切り線 */
.identity-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
}

/* 詳細分析フラット1行 */
.identity-detail-flat {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-sub);
    letter-spacing: 0.03em;
}

.identity-detail-block {
    margin-top: 16px;
    padding: 12px 14px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-s);
}
.identity-detail-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-hint);
    margin-bottom: 10px;
}
.identity-detail-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 16px;
    align-items: baseline;
}
.identity-detail-key {
    font-size: 0.72rem;
    color: var(--text-hint);
    font-weight: 600;
    white-space: nowrap;
}
.identity-detail-val {
    font-size: 0.82rem;
    color: var(--text);
    font-weight: 500;
}

/* ══════════════════════════════════════════
   SECTION 2 — 出現情報（検索結果）
══════════════════════════════════════════ */

/* フィルターパネル：折りたたみ式 */
.filter-disclosure {
    margin-bottom: 16px;
}
.filter-disclosure-trigger {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-s);
    cursor: pointer;
    user-select: none;
    font-size: 0.75rem;
    color: var(--text-sub);
    transition: background 0.12s;
}
.filter-disclosure-trigger:hover { background: #ebebed; }
.filter-disclosure-trigger .trigger-label { font-weight: 600; }
.filter-disclosure-trigger .trigger-state {
    font-size: 0.68rem;
    color: var(--text-hint);
    display: flex; align-items: center; gap: 6px;
}
.filter-disclosure-trigger .trigger-arrow {
    font-size: 0.7rem;
    color: var(--text-hint);
    transition: transform 0.2s;
}
.filter-disclosure[open] .filter-disclosure-trigger .trigger-arrow { transform: rotate(180deg); }
.filter-disclosure-body {
    padding: 14px;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius-s) var(--radius-s);
    background: var(--bg-inset);
}

/* フィルタ内グループ */
.filter-group { margin-bottom: 14px; }
.filter-group:last-child { margin-bottom: 0; }
.filter-group-label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-hint);
    margin-bottom: 8px;
}

/* 凡例 */
.chip-legend {
    display: flex; align-items: center; flex-wrap: wrap; gap: 6px 14px;
    padding: 7px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-s);
    margin-bottom: 12px;
    font-size: 0.66rem; color: var(--text-hint);
}
.chip-legend-label { font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-right: 4px; flex-shrink: 0; }
.chip-legend-item { display: flex; align-items: center; gap: 4px; }
.chip-legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.chip-legend-dot.on  { background: var(--accent); }
.chip-legend-dot.off { background: #d0d0d5; }

/* チップ共通 */
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 20px; font-size: 0.75rem;
    transition: all 0.12s;
}
.chip-fixed {
    background: var(--accent-light);
    border: 1px solid var(--accent-mid);
    color: var(--accent); font-weight: 600;
}
.chip-fixed .chip-key {
    font-size: 0.68rem; color: var(--text-sub); font-weight: 400; margin-right: 1px;
}
.chip-toggle {
    border: 1px solid var(--border); cursor: pointer; user-select: none;
}
.chip-toggle.on {
    background: var(--accent-light); border-color: var(--accent-mid);
    color: var(--accent); font-weight: 600;
}
.chip-toggle.off {
    background: var(--bg); border-color: var(--border);
    color: var(--text-hint); text-decoration: line-through;
}
.chip-toggle:hover.on  { background: rgba(90,110,130,0.17); }
.chip-toggle:hover.off { background: var(--bg-panel); text-decoration: none; }
.chip-dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; flex-shrink: 0;
}
.chip-toggle.on .chip-dot { background: var(--accent); border-color: var(--accent); color: #fff; }
.chip-toggle.off .chip-dot { background: transparent; color: #ccc; }

/* フィルター サブグループラベル（※分詞・※名詞） */
.filter-subgroup-label {
    font-size: 0.60rem;
    font-weight: 700;
    letter-spacing: 0.10em;
    color: var(--text-hint);
    margin-bottom: 6px;
    padding-left: 2px;
}

/* ラジオ式チップ（検索対象） */
.chip-radio {
    border: 1px solid var(--border); cursor: pointer; user-select: none;
}
.chip-radio.on {
    background: var(--accent-light); border-color: var(--accent-mid);
    color: var(--accent); font-weight: 600;
}
.chip-radio.off {
    background: var(--bg); border-color: var(--border);
    color: var(--text-sub);
}
.chip-radio:hover.off { background: var(--bg-panel); }
.chip-radio-dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; flex-shrink: 0;
}
.chip-radio.on .chip-radio-dot { background: var(--accent); border-color: var(--accent); color: #fff; }
.chip-radio.off .chip-radio-dot { background: transparent; }

/* スコープチップ（範囲：LXX / 新約） */
.chip-scope {
    border: 1px solid var(--border); cursor: pointer; user-select: none;
}
.chip-scope.on {
    background: var(--accent-light); border-color: var(--accent-mid);
    color: var(--accent); font-weight: 600;
}
.chip-scope.off {
    background: var(--bg); border-color: var(--border);
    color: var(--text-hint); text-decoration: line-through;
}
.chip-scope:hover.off { background: var(--bg-panel); text-decoration: none; }
.chip-scope-check {
    width: 13px; height: 13px; border-radius: 3px;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; flex-shrink: 0;
}
.chip-scope.on .chip-scope-check { background: var(--accent); border-color: var(--accent); color: #fff; }
.chip-scope.off .chip-scope-check { background: transparent; }

/* 件数表示 */
.results-meta {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 14px;
}
.results-count { font-size: 0.82rem; color: var(--text-sub); }
.results-count strong { font-size: 1rem; font-weight: 700; color: var(--text); }
.results-pct { font-size: 0.7rem; color: var(--text-hint); }

/* 結果リスト */
.result-list { display: flex; flex-direction: column; gap: 5px; }
.result-card {
    border: 1px solid var(--border); border-radius: var(--radius-m);
    padding: 12px 16px; background: var(--bg);
    cursor: pointer; transition: background 0.1s, border-color 0.1s;
}
.result-card:hover { background: var(--bg-panel); border-color: var(--accent-mid); }
.result-card.ctx-open { border-color: var(--accent-mid); background: var(--bg-inset); }
.result-top { display: flex; align-items: baseline; justify-content: space-between; }
.result-word { font-size: 1.3rem; line-height: 1.4; font-family: 'Gentium Plus', serif; }
.result-lemma { font-size: 0.78rem; color: var(--text-hint); margin-left: 7px; line-height: inherit; font-family: 'Gentium Plus', serif; }
.result-ref { font-size: 0.7rem; color: var(--text-hint); font-variant-numeric: tabular-nums; }
.result-ja { font-size: 0.8rem; color: var(--text-sub); margin-top: 3px; line-height: 1.5; }

/* ctx-panel */
.morph-ctx {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border);
    animation: fadeUp 0.15s ease;
}
.morph-ctx-line {
    font-family: 'Gentium Plus', serif;
    font-size: 0.92rem; line-height: 1.9;
    color: var(--text-sub);
    display: flex; flex-wrap: wrap; gap: 2px 5px;
    margin-bottom: 4px;
}
.morph-ctx-line .hit-w {
    color: var(--accent); font-weight: 700;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 1px;
}
.morph-ctx-goto { text-align: right; margin-top: 6px; }
.morph-ctx-goto button {
    font-size: 0.68rem; font-family: inherit;
    background: none; border: none; cursor: pointer;
    color: var(--accent); text-decoration: underline; padding: 0;
}



/* ══════════════════════════════════════════
   SECTION 3 — 統計情報
══════════════════════════════════════════ */
.dist-total-row {
    display: flex; align-items: baseline;
    gap: 8px; margin-bottom: 16px;
}
.dist-total-num {
    font-size: 1.6rem; font-weight: 700; color: var(--text); line-height: 1;
}
.dist-total-label { font-size: 0.75rem; color: var(--text-sub); }
.dist-list { display: flex; flex-direction: column; gap: 7px; }
.dist-row { display: flex; align-items: center; gap: 10px; }
.dist-name {
    width: 72px; font-size: 0.72rem;
    color: var(--text-sub); text-align: right; flex-shrink: 0;
}
.dist-bar-track {
    flex: 1; height: 5px; background: var(--bg-panel);
    border-radius: 3px; overflow: hidden;
}
.dist-bar-fill {
    height: 100%; border-radius: 3px;
    background: var(--accent); transition: width 0.5s ease;
}
.dist-num {
    width: 32px; font-size: 0.68rem; color: var(--text-hint);
    text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums;
}

/* 集中度バッジ */
.concentration-badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-left: 10px;
    vertical-align: middle;
}
.concentration-badge.concentrated {
    background: rgba(45,106,79,0.10);
    border: 1px solid rgba(45,106,79,0.25);
    color: var(--badge-concentrated);
}
.concentration-badge.dispersed {
    background: rgba(90,110,130,0.10);
    border: 1px solid rgba(90,110,130,0.25);
    color: var(--badge-dispersed);
}
.concentration-badge.limited {
    background: rgba(160,144,80,0.10);
    border: 1px solid rgba(160,144,80,0.25);
    color: var(--badge-limited);
}

/* NT / LXX 区切り */
.book-section-sep {
    width: 100%;
    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-hint);
    padding: 8px 2px 4px;
    margin-top: 2px;
}



/* ══════════════════════════════════════════
   Loading / Empty
══════════════════════════════════════════ */
.loading { text-align: center; padding: 56px 16px; color: var(--text-hint); }
.loading-greek { font-family: 'Gentium Plus', serif; font-size: 1.8rem; color: #d8d8dc; margin-bottom: 14px; }
.loading-bar-wrap { width: 200px; margin: 0 auto 10px; height: 2px; background: var(--bg-panel); border-radius: 2px; overflow: hidden; }
.loading-bar { height: 100%; background: var(--accent); transition: width 0.3s; border-radius: 2px; }
.loading-text { font-size: 0.72rem; }
@keyframes pulse { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }
.dot { display: inline-block; animation: pulse 1.4s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
.empty { text-align: center; padding: 48px 16px; color: var(--text-sub); font-size: 0.82rem; line-height: 2.2; }
.empty-icon { font-family: 'Gentium Plus', serif; font-size: 2.2rem; color: #d8d8dc; margin-bottom: 10px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.25s ease forwards; }

/* Footer */
.app-footer {
    margin-top: 48px; padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.68rem; color: var(--text-hint);
}
.footer-links { display: flex; gap: 16px; }
.footer-links a { color: var(--text-hint); text-decoration: none; border-bottom: 1px solid var(--border); padding-bottom: 1px; }
.footer-links a:hover { color: var(--text-sub); }

/* ══════════════════════════════════════════
   exp-panel
══════════════════════════════════════════ */
.exp-panel {
    border: 1px solid var(--border); border-radius: var(--radius-s);
    overflow: hidden; margin-top: 6px; font-size: 0.78rem;
}
.exp-panel summary {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px 5px; background: var(--bg-panel);
    cursor: pointer; user-select: none; list-style: none;
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-hint);
}
.exp-panel summary::-webkit-details-marker { display: none; }
.exp-panel summary::after { content: '▾'; font-size: 0.68rem; color: var(--text-hint); }
.exp-panel[open] summary::after { content: '▴'; }
.exp-body { padding: 8px 10px 10px; border-top: 1px solid var(--border); }
.exp-row { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; margin-bottom: 3px; }
.exp-delta { font-size: 0.68rem; font-weight: 700; min-width: 28px; text-align: right; flex-shrink: 0; }
.exp-label { flex: 1; color: var(--text); line-height: 1.4; }
.exp-alts { margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
.exp-alt-row { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: var(--text-sub); margin-bottom: 2px; }

/* ══════════════════════════════════════════
   iframe compact mode
══════════════════════════════════════════ */
body.in-iframe .nav,
body.in-iframe .btn-back,
body.in-iframe .breadcrumb,
body.in-iframe .app-footer,
body.in-iframe .footer-links { display: none !important; }
body.in-iframe .page { padding: 12px 16px 40px; max-width: 100%; }
body.in-iframe .identity-word { font-size: 2rem; }
body.in-iframe .identity-block { padding-bottom: 16px; }
body.in-iframe .section-block { margin-bottom: 20px; }
body.in-iframe .section-divider { margin: 0 0 20px; }

body.compact-reading-mode .result-ja {
    display: -webkit-box; -webkit-box-orient: vertical;
    -webkit-line-clamp: 1; overflow: hidden;
}

@media (max-width: 520px) {
    .page { padding: 24px 16px 80px; }
    .identity-word { font-size: 2.4rem; }
}

/* ── 発見カード ── */
.discovery-card {
    padding: 16px 18px;
    background: var(--bg);
    border: 1.5px solid var(--accent-mid);
    border-radius: var(--radius-m);
    margin-bottom: 24px;
}
.discovery-card-title {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
}
.discovery-word {
    font-family: 'Gentium Plus', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);

    };

    ['gender','number','case'].forEach(key => {

            extState.push({ key, label: key, value: resolvedMorph[key], enabled: true });

    });
    // params.voice が空なら補完
    if (!params.voice && resolvedMorph.voice) params.voice = resolvedMorph.voice;

}

/* ══════════════════════════════════════════
   形態素デコード（変更なし）
══════════════════════════════════════════ */
const CLASS_TO_POS = {
    'verb':'V','noun':'N','adjective':'A','article':'T',
    'preposition':'P','conjunction':'C','adverb':'D',
    'particle':'X','pronoun':'P','relative pronoun':'R',
    'personal pronoun':'P','demonstrative pronoun':'D',
};
const TENSE_CODE  = { P:'present',I:'imperfect',F:'future',A:'aorist',X:'perfect',Z:'pluperfect' };
const VOICE_CODE  = { A:'active',M:'middle',P:'passive',D:'middle deponent',E:'middle or passive',N:'middle or passive' };
const MOOD_CODE   = { I:'indicative',S:'subjunctive',O:'optative',M:'imperative',N:'infinitive',P:'participle' };
const CASE_CODE   = { N:'nominative',G:'genitive',D:'dative',A:'accusative',V:'vocative' };
const NUMBER_CODE = { S:'singular',P:'plural' };
const GENDER_CODE = { M:'masculine',F:'feminine',N:'neuter' };

function entryPosCode(entry) {
    if (entry.pos) return String(entry.pos).replace(/-$/,'').toUpperCase();
    if (entry.class) return CLASS_TO_POS[String(entry.class).toLowerCase()] || '';
    return '';
}
function decodeMorph(entry) {
    const norm = v => (!v || v === '-') ? '' : v;
    if (entry.tense || entry.mood || entry.voice) {
        return { pos: entryPosCode(entry), tense: norm(entry.tense), voice: norm(entry.voice),
                 mood: norm(entry.mood), case: norm(entry.case), number: norm(entry.number),
                 gender: norm(entry.gender), person: norm(entry.person) };
    }
    if (entry.morph && typeof entry.morph === 'object') {
        const m = entry.morph;
        return { pos: norm(entry.pos||'').replace(/-$/,''), tense:norm(m.tense), voice:norm(m.voice),
                 mood:norm(m.mood), case:norm(m.case), number:norm(m.number), gender:norm(m.gender), person:norm(m.person) };
    }
    const raw = typeof entry.morph === 'string' ? entry.morph : '';
    const parts = raw.split('-');
    const pos = norm(entry.pos||parts[0]||'').replace(/-$/,'');
    if (pos.toUpperCase() === 'V' && parts[1]) {
        const seg = parts[1], off = /^[0-9]/.test(seg) ? 1 : 0;
        return { pos, tense:TENSE_CODE[seg[off]]||'', voice:VOICE_CODE[seg[off+1]]||'',
                 mood:MOOD_CODE[seg[off+2]]||'', person:seg[off+3]||'',
                 number:NUMBER_CODE[seg[off+4]]||'', gender:'', case:'' };
    }
    if (parts[1]) {
        const seg=parts[1], hp=['1','2','3'].includes(seg[0]), b=hp?seg.slice(1):seg;
        return { pos, tense:'',voice:'',mood:'', person:hp?seg[0]:'',
                 case:CASE_CODE[b[0]]||'', number:NUMBER_CODE[b[1]]||'', gender:GENDER_CODE[b[2]]||'' };
    }
    return { pos, tense:'',voice:'',mood:'',case:'',number:'',gender:'',person:'' };
}
function cleanText(entry) {
    return (entry.word||entry.normalized||entry.text||'').replace(/[.,:;·⸀⸁⸂⸃⌈⌉]/g,'').trim();
}
function getBookKey(entry) {
    if (entry._bookKey) return entry._bookKey;
    if (entry.book && isNaN(entry.book)) return String(entry.book);
    if (entry.book != null && entry.book !== '') {
        return BOOK_MAP[String(entry.book).padStart(2,'0')] || null;
    }
    return null;
}
function normalizeGreek(str) {
    return (str || '').normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/[⸀⸁⸂⸃⌈⌉.,;:·]/g,'').replace(/ς/g,'σ').toLowerCase().trim();
}

// コア条件のON/OFF状態（ページロード時はすべてON）
const coreOnState = { mood: true, voice: true, tense: true, person: true };

function matchEntry(entry) {
    if (wordFilterMode === 'lemma' && params.lemma) {
        if (normalizeGreek(entry.lemma||'') !== normalizeGreek(params.lemma)) return false;
    } else if (wordFilterMode === 'word' && params.word) {
        if (normalizeGreek(entry.word||entry.normalized||entry.text||'') !== normalizeGreek(params.word)) return false;
    }
    if (!bookState.every(g => g.enabled)) {
        const en = new Set(bookState.filter(g=>g.enabled).flatMap(g=>g.books));
        const bk = entry._bookKey || getBookKey(entry);
        if (!bk || !en.has(bk)) return false;
    }
    const sp = params.pos.replace(/-$/,'').toUpperCase();
    if (sp && entryPosCode(entry) !== sp) return false;
    const m = decodeMorph(entry);
    if (coreOnState.tense  && params.tense && m.tense !== params.tense) return false;
    if (coreOnState.mood   && params.mood  && m.mood  !== params.mood)  return false;
    if (coreOnState.voice  && params.voice) {
        const ok = m.voice === params.voice
            || (params.voice==='middle'  && (m.voice==='middle deponent'||m.voice==='middle or passive'))
            || (params.voice==='passive' && m.voice==='middle or passive');
        if (!ok) return false;
    }
    if (coreOnState.person && params.person && (m.person||'') !== params.person) return false;
    for (const f of extState) {
        if (!f.enabled || !f.value) continue;
        if ((m[f.key]||'') !== f.value) return false;
    }
    return true;
}

function renderDiscoveryCard() {
    const pos   = params.pos.replace(/-$/,'').toUpperCase();
    const word  = params.word || params.lemma || '—';
    const posJa = POS_JP[pos] || null;

    document.getElementById('disc-word').textContent = word;

    const rows = [];

    // 行1：品詞（何かを示す）
    if (posJa) {
        rows.push(posJa);
    }

    // 行2：動詞なら時制+態+法を平易に、名詞なら格を平易に
    if (pos === 'V') {
        const parts = [];
        if (params.tense) {
            const TENSE_PLAIN = {
                present: '今まさに起きていること',
                imperfect: '過去に繰り返し起きていたこと',
                future: 'これから起きること',
                aorist: '起きた出来事',
                perfect: '起きた結果が今も続いていること',
                pluperfect: '過去のある時点で完了していたこと',
            };
            parts.push(TENSE_PLAIN[params.tense] || TENSE_JP[params.tense]);
        }
        if (params.mood) {
            const MOOD_PLAIN = {
                indicative: '事実として述べている',
                subjunctive: '可能性・意志を表している',
                optative: '願望を表している',
                imperative: '命じている',
                infinitive: '動作そのものを表している',
                participle: '他の語と組み合わさっている',
            };
            parts.push(MOOD_PLAIN[params.mood] || MOOD_JP[params.mood]);
        }
        if (params.voice === 'passive' || params.voice === 'middle or passive') {
            parts.push('受ける側の立場で使われている');
        } else if (params.voice === 'middle' || params.voice === 'middle deponent') {
            parts.push('自分に関わる動作として使われている');
        }
        if (parts.length) rows.push(parts.join('・'));
    } else if (['N','A','R','D','P'].includes(pos)) {
        const CASE_PLAIN = {
            nominative: '文の主役として使われている',
            genitive:   '何かを修飾・所属を示している',
            dative:     '間接的な対象を示している',
            accusative: '動作の対象として使われている',
            vocative:   '呼びかけに使われている',
        };
        const caseVal = extState.find(f => f.key === 'case' && f.enabled)?.value;
        if (caseVal && CASE_PLAIN[caseVal]) {
            rows.push(CASE_PLAIN[caseVal]);
        }
        const numVal = extState.find(f => f.key === 'number' && f.enabled)?.value;
        if (numVal === 'plural') rows.push('複数形で使われている');
    }

    // 行3：lemmaから「〜を表している」
    if (params.lemma) {
        rows.push(`「${params.lemma}」という語の一形`);
    }

    const el = document.getElementById('disc-rows');
    el.innerHTML = rows.map(r => `
        <div class="discovery-row">
            <span class="discovery-arrow">→</span>
            <span class="discovery-text">${r}</span>
        </div>`).join('');

    /* 内容確定後にはじめて表示（fadeUp アニメーション付き） */
    const card = document.getElementById('discovery-card');
    if (card && rows.length) {
        card.style.display = '';
        card.classList.add('fade-up');
    }
}

function renderDist(matched) {
    const counts = {};
    matched.forEach(e => { const bk = e._bookKey || getBookKey(e) || '?'; counts[bk] = (counts[bk]||0)+1; });
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    const max = sorted[0]?.[1] || 1;
    const total = matched.length;

    /* 集中度算出 */
    let concentration, badgeClass;
    if (total <= 10) {
        concentration = '限定'; badgeClass = 'limited';
    } else {
        const top1Pct = sorted[0] ? sorted[0][1] / total : 0;
        const top3Sum = sorted.slice(0, 3).reduce((s, [,n]) => s + n, 0);
        if (top1Pct > 0.5) {
            concentration = '集中'; badgeClass = 'concentrated';
        } else if (top3Sum / total < 0.5) {
            concentration = '分散'; badgeClass = 'dispersed';
        } else {
            concentration = '分散'; badgeClass = 'dispersed';
        }
    }
    const badgeHTML = `<span class="concentration-badge ${badgeClass}">${concentration}</span>`;

    document.getElementById('dist-total').textContent = total.toLocaleString();
    document.getElementById('concentration-badge').innerHTML = badgeHTML;
    document.getElementById('dist-list').innerHTML = sorted.slice(0,12).map(([k,n]) => `
        <div class="dist-row">
            <span class="dist-name">${BOOK_JP[k]||k}</span>
            <div class="dist-bar-track"><div class="dist-bar-fill" style="width:${Math.round(n/total*100)}%"></div></div>
            <span class="dist-num">${n}</span>
        </div>`).join('');
    document.getElementById('dist-section').style.display = 'block';
    document.getElementById('dist-divider').style.display = 'block';
}

function toggleScope(key) {
    scopeState[key] = !scopeState[key];
    // bookState に反映
    bookState.forEach(g => {
        if (key === 'lxx') {
            if (LXX_KEYS.has(g.key)) g.enabled = scopeState.lxx;
        } else {
            if (!LXX_KEYS.has(g.key)) g.enabled = scopeState.nt;
        }
    });
    renderScopeChips();
    updateFilterSummaryText();
    notifyFilterChanged();
    if (window._morphData) renderResults(window._morphData);
}

function renderWordFilterChips() {
    const sec = document.getElementById('word-filter-group');
    if (!params.lemma && !params.word) { sec.style.display='none'; return; }
    sec.style.display = 'block';
    const modes = [
        params.word  ? { key:'word',  label:`語形一致`,  greek: params.word  } : null,
        params.lemma ? { key:'lemma', label:`原形一致`,   greek: params.lemma } : null,
    ].filter(Boolean);
    document.getElementById('word-filter-chips').innerHTML = modes.map(mode => {
        const on = wordFilterMode === mode.key;
        return `<div class="chip chip-radio ${on?'on':'off'}" onclick="toggleWordFilter('${mode.key}')">
            <div class="chip-radio-dot">${on?'●':''}</div>
            <span>${mode.label}</span>
            <span style="font-family:'Gentium Plus',serif;margin-left:3px;opacity:0.85;">${mode.greek}</span>
        </div>`;
    }).join('');
}

/* フィルターサマリーテキスト（折りたたみヘッダーに表示） */
function updateFilterSummaryText() {
    const parts = [];
    // 検索対象
    if (wordFilterMode === 'lemma') parts.push('原形一致');
    else if (wordFilterMode === 'word') parts.push('語形一致');
    // 範囲
    const scopeParts = [];
    if (scopeState.nt)  scopeParts.push('新約');
    if (scopeState.lxx) scopeParts.push('LXX');
    if (scopeParts.length < 2) parts.push(scopeParts.join('・') || '範囲なし');
    // コア条件OFF
    const coreOff = Object.entries(coreOnState).filter(([,v])=>!v).length;
    if (coreOff) parts.push(`語形条件 ${coreOff}件OFF`);
    // 拡張条件OFF
    const offExt = extState.filter(f=>!f.enabled&&f.value).length;
    if (offExt) parts.push(`${offExt}件OFF`);
    const el = document.getElementById('filter-summary-text');
    if (el) el.textContent = parts.length ? parts.join('・') : '条件変更なし';
}

function toggleExt(i)  {
    extState[i].enabled=!extState[i].enabled;
    renderExtChips(); renderCoreChips(); renderCoreTags(); syncURL();
    updateFilterSummaryText();
    notifyFilterChanged();
    if(window._morphData) renderResults(window._morphData);
}
function toggleBook(i) {
    bookState[i].enabled=!bookState[i].enabled;
    renderBookChips();
    updateFilterSummaryText();
    notifyFilterChanged();
    if(window._morphData) renderResults(window._morphData);
}
function toggleWordFilter(mode) {
    // ラジオ式：同じものをクリックしても変わらない（常に1つが選択）
    if (wordFilterMode === mode) return;
    wordFilterMode = mode;
    renderWordFilterChips();
    if(window._morphData) renderResults(window._morphData);
}

/* ══════════════════════════════════════════
   ナビゲーション（変更なし）
══════════════════════════════════════════ */
function getActiveFilterState() {
    return {
        books:    bookState.filter(g=>g.enabled).flatMap(g=>g.books),
        groups:   bookState.filter(g=>g.enabled).map(g=>g.key),
        scope:    bookState.filter(g=>g.enabled).length===1 ? bookState.find(g=>g.enabled).key : '',
        chips:    extState.filter(f=>f.enabled&&f.value).map(f=>`${f.key}:${f.value}`),
        disabled: extState.filter(f=>!f.enabled).map(f=>f.key),
    };
}
function notifyFilterChanged() {
    const filters = getActiveFilterState();
    const msg = { type:'FILTER_CHANGED', filters };
    if (window.parent && window.parent !== window) window.parent.postMessage(msg,'*');
    else if (window.opener && !window.opener.closed) window.opener.postMessage(msg,'*');
}

/* ══════════════════════════════════════════
   日本語訳（変更なし）
══════════════════════════════════════════ */
const _jaMap = new Map();
/* _refToJaKey は STEP9 Data Flow Fix により削除 */
const _KEY_TO_CODE = (() => {
    const m = {};
    Object.entries(BOOK_MAP).forEach(([code, key]) => { m[key] = code; });
    return m;
})();
function getJaVerse(entry) {
    const bk   = entry._bookKey || entry.book;
    const code = _KEY_TO_CODE[bk];
    const ch   = String(entry.ch ?? '').padStart(2, '0');
    const v    = String(entry.verse ?? '').padStart(2, '0');
    const key  = code && ch && v ? `${code}${ch}${v}` : null;
    if (key && _jaMap.has(key)) return _jaMap.get(key);
    return entry.gloss || entry.english || '';
}
function buildRefLabel(ref) {
    const r = String(ref||'');
    const m = r.match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
    if (m) return `${BOOK_JP[m[1]]||m[1]} ${m[2]}:${m[3]}`;
    if (r.length===6 && /^\d+$/.test(r)) {
        const bk = BOOK_MAP[r.slice(0,2)];
        return `${(bk&&BOOK_JP[bk])||bk||r.slice(0,2)} ${parseInt(r.slice(2,4))}:${parseInt(r.slice(4,6))}`;
    }
    return r;
}

/* ══════════════════════════════════════════
   結果一覧（変更なし）
══════════════════════════════════════════ */
let _currentRows = [];
let _displayCount = 100;
const PAGE_SIZE = 100;

function renderResults(allData) {
    const matched = allData.filter(matchEntry);
    // URLパラメータが不完全な場合、最初のヒットから補完
    if (matched.length > 0 && !resolvedMorph) patchParamsFromEntry(matched[0]);
    const sp      = params.pos.replace(/-$/,'');
    const samePos = allData.filter(e=>(e.pos||'').replace(/-$/,'').toUpperCase()===sp.toUpperCase()).length;
    document.getElementById('count').textContent      = matched.length.toLocaleString();
    document.getElementById('result-pct').textContent = samePos>0 ? `同品詞 ${samePos.toLocaleString()} 件中` : '';
    _currentRows  = matched;
    _displayCount = PAGE_SIZE;
    renderDist(matched);
    renderPage();
}

function renderPage() {
    const el   = document.getElementById('result-list');
    const rows = _currentRows;
    if (!rows.length) {
        el.innerHTML = `<div class="empty"><div class="empty-icon">∅</div>条件に一致する語形が見つかりませんでした。<br>拡張条件をOFFにするか、書物範囲を広げてみてください。</div>`;
        return;
    }
    const slice = rows.slice(0, _displayCount);
    const more  = rows.length - _displayCount;
    el.innerHTML = slice.map((entry, idx) => {
        const word     = entry.word || entry.normalized || entry.text || '';
        const refLabel = buildRefLabel(entry.ref);
        const jaText   = getJaVerse(entry);
        const encRef   = encodeURIComponent(entry.ref || '');
        const encWord  = encodeURIComponent(word);
        return `<div class="result-card" style="animation:fadeUp 0.2s ease ${Math.min(idx*8,240)}ms both"
            onclick="toggleMorphContext(this,'${encRef}','${encWord}')">
            <div class="result-top">
                <div>
                    <span class="result-word">${word}</span>
                    <span class="result-lemma">${entry.lemma||''}</span>
                </div>
                <span class="result-ref">${refLabel}</span>
            </div>
            ${jaText ? `<div class="result-ja">${jaText}</div>` : ''}
        </div>`;
    }).join('');
    if (more > 0) {
        el.innerHTML += `<div style="text-align:center;padding:24px 0;">
            <button onclick="loadMore()" style="padding:8px 24px;font-size:0.78rem;font-family:inherit;
                border:1px solid var(--border);border-radius:20px;background:transparent;
                cursor:pointer;color:var(--text-sub);transition:background 0.12s;">
                さらに表示（残り ${more.toLocaleString()} 件）
            </button></div>`;
    }
}
function loadMore() { _displayCount += PAGE_SIZE; renderPage(); }

function goToWord(ref, enc) {
    const word = decodeURIComponent(enc);
    const msg  = { type:'GO_TO_REF', ref, word };
    if (window.parent && window.parent !== window) { window.parent.postMessage(msg,'*'); return; }
    if (window.opener && !window.opener.closed) window.opener.postMessage(msg,'*');
}

/* ══════════════════════════════════════════
   ctx-panel（変更なし）
══════════════════════════════════════════ */
function toggleMorphContext(cardEl, encRef, encWord) {
    const ref  = decodeURIComponent(encRef);
    const word = decodeURIComponent(encWord);
    const existing = cardEl.querySelector('.morph-ctx');
    if (existing) { existing.remove(); cardEl.classList.remove('ctx-open'); return; }
    document.querySelectorAll('.result-card.ctx-open').forEach(c => {
        c.querySelector('.morph-ctx')?.remove(); c.classList.remove('ctx-open');
    });
    if (!window._morphData) { goToWord(ref, encWord); return; }
    const prefix = String(ref).replace(/!.*$/,'').trim();
    // 新スキーマ: book/chapter/verse での一致を優先、なければ ref 文字列比較
    const _refParsed = (function(){
        const m = prefix.match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
        return m ? {book: m[1], chapter: parseInt(m[2],10), verse: parseInt(m[3],10)} : null;
    })();
    const tokens = window._morphData.filter(e => {
        if (_refParsed && e.book && e.chapter != null && e.verse != null) {
            return e.book === _refParsed.book
                && String(e.chapter) === String(_refParsed.chapter)
                && String(e.verse)   === String(_refParsed.verse);
        }
        return String(e.ref||'').replace(/!.*$/,'').trim() === prefix;
    });
    if (!tokens.length) { goToWord(ref, encWord); return; }
    const normWord = cleanText({ word });
    const lineHTML = tokens.map(t => {
        const w = cleanText(t);
        if (!w) return '';
        return w === normWord ? `<span class="hit-w">${w}</span>` : `<span>${w}</span>`;
    }).filter(Boolean).join(' ');
    const ctx = document.createElement('div');
    ctx.className = 'morph-ctx';
    ctx.addEventListener('click', e => e.stopPropagation());
    ctx.innerHTML = `
        <div class="morph-ctx-line">${lineHTML}</div>
        <div class="morph-ctx-goto"><button onclick="goToWord('${encRef}','${encWord}')">本文へ →</button></div>`;
    cardEl.appendChild(ctx);
    cardEl.classList.add('ctx-open');
}

/* ══════════════════════════════════════════
   データ読み込み（変更なし）
══════════════════════════════════════════ */
const JA_FOLDER = 'bible_jp';
const ALL_BOOKS = [
    {key:'ROM',ch:16},{key:'1CO',ch:16},{key:'2CO',ch:13},{key:'GAL',ch:6},
    {key:'EPH',ch:6},{key:'PHP',ch:4},{key:'COL',ch:4},{key:'1TH',ch:5},
    {key:'2TH',ch:3},{key:'1TI',ch:6},{key:'2TI',ch:4},{key:'TIT',ch:3},
    {key:'PHM',ch:1},
    {key:'GEN',ch:50},{key:'EXO',ch:40},{key:'LEV',ch:27},{key:'NUM',ch:36},{key:'DEU',ch:34},
    {key:'JOS',ch:24},{key:'JDG',ch:21},{key:'RUT',ch:4},{key:'1SA',ch:31},{key:'2SA',ch:24},{key:'1KI',ch:22},{key:'2KI',ch:25},
    {key:'ISA',ch:66},{key:'JER',ch:52},{key:'EZE',ch:48},{key:'DAN',ch:12},
    {key:'HOS',ch:14},{key:'JOL',ch:3},{key:'AMO',ch:9},{key:'OBA',ch:1},{key:'JON',ch:4},{key:'MIC',ch:7},
    {key:'NAH',ch:3},{key:'HAB',ch:3},{key:'ZEP',ch:3},{key:'HAG',ch:2},{key:'ZEC',ch:14},{key:'MAL',ch:4},
    {key:'PSA',ch:150},{key:'PRO',ch:31},{key:'JOB',ch:42},{key:'SNG',ch:8},{key:'LAM',ch:5},
    {key:'ECC',ch:12},{key:'EST',ch:10},{key:'EZR',ch:10},{key:'NEH',ch:13},{key:'1CH',ch:29},{key:'2CH',ch:36},
];
const NT_BOOKS = new Set([
    'MAT','MRK','LUK','JHN','ACT','ROM','1CO','2CO','GAL','EPH',
    'PHP','COL','1TH','2TH','1TI','2TI','TIT','PHM','HEB','JAS',
    '1PE','2PE','1JN','2JN','3JN','JUD','REV'
]);
function bibleDataPath(bookKey, ch) {
    const sub = NT_BOOKS.has(bookKey) ? 'nt' : 'lxx';
    return `./bible_data/${sub}/${bookKey}/${ch}.json`;
}
function buildAllChapterPaths() {
    const p=[];
    for(const b of ALL_BOOKS) for(let c=1;c<=b.ch;c++) p.push({key:b.key,ch:c,path:bibleDataPath(b.key,c)});
    return p;
}
async function fetchInBatches(tasks,sz,onProg) {
    let all=[];
    for(let i=0;i<tasks.length;i+=sz) {
        const results=await Promise.allSettled(
            tasks.slice(i,i+sz).map(t=>
                fetch(t.path).then(r=>r.ok?r.json():null).catch(()=>null)
                .then(data=>{ if(!Array.isArray(data)) return null; data.forEach(e=>{e._bookKey=t.key;}); return data; })
            )
        );
        results.forEach(r=>{ if(r.status==='fulfilled'&&Array.isArray(r.value)) all=all.concat(r.value); });
        onProg(Math.min(i+sz,tasks.length),tasks.length);
    }
    return all;
}
async function fetchJaData(morphPaths) {
    const KEY_TO_CODE={};
    Object.entries(BOOK_MAP).forEach(([code,key])=>{ KEY_TO_CODE[key]=code; });
    return Promise.allSettled(
        morphPaths.map(t=>({...t,path:`./${JA_FOLDER}/${t.key}/${t.ch}.json`}))
        .map(t=>fetch(t.path).then(r=>r.ok?r.json():null).catch(()=>null)
            .then(data=>{
                if(!data) return;
                const vers=data.verses; if(!vers||typeof vers!=='object') return;
                const bc=KEY_TO_CODE[t.key]; if(!bc) return;
                Object.entries(vers).forEach(([vn,tx])=>{
                    _jaMap.set(`${bc}${String(t.ch).padStart(2,'0')}${String(parseInt(vn)).padStart(2,'0')}`,String(tx));
                });
            })
        )
    );
}

/* ══════════════════════════════════════════
   ヘルプポップオーバー
══════════════════════════════════════════ */
(function initHelpPopup() {
    const btn   = document.getElementById('help-btn');
    const popup = document.getElementById('help-popup');
    if (!btn || !popup) return;

    function openPopup() {
        /* 右端からはみ出す場合は右寄せに切り替え */
        popup.classList.remove('align-right');
        const rect = popup.parentElement.getBoundingClientRect();
        const popW = 260;
        if (rect.left + popW > window.innerWidth - 16) {
            popup.classList.add('align-right');
        }
        popup.classList.add('open');
        btn.setAttribute('aria-expanded', 'true');
    }
    function closePopup() {
        popup.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
    }
    function togglePopup(e) {
        e.stopPropagation();
        popup.classList.contains('open') ? closePopup() : openPopup();
    }

    btn.addEventListener('click', togglePopup);
    btn.addEventListener('touchend', function(e){ e.preventDefault(); togglePopup(e); });

    /* 外側クリック / タップで閉じる */
    document.addEventListener('click', function(e) {
        if (!popup.contains(e.target) && e.target !== btn) closePopup();
    });
    document.addEventListener('touchend', function(e) {
        if (!popup.contains(e.target) && e.target !== btn) closePopup();
    });
})();

/* ══════════════════════════════════════════
   初期化
══════════════════════════════════════════ */

/* ref パラメータから該当章を先取りフェッチし、
   形態情報を補完してから画面初期描画を行う */
(async function init() {
    const loadEl = document.getElementById('loading');
    const listEl = document.getElementById('result-list');

    /* ── Step 1: ref から書物・章を特定して先取りフェッチ ── */
    const refStr = params.ref || '';
    const refM   = refStr.match(/^([A-Z0-9]+)\s+(\d+)/);
    if (refM) {
        const bookKey = refM[1];
        const chNum   = parseInt(refM[2], 10);
        const path    = bibleDataPath(bookKey, chNum);
        try {
            const data = await fetch(path).then(r => r.ok ? r.json() : null).catch(() => null);
            if (Array.isArray(data) && !resolvedMorph) {
                // ref の !N 番目のトークンを特定（なければ word 一致で探す）
                const tokenIdx = (refStr.match(/!(\d+)$/) || [])[1];
                const wordNorm = normalizeGreek(params.word || '');
                let target = null;
                if (tokenIdx != null) {
                    // verse 内でのトークン番号（1始まり）で探す
                    const verseParsed = refStr.match(/^([A-Z0-9]+)\s+(\d+):(\d+)/);
                    if (verseParsed) {
                        const vTokens = data.filter(e =>
                            String(e.chapter||'') === verseParsed[2] &&
                            String(e.verse||'')   === verseParsed[3]
                        );
                        target = vTokens[parseInt(tokenIdx,10) - 1] || null;
                    }
                }
                // フォールバック：word 正規化一致
                if (!target && wordNorm) {
                    target = data.find(e => normalizeGreek(e.word||e.normalized||e.text||'') === wordNorm);
                }
                if (target) patchParamsFromEntry(target);
            }
        } catch(e) { /* 先取り失敗は無視 */ }
    }

    /* ── Step 2: 初期描画（補完済み params で） ── */
    renderHeader();
    renderDiscoveryCard();
    renderCoreTags();
    if (typeof renderAspectTag === 'function' && params.tense) { renderAspectTag(params.tense); }
    renderCoreChips();
    renderExtChips();
    renderBookChips();
    renderScopeChips();
    renderWordFilterChips();
    updateFilterSummaryText();

    /* ── Step 3: 全データ読み込み → 出現情報 ── */
    const paths = buildAllChapterPaths();
    const allData = await fetchInBatches(paths, 20, (done, ttl) => {
        const pct = Math.round(done/ttl*100);
        const bar = document.getElementById('load-bar');
        const txt = document.getElementById('load-text');
        if (bar) bar.style.width = pct + '%';
        if (txt) txt.textContent = `読み込み中 ${done} / ${ttl}`;
    });

    if (!allData.length) {
        loadEl.innerHTML = `<p style="color:#c00;font-size:0.82rem;">データが見つかりませんでした。<code>bible_data/ROM/1.json</code> の形式で配置してください。</p>`;
        return;
    }

    const txt = document.getElementById('load-text');
    if (txt) txt.textContent = '日本語訳を読み込み中…';
    await fetchJaData(paths);

    window._morphData = allData;
    loadEl.style.display = 'none';
    listEl.style.display = 'flex';
    renderResults(allData);
})();
</script>
